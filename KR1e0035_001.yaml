body:
  text: 春秋集解卷一宋吕本中撰隱公名息姑惠公之子諡法不尸其位曰隱杜預釋例諡法隱拂不成曰隱左氏傳惠公元妃孟子孟子卒繼室以聲子生隱公宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸於我生桓公而惠公薨是以隱公立而奉之榖梁傳春秋貴義而不貴惠信道而不信邪孝子揚父之美不揚父之惡先君之欲與桓非正也邪也雖然既勝其邪心以與隱矣已探先君之邪志而遂以與桓則是成父之惡也兄弟天倫也為子受之父為諸侯受之君已廢天倫而忘君父以行小惠曰小道也若隱者可謂輕千乘之國蹈道則未也伊川先生解春秋魯史記之名也夫子之道既不行於天下於是因魯春秋立百王不易之大法平王東遷在位五十一年卒不能復興先王之業王道絶矣孟子曰王者之迹熄而詩亡詩亡然後春秋作適當隱公之初故始於隱公泰山孫氏曰春秋之始於隱公者非他以平王之所終也平王東遷歷孝逾惠莫能中興播蕩凌遲逮隱而死夫生猶有可待也死則何所為哉故詩自黍離而降書自文侯之命而絶春秋自隱公而始也元年春王正月左氏傳元年春王周正月杜氏注言周以别夏殷公羊傳元年春王正月元年者何君之始年也何言乎王正月大一統也榖梁傳雖無事必舉正月謹始也伊川先生解隱公之始年春天時正月王正書春王正月示人君當上奉天時下承王正明此義則知王與天同大而人道立矣周正月非春也假天時以立義耳平王之時王道絶矣春秋假周以正王法隱不書即位明大法於始也諸侯之立必由王命隱公自立故不書即位不與其為君也法既立矣諸公或書或不書義各不同既不受命於天子以先君之命而繼世者則正其始文成昭襄哀是也繼世者既非王命又非先君之命不書即位不正其始隱莊閔僖是也桓宣定之書即位桓弒君而立宣受弒賊之立定為逐君者所立皆無王無君何命之受故書其自即位也定之比宣則又有間矣陸氏纂例曰啖子曰凡天子崩諸侯薨既殯而嗣子為君康王之誥是也未就阼階之位來年正月朔日乃就位南面而改元春秋所書是也劉氏權衡曰大凡元年春正月公即位此八字者文理相須苟載事者必皆庸焉非聖人新意也惟王一字在春正之間為聖人新意耳常山劉氏曰平王以降天子之命不行於諸侯諸侯之嗣皆專立而無所謂命如隱文成襄昭哀皆受國於先君而不請命於天子者也隱公獨不書即位者入春秋之始聖人即以王法奪之而大義舉矣若文成襄昭哀亦不書乎則與夫內復不受於先君者無以為别故五公書之言猶繼正而有所受之矣如莊閔僖皆內無所受上無所承爾至桓宣定三公則著其自立也武夷胡氏傳人君嗣立逾年必改元此重事也當國大臣冢宰必以其事告於廟秉筆史官必以其事書於策緣始終之義一年不二君故不改於柩前定位之初緣臣民之心不可曠年無君故不待於三年畢喪之後逾年春正月乃謹始之時得理之中者也於是改元著新君即位之始冝矣即位而謹始本不可以不正為子受之父為諸侯受之王此大本也咸無焉則不書即位隱莊閔僖四公是也聖人恐此義未明又於衛侯晉發之書曰衛人立晉以見內無所承上不請命者雖國人欲立之其立之非也在春秋時諸侯皆不請王命矣然承國於先君者則得書即位以别於內復無所承者文成襄昭哀五公是也聖人恐此義未明又於齊孺子荼發之荼幼固不當立然既有先君景公之命矣陳乞雖流涕欲立長君其如景公之命何以乞君荼不死先君之命也命雖不敢死以别於內復無所承者可也然亂倫失正則天王所當治聖人恐此義未明又於衛侯朔發之朔殺伋壽受其父宣公之命嘗有國矣然四國納之則貶王人拒之則褒於以見雖有父命而亂倫失正者王法所冝絶也由是推之王命重矣雖重天王之命若非制命以義亦將壅而不行故魯武公以括與戲見宣王王欲立戲仲山甫不可王卒立之魯人殺戲立括之子諸侯由是不睦聖人以此義非盡倫者不能斷也又特於首止之盟發之夫以王世子而出會諸侯以列國諸侯而上與王世子會此例之變也而春秋許之鄭伯奉承王命不與是盟此禮之常也而春秋逃之所以然者王將以變易儲二桓公糾合諸侯仗正道以翼世子使國本不搖而天下之為父子者定所謂一匡天下民到於今受其賜者也至是變而之正以大義為主而崇髙之勢不與焉然後即位謹始之義終矣萬世之大倫正矣故曰春秋之法大居正非聖人莫能修之謂此類爾又曰謂正月為王正則知天下之定於一也天無二日土無二王家無二主尊無二上道無二致政無二門故議常經者黜百家尊孔氏諸不在六藝之科者勿使並進此道術之歸於一也言致理者欲令政事皆出中書而變禮樂革制度則流放竄殛之刑隨其後此國政之歸於一也若乃闢私門廢公道各以便宜行事是人自為政謬於春秋大一統之義矣三月公及邾公作邾婁儀父盟於蔑公榖作眛左氏傳邾子克也未王命故不書爵公攝位而欲求好於邾故為蔑之盟公羊傳及者何與也會及暨皆與也曷為或言會或言及或言暨會猶最也及猶汲汲也暨猶暨暨也及我欲之暨不得已也儀父者何字也劉氏權衡曰案公會齊侯盟于柯當是時曹子手劔劫齊侯以復汶陽之田可謂我欲之矣而反書會則及者非我欲之也案春秋有相與及者此是也有相次及者及其大夫孔父是也有逮及者公追齊師弗及是也文為事出不専汲汲而已榖梁傳及者何內為志焉爾劉氏權衡曰及齊高傒盟及晉處父盟豈復內為志者邪伊川先生解盟誓以結信出於人情先王所不禁也後世屢盟而不信則罪也諸侯交相盟誓亂世之事也凡盟內為主稱及外為主稱會在魯地雖外為主亦稱及彼來而及之也兩國以上則稱會彼盟而往會之也邾附庸國邾子克字儀父附庸之君稱字劉氏傳泰山孫氏同同王臣也夷狄則稱名降中國也杜氏注邾今魯國鄒縣也蔑姑蔑魯地魯國卞縣南有姑城孔氏正義曰凡盟禮殺牲歃血告誓神明若有背違欲令神加殃咎使如此牲也曲禮曰涖牲曰盟秋官司盟職曰邦國有疑會同則掌其盟約之載劉氏傳何如則謂之附庸公侯百里伯七十里子男五十里不及五十里附於諸侯曰附庸公九命侯伯七命子男五命附庸四命髙郵孫氏曰凡會盟侵伐重其為首者其事善則首者之善重其事惡則首者之惡亦重是故盟會則以主會為首侵伐則以主兵為首所以輕重之也然而於內之主則可言公及某於外之主則不言某及公故聖人變其文曰及曰會也及者以內而及外因此而及彼會者以此從彼彼處某而我往會之也蘇氏曰或曰古者禮樂征伐自天子出諸侯專之非禮也凡書皆以譏之豫以為不然春秋之際王室衰矣然而周禮猶在天命未改雖有湯武未能取而代之也諸侯之亂舍此何以治之要之以盟會威之以征伐小國恃焉大國畏焉猶可以少安也武夷胡氏傳王朝大夫例稱字列國之命大夫例稱字諸侯之兄弟例稱字中國之附庸例稱字其常也聖人案是非定褒貶則有例當稱字或黜而書名例當稱人或進而書字其變也常者道之正變者道之中夏五月鄭伯克段于鄢左氏傳初鄭武公娶于申曰武薑生莊公及共叔段莊公寤生驚薑氏故名曰寤生遂惡之愛共叔段欲立之亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二於己公子吕曰國不堪二君將若之何公曰無庸將自及大叔又收二以為己邑子封曰可矣厚將得衆公曰不義不昵厚將崩大叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢五月辛丑太叔出奔共書曰鄭伯克段于鄢段不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也榖梁傳段鄭伯弟也何以知其為弟也殺世子母弟目君以其目君知其為弟也段弟也而弗謂弟公子也而弗謂公子貶之也段失子弟之道矣賤段而甚鄭伯也何甚乎鄭伯甚鄭伯之處心積慮成於殺也于鄢逺也猶曰取之其母之懷中而殺之云爾甚之也然則為鄭伯者冝奈何緩追逸賊親親之道也伊川先生解鄭伯失為君之道無兄弟之義故稱鄭伯而不言弟克勝也言勝見段之強使之強所以致其惡也不書奔義不繫於奔也杜氏注鄭在滎陽宛陵縣西南鄢今潁川鄢陵縣陸氏微旨曰段雖不弟乃是鄭伯養成其惡故特稱鄭伯以譏失教蘇氏曰不稱段之奔而稱鄭伯之克何也段之亂鄭伯成之也凡諸侯之事告則書不然則否雖及滅國滅不告敗勝不告克不書於策公羊榖梁以為諸侯之事盡於春秋也而事為之説則過矣武夷胡氏傳用兵大事也必君臣合謀而後動則當稱國命公子吕為主帥則當稱將出車二百乘則當稱師三者咸無稱焉而專目鄭伯是罪之在鄭伯也猶以為未足又書曰克段于鄢克者力勝之辭不稱弟路人也于鄢操之為己蹙矣夫君親無將段將以弟篡兄以臣伐君必誅之罪也而莊公特不勝其母焉爾曷為縱釋叔段移於莊公舉法若是失輕重哉曰薑氏當武公存之時常欲立段矣及公既沒薑以國君嫡母主乎內段以寵弟多才居乎外國人又恱而歸之恐其終將軋己為後患也故授之大邑而不為之所縱使失道以至於亂然後以叛逆討之則國人不敢從薑氏不敢主而大叔屬籍當絶不可復居父母之邦此鄭伯之志也王政以善養人推其所為使百姓興於仁而不偷也況以惡養天倫使陷於罪因以翦之乎春秋推見至隱首誅其意以正人心示天下為公不可以私亂也垂訓之義大矣秋七月天王使宰咺來歸惠公仲子之賵公羊傳賵者蓋以馬以乘馬束帛何休注此周制也以馬者謂士不備四也禮既夕曰公賵玄纁束帛兩馬是也乘馬者謂大夫以上備四也束帛謂玄三纁二車馬曰賵貨財曰賻衣被曰襚榖梁傳賵者何也乘馬曰賵衣衾曰襚貝玉曰含財錢曰賻伊川先生解王者奉若天道故稱天王其命曰天命其討曰天討盡此道者王道也後世以智力把持天下者霸道也春秋因王命以正王法稱天王以奉天命夫婦人倫之本最當先正春秋之時嫡妾僭亂聖人尤謹其名分男女之配終身不變者也故無再娶之禮大夫而下內無主則家道不立故不得已有再娶之禮天子諸侯內職具備后夫人亡可以攝治無再娶之禮春秋之始尚有疑焉故仲子羽數特異僖公而後無復辨矣春秋因其竊號而書之以志僭亂仲子繫惠公而言故正其名不曰夫人曰惠公仲子謂惠公之仲子妾稱也以夫人禮賵人之妾不天亂倫之甚也然春秋之始天王之義未見故不可去天而名咺以見其不王王臣雖微不名況於宰乎陸氏纂例趙子曰天子而賵妾母是啓僭也高郵孫氏曰惠公仲子一人也仲子者惠公再娶之夫人不曰夫人而繫之惠公者不正其為夫人故從夫以别之也蓋仲子卒於春秋之前天王至是而來賵之耳仲子繫之夫失禮者夫也成風繫之子失禮者子也常山劉氏曰以天王之尊而下賵諸侯之妾壞法亂紀莫斯為甚王朝公卿有爵者例書爵無爵者例書字咺者王之宰書而名之所以著其貶也成風之喪亦妾母也王使榮叔歸含且賵又王使召伯來會葬俱不稱天者以明其無天道也一則名其宰而見貶一則去其天以示譏武夷胡氏傳王朝公卿書官大夫書字上士中士書名下士書人咺位六卿之長而名之何也仲子惠公之妾爾以天王之尊下賵諸侯之妾是加冠於屨人道之大經拂矣天王紀法之宗也六卿紀法之守也議紀法而修諸朝廷之上則與聞其謀頒紀法而行諸邦國之間則専掌其事而承命以賵諸侯之妾是壞法亂紀自王朝始也春秋重嫡妾之分故特貶而書名以見宰之非宰也九月及宋人盟于宿左氏傳始通也公羊傳孰及之內之微者也劉氏權衡曰盟者國之大事豈兩微者所定乎苟有兩微者盟春秋固不書之然則此自公也諱之沒公矣榖梁傳及者何內卑者也宋人外卑者也伊川先生解惠公之季年敗宋師于黃公立而求成焉盟于宿魯志也稱及稱人皆非卿也杜氏注宿小國東平無鹽縣是也凡盟以國地者國主亦與盟陸氏纂例趙子曰不書公諱與大夫盟示恥也劉氏傳孰及之卑者之盟不志及之者公也公則曷為不言公恥與宋人盟也曷為恥與宋人盟大國之卿可以會小國之君小國之卿不可以會次國之君武夷胡氏傳內稱及外稱人皆微者其地以國宿亦與焉微者盟會不志於春秋此其志者有宿國之君也吕氏曰隱公以諸侯之尊而下與他國大夫盟苟徇目前之利無廉恥之節此固聖人所宜貶也冬十有二月祭伯來左氏傳非王命也榖梁傳來者來朝也其弗謂朝何也寰內諸侯非有天子之命不得出會諸侯不正其外交故弗與朝也聘弓鍭矢不出竟埸束修之肉不行竟中有至尊者不二之也伊川先生解祭伯畿內諸侯為王卿士來朝魯不言朝不與其朝也當時諸侯不修朝覲之禮失人臣之義王所當治也祭伯為王臣不能輔王正典刑而反與之交又來朝之故不與其朝以明其罪先儒有王臣無外交之説甚非也若天下有道諸侯順軌豈有內外之限其相交好乃常禮也然委官守而逺相朝無是道也周禮所謂世相朝謂鄰國耳武夷胡氏傳案左氏曰非王命也祭伯畿內諸侯為王卿士來朝於魯而直書曰來不與其朝也人臣義無私交大夫非君命不越境所以然者杜朋黨之原為後世事君而有二心者之明戒也惟此義不行然後有藉外權如繆留之語韓宣惠者交私議論如莊助之結淮南者倚強藩為援以脅制朝廷如唐盧攜之於髙駢崔胤之於宣武昭緯之於邠岐者矣經於內臣朝聘告赴皆貶而不與正其本也豈有誣上行私自植其黨之患哉公子益師卒伊川先生解諸侯之卿必受命於天子當時不復請命故諸侯之卿皆不書官不與其為卿也稱公子以公子故使為卿也惟宋王者後得命官故獨宋卿書官卿者佐君以治國其卒國之大事故書於此見君臣之義矣或日或不日舊史也古之史記事簡略日月或不備春秋因舊史有可損而不能益也劉氏傳公子曰公子公子之子曰公孫公孫之子以王父字為氏公子之尊視大夫髙郵孫氏曰古者遇臣之禮來朝則改容當坐則為起疾病則臨問死喪則哭之哀君之遇之也重則其報之也亦重君之遇之也輕則其報之也亦輕春秋之時君遇臣之禮不止於薄也或専殺之臣事君之道不止於欺也而或弒之聖人痛君臣之交失道也則於內大夫之卒少見其意焉內大夫見於經者四十有七卒者三十不書卒者十有七所以見君之薄厚且記臣道之始終也書卒者或君臨之或賻贈之恩及之則卒也其不書卒者或弒賊或出奔或君不親臨或賻贈不加恩不及則不卒也亦或卒於春秋之後也二年春公會戎于濳左氏傳修惠公之好也戎請盟公辭榖梁傳會者外為主焉爾知者慮義者行仁者守有此三者然後可以出會會戎危公也劉氏權衡曰會者外為主焉爾非也若令內為志者可曰公及戎于濳乎伊川先生解周室既衰逺方殊族有散居中國者方伯大國明大義而攘斥之義也其餘列國慎固封守可也若與之和好以免侵暴非所謂以固吾圉所以啓其亂源也故春秋中外之辨尤謹居其地而親中國與盟會者則與之會戎非義也杜氏注陳留濟陽縣東南有戎城濳魯地泰山孫氏曰諸侯非天子之事不得出會諸侯況會戎哉武夷胡氏傳外裔舉號外之也天無所不覆地無所不載天子與天地參者也春秋天子之事何獨外戎狄乎曰中國之有外裔猶晝之有夜隂之有陽晝短則夜長隂盛則陽衰此自然之理聖人于此加之區别為之分制所以使之各安其所也無不覆載者王道之體內中國外外裔者王道之用是故以諸夏而親外裔致金繒之奉于義不順其策不可施也以外裔而朝諸夏位侯王之上亂常失序其禮不可行也以允姓薑戎陸渾之屬而居內非我族類其心必異萌冦亂之階其禍不可長也為此説者其知內外之旨而明於馭戎之道正朔所不加也奚會同之有書會戎譏之也夏五月莒人入向左氏傳莒子娶于向向薑不安莒而歸夏莒人入向以薑氏還公羊傳入者何得而不居也榖梁傳入者內弗受也劉氏權衡榖梁曰入者內弗受也此義踈矣凡將兵攻人之國而能勝之入焉者斯謂之入矣非必以內弗受解也有入人之國而可受之者乎然則榖梁今所言者歸入之例也妄并之矣伊川先生解莒子娶于向向薑不安莒而歸莒人入向以薑氏還天下有道禮樂征伐自天子出春秋之時諸侯擅相侵伐興兵以侵伐人其罪著矣春秋直書其事而責常在被侵伐者蓋彼加兵於己則當引咎或自辨諭之以禮義不得免焉則固其封疆告於天子方伯若忿而與之戰則以與戰者為主處已絶亂之道也書莒人微者也凡將尊師衆曰某帥師將尊師少曰某伐某將卑師衆曰某師將卑師少曰某人不知衆寡將帥名氏亦曰某人書入入其國也侵人之境且為暴況入人之國乎杜氏注向小國也譙國龍亢縣東南有向城莒國今城陽莒縣是也劉氏傳入者何入其國也泰山孫氏曰莒小國以兵入向者隱桓之際征伐用師國無大小皆專而行之襄陵許氏曰春秋外卿帥師稱人外書卿帥師自晉襄之季始也故中世以後卿而人之者貶矣無駭公作賅帥師入極左氏傳司空無駭入極伊川先生解古者卿皆受命于天子春秋之時諸侯自命已賜族者則書族不書族者未賜也賜族者皆命之世為卿也杜氏注無駭魯卿極附庸小國無駭不書氏未賜族劉氏權衡公子稱公子公子之子稱公孫公孫之子以王父字為氏乃常禮也若此無駭者繼公孫者也則其賜氐久矣豈及其死而未賜氏乎如其公孫也則公孫乃其氏矣又何賜乎若以謂公子公孫亦必賜然後稱也是不逹於禮矣夫禮所以賜氏者非以為榮也乃以為公孫之子其族無稱也其族無稱故請之於君君賜之氏而後稱之也則族者固公子公孫之類也公子公孫不待賜而稱之也以親屬為氏也公孫之子必待賜而立氏者公孫不敢以親屬為氏也孔氏正義賈逵云極戎邑也劉氏傳曰無駭者何吾大夫也何以不氏再命也諸侯大國三卿皆命於天子次國三卿二卿命於天子小國三卿一卿命於天子大國之卿三命次國再命小國一命禮也蘇氏曰無駭之不氏未賜族也或曰未王命也古者天子賜姓諸侯賜族楚未嘗通於周而其大夫曰屈完故氏非王命襄陵許氏曰凡大夫未爵命於天子不氏春秋之初尚謹此也無駭翬挾柔溺及宛之見隱桓莊篇是也自齊桓以後列國皆命大夫非外裔無不族稱者矣蓋不復請命於周也秋八月庚辰公及戎盟于唐桓二年亦公及戎盟于唐左氏傳戎請盟秋盟于唐復修戎好也伊川先生解魯列侯而與戎盟非義也杜氏注髙平方與縣北有武唐亭八月無庚辰庚辰七月九日也日月必有誤陸氏纂例啖子曰凡外裔皆不分其爵號而君臣同辭泰山孫氏曰邾儀父附庸也公與附庸盟猶曰不可與戎盟于唐甚矣九月紀裂繻來逆女裂繻公榖並作履緰左氏傳卿為君逆也公羊傳女曷為或稱女或稱婦或稱夫人女在其國稱女在塗稱婦入國稱夫人伊川先生解非命卿皆書名以君命來逆夫人也在魯故稱女內女嫁為諸侯夫人則書逆書歸明重事也來逆非卿則書歸而已見其禮之薄也先儒皆謂諸侯當親迎親迎者迎於其所館有親御授綏之禮豈有委宗廟社稷而逺適他國以逆婦者乎非惟諸侯即卿大夫而下莫不然也詩稱文王親迎于渭未嘗出疆也杜氏注裂繻紀大夫紀國在東莞劇縣何休注春秋正夫婦之始也常山劉氏曰文王之迎太姒惟曰于渭不云于莘且文王當是時未知其已為諸侯否也至詩云韓侯迎止于蹶之里則蹶父為王卿士若韓侯因朝覲至周而迎不亦宜乎吕氏曰婚姻之禮男女之别見矣王政以此為本故春秋內女之歸其禮不備者必謹書之所以使天下後世知婚姻之禮為重古聖人之意也否則淫慝邪僻生焉裂繻不氏未命也而使來逆女其非禮可知冬十月伯姬歸于紀公羊傳婦人謂嫁曰歸榖梁傳同伊川先生解送之者雖公子公孫非卿則不書劉氏傳內女嫁於諸侯則尊同尊同則志紀子帛公榖作伯莒子盟于密左氏傳魯故也公羊傳紀子伯者何無聞焉爾何休注春秋口授相傳至漢公羊氏及弟子胡母生等乃始記於竹帛故有所失也伊川先生解闕文也泰山孫氏同當云紀侯某伯莒子盟于密左氏附會作帛杜預以為裂繻之字春秋無大夫在諸侯上者公羊榖梁皆作伯杜氏注子帛裂繻字也莒魯有怨紀侯既昏於魯使大夫盟莒以和解之密莒邑城陽淳于縣東北有密鄉十有二月乙卯夫人子氏薨榖梁傳夫人薨不地夫人無出境之事薨冇常處夫人者隱之妻也卒而不書葬夫人之義從君者也伊川先生解隱公夫人也薨上墜之聲諸侯國內稱之小君同婦人從夫者也公在故不書葬於此見夫婦之義矣劉氏傳何以不書葬不以夫人葬也何為不以夫人葬公欲不終為君亦不以子氏為夫人也泰山孫氏曰不言葬者五月而葬也鄭人伐衛左氏傳元年鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廩延鄭人以王師虢師伐衛南鄙二年鄭人伐衛討公孫滑之亂也伊川先生解聲其罪曰伐衛服故不戰衛服可免矣鄭之擅興戎王法所不容也陸氏纂例曰成公已前侵伐稱人者多不必盡是君命之卿蓋逺事難詳從舊史書人耳又凡師稱罪致討曰伐無名行師曰侵武夷胡氏傳征伐天子之大權今鄭無王命雖有言可執亦王法所禁況於修怨乎三年春王二月己巳日有食之公羊傳日食則曷為或日或不日或言朔或不言朔曰某月某日朔日有食之者食正朔也其或日或不日或失之前或失之後失之前者朔在前也失之後者朔在後也泰山孫氏曰凡日食言日言朔食正朔也言日不言朔失其朔也言朔不言日失其日也不言日不言朔日朔俱失也皆厯象錯亂太史廢職或失之前或失之後故春秋詳而録之以正其罪也榖梁傳其不言食之者何也知其不可知知也伊川先生解月王月也事在二月則書王二月在三月則書王三月無事則書時書首月蓋有事則道在事無事則存天時王朔天時備則歲功成王朔存則人理立春秋之大義也日有食之有食之者矣更不推求者何也太陽君也而被侵食君道所忌然有常度災而非異也星辰陵歷亦然杜氏注日行遲一歲一周天月行速一月一周天一歲凡十二交會然日月動物雖行度有大量不能不小有盈縮故有雖交會而不食者或有頻交而食者以長厯推經傳明此是食二月朔也劉氏傳曷為或日或不日或言朔或不言朔史之記失也非史之記失則日有食之不得其正武夷胡氏傳凡經所書者或妾婦乘其夫或臣子背君父或政權在臣下或外裔侵中國皆陽微陰盛之證也三月庚戌天王崩左氏傳三月壬戌平王崩赴以庚戌故書之劉氏權衡曰左氏曰壬戌平王崩赴以庚戌故書之杜云欲諸侯速至故逺日以赴春秋不書實崩日書逺日者即傳其偽以懲臣子之過也非也王實以壬戌崩而赴以庚戌崩則天下皆謂真以庚戌崩也此史自當書庚戌聖人雖欲遷正亦不可得豈故傳其偽者乎且非春秋又何以見平王非庚戌崩乎榖梁傳髙曰崩厚曰崩尊曰崩天子之崩以尊也伊川先生解崩上墜之形四海之內皆當奔赴魯君不往惡極罪大不可勝誅不書而自見也杜氏注不書葬魯不會髙郵孫氏曰春秋之王一十有三崩葬皆書者五周告之崩魯會之葬也崩而不葬者四周告之而魯不會也崩葬不見者三周不告魯不會也其一則崩在春秋之後也春秋之書葬者皆我葬之也武夷胡氏傳平王崩周人來訃而隱公不往是無君也或曰萬國至衆也封疆至重也天王之喪不得越境以奔而修服於國卿供弔送之禮訖葬卒哭而除喪禮乎案周書康王之誥太保率西方諸侯入應門左畢公率東方諸侯入應門右再拜趨出王反喪服此奔成王之喪者安得以為修服於國而可乎諸侯嵗時或朝覲於京師或會同於方嶽或從兵革征討之事越境踰時不以為難何獨難於奔喪而薄君臣始終存沒之義哉大非先王之禮失春秋之義矣夏四月辛卯君公榖並作尹氏卒左氏傳君氏卒聲子也劉氏權衡曰妾母不得稱夫人自常禮也假令實為聲子雖不稱夫人猶應比定十五年姒氏卒及葬定姒之例書之何忽稱君氏又不葬乎又曰不書姓為公故曰君氏春秋以昭公娶吳故諱其姓謂之孟子則諱姓者避同姓也今聲子非魯同姓諱姓無義也公羊傳尹氏者何天子之大夫也其稱尹氏何貶曷為貶譏世卿世卿非禮也外大夫不卒此何以卒天王崩諸侯之主也伊川先生解尹氏王之世卿古者使以德爵以功世祿而不世官是以俊傑在位庶績咸熙及周之衰士皆世官政由是敗尹氏世為王官故於其卒書曰尹氏見其世繼也陸氏纂例臣無外交之禮今死而赴故書以譏武夷胡氏傳功臣之世世其祿世卿之官嗣其位祿以報功也故其世可延位以尊賢也故其官當擇官不擇人世授之柄黨與既衆威福下移大姦根據而莫除人主孤立而無助國不亡幸爾春秋於周書尹氏武氏仍叔之子於魯書季友仲遂皆志其非禮也秋武氏子來求賻左氏傳王未葬也公羊傳武氏子者何天子之大夫也其稱武氏子者何譏何譏爾父卒子未命也何以不稱使當喪未君也劉氏傳嗣子定位於初喪則其曰未君何百官總已以聽於冢宰三年榖梁傳歸死者曰賵歸生者曰賻曰歸之者正也求之者非正也周雖不求魯不可以不歸魯雖不歸周不可以求之求之為言得不得未可知之辭也交譏之伊川先生解武氏王之卿士稱武氏見世官天王崩諸侯不供其喪故武氏遣其子徴求於四國書之以見天子失道諸侯不臣之甚也武夷胡氏傳武氏天子之大夫何以不稱使當喪未君非王命也嗣子定位於初喪其曰未君何也古者君薨諒隂百官總已以聽於冢宰三年夫百官總已以聽則是攝行軍國之事也以非王命而不稱使春秋之旨微矣於以謹天下之通喪而嚴君臣之名分也八月庚辰宋公和卒伊川先生解吉凶慶弔講信修睦鄰國之常禮人情所當然諸侯之卒與國之大故來告則書杜氏注稱卒者略外以别內也陸氏纂例趙子曰春秋記諸侯卒著易代也不曰薨異外內也名之降於天子也髙郵孫氏曰左氏記楚公子圍已弒君而使赴於鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長是當君卒而赴諸侯則已言嗣君之名矣故凡往來之國皆得記其名也然則不待於同盟朝會聘告而嗣君之名已見於常所往來之諸侯矣故春秋記外諸侯之卒百三十有三無名者十或即位之初不以名赴或史失之未可知也必若以盟會求之則未常與者五十有二而不名者九耳此未可通也武夷胡氏傳外諸侯卒國史承告而後書聖人皆存而弗削曷為弗削春秋天子之事也古者諸侯之邦交間問殷聘而世相朝蓋王事相從則有和好之情及告終易代則有弔恤之禮是諸侯所以睦鄰國也周制王哭諸侯則大宗伯為上相司服為王制緦麻宰夫掌邦之弔事戒令與其幣器財用是王者所以懷諸侯也凡諸侯卒皆存弗削而交鄰國待諸侯之義見矣冬十有二月齊侯鄭伯盟于石門左氏傳尋盧之盟也杜氏注盧盟在春秋之前伊川先生解天下無王諸侯不守信義數相盟誓所以長亂也故外諸侯盟來告者則書之杜氏注石門齊地或曰濟北盧縣故城西南濟水之門劉氏傳何以書盟會之事告則書盟會之事曷為告則書常事不書非常則書盟會於諸侯常也於王者非常也癸未葬宋穆公榖並作繆公左氏傳天子七月而葬同軌畢至言同軌以别四夷之國諸侯五月同盟至同在方嶽之盟大夫三月同位至古者行役不踰時士踰月外姻至伊川先生解諸侯告喪魯往會葬則書啖趙同春秋之時皆不請而私諡稱私諡所以罪其臣子陸氏纂例啖子曰吳楚之君不書葬者不可言葬某王也五等諸侯本國臣子皆稱之曰公葬既不請王命而私諡為公正禮諸侯皆合請王諡從而書之以見非禮武夷胡氏傳卒而或葬或不葬者何有怠於禮而不葬者有弱其君而不葬者有討其賊而不葬者有諱其辱而不葬者有治其罪而不葬者有避其號而不葬者宋殤齊昭告亂書弒矣而經不書葬是討其賊而不葬者也晉主夏盟在景公時告喪書日矣而經不書葬是諱其辱而不葬者也魯宋盟會未嘗不同而三世不葬是治其罪而不葬者也吳楚之君書卒者十亦有親送於西門之外者矣而經不書葬是避其號而不葬者也怠於禮而不往弱其君而不會無其事闕其文魯史之舊也討其賊而不葬諱其辱而不葬治其罪而不葬避其號而不葬聖人所削春秋之法也春秋集解卷一
