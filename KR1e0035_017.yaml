body:
  text: 春秋集解卷十七宋吕本中撰成公名黒肱宣公子定王十七年即位諡法安民立政曰成元年春王正月公即位二月辛酉葬我君宣公無冰泰山孫氏曰周之二月夏之十二月無冰冬温也武夷胡氏傳寒極而無冰者常燠也案洪範傳曰豫常燠若此政事舒緩紀綱縱弛之象成公幼弱政在三家公室不張其象已見故當涸隂冱寒而常燠應之古者日在北陸而藏冰獻羔而啓朝之禄位賔食喪祭冰皆與焉此亦燮調愆伏之一事也今既寒而燠遂廢凌人之職然策書所載皆經邦大訓人有微而不登其姓名事有小而不記其本末雨雹冰雪何以悉書天人一理也萬物一氣也觀於隂陽寒暑之變以察其消息盈虛此制治於未亂慎於微之意也每慎於微然後王事備矣三月作丘甲左氏傳為齊難故作丘甲劉氏意林曰魯不務廣德而務廣力不務益義而務益兵以王者之制論之則作丘甲之罪大矣王者之制諸侯不得擅賦其民擅稅其民稅為足食也賦為足兵也足食足兵民信之矣然而不得擅者先王之稅既足以食矣先王之賦既足以用矣今不循先王而以意為準必亂之道也是以聖人禁之髙郵孫氏曰公穀之意則以為甲非人人所能為而使丘作之人人而為甲也夫甲者惟工人能為之耳就令成公暴刻亦不能使丘人皆為之丘人皆為之則是盡魯人皆作甲也何其不近人情之甚乎如杜預之説則以為甸出甲士三人而使丘出之也夫一甸之地兼有四丘而使丘出甸賦丘豈能供之哉亦不能頓取於民如此之暴也蓋古者九夫為井四井為邑四邑為丘四丘為甸一甸之地兼有四丘而出長轂一乗戎馬四匹牛十二頭甲士三人歩卒七十二人成公始作丘甲則是丘出一甲而甸出甲士四人也往者三人而今增其一丘出一人焉故曰作丘甲也武夷胡氏傳作丘甲益兵也古者九夫為井四井為邑四邑為丘四丘為甸甸地方八里旁加一里為成所取於民者出長轂一乗此司馬法一成之賦也爲齊難作丘甲益兵備敵重困農民非為國之道其曰作者不宜作也唐太宗問李靖楚廣與周制如何靖曰周制一乗歩卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人然則一丘所出十有八人積四丘而具一乗耳今作丘甲者即丘出一甲是一甸之中共百人為兵矣則未知其所作者三甸而增一乗乎每乗而增一甲乎魯至昭公時嘗蒐于紅革車千乗則計甸而增乗未可知也楚人二廣之法一乗至用百有五十人則魯每乗而增一甲亦未可知也賦雖不同其實皆為益兵其數皆増三之一耳先儒或言甲非人人之所能為又以為丘出甸賦加四倍者誤矣吕氏曰哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也對曰百姓足君孰與不足百姓不足君孰與足君子為政民力屈財用竭則亦反其夲而已矣宣公十五年初稅畝成公元年作丘甲當是之時事其君者皆不知反本之為務而以取救目前為急下至戰國皆用之而以反本之説爲迂闊不切之論也如世之治病者不務實其夲而唯病之攻病雖暫已而元氣脱矣戰國以後井吞戰爭日不暇給其以反本之説為迂闊不切之論固宜然而其國家亦従而顛覆此療病而不先實元氣之罪也有若之對哀公固世之急務而初稅畝作丘甲聖人所甚戒也所謂丘甲者賦丘為甲也取於民已重非常制也夏臧孫許及晉侯盟于赤棘左氏傳聞齊將出楚師夏盟于赤棘武夷胡氏傳初宣公謀以晉人去三桓歸父為是見逐而奔齊矣今季孫當國恨齊人之立宣公納歸父又懼晉侯之或見討也故往結此盟赤棘晉地也其稱及魯所欲也盟非春秋所貴而惡屢盟者非惟長亂亦國用民力所難給也成公即位之初方經大故未有施舎已責逮鰥寡救乏困之事也為齊難既作丘甲矣聞將出楚師又逺與晉尋盟豈固夲保邦之道乎書及晉侯盟于赤棘非特備齊懼晉蓋三桓懐忿懟君父之心將有事於齊而汲汲欲之者罪可見矣秋王師敗績于茅公穀作貿戎左氏傳春晉侯使瑕嘉平戎於王單襄公如晉拜成劉康公儌戎將遂伐之叔服曰背盟而欺大國此必敗不聽遂伐茅戎三月癸未敗績于徐吾氏秋王人来告敗穀梁傳不言戰莫之敢敵也武夷胡氏傳程氏曰王師於諸侯不言敗諸侯不可敵王也於外域不言戰外域不能抗王也不可敵不能抗者理也其敵其抗王道之失也桓王伐鄭兵敗身傷而經不書敗存君臣之義立天下之防也劉康公儌戎伐之敗績於徐吾氏而經不書戰辨華夷之分立中國之防也是皆聖人筆削非魯史之舊文也然筆於經者雖以尊君父外外域為義而君父所以尊外域所以服則有道矣桓王不以討賊興師而急於伐鄭康公不以惇信持國而輕於儌戎是失其所以君天下禦四夷之道也書敗績于茅戎者言自敗也其自反亦至矣冬十月二年春齊侯伐我北鄙左氏傳齊侯伐我北鄙圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊諸城上齊侯親鼓士陵城三日取龍遂南侵及曹丘武夷胡氏傳初魯事齊謹甚雖易世而聘㑹不絶也及與晉侯盟于斷道而後怨隙成再盟于赤棘而後伐吾北鄙齊侯之興是役非義矣魯人為鞌之戰豈義乎同曰憤兵務相報復而彼此皆無善者則亦不待貶而罪自見矣夏四月丙戌衛孫良夫帥師及齊師戰于新築衞師敗績左氏傳衛侯使孫良夫石稷寗相向禽將侵齊與齊師遇石成子曰師敗矣子不少須衆懼盡乃止杜氏注新築衞地武夷胡氏傳齊師侵虐而以衞主此戰何也衛侯初與晉同盟于斷道矣又使世子臧與晉同伐齊矣又使孫良夫石稷將侵齊矣及與齊師遇石稷欲還良夫不可曰以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也遂戰于新築故齊師雖侵虐而此戰以衛主之也春秋善解紛貴逺怨而惡以兵刄相接故書法如此六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首公榖作手及齊侯戰于鞌齊師敗績左氏傳孫桓子還於新築不入遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子晉侯許之七百乗郤子曰此城濮之賦也有先君之眀與先大夫之肅故㨗克於先大夫無能為役請八百乗許之郤克將中軍士燮佐上軍欒書將下軍以救魯衛臧宣叔逆晉師且道之季文子帥師㑹之師從齊師于莘六月壬申師至於靡笄之下癸酉師陳于鞌郤克傷於矢流血及屨未絶皷音曰余病矣張侯曰師之耳目在吾旗皷若之何其以病敗君之大事也左并轡右援枹而鼓馬逸不能止師從之齊師敗績逐之三周華不注韓厥從齊侯逢丑父與公易位將及華泉驂一本無驂字絓扵木而止韓厥執縶馬前再拜稽首奉觴加璧以進丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免遂自徐關入晉師從齊師入自丘輿擊馬陘齊侯使賔媚人賂以紀甗玉磬與地杜氏注媚人國佐也不可則聽客之所為賔媚人致賂晉人不可曰必以蕭同叔子為質而使齊之封内盡東其畝對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何且是以不孝令也先王疆理天下物土之宜而布其利故詩曰我疆我理南東其畝今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利無顧土宜其無乃非先王之命也乎不然寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者畏君之震師徒撓敗吾子惠儌齊國之福不冺其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請収合餘燼背城借一敝邑之幸亦云從也況其不幸敢不唯命是聽魯衛諫曰齊疾我矣唯子則又何求子得其國寳我亦得地而紓於難其榮多矣晉人許之杜氏注鞌齊地劉氏傳師言元帥者也其曰季孫行父臧孫許叔孫僑如公孫嬰齊何譏何譏爾古者大國三卿次國二卿小國一卿元侯之卿有軍作師以承天子諸侯之卿無軍敎衞以聽元侯魯一軍多矣二軍非禮也三軍僣也四軍悖也亡制甚矣武夷胡氏傳大國三軍次國二軍魯雖大國而四卿並將是四軍也當此時舊制猶存尺地皆公室之土也一民皆公室之兵也上卿行父與僑如嬰齊各帥一軍㑹戰而臧孫許如晉乞師又逆晉師為之道本不將兵特往来晉魯兩軍之間預謀議耳成公初立主幼國危為季孫一怒掃境内興師而四卿並出肆其憤慾雖無人乎成公之側有不恤也然後政自季氏出矣將稱元帥略其副屬辭之體也而四卿皆書者豈特為詳内録哉堅冰之戒亦眀矣經之大例受伐者為主而此以四國及之者以一笑之微殘民毒衆幾獲其君而怒猶未怠焚雍門之茨侵車東至海故以四國主之為憤兵之大戒見諸行事深切著眀矣吕氏曰魯帥師者四人言權均力敵主軍事者不一也且言軍衆過制也秋七月齊侯使國佐如師已酉及國佐盟于袁穀作爰婁左氏傳秋七月晉師及齊國佐盟于爰婁使齊人歸我汶陽之田公羊傳齊侯使國佐如師郤克曰與我紀侯之甗反魯衞之侵地使耕者東畆且以蕭同姪子為質則吾舎子矣國佐曰與我紀侯之甗請諾反魯衞之侵地請諾使耕者東畝是則土齊也蕭同姪子者齊君之母也揖而去之郤克眣魯衞之使使以其辭而為之請然後許之逮扵袁婁而與之盟榖梁傳鞌去國五百里爰婁去國五十里武夷胡氏傳齊國佐如師與楚屈完来一也然陘之役則曰来盟于師盟于召陵鞌之戰則曰及國佐盟于袁婁何也荆楚暴横憑陵諸夏齊桓公仗義聲罪致討威行江漢之上不待加兵而楚人帖服其書来盟于師者楚人自服而求盟也盟于召陵者桓公退舎禮與之盟也在春秋時斯為善矣若夫爰婁則異於是齊雖侵虐未若荆楚之暴也諸國大夫含憤積怒欲雪一笑之恥至於殺人盈野非有擊強扶弱之心國佐如師將以賂免非服之也晉大夫又不以德命使齊人盡東其畝而以蕭同叔子為質夫蕭同叔子齊君之母也則亦悖矣由是國子不可請合餘燼背城借一揖而去之郤克使魯衛之使以其詞為之請逮乎袁婁而與之盟則汲汲欲盟者晉也故反以晉人及之若此類見曲直之繩墨矣是故制敵莫如仗義天下莫大於理而強有力不與焉亦可謂深切著眀矣八月壬午宋公鮑卒左氏傳八月宋文公卒庚寅衛侯速公作遫卒左氏傳九月衛穆公卒取汶陽田公羊傳汶陽田者何鞌之賂也武夷胡氏傳汶陽之田本魯田也取者得非其有之稱不曰復而謂之取何也恃大國兵力一戰勝齊得其故壤而不請於天王以正疆理則取之不以其道與得非其有奚異乎然則宜奈何攷於建邦土地之圗若在封域之中則先王所錫先祖所受經界世守不可亂矣不然侵小得之春秋固有興滅國繼絶世之義必有處也魯在戰國時地方五百里而孟子語慎子曰如有王者作在所損乎在所益乎經於復其故田而書取所損益亦可知矣冬楚師鄭師侵衛十有一月公㑹楚公子嬰齊于蜀丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾公作邾婁人薛人鄫穀作繒人盟于蜀左氏傳宣公使求好于楚莊王卒宣公薨不克作好公即位受盟於晉㑹晉伐齊衛人不行使於楚而亦受盟於晉從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱羣臣不如先大夫師衆而後可乃悉師王卒盡行冬楚師侵衛遂侵我師于蜀楚侵及陽橋孟孫請往賂之以執斵執鍼織紝皆百人公衡為質以請盟楚人許平十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寧衛孫良夫鄭公子去疾及齊國之大夫盟于蜀卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟楚師及宋公衡逃歸是行也晉辟楚畏其衆也伊川先生解楚為强盛陵轢中國諸侯苟能保固疆圉要結鄰好豈有不能自存之理乃懼而服從與之盟約故皆稱人以見其衰弱責諸侯則魯可知矣蘇氏曰楚自城濮之敗不競於晉莊王雖入陳圍鄭及宋而未嘗合諸侯及蜀之盟諸侯從之者十有一國晉不敢爭然其盟十一國也諸侯實畏晉而竊與之盟其後四十二年晉趙武楚屈建合諸侯於宋然後晉楚之從得交相見又八年楚靈王求諸侯於晉晉人許之然後諸侯公得與楚盟耳武夷胡氏傳案左氏魯衞受盟於晉從於伐齊故楚為陽橋之役令尹子重曰師衆而後可於是王卒盡行二國稱師著其衆也侵衞則書伐我師于蜀致賂納質沒而不書非諱也書其重者則莫重乎其以中國諸侯降班失列下與荆蠻之大夫㑹也季孫行父為國上卿當使其君尊榮其民免於侵陵之患而危辱至此特起於忿忮肆其褊心而不知制之以禮也書曰必有忍其乃有濟懲忿窒慾德之修也不忮不求行之善也躬自厚而薄責於人逺怨之方也季孫忿忮弗能懲也而辱逮君父不亦憯乎故春秋史外傳心之要典也攷其行事深切著眀於以反求諸已則亦知戒矣已盟而魯與必先書公尊内也次書主盟者衆所推也此書公及楚人則知主盟者楚也公子嬰齊秦右大夫説宋華元陳公孫寧衛孫良夫鄭去疾皆國卿也何以稱人楚僣稱王春秋黜之比諸夷狄晉雖不競猶主夏盟苟能任仁賢修政事保固疆圉要結鄰好同心擇義堅事晉室荆楚雖大何畏焉今乃西鄉服從而與之盟不亦恥乎古者用夏服夷未聞服於夷也乃是之從亦為不善擇矣經於魯公盟㑹不信則諱公而不書不臣則諱公而不書棄中國従外域則諱公而不書蜀之盟棄晉從楚書公不諱何也事同而既貶則従同同正始之義也従荆楚而與盟既諱公於僖十九年齊之盟矣是以於此不諱而人諸國之大夫以見義也三年春王正月公㑹晉侯宋公衛侯曹伯伐鄭左氏傳諸侯伐鄭次於伯牛討邲之役也遂東侵鄭鄭公子偃帥師禦之使東鄙覆諸鄤敗諸丘輿皇戌如楚獻㨗杜氏注宋衛未葬而稱爵以接鄰國非禮也武夷胡氏傳案左氏諸侯伐鄭討邲之役也遂東侵鄭公子偃帥師禦之覆諸鄤敗諸丘輿夫討邲之役則復怨勦民非觀釁也遂東侵則潛師掠境非以律也覆而敗諸則專用詐謀非正勝也度此叅彼皆無善也略而不紀勝負微也晉侯稱爵而以伐書何也初為是役必以鄭之従楚也附蠻夷擾中國則盟主有詞扵伐耳宋衛未葬曷為稱爵背殯越境以吉禮従金革之事也辛亥葬衛穆公作繆公二月公至自伐鄭甲子新宫災三日哭公羊傳新宫者何宣公之宮也宣宫則曷為謂之新宫不忍言也其言三日哭何廟災三日哭禮也新宫災何以書記災也榖梁傳新宫者禰宫也三日哭哀也其哀禮也迫近不敢稱諡恭也常山劉氏曰春秋宗廟之事得禮者不書凡書者著其失也廟災而哭於禮合矣此何以書乎曰廟災所以哭者爲神靈之所止而遭變焉斯人情之所宜哀也新宫者宣公之宫也不曰宣宫者神主未遷也何以知其然曰丹桓宫楹刻桓宫桷之類皆舉諡以目之此而曰新宫故知其未遷也宣公終喪當遷於廟宫成而主未入遇災而入哭此何禮哉宣公薨至於二十有八月緩於遷主兹可知矣言哭則不恭之致亦自見矣吕氏曰宣公之薨至是服除未久故謂其廟新宫且從當時之詞也新宫災其亦簡於親甚矣莊二十三年丹桓宫楹二十四年刻桓宫桷何以不言新宫桓公死已久可以言諡宣公死甫除喪未忍遽言諡也故曰新宫乙亥葬宋文公武夷胡氏傳案左氏文公卒始厚葬益車馬重器備君子謂華元樂舉於是乎不臣攷於經未有以驗其厚也數其葬之月則信然矣天子七月諸侯五月大夫三月士踰月以隆殺遅速為禮之節不可亂也文公之卒國家安靖外無危難曷為越禮踰時逮乎七月而後克襄事哉故知華元樂舉之棄君於惡而益其侈無疑矣夫禮之厚薄稱人情而為之者也宋公在殯而離次出境從金革之事哀戚之情忘矣顧欲厚葬其君親此非有所不忍於死者特欲誇耀淫侈無知之人耳世衰道微禮法既壊無以制其侈心至於秦漢之間窮竭民力以事丘隴其禍有不可勝言者春秋據事直書而其失自見此類是也豈不為永戒哉夏公如晉襄陵許氏曰著魯受田之重如此而晉輕奪之有以知晉之無以令天下矣鄭公子去疾帥師伐許襄陵許氏曰前此外志唯霸國有卿帥師至是諸侯書卿帥師霸統微也公至自晉武夷胡氏傳宣公薨至是三年之喪畢矣宜入朝京師見天子受王命然後歸而即政可也嗣守社稷之重而不朝於周以拜汶陽田之故而往朝於晉其行事亦悖矣此春秋所為作也公行多不致其書公至自晉何其至也必有以也秋叔孫僑如帥師圍棘左氏傳秋叔孫僑如圍棘取汶陽之田棘不服故圍之杜氏注棘汶陽田之邑在濟北蛇丘縣武夷胡氏傳案左氏取汶陽之田棘不服故圍之復故地而民不聽至於命上將用大師環其邑而攻之何也魯於是時初税畝作丘甲税役日益重矣棘雖復歸故國所以不願為之民也歟成公不知薄税斂輕力役修德政以来之而肆其兵力雖得之亦必失之矣大雩晉郤克衛孫良夫伐廧公作將榖作牆咎如左氏傳晉郤克衛孫良夫伐廧咎如討赤狄之餘焉廧咎如潰上失民也杜氏注此傳釋經之文而經無廧咎如潰蓋經闕此四字襄陵許氏曰晉滅潞氏書師滅甲氏書人而伐廧咎如書卿者從諸侯之兵也從諸侯之兵以伐夷狄春秋書卿始此冬十有一月晉侯使荀庚来聘衛侯使孫良夫来聘丙午及荀庚盟丁未及孫良夫盟左氏傳晉侯使荀庚来聘且尋盟衛侯使孫良夫来聘且尋盟公問諸臧宣叔曰中行伯之在晉也其位在三孫子之在衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當太國之下卿中當其上大夫下當其下大夫上下如是古之制也衛在晉不得為次國杜氏注春秋時以強弱為大小故衛雖侯爵猶為小國晉為盟主其將先之丙午盟晉丁未盟衛禮也公羊傳此聘也其言聘何聘而言盟者尋舊盟也劉氏意林及荀庚盟及孫良夫盟諸侯有聘無盟聘禮也盟非禮也良夫不務引其君當道志於仁而已而生事專命為非禮不信以干先王之典故不繫於國以見其遂事之辱非人臣之操也泰山孫氏曰此公及荀庚孫良夫盟也不言公者二子伉也二子来聘不能以信相親反要公以盟非伉而何故言聘言盟以惡之呂氏曰先晉後衞視強弱云爾非以其至有先後也當是時諸侯之班序先後例如是鄭伐許伊川先生解鄭附於楚一年而再伐許故夷之武夷胡氏傳稱國以伐外之也晉楚争鄭鄭兩事焉及邲之敗於是乎專意事楚不通中華晉雖加兵終莫之聽也至此一嵗而再伐許甚矣夫所利在晉則從晉人所利在楚則從楚人而不擇於義之可否以為去就其何以自立于中國哉况又馮弱犯寡一嵗之中而再動干戈於鄰國不既甚乎春秋之法知利而不知義者則外之所以懲惡也以為告詞略而從告乃實録耳一字為襃貶義安在也四年春宋公使華元来聘左氏傳通嗣君也三月壬申鄭伯堅卒杞伯来朝左氏傳歸叔姬故也夏四月甲寅臧孫許卒公如晉左氏傳公如晉晉侯見公不敬季文子曰晉侯必不免詩曰敬之敬之天惟顯思命不易哉夫晉侯之命在諸侯矣可不敬乎𦵏鄭襄公秋公至自晉左氏傳秋公至自晉欲求成於楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我諸侯聽焉未可以貳史佚之志有曰非我族類其心必異楚雖大非吾族也其肯字我乎公乃止冬城鄆公作運鄭伯伐許左傳冬十一月鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田伊川先生解稱鄭伯見其不復為喪以吉禮從戎武夷胡氏傳前此鄭襄公伐許既狄之矣今悼公又伐許乃復稱爵何也喪未踰年以吉禮與金革之事則忘親矣稱爵非美詞所以著其惡也五年春王正月杞叔姬来歸榖梁傳婦人之義嫁曰歸反曰来歸陸氏纂例郯伯姬杞叔姬不書嫁而書出或嫁時夫未為君也武夷胡氏傳前書杞伯来朝左氏以為歸叔姬也此書杞叔姬来婦則出也春秋於内女其歸其出録之詳者男女居室人之大倫也男子生而願為之有室女子生而願為之有家父母之心人皆有之而不能為之擇家與室則夫婦之道苦淫僻之罪多矣王法所重人倫之本録之詳為世戒也仲孫蔑如宋左傳孟獻子如宋報華元也夏叔孫僑如㑹晉荀首公作秀于榖左氏傳夏荀首如齊逆女故宣伯餫諸榖杜氏注榖齊地梁山崩左氏傳梁山崩晉侯以傳召伯宗伯宗辟重曰辟傳重人曰待我不如㨗之速也問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川故山崩川竭君為之不舉降服乗縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何伯宗請見之不可遂以告而從之公羊傳梁山者何河上之山也梁山崩何以書記異也何異爾大也何大爾梁山崩壅河三日不流外異不書此何以書為天下記異也杜氏注梁山在馮翊夏陽縣北髙郵孫氏曰春秋災異及扵天下者不以國言以其異不主於一國也武夷胡氏傳梁山韓國也詩曰奕奕梁山韓侯受命而謂之韓奕者言奕然髙大為韓國之鎮也後為晉所滅而大夫韓氏以為邑焉書而不繫國者為天下記異是以不言晉也左氏載絳人之語於禮文備矣而未記其實也夫降服乗縵徹樂取次祝幣史辭六者禮之文也古之遭變異而外為此文者必有恐懼修省之心主扵内若成湯以六事檢身髙宗克正厥事宣王側身修行欲銷去之是也徒舉其文而無實以先之何足以弭災變乎夫國主山川至於崩竭當時諸侯未聞有戒心而修德也故自是而後六十年間弑君十有四亡國三十二其應亦憯矣春秋不眀著其事應而事應具存其可忽諸襄陵許氏曰山崩之嵗定王崩周室日微又二年呉兵始犯中國卒與晉爭盟于黄池王霸道盡秋大水襄陵許氏曰變異之發猶疾病之見於脉不虛設也人君能恐懼修省親近善人退逺邪佞猶可及也不然必及於亂亡無疑也春秋之世多大水皆隂盛邪勝所致也其可不自省哉冬十有一月己酉天王崩左氏傳十一月己酉定王崩十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾公作邾婁子杞伯同盟于蟲牢左氏傳許靈公愬鄭伯於楚六月鄭悼公如楚訟不勝楚人執皇戌及子國故鄭伯歸使公子偃請成於晉秋八月鄭伯及晉趙同盟於垂棘冬同盟于蟲牢鄭服也諸侯謀復㑹宋公使向為人辭以子靈之難杜氏注以新誅子靈為辭伊川先生解天王崩而會盟不廢書同見其皆不臣杜氏注蟲牢鄭地陳留封丘縣北有桐牢泰山孫氏曰天王崩晉合諸侯同盟于蟲牢不顧甚矣六年春王正月公至自㑹二月辛巳立武宫公羊傳武宫者何武公之宫也立者何立者不冝立也立武宫非禮也劉氏意林立武宫魯諸侯也僣天子之禮雖欲尊其祖鬼神不享也而學者習於魯故更大而稱之曰魯公之廟文世室也武公之廟武世室也人之迷固久矣夫其以僣為典也此乃春秋所由作也常山劉氏曰禮王制曰諸侯五廟二昭二穆與太祖之廟而五祭法曰諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼然則諸侯宗廟古有彞制過則毁之不可復立也武宫之毁已久而輒立之非禮眀矣書立者不當立也定元年九月立煬宫同取鄟榖梁傳取鄟鄟國也杜氏注附庸國也武夷胡氏傳鄟微國也書取者滅之也滅而書取為君隱也項亦國也其書滅者以僖公在㑹季孫所為故直書其事而不隱此春秋尊君抑臣以辨上下謹於微之意也人倫之際差之毫釐繆以千里故仲尼特立此義以示後世臣子使以道事君而無朋附權臣之惡於傳有之犯上干主其罪可救乖忤貴臣禍在不測故臣子多不憚人主而畏權臣如漢谷永之徒直攻成帝不以為嫌至於王氏則周旋相比結為朋黨而人主不之覺此世世之公患也歸父家遣縁季氏也朝吳出奔因無極也王章殺身忤王鳳也鄴侯寄館避元載也惟殺生在下而人主失其柄也是以黨與衆多知有權臣而不知有君父矣使春秋之義得行尊君抑臣以辨上下毎謹於微豈有此患乎衛孫良夫帥公作率下同師侵宋左氏傳晉伯宗夏陽説衞孫良夫寗相鄭人伊雒之戎陸渾蠻氏侵宋以其辭㑹也蘇氏曰晉將復㑹諸侯宋人辭以難故使衛與魯更侵之夏六月邾公作邾婁下同子来朝公孫嬰齊如晉左氏傳子叔聲伯如晉命伐宋壬申鄭伯費卒左氏傳六月鄭悼公卒秋仲孫蔑叔孫僑如帥師侵宋左氏傳秋孟獻子叔孫宣伯侵宋晉命也武夷胡氏傳魯遣二卿為主將動大衆焉有事於宋而以侵書者潛師侵掠無名之意蓋陋之也於衛孫良夫亦然上三年嘗㑹宋衛同伐鄭矣次年宋使華元来聘通嗣君矣又次年魯使仲孫蔑報華元矣是年冬鄭伯背楚求成於晉而魯衞與宋又同盟于蟲牢矣今而有事於宋上卿授鉞大衆就行而師出無名可乎故特書侵以罪之也左氏載此師晉命也後二年宋来納幣請伯姬焉則此師為晉而舉非魯志眀矣兵戎有國之重事邦交人道之大倫聽命於人不得已焉將能立乎春秋所以罪之也襄陵許氏曰晉景不務彌縫諸侯之闕去年與宋㑹盟而今年魯衛伐之此必有晉命矣前書宋魯之聘後書宋魯之婚則知侵宋非魯志也禦宼之利務順相保而景反使諸侯搆怨如此則楚必有以量中國矣楚公子嬰齊帥師伐鄭左氏傳楚子重伐鄭鄭從晉故也襄陵許氏曰前此外志請侯有卿帥師者矣至是書楚卿帥師者霸統㡬亡也冬季孫行父如晉左氏傳夏四月晉遷於新田冬季文子如晉賀遷也襄陵許氏曰仲孫蔑叔孫僑如公孫嬰齊季孫行父有如必書相望於春秋者大夫張也晉欒書帥師救公作侵鄭左氏傳晉欒書救鄭與楚師遇於繞角楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡禦諸桑隧趙同趙括欲戰請於武子武子將許之知莊子范文子韓獻子諫曰不可吾来救鄭楚師去我吾遂至於此是遷戮也成師以出而敗楚之二縣何榮之有焉若不能敗為辱已甚不如還也乃遂還或謂欒武子曰子之佐十一人其不欲戰者三人而已欲戰者可謂衆矣武子曰善均從衆夫善衆之主也三卿為主可謂衆矣從之不亦可乎武夷胡氏傳荆楚僣號稱王聖人比諸夷狄而不赦者大一統以存周使民著於君臣之義也鄭能背夷即華是改過遷善出幽谷而遷喬木也嬰齊為是帥師又因其喪而伐之不義甚矣經所以深惡之也書卿帥師伐鄭於文無貶詞何以知其深惡楚也下書欒武子帥師救鄭則知之矣凡書救者未有不善之也而伐者之罪著矣案左氏晉楚遇于桑隧軍帥之欲戰者八人武子遂還則無功也亦何善之有曰此春秋之所以善欒書也兩軍相加兵刃既接折馘執俘計功受賞此非仁人之心王者之事故舞干而苗格者舜也因壘而崇降者文也次于陘而屈完服者齊桓也㑹于蕭魚而鄭不叛者晉悼也武子之能不遷戮而知還也亦庶幾哉襄陵許氏曰楚伐鄭喪而悼公不葬則晉救雖至鄭已苦兵矣志救猶恃救也正書欒書帥師以楚師遇之而遷不無功也存霸統也七年春王正月鼷䑕食郊牛角改卜牛鼷䑕又食其角乃免牛榖梁傳過有司也郊牛日展斛角而知傷展道盡矣其所以備災之道不盡也改卜牛鼷䑕又食其角又有繼之辭也其緩辭也曰亡乎人矣非人之所能也所以免有司之過也乃者亡乎人之辭也免牲者為之緇衣纁裳有司𤣥端奉送至於南郊免牛亦然免牲不曰不郊免牛亦然范氏注今言免牲則不郊顯矣若言免牛亦不郊而經復書不郊者蓋為三望起爾襄陵許氏曰小害大下賊上食而又食三桓子孫相繼之象也宣公有虞三桓之志成始弗戒矣亂象已著國將無以事天也呉伐郯左氏傳春吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤無弔者也夫詩曰不弔昊天亂靡有定其此之謂乎武夷胡氏傳稱國以伐外之也呉本太伯之後以族屬言則周之伯父也何以外之為其僣天子之大號也案國語云命圭有命固曰呉伯不曰呉王然則呉本伯爵也後雖益熾寖與中國㑹盟進而書爵不過曰子亦不以本爵與之故紀於禮書曰四夷雖大皆曰子此春秋之法仲尼之制也而以為不敢擅進退諸侯亂名實者誤矣襄陵許氏曰呉自夀夢得申公巫臣而為楚患夷狄相攻不志也伐郯之役兵連上國於是始見於春秋志入州来著十五年之所以㑹於鍾離也夏五月曹伯來朝左氏傳夏曹宣公来朝不郊猶三望武夷胡氏傳呉郡朱長文曰禮天子有四望諸侯則祭境内山川而已魯當祭泰山泰山魯之境也禮所得祭故不書三望僣天子禮是以書之其説是矣楚子軫言三代命祀祭不越望而曰江漢沮漳楚之望非也楚始受封濵江之國漢水沮漳豈其境内哉此亦據後世并兼封略言之爾襄陵許氏曰用是知魯郊或以五月非特定公也秋楚公子嬰齊帥公作率師伐鄭左氏傳楚子重伐鄭師於汜公㑹晉侯齊侯宋公衛侯曹伯莒子邾公作邾婁子杞伯救鄭左氏傳諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉八月戊辰同盟于馬陵左氏傳尋蟲牢之盟且莒服故也伊川先生解諸侯同心病楚杜氏注馬陵衛地陽平元城縣東南有地名馬陵武夷胡氏傳楚人軍旅數起頻年伐鄭以其背已而從諸夏也與莊之欲討徴舒而入陳亦異矣書大夫之名氏書帥師書伐而無貶詞者所謂不待貶絶而罪自見者也晉合八國之君親往救鄭攘外患安中國之師也欲著其善故特書救鄭以美之言救則楚罪益眀而鄭能背楚即晉善亦著矣前此晉遣上將諸國不與焉此則其君自行而㑹合諸國則楚人暴横憑陵諸夏之勢益張亦可見矣故盟于馬陵而書同盟者同病楚也公至自晉呉入州來左氏傳楚圍宋之役師還子重請取于申吕以為賞田王許之申公巫臣曰不可子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之及共王即位子重子反殺巫臣之族子閻子蕩及清尹弗忌及襄老之子黑要而分其室巫臣自晉遺二子書曰余必使爾罷於奔命以死巫臣請使於呉晉侯許之呉子夀夢説之乃通呉於晉以兩之一卒適呉舎偏兩之一焉與其射御敎呉乗車敎之戰陳教之叛楚寘其子狐庸焉使為行人於呉呉始伐楚伐巢伐徐子重奔命馬陵之㑹呉入州来子重自鄭奔命子重子反於是乎一嵗七奔命蠻夷屬於楚者呉盡取之是以始大通呉於上國杜氏注州来楚邑淮南下蔡縣是也冬大雩衛孫林父出奔晉左氏傳衛定公惡孫林父冬孫林父出奔晉衛侯如晉晉反戚焉八年春晉侯使韓穿来言汶陽之田歸之于齊左氏傳晉侯使韓穿来言汶陽之田歸之于齊季文子餞之私焉曰大國制義以為盟主是以諸侯懐德畏討無有貳心謂汶陽之田敝邑之舊也而用師於齊使歸諸敝邑今有二命曰歸諸齊信以行義義以成命小國所望而懐也信不可知義無所立四方諸侯其誰不解體七年之中一予一奪二三孰甚焉陸氏纂例淳聞於師曰韓穿受命而来不能諫止其惡可知矣泰山孫氏曰汶陽之田齊所侵魯地也故二年用師於齊取之晉侯使韓穿来言歸之於齊非正也魯之土地天子所封非晉侯可得制也晉侯使歸之於齊是魯國之命制在晉也故曰晉侯使韓穿来言汶陽之田歸之于齊惡之武夷胡氏傳汶陽之田本魯田也魯人恃大國之威以兵力脅齊得其故地而不正疆理於天王則取之不以其道也郤克戰勝令於齊曰反魯衛之侵地齊既從之今復有命俾歸諸齊則歸之不以其道也而齊人貪得晉有二命穿也列卿無所諫止皆罪矣来言者緩詞也歸之于者易詞也為國以禮者無憚於强而魯侯微弱遂以歸齊而不能保罪亦見矣晉欒書帥師侵蔡左氏傳晉欒書侵蔡遂侵楚獲申驪襄陵許氏曰侵蔡報伐鄭也大國争衡而小國受敗春秋矜焉公孫嬰齊如莒左氏傳聲伯如莒逆也杜氏注自為迎婦宋公使華元来聘左氏傳宋華元来聘聘共姬也襄陵許氏曰録伯姬始此夏宋公使公孫夀来納幣公羊傳納幣不書此何以書録伯姬也何氏注伯姬守節逮火而死賢故詳録其禮所以殊於衆女杜氏注宋公無主婚者自命之故稱使也武夷胡氏傳納幣不書此何以書公孫夀卿也納幣使卿非禮也禮不可略亦不可過惟其稱而已矣略則輕大倫過則溺私愛宋公之請伯姬魯侯之嫁其女皆致其厚者也而不知越禮踰制豈所以重大婚之禮哉經悉書之為後法也晉殺其大夫趙同趙括左氏傳晉趙嬰通於趙莊姬五年春原屛放諸齊杜氏注原同屛季嬰之兄嬰曰我在故欒氏不作我亡吾二昆其憂哉弗聽八年晉趙莊姬為趙嬰之亡故譖之於晉侯曰原屛將為亂欒郤為徴六月晉討趙同趙括武從姬氏畜於公宫以其田與祁奚韓厥言於晉侯曰成季之勲宣孟之忠而無後為善者其懼矣三代之令王皆數百年保天之禄夫豈無辟王賴前哲以免也乃立武而反其田焉劉氏傳趙同趙括之為人臣也内不正其親外專戮以干其君足以殺其身而已矣武夷胡氏傳同括無罪為莊姬所譖而欒郤害之也故稱國以殺而不去其官以見晉之失政刑矣秋七月天子使召伯来賜公榖作錫公命左氏傳秋召桓公来賜公命劉氏意林古者制三公一命卷若有加則賜也大國之君不過九命次國之君不過七命小國之君不過五命夫有加而賜所謂賜命者也以義觀之錫命者其世世相襲衮不廢矣賜命者服過其爵所以彰有德止於其身不世傳者也成公未有明徳大功簡於王室而服過其爵非也泰山孫氏曰天子天王王者之通稱武夷胡氏傳諸侯嗣立而入見則有賜已修聘禮而来朝則有賜能敵王所愾而獻功則有賜成公即位服喪已畢而不入見既更五服一朝之嵗矣而不如京師又未嘗敵王所愾而有功也何為来賜命乎召伯者縣内諸侯為王卿士者也来賜公命罪邦君之不王譏天子之僣賞也臨諸侯曰天王君天下曰天子盖一人之通稱冬十月癸卯杞叔姬卒左氏傳冬杞叔姬卒来歸自杞故書陸氏纂例凡内女嫁為諸侯夫人而不書卒時魯公非其兄弟及兄弟之子也諸侯無大功已下之服故杞叔姬雖出猶書者為喪歸杞故也成八年杞叔姬卒九年杞伯来逆叔姬之喪以歸也髙郵孫氏曰特書者蓋明年杞伯来逆其喪將有其末者先録其本也晉侯使士燮来聘叔孫僑如㑹晉士燮齊人邾公作邾婁人伐郯左氏傳晉士燮来聘言伐郯也以其事呉故公賂之請緩師文子不可曰君命無貳失信不立禮無加貨事無二成君後諸侯是寡君不得事君也燮將復之季孫懼使宣伯帥師㑹伐郯武夷胡氏傳案左氏士燮来聘言伐郯也以其事呉故公請緩師不可呉初伐郯季孫固曰中國不振旅蠻夷入伐而莫之或恤亡無日矣當其時既不能救及其既成豈獲已也而又率諸國伐之何義乎前書来聘下書㑹伐晉侯之為盟主可見矣魯既知其不可從大國之令而不敢違其不能立亦可知矣襄陵許氏曰呉伐郯晉弗救至郯成而伐之則郯有辭矣聘而召師霸統衰也内討如殺趙同趙括外討如伐郯則何以為政於天下衛人来媵左氏傳衛人来媵共姬禮也凡諸侯嫁女同姓媵之異姓則否劉氏權衡曰衛人来媵左氏曰凡諸侯嫁女同姓媵之異姓則否非也諸侯三歸歸各一族自同姓耳若嬴曹䢵姒媯弋之君嫁女者必同姓媵之則諸侯之媵或不能備矣公羊傳媵不書此何以書録伯姬也何氏注伯姬以賢聞諸侯争欲媵之故善而詳録之伊川先生解媵小事不書伯姬之嫁諸侯皆来媵之故書之以見其賢女子之賢尚聞於諸侯況君子乎或曰魯女之賢豈能聞於逺乎曰古者庶女與非敵者則求為媵固為之擇賢小君則諸侯國之賢女當自聞也杜氏注古者諸侯取適夫人及左右媵各有姪娣皆同姓之國國三人凡九女所以廣繼嗣也蘇氏曰諸侯嫁女同姓媵之異姓則否國三人凡九女今衛晉及齊人来媵以其非禮故書武夷胡氏傳媵者何諸侯有三歸嫡夫人行則姪娣從二國来媵亦以姪娣従凡一娶九女所以廣繼嗣三國来媵非禮也夫以禮制欲則治以欲敗禮則亂而諸侯一娶十有二女則是以欲敗禮矣備書三國以眀逾制為後戒也春秋集解卷十七
