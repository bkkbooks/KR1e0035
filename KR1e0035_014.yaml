body:
  text: 春秋集解卷十四宋吕本中撰文公九年春毛伯來求金左氏傳毛伯衛來求金非禮也不書王命未葬也公羊傳毛伯者何天子之大夫也何以不稱使當喪未君也踰年矣何以謂之未君即位矣而未稱王也未稱王何以知其即位以諸侯之踰年即位亦知天子之踰年即位也以天子三年然後稱王亦知諸侯於其封內三年稱子也踰年稱公矣則曷為於其封內三年稱子緣民臣之心不可一日無君緣終始之義一年不二君不可曠年無君緣孝子之心則三年不忍當也毛伯來求金何以書譏何譏爾王者無求求金非禮也榖梁傳求車猶可求金甚矣伊川先生解家父致命以徴車故書使來求毛伯風魯以欲金故不云王使武夷胡氏傳毛伯天子大夫何以不稱使當喪未君也踰年即位矣何以言未君古者諒隂三年百官總已以聽於冢宰夫百官總己以聽則是冢宰獨專國政之時託於王命以號令天下夫豈不可而不稱使春秋之旨微矣非特謹天下之通喪所以示後世大臣當國秉政不可擅權之法戒也跋扈之臣假仗主威脅制中外凡有所行動以詔書從事蓋未有以春秋此義折之耳襄陵許氏曰王室大喪諸侯莫賻是以有求金焉書之非特王之譏也所以遍刺天下之諸侯夫人薑氏如齊二月叔孫得臣如京師左氏傳莊叔如周葬襄王榖梁傳京大也師衆也言周必以衆與大言之也辛丑葬襄王陸氏纂例曰七月始葬高郵孫氏曰春秋天王書葬者五君往者三臣往者二君往者不書公如京師常事得禮法所當略也臣往者悉書其人以為天王之喪君不自往而使臣焉則是無君父之恩而廢臣子之禮晉人殺其大夫先都并解在下文箕鄭父下三月夫人薑氏至自齊劉氏傳夫人曷為或致或不致或可以致或不可以致曷為或可以致或不可以致出入以禮則可以致出入不以禮則不可以致此其為有禮奈何父母在而歸寧也武夷胡氏傳夫人與君敵體同主宗廟之事出必告行反必告至則書於策然適他國者或曰享或曰會或曰如衆矣未有致之者則其行非禮以不致見其罪也出薑如齊以寧父母於禮得行矣其致者非特以告廟書耳夫人初歸豈其不告為文公越禮故削而不書示誅意之法矣今此書至者又以見小君之重也夫承祭祀以為宗廟主一國之母儀而可以搖動乎出薑至是蓋不安於魯故至而特書以示防微杜漸之意其為世慮深矣晉人殺其大夫士縠及箕鄭父左氏傳八年夷之搜晉侯將登箕鄭父先都而使士縠梁益耳將中軍先克曰狐趙之勳不可廢也從之先克奪蒯得田於堇隂故箕鄭父先都士縠梁益耳蒯得作亂九年春王正月己酉使賊殺先克乙丑晉人殺先都梁益耳三月甲戌晉人殺箕鄭父士縠蒯得武夷胡氏傳殺先都士縠國也其稱人以殺者國亂無政衆人擅殺之稱也何以知其非討賊之詞書殺其大夫則知之矣三大夫皆強家也求專晉不得挾私怨以作亂而使賊殺其中軍佐則固有罪矣曷為不去其官當是時晉靈初立主幼不君政在趙盾而中軍佐者盾之黨也若獄有所歸則此三人者獨無可議從末減乎而皆殺之是大夫專生殺而政不自人主出也故不稱國討不去其官而箕鄭父書及示後世司賞罰者必本忠恕無有黨偏之意其義精矣楚人伐鄭左氏傳范山言於楚子曰晉君少不在諸侯北方可圖也楚子師於狼淵以伐鄭囚公子堅公子尨及樂耳鄭及楚平泰山孫氏曰楚復強也楚自城濮之敗不敢加兵於鄭今伐鄭者晉文既死中國不振故也公子遂會晉人宋人衛人許人救鄭左氏傳公子遂會晉趙盾宋華耦衛孔達許大夫救鄭不及楚師卿不書緩也以懲不恪武夷胡氏傳書救而稱人以罪趙盾之不能折衝消患為夷狄之所窺也夏狄侵齊秋八月曹伯襄卒九月癸酉地震公羊傳地震者何動地也何以書記異也冬楚子使椒榖作荻來聘左氏傳冬楚子越椒來聘公羊傳椒者何楚大夫也楚無大夫此何以書始有大夫也始有大夫則何以不氏許夷狄者不一而足也劉氏傳聘常事也其曰椒何楚進也楚進久矣曷為始乎此自是與中國通也與中國通者何自是以中國之禮為之者也武夷胡氏傳楚僭稱王春秋之始獨以號舉乃外之也中間來聘改而書人漸進之矣至是其君書爵其臣書名而稱使遂與諸侯比者是以中國之禮待之也所謂謹內外之辨內諸夏而外四裔義安在乎曰吳楚聖賢之後見周之弱王靈不及僭擬名號叛乎王即以忘其祖矣聖人重絶之夫春秋立法謹嚴而宅心忠恕嚴於立法故僭號稱王則深加貶黜不齒列侯以正君臣之義恕以宅心故內雖不使與中國同外亦不使與遐荒等思善悔過向慕中國則進之而不拒此愼用刑重絶人之意也噫春秋之所以為春秋非聖人莫能修之者乎秦人來歸僖公成風之襚榖梁傳秦人弗夫人也即外之弗夫人而見正焉陸氏纂例啖子曰僖公成風與惠公仲子何殊傳謂兩人誤也泰山孫氏曰妾母稱夫人自僖公始天子不能正而秦人能之故曰秦人來歸僖公成風之禭此固周室陵遲典禮錯亂秦人之不若也葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉左氏傳春晉人伐秦取少梁夏秦伯伐晉取北徴伊川先生解禮一失則天理滅亡將入于禽獸聖人初恐人之入於禽獸也故春秋之法極謹嚴諸侯而有棄禮者則遂絶之高郵孫氏曰以其易世相讎交攻不已故不稱其人但曰秦者外之也楚殺其大夫冝申左氏傳楚子西謀弒穆王穆王聞之五月殺鬬冝申武夷胡氏傳案左氏冝申與仲歸謀弒穆王而誅則是討弒君之賊也曷為稱國以殺又書其官而不曰楚人殺冝申乎曰穆王者即楚世子商臣也而春秋之義微矣自正月不雨至于秋七月榖梁傳歷時而言不雨文不閔雨也不閔雨者無志乎民也及蘇子盟于女栗杜氏注蘇子周卿士女栗地闕劉氏傳孰及之公也公則曷為不言公不與公盟也曷為不與公盟古者內諸侯不外交外諸侯不內交有至尊在不二之也冬狄侵宋楚子蔡侯次于厥公作屈貉左氏傳陳侯鄭伯會楚子於息冬遂及蔡侯次于厥貉將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聽命高郵孫氏曰厥貉之次遂稱楚子而明年伐麇又以爵書蓋自是與中國等矣楚蠻荒而中國與之等則楚人益強而中國之衰益甚矣武夷胡氏傳楚滅江六平陳與鄭於是乎為伐宋之舉次于厥貉凡伐而次者其次為善次而伐者其次為貶齊師次陘修文告以威敵善之也故上書伐楚以著其美楚次厥貉藏禍心以憑夏貶之也故下書伐麇以著其罪當是時陳鄭宋皆從楚矣獨書蔡侯何哉鄭失三大夫俟救而不及陳獲公子茷而懼宋方有狄難蓋有不得已者非所欲也蔡無四境之虞則是得已不已志在從于楚矣故削三國書蔡侯見其棄諸夏之惡也十有一年春楚子伐麇公作圈左氏傳十年厥貉之會麇子逃歸十一年春楚子伐麇成大心敗麇師于防渚潘崇復伐麇至于錫冗襄陵許氏曰楚侵伐書爵始此中國日替矣夏叔仲彭生會晉郤缺于承匡左氏傳叔仲惠伯會晉郤缺于承匡謀諸侯之從於楚者杜氏注九年陳鄭及楚平十年宋聽楚命杜氏注承匡宋地在陳留襄邑縣西郤缺冀缺秋曹伯來朝左氏傳秋曹文公來朝即位而來見也公子遂如宋左氏傳襄仲聘於宋且言司城蕩意諸而復之因賀楚師之不害也狄侵齊冬十月甲午叔孫得臣敗狄于鹹左氏傳鄋瞞侵齊杜氏注鄋瞞秋國名防風之後漆姓遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔綿房甥為右富父終甥駟乘冬十月甲午敗狄于鹹獲長狄僑如富父終甥樁其喉以戈殺之公羊傳長狄也杜氏注鹹魯地劉氏意林非長狄乎曰非也春秋正名狄也戎也淮夷也白狄也赤狄也山戎也夷蠻也陸渾戎也薑戎也是不一名十有二年春王正月郕公作盛伯來奔左氏傳十一年郕大子朱儒自安於夫鍾國人弗徇十二年春郕伯卒郕人立君大子以夫鍾與郕邽來奔公以諸侯逆之辨疑趙子曰案諸侯嗣位未踰年猶稱子豈有君父病而不視死而不喪身未即位以邑出奔而稱郕伯一何乖繆且鄭忽曹羈莒展皆已即位及其出奔猶但稱名況於郕未嗣位乎且春秋正王綱之節乃云為魯公以諸侯迎之之故即書曰郕伯乃春秋紊王綱也一何厚誣邪劉氏權衡意者先郕伯以去年卒太子今即位而不能自安遂出奔此乃真郕伯矣以其即位日淺或謂之太子而左氏則誤以為太子出奔也公羊傳失地之君也泰山孫氏曰諸侯播越失地皆名此不名者非自失國也案莊八年師及齊師圍郕郕降於齊師自是入齊為附庸此而來奔齊所逼爾故不名常山劉氏曰太子位當世立國人弗立而來奔聖人即書其爵以其當立為君也郕人豈可絶之哉春秋大居正王道若此豈有亂乎把伯來朝左氏傳把桓公來朝始朝公也且請絶叔姬而無絶婚公許之杜氏注復稱伯舍夷禮二月庚子子叔姬卒左氏傳二月叔姬卒不言把絶也陸氏纂例趙子曰時君之女故曰子以别非先君之女也高郵孫氏曰左氏經無子字夏楚人圍巢左氏傳羣舒叛楚夏子孔執舒子平及宗子遂圍巢杜氏注巢吳楚間小國廬江六縣東有居巢城秋滕子來朝左氏傳滕昭公來朝亦始朝公也秦伯使術公作遂來聘左氏傳秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉對曰不腆敝器不足辭也主人三辭賔答曰寡君願僥福於周公魯公以事君不腆先君之敝器使下臣致諸執事以為瑞節要結好命所以藉寡君之命結二國之好是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之辨疑曰案例外大夫來魯未命者皆書名無他義也冬十有二月戊午晉人秦人戰于河曲左氏傳秦為令狐之役故冬秦伯伐晉取羈馬晉人禦之趙盾將中軍荀林父佐之郤缺將上軍臾駢佐之欒盾將下軍胥甲佐之范無恤御戎以從秦師于河曲臾駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士會曰若何而戰對曰趙氏新出其屬曰臾駢實為此謀將以老我師也趙有側室曰穿晉君之壻也有寵而弱不任軍事好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可十二月戊午秦軍掩晉上軍趙穿追之不及反怒以其屬出宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏秦行人夜戒晉師曰兩軍之士皆未憖也明日請相見也臾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師夜遁復侵晉入瑕伊川先生解凡戰皆以主人及客秦曲故不云晉及杜氏注河曲在河東蒲坂縣南陸氏纂例趙子曰凡戰不書及交為主也如秦初伐晉而晉復追之至河曲而戰之類也武夷胡氏傳秦伯親將晉上卿趙盾禦之其稱人何為令狐之役故也秦納不正遂非積忿晉不謝秦濳師禦之是以暴兵連禍至此極也凡戰皆以主人及客者處已之道寡怨之方王者之事其不書晉及何也前年秦師來伐晉不言戰者晉已服矣故狄秦而免晉今又為此役則秦曲甚矣故不以晉為主惟動大衆從秦師不奉詞令以止之也故貶而稱人此輕重之權衡也季孫行父帥師城諸及鄆公作運左氏傳書時也杜氏注鄆莒魯所爭者城陽姑幕縣南有貟亭須即鄆也十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒左氏傳邾文公卜遷於繹史曰利於民而不利於君邾子曰苟利於民孤之利也遂遷於繹五月邾文公卒君子曰知命自正月不雨至于秋七月大公作世室屋壞左氏傳秋七月大室之屋壞書不共也公羊傳世室屋壞世室者何魯公之廟也周公稱大廟魯公稱世室羣公稱宫魯祭周公何以為牲周公用白牡魯公用騂剛羣公不毛魯祭周公何以為盛周公盛魯公燾羣公廩世室屋壞何以書譏何譏爾久不修也榖梁傳大室猶世室也周公曰大廟伯禽曰大室羣公曰宫為社稷之主而先君之廟壞極稱之志不敬也杜氏注大廟之室常山劉氏曰觀春秋之中文公事宗廟最為不謹遂有大室屋壞之變天人之際可不畏哉吕氏曰君子之於宗廟有斯須不敢忘者非以崇孝而厚遠也孝子之於親心固如是也推是心以為政雖不中不遠矣魯之為國至使大室屋壞其能有以及物乎冬公如晉衛侯會公于沓公無公字高郵孫氏曰沓之會公也已去魯而未至於晉也狄侵衛十二月己丑公及晉侯盟公公榖無公字還自晉鄭伯會公于棐公作斐左氏傳冬公如晉朝且尋盟衛侯會公于沓請平於晉公還鄭伯會公于棐亦請平於晉公皆成之公羊傳還者何善辭也何善爾往黨衛侯會公于沓至得與晉侯盟反黨鄭伯會公于棐故善之也何氏注黨所也所猶時齊人語也杜氏注棐鄭地十有四年春王正月公至自晉邾公作邾意下同人伐我南鄙叔仲彭生帥師伐邾左氏傳邾文公之卒也公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾夏五月乙亥齊侯潘卒左氏傳子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施而多聚士盡其家貸於公有司以繼之夏五月昭公卒舍即位六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城左氏傳邾文公元妃齊薑生定公二妃晉姬生捷災文公卒邾人立定公捷災奔晉六月同盟于新城從於楚者服且謀邾也榖梁傳同者有同也同外楚也伊川先生解諸侯始會議合而後盟盟者志同故書同同外楚也杜氏注新城宋地在梁國榖熟縣西武夷胡氏傳同盟于新城同外楚也其曰同者志諸侯同欲非強之也而宋公陳侯鄭伯在焉則知楚次厥貉三國雖從誠有勿獲已者削而不書蓋恕之也蔡不與盟果有棄盟黨惡之實矣夷考晉楚行事未有以大相遠也而春秋豫奪如此者荆楚僭王若與同好陵蔑中華是將代宗周為共主君臣之義滅矣可不謹乎秋七月有星孛入于北斗公羊傳孛者何彗星也其言入于北斗何北斗有中也中者魁中何以書記異也榖梁傳孛之為言猶茀也其曰入北斗斗有環域也高郵孫氏曰星孛之異經書者三而皆曰有也有者不冝有之辭且不知其孛者何星闕所不知也公至自會晉人納捷公作接災于邾弗克納公作邾婁左氏傳晉趙盾以諸侯之師八百乘納捷災于邾邾人辭曰齊出貜且長宣子曰辭順而勿從不祥乃還榖梁傳是郤克也其曰人何也微之也何為微之也長轂五百乘綿地千里過宋鄭滕薛敻入千乘之國欲變人之主至城下然後知何知之晚也弗克納未伐而曰弗克何也弗克其義也捷災晉出也貜且齊出也貜且正也捷災不正也陸氏纂例其自以為君而來爭國者則不論命與不命皆但名而已不言公子公孫言非復人臣也所謂當國者也齊小白莊九年陽生哀六年邾捷災文十四年莒去疾昭元年之類是也陸氏微旨趙子曰弗克納言失之於初而得之於末也愈乎遂也淳聞於師曰據三傳之説晉師皆有名氏則必非微者矣書曰人何也曰廢置諸侯王者之事人臣專之罪莫大焉夫子善其聞義能徙故為之諱也凡事不合常禮而心可嘉者皆以諱為善劉氏傳弗者遷辭也武夷胡氏傳在易同人之九四曰乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也其趙盾之謂矣聖人以改過為大過而不改將文過以遂非則有怙終之刑過而能悔不二過以遠罪則有遷善之美其曰弗克納見私欲不行可以為難矣然則何以稱人大夫而廢置諸侯非也聞義能徙故為之諱內以諱為貶外以諱為善九月甲申公孫敖卒于齊左氏傳穆伯之從已氏也魯人立文伯穆伯生二子於莒而求復三年而盡室以復適莒文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之將來九月卒于齊告喪請葬弗許劉氏傳大夫出奔曷為或卒或不卒或可以卒或可以不卒曷為或可卒或可以不卒大夫去其宗廟爵祿猶列於朝出入猶詔於國兄弟宗族猶存是大夫而已矣卒之可也爵祿無列於朝出入無詔於國兄弟宗族無存是非大夫而已矣卒之不可也劉氏意林敖不循法度自絶於魯而猶卒之春秋不以為非以為君臣之間厚莫重焉故君誠有禮於其臣可以死可以亡君誠有恩於其臣則臣雖死雖亡而不怨也若是而國家之禍亂遠矣齊公子商人弒其君舍左氏傳秋七月乙卯夜齊商人弒舍而讓元元曰爾求之久矣我能事爾爾不可使多蓄憾將免我乎爾為之齊人定懿公使來告難故書以九月榖梁傳舍未踰年其曰君何也成舍之為君所以重商人之弒也陸氏微旨淳聞於師曰春秋之作本懲姦惡也若未踰年之君被弒而不曰君則逆亂之臣皆以未踰年而肆其凶惡也故原其情以立此義晉奚齊本不正又里克不伐其位故異於此也高郵孫氏曰人子之心則未踰年而稱子國人弒君則未踰年而稱君此春秋所以辨君臣之分而防篡弒之禍也宋子哀來奔左氏傳宋高哀為蕭封人以為卿不義宋公而出遂來奔書曰宋子哀來奔貴之也陸氏纂例奔亡之美者莫過於子哀武夷胡氏傳宋昭公無道高哀為蕭封人以為卿不義宋公而出遂來奔書宋子哀貴之也易曰幾者動之微吉之先見者也君子見幾而作不俟終日宋子哀有焉昔微子去紂列於三仁之首子哀不立於危亂之邦而春秋書字謂能貴愛其身以存道也若偷生避禍而去國出奔亦何取之有襄陵許氏曰大夫執雁義先去就如曹羈宋子哀蓋得之矣冬單伯如齊齊人執單伯齊人執子叔姬左氏傳單伯如齊請子叔姬齊人執之又執子叔姬公羊傳執者曷為或稱行人或不稱行人稱行人而執者以其事執也不稱行人而執者以已執也劉氏傳子叔姬者何齊君舍之母也齊君舍之母則齊人何為執之公子商人弒其君而暴其母單伯如齊請以歸曰殺其子焉用其母商人怒為是執之何以不稱行人或曰不稱行人者非其所為使也或曰附庸之君也生不名死不卒故執亦不稱行人也此一事也曷為再言齊人嫌也常山劉氏曰商人弒君之惡已顯而執叔姬之事聖人不獨罪商人也齊人不討賊俱北面事之又致執其君之母齊人均有罪焉武夷胡氏傳齊君舍魯之甥也商人弒舍固忌魯矣魯使單伯如齊齊人意欲辱魯故執單伯并執子叔姬而誣之以罪不稱行人公羊所謂以已執之者也齊人懷商人之私惠忘君父之大倫弒其君而不能討執其母而莫之救則是舉國之人皆有不赦之罪也假有人焉正色而立於朝誰敢致難其君與執其母而不之顧乎故聖人書曰齊人執子叔姬所以窮逆賊之黨與而治之也其討賊之旨嚴矣故曰春秋成而亂臣賊子懼十有五年春季孫行父如晉左氏傳季文子如晉為單伯與子叔姬故也襄陵許氏曰使魯能修其政則齊亂可以義討今反遇辱而因晉以請為齊弱焉傳曰國家間暇及是時明其政刑雖大國必畏之矣前此魯亦暇矣而豫怠僭差政刑不敕卒困於齊斯豈非自取侮哉三月宋司馬華孫來盟左氏傳宋華耦來盟其官皆從之杜氏注古之盟會必備威儀崇贄幣賔主以成禮為敬故傳曰卿行旅從春秋時率多不能備義華孫能率其屬以從古典所以敬事而自重公與之宴辭曰君之先臣督得罪於宋殤公請承命於亞旅陸氏纂例趙子曰來盟彼欲之也啖子曰凡外臣來不言君使者皆有義高郵孫氏曰華孫其君暗亂國事廢弛而賢臣外奔華孫懼鄰國之諸侯因其間隙而侵伐之於是來盟以紓其國之難春秋之大夫見於經者多矣其以官舉者惟三人焉又皆在宋昭公之時也豈非禍亂之際則節義之士有以顯名於後歟吕氏曰不言使自請之也稱司馬能其官也夏曹伯來朝齊人歸公孫敖之喪左氏傳齊人或為孟氏謀曰魯爾親也飾棺置諸堂阜魯必取之從之卞人以告惠叔猶毁以為請立於朝以待命許之取而殯之齊人送之書曰齊人歸公孫敖之喪為孟氏且國故也葬視共仲杜氏注大夫喪還不書善魯感子以赦父敦公族之恩崇仁孝之教劉氏傳何以書譏何譏爾以大夫卒之而不以大夫終之非魯也制人之君臣使上不行乎下非齊也襄陵許氏曰以敖之醜奔而録卒録其喪歸春秋為之屢見於經者以文伯惠叔之哀誠無已也易曰有子考無咎書曰尚蓋前人之愆惟忠惟孝故聖人以敖著教焉六月辛丑朔日有食之鼓用牲于社左氏傳鼓用牲于社非禮也日有食之天子不舉伐鼓于社諸侯用幣於社伐鼓於朝以昭事神訓民事君示有等威古之道也單伯至自齊左氏傳齊人許單伯請而赦之使來致命杜氏注單伯執節不移且畏晉故許之榖梁傳大夫執則致致則名此其不名何也天子之命大夫也晉郤缺帥師伐蔡戊申入蔡左氏傳新城之盟蔡人不與晉郤缺以上軍下軍伐蔡曰君弱不可以怠戊申入蔡以城下之盟而還襄陵許氏曰言伐言入甚之秋齊人侵我西鄙季孫行父如晉左氏傳齊人侵我西鄙故季文子告于晉冬十有一月諸侯盟于扈左氏傳晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也齊人賂晉侯故不克而還於是有齊難是以公不會書曰諸侯盟于扈無能為故也伊川先生解魯以備齊不在會故不序又稱諸侯者衆辭見衆國無能為也此盟為齊亂也劉氏意林大者天地其次君臣道莫先焉晉為霸主齊弒其君興侯而莫能正晉則固有罪矣諸侯又莫之討不亦病乎夫諸侯不專征者也田恆弒簡公而孔子請討焉是豈非義而孔子行之哉固以謂天地之道君臣之義是乃其宜也從此觀之盟于扈之意晉則固有罪而諸侯亦病矣武夷胡氏傳盟于扈者晉侯宋公衛蔡陳鄭曹許八國之君也何以不序略之也春秋於夷狄君臣同詞而不分爵號説者以為略之也八國曷為略之等於夷狄乎齊人弒君不能致討受賂而退奚以賢於夷狄矣不曰晉人會諸侯盟于扈而曰諸侯盟者分惡於諸侯也田恆弒其君孔子沐浴而朝告於哀公請討之弒君之賊夫人之所得討也而況於諸侯乎況於鄰國乎略諸侯而不序以其欲討齊罪而復不能也而況於鄰國初不與盟會者乎魯君之罪亦可知矣十有二月齊人來歸子叔姬劉氏意林出夫人者未嘗不使大夫將命也彼其曰郯伯姬來歸此其曰齊人來歸子叔姬何哉曰春秋正名别賢不肖使弗相亂者也義屈則屈義直則直郯伯姬以罪出雖父母於其子而不敢以私愛害公義辭不教而已矣子叔姬以禍亂逐非得罪於先君者也魯雖受之其義固可以自直故謂之齊人來歸明罪之在也凡人之議法也所親則回所踈則察君子不然親則憐之而不以愛妨公踈則容之而不以枉誣正所以見王者之事也泰山孫氏曰齊人來歸子叔姬也商人既殺其子又絶其母甚矣武夷胡氏傳春秋深罪齊人以商人為君而不知其惡故其執其歸與弒其君商人皆稱齊人深責之也齊侯侵我西鄙遂伐曹入其郛左氏傳齊侯侵我西鄙謂諸侯不能也遂伐曹入其郛討其來朝也杜氏注郛郭也襄陵許氏曰魯盡禮於晉而見侵弗恤曹修禮於魯而被伐莫救此仁義之所以日壞而兵革之所以方興夫豈特齊懿之暴戾無道皆晉靈趙盾之責也十有六年春季孫行父會齊侯于陽榖齊侯弗及盟左氏傳春王正月及齊平公有疾使季文子會齊侯于陽榖請盟齊侯不肯曰請俟君間夏五月公四不視朔左氏傳公四不視朔疾也公羊傳曷為四不視朔公有疾也何言乎公有疾不視朔自是公無疾不視朔也然則曷為不言公無疾不視朔有疾猶可言也無疾不可言也蘇氏曰公羊曰自是無疾不視朔也定哀之間子貢欲去告朔之餼羊蓋不復視朔矣此公羊之所以為此言也然而五月書四不視朔則六月視朔矣視朔之廢非始於此也榖梁傳天子告朔於諸侯諸侯受乎禰廟禮也公四不視朔公不臣也以公為厭政已甚矣杜氏注諸侯每月必告朔聽政因朝於廟今公以疾闕不得視二月三月四月五月朔也武夷胡氏傳文公厭政備見於經閏不告朔不視無雨不閔會同不與廟壞不修作主不時事民治神之怠也則其心放而不知求久矣六月戊辰公子遂及齊侯盟于郪公作犀榖作師丘左氏傳公使襄仲納賂於齊侯故盟于郪丘杜氏注郪丘齊地秋八月辛未夫人薑氏薨左氏傳秋八月辛未聲薑薨杜氏注僖公夫人文公母也毁泉臺公羊傳毁泉臺何以書譏何譏爾築之譏毁之譏先祖為之已毁之不如勿居而已矣榖梁傳毁泉臺喪不二事二事緩喪也以文為多失道矣范氏注緩作主躋僖公四不視朔毁泉臺之類武夷胡氏傳先祖為之非矣然臺之存毁非安危治亂之所係也雖勿居可也而必毁之是暴揚其失有輕先祖之心此履霜之漸弒父與君之萌春秋之所謹也故書楚人秦人巴人滅庸左氏傳楚大飢庸人帥羣蠻以叛楚麇人帥百濮聚於選將伐楚於是申息之北門不啓楚人謀徙於阪高蒍賈曰不可我能往寇亦能往不如伐庸夫麇與百濮謂我飢不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廩同食次於句澨使廬戢黎侵庸及庸方城庸人逐之囚子揚窗三宿而逸曰庸師衆羣蠻聚焉不如復大師且起王卒合而後進師叔曰不可姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也又與之遇七遇皆北唯裨鯈魚人實逐之庸人曰楚不足與戰矣遂不設備楚子乘馹會師於臨品分為二隊子越自石溪子貝自仞以伐庸秦人巴人從楚師羣蠻從楚子盟遂滅庸冬十有一月宋人弒其君杵公作處臼左氏傳宋公子鮑禮於國人宋飢竭其粟而貸之無日不數於六卿之門國之材人無不事也親自桓以下無不恤也襄夫人助之施昭公無道國人奉公子鮑以因夫人冬十一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之蕩意諸死之武夷胡氏傳此襄夫人使帥甸攻殺之也而書宋人者昭公無道國人之所欲弒也君無道而弒之可乎諸侯殺其大夫雖當於罪若不歸諸司寇猶有專殺之嫌以為不臣矣況於北面歸戴奉之以為君也故曰人臣無將將而必誅昭公無道聖人以弒君之罪歸宋人者以明三綱人道之大倫君臣之義不可廢也然則有土之君可以肆於民上而無誅乎諸侯無道天子方伯在焉臣子國人其何居死於其職而明於去就從違之義斯可矣蕩意諸亦死職春秋削之不得班於孔父仇牧荀息何也三子間其君而見殺春秋之所取也意諸知國人將弒其君而不能止知昭公之將見殺而不能正坐待其及而死之所謂匹夫匹婦自經於溝瀆而莫之知也奚得與死於其職者比乎聖人所以獨取高哀之去而書字以褒之也十有七年春晉人衛人陳人鄭人伐宋左氏傳晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還卿不書失其所也伊川先生解行天討而成其亂失天職也故不卿之杜氏注自僖閔以下終於春秋陳侯常在衛侯上今大夫會在衛下傳不言陳公孫寧後至則寧位非上卿故也夏四月癸亥葬我小君聲公作聖薑左氏傳葬聲薑有齊難是以緩泰山孫氏曰聲諡也九月而葬齊侯伐我西鄙六月癸未公及齊侯盟于榖諸侯會于扈左氏傳齊侯伐我西鄙襄仲請盟六月盟于榖晉侯搜于黃父遂復合諸侯于扈平宋也公不與會齊難故也書曰諸侯無功也武夷胡氏傳宋昭公雖為無道人臣將而必誅春秋正宋人為弒君之罪所以明人道之大倫也故大夫無沐浴之請則貶而稱人諸侯無討賊之功則略而不序不然是廢君臣之義人欲肆而天理滅矣故曰春秋成而亂臣賊子懼秋公至自榖冬公子遂如齊左氏傳襄仲如齊拜榖之盟十有八年春王二月丁丑公薨于臺下榖梁傳臺下非正也高郵孫氏曰人君之薨必於路寢非路寢者皆不正也其曰臺下蓋又甚焉秦伯罃卒泰山孫氏曰秦康公夏五月戊戌齊人弒其君商人左氏傳齊懿公之為公子也與邴歜之父爭田勿勝及即位乃掘而刖之而使歜僕納閻職之妻而使職驂乘夏五月公遊於申池二人弒懿公納諸竹中歸舍爵而行齊人立公子元武夷胡氏傳案左氏齊懿公即位刖邴歜之父而使歜僕納閻職之妻而使職驂乘二人者實弒懿公然則於法宜書曰盜而特變其詞以為齊人何也亂臣賊子之動於惡必有利其所為而與之者人人不利其所欲為而莫之與則孤危獨立無以濟其惡篡弒之謀息矣惟利其所為而與之者衆是以能濟其惡天下胥為禽獸而莫之遏也公子商人驟施於國而多聚士盡其家而貸於公有司是以財誘齊國之人也齊人貪公子一時之私施而不顧君臣萬世之大倫弒其國君則靦面以為之臣而不能討執其君母則拱手以聽其所為而不能救故於懿公見殺特不書盜反以弒君之罪歸諸齊人以誅亂賊之黨弭篡弒之漸所謂拔本塞源懲禍亂之所由也故曰春秋成而亂臣賊子懼六月癸酉葬我君文公秋公子遂叔孫得臣如齊左氏傳秋襄仲莊叔如齊惠公立故且拜葬也榖梁傳使舉上客而不稱介不正其同倫而相介故列而數之也劉氏意林公子遂叔孫得臣如齊春秋之文有常有變變用於變常用於常不相襲也變之甚微讀者難知也則以為史耳乃春秋則欲起問者見善惡也公子遂將弒君謀之齊而後決陽虎將竊國謀之晉而後發而經書子卒盜竊寶玉大弓其實尚隱故原其禍亂之始邪謀之發著之奉使之日以見非常也使學者比其類揆其情因是而知之所謂微而顯志而晦者也非聖人孰能修之哉齊與人之大臣謀弒其君晉與人之陪𨽻謀覆其國意俱惡而禍俱大此春秋所以異而惡之也武夷胡氏傳使舉上客將稱元帥此春秋立文之常體也其有變文書介副者欲以起問者見事情也子赤夫人之子今卒於弒不著其實是為國諱惡無以傳信於將來而春秋之大義隱矣故上書大夫並使下書夫人歸于齊中曰子卒則見禍亂邪謀發於奉使之曰而公子遂弒立其君之罪著矣冬十月子卒左氏傳文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可仲見於齊侯而請之齊侯新立而欲親魯許之冬十月仲殺惡及視而立宣公杜氏注惡大子視其母弟書曰子卒諱之也仲以君命召惠伯其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中公羊傳子卒者孰謂謂子赤也陸氏纂例啖子曰凡未踰年君卒皆書曰卒言嗣先君未成君也故不書崩薨而曰卒先君未薨則名之既葬則不名外諸侯未踰年而卒則不書異於內也趙子曰子般子赤以被殺故不書地義與隱同子野非被殺而亦不書地闕文也武夷胡氏傳諸侯在喪稱子繼世不忍當也既葬不名終人子之事也踰年稱君緣人臣之心也夫人薑氏歸于齊左氏傳夫人薑氏歸于齊大歸也將行哭而過市曰天乎仲為不道殺適立庶市人皆哭魯人謂之哀薑榖梁傳惡宣公也有不待貶絶而罪惡見者范氏注直書薑氏之歸則宣公罪惡不貶而自見有待貶絶而惡從之者姪姊者不孤子之意也一人有子三人緩帶高郵孫氏曰子赤見弒宣公立夫人薑氏不安於魯而大歸於齊聖人書之曰子卒夫人薑氏歸于齊然則宣公之弒不亦明歟武夷胡氏傳書夫人則知其正書薑氏則知其非見絶於先君書歸于齊則知其無罪異於孫于邾者而魯國臣子殺適立庶敬嬴宣公不能事主君存適母其罪不書而並見矣季孫行父如齊襄陵許氏曰文子之行告宣公立也前乎子卒書如齊後乎子卒書如齊齊與聞乎故也所以惡齊也吕氏曰君死不正而國之大臣恃大國以自免施施肆肆無所忌憚行父名大夫也而猶若是先王之澤盡矣莒弒其君庶其陸氏纂例稱國以弒自大臣也晉弒其君州蒲之類凡四莒吳薛吕氏曰稱國以弒自大臣也其君則亦惡加夫一國也春秋集解卷十四
