body:
  text: 春秋集解卷二十宋吕本中撰襄公十年春公㑹晋侯宋公衛侯曹伯莒子邾公作邾婁下同子滕子薛伯杞伯小邾子齊世子光㑹吳于柤夏五月甲午遂滅逼榖作傅陽左氏傳春㑹于柤㑹吳子夀夢也夏四月戊午㑹于柤杜注經書春始行也晋荀偃士丐請伐逼陽而封宋向戌焉荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克荀偃士丐請於荀罃曰水潦將降懼不能歸請班師知伯怒投之以機出於其間曰女成二事而後告余余恐亂命以不女違女既勤君而興諸侯牽帥老夫以至於此既無武守而又欲易余罪曰是實班師不然克矣七日不克必爾乎取之五月庚寅荀偃士丐帥卒攻逼陽親受矢石甲午滅之以與向戌向戌辭乃豫宋公晋以逼陽子歸獻於武宫謂之夷俘逼陽妘姓也使周內史選其族嗣納諸霍人榖梁傳㑹又㑹外之也劉氏權衡曰榖梁曰外之也乎非也㑹于戚吳在何不外之㑹于申淮夷亦在何不外之乎杜氏注柤楚地逼陽妘姓國今彭城傳陽縣也吕氏曰中國諸侯往與吳㑹宜示以禮義明以王制以同奬周室遂滅逼陽不道甚矣公至自㑹榖梁傳㑹夷狄不致惡事不致此其致何也存中國也中國有善事則并焉無善事則異之存之也故鄭伯逃歸陳侯致柤之㑹存中國也楚公子貞鄭公孫輒帥師伐宋左氏傳六月楚子囊鄭子耳伐宋師於訾母庚午圍宋門於桐門晋師伐秦左氏傳九年秦景公使士雃乞師於楚將以伐晋楚子許之秋楚子師於武城以為秦援秦人侵晋晋饑弗能報也十年晋荀罃伐秦報其侵也秋莒人伐我東鄙左氏傳莒人間諸侯之有事也故伐我東鄙公㑹晋侯宋公衛侯曺伯莒子邾公作邾婁下小邾同子齊世子光滕子薛伯杞伯小邾子伐鄭左氏傳諸侯伐鄭齊崔杼使大子光先至於師故長於滕己酉師於牛首吕氏曰齊世子光序諸侯上主㑹者為之也春秋不改所以示譏言上下之無禮文専以強弱事勢為先後也冬盜殺鄭公子騑公榖作斐公子發公孫輒左氏傳初子駟與尉止有爭將禦諸侯之師而黜其車子駟為田洫司氏堵氏侯氏子師氏皆喪田焉故五族聚羣不逞之人因公子之徒以作亂杜氏注八年子駟所殺公子熙等之黨於是子駟當國子國為司馬子耳為司空子孔為司徒冬十月戊辰尉止司臣侯晋堵女父子師僕帥賊以入晨攻執政於西宫之朝殺子駟子國子耳子孔知之故不死伊川先生解盜殺三卿不稱大夫失卿職也泰山孫氏曰盜者微賤之稱盜一日而殺三卿故列數之惡鄭伯失刑政武夷胡氏傳卿大夫者國君之陪二政之本也本強則精神折衝聞有偃息談笑而却敵國之兵勝千里之難者矣乃至於身不能保而盜得殺之於朝安在其為陪二乎故削其大夫為當官失職者鑒也戍鄭虎牢左氏傳諸侯之師城虎牢而戍之晋師城梧及制士魴魏絳戍之鄭及晉平武夷胡氏傳虎牢之城地不繫鄭者責在鄭也戍而繫鄭者罪諸侯也曷為責鄭設險所以守國有是險而不能設犧牲玉帛待盟境上使其民人不享土利辛苦墊隘無所底告然後請成故城不繫鄭者責其不能有也曷為罪諸侯夫鄭人從楚固云不義然中國所以城之者非欲斷荆楚之路為鄭蔽也駐師厄險以逼之爾至是伐而復戍焉猶前志也則可謂以義服之乎故戍而繫鄭者若曰鄭國分地受諸天子非列國所得專所以罪諸侯也聖人既以虎牢還繫於鄭又書楚公子貞帥師救鄭諸侯之罪益明矣夫以救許楚所以深罪諸侯不能保鄭肆其陵逼曾荆楚之不若也亦可為深切著明也哉楚公子貞帥師救鄭公至自伐鄭左氏傳楚子囊救鄭十一月諸侯之師還鄭而南至於陽陵楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣欒黶曰逃楚晋之耻也我將獨進師遂進己亥與楚師夾潁而軍子蟜曰諸侯既有成行必不戰矣從之將退不從亦退退楚必圍我猶將退也不如從楚亦以退之宵涉潁與楚人盟欒黶欲伐鄭師荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還今伐其師楚必救之戰而不克為諸侯笑丁未諸侯之師還侵鄭北鄙而歸楚人亦還襄陵許氏曰書楚故鄭而致公知諸侯之避楚也避楚侵鄭不書諱也十有一年春王正月作三軍左氏傳季武子將作三軍告叔孫穆子曰請為三軍各征其軍穆子曰政將及子子必不能武子固請之穆子曰然則盟諸乃盟諸僖閎詛諸五父之衢正月作三軍三分公室而各有其一三子各毁其乘季氏使其乘之人以其役邑入者無征杜氏注使軍乘之人率其邑役入季氏者無公征不入者倍征杜氏注不入季氏者則使公家倍征之設利病欲驅使入已孟氏使半為臣若子若弟杜氏注盡取子弟以其父兄歸公不然不舍杜氏注制軍分民不如是則三家不舍其故而改作也杜氏注增立中軍萬二千五百人為軍武夷胡氏傳三軍魯之舊也古者大國三軍次國二軍小國一軍魯侯封於曲阜地方數百里天下莫強焉及僖公時能復周公之宇而史克作頌其詩曰公車千乘說者以為大國之賦也又曰公徒三萬說者以為大國之軍也故知三軍魯之舊耳然車而謂之公車則臣下無私乘也徒而謂之公徒則臣下無私民也若有侵伐諸卿更帥以出事畢則將歸於朝車復於甸甲散於兵卒還於邑將皆公家之臣兵皆公家之衆不相係也文宣以來政在私門襄公幼弱季氏益張廢公室之三軍而三家各有其一季氏盡征焉而舊法亡矣是以謂之作其明年季孫宿救台遂入鄆又其後享范獻子而公臣不能具三耦民不屬公可知也春秋書其作舍以見昭公失國定公無正而兵權不可去公室有天下國家者之所宜鑒也呂氏曰三軍舊制也數不必常以示稱也今魯無事而用常制勞民費財不尚德而覿武亂所由作也夏四月四卜郊不從乃不郊榖梁傳夏四月不時也四卜郊非禮也鄭公孫舍之帥師侵宋左氏傳鄭人患晋楚之故子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晋怒甚矣晋能驟來楚將不能吾乃固與晋使疆楊之司惡於宋宋向戌侵鄭大獲子展曰師而伐宋可矣夏鄭子展侵宋公㑹晋侯宋公衛侯曹伯齊世子光莒子邾公作邾婁下同子滕子薛伯杞伯小邾子伐鄭左氏傳四月諸侯伐鄭己亥齊大子光宋向戌先至於鄭門於東門其莫晉荀罃至於西郊東侵舊許衛孫林父侵其北鄙六月諸侯㑹於北林師於向右還次於瑣圍鄭觀兵於南門西濟於濟隧鄭人懼乃行成秋七月己未同盟於亳公榖作京城北左氏傳秋七月同盟于亳范宣子曰不慎必失諸侯諸侯道敝而無成能無二乎乃盟載書曰凡我同盟母蕰年母壅利母保姦母留惡救災患恤禍亂同好惡奬王室或間兹命司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家伊川先生解鄭服而同盟也隨復從楚伐宋云同見其反覆杜氏注亳城鄭地公至自伐鄭榖梁傳不以㑹致盟後復伐鄭也楚子鄭伯伐宋左氏傳楚子囊乞旅於秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋公㑹晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹於蕭魚左氏傳諸侯之師觀兵於鄭東門鄭人使王子伯駢行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晋侯十二月戊寅㑹於蕭魚庚辰赦鄭囚皆禮而歸之納斥候禁侵掠鄭人賂晋侯以師悝師觸師蠲廣車軘車淳十五乘甲兵備凡兵車百乘歌鐘二肆及其鎛磬女樂二八晋侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之辭曰抑臣願君安其樂而思其終也書曰居安思危思則有備有備無患敢以此規伊川先生解諸侯數月之間再伐鄭鄭之反覆可知鄭又服而請㑹不書鄭㑹謂其不可信也而晉悼公推至誠以待人信之不疑至哉誠之能感人也自此鄭不背晋者二十四年杜氏注蕭魚鄭地劉氏意林㑹于蕭魚鄭伯如㑹歟則宜以如㑹書乞盟歟則宜以乞盟書今一皆沒之獨稱㑹何哉曰春秋嘉善矜不能而成人之美悼公之服鄭也有道其信義著於諸侯非一日之積此善之可嘉者也鄭伯之欲從中國也亦非一日之積逼於楚之強而未果此不能之可矜者也然則晉之取鄭鄭之下晉不始於㑹蕭魚之日其信已在前矣至其㑹也諸侯以小息中國以小安是乃有貴乎約信者也其義不言而喻不盟而一故略其文以見其實蓋春秋成人之美之意也故以戰伐為事者殘人民敝財用未必能下敵也以盟誓為信者繁犧牲費辭令未必能合衆也今示以救災患恤禍亂同好惡奬王室而逺人服矣為天下豈可以詐力哉蘇氏曰鄭與㑹也八年鄭人侵蔡獲蔡公子燮自是晉楚爭鄭五年之間晉人四以諸侯伐鄭楚輒救之晉用知罃之謀未嘗與楚人戰至是楚不能應遂全師以服鄭於是鄭固與晉二十餘年楚不能爭雖城濮之克不能過也公至自㑹榖梁傳伐而後㑹不以伐鄭致得鄭伯之辭也伊川先生解兵不加鄭故書至自㑹髙郵孫氏曰春秋書至者或以前事或以後事蓋皆擇其重者伐鄭重於同盟則至以伐㑹而得鄭重於徒伐則至以㑹蓋皆其重也楚人執鄭行人良霄左氏傳九月諸侯悉師以復伐鄭鄭人使良霄太宰石􅎢如楚告將服於晉楚人執之杜氏注良霄公孫輒子伯有也陸氏纂例啖子曰凡稱行人而執以其事執也言為使事不稱行人而執以已執也襄陵許氏曰書執良霄見楚力盡於是矣冬秦人伐晉左氏傳秦庶長鮑庶長武帥師伐晋以救鄭鮑先入晉地士魴禦之少秦師而弗設備壬午武濟自輔氏與鮑交伐晉師己丑秦晉戰於櫟晉師敗績易秦故也十有二年春王三月莒人伐我東鄙圍台榖作邰下同杜氏注琅邪費縣南有台亭泰山孫氏曰莒背蕭魚之㑹伐我東鄙圍台季孫宿帥師救台遂入鄆公作運公羊傳大夫無遂事此其言遂何公不得為政爾杜氏注鄆莒邑泰山孫氏曰季孫宿受命救台不受命入鄆季孫宿帥師救台遂入鄆専也武夷胡氏傳鄆莒邑也遂者生事也入者逆詞也大夫無遂事受命而救台不受命而入鄆惡季孫宿之專權使公不得有為於其國也或曰古者命將得專制閫外之事有可以安國家利社稷者専之可也曰此為境外言之也台在邦域之中而専行之非有無君之心者不敢為也昭公逐定無正夫豈一朝一夕之故哉其所由來者漸矣夏晉侯使士魴公作彭來聘左氏傳晉士魴來聘且拜師襄陵許氏曰晉悼服鄭抑楚而聘魯善持勝矣詩曰肆不殄厥愠亦不隕厥聞秋九月吳子乘卒左氏傳吳壽夢卒襄陵許氏曰楚自共王以後不大為中國患者以壽夢總兵而議其後冬楚公子貞帥師侵宋左氏傳冬楚子囊秦庶長無地伐宋師於楊梁以報晉之取鄭也公如晉左氏傳公如晉朝且拜士魴之辱十有三年春公至自晋夏取邿公作詩左氏傳夏邿亂分為三師救邿遂取之杜氏注邿小國也任城亢父縣有邿亭劉氏傳邿者何附庸之國也襄陵許氏曰晉始息民是以楚侵宋不報魯取邿不討取無大亂而已秋七月庚辰楚子審卒左氏傳秋楚共王卒冬城防左氏傳冬城防書事時也於是將早城臧武仲請俟畢農事襄陵許氏曰鄭役既息魯政有裕則知取邿以為利城防以為安而已矣十有四年春王正月季孫宿叔老㑹晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳于向左氏傳十三年吳侵楚飬由基奔命子庚以師繼之養叔曰吳乘我喪謂我不能師也必易我而不戒子為三覆以待我我請誘之子庚從之戰于庸浦大敗吳師十四年春吳告敗于晉㑹于向為吳謀楚故也范宣子數吳之不德也以退吳人陸氏纂例趙子曰魯書二卿志非度也武夷胡氏傳使舉上客而叔老並書者以內卿行則不得不書矣季孫宿以卿為介而不使之免叔老介於宿而不敢避蓋兩失之雖晉人輕其幣而敬其使於君命使人之體豈為得哉二月乙未朔日有食之夏四月叔孫豹㑹晋荀偃齊人宋人衛北宫括公作結鄭公孫蠆曹人邾公作邾婁下同人滕人薛人杞人小邾人伐秦左氏傳夏諸侯之大夫從晉侯伐秦以報櫟之役也晋侯待於竟使六卿帥諸侯之師以進及涇不濟叔向見叔孫穆子穆子賦匏有苦葉叔向退而具舟魯人邾人先濟鄭子蟜衛北宫懿子見諸侯之師而勸之濟濟涇而次秦人毒涇上流師人多死鄭司馬子蟜帥鄭師以進師皆從之至於棫林不獲成焉荀偃令曰雞鳴而駕塞井夷竈唯余馬首是瞻欒黶曰晋國之命未是有也余馬首欲東乃歸下軍從之伯游曰吾令實過悔之何及多遺秦禽乃命大還晋人謂之遷延之役己未衛侯公有衎字出奔齊左氏傳衛獻公戒孫文子寧惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒孫文子如戚孫蒯入使公飲之酒使大師歌巧言之卒章大師辭師曺請為之初公有嬖妾使師曺誨之琴師曹鞭之公怒鞭師曺三百故師曺欲歌之以怒孫子以報公公使歌之遂誦之蒯懼告文子文子曰君忌我矣弗先必死并帑於戚而入公使子蟜子伯子皮與孫子盟於丘宫孫子皆殺之四月己未子展奔齊公如鄄使子行於孫子孫子又殺之公出奔齊齊人以郲寄衛侯衛人立公孫剽孫林父寧殖相之以聼命於諸侯杜氏注諸侯之䇿書孫寧逐衛侯春秋以其自取奔亡之禍故諸侯失國者皆不書逐君之賊也劉氏意林奔而名者兩君之辭剽已立矣而衎不名何耶曰春秋雖亂世君不君臣不臣至於劫奪之禍尚皆有緣而作窮惡極亂猶不為也今剽以公族秉國政交於諸侯有日矣親逐其君而自取之惡有甚焉故絶其兩君之稱以見所惡也叔武攝位而鄭不名剽篡國而衎不名其不名也同而所以不名異叔武稱子而剽稱侯稱子者讓之意也稱侯者篡之實也故曰貴賤不嫌同號美惡不嫌同辭為春秋者安可弗察也武夷胡氏傳案左氏衛寧殖將死語其子曰吾得罪於君名在諸侯之䇿曰孫林父寧殖出其君夫所謂諸侯之䇿則列國之史也諸侯則若晋若魯是也史則若晋之乘魯之春秋是也今春秋書衛侯出奔齊而不曰孫林父寧殖出其君者蓋仲尼筆削不因舊史之文也欲知經之大義深考舊文筆削之不同其得之矣或曰孫寧出君衆所同疾史䇿書之是也聖人曷為掩姦藏惡不暴其罪而以歸咎人主何哉曰臣而逐君其罪已明矣人君擅一國之名寵神之主而民之望也愛之如父母仰之如日月敬之如神明畏之如雷霆何可出也所為見逐無乃肆於民上縱其淫虐以棄天地之性乎故衛衎出奔使宗祝告亡且告無罪而定姜曰有罪若何告無春秋端本清源之書故不書所逐之臣而以自奔為名所以警乎人君者為後世鑒非聖人莫能修之謂此類也莒人侵我東鄙秋楚公子貞帥師伐楚左氏傳秋楚子為庸浦之役故子囊師于棠以伐吳吳不出而還子囊殿以吳為不能而弗警吳人自臯舟之隘要而擊之楚人不能相救吳人敗之獲楚公子宜榖冬季孫宿㑹晋士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚左氏傳晉侯問衛故於中行獻子對曰不如因而定之衛有君矣冬㑹於戚謀定衛也襄陵許氏曰衛人立剽非正也而謀定之則正弗勝矣林父在㑹是以知其謀定剽也十有五年春宋公使向戌來聘二月己亥及向戌盟于劉左氏傳宋向戌來聘且尋盟杜氏注報二年豹之聘尋十一年亳之盟劉夏逆王后于齊左氏傳官師從單靖公逆王后於齊卿不行非禮也杜氏注官師劉夏也天子官師非卿也天子不親昏使上卿逆而公監之公羊傳劉夏者何天子之大夫也劉者何邑也杜氏注劉采地夏名也泰山孫氏曰劉魯地髙郵孫氏曰天子無親逆之禮逆后則使三公春秋書逆王后者二祭公行得禮而又書之者譏遂事也劉夏之逆則以非三公而譏之也春秋二百四十二年周王十三其逆后者惟二是知非禮則書之也武夷胡氏傳劉夏何以不稱使不與天子之使夏也㛰姻人倫之本王后天下之母劉夏士也士而逆后是不重人倫之本而輕天下之母矣然則何使卿往逆公監之禮也官師從單靖公逆王后于齊書劉夏而不書靖公是知卿往逆公監之禮也春秋㛰姻得禮者常事不書吕氏曰春秋之世天子諸侯皆無力於為善之意委靡不振亦任之而已爾劉夏士也而使逆后其違禮而無為善之意可知也夏齊侯伐我北鄙圍成公救成至遇季孫宿叔孫豹帥師城成郛左氏傳夏齊侯圍成二於晋故也於是乎城成郛公羊傳其言至遇何不敢進也吕氏曰救成至遇不敢進也畏齊如此而無強自為善多進善人以立其國之意襄公之不才亦可知也又曰成郛壞而城之苟完而已當世君臣所以為國者如是而已寧有逺慮乎常山劉氏曰武備不謹城邑見圍救患當速乃復畏避公之所為可知矣季孫宿叔孫豹帥師城成郛由不能救故成郛見壞而城也秋八月丁巳日有食之邾人伐我南鄙冬十有一月癸亥晉侯周卒左氏傳秋邾人伐我南鄙使告於晋晋將為㑹以討邾莒晋侯有疾乃止冬晋悼公卒遂不克㑹襄陵許氏曰政在君則民一民一則國強政在臣則民二民二則國弱魯自成襄失政大夫並竊國靈齊與邾莒交伐其國不競甚矣則是無故民分於三桓故也十有六年春王正月葬晋悼公三月公㑹晋侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟左氏傳春葬晋悼公平公即位改服修官蒸於曲沃杜氏注傳言晋將有溴梁之㑹故速葬警守而下㑹於溴梁命歸侵田以我故執邾宣公莒犂比公且曰通齊楚之使晋侯與諸侯宴於溫使諸大夫舞曰歌詩必類齊髙厚之詩不類荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸於是叔孫豹晉荀偃宋向戍衛寧殖鄭公孫蠆小邾之大夫盟曰同討不庭公羊傳諸侯皆在是其言大夫盟何信在大夫也何言乎信在大夫遍刺天下之大夫也曷為遍刺天下之大夫君若贅旒然榖梁傳溴梁之㑹諸侯失正矣諸侯㑹而曰大夫盟正在大夫也諸侯在而不曰諸侯之大夫大夫不臣也杜氏注葬晉悼公踰月而葬速也溴水名出河內軹縣東南至溫入河泰山孫氏曰案三年公會單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤陳侯使袁僑如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟言諸侯之大夫此直曰戊寅大夫盟不言諸侯之大夫者雞澤之㑹諸侯始失政也至于溴梁則又甚矣溴梁之㑹政在大夫也政在大夫故不言諸侯之大夫不言諸侯之大夫者大夫無諸侯故也溴梁晉地髙郵孫氏曰論語曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出蓋十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣孔子之所謂十世則隱桓之時也所謂五世則宣成之時也春秋始隱桓天下之禮樂征伐出於諸侯而王道絶矣宣成以前諸侯之大夫尚多稱人宣成以後魯宋齊晉蔡衛陳鄭八國之大夫㑹盟侵伐名氏悉書無復更稱人者於時六卿専晉三桓擅魯齊之政出於崔髙衛之政歸於孫寧天下諸侯之國政無不在於大夫者孔子傷之始於隱桓而春秋作隱桓至於襄昭凡十世矣蘇氏曰牡丘之㑹諸侯既次於匡書曰公孫敖帥師及諸侯之大夫救徐雞澤之㑹諸侯既盟而陳侯使袁僑如㑹書曰叔孫豹及諸侯之大夫及陳袁僑盟今諸侯既㑹將使大夫盟髙厚髙厚逃歸則書曰豹及諸侯之大夫盟可矣獨書曰大夫盟何也荀偃怒而使大夫盟髙厚欲以強服諸侯則政在大夫也自是晋政在六卿故獨書大夫盟言無君也武夷胡氏傳上二年春正月㑹於向十有四國之大夫也夏四月㑹伐秦十有三國之大夫也冬㑹於戚七國之大夫也此三㑹皆國之大事也而使大夫皆専之而諸使皆不與焉是列國之君不自為政弗躬弗親禮樂征伐已自大夫出矣况悼公既沒晉平初立無先公之明也君若贅旒而大夫張亦宜矣豈一朝一夕之故哉善惡積於至微而不可掩常情忽於未兆而不預謀荀偃怒大夫盟而晋靖公廢趙籍韓䖍魏斯為諸侯之勢見矣有國者謹於禮而不敢忽此春秋以待後世之意也晉人執莒子邾子以歸左氏傳以我故執邾宣公莒犂比公且曰通齊楚之使劉氏意林晉人知莒子邾子之可以討矣而未知己之不可討也用亂治亂用不肖治不肖禍乃始作非正本之意也沈同問孟子燕可伐與孟子曰可沈同伐燕齊人以孟子為勸之也孟子曰可彼如曰孰可伐之則將曰為天吏則可以伐之譬猶殺人者而問曰人可殺與亦將應之曰可彼如曰孰可殺之則將曰為士師者可殺之今以燕伐燕曷為勸之哉夫孟子可謂知本矣泰山孫氏曰晉平溴梁之㑹方退執莒子邾子以歸又不歸於京師非所以宗諸侯也髙郵孫氏曰僖二十一年諸侯㑹楚執宋公經不再言楚人執之所以罪中國之諸侯從盟主以㑹楚子楚執其盟主而諸侯㑹於溴梁將以號令而安之也㑹而執二國之君春秋罪之故曰晉人也楚外裔晉中國于楚則不責于晉則責之有知與無知者異也齊侯伐我北鄙夏公至自㑹五月甲子地震叔老㑹鄭伯晉荀偃衛寧殖宋人伐許左氏傳許男請遷於晉諸侯遂遷許許大夫不可晉人歸諸侯杜氏注唯以其師討許之不肯遷鄭子蟜聞將伐許遂相鄭伯以從諸侯之師穆叔從公杜氏注從公歸齊子帥師㑹晉荀偃夏六月次於棫林庚寅伐許次于函氏襄陵許氏曰晉卿主兵而先鄭伯者臣不可過君也秋齊侯伐我北鄙圍成左氏傳秋齊使圍成孟孺子速僥之齊侯曰是好勇去之以為之名速遂塞海陘而還大雩冬叔孫豹如晉左氏傳冬穆叔如晉聘且言齊故晉人曰以寡君之未禘祀與民之未息不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎比執事之間恐無及也十有七年春王二月庚午邾子牼公穀並作瞷卒杜氏注宣公也宋人伐陳左氏傳春宋莊朝伐陳獲司徒卭卑宋也夏衛石買帥師伐曹左氏傳衛孫蒯田於曹隧飲馬於重丘毁其瓶重丘人閉門而詬之曰親逐而君爾父為厲是之不憂而何以田為夏衛石買孫蒯伐曹取重丘曹人訴於晉秋齊侯伐我北鄙圍桃公作洮髙厚公榖作齊髙厚帥師伐我北鄙圍防左氏傳齊人以其未得志於我故秋齊侯伐我北鄙圍桃髙厚圍臧紇於防師自陽關逆臧孫至於旅松郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復齊師去之杜氏注桃魯地辨縣東南有桃虛泰山孫氏曰案十五年齊侯伐我北鄙圍成十六年齊侯伐我北鄙圍成此年齊侯伐我北鄙圍桃髙厚伐我北鄙圍防三年之中君臣加兵於魯者四此齊之不道亦可知也九月大雩宋華臣出奔陳左氏傳宋華閲卒華臣弱臯比之室使賊殺其宰華吳宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如蓋之乃舍之十一月甲午國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳冬邾人伐我南鄙左氏傳冬邾人伐我南鄙為齊故也春秋集解卷二十
