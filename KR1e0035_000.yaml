body:
  text: 御製閲春秋解口號漫題猾夏從來稱攘楚今常漕米濟江南寄言白首窮經者漫泥去聲區區紙上談解春秋者無不以猾夏為楚罪操戈聚訟論之不已此經生因襲舊聞拘墟方域之見耳秦晉汛舟之役傳說以為美談而今楚粟嵗輸濟鄰封者甚富賙賑尤資其利使如春秋時各分疆域則江浙所出之米不足本地半嵗之食設加之遇灾即有賑恤將難為巧婦之炊矣且江浙江西即昔之吳越漢武帝議伐閩越而劉安稱先道古謂必不可伐唐順之韙之以為反覆論說以中國勞蠻夷之意以今觀之閩浙江西之人豈盡不可以冠帶之國法度理之乎是知今古異宜不達時而欲行封建井田者率是類也故并識之欽定四庫全書經部五春秋集解目録春秋類第一卷隱公第二卷隱公第三卷桓公第四卷桓公第五卷莊公第六卷莊公第七卷莊公第八卷閔公第九卷僖公第十卷僖公第十一卷僖公第十二卷僖公第十三卷文公第十四卷文公第十五卷宣公第十六卷宣公第十七卷成公第十八卷成公第十九卷襄公第二十卷襄公第二十一卷襄公第二十二卷襄公第二十三卷昭公第二十四卷昭公第二十五卷昭公第二十六卷昭公第二十七卷定公第二十八卷定公第二十九卷哀公第三十卷哀公臣等謹案春秋集解三十卷宋吕本中撰舊刻題曰呂祖謙誤也本中字居仁好問之子宋史載其紹興六年賜進士擢起居舍人八年遷中書舍人兼侍講權直學士院學者稱為東萊先生故趙希辨讀書附志稱是書為東萊先生撰後人因祖謙與朱子逰其名最著亦稱曰東萊先生而本中以詩擅名詩家多稱吕紫微東萊之號稍隱遂移是書於祖謙不知陳振孫書録解題載是書固明云本中撰也振孫又言是書自三傳而下集諸儒之說不過陸氏兩孫氏兩劉氏蘇氏程氏許氏胡氏數家而采擇頗精全無自己議論以此本考之亦合知舊刻誤題審矣本中所著江西宗派圖紫微詩話皆盛行於世而不知其經學之邃乃如此今考正之庶幾不沒其真焉乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋集解原序春秋集解三十卷趙希辨讀書附志云東萊先生所著也長沙陳雍和父為之序按成公年譜凡有著述必書獨是編不書宋史本傳公所著有易書詩而無春秋惟藝文志於春秋集解三十卷直書成公姓名考吳興陳氏書録解題有春秋集解十二卷云是吕本中撰且撮其大㫖謂自三傳而下集諸儒之說不過陸氏兩孫氏兩劉氏蘇氏程氏許氏胡氏數家而已其所擇頗精却無自己議論合之是編誠然蓋吕氏自右丞好問徙金華成公述家傳稱為東萊公而本中為右丞子學山谷為詩作江西宗派圖學者稱為東萊先生以之名集然則吕氏三世皆以東萊先生為目成公特最著者爾朱子嘗曰吕居仁春秋亦甚明白正如某詩傳相似竊疑是編為居仁所著第卷帙多寡不合或居仁草創而成公增益之者與序其端用質淹通博洽之君子倘獲善本有陳和父序者豫之疑庶可以釋矣康熙丙辰二月納蘭成德容若序
