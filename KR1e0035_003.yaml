body:
  text: 春秋集解卷三宋吕本中撰桓公名允惠公子隠公弟桓王九年即位桓諡也闢土服逺曰桓元年春王正月公即位公羊傳繼弑君不言即位此其言即位何如其意也榖梁傳桓無王其曰王何也謹始也其曰無王何也桓弟弑兄臣弑君天子不能定諸侯不能救百姓不能去以為無王之道遂可以至焉爾元年有王所以治桓也繼故不言即位正也繼故不言即位之為正何也曰先君不以其道終則子弟不忍即位也繼故而言即位則是與聞乎弑也繼故而言即位是為與聞乎弑何也曰先君不以其道終已正即位之道而即位是無恩於先君也伊川先生解桓公弑君而立不天無王之極也而書春王正月公即位以天道王法正其罪也杜氏注嗣子位定於初喪而改元必須踰年者繼父之業不忍有變於中年也桓公篡立而用常禮欲自同於遭喪繼位者髙郵孫氏曰元年書王者以為弑君之賊將而必誅己弑君矣其能免於誅乎元年書王所以誅桓也二年書王必以為王室微弱弑君之賊力不能即時誅之二年而後誅之亦晚矣然亦足以為王誅也十年書王者政教之出不可以一日無之十年無王則王道將絶於天下也十八年有王者桓公之終也弑君之賊無可赦之理不見誅於即時當見誅於歳月不見誅於其生當見誅於將死不見誅於終身當見誅於萬世武夷胡氏傳元年即位之始年也自是累數雖乆而不易此前古人君紀事之例春秋祖述為編年法及漢文帝惑方士之言改後元年始亂古制夫在位十有六載矣復稱元年可乎孝武又因事别建年號歷代因之或五六年或四三年或一歳再更使記注繁蕪莫之勝載夫歷世無窮而美名有盡豈記乆明逺可行之法也必欲傳乆當以春秋編年為正桓公與聞乎故而書即位著其弑立之罪深絶之也美惡不嫌同詞或問桓非惠公之嫡子乎嫡子當立而未能自立是故隱分攝焉以俟其長而授之位乆攝而不歸疑其遂有之也是以至於見弑而惡亦有所分矣春秋曷為深絶桓也曰古者諸侯不再娶於禮無二嫡惠公元妃既卒繼室以聲子則是攝行内主之事矣仲子安得為夫人母非夫人則桓乃隱之庶弟安得為嫡子謂當立乎桓不當立則國乃隱公之國其欲授桓乃實讓之非攝也攝讓異乎曰非其有而居之者攝也故周公即政而謂之攝推己所有以與人者讓也故堯舜禪授而謂之讓惠無嫡嗣隠公繼室之子於次居長禮當嗣世其欲授桓所謂推己所有以與人者也豈曰攝之云乎以其實讓而桓乃弑之春秋所以惡桓深絶之也然則公羊所謂桓幼而貴隠長而卑子以母貴者其説非歟曰此徇惠公失禮而為之詞非春秋法也仲子有寵惠公欲以為夫人母愛者子抱惠公欲以桓為嫡嗣禮之所不得為也禮不得為而惠公縱其邪心而為之隠公又探其邪志而成之公羊又肆為邪説而傳之漢朝又引為邪議而用之夫婦之大倫亂矣春秋明著桓罪深加貶絶備書終始討賊之義以示王法正人倫存天理訓後世不可以邪汨之也三月公㑹鄭伯于垂鄭伯以璧假許田左氏傳公即位修好於鄭鄭人請復祀周公卒易祊田公許之三月鄭伯以璧假許田為周公祊故也榖梁傳㑹者外為主焉爾范氏注鄭伯所以欲為此㑹者為易田故非假而曰假諱易地也禮天子在上諸侯不得以地相與也許田者魯朝宿之邑也邴者鄭伯之所受命而祭泰山之邑也用見魯之不朝於周而鄭之不祭泰山也伊川先生解隠公八年鄭伯使宛来歸祊蓋欲易許田魯受祊而未與許及桓弑立故為㑹而求之復扣以璧朝宿之邑先祖受之於先王豈可相易也故諱之曰假諱國惡禮也劉氏傳許田者何魯湯沐之邑也方伯時朝乎天子天子必賜之湯沐之邑於縣内視元士魯非方伯也其謂之方伯何自陜而東者周公主之許田之為魯自周公始焉意林許田周公之邑也詩云居嘗與許復周公之宇蓋非方伯不得有湯沐之邑非周公不得世享其祀蘇氏曰許田所以易祊也以祊為未足而益之以璧爾武夷胡氏傳魯山東之國與祊為鄰鄭畿内之邦許田近地也以此易彼各利於國而聖人乃以為惡而隠之獨何歟曰利者人欲之私放於利必至於奪攘而後厭義者天理之公正其義則推之天下國家而可行春秋惡易許田孟子極陳利國之害皆拔本塞源杜篡弑之漸也湯沐之邑朝宿之地先王所錫先祖所受私相貿易而莫之顧是有無君之心而廢朝覲之禮矣是有無親之心而棄先祖之地矣故聖人以是為國惡而隠之也襄陵許氏曰以祊近魯許田近鄭而以相與利則利矣而義不得凡情之所便而亂之所生此特春秋之所謹也夏四月丁未公及鄭伯盟于越左氏傳結祊成也榖梁傳及者内為志焉爾伊川先生解桓公欲結鄭好以自安故既與許田又為盟也弑君之人凡民罔弗憝而鄭與盟以定之其罪大矣杜氏注公以篡立而修好於鄭鄭因而迎之成禮於垂終易二田然後結盟垂犬丘衞地也越近垂地名武夷胡氏傳垂之㑹鄭為主也故稱㑹越之盟魯志也故稱及鄭人欲得許田以自廣是以為垂之㑹桓公欲結鄭好以自安是以為越之盟夫弑逆之人凡民罔弗憝即孟子所謂不待教命人得而誅之者也而鄭與之盟以定其位是肆人欲滅天理委大義于土壤化人類為禽獸聖人所為懼春秋所以作無俟於貶絶而惡自見矣秋大水公羊傳記災也伊川先生解君徳修則和氣應而雨暘若桓行逆徳而致隂沴乃其冝也髙郵孫氏曰大者非常之辭水非常而為災或害民禾稼敗民廬居凡為災則書之也冬十月二年春王正月戊申宋督弑其君與夷及其大夫孔父左氏傳宋華父督見孔父之妻於路目逆而送之曰美而豔二年春宋督攻孔氏殺孔父而取其妻公怒督懼遂弑殤公君子以督為有無君之心而後動於惡故先書弑其君公羊傳宣公謂繆公曰以吾愛與夷則不若愛女以為社稷宗廟主則與夷不若女盍終為君矣宣公死繆公立繆公遂其二子莊公馮與左師勃終致國乎與夷莊公馮弑與夷故君子大居正宋之禍宣公為之也及者何累也累累從君而死齊人語也弑君多矣舍此無累者乎曰有仇牧荀息皆累也舍仇牧荀息無累者乎曰有有則此何以書賢也何賢乎孔父孔父可謂義形於色矣其義形於色奈何督將弑殤公孔父生而存則殤公不可得而弑也故於是先攻孔父之家孔父正色而立於朝則人莫敢過而致難於其君者孔父可謂義形於色矣榖梁傳孔父先死其曰及何也書尊及卑春秋之義也孔父之先死何也督欲弑君而恐不立於是乎先殺孔父孔父閑也孔氏父字諡也伊川先生解桓公無王而書王正月正宋督之罪也弑逆之罪不以王法正之天理滅矣督雖無王而天理未嘗亡也人臣死君難書及以著其節父名也稱大夫不失其官也陸氏纂例趙子曰忠義見殺與君而死故言及以連之也劉氏傳春秋賢者不名孔父者所賢也則其名之何父前子名君前臣名泰山孫氏曰孔父者天子命大夫也古者諸侯之大夫皆命於天子故春秋列國時或有之宋孔父鄭祭仲魯單伯陳女叔之類是也武夷胡氏傳案左氏宋殤公立十年十一戰民不堪命孔父為司馬無能改於其徳非所謂格君心之非者然君弑死於其難處命不渝亦可以無媿矣父者名也著其節而書及不失其官而書大夫是春秋之所賢也賢而名之何也故侍讀劉敞以謂既名其君於上則不得字其臣於下此君前名臣禮之大節也督將弑殤公孔父生而存則不可得而弑於是乎先攻孔父而後及其君能為有無亦庶幾焉凡亂臣賊子畜無君之心者必先翦其所忌而後動於惡不能翦其所忌則有終其身而不敢動者也華督欲弑君而憚孔父劉安欲叛漢而憚汲直曹操欲禪位而憚孔融此數君子者義形於色皆足以衞宗社而忤邪心姦臣之所以憚也不有君子其能國乎春秋賢孔父示後世人主崇奬節義之臣乃天下之大閑有國之急務也滕子来朝伊川先生解滕本侯爵後服屬於楚故降稱子夷狄之也首朝桓公之罪自見矣杜氏注隠十一年稱侯今稱子者蓋時王所黜泰山孫氏曰滕子朝弑逆之人其惡可知武夷胡氏傳隠公末年滕稱侯爵距此三歳爾乃降而稱子者先儒謂為時王所黜也使時王能黜諸侯春秋豈復作乎又有言其在喪者終春秋之世不復稱侯無説矣然則云何春秋為誅亂臣討賊子而作其法尤嚴於亂賊之黨使人人知亂臣賊子之為大惡而莫之與則無以立於世無以立於世則莫敢勸於為惡而篡弑之禍止矣今桓公弟弑兄臣弑君天下之大惡凡民罔弗憝也已不能討又先鄰國而朝之是反天理肆人欲與夷狄無異而春秋之所深惡也故降而稱子以正其罪四夷雖大皆曰子其降而稱子狄之也或曰非天子不制度不議禮不攷文仲尼豈以匹夫專進退諸侯亂名實哉則將應之曰仲尼固不可以匹夫專進退諸侯亂名實矣不曰春秋天子之事乎知我罪我者其惟春秋乎世衰道微暴行交作仲尼有聖徳無其位不得如黄帝舜禹周公之伐蚩尤誅四凶戮防風殺管蔡行天子之法於當年也故假魯史用五刑奉天討誅亂賊垂天子之法於後世其事雖殊其理一爾何疑於不敢專進退諸侯以為亂名實哉夫奉天討舉王法以黜諸侯之滅天理廢人倫者此名實所由定也故曰春秋成而亂臣賊子懼吕氏曰春秋以後杞或稱侯或稱伯或稱子滕或稱侯或稱子薛或稱侯或稱伯皆不可得而詳攷殆後世録春秋者文誤也借使聖人為春秋黜陟當世以為賞罰則何不黜陟晉楚强國以定一王之法而獨區區於小國如是哉後之録春秋者由前人口授相傳遂致謬誤不可知也晉楚齊秦諸大國顯者也故不誤小國微也故多誤其亦以是故歟三月公㑹齊侯陳侯鄭伯于稷以成宋亂左氏傳㑹于稷以成宋亂為賂故立華氏也宋殤公立十年十一戰民不堪命孔父嘉為司焉督為太宰故因民之不堪命先宣言曰司馬則然已殺孔父而弑殤公召莊公於鄭而立之以親鄭以郜大鼎賂公齊陳鄭皆有賂故遂相宋公伊川先生解宋弑其君而四國共成之此天下之大惡也杜氏注稷宋地范氏注徐邈曰春秋雖為親尊者諱然亦不没其實故納鼎於廟躋僖逆祀及王室之亂昭公之孫皆指事而書陸氏纂例曰夫子制作本教中人故簡易其文昭著其義若能以質直見之則可不俟傳注而自通矣故言滅國則知滅者之罪見諸侯生名則知非復人君皆文勢常理何必立異乎又上言伐衞次言王人救衞下言衞侯朔入于衞則知逆王命上言成宋亂下言納鼎則知貪賂縱罪見正月烝五月烝則知黷祀凡此類上下相應而見其理劉氏傳成之者何成之者平之也平之則曷為不言平之保人之賊私人之賂制人之上下謂之成亂則可謂之平亂則不可武夷胡氏傳案左氏為賂故立華氏也邾定公時有弑父者公瞿然失席曰是寡人之罪也嘗學斷斯獄矣臣弑君凡在官者殺無赦子弑父凡在宫者殺無赦殺其人壊其室洿其宫而瀦焉蓋君踰月而後舉爵華督弑君之賊凡民罔弗憝也而桓與諸侯㑹而受賂以立華氏使相宋公甚矣故特書其所為而曰成宋亂夫臣為君隠子為父隠禮也此其目言之何桓惡極矣臣子欲盡隱之而不可以欺後世其曰成宋亂而不書立華氏猶為有隱乎爾春秋列㑹未有言其所為者獨此與襄公末年㑹于澶淵各書其事者桓弑隠督弑殤般弑景皆天下大惡聖人所為懼春秋所以作也一則受宋賂而立華氏一則謀宋災而不能討故特書其事以示貶焉然澶淵之㑹既不書魯卿又貶諸國之大夫而稱人此則書公又序諸侯之爵何也澶淵之㑹欲謀宋災而不討弑君之賊雖書曰宋災故而未能表其誅責之意也必深諱魯卿而重貶諸國之大夫然後足以啟問者見是非也稷之㑹前有宋督弑君後有取宋鼎之事書曰成宋亂則其責已明不必諱公與貶諸侯之爵次然後見其罪矣夏四月取郜大鼎于宋戊申納于大廟左氏傳非禮也榖梁傳桓内弑其君外成人之亂受賂而退以事其祖非禮也其道以周公為弗受也伊川先生解四國既成宋亂而宋以鼎賂魯齊陳鄭皆有賂魯以為功而受之故書取以成亂之賂器置於周公之廟周公其饗之乎故書納納者弗受而强致之也杜氏注大廟周公廟也泰山孫氏曰甚之也髙郵孫氏曰鼎自宋得之然而謂之郜大鼎者鼎之成自郜也凡物皆有以名之若和氏之璧雲和之琴瑟之類是也公榖更論郜鼎之名煩碎無足取焉武夷胡氏傳取者得非其有之稱納者不受而强致之謂弑逆之賊不能致討而受其賂器置於大廟以明示百官是教之習為弑逆叛亂之行也公子牙慶父仲遂意如之惡又何誅焉聖人為此懼而作春秋故直載其事謹書其日垂訓後世使知寵賂之行保邪廢正能敗人之國家也亦或知戒矣秋七月杞公榖並作紀侯来朝左氏傳杞侯来朝不敬杞侯歸乃謀伐之榖梁傳桓内弑其君外成人之亂紀即是事而朝之惡之也伊川先生解凡杞稱侯者皆當為紀杞爵非侯文誤也及紀侯大去其國之後杞不復稱侯矣武夷胡氏傳公榖程氏以杞為紀桓弟弑兄臣弑君天下之大惡王與諸侯不奉天討反行朝聘之禮則皆有貶焉所以存天理正人倫也紀侯来朝何獨無貶乎當是時齊欲滅紀紀侯求魯為之主非為桓立而朝之也蔡侯鄭伯㑹于鄧左氏傳始懼楚也杜氏注楚國今南郡江陵縣北紀南城也楚武王始僭號稱王欲害中國蔡鄭姬姓近楚故懼而㑹謀公羊傳離不言㑹此其言㑹何蓋鄧與㑹爾劉氏權衡曰蔡侯鄭伯㑹于鄧公羊曰離不言㑹而言㑹者蓋鄧與㑹也非也二國相㑹理不可言蔡侯鄭伯及于某且實行㑹禮非㑹而何承赴而書故不甚見爾乃据齊侯鄭伯如紀以為比例彼自亦妄説何可据乎所謂離不言㑹者左氏得之矣伊川先生解始懼楚也杜氏注潁川召陵縣西南有鄧城武夷胡氏傳案左氏曰始懼楚也其地以國鄧亦與焉楚自西周已為中國之患宣王蓋嘗命將南征矣及周東遷僭號稱王憑陵江漢此三國者地與之鄰是以懼也其後卒滅鄧虜蔡侯而鄭以王室懿親為之服役終春秋之世聖人蓋傷之也夫天下莫大於理莫彊於信義循天理惇信義以自守其國家荆楚雖大何懼焉不知本此事醜徳齊莫能相尚則以地之大小力之彊弱分勝負矣觀諸侯㑹盟離合之迹而世道盛衰之由可攷也觀春秋進退與奪抑揚之㫖則知安中夏待四國之道矣九月入杞左氏傳討不敬也伊川先生解將卑而師少外則稱人内則止曰入某伐某吕氏曰入杞微者也其事弗詳然則何以書曰天子在上諸侯擅相攻伐入人之國罪之大者聖人以為無王也春秋所由作也公及戎盟于唐冬公至自唐左氏傳公及戎盟于唐修舊好也杜氏注惠隱之好冬公至自唐告於廟也凡公行告於宗廟反行飲至舍爵䇿勲焉禮也特相㑹往来稱地讓事也自參以上則往稱地来稱㑹成事也伊川先生解君出而書至者有三告廟也過時也危之也桓公弑立嘗與鄭齊陳㑹矣皆同為不義及逺與戎盟故危之而書至戎若不如三國之黨惡則討之矣居夷浮海之意也中國既不知義夷狄或能知之也髙郵孫氏曰春秋書至者皆志其所出之事以地至者四而已此年公至自唐文十七年公至自榖定八年公至自瓦十年夏公至自夾谷四處爾趙子以為魯地則至自地此説是也常山劉氏曰古者諸侯朝㑹有常節出入有常期周衰已後無法而妄行征伐㑹盟紛紛四出棄社稷委人民往越月踰歳而後得反觀其所書而其亂自著焉矣三年春正月公㑹齊侯于嬴左氏傳成㛰於齊也伊川先生解桓公弑君而立元年書王以王法正其罪也二年宋督弑其君以王法正其罪也三年不書王見桓之無王也㑹齊侯于嬴成㛰於齊也杜氏注嬴齊邑今泰山嬴縣劉氏傳二年有王未畢喪也武夷胡氏傳桓公三年而後經不書王有以為周不班厯者昭公末年王室有子朝之亂豈暇班厯而經皆書王非不班厯明矣又有以為此闕文也安得一公之内凡十四年皆不書王其非闕文亦明矣然則云何桓公弑君而立至於今三年而諸侯之喪事畢矣是入見受命於天子之時也而王朝之司馬不施殘執之刑鄰國之大夫不聞有沐浴之請魯之臣子義不戴天反面事讎曽莫之恥使亂臣賊子肆其凶逆無所忌憚人之大倫滅矣故自是而後不書王者見桓公無王與天王之失政而不王也夏齊侯衞侯胥命于蒲左氏傳不盟也公羊傳胥命者何相命也何言乎相命近正也此其為近正奈何古者不盟結言而退伊川先生解二國為㑹約言相命而不為盟詛近於理也故善之杜氏注蒲衞地在陳留長垣縣西南劉氏傳胥命者何相命也何言乎相命古者有方伯有州牧有卒正有連率命於天子正也諸侯自相命非正也齊太公之後東州之侯也衞康叔之後北州之侯也以事相命也六月公㑹杞公作紀侯于郕公作盛左氏傳杞求成也杜氏注二年入杞故来求成伊川先生解自桓公篡立無歳不與諸侯盟㑹結外援以自固也襄陵許氏曰姻大國服小國著得意也天下無王而後亂人得意如此秋七月壬辰朔日有食之既公羊傳既者何盡也伊川先生解既盡也食盡為異大也杜氏注厯家之説謂日光以望時遥奪月光故月食日月同㑹月掩日故日食公子翬如齊逆女伊川先生解翬於隠世不稱公子隠之賊也於桓世稱公子桓之黨也卿逆夫人於禮為稱翬雖尊屬當官而行亦無嫌也泰山孫氏曰孔子曰關雎樂而不淫哀而不傷孔子之言豈徒然哉蓋傷周室陵遲㛰姻失道無賢女輔佐君子致關雎后妃之徳以化天下也是時文姜亂魯驪姬惑晉南子傾衞夏姬喪陳上下化之滔滔皆是不可悉舉也故自隠而下夫人内女出處之迹皆詳而録之以懲以戒為萬世法噫夫夫婦婦風教之始人倫之本也可不重乎武夷胡氏傳娶妻必親逆禮之正也若夫邦君以爵則有尊卑以國則有大小以道途則有逺邇或迎之於其國或迎之於境上或迎之於所館禮之節也紀侯於魯以小大言則親之者也而使履緰来魯侯於齊以逺邇言則親之者也而使公子翬往是不重大㛰之禮失其節矣故書九月齊侯送姜氏于讙公㑹齊侯于讙左氏傳非禮也凡公女嫁於敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之公羊傳諸侯越竟送女非禮也此入國矣何以不稱夫人自我言齊父母之於子雖為鄰國夫人猶曰吾姜氏榖梁傳禮送女父不下堂母不出祭門諸母兄弟不出闕門父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申之曰謹慎從爾父母之言送女踰竟非禮也伊川先生解齊侯出疆送女公逺㑹之皆非義也杜氏注讙魯地濟北蛇丘縣西有下讙亭武夷胡氏傳為齊侯来乃逆而㑹之于讙是公之行其重在齊侯而不在姜氏豈禮也哉夫人姜氏至自齊公羊傳翬何以不致得見乎公矣榖梁傳其不言翬之以来何也公親受之於齊侯也伊川先生解告一作見於廟也泰山孫氏曰此齊侯送姜氏公受之於讙也公受姜氏於讙不以讙至者不與公受姜氏於讙也故曰夫人姜氏至自齊以正其義冬齊侯使其弟年来聘左氏傳致夫人也伊川先生解致夫人也稱弟義見隱七年襄陵許氏曰隱桓之時大夫尚輕相如不書諸侯使其子弟之来則書貴貴之義也自嬴之㑹至於仲年来聘備紀姜氏如此謹昬義也春秋反復意有所致者不可不察也必有深誡其中故志文姜悉者閑其亂也録伯姬詳者矜其節也是以易著歸妹家人之大義可不重哉有年公羊傳恃有年也榖梁傳五榖皆熟為有年也伊川先生解書有年紀異也人事順於下則天氣和於上桓弑君而立逆天理亂人倫天地之氣為之謬戾水旱凶災乃其冝也今乃有年故書其異宣公為弑君者所立其惡有間故大有年則書之髙郵孫氏曰春秋二百四十二年之乆而書有年大有年者二處而已其一即桓公是也其一即宣公是也宣桓大惡者是行何道而致有年乎書之者不冝有也武夷胡氏云舊史災異與慶祥並記故有年大有年得見於經若舊史不記聖人亦不能附益之也然十二公多歴年所有務農重榖閔雨而書雨者豈無豐年而不見於經是仲尼於他公皆削之矣獨桓有年宣大有年則存而弗削者縁此二公獲罪於天冝得水旱凶災之譴今乃有年則是反常也故以為異特存爾然則天道亦僭乎桓宣享國十有八年獨此二年書有年他年之歉可知也而天理不差信矣此一事也在不修春秋則為慶祥君子修之則為變異是聖人因魯史舊文能立興王之新法也故史文如書筆經文如化工嘗以是觀非聖人莫能修之審矣有年大有年先儒說經者多列於慶瑞之門至程氏發明奥㫖然後以為記異此得於言意之表者也四年春正月公狩于郎左氏傳書時禮也公羊傳常事不書此何以書譏何譏爾逺也諸侯曷為必田狩一曰乾豆二曰賔客三曰充君之庖伊川先生解公出動衆皆當書于郎逺也杜氏注周之春夏之冬也田狩從夏時郎非國内之狩地故書地何氏注禽獸多則傷五榖因習兵事又不空設故因以捕禽獸所以共承宗廟示不忘武備又因以為田除害陸氏纂例啖子曰蒐狩合禮者常事不書非時及越禮而為之則書以示譏也趙子曰四時之田其事各殊其名亦異春以閱武擇材故以蒐為稱夏以為苗除害故以苗為名秋則順天時以殺物故以獮為義冬則因守禽獸以習戰故以狩為目左氏曰春蒐夏苗秋獮冬狩是也周禮爾雅並同此義劉氏意林公狩于郎徒非其地爾而書之此春秋謹於微之意也以謂微事不謹則大事不立故每慎其微而後王徳全矣武夷胡氏傳譏逺也不時則傷農不地則害物田狩之地如鄭有原圃秦有具囿皆常所也夏天王使宰渠伯糾来聘伊川先生解桓公弑其君而立天子不能治天下莫能討而王使其宰聘之示加尊寵天理滅矣人道亡矣書天王言當奉天也而其為如此名糾尊卑貴賤之義亡也人理既滅天運乖矣隂陽失序歳功不能成矣故不具四時劉氏傳渠伯者何爵也劉氏意林春秋於大夫莫書其官至冢宰獨書之以此見任事之最重也宰天下者莫名至糾獨名之以此見責之最備也周公作周禮冢宰之職固賞善誅惡進賢而退不肖今銜命下聘弑逆之人故書名貶之武夷胡氏傳王朝公卿書爵大夫書字上士中士書名下士書人例也糾位六卿之長降從中士之例而書名貶也於糾何貶乎在周制大司馬九伐之法諸侯而有賊殺其親則正之放弑其君則殘之桓公之行當此二者舍曰不討而又聘焉失天職矣操刑賞之柄以御下者王也論刑賞之法以詔王者宰也以經邦國則有治典以安邦國則有教典以平邦國則有政典以詰邦國則有刑典治教政刑而謂之典此天下之大常也太宰所掌而獨謂之建以此典太宰之所定也乃為亂首承命以聘弑君之賊乎故特貶而書名以見宰之非宰也夫咺賵仲子糾聘桓公其事皆三綱之所繫也然咺獨書官糾兼稱爵何也如咺者豈初得政猶未受封而糾則或以諸侯入相或既相而已封者乎漢初命相必擇列侯為之後用公孫因相而得封蓋欲倣古重其任也任之重則責益深矣嫡妾之分君臣之義天下之大倫無所輕重糾以既封故兼稱爵見春秋責相之意也杜氏注不書秋冬首月史闕文五年春正月甲戌己丑陳侯鮑卒左氏傳再赴也於是陳亂文公子佗殺太子免而代之公疾病而亂作國人分散故再赴榖梁傳鮑卒何為以二日卒之春秋之義信以傳信疑以傳疑伊川先生解五年春正月甲戌下文闕陸氏纂例甲戌下脱也劉氏意林正月甲戌史之闕文與非也仲尼之後俄然亡之夏齊侯鄭伯如紀左氏傳齊侯鄭伯朝於紀欲以襲之紀人知之伊川先生解齊侯鄭伯朝於紀欲以襲之紀人知之齊為諸侯而欲為賊於鄰國不道之甚鄭伯助之其罪均矣陸氏纂例趙子曰外相如不書凡書皆譏也常山劉氏曰外諸侯相如唯此年齊侯鄭伯如紀及是年州公如曹劉氏傳齊侯鄭伯將襲紀以朝往焉紀人知之然後以朝反如者朝辭也蓋尊不朝乎卑大不朝乎小强不朝乎弱不正其為詐以圖人之國使若誠朝然疾之也劉氏意林齊侯鄭伯如紀春秋惡其懐不義之心雖卒不能害而疾之與襲侵人之國無異此聖人誅意之效也故云兵莫憯於志莫邪為下矣天王使仍榖作任叔之子来聘左氏傳弱也公羊傳其稱仍叔之子何譏何譏爾譏父老子代從政也伊川先生解古之授任稱其才徳故士無世官周衰官人以世故卿大夫之子代其父任事仍叔受命来聘而使其子代行也武夷胡氏傳仍叔之子云者譏世官非公選也帝王不以私愛害公選故仕者世禄而不世官任之不以其賢也使之不以其能也卿大夫子弟以父兄故而見使則非公選而政由是敗矣上世有自耕野釣渭擢居輔相而人莫不以為冝伊陟象賢復相大戊丁公世美入掌兵權不以世故疑之也崇伯殛死禹作司空蔡叔既囚仲為卿士亦不以其父故廢之也惟其公而已矣及周之衰小人得政視朝廷官爵為己私援引親黨分據要途施及童稚賢者退處於蓽門老身而不用公道不行然後夷狄侵陵國家傾覆雖有智者不能善其後矣春秋書武氏仍叔之子云者戒後世人主徇大臣私意而用其子弟之弱者居公選之地以敗亂其國家欲其深省之也吕氏曰王不能討桓之逆比年遣人来聘其無立志也可知矣葬陳桓公城祝丘泰山孫氏曰祝丘魯邑秋蔡人衞人陳人從王伐鄭左氏傳王奪鄭伯政鄭伯不朝秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父將右軍蔡人衞人屬焉周公黒肩將左軍陳人屬焉戰於繻葛蔡衞陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩公羊傳從王正也伊川先生解王師於諸侯不書敗諸侯不可敵王也於夷狄不言戰夷狄不能抗王也此理也其敵其抗王道之失也陸氏纂例啖子曰不言㑹及臣從君之亂也陸氏微㫖三國之君不行而使微者從王不待貶絶而罪自見也武夷胡氏傳案左氏王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之戰於繻葛王卒大敗春秋書王必稱天者所章則天命也所用則天討也王奪鄭伯政而怒其不朝以諸侯伐焉非天討也故不稱天或曰鄭伯不朝惡得為無罪曰桓公弑君而自立宋督弑君而得政天下大惡天理所不容也則遣使来聘而莫之討鄭伯不朝貶其爵可也何為憤怒自將以攻之也移此師以加宋魯誰曰非天討乎春秋天子之事述天理而時措之也既譏天王以端本矣三國以兵㑹伐則言從王者又以明君臣之義也君行而臣從正也戰於繻葛而不書戰王卒大敗書而不書敗者又以存天下之防也三綱軍政之本聖人寓軍政於春秋而書法若此皆裁自聖心非國史所能與也大雩左氏傳書不時也劉氏權衡曰書不時也非也龍見而雩常事爾遇旱而雩非常也非常當書書為旱發非為過時發也且此下書螽螽之為物常因旱而生此雩非失時者自為旱故也凡祀啟蟄而郊杜氏注啟蟄夏正建寅之月祀天南郊劉氏權衡曰啟蟄而郊亦非也魯郊以周正周郊以夏正不專啟蟄而已龍見而雩杜氏注龍見建巳之月蒼龍宿之體昬見東方萬方始盛祭天為百榖祈膏雨始殺而嘗杜氏注建酉之月隂氣始殺嘉榖始熟故薦嘗於宗廟閉蟄而烝杜氏注建亥之月萬物皆成可薦者衆故烝祭宗廟過則書公羊傳大雩者何旱祭也何以書記災也伊川先生解成王尊周公故賜魯重祭得郊禘大雩大雩雩於上帝用盛樂也諸侯雩於境内之山川爾成王之賜魯公之受皆失道也故夫子曰魯之郊禘非禮也周公其衰矣大雩歳之常祀不能皆書也故因其非時則書之遇旱災則非時而雩書之所以見其非禮且志旱也郊禘亦因事而書劉氏傳其言大何大雩非諸侯之雩也曷為非諸侯之雩天子雩主上帝諸侯雩主星辰山川劉氏意林大雩為説者皆曰成王尊周公故賜魯以天子之禮樂祀上帝禘文王吾未知其然成王者周之盛主也其亦謹於禮矣禮之有天子諸侯之别自伏羲以来未之有改也成王其惑歟然則魯之有天子禮樂殆周之末王賜之非成王矣昔者魯惠公使宰讓請郊廟之禮於天子天子使史角往惠公止之其後在魯實始為墨翟之學由是觀之使成王之世而魯已郊矣則惠公奚請惠公之請也其殆由平王以下乎泰山孫氏曰雩求雨之祭建巳之月常祀也故經無六月雩者建午建申之月非常則書謂之大者雩於上帝也噫是時周室既微王綱既絶舉於魯則諸侯之僭從可見矣然春秋魯史孔子不敢斥也其或災異非常改作不時者則從而録之以著其僭天子之惡隠五年九月考仲子之宫初獻六羽此年秋大雩六年八月壬午大閱閔二年夏五月乙酉吉禘于莊公僖三十一年夏四月四卜郊不從乃免牲宣三年春王正月郊牛之口傷改卜牛牛死乃不郊定二年夏五月壬辰雉門及兩觀災之類是也嗚呼其㫖亦微矣武夷胡氏傳魯諸侯而郊禘大雩欲悉書於䇿則有不勝書故雩祭則因旱以書而特謂之大郊禘亦因事以書而義自見此皆國史所不能與君子以謂性命之文是也螽公作􅏑公羊傳􅏑何以書記災也伊川先生解螽蝗也既旱又蝗饑不待書也杜氏注蚣蝑之屬冬州公如曹左氏傳冬淳于公如曹度其國危遂不復杜氏注淳于州國所都城陽淳于縣也伊川先生解州公嘗為王三公故稱公不能保其國去如曹遂不復杜氏注曹國今濟隂定陶縣武夷胡氏傳外相如不書此何以書將有其末故先録其本六年春正月寔来左氏傳春自曹来朝書曰寔来不復其國也杜氏注承五年冬傳淳于公如曹也伊川先生解五年冬如曹尚為君也故以諸侯書之今不能反國則匹夫也故名之来来魯也忽稱鄭忽明其正也寔不稱州亡其國也泰山孫氏曰闕文也武夷胡氏傳案左氏自曹来朝書曰寔来不復其國也寔者州公名也春秋之法諸侯不生名失地滅同姓則名正名經世之本名正而天下定矣或曰諸侯失國之後託於諸侯孟子以為禮也今州公来朝將以諸侯之禮接之乎則春秋乃書其名將以匹夫之賤畜之乎孟子乃以託國為禮將何處而可曰世衰道微諸侯放恣彊陵弱衆暴寡天子不能正方伯不能治其有壤地褊小迫乎大國之間而失國是不幸焉非其罪也則以諸侯之禮接之可也若譚子在莒弦子在黄温子在衞雖失國出奔而春秋不名義可見矣若夫不能修道以正其國或棄賢保佞或驕奢淫縱或用兵暴亂自厎滅亡如蔡獻舞邾益曹陽州寔之徒皆其自取焉爾則待之以初乃禮之過也觀春秋名與不名則知所以處寓公之禮與強為善自暴棄者之勸戒矣夏四月公㑹紀侯于成榖作郕左氏傳紀来諮謀齊難也伊川先生解謀齊難也杜氏注成魯地在泰山鉅平縣東南秋八月壬午大閱左氏傳簡車馬也公羊傳何以書蓋以罕書也伊川先生解為國之道武備不可廢必於農隙講肄保民守國之道也盛夏大閱妨農害人失政之甚無事而為之妄動也有警而為之教之不素何以保其國乎杜氏注齊為大國以戎事徴諸侯之戍嘉美鄭忽而忽欲以有功為班怒而訴齊魯人懼之故以非時簡車馬武夷胡氏傳先王寓軍政於四時之田訓民禦暴其備豫也懼鄭忽畏齊人不因田狩而閱兵車厲農失政甚矣何以保其國乎春秋非特以不時非禮書也乃天未隂雨徹彼桑土綢繆牖户之意襄陵許氏曰桓蓋聞齊圖紀之謀見周伐鄭之事是以飭城守閱武備蓋其謀國知此而已觀其用衆之不時知其志不在民矣蔡人殺陳佗伊川先生解佗弑世子而竊位不能有其國故書曰陳佗陳厲公蔡出也故蔡桓侯殺佗而立之佗天下之大惡人皆得而誅之蔡侯殺之實以私也故書蔡人見殺賊者衆人之公也陸氏微㫖淳聞於師曰臣弑其君子弑其父凡在官者殺無赦陳佗殺太子之賊也蔡雖他國以義殺之變之正也故書曰蔡人武夷胡氏傳書蔡人以善蔡書陳佗以善陳善蔡者以蔡人知佗之為賊善陳者以陳國不以佗為君知其為賊故稱人稱人討賊之辭也不以為君故稱名稱名當討之賊也魯桓弑君而鄭伯與之盟宋督弑君而四國納其賂則不知其為賊矣齊商人弑君者及其見殺則稱位蔡般弑父者及其見殺則稱爵是齊蔡國人皆以為君矣聖人於此抑揚予奪遏人欲於横流存天理於既滅見諸行事可謂深切著明矣九月丁卯子同生左氏傳以大子生之禮舉之公羊傳何言乎子同生喜有正也劉氏權衡曰國之嫡嗣莫重焉史無得不書以為感隱桓之禍故以喜書不亦淺近乎伊川先生解冢嗣之生國之大事故書劉氏傳此世子也其不曰世子何天下無生而貴者誓於天子然後為世子冬紀侯来朝左氏傳紀侯来朝請王命以求成於齊公告不能伊川先生解紀侯懼齊来朝以求助不能上訴於天子近赴於諸侯和輯其民人效死以守而欲求援於魯桓不能保其國宜矣武夷胡氏傳案左氏㑹于郕咨謀齊難也冬来朝請王命以求成於齊也公告不能孟子曰觀近臣以其所為主觀逺臣以其所主主者成敗之機榮辱之本也昭公棄晉主齊至於客死鄭伯逃齊主楚終以乞盟觀其所主而榮辱成敗見矣魯桓者弑君之賊人人所同惡夫人得而討之也而主之以求援其能國乎然則何以免於貶志不在於朝桓也春秋集解卷三
