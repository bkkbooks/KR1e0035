body:
  text: 春秋集解卷二十八宋吕本中撰定公八年春王正月公侵齊公至自侵齊左氏傳正月公侵齊門於陽州師退冉猛僞傷足而先其兄㑹乃呼曰猛也殿二月公侵齊三月公至自侵齊左氏傳公侵齊攻廩丘之郛泰山孫氏曰公一嵗而再侵齊以重其怨甚矣曹伯露卒夏齊國夏帥師伐我西鄙左氏傳夏齊國夏髙張伐我西鄙襄陵許氏曰春秋書內伐十六宣以後七內侵七宣以後六伐我二十一宣以後十七侵我五宣以後一用兵則侵多而伐少被兵則伐多而侵少蓋魯自中世衰矣而欲與齊搆怨以侵易伐其能久乎公㑹晉師于瓦公至自瓦左氏傳晉士鞅趙鞅荀寅救我公㑹晉師于瓦范獻子執羔趙簡子中行文子皆執鴈魯於是始尚羔杜氏注瓦衛地東郡燕縣東北有瓦亭武夷胡氏傳案左氏晉士鞅荀寅救魯則其書公㑹晉師何也春秋大法雖師次於君而與大夫敵至用大衆則君與大夫皆以師為重而不敢輕也故棐林之㑹不言趙盾而言晉師瓦之㑹言晉師而不書士鞅於以見人臣不可取民有衆專主兵權之意陳氏厚施於齊以移其國季孫盡征於魯以奪其民皆王法所禁也春秋之義行則不得為爾矣秋七月戊辰陳侯柳卒晉士公作趙鞅帥師侵鄭遂侵衛左氏傳晉師將盟衛侯於鄟澤趙簡子曰羣臣誰敢盟衛君者涉他成何曰我能盟之衛人請執牛耳成何曰衛吾溫原也焉得視諸侯將歃涉他捘衛侯之手及捥衛侯怒叛晉晉人請改盟弗許秋晉士鞅㑹成桓公侵鄭圍蟲牢報伊闕也杜氏注六年鄭伐周闕外晉為周報之遂侵衛葬曹靖公九月葬陳懷公杜氏注三月而葬速季孫斯仲孫何忌帥師伐衛左氏傳九月師侵衛晉故也冬衛侯鄭伯盟于曲濮杜氏注結叛晉曲濮衛地從祀先公盜竊寶玉大弓左氏傳季寤公鉏極公山不狃皆不得志於季氏叔孫輒無寵於叔孫氏叔仲志不得志於魯故五人因陽虎陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏已更孟氏冬十月順祀先公而祈焉辛卯禘於僖公杜氏注順祀之義當退僖公懼於僖神故於僖廟行順祀壬辰將享季氏於蒲圃而殺之戒都車曰癸巳至成宰公斂處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子先備諸與孟孫以壬辰為期陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿將如蒲圃桓子咋謂林楚曰而先皆季氏之良也爾以是繼之對曰臣聞命後陽虎為政魯國服焉違之徴死死無益於主桓子曰何後之有而能以我適孟氏乎孟氏選圉人之壯者三百人以為公期築室於門外林楚怒馬及衢而騁陽越射之不中築者闔門陽虎劫公與武叔以伐孟氏公斂處父帥成人自上東門入與陽氏戰於南門之內弗勝又戰於棘下陽氏敗陽虎說甲如公宫取寶玉大弓以出陽虎入於歡陽關以叛劉氏權衡曰且虎之謀三桓冝使三桓不知今明白而祈三桓聞之虎何以能集其意邪意者虎實惡季氏季氏以臣而陵君猶僖公以子而先父矣不敢察察言故先正逆祀以微諭其意功成事立而後其指可見耳虎既敗走魯人又薄其行則謂虎之順祀祈作亂也其實不然何以知之曰祈則謀泄謀泄則事危虎必不為也公羊傳從祀者何順祀也文公逆祀去者三人定公順祀叛者五人盜者孰謂謂陽貨也寶者何璋判白弓繡質龜青純榖梁傳從祀先公貴復正也寶玉者封圭也大弓者武王之戎弓也周公受賜藏之魯杜氏注從順也先公閔公僖公也將正二公之位次所順非一親盡故通言先公盜謂陽虎也家臣賤名氏不見故曰盜劉氏傳從者何順也其祀何禘也禘則曷為不言禘譏何譏爾從祀先公正也所以從祀先公則非正也其非正奈何陽虎專季氏季氏專魯陽虎欲去三桓而伐之從祀先公以說焉非能正者也其義君子不與也蘇氏曰是時陽虎以鄆歡龜隂叛奔齊十年侯犯以郈叛及昭十三年南蒯以費叛皆以賤不書書竊寶玉大弓何也分器重於地分器重於地者賤貨而貴命也九年春王正月夏四月戊申鄭伯蠆公作囆卒得寶玉大弓左氏傳夏陽虎歸寶玉大弓杜氏注無益近用而祗為名故歸之六月伐陽關陽虎使焚萊門師驚犯之而出奔齊公羊傳何以書國寶也喪之書得之書武夷胡氏傳穀梁子曰寶玉封圭大弓武王之戎弓周公受賜藏之魯又曰夏后氏之璜封父之繁弱也子孫世守罔敢失墜以昭先祖之德存肅敬之心爾古者告終易代𢎞璧琬琰天球夷玉兊之戈和之弓垂之竹矢莫不陳列非直為美觀也先王所寶傳及其身能全而歸之則可以免矣魯失其政陪臣擅權雖先公分器猶不能守而盜得竊諸公宫其能國乎故失之書得之書所以譏公與執政之臣見不恭之大也此義行則有天下國家者各知所守之職不敢忽矣六月葬鄭獻公杜氏注三月而葬速秋齊侯衛侯次于五氏左氏傳秋齊侯伐晉夷儀晉車千乘在中牟衛侯將如五氏杜氏注齊侯在五氏將往助之卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟中牟人欲伐之衛褚師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤遇必敗之不如從齊乃伐齊師敗之齊侯致禚媚杏於衛杜氏注五氏晉地襄陵許氏曰此伐晉也而曰次何諱伐晉也何諱乎往晉為盟主崇也前此不諱此何以諱存之也王道衰則存王霸業替則存霸公室微則存公此春秋經世撥亂之志也以是春秋之初諱伐王春秋之季諱伐霸世至無霸而中國危矣秦伯卒冬葬秦哀公襄陵許氏曰秦自晉悼以後寖不見於春秋則知秦益退保西戎軍旅禮聘之事不交於中國矣十年春王三月及齊平杜氏注平前八年再侵齊之怨夏公㑹齊侯于夾公穀作頰下同谷公至自夾谷左氏傳夏公㑹齊侯於祝其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉齊侯從之孔丘以公退曰士兵之兩君合好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於德為愆義於人為失禮君必不然齊侯聞之遽辟之將盟齊人加於載書曰齊師出竟而不以甲車三百乘從我者有如此盟孔丘使兹無還揖對曰而不反我汶陽之田吾以共命者亦如之齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉事既成矣而又享之是勤執事也且犧象不出門嘉樂不野合饗而既具是棄禮也若其不具用秕稗也用秕稗君辱棄禮名惡子盍圖之夫享所以昭德也不昭不如其已也乃不果享榖梁傳離㑹不致何為致也危之也危之則以地致何也為危之也其危奈何曰頰谷之㑹孔子相焉兩君就壇兩相相揖齊人鼓譟而起欲以執魯君孔子歷階而上不盡一等而視歸乎齊侯曰兩君合好夷狄之民何為來為命司馬止之齊侯逡巡而謝曰寡人之過也退而屬其二三大夫曰夫人率其君與之行古人之道二三子獨率我而入夷狄之俗何為罷㑹齊人使優施舞於魯君之幕下孔子曰笑君者罪當死使司馬行法焉首足異門而出齊人來歸鄆歡龜隂之田蓋為此也因是以見雖有文章必有武備孔子於頰谷之㑹見之矣晉趙鞅帥師圍衛左氏傳晉趙鞅圍衛報夷儀也襄陵許氏曰使晉有以報齊則衛可無用兵而服也今圍衛而不能服則徒足以堅齊之從而已矣齊人來歸鄆公作運歡龜隂穀有之字田公羊傳齊人曷為來歸鄆歡龜隂田孔子行乎季孫三月不違齊人為是來歸之伊川先生解齊服義而來歸之故書來歸始失不書解在哀八年杜氏注三邑皆汶陽田也泰山博縣北有龜山隂田在其北也劉氏意林仲尼一言爾威重於三軍豈有他哉順其理故也武夷胡氏傳齊人前此嘗歸濟西田矣後此嘗歸歡及闡矣而此獨書來歸何也曰歸者魯請而得之也曰來歸者齊人心服而歸之也桓公以義責楚而楚人求盟夫子以禮責齊而齊人歸地皆書曰來序績也春秋夫子之筆削自序其績可乎聖人㑹人物於一身通古今於一息曰天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如豫何而亦何嫌之有叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈公作費左氏傳初叔孫成子欲立武叔公若藐固諫曰不可成子立之而卒武叔既定使郈馬正侯犯殺公若弗能其圉人杜氏注武叔之圉人殺公若侯犯以郈叛武叔懿子圍郈弗克秋二子及齊師復圍郈弗克叔孫謂郈工師駟赤曰郈非惟叔孫氏之憂社稷之患也將若之何對曰臣之業在揚水卒章之四言矣駟赤謂侯犯曰子盍求事於齊侯犯從之齊使至駟赤與郈人為之宣言於郈中曰侯犯將以郈易於齊衆凶懼謂侯犯侯犯請行許之駟赤止而納魯人侯犯奔齊杜氏注郈叔孫氏邑武夷胡氏傳郈叔孫氏邑也侯犯以郈叛不書於策書圍郈則叛可知矣再書二卿帥師圍郈則彊亦可知矣天子失道征伐自諸侯出而後大夫彊諸侯失道征伐自大夫出而後家臣彊其逆彌甚則其失彌速故自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣三家專魯為日既久至是家臣爭叛亦其理宜矣春秋制法本忠恕施諸己而不願亦勿施於人故所惡於上不以使下所惡於下不以事上二三子知傾公室以自張而不知家𨽻之擬其後也凡此類皆據事直書深切著明矣宋樂大公作世心出奔曹宋公子地公作池出奔陳左氏傳九年春宋公使樂大心盟於晉且逆樂祁之尸辭僞有疾乃使向巢如晉盟且逆子梁之尸子明謂桐門右師出曰吾猶衰絰而子擊鐘何也右師曰喪不在此故也既而告人曰已衰絰而生子余何故舍鐘子明聞之怒言於公曰右師將不利戴氏不肯適晉將作亂也不然無疾乃逐桐門右師十年宋公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子為君禮不過出竟君必止之公子地出奔陳公弗止辰為之請弗聽辰曰是我迋吾兄也吾以國人出君誰與處冬母辰暨仲他石彄出奔陳冬齊侯衛侯鄭游速公作遫㑹于安甫公安甫作安革杜氏注安甫地闕叔孫州仇如齊宋公之弟辰暨公穀有宋字仲他石彄出奔陳泰山孫氏曰宋公失道其弟辰暨仲孫他石彄出奔陳暨不得已也仲他石彄為宋大臣不能以道事君為辰彊牽而去故曰宋公之弟辰暨仲他石彄出奔陳以交譏之也武夷胡氏傳其弟云者罪宋公以嬖魋故以失二弟無親親之恩暨云者罪辰以兄故帥其大夫出奔無尊君之義夫暨者不得已之詞又以見仲他石彄見脅於辰不能自立無大臣之節也十有一年春宋公之弟辰及仲他石彄公子地公作池自陳入于蕭以叛夏四月秋宋樂大公作世心自曹入于蕭左氏傳春宋公母弟辰暨仲他石彄公子地入于蕭以叛秋樂大心從之大為宋患寵向魋故也榖梁傳及仲他石彄公子地以尊及卑也自陳陳有奉焉爾入于蕭以叛入者內弗受也以者不以者也叛直叛也劉氏傳及之者何從也向謂之暨今曷為謂之及從出奔陳謂之暨則可自陳入于蕭以叛謂之暨則不可事君者可貧可賤可殺而不可使為亂劉氏意林以此見春秋之斷獄詳矣其出也謂之暨其入也謂之及及非不得已之言也得已而不已之說也君親無將將而誅焉又況據邑以伐其君者乎其罪一施之冬及鄭平叔還如鄭涖公榖作蒞盟左氏傳冬及鄭平始叛晉也十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈左氏傳仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯公與三子入於季氏之宫登武子之臺費人攻之弗克入及公側仲尼命申句須樂頎下伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費公羊傳曷為帥師墮郈帥師墮費孔子行乎季孫三月不違曰家不藏甲邑無百雉之城於是帥師墮郈帥師墮費雉者何五版而堵五堵而雉百雉而城杜氏注墮毁也髙郵孫氏曰墮毁也是時三桓之邑皆以為自固其家臣因之以叛昭十三年叔弓圍費去年夏秋郈凡再圍於是一墮毁之衛公孟彄帥師伐曹左氏傳夏衛公孟彄伐曹克郊季孫斯仲孫何忌帥師墮費武夷胡氏傳三桓既微陪臣擅命憑恃其城數有叛者三家亦不能制也而問於仲尼遂墮三都是謂以禮為國可以為之兆也推而行諸魯國而凖則地方五百里凡侵小而得者必有興滅國繼絶世之義諸侯大夫各謹於禮不以所惡於上者使其下亦不以所惡於下者事其上上下交相順而王政行矣故曰苟有用我者期月而可三年有成秋大雩冬十月癸亥公㑹齊公作晉侯盟于黃十有一月丙寅朔日有食之公至自黃十有二月公圍成公至自圍成左氏傳將墮成公斂處父謂孟孫墮成齊人必至於北門且成孟氏之保障也無成是無孟氏也子僞不知我將不墮冬十二月公圍成弗克蘇氏曰孔子為魯司冦而仲由為季氏宰三家從之矣其不從者其家臣也家臣未能得魯衆也雖其不從不能為患此孔子之所以墮三都而無疑也武夷胡氏傳書公圍成彊也其致危之也仲由為季氏宰孔子為魯司寇而不能墮成何也案是冬公圍成弗克越明年孔子由大司寇攝相事然後誅少正卯與聞國政三月而商賈信於市男女别於途及齊人饋女樂孔子遂行然則圍成之時仲尼雖用事未能專得魯國之政也而辨言亂政如少正卯等必肆疑阻於其間矣成雖未墮無與為比亦不能為患使聖人得志行乎魯國以及朞月則不待兵革而自墮矣十有三年春齊侯衛侯穀無衛侯次于垂葭公作瑕左氏傳春齊侯衛侯次于垂葭實郥氏使師伐晉將濟河諸大夫皆曰不可邴意兹曰可鋭師伐河內傳必數日而後及絳絳不三月不能出河則我既濟水矣乃伐河內蘇氏曰二君使師伐晉次于垂葭以為之援夏築蛇淵囿襄陵許氏曰魯政不修而非時勤民築囿奉己而已志不及國矣圍成弗克歸而力此何振之有大搜于比蒲杜氏注夏搜非時衛公孟彄帥師伐曹秋晉趙鞅入于晉陽以叛左氏傳晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾歸告其父兄父兄皆曰不可衛是以為邯鄲而置諸晉陽絶衛之道也不如侵齊而謀之趙孟怒召午而囚諸晉陽遂殺午趙稷涉賔以邯鄲叛邯鄲午荀寅之甥也荀寅范吉射之姻也秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晉人圍之荀躒言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊髙彊曰三折肱知為良醫唯伐君為不可民弗與也我以伐君在此矣三家未睦可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐公國人助公二子敗從而伐之丁未荀寅士吉射奔朝歌韓魏以趙氏為請十二月辛未趙鞅入於絳盟於公宫哀公三年冬十月晉趙鞅圍朝歌師於其南荀寅伐其郛使其徒自北門入已犯師而出癸丑奔邯鄲四年九月趙鞅圍邯鄲冬十一月邯鄲降荀寅奔鮮虞趙稷奔臨十二月弦施逆之遂墮臨國夏伐晉取邢任欒鄗逆畤隂人盂壺口㑹鮮虞納荀寅於柏人五年春晉圍柏人荀寅士吉射奔齊榖梁傳以者不以者也叛直叛也陸氏微㫖趙子曰趙鞅之入晉陽拒范中行也而書曰叛者人臣不當專土也武夷胡氏傳趙鞅之入拒范中行也而直書曰叛何也人臣專土與君為市則是篡弒之階堅氷之戒豈無以有己之義乎後世大臣有困於讒間遷延居外不敢釋兵卒以憂死者亦未明人臣之義故爾故直書入于晉陽以叛入者不順之詞叛者不赦之罪冬晉荀寅公有及字士吉射入于朝歌以叛杜氏注吉射士鞅子武夷胡氏傳晉主夏盟威服天下及大夫專政賄賂公行內外離析示威平丘而齊叛辭請召陵而蔡叛盟于沙鹹而鄭叛次于五氏而衛叛涖于鄭㑹于夾谷歃于黃而魯叛諸侯叛於外大夫叛於內故奔于晉陽而趙鞅叛入于朝歌而荀寅與士吉射叛以晉國之大天下莫彊焉邦分崩而不能守也春秋於晉事或略而不序或賤而稱人或書侵以陋之責亦備矣至是三卿內叛直書於策見其效也故臧哀伯曰國家之敗由官邪也官之失德寵賂章也晉卿始禍緣衛貢也樂祈見執獻楊楯也蔡侯從吳荀寅貨也昭公弗納范鞅賂也而晉室自是不能復主盟矣故為國以義不以利春秋之大法在焉見諸行事亦可謂深切著明矣晉趙鞅歸于晉蘇氏曰鞅寅吉射之叛其罪鈞也鞅以有助故得復寅吉射以無援故終叛春秋無所與也鞅之言歸寅吉射既出則無難也武夷胡氏傳叛逆人臣之大惡始禍晉國之載書既不能致辟干鞅奉行天討以警亂臣又亢不衷徇韓魏之請而許之復無政刑矣其能國乎先儒或謂言歸者以地正國也鞅取晉陽之甲以逐君側之惡人則其說誤矣以地正國而可是人主可得而脅人臣擅興無罪以兵諫者真愛其君也使後世賊臣稱兵向闕以誅君側為名而實欲脅君取國者則此說啓之也大失春秋之意矣吕氏曰春秋之世大義不明據城以要其君者皆叛也而不自知其為大惡臧武仲以防求為後於魯則亦叛而已矣晉獻公使寺人披伐蒲重耳曰君父之命不校乃徇曰校者吾讎也踰垣而走其亦可以免於大戾矣趙鞅歸於晉以叛而歸言其自如亂之甚也歸易辭也不言入不以叛入也薛弒其君比武夷胡氏傳稱國以弒者當國大臣之罪也孫復以為舉國之衆皆可誅非矣三晉有國半天下若皆可誅刀鋸不亦濫乎潁川常秩曰孫復之於春秋動輒有罪蓋商鞅之法耳棄灰於道者有誅步過六尺者有罰其不即人心逺矣王回以是常秩此善議復者十有四年春衛公叔戍來奔衛公穀作晉趙陽出奔宋左氏傳初衛公叔文子朝而請享靈公退見史鰌而告之史鰌曰子必禍矣子富而君貪罪其及子乎文子曰然吾不先告子是吾罪也君既許我矣其若之何史鰌曰無害子臣可以免富而能臣必免於難上下同之戍也驕其亡乎及文子卒衛侯始惡於公叔戍以其富也公叔戍又將去夫人之黨夫人訴之曰戍將為亂十四年春衛侯逐公叔戍與其黨故趙陽奔宋戍來奔武夷胡氏傳公叔戍將去南子之黨夫人訴曰戍將為亂故公叔來奔趙陽北宫結皆戍黨也故亦出奔而靈公無道不能正家以喪其大臣之罪著矣戍又以富見惡於衛侯夫富者怨之府也使戍積而能散以財發身不為貪人之所怨於以保其爵位焉儻庶幾乎二月公作三月辛巳楚公子結陳公孫公作子他人帥師滅頓以頓子牂公作牄歸左氏傳頓子牂欲事晉背楚而絶陳好二月楚滅頓陸氏纂例凡書滅又書以歸及名者罪重於奔者也既責其不死位又責其無興復之志也夏衛北宫結來奔左氏傳夏衛北宫結來奔公叔戍之故也五月於越敗吳于檇公作醉李吳子光卒左氏傳吳伐越越子句踐禦之陳於檇李句踐患吳之整也使罪人三行屬劒於頸自剄師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬闔廬傷將指取其一屨還卒於陘去檇李七里夫差使人立於庭苟出入必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越哀公元年吳王夫差敗越於夫椒報檇李也遂入越越子以甲楯五千保於㑹稽使大夫種因吳大宰嚭以行成吳子將許之伍貟曰不可臣聞之樹德莫如滋去疾莫如盡句踐能親而務施施不失人親不棄勞與我同壤而世為仇讎於是乎克而弗取將又存之違天而長寇讎後雖悔之不可食已姬之衰也日可俟也介在蠻夷而長寇讎以是求霸必不行矣弗聽退而告人曰越十年生聚而十年教訓二十年之外吳其為沼乎三月越及吳平杜氏注於越越國也檇李吳郡嘉興縣南醉李城泰山孫氏曰檇李吳地武夷胡氏傳案左氏吳伐越句踐禦之患其整也使罪人三行屬劒於頸吳師屬目因伐之闔廬傷而卒書敗者詐戰也定公五年於越入吳至是敗吳于檇李㑹黃池之嵗越又入吳悉書於史以其告也哀之元年吳子敗越棲句踐於㑹稽之上豈獨不告而史冊不書疑仲尼削之也吳子光卒夫差使人立於庭苟出入必謂己曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越然則夫椒之戰復父讎也非報怨也春秋削而不書以為常事也其㫖微矣公㑹齊侯衛侯于牽公作堅公至自㑹左氏傳晉人圍朝歌公㑹齊侯衛侯於脾上梁之間杜氏注脾上梁間即牽謀救范中行氏杜氏注魏郡黎陽縣東北有牽城秋齊侯宋公㑹于洮左氏傳齊侯宋公㑹于洮范氏故也杜氏注洮曹地天王使石尚來歸脤公羊傳石尚者何天子之士也脤者何俎實也腥曰脤熟曰燔杜氏注石尚天子之士石氏尚名脤祭社之肉盛以脤器以賜同姓諸侯泰山孫氏曰天子祭社稷宗廟有與諸侯共福之禮此謂助祭諸侯也魯未嘗助祭天王使石尚來歸脤非禮也石尚士故衛世子蒯聵出奔宋衛公孟彄出奔鄭左氏傳衛侯為夫人南子召宋朝注南子宋女也朝宋公子舊通於南子在宋呼之㑹于洮太子蒯聵獻盂於齊過宋野野人歌之曰既定爾婁豬盍歸吾艾豭太子羞之謂戲陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵將殺余太子奔宋盡逐其黨故公孟彄出奔鄭自鄭奔齊劉氏權衡曰衛世子蒯聵出奔宋左氏叙蒯聵欲殺夫人夫人啼而走公執其手以登臺大子出奔宋豫謂蒯聵雖不善謀安有此事哉且殺夫人蒯聵獨得全乎彼所羞者以夫人名惡也如殺其母為惡愈大反不知可羞乎蓋蒯聵聞野人之歌其心慙焉則以謂夫人夫人惡其斥己淫則啼而走言大子將殺余以誣之靈公惑於南子所言必聽從故外則召宋朝內則逐公叔戍趙陽彼不恥召宋朝故亦不難逐蒯聵矣此其真也不當如左氏所記又蒯聵出乃奔宋宋南子家也蒯聵負殺南子之名而走又入其家使真有其事者敢乎哉此亦一證也常山劉氏曰蒯聵出奔春秋不去其世子者衛侯之罪也南子之惡亦已甚矣其欲去世子之意亦已明矣如哀姜亂魯驪姬亂晉若此比者不云鮮矣而靈公聽南子之譖謂蒯聵欲弒其母不能為辨之以致其出奔豈非靈公之罪乎哀二年晉趙鞅納衛世子蒯聵於戚亦書世子同此義也武夷胡氏傳世子國本也以寵南子故不能保世子而使之去國以欲殺南子故不能安其身而至於出奔是輕宗廟社稷之所付託而恣行矣春秋兩著其罪故特書世子其義不繫於與蒯聵之世其國也而靈公無道不能正家以危其國本至使父子相殘毁滅天理之所由著矣宋公之弟辰自蕭來奔大搜于比蒲髙郵孫氏曰春秋田狩之事公行之者必書公公觀魚于棠公狩于郎是也而搜四見於經皆不曰公於是比蒲之搜未還而邾子來㑹公是知搜者公也然而不曰公者政在三桓非公自出也棠魚郎狩逺地則譏而隱桓之時政猶自出無三桓之專行故也必皆曰公自昭之紅搜政在三桓久矣搜田之禮雖公自行而政之所出實由三桓也故皆曰大搜而不曰公焉所以見公之不得為政而大夫專國之罪也邾子來㑹公城莒父及霄杜氏注此年無冬史闕文十有五年春王正月邾子來朝左氏傳春邾隱公來朝鼷鼠食郊牛牛死改卜牛公羊傳曷為不言其所食漫也何氏注漫者遍食其身榖梁傳不敬大焉陸氏纂例趙子曰豫上元二年因避兵旅於㑹稽時牛災小鼠能齧牛才傷皮膚無不死二月辛丑楚子滅胡以胡子豹歸左氏傳吳之入楚也胡子盡俘楚邑之近胡者楚既定胡子豹又不事楚曰存亡有命事楚何為多取費焉二月楚滅胡武夷胡氏傳案左氏吳之入楚也胡子盡俘楚邑之近胡者楚既定又不事楚曰存亡有命事楚何為為是楚滅之夫滅人之國其罪大矣然胡子豹乘楚之約盡俘其邑之近胡者所謂國必自滅而後人滅之非滅之者獨有罪也國君造命不可委命既以為有命而又貪生忍辱不死於社稷則是不知命矣書以歸罪豹之不能死位而與歸也故楚子書爵而胡子豹名夏五月辛亥郊公羊傳曷為以夏五月郊三卜之運也何氏注運轉也已卜春三月不吉復轉卜夏三月周五月壬申公薨于髙寢榖梁傳髙寢非正也杜氏注髙寢宫名襄陵許氏曰春秋所大正始與終禮卒以正終也內卒凡十四公得正而薨焉者唯莊宣成是以君子務力於禮而順命之變又何求焉鄭罕公作軒逹帥師伐宋左氏傳鄭罕逹敗宋師於老丘齊侯衛侯次于渠蒢公作蘧蒢左氏傳齊侯衛侯次于蘧拿謀救宋也邾子來奔喪公羊傳奔喪非禮也吕氏曰諸侯相為奔喪專以強弱利害為國禮義消亡可見矣秋七月壬申姒榖作弋下同氏卒公羊傳姒氏者何哀公之母也何以不稱夫人哀未君也陸氏纂例哀公妾母卒時子未踰年雖行喪禮不可加於子子既未成君故不稱夫人也八月庚辰朔日有食之九月滕子來㑹葬杜氏注諸侯㑹葬非禮也吕氏曰邾子來奔喪畏魯甚也滕差逺而大於邾故但來㑹葬此專以强弱利害為國者也丁巳葬我君定公雨不克葬戊午日下昊榖作稷乃克葬榖梁傳葬既有日不為雨止禮也雨不克葬喪不以制也辛巳葬定姒公羊傳定姒何以書葬未踰年之君也有子則廟廟則書葬武夷胡氏傳公羊曰有子則廟廟則書葬曽子問並有喪則如之何子曰葬先輕而後重其奠也其虞也先重而後輕冬城漆杜氏注邾庶其邑春秋集解卷二十八
