body:
  text: 春秋集解卷十三宋吕本中撰文公名興僖公子襄王二十六年即位諡法慈惠愛民曰文元年春王正月公即位二月癸亥公有朔字日有食之天王使叔服來㑹葬夏四月丁巳葬我君僖公左氏傳春王使内史叔服來㑹葬夏四月丁巳葬僖公緩杜氏注七月而葬緩陸氏纂例㑹僖公葬記是以著非也武夷胡氏傳凡崩薨卒葬人道始終之大變也不以得禮為常事而不書其或失禮而害於王法之甚者聖人則有削而不存以示義者矣天王使毛伯來錫公命左氏傳王使毛伯衛來錫公命公羊傳錫者何賜也命者何加我服也杜氏注諸侯即位天子錫以命圭合瑞為信劉氏權衡曰諸侯喪畢以士服見於王王乃於廟命之古者五十而命至周喪畢則命矣喪未畢而命非禮也劉氏傳錫命者何命為諸侯也諸侯在喪稱子踰年即位終喪受命正也未畢喪命之非正也既畢喪不受命亦非正也錫命則曷為或書或不書常事不書有非常然後書晉侯伐衞左氏傳晉文公之季年諸侯朝晉衞成公不朝使孔逹侵鄭伐緜訾及匡晉襄公既祥使告於諸侯而伐衞及南陽先且居曰效尤禍也請君朝王臣從師晉侯朝王於温先且居胥臣伐衞五月辛酉朔晉師圍戚六月戊戌取之獲孫昭子叔孫得臣如京師左氏傳叔孫得臣如周拜謝錫命杜氏注得臣叔牙之孫髙郵孫氏曰天王錫命魯公而魯公使得臣拜之非禮之甚者也魯公即位未嘗如周而周錫之命受命矣又不自行而使臣以徃其為不臣可知矣衞人伐晉左氏傳衞人使告於陳陳共公曰更伐之我辭之衞孔逹帥師伐晉秋公孫敖會晉侯于戚左氏傳秋晉侯疆戚田故公孫敖㑹之杜氏注戚衞邑在頓丘衞縣西冬十月丁未楚世子商臣殺其君頵公榖並作髠左氏傳初楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蠭目而豺聲忍人也不可立也弗聽既又欲立王子職而黜太子商臣商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江􅇗而勿敬也從之江􅇗怒曰呼役夫宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎曰不能能行乎曰不能能行大事乎曰能冬十月以宫甲圍成王王請食熊蹯而死弗聽丁未王縊何氏注君之於世子有父之親有君之尊言世子者所以明有父之親言君者所以明有君之尊又責臣子當討賊也武夷胡氏傳書世子殺君者有父之親有君之尊而至於弑逆此天理大變人情所深駭春秋詳書其事欲以起問者察所由示懲戒也唐世子𢎞受左氏春秋至此廢書歎曰經籍聖人垂訓何書此邪郭瑜對曰春秋義存褒貶以善惡為勸戒故商臣千載而惡名不滅𢎞曰非惟口不可道故亦耳不忍聞願受他書瑜請讀禮世予從之嗚呼聖人大訓不明於後世皆腐儒學經不知其義者之罪耳夫亂臣賊子雖陷穽在前斧鉞加於頸而不避顧謂身後惡名足以係其邪志而懲於為惡豈不謬哉持此曉人可謂茅塞其心意矣若語之曰為人君父而不通於春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷篡弑誅死之罪聖人書此者使天下後世察於人倫知所以為君臣父子之道而免於首惡之名誅死之罪也則世子𢎞而聞此必將􅋏然畏懼知春秋之不可不學矣學於春秋必明臣子之義不至於奏請咈㫖而見酖矣傳者案也經者斷也考於傳之所載可以知其所由致之漸豈隱乎嫡妾必正而楚子多愛立子必長而楚國之舉常在少者養世子不可不慎也而以潘崇為之師侍膳問安世子職也而多置宫甲降而不憾憾而能昣者鮮矣乃欲黜兄而立其弟謀及婦人宜其敗也而使江􅇗知其情是以不仁處其身而以不孝處其子也其及宜矣楚頵僣王憑陵中國戰勝諸侯毒被天下然昧於君臣父子之道禍發蕭牆而不之覺也不善之積豈可揜哉君不君則臣不臣父不父則子不子春秋書世子弑其君者推本所由而著其首惡為萬世之大戒也然則商臣無貶矣曰弑父與君之賊其惡猶待於貶而後著乎公孫敖如齊左氏傳穆伯如齊始聘焉禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衞社稷忠信卑讓之道也二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績左氏傳秦孟明視帥師伐晉以報殽之役二月晉侯禦之先且居將中軍趙衰佐之王官無地御戎狐鞫居為右甲子及秦師戰於彭衙秦師敗績秦伯猶用孟明孟明増修國政重施於民趙成子言於諸大夫曰秦師又至將必辟之懼而増徳不可當也詩曰毋念爾祖聿修厥徳孟明念之矣念徳不怠其可敵乎杜氏注馮翊郃陽縣西北有彭衙城伊川先生解越國襲人秦罪也忘親背惠晉惡也秦經人之國以襲人雖忿無以為辭矣故其來不稱伐晉不諭秦而與戰故書晉及忿以取敗故書敗績武夷胡氏傳戰而言及者主乎是戰者也夫敵加於已不得已而起者謂之應兵爭恨小故不忍忿怒者謂之忿兵案左氏秦孟明帥師伐晉報殽之役此所謂忿兵疑罪之在秦也而以晉侯主之何哉處已息爭之道逺怨之方也然則敵加於已縱其侵暴將不得應乎曰敵加於己而已有罪焉引咎責躬服其罪則可矣已則無罪而不義見加諭之以詞命猶不得免焉亦告於天子方伯可也若遽然興師而與戰是謂以桀攻桀何愈乎故以晉侯為主者處已息爭之道寡怨之方王者之事也丁丑作僖公主左氏傳書不時也僖三十三年傳作主非禮也凡君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟公羊傳作僖公主者何為僖公作主也主者易用虞主用桑練主用栗用栗者藏主也作僖公主何以書譏何譏爾不時也榖梁傳譏其後也武夷胡氏傳作主者造木主也既葬而反虞虞主用桑期年而練祭練主用栗用栗者藏主也何以書僖公薨至是十有五月然後作主慢而不敬甚矣夫慢而不敬積惡之原也以為無傷而不去至於惡積而不可揜所以謹之也吕氏曰練而用栗主過時而作主文公孝心不至可知矣其能為國乎三月乙巳及晉處父盟左氏傳晉人以公不朝來討公如晉夏四月乙巳晉人使陽處父盟公以恥之武夷胡氏傳及處父盟者公也其不地於晉也諱不書公者抑大夫之伉不使與公為敵正君臣之分也適晉不書反國不致為公諱恥存臣子之禮也凡此類筆削魯史之舊文衆矣襄陵許氏曰春秋之道抑髙舉下處父云也者君臣辭也以抑晉也夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴公榖並作垂斂左氏傳公未至六月穆伯會諸侯及晉司空士縠盟于垂隴晉討衞故也陳侯為衞請成於晉執孔逹以說杜氏注垂隴鄭地滎陽縣東有隴城襄陵許氏曰元年衞人伐晉至是諸侯會盟而明年衞人會晉伐沈則知衞服於垂隴之會矣晉襄方患秦楚專養中國罪苟有所委斯受之可也自十有二月不雨至于秋七月榖梁傳歴時而言不雨文不憂雨也不憂雨者無志乎民也武夷胡氏傳書不雨至于秋七月而不曰至于秋七月不雨者葢後言不雨則是冀雨之詞非文公之意也夫書不雨至于秋七月而止即八月嘗雨矣然而不書八月雨者見文公之無意於雨不以民事繫憂樂也其怠於政事可知而魯衰自此始矣八月丁卯大事于大廟躋僖公左氏傳逆祀也於是夏父弗忌為宗伯尊僖公且明見曰吾見新鬼大故鬼小君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也是以魯頌曰春秋匪懈享祀不忒皇皇后帝皇祖后稷君子曰禮謂其后稷親而先帝也詩曰問我諸姑遂及伯姊君子曰禮謂其姊親而先姑也公羊傳大事者何大祫也大祫者何合祭也其合祭奈何毁廟之主陳於大祖未毁廟之主皆升合食於大祖五年而再殷祭躋者何升也何言乎升僖公譏何譏爾逆祀也其逆祀奈何先禰而後祖也榖梁傳躋升也先親而後祖也逆祀也逆祀則是無昭穆也無昭穆則是無祖也無祖則無天也君子不以親親害尊尊此春秋之義也杜氏注僖公閔公庶兄繼閔而立廟坐宜次閔下今升在閔上劉氏傳大事者何祫也祫則曷為謂之大事諸侯之大事也毁廟之主陳於大祖未毁廟之主皆升合食於大祖曰祫祀其祖之所自出以其祖配之曰禘升僖公譏何譏爾逆祀也其逆祀奈何先禰而後祖也此非祖禰也其謂之祖禰何臣子一例也劉氏意林時祭稱有事祫祭稱大事大之外無加者矣以是推之魯之郊禘非禮也大夫有善於其君則干祫及其高祖諸侯有善於天子則禘其祖之所自出皆周之末造也非太平制名器正上下之分也武夷胡氏傳閔僖二公親則兄弟分則君臣以為逆祀者兄弟之不先君臣禮也夫有天下者事七世諸侯五世說禮者曰世指父子非兄弟也然三傳同以閔公為祖而臣子一例是以僖公父視閔公為禮而父死子繼兄亡弟及名號雖不同其為世一矣冬晉人宋人陳人鄭人伐秦左氏傳冬晉先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役伊川先生解秦以忿取敗晉可以已矣而復伐秦報復無已殘民結怨故貶稱人武夷胡氏傳案左氏皆國卿也其貶而稱人者晉人再勝秦師在常情亦可以已矣而復興此役是報復之無已也公子遂如齊納幣公羊傳納幣不書此何以書譏何譏爾譏喪娶也娶在三年之外則何譏乎喪娶三年之内不圖昬何氏注僖公以十二月薨至此未滿二十五月吉禘於莊公譏然則曷為不於祭焉譏三年之恩絶矣非虚加之也以人心為皆有之以人心為皆有之則曷為獨於娶焉譏娶者大吉也非常吉也其為吉者主於已以為有人心焉者則宜於此焉變矣陸氏纂例趙子曰譏使公子納幣也武夷胡氏傳㛰姻常事不書其書納幣者喪未終而圖㛰也夫娶在三年之外矣則何譏乎春秋論事莫重乎志志敬而節具與之知禮志和而音雅與之知樂志哀而居約與之知喪非虚加之也重志之謂也此皆使人私欲不行閑邪復禮之意常山劉氏曰先儒謂㛰姻不當使公子而不述其所以葢公子公孫於國事皆臣禮而已唯㛰姻之禮則於家人有尊卑之序若俾尊者從事則非順也三年春王正月叔孫得臣會晉人宋人陳人衞人鄭人伐沈沈潰左氏傳莊叔㑹諸侯之師伐沈以其服於楚也沈潰凡民逃其上曰潰在上曰逃杜氏注沈國名也汝南平輿縣北有沈亭武夷胡氏傳案左氏伐沈以其服於楚也沈潰民逃其上也五國皆稱人將非命卿也沈在汝南平輿縣北未嘗與中國㑹盟而南服於楚師入其境而民人逃散雖未義舉比於報復私怨之兵則有間矣故其辭無襃貶凡此類欲示後世用師者知權而本之以正也襄陵許氏曰内會伐不書帥師始此則外重矣夏五月王子虎卒左氏傳王叔文公卒來赴弔如同盟杜氏注王子虎與僖公同盟于翟泉武夷胡氏傳王子虎不書爵譏之也天子内臣無外交秦人伐晉左氏傳秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也伊川先生解搆怨連禍殘民以逞晉人畏之而不出秦人極其忿而後悔過聖人取其終能改耳武夷胡氏傳案左氏秦伯伐晉濟河焚舟封殽尸而還其稱人何也聖人作易以懲忿窒慾為損卦之象其辭曰損徳之修也春秋諸侯之知徳者鮮矣穆公初聽把子之請違蹇叔之言其名為貪兵是慾而不能窒也及敗於殽歸作秦誓庶幾能改將窒其慾矣復起彭衙之師報殽函之役其名為憤兵是忿而不能懲也今又濟河取郊人之稱斯師也何義哉晉人畏秦而不出穆公逞其忿而後悔自是見伐不報始能踐自誓之言矣是故於此貶而稱人備責之也秋楚人圍江雨螽于宋左氏傳隊而死也陸氏纂例趙子曰自空而下又多有似雨耳歴代有雨血雨毛雨土皆此類冬公如晉十有二月己巳公及晉侯盟左氏傳晉人懼其無禮於公也請改盟公如晉及晉侯盟陸氏纂例在晉都盟故不言地晉陽處父帥師伐楚以公榖無以字救江左氏傳楚師圍江晉先僕伐楚以救江冬晉以江故告於周王叔桓公晉陽處父伐楚以救江門於方城遇息公子朱而還公羊傳此伐楚也其言救江何為諼也其為諼奈何伐楚為救江也武夷胡氏傳以者不以者也救江善矣其書以何楚嘗伐鄭矣齊桓公逺結江黄合九國之師於召陵然後伐鄭之謀罷又嘗圍宋矣晉文公許復曹衛會四國之師於城濮然後圍宋之役解今江國小而弱非能與宋鄭比楚人圍之必不待徹四境屯戍守禦之衆與宿衞盡行也當是時楚有覆載不容之罪晉主夏盟宜合諸侯聲罪致討命秦甲出武闗齊以東兵略陳蔡而南處父等軍於方城之外楚必震恐而江圍自解矣計不出此乃獨遣一軍逺攻强國豈能濟乎故書伐楚以救江言救江雖善而所以救之者非其道矣此春秋紀用兵之法也襄陵許氏曰春秋有一國之辭有天下之辭魯國有興則書帥師此一國之辭也諸侯侵伐則簡之矣此天下之辭也中世以後天下崇武大夫尊強卒乘繁興於是諸侯侵伐書卿帥師且著内輕而外重强弱相形也四年春公至自晉吕氏曰自是公朝强國皆至者事近得詳事逺則不得詳也夏逆婦姜于齊左氏傳逆婦姜于齊卿不行非禮也君子是以知出姜之不允於魯也曰貴聘而賤逆之君而卑之杜氏注君小君也立而廢之棄信而壊其主在國必亂在家必亡不允宜哉詩曰畏天之威于時保之敬主之謂也伊川先生解納幣在喪中與喪㛰同也稱婦姜已成婦也不稱夫人不可為小君奉宗廟也不書逆者雖卿亦失其職也劉氏意林逆婦姜于齊正始之道也待之不以夫人之禮故夫人不以其位終國亂子弑強臣擅命幾於亡矣文公非欲存妻子傳世者也闇弱惰慢不能率禮而行以謂苟若而可何禮之守故卒至於禍也夫婦之際人倫之首可不慎哉故鑒末以原本因㣲以知著又非獨文公之罪也雖夫人預有罪矣當是之時夫人不能早避喪娶之辱冒大禮以往國人皆賤之遂無所據依以危其身而亡其子由本不正故也殆而呼天不亦晚乎吾以此觀之禮之於人大矣是存則存是亡則亡文公之不能保其後嗣者由無以刑其妻也夫人之不能安其位者由無以謹於禮也此正始之道也武夷胡氏傳逆皆稱女以未成婦而女者在父母家之所稱也往逆而稱婦入國不書至何哉此春秋誅意之效也禫制未終思念娶事是不志哀而居約矣方逆也而已成為婦未至也而如在國中原其意而誅之也不稱夫人姜氏者亦與有貶焉婦人不專行何以與有貶父母與有罪也文公不知敬其伉儷違禮而行使國亂子弑齊人不能鑒㣲知著冒禮而往使其女不允於魯皆失於不正其始之過也夫婦之際人倫之首不可不謹也故交貶之以為後鑒狄侵齊襄陵許氏曰狄自箕之敗至是始復侵齊間晉有秦楚之難也秋楚人滅江晉侯伐秦左氏傳秋晉侯伐秦圍邧新城以報王官之役伊川先生解秦逞忿以伐晉晉畏而避之其見報乃常情也秦至此能悔過矣故不復報晉聖人取其能遷善也稱晉侯不復加譏見秦宜得報而自悔不復修怨乃其善也武夷胡氏傳晉人三敗秦師見報乃常情耳而穆公濟河焚舟則貶而稱人秦取王官及郊未至結怨如晉師之甚也襄公又報之常情過矣而得稱爵何也聖人以常情待晉襄而以王事責秦穆所以異乎襄公忘親背惠大破秦師敗狄伐許怒魯侯之不朝也而以無禮施之是專尚威力先事加人莫知省徳而後動也今又報秦不足罪矣穆公初敗于殽悔過自誓増修徳政宜若過而知悔悔而能改又有濟河之役則非誓言之意所以備責之也然晉襄見伐而報猶無譏焉秦穆至是見伐而不報善可知矣不譏晉侯所以深善秦伯春秋大改過嘉釋怨王者之事也故仲尼定書列秦誓於百篇之末以見悔過能改而不責人雖聖賢誥命不越此矣衞侯使寗俞來聘左氏傳衞寗武子來聘冬十有一月壬寅夫人風氏薨左氏傳冬成風薨伊川先生解自成風以後妾母稱夫人嫡妾亂矣仲子始僣尚未敢同嫡也陸氏纂例啖子曰自成風之後妾母皆僭用夫人禮常山劉氏曰凡魯事之諱者皆由諱而後顯聖人之㫖㣲哉武夷胡氏傳風氏僖公之母莊公妾也而稱夫人自是嫡妾亂矣語曰邦君之妻邦人稱之曰君夫人稱諸異邦曰寡小君葢嫡體之稱也若夫妾媵則非嫡矣其生亦以夫人之名號稱之其没亦以夫人之禮卒葬之非所以正其分也以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父卑其身則失位賤其父則無本越禮至是不亦悖乎夫禮庶子為君為其母無服不敢貳尊者也春秋於成風記其卒葬各以實書不為異辭者謹禮之所由變也五年春王正月王使榮叔歸含且賵左氏傳春王使榮叔來含且賵公羊傳含者何口實也其言歸含且賵何兼之兼之非禮也伊川先生解天子成妾母為夫人亂倫之甚失天理矣不稱天義已明稱叔存禮也杜氏注珠玉曰含含口實車馬曰賵劉氏傳王何以無天言是非天之法也是非天之法者何是始以妾為嫡也武夷胡氏傳珠玉含車馬賵歸含且賵者厚禮妾母也不稱天王者弗克若天也春秋繫王於天以定其名號者所履則天位也所治則天職也所敕而惇之者則天之所敘也所自而庸之者則天之所秩也所賞所刑則天之所命而天之所討也夫婦人倫之本王法所尤謹者今成風以妾僣嫡王不能正又使大夫歸含賵焉而成之為夫人則王法廢人倫亂矣是謂弗克若天而悖其道非小失耳故特不稱天以謹之也三月辛亥葬我小君成風陸氏纂例自文公葬成風之後乃有二夫人祔廟非禮也蘇氏曰仲子雖聘而非惠公之嫡也故特為之宫而不祔不書其葬葢禮之正也自成風以來妾母皆葬葢祔也魯禮之變自此始矣王使召穀作毛伯來會葬左氏傳召昭公來㑹葬伊川先生解天子以妾母同嫡亂天理一作倫也故不天聖人於此尤謹其戒杜氏注召伯天子卿也召采地伯爵也武夷胡氏傳王臣下聘桓公冢宰書名示貶而大夫再命則無譏焉或以為從同同也或以為同則書重也成風薨王使榮叔歸含且賵既不稱天矣及使召伯來㑹葬又與貶焉何也歸含且賵施於妾母已稠疊矣又使卿來㑹葬恩數有加焉是將祔之於廟也而致禮於成風盡矣聘一也含賵而又葬則其事益隆亂人倫廢王法甚矣再不稱天者聖人於此尤謹其戒而不敢略也襄陵許氏曰喪服傳曰庶子為父後者為其母何以緦也與尊者為一體不敢私其親也服問曰君之母非夫人也則羣臣無服惟近臣及僕驂乗從服唯君所服也此禮之正也夏公孫敖如晉秦人入鄀左氏傳初鄀叛楚即秦又貳于楚夏秦人入鄀秋楚人滅六左氏傳六人叛楚即東夷秋楚成大心仲歸帥師滅六冬楚公子爕滅蓼臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸徳之不建民之無援哀哉杜氏注六國今廬江六縣冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳左氏傳臧文仲以陳衞之睦也欲求好於陳夏季文子聘於陳且娶焉杜氏注行父季友孫秋季孫行父如晉八月乙亥晉侯驩卒公作讙左氏傳八月乙亥晉襄公卒靈公少晉人以難故欲立長君趙孟曰立公子雍好善而長先君愛之且近於秦秦舊好也使先蔑士㑹如秦逆公子雍冬十月公子遂如晉葬晉襄公杜氏注卿共葬事文襄之制也三月而葬速晉殺其大夫陽處父晉狐射榖作夜姑出奔狄左氏傳六年春晉蒐于夷舎二軍使狐射姑將中軍趙盾佐之陽處父至自温改蒐于董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政賈季怨陽子之易其班也而知其無援於晉也九月賈季使續鞫居殺陽處父十一月丙寅晉殺續簡伯賈季奔狄榖梁傳稱國以殺罪累上也襄公已葬其以累上之辭言之何也君漏言也上泄則下闇下闇則上聾且闇且聾無以相通夜姑殺者也夜姑之殺奈何曰晉將與狄戰使狐夜姑為將軍趙盾佐之陽處父曰不可古者君之使臣也使仁者佐賢者不使賢者佐仁者今趙盾賢夜姑仁其不可乎襄公曰諾謂夜姑曰吾始使趙盾佐女今女佐盾矣夜姑曰敬諾襄公死處父主竟上之事夜姑使人殺之君漏言也武夷胡氏傳公羊子曰晉殺其大夫陽處父則狐射姑曷為出奔射姑殺也射姑殺則其稱國以殺何君漏言也易曰不出户庭无咎何謂也子曰亂之所生則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也凡書殺者在上則稱君在下則稱氏在衆則稱人在微則稱盗君與臣同殺則稱國今殺處父者射姑耳君獨以漏言故亦預殺焉所以為後世戒也或以處父為侵官非歟曰人君用人失當則其國必危凡立於朝者舉當諫君况身為晉國之太傅邪若以為侵官將相大臣非其人百官有司失其職在位者當拱黙自全隂聽人主之所為至於顛危而不救則將焉用彼相乎率天下臣子為持祿容身不忠之行以誤朝迷國者必此侵官之說矣襄陵許氏曰處父賢趙盾而不可射姑為國忠謀豈曰黨哉使處父於此從容不言以免為智者是使國不用賢而用亂人也非蹇蹇匪躬臣道之訓也傳又罪其改蒐為侵官當襄公時晉政未亂卿帥之重孰能擅改使謀出處父而公行之又何咎焉閏月不告朔猶朝于廟左氏曰閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民陸氏纂例趙子曰天子常以今年冬班明年正朔於諸侯諸侯受之每月奉月朔甲子以告於廟所謂禀正朔也文公以閏非正不行告朔之禮而以其朔日但身至廟拜謁而已故曰猶朝于廟劉氏傳閏月不告月非正也朝廟為告月也不告月而朝廟亦非正也武夷胡氏傳不告月者不告朔也不告朔則曷為不言朔也因月之虧盈而置閏是主乎月而有閏也故不言朔而言月占天時則以星授民事則以節候寒暑之至則以氣百官修其政於朝庶民服其事於野則主乎是焉耳矣閏不可廢乎曰迎日推策則有其數歸奇於扐以象閏數也轉璣觀衡則有其象斗指兩辰之間象也象數者天理也非人所能為也故以定時成歳者唐典也以詔王居門終月者周制也班告朔於邦國不以是為附月之餘而弗之數也猶朝于廟者幸其不已之詞子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮七年春公伐邾公作邾婁三月甲戌取須句公作胊遂城郚左氏傳公伐邾間晉難也取須句寘文公子焉非禮也杜氏注須句魯之封内屬國也僖公反其君之後邾復滅之因伐邾師以城郚郚魯邑卞縣南有郚城夏四月宋公王榖作壬臣卒宋人殺其大夫左氏傳宋成公卒昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所芘䕃矣不聽穆襄之族率國人以攻公殺公孫固公孫鄭於公宫六卿和公室樂豫舎司馬以讓公子卬昭公即位而葬書曰宋人殺其大夫不稱名衆也劉氏傳其稱人以殺何衆殺之者也武夷胡氏傳書宋人者國亂無政非君命而衆人擅殺之也大夫不名義繫於殺大夫而其名不足紀也戊子晉人及秦人戰于令狐左氏傳穆嬴日抱太子以啼於朝曰先君何罪其嗣亦何罪舎適嗣不立而外求君將焉寘此出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪乃背先蔑而立靈公以禦秦師及菫隂宣子曰我若受秦秦則賔也不受寇也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐寇如追逃軍之善政也訓卒利兵秣馬蓐食潜師夜起戊子敗秦師于令狐至于刳首伊川先生解晉始逆立公子雍既而悔之故秦興兵以納之晉不謝秦秦納不正皆罪也故稱人晉懼秦之不肯已而擊之故書晉及劉氏傳此晉趙盾之師也其稱人何貶曷為貶不與大夫專廢置君也常山劉氏曰戰必有勝敗唯此秦敗不書者晉曲甚故也何者晉使先蔑召公子雍於秦秦為送之晉反背約禦秦師而敗之秦何罪焉故不書秦敗所以甚晉人之惡也武夷胡氏傳晉秦稱人晉書及其貶之如此者使後世臣子慎於廢立之際不可忽也治亂存亡係國君之廢立事莫重於此矣而可以有誤乎奕者舉棊不定不勝其偶况置君而可以不定乎晉先蔑公羊晉先昧以師奔秦左氏傳己丑先蔑奔秦士㑹從之泰山孫氏曰先蔑不言出者明自軍中而出常山劉氏曰杜氏曰不言出在外奔他皆倣此狄侵我西鄙左氏傳狄侵我西鄙公使告於晉趙宣子使因賈季問酆舒且讓之襄陵許氏曰狄懲箕之敗四年間一侵齊而未敢肆至是始復侵魯侵齊侵宋侵衞晉襄既没莫之忌矣秋八月公㑹諸侯晉大夫盟于扈左氏傳秋八月齊侯宋公衞侯陳侯鄭伯許男曹伯㑹晉趙盾盟于扈晉侯立故也公後至故不書所㑹凡㑹諸侯不書所㑹後也杜氏注不書所㑹謂不具公侯及卿大夫伊川先生解文公怠政事多廢緩既約晉盟而復後至故書往㑹而隱其不及不序諸侯以見其不在故明年公子遂再往與晉盟也杜氏注扈鄭地滎陽卷縣西北有扈亭髙郵孫氏曰春秋書及某大夫盟者惟二例耳莊公九年公及齊大夫盟于蔇及此年晉大夫是也春秋之法外臣不盟我公皆書名以見其罪不幸其國無君若無知之亂則齊之大夫得免焉大夫而盟諸侯亦書名以見其罪不幸其君薨而嗣子少若靈公之在抱則晉之大夫得免焉舎是二者未有不得罪於春秋矣武夷胡氏傳趙盾内專廢置其君外强諸侯為此盟其不名者見大夫之强也襄陵許氏曰諸侯何以不序大夫何以不名大夫而主盟諸侯自扈之㑹始也君子惡之靈公始立而失正如此其將無以終矣冬徐伐莒公孫敖如莒涖公榖並作莅盟左氏傳徐伐莒莒人來請盟穆伯如莒涖盟榖梁傳涖位也其曰位何前定也泰山孫氏曰徐不稱人夷也八年春王正月夏四月秋八月戊申天王崩左氏傳秋襄王崩冬十月壬午公子遂會晉趙盾盟于衡雍乙酉公子遂會公有伊字雒戎盟于暴左氏傳晉人以扈之盟來討冬襄仲㑹晉趙孟盟于衡雍報扈之盟也遂㑹伊雒之戎劉氏傳曷為再言公子遂兩之也襄陵許氏曰戎醜在雒亂華甚矣稱公子遂兩之也兩之也者内諸夏而外戎也春秋所謹如此而晉唐得戎與之雜居晉既大亂不救唐亦幾危而悔此為國謀者不學春秋之過也公孫敖如京師不至而公無而字復丙戌奔莒左氏傳穆伯取於莒曰戴已生文伯其娣聲已生惠叔戴巳卒又聘於莒莒人以聲已辭則為襄仲聘焉穆伯為仲逆自為娶之仲請攻之公止之使仲舎之公孫敖反之穆伯如周弔喪不至以幣奔莒從已氏焉陸氏纂例還者事畢復者未畢師還公還自晉歸父還自晉士匄聞齊侯卒乃還皆不當更往又並合禮故曰還事畢也公如晉至河乃復公孫敖如京師不至而復仲遂至黄乃復皆事未畢而復也武夷胡氏傳案左氏公孫敖奔莒從己氏也男女人之大欲存焉寡欲者養心之要欲而不行可以為難矣然欲生於色而縱於淫色出於性目之所視有同美焉不可掩也淫出於氣不持其志則敖僻趨蹶無不為矣敖如京師其書不至而復者言敖無入使於周之意惟已氏之欲從也夫以志徇氣肆行淫慾而不能為之帥至於棄其家國出奔而不顧此天下之大戒也春秋謹書其事於敖與何誅使後人為鑒必持其志修室欲之方也螽公作􅏑宋人殺其大夫司馬宋司城來奔左氏傳宋襄夫人襄王之姊也昭公不禮焉夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死故書以官司城蕩意諸來奔效節於府人而出公以其官逆之皆復之亦書以官皆貴之也陸氏纂例啖子曰守節以死特書官以美之啖子曰内外大夫奔卿則書君之股肱也治亂所寄故重而書之凡奔皆惡也有非者則異其文宋司城是也吕氏曰守節以死者死其官也稱官以奔者得其職也劉原父以為稱官皆不能其官非也如不能其官則何稱其官之有然而不名者其人他無可稱獨死其官得其職為可録爾故舉其官不繫其人也春秋集解巻十三
