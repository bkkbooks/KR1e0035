body:
  text: 春秋集解卷八宋吕本中撰閔公名開莊公子惠王十六年即位閔諡也在國逢難曰閔索隠曰系本名啟避漢景帝諱作開元年春王正月武夷胡氏傳不書即位内無所承上不請命也莊公薨子般卒慶父夫人利閔公之幼而得立焉是内不承國於先君也案周制王哭諸侯則大宗伯為上相未有諸侯之薨而不告於王者也職喪掌諸侯之喪以國之喪禮涖其禁令序其事凡國有司以王命有事焉則詔賛主人未有諸侯之子主喪而王不遣使者也今魯有大故不告於周閔既主喪而王不遣使是上不請命於天子也内無所承上不請命故不書即位正人道之大倫也齊人救邢左氏傳狄人伐邢管敬仲言於齊侯曰戎狄豺狼不可厭也諸夏親暱不可棄也宴安酖毒不可懷也詩云豈不懷歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書齊人救邢榖梁傳善救邢也武夷胡氏傳凡書救者未有不善之也救在京師則罪列國子突救衛是也救在夷狄則罪諸侯狄救齊吳救陳是也救在逺國則罪四鄰晉陽處父帥師伐楚以救江是也救而不速救者則書所次以罪其慢叔孫豹救晉次于雍榆是也救而不敢救者則書所至以罪其怯齊侯伐我北鄙圍成公救成至遇是也兵者春秋之所甚重衛靈公問陳孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也獨至於救兵而書法若此聖人之情見矣其稱人将卑師少也夏六月辛酉葬我君莊公左氏傳葬莊公亂故是以緩秋八月公及齊侯盟于落姑公榖並作洛姑左氏傳公及齊侯盟于落姑請復季友也齊侯許之使召諸陳公次于郎以待之杜氏注落姑齊地季子來歸左氏傳季子来歸嘉之也榖梁傳其曰季子貴之也其曰來歸喜之也杜氏注季子公子友之字陸氏微㫖季友之出不書何也曰慶父之難季子力不能正違而去之權也君立見召而來義也故聖人善其歸不譏其去以明變而得中進退不違道也劉氏傳慶父專魯則曷為召季子季子之賢内得於國人外聞於諸侯則未知其以是為説與不得已與抑將圖之與季子至而國人授之以政百姓歸焉殺公子牙今将爾季子不免慶父弑君何以不誅非不誅也勢未能也武夷胡氏傳案左氏盟于落姑請復季友也其曰季子賢之也其曰來歸喜之也自外至者為歸是嘗出奔矣何以不書莊公薨子般弑慶父主兵勢傾公室季子力不能支避難而出奔恥也魯國方危内賊未討國人思得季子以安社稷而公為落姑之盟以請於齊則是賢也春秋欲没其恥故不書奔欲旌其賢故特稱季子聖人之情見矣隠惡而揚善舜也樂道人之善惡稱人之惡孔子也為尊者諱為親者諱為賢者諱春秋也明此可以畜納汙之德樂與人為善矣冬齊仲孫來左氏傳齊仲孫湫來省難書曰仲孫亦嘉之也仲孫歸曰不去慶父魯難未巳公曰若之何而去之對曰難不已将自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國将亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寜魯難而親之劉氏意林桓公不務修霸主之義討有罪扶㣲國而更使智計之士覘伺虚實令慶父極惡魯君再弑此由桓公仲孫謀不臧之蔽也故奪其君臣之常辭以見君使臣不以禮臣事君不以忠聖人法之所禁也故田恒弑其君孔子沐浴而朝告於哀公請討之夫事君之義舍孔子無可為者矣豈嘗沮其君以齊人尚强待其自斃哉二年春王正月齊人遷陽杜氏注陽國名盖齊人偪徙之陸氏纂例啖子曰移其國於國中而為附庸也吕氏曰聖人作春秋功過不相掩齊人遷陽强以兵力劫遷之罪之甚也夏五月乙酉吉禘于莊公左氏傳速也公羊傳其言吉何言吉者未可以吉也曷為未可以吉未三年也三年矣曷為謂之未三年三年之喪實以二十五月何氏注時莊公薨至是適二十二月其言於莊公何未可以稱宫廟也曷為未可以稱宫廟在三年之中也陸氏纂例趙子曰禮記大傳云禮不王不禘王者禘其祖之所自出以其祖配之喪服小記曰王者禘其祖之所自出正與大傳同則諸侯不得禘禮明矣是以祭法云有虞氏禘黄帝舜祖顓頊顓頊出於黄帝則所謂禘其祖之所自出也夏后氏亦禘黄帝義同舜也殷人禘嚳殷契出祖自嚳周人禘嚳義與殷同禘者帝王立始祖之廟猶謂未盡其追逺尊先之義故又推尋始祖所出之帝而追祀之此祭不兼羣廟之主為其踈逺不敢䙝狎故也鄭𤣥注祭法云禘謂配祭昊天上帝於圜丘也蓋見祭法所説文在郊上謂為郊之最大者故為此説爾祭法所論禘郊祖宗者謂六廟之外永世不絶者有四種爾禘之所及冣逺故先言之爾又云祖之所自出謂感生帝靈威仰也此何妖妄之甚此文出自䜟緯始於漢哀平間偽書也故桓譚賈逵蔡邕王肅之徒疾之如讐而鄭𤣥通之於五經其為誣蠧甚矣或問曰若然則春秋書魯之禘何也荅曰成王追寵周公故也故祭統云成王追念周公賜之重祭郊社禘嘗是其義也郊禘天子之禮社與嘗諸侯所自有撰禮者見春秋書嘗社以為郊禘同遂妄言爾魯之用禘蓋於周公廟而上及文王文王即周公之所出故也此祭唯得於周公廟為之閔公時遂僭於莊公廟行之以其不追配故直言莊公而不言莊宫明用其禮物爾不追配文王也問曰左傳云烝嘗禘於廟何也荅曰此謂見春秋經前後祭祀唯有此三種以為祭名盡於此但據經文不識經意所以云爾又見經中禘于莊公以為諸廟合行之故妄云禘于武公僖公㐮公皆妄引禘文而説祭爾問者曰若非時祭之名則禮記諸篇所説其故何也曰禮記諸篇或孔門後末流弟子所撰或是漢初諸儒私撰之見春秋禘于莊公遂以為時祭之名見春秋唯兩度書禘一春一夏所以或謂之春祭或謂之夏祭各自著書不相符㑹理可見也且春秋文二年公羊云大事祫也毁廟之主陳於太祖陳者明素皆藏於太祖廟今但出而陳之也未毁廟之主皆升合食於太祖升者明自本廟而来升也禮記曾子問篇云祫祭於太廟祝迎四廟之主明毁廟之主皆素在太廟故不迎也又云非祫祭則七廟五廟無虚主並無說禘為殷祭處則禘不為殷祭明矣問曰若禘非三年喪畢之殷祭則晉人云以寡君之未禘祀何也荅曰此左氏之妄也左氏見經文吉禘于莊公以為喪畢當禘而不知此夲魯禮也不合施他國故左氏亦自云魯有禘樂賔祭用之即明諸國無禘了可知矣又左氏自相違背亦可見矣或曰禘非殷祭則論語云禘自既灌而徃者吾不欲觀之矣何也荅曰既灌之後至於饋薦則事繁而生懈慢故夫子退而嫌之注家不達其意遂妄云既灌之後列尊卑序昭穆為躋僖公故惡之且祫祭之時固當先陳設座位位定之後乃灌以降神郊特牲云既祼然後迎牲明牲至即殺之以獻何得先祼然後設位乎問者曰王制所云礿則不禘禘則不嘗嘗則不烝烝則不礿信如鄭說乎荅曰撰此篇者亦縁見春秋中唯有禘烝嘗三祭謂魯唯行此三祭遂云爾若信如鄭注諸侯每嵗皆朝即逺國来徃須歴數時何獨廢一時而已又須徃來常在道路如何守國理民乎問者曰明堂位云季夏六月以禘禮祀周公于太廟又云夏礿秋嘗冬烝此即以禘為大祭而時祭闕一時義甚明著也荅曰禮篇之中庸淺鄙妄此篇為甚故云四代之官魯兼而用之又云君臣未嘗相弑也其鄙若此何足徴乎鄭𤣥不能尋夲討原但隨文求義解此禘禮輙有四種其注祭法喪服小記則云禘是祭天注毛詩頌云禘是宗廟之祭小於祫注郊特牲則云禘當為礿注祭統王制則云禘是夏殷之時祭名殊可怪也劉氏意林吉禘于莊公說者以禘為諸侯之禮也何繆歟不王不禘禘之為王禮明矣王者禘其祖之所自出以其祖配之虞之所自出黄帝也而祖顓頊夏之所自出黄帝也而祖則禹商之所自出嚳也而祖契周之所自出嚳也而祖文王今魯既用天子禮樂而祖周公故其禘也則主文王矣禘者帝也帝者天子之號也諸侯不得祖天子故禘不及諸侯也天子禘諸侯祫大夫享庶人薦此上下之殺也言禘郊者皆先禘後郊此以祖考之逺近為次禘之先郊猶祖之先宗也非以禘祭天而郊享帝也孔子曰魯之郊禘非禮言魯之郊禘則先郊而後禘此魯之郊主后稷而禘文王驗也左氏曰魯有禘樂賔祭用之禘非諸侯禮又明矣秋八月辛丑公薨左氏傳初公傅奪卜齮田公不禁秋八月辛丑共仲使卜齮賊公於武闈成季以僖公適邾共仲奔莒乃入立之以賂求共仲於莒莒人歸之及密使公子魚請不許哭而徃共仲曰奚斯之聲也乃縊公羊傳公薨何以不地隱之也何隠爾弑也劉氏權衡曰所謂君弑賊不討不書葬者言比其葬時而賊未討則不書葬也既葬而後乃討賊賊雖已討葬猶不追書也此閔公是已討賊雖遲而葬在討賊之後則葬得書此陳靈公是已武夷胡氏傳案左氏初公傅奪卜齮田公不禁慶父使卜齮賊公於武闈魯史舊文必以實書其曰公薨不地者仲尼親筆也觀於刪詩在諸國則變風皆取在魯則獨編史克之頌或問吾黨有直躬者其父攘羊而子證之則曰吾黨之直者異於是父為子隱子為父隱直在其中矣後世縁此制為五服相容隱之條以綴骨肉之㤙春秋有諱義盖如是禮記稱魯之君臣未嘗相弑者盖習於經文而不知聖人書薨不地之㫖故云爾然則諱而不言弑也何以傳信於将來曰書薨以示臣子之情不地以存見弑之實何為無以傳信也凡君終必書其所獨至於見弑則没而無所其情厚矣其事亦白矣非聖人能修之乎後世記言之士欲諱國惡則必失其實直書無隠又非臣子所當施之於君父也而春秋之法不傳矣九月夫人姜氏孫于邾公作邾婁左氏傳閔公哀姜之娣叔姜之子也故齊人立之共仲通於哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾榖梁傳孫之為言猶孫也諱奔也武夷胡氏傳夫人稱孫聞乎故也不去姓氏降文姜也莊公忘親釋怨無志於復讐春秋深加貶絶一書再書又再書而不諱者以為三綱人道所由立也忘父子之恩絶君臣之義國人習而不察将以是為常事則亦不知有君之尊有父之親矣莊公行之而不疑大臣順之而不諌百姓安之而無憤疾之心也則人欲必肆天理必滅故叔牙之弑械成於前慶父之無君動於後圉人犖卜齮之刄交發於黨氏武闈之間哀姜以國君母與聞乎故而不忌也當是時魯君再弑㡬至亡國其應不亦憯乎春秋以復讎為重而書法如此所謂治之於未亂保之於未危不可不察也公子慶父出奔莒武夷胡氏傳公子出奔譏失賊也閔公立而季子歸何以見弑慶父主兵日久其權未可遽奪也季子執政日淺其謀未得盡行也設以聖人處之期月而已可矣季子賢人而當此能必克乎及閔公再弑慶父罪惡貫盈而疾之者愈衆季子忠誠顯著而附之者益多外固强齊之援内協國人之情正邪消長之勢判矣然後夫人不敢安其位慶父不得肆其姦此明為國者不知圖難於其易為大於其細雖有智者亦不能善其後矣世儒或言用魯之衆因齊之力以戮慶父其勢甚易而季子不能故書夫人孫邾慶父奔莒所以深惡其緩不討賊則非也以絳侯勃之果陳平之無誤将相交歡而内有朱虚外連齊楚以制諸吕庸人冝易於反手然太尉已入北軍士皆左袒猶恐不勝未敢誦言誅之也况於慶父巨姦七百里之侯國革車千乗而三十年執其兵柄其植根深矣其耳目廣矣其用物𢎞矣而以為戮之其勢甚易此未察乎難易遲速之幾者也吕氏曰屬文比事春秋教也以􅀴文觀之夫人慶父有罪自可見矣冬齊髙子來盟公羊傳然則何以不名喜之也何喜爾正我也其正我奈何莊公死子般弑閔公弑比三君死曠年無君設以齊取魯魯不興師徒以言而已矣桓公使髙子将南陽之甲立僖公而城魯或曰自鹿門至於争門者是也或曰自争門至於吏門者是也陸氏㣲㫖不言齊侯使髙子髙子奉使合冝受命不受辭也武夷胡氏傳髙子齊大夫也子者男子之美稱其稱子賢之也何賢乎髙子莊公薨子般卒閔公弑慶父夫人亂乎内魯於是曠年無君齊桓公使将南陽之甲至魯而謀其國其命髙子必曰魯可取則兼其國以廣地魯可存則平其亂以善鄰非有安危繼絶一定不可易之計也髙子至則平魯難定僖公魯人賴焉以為美談至於久而不絶曰猶望髙子也聖人美其明人臣之義得奉使之冝特稱髙子以著其善其不曰齊侯使之者權在髙子也十有二月狄入衛左氏傳冬十二月狄人伐衞衞懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰及狄人戰於熒澤衞師敗績遂滅衞初惠公之即位也少齊人使昭伯烝於宣姜不可强之生齊子戴公文公宋桓夫人許穆夫人及敗衞之遺民立戴公以廬於曹杜氏注曹衞下邑戴公名申立其年卒而立文公齊侯使公子無虧帥車三百乗甲士三千人以戍曹武夷胡氏傳衞康叔之後盖北州大國狄何以能入乎臣昔嘗謂河南劉奕曰史氏記繁而志寡如班固載諸王淫亂等事盡削之可也奕曰必若此言仲尼刪詩如牆有茨鶉之奔奔桑中諸篇何以録於國風而不削乎臣不能荅後以問延平楊時時曰此載衞為戎狄所滅之因也故在定之方中之前因以是説攷於歴代凡淫亂者未有不至於殺身敗家而亡其國者也然後知古詩垂戒之大而近世有獻議乞於􅀴筵不以國風進讀者殊失聖􅀴之㫖矣鄭弃其師公榖作棄左氏傳鄭人惡髙克使帥師次於河上久而弗召師潰而歸髙克奔陳鄭人為之賦清人陸氏微㫖淳聞於師曰夫人臣之義可則竭節而進否則奉身而退髙克進退違義見惡於君罪亦大矣不書其奔其意何也曰髙克見惡於君其罪易知也鄭伯惡其卿而不能退之以禮兼棄其人失君之道矣故聖人異其文而深譏焉常山劉氏曰鄭詩清人刺文公也髙克好利而不顧其君文公惡而欲逺之不能使髙克将兵而禦敵於竟陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩也觀此詩序則鄭棄其師之道灼然著矣武夷胡氏傳人君擅一國之名寵殺生予奪惟我所制爾使克不臣之罪已著案而誅之可也情状未明黜而逺之可也愛惜其才以禮馭之可也烏有假以兵權委諸境上坐視其失伍離散而莫之恤乎然則棄師者鄭伯乃以國稱何也二三執政股肱心膂休戚之所同也不能進謀於君協志同力黜逐小人而國事至此是謂危而不持顛而不扶則將焉用彼相矣晉出帝時景延廣專權諸藩擅命及桑維翰為相出延廣於外一制書所敕者十有五鎮無敢不從者以五季之末維翰能之而鄭國二三執政畏一髙克不能退之以道何政之為書曰鄭棄其師君臣同責也春秋集觧卷八
