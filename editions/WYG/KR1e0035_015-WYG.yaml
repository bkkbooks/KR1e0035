body:
  text: 春秋集觧卷十五宋吕本中撰宣公名倭或作接文公子匡王五年即位諡法善問周逹曰宣元年春王正月公即位公羊傳繼弑君不言即位此其言即位何其意也髙郵孫氏曰桓弑隠而立春秋月而不王以罪天王之不能誅宣公弑子赤而立其罪同於桓公春秋書月書王不罪天王之不討者非赦之也天下無王自平王而下至於桓公王道之不行未久也聖人一十八年之間書王者四始終反覆欲其見討而竟不能於是而不王以為法於萬世至宣公則王道之不行百餘年矣亂臣賊子接迹以起而王者未嘗誅之非天下之無王何至是也惟其無王是以書王耳春秋於桓宣之惡非偏有輕重以桓公之時王猶可望而宣公之時竟無王也王猶可望則可以待王之誅後竟無王於是書王以討之也武夷胡氏傳宣公為弑君者所立受之而不討賊是亦聞乎弑也故如其意焉而書即位以著其自立之罪而不嫌於同詞美一也有大小則襃詞異惡一也有大小則貶詞異一美一惡無嫌於同公子遂如齊逆女杜氏注不譏䘮娶者不待貶絶而自明也武夷胡氏傳魯秉周禮䘮未期年遣卿逆女何亟乎大子赤齊出也仲遂殺子赤及其母弟而立宣公懼於見討故結婚於齊為自安計越典禮以逆之如此其亟而不顧者必敬嬴仲遂請齊立接之始謀也其後滕文公定為三年䘮父兄百官皆不欲曰吾宗國魯先君莫之行也喪紀寖廢夫豈一朝一夕之故自文宣莫之行矣此所謂不待貶絶而罪惡見者也三月遂以夫人婦姜至自齊公羊傳何以不稱公子一事而再見者卒名也何氏注卒竟也竟但舉名者省文夫人何以不稱姜氏貶曷為貶譏喪娶也䘮娶者公也則曷為貶夫人内無貶於公之道也内無貶於公之道則曷為貶夫人夫人與公一體也其稱婦何有姑之辭也穀梁傳其不言氏䘮未畢故略之也范氏注夫人不能以禮自固故與有貶武夷胡氏傳有不待貶絶而罪惡見者不貶絶以見罪惡夫人與有罪焉則待貶而後見故不稱氏夫人其如何知惡無禮如野有死麕能以禮自防如草蟲愆期有待如歸妹之九四則可免矣凡稱婦者其詞雖同立義則異逆婦姜於齊病文公也以婦姜至自齊責敬嬴也敬嬴嬖妾私事襄仲以其子屬之殺世適兄弟出主君夫人援成風故事即以子貴為國君母斬焉在衰服之中請婚納婦而其罪隠而未見也故因夫人至特稱婦姜以顕之此乃春秋推見至隠著妾母當國用事為後世鑒者也槩指為有姑之詞而不察其㫖則精義隠矣夏季孫行父如齊左氏傳夏季文子如齊納賂以請㑹武夷胡氏傳經書行父如齊而不言其故謂納賂以請㑹者傳也經有不待傳而著者比事以觀斯得矣下書公㑹齊侯于平州則知此㑹行父請之也又書齊人取濟西田則知其請蓋以賂也雖微傳其事著矣諸侯立卿為公室輔猶屋之有楹也而謀國如此亦不待貶絶而惡自見者也不然以行父之勤勞㳟儉相三君而無私積必能以其君顯名與晏嬰等矣晉放其大夫胥甲父于衛左氏傳晉人討不用命者放胥甲父于衛杜氏注文十二年戰河曲不肯薄秦於險而立胥克公羊傳放之者何猶曰無去是云爾何氏注是是衛常山劉氏曰諸侯専放大夫於義可乎唯罪輕於專殺耳武夷胡氏傳秦晉戰于河曲撓臾駢之謀者趙穿也若討其不用命則當以穿為首止治軍門之呼偕貶可也而獨放胥甲父則以趙盾當國穿其族子而盾芘之也桃園之罪其志固形於此矣故稱國以放見晉政之在私門而成上侵為後戒也公㑹齊侯于平州左氏傳㑹于平州以定公位杜氏注平州齊地在泰山牟縣西武夷胡氏傳案左氏曰㑹于平州以定公㑹魯宣篡立踰年舉國臣子既從之矣若之何位猶未定而有待於平州之㑹也春秋以来弑君篡國者已列於諸侯之㑹則不復致討故曹人以此請負芻於晉夫篡弑之賊毁滅天理無所容於天地之間身無存殁時無古今其罪不得赦也以列於㑹而不復討是率天下百為無父無君之徒矣此仲尼所為懼春秋所以作也然欲定其位者魯宣公宜稱及齊而曰㑹者討賊之法也凡討亂臣賊子必深絶其黨而後為惡者孤矣吕氏曰子赤卒夫人歸公即位逆女於齊又㑹齊侯于平州齊人取濟西田雖欲不疑於人不可得也已公子遂如齊左氏傳東門襄仲如齊拜成武夷胡氏傳宣公篡立之罪仲遂主謀為首惡初請於齊遂為上客而並書介使者罪叔孫得臣不能為有無亦從之也大夫有以死争者矣然削而不書者以叔仲惠伯死非君命失其所也遂及行父則一再見於經矣如齊拜成雖削之可也又再書於策者於以著其始終成就弑立之謀以戒後世人臣或内交宫禁以固其寵或外結藩鎮以為之援至於殺生廢置皆出其手而人主不悟者其慮深矣凡此皆直書於策而義自見者也六月齊人取濟西田左氏傳齊人取濟西之田為立公故以賂齊也杜氏注濟西故曹地僖三十一年晉丈以分魯伊川先生觧宣公不義得國賂齊以求助齊受之以助不義故書取不義不能保其土故不云我非為彼强取故不諱不能有而失者皆諱武夷胡氏傳魯人致賂以免討而書齊人取田者所以著齊罪春秋討賊尤嚴於利其為惡而助之者所以孤其黨夫齊魯鄰國盟主之餘業也子惡弑出姜歸而宣公立不能聲罪致討務寜魯亂首與之㑹是利其為惡而助之也弑君篡國人道所不容而貨賂公行免於諸侯之討則中國胥為戎夷人類滅為禽獸其禍乃自不知以義為利而以利之可以為利而為之也孟子為梁王極言利國者必至於弑奪而後饜盖得經書取田之意舉法如此然後人知保義棄利亂臣賊子孤立無徒而亂少弭矣襄陵許氏曰桓公既弑以許田賂鄭宣公既弑以濟西田賂齊夫負不義於天下則所藉以行者唯利而已凡非利不取者則亦何義之與擇至於弑父與君将無不合也是以桓宣之計若出一軌春秋志之以見世平則正與法皆勝世變則亂與賂俱行自然之符可不戒諸秋邾公作邾婁子来朝楚子鄭人侵陳遂侵宋穀梁傳遂繼事也武夷胡氏傳楚書爵而人鄭者貶之也鄭伯本以宋人弑君晉不能討受賂而還以此罪晉為不足與也遂受盟于楚今乃附楚以亟病中國何義乎書侵陳遂侵宋者以見潜師掠境肆為侵暴非能聲宋罪而討之也既正此師為不義然後中國之師可舉矣晉趙盾帥師救陳宋公陳侯衞侯曹伯㑹晉師于裵公作棐林伐鄭左氏傳宋人之弑昭公也晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟於晉又㑹諸侯于扈将為魯討齊皆取賂而還鄭穆公曰晉不足與也遂受盟於楚陳共公之卒楚人不禮焉陳靈公受盟於晉秋楚子侵陳遂侵宋晉趙盾帥師救陳宋㑹于棐林以伐鄭也楚蒍賈救鄭遇于北林囚晉觧揚晉人乃還杜氏注棐林鄭地滎陽宛陵縣東南有林郷泰山孫氏曰此晉趙盾帥師救陳致宋公陳侯衞侯曹伯于棐林伐鄭也經言宋公陳侯衞侯曹伯㑹晉師于棐林伐鄭者不與趙盾致四國之君也武夷胡氏傳鄭在王畿之内而附蠻夷陳先代帝王之後而見侵逼此門庭之宼利用禦之者也晉能救陳則存諸夏攘夷狄之師故特襃而書救凡書救者未有不善之也如觧倒懸如拯民於塗炭之中知此義則知春秋用兵之意矣傳稱師救陳宋經不書宋此非闕文乃聖人削之也前方以不能討宋上卿貶而稱人諸侯㑹而不序今若書救宋則典型紊矣列數諸侯而㑹晉趙盾穀梁子以為大趙盾之事以其大之也故曰師此說非也春秋立法君為重而大夫與師其體敵列數諸侯於帥師之下而又書大夫之名氏則臣疑於君而不可以為訓其曰㑹晉師此乃謹禮於微之意也其立義精矣棐林鄭地也前者地而後伐以為疑詞此其地則以著其美者一美一惡無嫌於同冬晉趙穿帥師侵崇公作栁左氏傳晉欲求成於秦趙穿曰我侵崇秦急崇必救之杜氏注崇秦之與國吾以求成焉冬趙穿侵崇秦弗與成武夷胡氏傳崇在西土秦所與也晉欲求成於秦不以大義動之而伐其與國則為諼已甚比諸伐楚以救江異矣而傳謂設此謀者趙穿也意者趙穿已有逆心欲得兵權託於伐國以用其衆乎不然何謀之迂而當國者亦不裁正而從之也穿之名姓自登史䇿弑君於桃園而上卿以志同受惡其端又見於此書侵以見所以求成者非其道矣晉人宋人伐鄭左氏傳晉人伐鄭以報北林之役於是晉侯侈趙宣子為政驟諫而不入故不競於椘武夷胡氏傳宋人弑君既列于㑹在春秋衰世已免於諸侯之討矣論春秋王法則其罪固在法所不赦也而晉人與之合兵伐鄭是謂以燕伐燕庸愈乎其書晉人宋人非将卑師少盖貶而人之也以貶書伐者若曰聲罪致討而已有瑕則何以伐人矣二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元左氏傳鄭公子歸生受命於楚伐宋宋華元樂吕御之二月壬子戰于大棘宋師敗績囚華元杜氏注大棘在陳留襄邑縣南武夷胡氏傳兩軍接刃主将見獲其負明矣又書師敗績詞不贅乎此明大夫雖貴與師等也故将尊師少稱将不稱師師衆將卑稱師不稱将将尊師衆並書於策者示人君不可輕役大衆又重将帥之選其義深矣或曰元帥三軍之司命而輕重若是班乎自行師而言則以元帥為司命自有國而言則以得衆為邦本鄭使髙克将兵禦狄於境欲逺克也而不恤其師楚以六卒實從得臣恐䘮師也而不恤其将故經以棄師罪鄭以殺其大夫責楚明此義然後知王者之道輕重之權衡矣秦師伐晉左氏傳秦師伐晉以報崇也遂圍焦武夷胡氏傳案左氏以報崇也遂圍焦晉用大師於崇乃趙穿私意而無名也故書侵秦人為是興師而報晉則問其無名之罪也故書伐世豈有欲求成於强國而侵其所與可以得成者乎穿之情見矣宣子當國筭無遺策獨懵於此哉其從之也而盾之情亦見矣春秋書事筆削因革必有以也一侵一伐而不書圍焦所以誅晉卿上侵之意其所由来者漸矣襄陵許氏曰自襄至悼六伐晉獨此稱師則靈之季不競甚矣夏晉人宋人衞人陳人侵鄭左氏傳夏晉趙盾救焦遂自隂地及諸侯之師侵鄭以報大棘之役楚鬭椒救鄭曰能欲諸侯而惡其難乎遂次於鄭以待晉師趙盾曰彼宗競於楚殆将斃矣姑益其疾乃去之武夷胡氏傳案左氏晉趙盾及諸侯之師侵鄭以報大棘之役初鄭歸生受命於楚以伐宋經不書伐而以宋華元主大棘之戰者蓋楚人有詞於宋矣師之老壮在曲直晉主夏盟盾既當國合諸侯之師何畏乎楚何避乎鬭椒然力非不足而去之者以理曲也故卿不氏而稱人師書侵而不言伐易於訟卦之象曰君子作事謀始始而不謀将至於興師動衆有不能定者矣晉唯取賂釋宋而不討至以中國之大不能服鄭不競於楚可不慎乎春秋行事必正其本為末流之若此也其垂戒明矣秋九月乙丑晉趙盾弑其君夷臯公作獔左氏傳晉靈公不君厚斂以雕牆從臺上彈人而觀其辟丸也宰夫胹熊蹯不熟殺之趙宣子驟諫公患之使鉏麑賊之晨往寝門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死秋九月晉侯飲趙盾酒伏甲将攻之其右提彌明知之遂扶以下鬬且出提彌明死之乙丑趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越竟反不討賊非子而誰宣子使趙穿逆公子黒臀於周而立之辨疑曰董狐云亡不越竟言行未遂逺而君被殺反又不討賊状涉同謀耳非謂越竟即無罪也髙郵孫氏曰趙盾之為大夫於晉其執政之乆且専如此靈公無道而欲殺盾者数矣族人弑君而盾反不討又與之並立於朝然則弑君者誰歟盾也若盾者蓋隂弑其君而陽逃其迹實行其計而穿受其名者也有執政之乆其賢聞於國人而靈公無道滋欲殺之出奔未逺而其族人乗國人之不悦而弑之盾反討賊猶未免也况不討乎春秋弑君多矣不必其身弑之他人弑之而已受其福者孔子皆以弑賊誅之不論其同謀不同謀也弑隐公者公子翬也桓公被弑君之罪弑子赤者公子遂也而宣公受弑君之名必待其親弑然後罪之則姦臣賊子得以計免而庸愚無知者常當其實也武夷胡氏傳趙穿手弑其君董狐歸獄於盾其斷盾之獄詞曰子為正卿亡不越境反不討賊以是書斷而盾也受其惡而不敢辭仲尼因其法而不之革其義云何曰亡而越境謂去國而不還也然後君臣之義絶反而討賊謂復讎而不釋也然後臣子之事終不然是盾偽出而實聞乎故也假令不與聞者而縱賊不討是有無将之心而意欲穿之成乎弑矣惡莫慘乎意今以此罪盾乃閑臣子之邪心而謹其漸也微夫子推見至隐垂法後世亂臣賊子皆以詭計獲免而至愚無知如史太鄧扈樂之徒皆蒙歸獄而受戮焉君臣父子不相夷以至於禽獸也㡬希襄陵許氏曰討賊發於忠憤嘗藥生於孝愛如擊其首而手應如徒跣疾馳而目視夷險有不待思焉而得勉焉而至者矣盾不討賊止不嘗藥此其不遂於理非其智之罪也所以誠其心於忠孝者有不至也冬十月乙亥天王崩公羊傳何休注匡王三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望左氏傳不郊而望皆非禮也望郊之屬也不郊亦無望可也公羊傳曷為不復卜養牲養二卜帝牲不吉則扳稷牲而卜之帝牲在於滌三月於稷者唯具是視郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自内出者無匹不行自外至者無主不止武夷胡氏傳乃不郊為牛之口傷改卜牛而牛又死也不然郊矣禮為天王服斬衰周人告喪於魯史策已書而未葬也祀帝於郊夫豈其時而或謂不以王事廢天事禮乎春秋以来喪紀寖廢有不奔王䘮而逺適他國有不修弔禮而自相聘問固将以是為可舉而不廢也卒至漢文以日易月後世不能復其所由來漸矣春秋備書其義自見三望者公羊曰祭泰山河海夫天子有天下凡宇宙之内名山大川皆其所主也故得祭天而有方望無所不通諸侯有一國則境外之山川他人所主者而可以望乎季氏旅於泰山冉求不能救而夫子責之者為泰山魯侯所主也大夫何與焉季氏不得旅泰山則河海非魯之封内其不得祭亦明矣猶者可已不當為之詞𦵏匡王杜氏注四月而𦵏速武夷胡氏傳四月而葬王室不君其禮略也微者往㑹魯侯不臣其情慢也或曰宣公親之者也而常事不書非矣崩葬始終之大變豈以是為常事而不書也楚子伐陸公作賁渾之公榖無之字戎左氏傳楚子伐陸渾之戎遂至於雒觀兵於周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎武夷胡氏傳夷狄相攻不志此其志何也為陸渾在王都之側戎夏雜䖏族類之不分也楚又至雒觀兵於周疆問鼎之大小輕重焉故特書於策以謹華夷之辨禁猾夏之階夏楚人侵鄭左氏傳晉侯伐鄭及郔鄭及晉平士㑹入盟夏楚人侵鄭鄭即晉故也武夷胡氏傳案左氏晉侯伐鄭鄭及晉平而經不書者仲尼削之也鄭本以晉靈不君取賂釋賊為不足與似也而往從楚非矣今晉成公初立背僣竊偽邦而歸諸夏則是反之正也春秋大改過許遷善書楚人侵鄭者與鄭伯之能反正也故獨著楚人侵掠諸夏之罪爾鄭既見侵於楚則及晉平可知矣秋赤狄侵齊襄陵許氏曰楚侵其南狄侵其北此中國大過棟撓之時也宋師圍曹左氏傳宋文公即位三年殺母弟須及昭公子武氏之謀也使戴桓之族攻武氏於司馬子伯之館盡逐武穆之族以曹師伐宋秋宋師圍曹報武氏之亂也冬十月丙戌鄭伯蘭卒𦵏鄭穆公左氏傳冬鄭穆公卒四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向左氏傳公及齊侯平莒及郯莒人不肯公伐莒取向非禮也平國以禮不以亂伐而不治亂也以亂平亂何治之有無治何以行禮杜氏注向莒邑東海承縣東南有向城逺疑也劉氏傳何言乎莒人不肯公伐莒取向譏何譏爾平莒及郯義也莒人不肯吾有不義焉伐莒强也取向利也非君子之道也君子之道猶射射者正已而發發而不中不怨勝已者反求諸已而已矣髙郵孫氏曰春秋之義不以有功沒其過不以不正治人之邪楚人殺陳夏徴舒則為義入陳則無道矣平莒及郯則近正伐莒取向則有罪矣武夷胡氏傳心不偏黨之謂平以此心平物者物必順以此心平怨者怨必釋惟小人不能宅心之若是也雖以勢力强之而有不獲成者矣夫以齊魯大國平郯莒小邦宜其降心聽命不待文告之及也然而莒人不肯則以宣公心有所私係失平怨之本耳故書及書取以著其罪及所欲也平者成也取者盗也不肯者心弗允從莫能強之者也以利心圖成雖强大者不能行之於弱小春秋書此戒後世之不知治其本者故行有不得者反求諸已斯可矣秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷左氏傳楚人獻黿於鄭靈公杜氏注穆公大子夷也公子宋與子家将見子公之食指動以示子家曰他日我如此必嘗異味及入宰夫将觧黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先子家曰畜老猶憚殺之而况君乎反譖子家子家懼而從之夏弑靈公陸氏微㫖淳聞於師曰子公弑君之賊也其惡易知矣子家縱其為逆罪莫大焉書之以為首惡所以教天下之為人臣者也春秋之作聖人本以明微盖謂此也此與書趙盾之弑義同武夷胡氏傳首謀弑逆者公子宋也懼譖而從之者歸生也而以歸生為首惡何也夫亂臣賊子欲動其惡而不從者未有能全其身而不死也故季子然問仲由冉求其從之者與子曰弑父與君亦不從也是以死節許二子矣歸生懼譖而從公子宋特無求路不可奪之死節耳書為首惡不亦過乎曰歸生與宋並為大夫乃貴戚之卿同執國政可以不從一也嘗統大師與宋戰獲其元帥已得兵權可以不從二也聞宋逆謀登時而覺先事誅之猶反手耳夫據殺生之柄仗大義以制人使人聽已猶犬羊之伏於虎也何畏於人懼其見殺而從之也哉計不出此顧以畜老憚殺比方君父歸生之心悖矣故春秋舍公子宋而以弑君之罪歸之為後世鑒若司馬亮沈慶之等苟知此義則能討罪人不至於失身為賊所制矣赤狄侵齊秋公如齊公至自齊武夷胡氏傳君行告至常事不書宣公比年如齊而皆致者危之也夫以篡弑謀於齊而取國以土地賂齊而請㑹以卑屈事齊而求安上不知有天王下不知有方伯惟利交是奉而可保乎髙固之事亦殆矣故比年如齊而皆致以戒後世之欲利有攸往者惟義之與比為可安耳冬楚子伐鄭左氏傳冬楚子伐鄭鄭未服也五年春公如齊夏公至自濟左氏傳公知齊髙固使齊侯止公請叔姬焉夏公至自齊書過也秋九月齊髙固来逆公榖有子字叔姬左氏傳齊髙固来逆女自為也故書曰逆叔姬卿自逆也榖梁傳諸侯之嫁子於大夫主大夫以與之来者接内也不正其接内故不與夫婦稱之也范氏注髙固齊之大夫而今與君接婚姻之禮故不言逆女陸氏纂例春秋時有子叔姬者三公羊穀梁皆云同母娣妹非也據稱子直為時君之子以别先君之子耳或云若是文公女不應有兩叔姬案伯仲之外餘稱叔故管叔蔡叔等即其例也武夷胡氏傳案左氏公如齊髙固使齊侯止公請叔姬焉書夏公至自齊秋齊髙固来逆子叔姬罪宣公也其曰来者以公自為之主稱子者或謂别於先公之女也諸侯嫁女於大夫主大夫以與之者為體敵也而公自為之主壓尊毁列卑朝廷慢宗廟矣夫以鄭國褊小楚公子圍之貴驕强大来娶於鄭子産辭而郤之使館於外欲野賜之幾不得撫有其室而宣公以魯國周公之後逼於髙固請婚其女强委禽焉而不能止惟不知以禮為守身之榦是以得此辱也春秋詳書為後世鑒欲人之必謹於禮以定其位不然卑巽妄說不近於禮奚足逺恥辱哉叔孫得臣卒冬齊髙固及子叔姬来左氏傳冬来反馬也武夷胡氏傳左氏曰反馬也禮嫁女留其送馬不敢自安反廟見成婦遣使反馬則髙固親来非禮也又禮女子有行逺父母者嵗一歸寕今見逆逾時未易嵗也而叔姬亟来亦非禮也故書及書来以著齊罪也大夫適他國必有君命與公事否則禮法之所禁而可犯乎恵公許其臣越禮恣行而莫遏髙固委其君踰境自如而不忌則人欲已肆矣凡婚姻常事不書而書此者則以為非常為後世戒也楚人伐鄭左氏傳楚子伐鄭陳及楚平晉荀林父救鄭伐陳六年春晉趙盾衛孫免侵陳左氏傳晉衛侵陳陳即楚故也武夷胡氏傳案傳稱陳及楚平荀林父伐陳經皆不書者以下書晉衛加兵於陳即陳及楚平可知矣以趙盾孫免書侵即林父無詞可稱亦可知矣愛人不親反其仁治人不治反其智晉嘗命上将帥師救陳又再與之連兵伐鄭今而即楚無及於已有缺盍亦自反可也不内省徳遽以兵加之則非義矣故林父不書伐而盾免書侵以正晉人所以主盟非其道也㐮陵許氏曰外志侵伐從兵書卿始於宣六年㑹討書卿始於襄元年從兵書卿帥師始於襄十年然終春秋世三國而止未有書卿帥師侵曰伐者猶戢之也說者以侵陳之後不書帥師委曲生意誤矣夏四月秋八月螽公作􅏑武夷胡氏傳先是公伐莒取向後再如齊伐莱軍旅數起賦斂既繁戾氣應之矣夫善惡之感萌於心而災祥之應見於事宣公不知舍惡遷善以補前行之愆而用兵不息災異數見年榖不豐國用空乏卒至改助法而稅民蓋自此始矣經於蟲螟一物之變必書於䇿示後世天人感應之理不可誣當慎其所感也冬十月七年春衛侯使孫良夫来盟左氏傳衛孫桓子来盟始通且謀㑹晉也榖梁傳来盟者前定也武夷胡氏傳来盟為前定者嘗有約言矣未足效信而釋疑又相歃血固結之爾是盟衛欲為晉致魯而魯専事齊初未與晉通也必有疑焉而衛侯任其無咎故遣良夫來為此盟而公卒見辱盟非春秋之所貴義自見矣夏公㑹齊侯伐萊秋公至自伐萊杜氏注莱國今東萊黄縣武夷胡氏傳及者内為志㑹者外為主平莒及郯公所欲也故書及繼以取向即所欲者可知矣伐萊齊志也故書㑹繼以伐致即師行之危亦可知矣公與齊侯俱不務徳合黨連兵恃强陵弱是以為此舉也大旱冬公㑹齊侯宋公衛侯鄭伯曹伯于黒壤左氏傳鄭及晉平公子宋之謀也故相鄭伯以㑹冬盟于黒壌王叔桓公臨之以謀不睦晉侯之立也公不朝焉又不使大夫聘晉人止公于㑹盟于黄父公不與盟以賂免杜氏注黄父即黒壤故黑壤之盟不書諱之也武夷胡氏傳㑹而不得見不以不得見為諱盟而不與盟不以不與盟為諱則曲不在公而主㑹盟者之罪耳與於㑹不與於盟而公有歉焉非主㑹盟者之過也則書㑹不書盟若黒壤是也晉侯之立公既不朝又不使大夫聘而每嵗適齊是宣公行有不慊於心而非晉人之咎矣凡不直者臣為君隠子為父隠於以養臣子愛敬之心而不事盟主又以賂免則不直在已矣八年春公至自㑹夏六月公子遂如齊至黄乃復公羊傳其言至黄乃復何有疾也何言乎有疾乃復譏何譏爾大夫以君命出聞䘮徐行而不反何氏注聞䘮者聞父母之喪徐行者不忍疾行又為君當使人追代之以䘮喻疾者䘮尚不當反况於疾乎劉氏傳有疾也何言乎有疾乃復譏何譏爾大夫以君命出未致使而死以尸将事武夷胡氏傳乃者無其上之詞其曰復事未畢也辛巳有事於大廟仲遂卒于垂左氏傳有事于大廟襄仲卒而繹非禮也劉氏傳大夫卒稱名仲者字也其曰仲遂何譏何譏爾譏世卿世卿非禮也言自是世仲氏也武夷胡氏傳有事言時祭此公子遂也曷為書字生而賜氏俾世其官也曷為書卒以事之變卒之也古者諸侯立家大夫卒而賜氏其後尊禮權臣寵遇貴戚而不由其道於是乎有生而賜氏其在魯則季友仲遂是也襄仲殺惡及視援立宣公而公深徳之故生而賜氏俾世大夫以荅之也經於其卒書族以志變法之端為後世戒壬午猶繹萬入去籥公羊傳繹者何祭之明日也萬者何干舞也籥者何籥舞也其言萬入去籥何去其有聲者廢其無聲者存其心焉爾存其心焉爾者何知其不可而為之也猶者何通可以已也杜氏注魯人知卿佐之䘮不宜作樂而不知廢繹故内舞去籥惡其聲聞武夷胡氏傳繹者祭之明日以賔尸也猶者可已之詞萬舞也以其無聲也故入而遂用籥管也以其有聲也故去而不作是謂故知不可存其邪心而不能格也禮大夫卒當祭則不告終事而聞則不繹不告者盡肅敬之誠於宗廟不繹者全始終之恩於臣子今仲遂國卿也卒而猶繹則失寵遇大臣之禮矣春秋雖隆君抑臣而體貌有加焉則亷陛益尊而臣節礪後世法家専欲隆君而不得其道至於犬馬國人相視大倫滅矣聖人書法如此存君臣之義也戊子夫人嬴公榖作熊氏薨杜氏注宣公母也武夷胡氏傳敬嬴文公妾也何以稱夫人自成風聞季友之繇事友而屬其子及僖公得國立以為夫人於是乎嫡妾亂矣春秋於風氏凡始卒四貶之則禘於大廟秦人歸襚榮叔含賵召伯㑹葬去其姓氏不稱夫人王再書而無天是也敬嬴又嬖私事襄仲而屬宣公不待致於大廟援例以立則從同同而無貶矣其意若曰以義起禮為可繼苟出於私情而非義後雖欲正可若何晉師白狄伐秦左氏傳白狄及晉平夏㑹晉伐秦武夷胡氏傳晉主夏盟糾合諸侯攘夷狄安諸夏乃其職矣秦人之怨起自侵崇其曲在晉責已可也既不知自反釋怨修睦以補前過已可咎矣乃復興師動衆㑹戎狄以伐之獨不惡傷其類乎直書於策貶自見矣楚人滅舒蓼榖作鄝左氏傳楚為衆舒叛故伐舒蓼滅之楚子强之及滑汭盟呉越而還武夷胡氏傳案詩稱戎狄是膺荆舒是懲在周公所懲者其自相攻滅中國何與焉然春秋書而不削者是時楚人強舒蓼及滑汭盟呉越勢益强大将為中國憂而民有蕩析離居之患矣經斯世者當以為懼有攘却之謀而不可忽則聖人之意也秋七月甲子日有食之既杜氏注月三十日食襄陵許氏曰董仲舒劉向以為先是楚商臣弑父而立至於荘王遂强諸夏大國惟有齊晉齊晉新有篡弑之禍内皆未安故楚乗弱横行八年之間六侵伐而一滅國伐陸渾戎觀兵周室後又入鄭鄭伯肉袒謝罪北敗晉師于邲流水血色圍宋九月析骸而炊之冬十月己丑葬我小君敬嬴云榖作頃熊雨不克葬庚寅日中而克葬榖梁傳葬既有日不為雨止禮也雨不克葬喪不以制也杜氏注敬諡嬴姓也武夷胡氏傳成風薨以夫人𦵏以小君将祔於廟而始有二夫人也則四貶之以正其事今敬嬴亦薨以夫人𦵏以小君使祔於廟無貶以正之從同同可也而於宣公元年即以所逆穆姜婦之何也曰婦有姑之詞見敬嬴遂以子貴援例而亟立為夫人也僖公享國八年然後致成風而敬嬴之亟也雖云援例魯君臣之責亦可知矣無貶而書法若此者猶桓宣弑君而書即位爾又曰敬嬴以其子宣公屬諸襄仲殺太子及其母弟雖假手於仲實敬嬴之謀也經書子赤卒夫人姜氏歸於齊其文無貶而讀者有傷切之意焉則以秉彛不可滅也傳說哭而過市市人皆哭敬嬴逆天理拂人心之状慘矣其於終事雨不克𦵏著咎徴焉而謂無天道乎此皆直書以見人心與天理之不可誣者也夫䘮事即逺有進無退浴于中霤飯于牖下小斂于戸内大斂于阼階殯于客位遷于廟祖于庭塴于墓以弔賔則其退有節以虞事則其祭有時不為雨止禮也雨不克𦵏䘮不以制也或曰卜𦵏先逺日所以避不懐也諸侯相朝與旅見天子入門而雨霑服失容則廢矧送終大事人情所不忍遽者反可冒雨不待成禮而𦵏乎潦車載蓑笠士䘮禮也有國家者乃不能為雨備何也且公庭之於墓次其禮意固不同矣不得不可以爲恱無財不可以為恱得之為有財古之人皆用焉而不能為之備是儉其親也不亦薄乎故榖梁子曰雨不克𦵏䘮不以制也厚𦵏古人之所戒而墨之治䘮也以薄又君子之所不與故喪事以制春秋之㫖也襄陵許氏曰子惡之弑謀自敬嬴故春秋因其雨不克𦵏而著咎徴焉君子於是乎知有大道城平陽杜氏注今泰山有平陽縣襄陵許氏曰國有大喪始𦵏而又動衆城邑非特不愛民力以公為忘親愛矣不時孰甚焉楚師伐陳左氏傳陳及晉平楚師伐陳取成而還九年春王正月公如齊公至自齊泰山孫氏曰公有母喪而逺朝强齊公之無哀也甚矣夏仲孫蔑如京師左氏傳春王使来徴聘夏孟獻子聘於周王以為有禮厚賄之武夷胡氏傳以淺言之屬辭比事春秋教也當嵗首月公朝於齊夏使大夫聘于京師此皆比事可考不待貶絶而惡自見者也宣公享國九年於周纔一往聘其在齊則又再朝矣經於如齊每行必致深罪之也下逮戰國周衰甚矣齊威王往朝於周而天下皆賢之况春秋時乎而宣公不能也故聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣此經書君如齊臣如周之意而特書王正月以表之也齊侯伐萊襄陵許氏曰狄比侵齊齊不敢報萊不犯齊而齊亟伐之畏衆强而虐輕弱此可以觀惠公矣秋取根牟左氏傳言易也杜氏注根牟東夷國也今琅邪陽都縣東有牟郷劉氏傳根牟者何附庸之國也八月滕子卒左氏傳秋滕昭公卒九月晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳辛酉晉侯黒臀卒于扈左氏傳討不睦也杜氏注謀齊也陳侯不㑹杜氏注前年與楚成故晉荀林父以諸侯之師伐陳晉侯卒于扈乃還杜氏注卒於竟外故書地武夷胡氏傳案左氏討不睦也陳侯不㑹荀林父以諸侯之師伐陳晉侯卒乃還則知經所書者與晉罪陳之詞也㑹于扈以待陳而陳侯不㑹然後林父以諸侯之師伐之也則幾於自反而有禮矣不書諸侯之師而曰林父帥師者在㑹諸侯皆以師聽命而林父兼将之也則其衆輯矣晉主夏盟又嘗救陳所宜與也而惟楚之即夫豈義乎陸氏纂例案國君不卒於其國例書地冬十月癸酉衛侯鄭卒武夷胡氏傳晉成公何以不葬魯不㑹也衛成公何以不𦵏亦魯不㑹也衛成事晉甚謹而魯宣公獨深向齊衞欲為晉致魯故謀黒壤之㑹而特使孫良夫来盟以定之也及㑹于黒壤而晉人止公賂然後免是以扈之㑹皆前日諸侯而魯獨不往二國繼以䘮赴亦皆不㑹此所謂無其事而闕其文者也或曰二君皆有貶焉故不書葬誤矣魯人不㑹亦無貶乎書卒而以私怨廢禮忘親其罪已見春秋文簡而直視人若日月之無私照也曲生意義失之逺矣宋人圍滕左氏傳因其喪也武夷胡氏傳圍國非将卑師少所能辦也必動大衆而使大夫為主帥明矣然而稱人是貶之也滕既小國又方有喪所宜矜哀弔恤之不暇而用兵革以圍之比事以觀知見貶之罪在不仁矣楚子伐鄭晉郤缺帥師救鄭左氏傳楚子為厲之役故伐鄭晉郤缺救鄭鄭伯敗楚師于柳棼國人皆喜唯子良憂曰是國之災也吾死無日矣武夷胡氏傳楚兵加鄭數矣或稱人或稱爵何也鄭自晉成公初立舍楚而從中國正也楚人為是興師而加鄭不義矣故宣公三年書人書侵罪之也次年鄭公子歸生弑其君諸侯未有聲罪致討者而楚師至焉故特書爵與之也然興師動衆賊則不討惟服鄭之為事則非義舉矣故又次年傳稱楚子伐鄭而經書人再貶之也至是稱爵豈與之乎案公羊傳君将不言帥師書其重者也至此書爵見其陵暴中華以重兵臨鄭矣何以知其非與之乎曰下書晉郤缺帥師救鄭則知非與之也由此觀春秋書法皆欲治亂賊之黨謹華夷之辨以一字為襃貶深切著明矣陳殺其大夫洩公榖作泄冶左氏傳陳靈公與孔寕儀行父通於夏姬皆衷其衵服以戲於朝洩冶諫曰公卿宣淫民無效焉且聞不令君其納之公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶武夷胡氏傳稱國以殺者君與用事大臣同殺之也稱其大夫則不失官守而殺之者有専輒之罪矣洩冶無罪而書名何也冶以諫殺身者也殺諫臣者必有亡國弑君之禍故書其名為徴舒弑君楚子滅陳之端以垂後戒此所謂義係於名而書其名者也比干諫而死子曰商有三仁焉洩冶諫而死而獨無襃詞夫語黙死生當其可而止爾洩冶之盡言無隠不媿夫史魚之直矣方諸比干自靖自獻于先王則未可同日而語也冶雖效忠其猶在宋子哀魯叔肸之後乎故仕於昏亂之朝若異姓者如子哀潔身而去可也其貴戚邪不食其禄如叔肸善矣襄陵許氏曰書殺洩冶張陳亡之本也春秋集觧卷十五
