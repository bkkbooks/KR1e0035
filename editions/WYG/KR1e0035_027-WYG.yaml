body:
  text: 春秋集解卷二十七宋吕本中撰定公名宋襄公子昭公弟敬王十一年即位諡法安民大慮曰定元年春王公羊傳正月者正即位也定無正月者即位故也即位何以後昭公在外得入不得入未可知也曷為未可知在季氏也定哀多微辭主人習其讀而問其傳則未知己之有罪焉爾榖梁傳不言正月定無正也定之無正何也昭公之終非正終也定公之始非正始也昭無正終故定無正始劉氏傳何以無正月定無正也定何以無正定之始非正始也其非正始奈何定者公子宋也昭公之弟也昭公薨于乾侯季孫逆其喪廢太子衍及務人而立公子宋焉喪至於壊隤公子宋先入以主社稷盖受之季氏也非受之先君者也定無正則何以不言正月微辭也正月者正即位也定之即位後未可以言正月主人習其讀而問其傳則未知己之有罪焉爾劉氏意林君子莫重乎授受授受王事之本也授之者以禮受之者以義正也正已而後可以正人矣今定公不然汙於偽誘於利脅於威雖欲正人人何由而正泰山孫氏曰不書正月者定公未立不與季氏承其正朔也是時季氏專國昭公薨于乾侯及嵗之交定又未立故略而不書焉所以黜彊臣而存公室也吕氏曰元年不書正月者國無君無稟天子之正朔者也三月晉人執宋仲幾于京師左氏傳元年春王正月辛巳晉魏舒合諸侯之大夫于狄泉将以城成周魏獻子屬役於韓簡子及原夀過而田於大陸焚焉還卒於寗孟懿子㑹城成周庚寅栽宋仲幾不受功曰滕薛郳吾役也薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然薛宰曰薛之皇祖奚仲居薛以為夏車正奚仲遷於邳仲虺居薛以為湯左相若復舊職将承王官何故以役諸侯士彌牟曰晉之從政者新子姑受功歸吾視諸故府仲幾曰縱子忘之山川鬼神其忘諸乎士伯怒謂韓簡子曰薛徴於人宋徴於鬼宋罪大矣乃執仲幾以歸三月歸諸京師城三句而畢乃歸諸侯之戍公羊傳其言于京師何伯討也伯討則其稱人何貶曷為貶不與大夫專執也榖梁傳此大夫其書曰人何也微之也何為微之不正其執人於尊者之所也泰山孫氏曰春秋之義諸侯不得專執況大夫乎宋仲幾㑹城成周韓不信陪臣也非天子命執仲幾於天子之側甚矣故曰晉人執宋仲幾于京師以疾之武夷胡氏傳案左氏諸侯㑹城成周宋仲幾不受功曰滕薛郳吾役也為是執之則有罪矣書晉人執仲幾于京師則貶詞也以王事討有罪何貶乎案周官司隷掌凡囚執人之事屬於司宼凡諸侯之獄訟定以邦典凡卿大夫之獄訟斷以邦法則大司宼之職也不告諸司宼而執人於天子之側故雖以王事討有罪猶貶凡此類皆篡弑之萌履霜之漸執而書其地謹之也每謹於初而禍亂熄矣夏六月癸亥公之喪至自乾侯戊辰公即位左氏傳夏叔孫成子逆公之喪于乾侯季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聽命焉子家子不見叔孫易幾而哭幾哭㑹也不欲見叔孫故朝夕哭不同㑹叔孫請見子家子子家子辭曰羈未得見而從君以出君不命而薨羈不敢見叔孫使告之曰公衍公為實使羣臣不得事君若公子宋主社稷則羣臣之願也凡從君出而可以入者将唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也宼而出者行可也若羈也則君知其出也而未知其入也羈将逃也喪及壊隤公子宋先入從公者皆自壊隤反六月癸亥公之喪至自乾侯戊辰公即位公羊傳曷為以戊辰之日然後即位正棺於兩楹之間然後即位榖梁傳殯然後即位也定無正見無以正也踰年不言即位是有故公也謂昭公在外故言即位是無故公也即位授受之道也先君無正終則後君無正始也先君有正終則後君有正始也戊辰公即位謹之也定之即位不可不察也癸亥公之喪至自乾侯何為戊辰之日然後即位也正君乎國然後即位也沈子曰正棺乎兩楹之間然後即位也踰年即位厲也范氏注厲危也公喪在外踰年六月乃得即位於厲之中又有義也未殯雖有天子之命猶不敢況臨諸臣乎杜氏注定公不得以正月即位失其時故詳而日之蘇氏曰元年定公之元年也而書曰公之喪至自乾侯可乎昭公之喪未至定公未即位則猶昭公之年也陸氏纂例凡公即位皆於朔日故不書日定公待昭公喪至既殯而即位故書之武夷胡氏傳昭公之薨已越葬期猶未得返至於六月癸亥然後喪至而定之即位乃在是月之戊辰盖遲速進退為意如所制不得專也以周書顧命考之成王之崩在四月乙丑宰臣太保即於是日命仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆王世子釗於南門之外延入翼室宅憂為天下主不待崇朝而後定也今昭公喪至在𦵏期之後公子宋自壊隤先入猶未得立是知為意如所制不得以時定非謂正棺乎兩楹之間故定之即位不可不察也夫即位大事也宗嗣先定則變故不生盖代君享國而主其祭宜戚宜懼一失幾㑹或萌窺伺之心至於生變則為不孝矣古人所以貴於早定國家之本也今昭公之薨定之即位春秋詳書於䇿非為後法乃見諸行事為永鑒耳秋七月癸巳葬我君昭公左氏傳季孫使役如闞公氏将溝焉榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必或恥之乃止秋七月癸巳葬昭公於墓道南孔子之為司寇也溝而合諸墓杜氏注公在外薨故八月乃葬吕氏曰葬本國之君稱葬某公足矣必曰葬我君某公者隆君臣之恩盡忠愛之義資於事父有父之道焉故必曰我君以明之也此道也常時無事則不見此理特於昭公為有大警動於其臣下者九月大雩榖梁傳雩月雩之正也秋大雩非正也冬大雩非正也秋大雩雩之為非正何也毛澤未盡人力未竭未可以雩也雩月雩之正也月之為雩之正何也其時窮人力盡然後雩雩之正也何謂其時窮人力盡是月不雨則無及矣是年不艾則無食矣是謂其時窮人力盡也雩之必待其時窮人力盡何也雩者為旱求者也求者請也古之人重請何重乎請人之所以為人者讓也請道去讓也則是舎其所以為人也是以重之焉請哉請乎應上公古之神人有應上公者通乎隂陽君親帥諸大夫道之而以請焉夫請者非可詒託而往也必親之者也是以重之立煬宫左氏傳昭公出故季平子禱於煬公九月立煬宫公羊傳煬宫者何煬公之宫也立者何立者不宜立也立煬宫非禮也杜氏注煬公伯禽子也武夷胡氏傳煬公伯禽之子其曰立者不宜立也喪事即逺有進而無退宫廟即逺有毁而無立吕氏曰立煬宫違禮悖義之甚言天下之亂無復有綱紀文章也冬十月隕公作霣霜殺菽公羊傳何以書記異也榖梁傳未可以殺而殺舉重范氏注舉殺豆則殺草可知可殺而不殺舉輕其曰菽舉重也杜氏注周十月今八月隕霜殺菽非常之災蘇氏曰於其不殺而言草言其廣也於其殺而言菽言其所害也二年春王正月夏五月壬辰雉門及兩觀災杜氏注雉門公宫之南門兩觀闕也泰山孫氏曰其言雉門及兩觀災者雉門與兩觀俱災也雉門兩觀天子之制秋楚人伐吳左氏傳桐叛楚吳子使舒鳩氏誘楚人曰以師臨我我伐桐為我使之無忌秋楚囊瓦伐吳師於豫章吳人見舟於豫章而潜師於巢冬十月吳軍楚師於豫章敗之遂圍巢克之獲楚公子繁襄陵許氏曰自襄三年書楚公子嬰齊伐吳終於人之則楚力竭矣於是有吳人入郢自昭三十二年書吳伐越終於越再入吳於是吳亡吳楚介在南荒夷蠻相攻不可殫録故刪取其要如此以為伐國之戒冬十月新作雉門及兩觀榖梁傳言新有舊也作為也有加其度也劉氏傳何以書譏何譏爾譏不務乎公室也雉門天子應門劉氏意林魯用王禮是以其庫門天子臯門雉門天子應門而設兩觀僣君甚矣習舊而不知以為非覩變而不知以為戒無怪於季氏之脅其主矣此春秋之微辭至意也泰山孫氏曰新作雉門及兩觀者定公不知僣天子之惡也定公不知僣天子之惡故作而新之武夷胡氏傳書新作者譏僣王制而不能革也雉門象魏之門其外為庫門而臯門在庫門之外其内為應門而路門在應門之内是天子之五門也僖公嘗修泮宫復閟宫非不用民力也而春秋不書新作南門則獨書者南非一門也必有不當為者子家駒以設兩觀為僣天子是非諸侯之制明矣夫撥亂反正者必本諸身身正者物必正春秋於僣君必書者必正之意也使定公遇災而懼革其僣禮三家倍臣雖欲僣諸侯執國命其敢乎習舊而不知以為非何以禁季氏之脅其主矣故特書新作以譏之也吕氏曰雉門兩觀僣矣即災又復作魯之君臣非不知以是為僣也盖以為無足恤也以為無足恤者弑父與君所由起也新作者不用其舊之辭三年春王正月公如晉至河乃復伊川先生解季孫意如上不請於天子下不告於方伯而立定公故晉怒而公往朝焉晉辭公而復故明年因㑹而請盟于臯鼬二公穀作三月辛夘邾公作邾婁子穿卒左氏傳二年邾荘公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之三年春二月辛夘邾子在門臺臨廷閽以缾水沃廷邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投於牀廢於鑪炭爛遂卒夏四月秋葬邾公作邾婁下邾子同荘公冬仲孫何忌及邾子盟于拔公作枝左氏傳冬盟于郯杜氏注郯即拔也修邾好也杜氏注拔地闕襄陵許氏曰天下有禮則邦國相下春秋之季大國日亢小國日侵兵力勝而禮敬亡故志公如晉至河乃復著晉之輕魯也志仲孫何忌及邾子盟于拔著魯之輕邾也當昭公時祲祥之盟猶未爾也四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚左氏傳二年冬蔡昭侯為兩佩與兩裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯蔡人聞之固請而獻佩於子常子常朝見蔡侯之徒命有司曰蔡君之乆也官不共也明日禮不畢将死蔡侯歸及漢執玉而沈曰余所有濟漢而南者有如大川蔡侯如晉以其子元與其大夫之子為質焉而請伐楚四年春三月劉文公合諸侯于召陵謀伐楚也晉荀寅求貨於蔡侯弗得言於范獻子曰國家方危諸侯方貳将以襲敵不亦難乎水潦方降疾瘧方起中山不服杜氏注中山鮮虞棄盟取怨無損於楚而失中山不如辭蔡侯吾自方城以來楚未可以得志祗取勤焉乃辭蔡侯晋人假羽旄於鄭鄭人與之明日或斾以㑹晉於是乎失諸侯伊川先生解楚恃其彊侵陵諸侯晉上請於天子大合諸侯以伐之而不能明暴其罪以行天討無功而還故書侵以罪之杜氏注入楚竟故書侵泰山孫氏曰蔡人病楚使告於晉故晉合諸侯於此此救蔡伐楚也其言㑹于召陵侵楚者諸侯不振不能救蔡伐楚也故使救蔡伐楚之功歸於彊吳冬蔡侯以吳子及楚人戰於柏舉楚師敗績是也噫昭十三年公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘此年公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯杞伯小邾子齊國夏于召陵侵楚五月公及諸侯盟于臯鼬内不能奪大夫之權外不能攘夷狄之患何所為哉徒自相與歃血要言而已此固不足道也蘇氏曰齊侯侵虐魯國晉為魯合諸侯凡八國将討齊取賂而止書曰諸侯盟于扈而不序以不序賤之也今召陵之盟楚方陵蔡晉為蔡大合諸侯凡十八國以求賂不克侵楚而已若不序諸侯則侵楚為愈於扈故序十八國之衆而以侵楚之陋媿之夏四月庚辰蔡公孫公羊有歸字姓帥師滅沈以沈子嘉歸殺之左氏傳沈人不㑹于召陵晉人使蔡伐之夏蔡滅沈陸氏微㫖淳聞於師曰書滅罪蔡也書以歸罪沈子死不於位也言殺之又譏蔡侯也武夷胡氏傳所惡於前無以先後出乎爾者反乎爾者也蔡侯視楚猶沈視蔡也昭公拘於郢三年而後反非以國小而弱乎沈雖不㑹召陵未有大罪惡也而恃彊殺之甚矣能無公孫翩之及哉襄陵許氏曰沈不受令而使蔡滅沈許已受盟而不能禁鄭滅許有以知晉政之失諸侯矣吕氏曰蔡公孫姓不能正其君之失而遂滅沈至以沈子嘉歸殺之其罪極矣春秋之世諸侯君臣失道至此者皆由不知分義苟力所能制則為之矣此與禽獸奚辨五月公及諸侯盟于臯鼬公作浩油左氏傳将㑹衛子行敬子言於靈公曰㑹同難嘖有煩言莫之治也其使祝佗從公曰善乃使子魚及臯鼬将長蔡於衛衛侯使祝佗私於萇宏萇宏曰蔡叔康叔之兄也先衛不亦可乎子魚曰以先王觀之則尚徳也昔武王克商成王定之選建明徳以蕃屏周故周公相王室以尹天下分魯公以大路大旂夏后氏之璜封父之繁弱使之職事於魯以昭周公之明徳分康叔以大路少帛綪茷旃旌大吕分唐叔以大路密須之鼓闕鞏姑洗三者皆叔也而有令徳故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也管蔡啓商惎間王室王於是乎殺管叔而蔡蔡叔其子蔡仲改行帥徳周公舉之以為己卿士見諸王而命之以蔡其命書云王曰胡無若爾考之違王命也若之何其使蔡先衛也晉文公為踐土之盟衛成公不在夷叔其母弟也猶先蔡其載書云王若曰晉重魯申衛武蔡甲午鄭㨗齊潘宋王臣莒期藏在周府可覆視也乃長衛侯於盟伊川先生解公以不獲見於晉故因㑹且求盟焉則此盟公意也故稱公及杜氏注繁昌縣東南有城臯亭陸氏纂例重言諸侯劉子不與盟也劉氏意林楚人之不義甚矣晉以霸主之勢憑王命之重而不能討顧使吳乘其釁中國不振旅功近而禍逺矣不亦病乎此春秋所以眷眷於臯鼬之盟者也襄陵許氏曰齊桓晉文之興至於盟不言同者過乎同之辭也春秋之季至於盟不言同者不及乎同之辭也臯鼬之盟諸侯攜矣齊梁丘據説幣錦昭公不復楚子常志在佩裘使蔡侯自絶晉士鞅以賂罷扈之㑹荀寅求貨弗得折召陵之謀故正勝於明時而賄流於衰世君子是以察治忽也杞伯成公作戊卒于㑹六月𦵏陳惠公許遷于容城秋七月公至自㑹襄陵許氏曰不致侵楚譏無功也諸侯無故而逺渉敵竟師或役乆不知所聽以月致者甚危之也劉卷卒榖梁傳此不卒而卒者賢之也寰内諸侯也非列土諸侯此何以卒也天王崩為諸侯主也葬杞悼公楚人圍蔡左氏傳秋楚為沈故圍蔡襄陵許氏曰圍蔡不書卿帥師者見其驕陵不戒益而必決求而将敗是以㣲之也晉士鞅衛孔圉公作圄帥師伐鮮虞杜氏注士鞅即范鞅蘇氏曰昭十二年楚滅陳蔡晉人不救而伐鮮虞稱晉以夷之今晉既不為蔡伐楚楚人圍蔡亦弗之救而於其伐鮮虞也稱晉士鞅衛孔圉何也晉雖有棄諸侯之罪而蔡無滅亡之禍輕重之異也葬劉文公冬十有一月庚午蔡侯以吳子及楚人戰于柏公穀作伯舉公作莒楚師敗績楚囊瓦出奔鄭左氏傳伍貟為吳行人以謀楚楚之殺郤宛也伯氏之族出伯州犂之孫嚭為吳太宰以謀楚楚自昭王即位無嵗不有吳師蔡侯因之以其子乾與其大夫之子為質於吳冬蔡侯吳子唐侯伐楚舎舟於淮汭自豫章與楚夾漢左司馬戍謂子常曰子沿漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥阨子濟漢而伐之我自後擊之必大敗之既謀而行史皇謂子常楚人惡子而好司馬若司馬毁吳舟於淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳自小别至於大别三戰子常知不可欲奔史皇曰子必死之初罪必盡説十一月庚午二師陳於柏舉闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子常奔鄭吳從楚師及清發将擊之夫槩王曰困獸猶鬭況人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬭心矣半濟而後可擊也從之又敗之楚人為食吳人及之奔食而從之敗諸雍澨五戰及郢己夘楚子取其妹季芊畀我以出庚辰吳入郢以班處宫子山處令尹之宫夫槩王欲攻之懼而去之夫槩王入之左司馬戍及息而還注息汝南新息也聞楚敗故還敗吳師於雍澨傷謂其臣曰誰能免吾首吳句卑曰臣賤可乎司馬曰我實失子可哉三戰皆傷曰吾不可用也已句卑布裳剄而裹之藏其身而以其首免楚子渉睢濟江入於雲中王寝盗攻之以戈擊王王孫由于以背受之中肩王奔鄖鬭辛與其弟巢以王奔隨吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又竄之周室何罪隨人卜與之不吉乃辭吳初伍貟與申包胥友其亡也謂申包胥曰我必復楚國申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師秦伯使辭焉曰寡人聞命矣子姑就館将圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出五年申包胥以秦師至秦子蒲子虎帥車五百乘以救楚子蒲曰吾未知吳道使楚人先與吳人戰而自稷㑹之大敗夫槩王於沂吳人獲薳射於柏舉其子帥奔徒以從子西敗吳師於軍祥秋七月子期子蒲滅唐九月夫槩王歸自立也以與王戰而敗奔楚為堂谿氏吳師敗楚師於雍澨秦師又敗吳師吳師居麇子期将焚之子西曰父兄親暴骨焉不能收又焚之不可子期曰國亡矣死者若有知也可以歆舊祀豈憚焚之焚之而又戰吳師敗又戰於公壻之谿吳師大敗吳子乃歸囚闉輿罷闉輿罷請先遂逃歸杜氏注言吳惟得楚一大夫復失之楚子入於郢公羊傳吳何以稱子夷狄也而憂中國蔡昭公朝乎楚有羔裘焉囊瓦求之昭公不與為是拘昭公於南郢數年然後歸之於是歸焉用事乎河曰天下諸侯苟有能伐楚者寡人請為之前列楚人聞之怒為是興師使囊瓦将而伐蔡蔡請救於吳伍子胥復曰蔡非有罪也楚人為無道君如有憂中國之心則若時可矣於是興師而救蔡榖梁傳吳其稱子何也以蔡侯之以之舉其貴者也蔡侯之以之則舉其貴者何也吳信中國而攘夷狄吳進矣杜氏注柏舉楚地泰山孫氏曰以者乞師而用之也楚人圍蔡晉師不出故蔡侯去晉求救於吳吳子許之冬十有一月吳子蔡侯伐楚庚午及楚人戰于柏舉楚師敗績囊瓦奔鄭吳稱子者大救蔡也晉合十八國之君不能救蔡伐楚吳子救之伐之此吳晉之事彊弱之勢較然可見矣故自是諸侯大小皆宗於吳武夷胡氏傳吳何以稱子善伐楚解蔡圍也荆楚暴横盟主不能致其討天王不能逹其命長惡不悛復興師而圍蔡王法所當討而不赦也吳能自卑聽蔡侯之義以達天子之命興師救蔡戰于柏舉大敗楚師成伯討之功善矣晉主夏盟中國所仰若嘉榖之望雨也有請於晉如彼其難吳國天下莫彊焉非諸侯所能以也有請於吳如此其易故召陵之㑹大合諸侯而書侵楚柏舉之戰蔡用吳師特書曰以者深罪晉人保利棄義難於救蔡也然則何以不言救乎救大矣闔廬子胥宰嚭皆懐謀楚之心蔡人往請㑹逢其適非有救災恤鄰從簡書憂中國之實也聖人道大徳宏樂與人為善故因其從蔡特進而書爵囊瓦貪以敗國又不能死可賤甚矣故其記出奔特貶而稱人春秋之情見矣庚辰吳入郢公榖作楚公羊傳吳何以不書子反夷狄也其反夷狄奈何君舎於君室大夫舎於大夫室盖妻楚王之母也榖梁傳何以謂之吳也狄之也何謂狄之也君居其君之寝而妻其君之妻大夫居其大夫之寝而妻其大夫之妻盖有欲妻楚王之母者武夷胡氏傳及楚人戰則稱爵入郢則舉其號何也君舎於其君之室大夫舎於其大夫之室是亂也聖人誰毁誰譽救災恤鄰則進而書爵非有心於與之順天命也乘約肆淫則出而舉號非有心於貶之奉天討也伐國者固将拯民於水火之中而鳩集之耳殺其父兄係其子弟毁其宗廟遷其重器而亂男女之配也如水益深如火益熱則善小而惡大功不足以掩之矣聖人心無毁譽如鏡之無妍醜也因事物善惡而施襃貶焉不期公而自公爾明此義然後可以司賞罰之權得春秋之法矣五年春王三公作正月辛亥朔日有食之夏歸粟于蔡左氏傳五年夏歸粟于蔡以周亟矜無資杜氏注亟急也榖梁傳諸侯無粟諸侯相歸粟正也孰歸之諸侯也不言歸之者專辭也義邇也范氏注言此是邇近之事故不足以列諸侯也杜氏注蔡為楚所圍饑乏故魯歸之粟吕氏曰列國饑諸侯歸粟正也以為先王之澤猶有存焉者也於越入吳左氏傳越入吳吳在楚也杜氏注於發聲也劉氏傳於越者何於越者其自稱者也越者中國稱之者也髙郵孫氏曰越見於經凡六其三稱越皆在於昭公之時也五年稱越人與楚子伐吳八年楚放陳公子昭於越三十二年吳伐越皆曰越也其三稱於越二在定公之時五年於越入吳十四年於越敗吳于檇李一在哀公之時十三年於越入吳皆曰於越也然則越之見於昭公之時者曰越見於定哀之時者曰於越也盖當是時越有數種有東越南越閩越甌越越於定公之前國名為越故經據其號皆書曰越也於定公之後欲自别於羣越始改號為於越經據其已改之號故皆書曰於越也此猶楚初見經稱荆其後稱楚始改號也六月丙申季孫意公作隠如卒左氏傳六月季平子行東野還未至丙申卒於房陽虎将以璵璠斂仲梁懐弗與杜氏注懐亦季氏家臣曰改歩改玉陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉九月乙亥陽虎囚季桓子而逐仲梁懐冬十月己丑盟桓子於稷門之内庚寅大詛逐公父歜及秦遄皆奔齊劉氏意林意如親逐其君而卒之其異於翬何也曰以定公為君則不得不以意如為大夫矣孰有大夫卒而君不為之變者乎夫意如之逐昭公也明翬遂之弑君也隠而叔仲惠伯之蔽惡也未形春秋固曰有不待貶絶而罪惡見者此之謂也且夫意如之罪固著矣及其卒也而絶之則其著不亦彌信乎而春秋弗為也以謂定不書正月適足以見定之非正而猶未足其效其受國於季氏故於是復明意如為定之大夫也使定公誠能明君臣之義不賞私勞討先君之賊致季氏之誅則意如不免矣故雖逆取而順守之猶賢乎已今一不然苟於利而忘其辱幸于禍而忘其讐謂意如定之大夫也不亦宜乎秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞左氏傳三年秋九月鮮虞人敗晉師於平中獲晉觀虎恃其勇也五年冬晉士鞅圍鮮虞報觀虎之役也六年春王正月癸亥鄭游速公羊傳作遫帥師滅許以許男斯歸左氏傳鄭滅許因楚敗也二月公侵鄭公至自侵鄭左氏傳二月公侵鄭取匡為晉討鄭之伐胥靡也杜氏注胥靡周地也周儋翩因鄭人以作亂鄭為之伐胥靡故晉使魯討之泰山孫氏曰内有彊臣之讐外搆怨於鄭襄陵許氏曰公侵鄭取匡為晉討鄭之伐胥靡也案周儋翩率王子朝之徒因鄭人将以作亂於周鄭於是乎伐馮滑胥靡負黍狐人闕外六月晉閻沒戍周且城胥靡冬十二月天王處于姑蕕辟儋翩之亂也七年春二月周儋翩入於儀栗以叛冬十冇一月戊午單子劉子逆王於慶氏晉籍秦送王己巳王入於王城王室之亂如此而春秋不書者諱也何以諱存中國也春秋之季大夫逐君家臣囚主於是焉又書王辟儋翩之亂則無中國矣夫禮義之節不崇則僣亂之禍滋起故世故之變益醜而春秋之諱彌深存大訓也夏季孫斯仲孫何忌如晉左氏傳夏季桓子如晉獻鄭俘也陽虎彊使孟懿子往報夫人之幣晉人兼享之襄陵許氏曰魯國政在大夫而家臣能彊使之則家臣始擅國矣秋晉人執宋行人樂祁犂左氏傳秋八月宋樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣佗日公謂樂祁曰唯寡人說子之言子必往陳寅曰子立後而行吾室亦不亡杜氏注寅知晉政多門往必有難故使樂祁立後而行惟君亦以我為知難而行也見溷而行趙簡子逆而飲之酒於緜上獻楊楯六十於簡子范獻子言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁武夷胡氏傳稱人以執非伯討也何以非伯討也使范趙方睦皆有獻焉則弗執之矣執異國行人出於列卿私意威福之柄移矣三卿分晉而靖公廢為家人豈一朝一夕之故哉冬城中城季孫斯仲孫忌帥師圍鄆公作運杜氏注何忌不言何闕文吕氏曰不曰仲孫何忌而曰仲孫忌脫文無疑也而公羊以為譏二名二名非禮也大抵三傳解經皆據文生義不論是非無復闕疑最學者大病故不可不詳也七年春王正月夏四月秋齊侯鄭伯盟于鹹左氏傳秋齊侯鄭伯盟于鹹徴㑹於衛衞侯欲叛晉諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我齊侯從之乃盟於瑣杜氏注瑣即沙也杜氏注鹹衛地襄陵許氏曰霸道隳諸侯散離盟始復制此盖自是中國無復殷㑹矣齊鄭之盟叛晉也齊人執衞行人北宫結以侵衞劉氏意林善為國者親近而逺信之附内而外歸之衛侯欺其羣臣以結晉殘其百姓以奉齊齊之執結也固非伯討矣而衛之無良又甚焉從此觀之孟子曰今之諸侯五霸之罪人不亦信乎齊侯衛侯盟于沙公有澤字杜氏注結叛晉也陽平元城縣東南有沙亭大雩齊國夏帥師伐我西鄙左氏傳齊國夏伐我陽虎御季桓子公斂處父御孟懿子将宵軍齊師齊師聞之堕伏而待之處父曰虎不圗禍而必死苫夷曰虎陷二子於難不待有司余必殺女虎懼乃還不敗蘇氏曰魯事晉而齊叛之故伐我九月大雩冬十月春秋集解卷二十七
