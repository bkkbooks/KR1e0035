body:
  text: 春秋集解卷二十九宋吕本中撰哀公名蒋定公子敬王二十六年即位諡法恭仁短折曰哀元年春王正月公即位楚子陳侯隨侯許男圍蔡左氏傳春楚子圍蔡報柏舉也里而栽廣丈髙倍夫屯晝夜九日如子西之素蔡人男女以辨使疆於江汝之間而還蔡於是乎請遷於吳杜氏注定六年鄭滅許此復見者盖楚封之武夷胡氏傳案左氏曰報柏舉也蔡人男女以辨使疆於江汝之間夫男女以辨則是降也疆於江汝則遷其國也而獨書圍蔡何也蔡嘗以吳師入郢昭王奔隨壊宗廟徙祭器撻平王之墓矣至是楚國復寧帥師圍蔡降其衆遷其國而春秋書之略者見蔡宜得報而楚子復讐之事可恕也聖人本無怨而怨出於不怨故議讐之輕重有至於不與共戴天者今楚人禍及宗廟辱逮父母若包羞忍恥而不能一洒之則不可以有立而天理滅矣故特書圍蔡而稱爵恕楚之罪詞也襄陵許氏曰隨列諸侯許復有國王霸不作夷狄擅命矣鼷䑕食郊牛穀有角字改卜牛夏四月辛巳郊榖梁傳此該郊之變而道之也於變之中又有變焉鼷䑕食郊牛角改卜牛志不敬也郊牛日展斛角而知傷展道盡矣郊自正月至於三月郊之時也夏四月郊不時也五月郊不時也夏之始可以承春以秋之末承春之始盖不可矣九月用郊用者不宜用者也郊三卜禮也四卜非禮也五卜彊也卜免牲者吉則免之不吉則否牛傷不言傷之者傷自牛作也故其辭緩全曰牲傷曰牛未牲曰牛其牛一也其所以為牛者異有變而不郊故卜免牛也已牛矣其尚卜免之何也禮與其亡也寧有嘗置之上帝矣故卜而後免之不敢專也卜之不吉則如之何不免安置之繫而待六月上甲始庀牲然後左右之子之所言者牲之變也而曰我一該郊之變而道之何也我以六月上甲始庀牲十月上甲始繫牲十一月十二月牲雖有變不道也待正月然後言牲之變此乃所以該郊郊享道也貴其時大其禮其養牲雖小不備可也子不志三月卜郊何也郊自正月至於三月郊之時也我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣武夷胡氏傳鼷䑕食郊牛改卜牛志不敬也夏四月郊書不時也四卜非禮也五卜彊也全曰牲傷曰牛已牛矣其尚卜免之何也嘗置之上帝矣故卜而後免之不敢專也昔者周公郊祀后稷以配天此成王亮隂之時位冢宰攝國政行天子之事也魯何以得郊成王追念周公有大勲勞於天下而欲尊魯故賜以重祭得郊禘大雩然則可乎孔子曰魯之郊禘非禮也周公其衰矣欲尊魯而賜以人臣不得用之禮樂豈所以康周公也哉天子祭天地諸侯祭社稷大夫祭五祀庶人祭其祖此定理也今魯得郊以為常事春秋欲削而不書則無以見其失禮盡書之乎則有不勝書者故聖人因其失禮之中又有失焉者則書於策所謂由性命而發言也聖人奚容心哉因事而書以誌其失為後世戒其垂訓之義大矣秋齊侯衞侯伐晉左氏傳秋八月齊侯衞侯㑹於乾侯救范氏也師及齊師衛孔圉鮮虞人伐晉取棘蒲襄陵許氏曰楚得專封王道盡矣晉受衆伐霸統亡矣春秋之變至是而窮冬仲孫何忌帥師伐邾二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田左氏傳春伐邾将伐絞邾人愛其土故賂以漷沂之田而受盟榖梁傳取漷東田漷東未盡也及沂西田沂西未盡也泰山孫氏曰案襄十九年取邾田自漷水今三卿帥師伐邾又取漷東田及沂西田故列數之以重其惡襄陵許氏曰中國無霸諸侯並争陵歴不忌矯奪不厭盖自伐晉以後無復寧嵗矣癸巳叔孫州仇仲孫何忌及邾子盟于句繹榖梁傳三人伐而二人盟何也各盟其得也杜氏注句繹邾地劉氏傳曷為三人伐而二人盟季孫臨之叔仲成之季孫之汰也盖自謂猶君矣武夷胡氏傳曷為列書三卿哀公得國不張公室三卿並将魯衆悉行伐國取地以盟其君而已不與焉適越之辱兆矣定公之薨邾子來奔喪事魯恭矣而不免於見伐徒自辱焉不知以禮為國之故也邾在邦域之中不加矜恤而諸卿相繼伐之既取其田而又彊與之盟不知以義睦鄰之故也故詳書以著其罪三人伐則曷為二人盟盟者各盟其所得也莫彊乎季孫何獨無得季氏四分公室有其二昭公伐意如叔孫氏救意如而昭公孫陽虎囚桓子孟孫氏救桓子而陽虎奔今得邾田盖季氏以歸二家而不取也夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚左氏傳初衛侯遊於郊子南僕注子南靈公子郢也公曰余無子将立女不對他日又謂之對曰郢不足以辱社稷君其改圗君夫人在堂三揖在下君命祗辱夏衛靈公卒夫人曰命公子郢為大子君命也對曰郢異於他子且君沒於吾手若有之郢必聞之且亡人之子輙在乃立輙六月乙酉晉趙鞅納衛大子于戚公羊傳戚者何衛之邑也曷為不言入於衛父有子子不得有父也陸氏微㫖傳言蒯聵雖出奔而靈公未嘗有命廢之故言猶當立其子也武夷胡氏傳世子不言納位其所固有國其所宜居謂之儲副則無所事乎納矣凡公子出奔復而得國者其順且易則曰歸有奉焉則曰自其難也則曰入不稱納矣況世子哉今趙鞅帥師以蒯聵復國而書納者見蒯聵無道為國人之所不受也國人不受而稱世子者罪衛人之拒之也所以然者縁蒯聵出奔靈公未嘗有命廢之而立他子及公之卒大臣又未嘗謀於國人數蒯聵之罪選公子之賢者以主其國乃從輙之所欲而君之以子拒父此其所以稱世子也人莫不愛其親而志於殺莫不敬其父而忘其喪莫不慈其子欲其子之富且貴也而奪其位蒯聵之於天理逆矣何疑於廢黜然父雖不父子不可以不子輙乃據國而與之争可乎故特係納衛世子蒯聵于戚於趙鞅帥師之下而鞅不知義靈公與衛國大臣不能早正國家之本以致禍亂其罪皆見矣吕氏曰蒯聵與輙固無責矣然聖人備書之者以為天下之惡無所不有故春秋所書無所不戒固聖人委曲垂教使天下盡反人道之正而不憚煩也秋八月甲戌晉趙鞅帥師及鄭罕公作軒逹帥師戰于鐵公作栗鄭師敗績左氏傳秋八月齊人輸范氏粟鄭子姚子般送之士吉射逆之趙鞅禦之遇於戚甲戌将戰郵無恤御簡子衛大子為右登鐵上鄭人擊簡子中肩斃於車中獲其蠭旗大子救之以戈鄭師北獲温大夫趙羅大子復伐之鄭師大敗獲齊粟千車杜氏注鐵在城南冬十月𦵏衛靈公杜氏注七月而𦵏緩十有一月蔡遷于州來蔡殺其大夫公子駟左氏傳吳洩庸如蔡納聘而稍納師師畢入衆知之杜氏注元年蔡請遷于吳中悔故因聘襲之蔡侯告大夫殺公子駟以說哭而遷墓冬蔡遷于州來武夷胡氏傳州來吳所滅也蔡雖請遷於吳而中悔吳人如蔡納聘而師畢入蔡侯告大夫殺公子駟以說哭而遷墓如此則實吳人之所遷也而經以自遷為文何也楚既䧏蔡使疆於江汝蔡人聽命而遷師矣復倍楚請遷於吳而又自悔也其謀之不臧甚矣夫遷國大事也盤庚五遷利害甚明衆猶胥怨不適有居至於丁寧反覆播告之修而後定也今蔡介於吳楚二大國之間倍楚誑吳及其事急又委罪於執政其誰之咎也故經以自遷為文而殺公子駟則書大夫而稱國言君與用事大臣擅殺之也放公孫獵則書大夫而稱人言國亂無政衆人擅放之也駟與獵其以請遷於吳為非者乎而委之罪以說誰敢復有盡忠而與謀其國者哉三年春齊國夏衛石曼姑帥師圍戚左氏傳春齊衛圍戚求援於中山穀梁傳此衛事也其先國夏何也子不圍父也不繫戚於衛者子不有父也劉氏傳此衛戚也曷為不曰圍衛戚子之義不可以加乎父也曼姑主兵以圍戚則其先齊國夏何臣之義亦不可以加其君也冉有謂子貢曰夫子為衛君乎子貢曰諾吾将問之入曰伯夷叔齊何人也孔子曰古之賢人也曰怨乎孔子曰求仁而得仁又何怨子貢出曰夫子不為也髙郵孫氏曰欲圍戚者衛也而主兵以齊盖聖人之意以蒯聵為世子而衞輙拒之以子拒父而又圍之其罪不待誅絶而可見也齊大國又世盟主諸侯不道父子争國明大義以正之可也乃助其子以圍其父推之主兵所以深罪之也武夷胡氏傳主兵者衞也何以序齊為首罪齊人與衞之為惡而黨之也公孫文仲主兵伐鄭而序宋為首以誅殤公石曼姑主兵圍戚而序齊為首以誅國夏訓天下後世討亂臣賊子之法也古者孫從祖又孫氏王父之字考於廟制昭常為昭穆常為穆不以父命辭王父命禮也輙雖由嫡孫得立然非有靈公之命安得云受之王父辭父命哉故冉有謂子貢曰夫子為衞君乎子貢曰諾吾将問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也伯夷以父命為尊而讓其弟叔齊以天倫為重而讓其兄仲尼以為求仁而得仁者也然則為輙者奈何宜辭於國曰若以父為有罪将從王父之命則有社稷之鎮公子在我焉得為君以為無罪則國乃世子之所有也天下豈有無父之國哉烏有父不慈子不孝争利其國滅天理而可為者乎夏四月甲午地震五月辛夘桓宫僖宫災左氏傳夏五月辛夘司鐸火火踰公宫桓僖災榖梁傳言及則祖有尊卑由我言之則一也劉氏傳桓僖久矣其宫何以存不毁也曷為不毁三家者出於桓立於僖以是為恱者也髙郵孫氏曰桓公者哀公之十世祖也僖公者哀公之七世祖也諸侯五廟而十世七世之廟存焉盖非禮也矣武夷胡氏傳桓僖親盡矣或謂祖有功宗有徳所以勸也則如之何曰孝子慈孫氏其祖考仁也或七廟或五廟自是以衰禮也奚問其功徳之有無也必若此言是子孫得選擇其祖宗而尊事之矣豈理也哉季孫斯叔孫州仇帥師城啓公作開陽杜氏注魯黨范氏故懼晉比年四城啓陽今琅邪開陽縣襄陵許氏曰所城近敵故帥師焉元年䑕食郊牛三年地震宗廟災變異之弗圗而取田城邑兵役相繼可謂天命矣中失而外鍵本亡而末務此魯之季世也宋樂髠帥師伐曹秋七月丙子季孫斯卒左氏傳秋季孫有疾命正常曰無死南孺子之子男也則以告而立之女也則肥也可肥康子也季孫卒康子即位既𦵏康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退公使共劉視之則或殺之矣乃討之蔡人放其大夫公孫獵于吳冬十月癸夘秦伯卒叔孫州仇仲孫何忌帥師圍邾四年春王二公作三月月庚戌盜殺公榖作弑蔡侯申左氏傳春蔡昭侯将如吳諸大夫恐其又遷也承公孫翩逐而射之入於家人而卒以兩矢門之衆莫敢進文之鍇後至曰如牆而進多而殺二人鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫盱杜氏曰盱即霍也公羊傳弑君賤者窮諸人此其稱盜以弑何賤乎賤者也賤乎賤者孰謂謂罪人也劉氏傳蔡有由矣其又曰申何逺也古者不諱及周而後諱諱之日舎故而諱新舎之禮也名之非禮也舎之何以禮逺也天子及七諸侯及五大夫及三士及二舎之禮則名之何以非禮大夫之諱不舉諸其家妻之諱不舉諸其側以為盡人心也古者諸侯或為禘或為祫雖毁廟必升食於大廟有諱之道存焉爾泰山孫氏曰盜者微賤之稱不言殺者賤盜也其曰盜殺蔡侯申責蔡臣子不能距難武夷胡氏傳案左氏蔡侯将如吳諸大夫恐其又遷也公孫翩逐而射之卒然則翩非微者其以盜稱何也蔡侯倍楚誑吳又委罪於執政其謀國如是則信義俱亡禮文並棄無以守身而自衛夫人得而害之矣故變文書盜以警有國之君也翩弑君而略其名氏姓與霍皆翩之黨稱國以殺而不去其官者二公孫盖嘗謀國不使其君至於是而弗見庸者也故書法如此而或者以翩非微者而稱盜蘇轍以為求名而不得非也天下豈有欲求弑君之名春秋又惜此名而不與者哉蔡公孫辰出奔吳左氏傳解併在上𦵏秦惠公宋人執小邾子夏蔡殺其大夫公孫公有歸字姓公孫霍左氏傳解在上晉人執戎蠻公作曼子赤歸于楚左氏傳夏楚人既克夷虎乃謀北方左司馬眅申公夀餘葉公諸梁致蔡於負函致方城之外於繒關襲梁及霍注梁河南梁縣西南故城也梁南有霍陽山皆蠻子之邑也單浮餘圍蠻氏蠻氏潰蠻子赤奔晉隂地司馬起豐析與狄戎以臨上雒左師軍於菟和右師軍於倉野使謂隂地之命大夫士蔑曰晉楚有盟好惡同之若将不廢寡君之願也不然将通於少習以聽命士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之士蔑乃致九州之戎将裂田以與蠻子而城之且将為之卜蠻子聽卜遂執之與其五大夫以畀楚師於三户公羊傳赤者何戎曼子之名也其言歸於楚何子北宫子曰辟霸晉而京師楚也武夷胡氏傳其曰晉人云者罪之也蠻子赤何以名戎故也無罪見執亦書名外之也文公執曹伯則曰畀宋人今此曷云歸於楚歸於楚者猶曰京師楚也晉主夏盟為日久矣不競至此春秋所惡吕氏曰昭十六年楚子誘戎蠻子殺之戎蠻近楚之地故晉人執其君而歸於楚畏楚之彊也春秋之世諸侯專視彊弱以相侵伐以相取下動失其正人理滅絶不道之極也城西郛六月辛丑亳公作蒲社災公羊傳亡國之社盖揜之揜其上而柴其下榖梁傳亳社者亳之社也亳亡國也亡國之社以為廟屏戒也其屋亡國之社不得逹上也杜氏注亳社殷社諸侯有之所以戒亡國蘇氏曰亳社商社也周之滅商也以其社賜諸侯所謂亡國之社也亡國之社必屋故災也秋八月甲寅滕子結卒冬十有二月𦵏蔡昭公𦵏滕頃公五年春城毗公作比夏齊侯伐宋晉趙鞅帥師伐衛左氏傳夏趙鞅伐衞范氏之故也遂圍中牟秋九月癸酉齊侯杵公作處臼卒左氏傳齊燕姬生子不成而死諸子鬻姒之子荼嬖公疾使國惠子髙昭子立荼寘羣公子於萊秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔冬叔還如齊閏月葬齊景公劉氏傳閏不書此何以書喪其閏數也喪曷為以閏數喪之以月筭者以閏數以年筭者不以閏數六年春城邾瑕公作葭杜氏注備晉也任城亢父縣北有邾婁城襄陵許氏曰定哀十六年間凡八城邑魯既不得事晉諸侯方争是以髙城深池務守其國以捍禍亂隠虞至矣雖然使魯能修其政如治城者則天下歸之豈特僅僅自守而已是以譏也三年以來嵗書城邑以著魯無徳政勞民薦數如此後雖城邑不復志矣晉趙鞅帥師伐鮮虞左氏傳春晉伐鮮虞治范氏之亂也吳伐陳左氏傳吳伐陳復修舊怨也楚子曰吾先君與陳有盟不可以不救乃救陳師於城父夏齊國夏及髙張來奔左氏傳齊陳乞偽事髙國者又謂諸大夫曰二子恃得君而欲謀二三子盍及其未作也先諸大夫從之夏六月戊辰陳乞鮑牧及諸大夫以甲入於公宫昭子聞之與惠子乘如公戰於荘敗國人追之國夏奔莒遂及髙張晏圉弦施來奔杜氏注二子阿君廢長立少既受命又不能全書名罪之也蘇氏曰齊景公無適子諸子鬻姒之子荼嬖公疾使國夏及髙張立荼寘羣公子於萊公卒陳乞将立陽生乃與諸大夫謀先逐髙國襄陵許氏曰親臣去則國體輕國體輕則君徳降故必奔髙國而後陳乞弑君之謀得肆矣叔還㑹吳于柤秋七月庚寅楚子軫卒左氏傳秋七月楚子在城父将救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死命公子申為王不可則命公子結亦不可則命公子啓五辭而後許将戰王有疾庚寅昭王攻大冥卒於城父子閭退曰君王舎其子而讓羣臣敢忘君乎與子西子期謀潜師閉塗逆越女之子章立之而後還齊陽生入于齊左氏傳八月齊陳僖子使召公子陽生逮夜至於齊國人知之僖子使子士之母養之與饋者皆入冬十月丁夘立之将盟鮑子醉而往其臣差車鮑點曰此誰之命也陳子曰受命於鮑子遂誣鮑子曰子之命也鮑子曰女忘君之為孺子牛而折其齒乎而背之也悼公稽首曰吾子奉義而行者也若我可不必亡一大夫若我不可不必亡一公子義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟使胡姬以安孺子如賴去鬻姒殺王甲拘江說囚王豹於句竇之丘伊川先生解稱齊陽生見景公廢長立少以啓亂也武夷胡氏傳陽生曷為不稱公子非先君之子也為人子者無以有己則以父母之心為心者景公命荼世其國矣已則篡荼而自立是自絶於先君豈復得為先君之子也不稱公子誅不子也陽生不子則曷為繫之齊春秋端本之書也正其本則事理陽生之不子也其誰使之然也不有廢長立少以啓亂者乎故齊景問政於孔子孔子對曰君君臣臣父父子子君不君則臣不臣父不父則子不子以陽生繫之齊著亂之所由生也齊陳乞弑其君荼公作舎左氏傳公使朱毛告於陳子曰微子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎以齊國之困困又有憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之毛曰君大訪於臣子而圗其小可也使毛遷孺子於駘不至殺諸野幕之下𦵏諸殳冒淳杜氏注弑荼者朱毛與陽生也而書陳乞所以明乞立陽生而荼見弑則禍由乞始也楚比劫立陳乞流涕子家憚老皆疑於免罪故春秋明而書之以為弑主髙郵孫氏曰陽生入齊而陳乞弑君則是陽生與聞乎弑也不以陽生首惡者陽生之入陳乞召之荼之弑陳乞為之加陽生以弑君之罪則陳乞廢立之迹不明書陽生之入而陳乞弑君則陳乞之惡著而陽生與有罪也冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭左氏傳春宋師侵鄭鄭叛晉故也襄陵許氏曰定十五年老丘之役鄭宋始搆怨至是復侵九年取鄭師于雍丘十三年取宋師于嵒晉魏曼多帥師侵衛左氏傳晉師侵衛衛不服也夏公㑹吳于鄫榖作繒左氏傳夏公㑹吳于鄫吳來徴百牢子服景伯對曰先王未之有也吳人曰宋百牢我魯不可以後宋且魯牢晉大夫過十吳王百牢不亦可乎景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣若亦棄禮則有淫者矣周之王也制禮上物不過十二以為天之大數也今棄周禮而曰必百牢亦惟執事吳人弗聽乃與之反自鄫以吳為無能為也杜氏注鄫今琅邪鄫縣秋公伐邾八月己酉入邾以邾子益來左氏傳季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信大國吳也伐小國不仁孟孫曰二三子以為何如怪諸大夫不言故指問之惡賢而逆之對曰禹合諸侯於塗山執玉帛者萬國諸大夫對也今其存者無數十焉惟大不字小小不事大也知必危何故不言魯徳如邾而以衆加之可乎孟孫忿荅大夫不樂而出季孟異佞直不同故罷饗秋伐邾及范門猶聞鐘聲大夫諫不聽茅成子請告於吳不許曰魯擊柝聞於邾吳二千里不三月不至何及於我成子以茅叛師遂入邾處其公宫衆師晝掠邾衆保於繹師宵掠以邾子益來獻於亳社囚諸負瑕邾茅夷鴻以束帛乘韋自請救於吳曰魯弱晉而逺吳以陵我小國若夏盟於鄫衍秋而背之四方諸侯其何以事君且魯賦八百乘君之貳也邾賦六百乘君之私也以私奉貳唯君圗之吳子從之榖梁傳以者不以者也益之名惡也范氏注惡其不能死社稷辨疑趙子曰來者至内之辭劉氏傳孰入之公也公則何以不言公諱也曷為諱公一闔廬也邾子益何以名賤之也賤之奈何虜服也蘇氏曰在外曰以歸在内曰以來内外之别也武夷胡氏傳春秋隠君之惡故滅國書取婉以成章而不失其實也恃強陵弱無故伐人而入其國處其宫晝夜掠以其君來獻於亳社囚於負瑕此天下之惡也吳師為是克東陽齊人為是取吾二邑辱國亦甚矣何以備書於策而不諱乎聖人道隆而徳大人之有惡務去之而不積也則不念其惡而進之矣以邾子益來惡也歸邾子益於邾是知其為惡能去之而不積也故書以邾子來而不諱者欲見後書歸邾子之為能去其惡而與之也聖人之情見矣明此然後可以操賞罰之權不明乎此以操賞罰之權而能濟者鮮矣宋人圍曹冬鄭駟宏帥師救曹左氏傳宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救冬鄭師救曹侵宋春秋集解卷二十九
