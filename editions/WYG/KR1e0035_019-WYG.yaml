body:
  text: 春秋集觧卷十九宋吕本中撰襄公名午成公子簡王十四年即位諡法因事有功曰襄元年春王正月公即位榖梁傳繼正即位正也仲孫蔑㑹晉欒黶宋華元衞寗殖曹人莒人邾凡書邾小邾公並作邾婁人滕人薛人圍宋彭城左氏傳非宋地追書也杜氏注成十八年楚取彭城以封魚石故曰非宋地夫子作春秋追書繫之宋於是為宋討魚石故稱宋且不登叛人也彭城降晋晉人以宋五大夫在彭城者歸寘諸瓠丘公羊傳為宋誅也其為宋誅奈何魚石走之楚楚為之伐宋取彭城以封魚石魚石之罪奈何以入是為罪也楚已取之矣曷為繫之宋不與諸侯専封也榖梁傳繫彭城於宋者不與魚石正也武夷胡氏傳案左氏曰非宋地追書也然則書圍彭城者魯史舊文也曰圍宋彭城者仲尼親筆也楚已取彭城封魚石戍之三百乗則曷為繫之宋楚不得取之宋魚石不得受之楚雖専其地君子不登叛人所以正疆域固封守謹王度也夏晋韓厥公作屈帥師伐鄭仲孫蔑㑹齊崔杼曺人邾公作邾婁人杞人次于鄫公作合左氏傳夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛敗其徒兵於洧上於是東諸侯之師次于鄫以待晋師晉師自鄭以鄫之師侵楚焦夷及陳晉侯衞侯次於戚以為之援杜氏注鄫鄭地在陳留襄邑縣東南武夷胡氏傳楚人釋君而臣是助事已悖矣晋於是乎降彭城以魚石等歸遂伐鄭而諸侯次于鄫此皆放於義者也傳書楚子辛救鄭而經不書者鄭本為楚以其君之故親集矢於其目是以與楚而不貳也棄中國從南蠻不能以大義裁之惟私欲之從則鄭無可救之善楚不得有能救之名經所以削之不言救也秋楚公子壬夫帥師侵宋左氏傳秋楚子辛救鄭侵宋吕留鄭子然侵宋取犬丘襄陵許氏曰楚人侵宋攻晉所救而諸侯之師卒不動則有以量楚力之所至矣九月辛酉天王崩邾公作邾婁子子來朝冬衞侯使公孫剽來聘杜氏注剽子叔黑背子晉侯使荀罃來聘泰山孫氏曰天王崩邾子來朝衞侯使公孫剽來聘晉侯使荀罃來聘皆不臣也武夷胡氏傳簡王崩赴告已及藏在諸侯之䇿矣則宜以所聞先後而奔䘮今邾子方來修朝禮衞侯晉侯方來修聘事於王䘮若越人視秦人之肥瘠曽不與焉而左氏以為禮此何禮乎滕定公薨世子定為三年䘮父兄百官皆不欲曰吾宗國魯先君莫之行也䘮紀益廢民習於耳目而不察故後世以日易月人子安而行之不知春秋之義無君臣之禮豈不惜哉二年春王正月𦵏簡王杜氏注五月而𦵏速鄭師伐宋左氏傳鄭師侵宋楚令也襄陵許氏曰書伐宋者積鄭之疚夏五月庚寅夫人姜氏薨左氏傳齊姜薨初穆姜使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦飬姑者也虧姑以成婦逆莫大焉杜氏注穆姜成公母齊姜成公婦六月庚辰鄭伯睔卒左氏傳鄭成公疾子駟請息肩於晉公曰楚君以鄭故親集矢於其目非異人任寡人也若背之是棄力與言其誰暱我免寡人唯二三子秋七月庚辰鄭伯睔卒襄陵許氏曰鄭之託國於楚夫豈以中國為終可畔既蒙其德遂不可反是以君子慎謀始也晉師宋師衞寗殖侵鄭秋七月仲孫蔑㑹晋荀罃宋華元衞孫林父曹人邾公作邾婁人于戚左氏傳鄭伯睔卒於是子罕當國子駟為政子國為司馬晋師侵鄭諸大夫欲從晋子駟曰官命未改㑹于戚謀鄭故也孟獻子曰請城虎牢以偪鄭杜氏虎牢舊鄭邑今屬晉知武子曰善鄫之㑹吾子聞崔子之言今不來矣滕薛小邾之不至皆齊故也寡君之憂不唯鄭罃將復於寡君而請於齊得請而告吾子之功也若不得請事將在齊吾子之請諸侯之福也豈唯寡君頼之蘇氏曰鄭雖以叛中國為罪而伐其䘮非禮也吕氏曰衞不稱師將尊師少也己丑𦵏我小君齊姜杜氏注齊諡也三月而𦵏速叔孫豹如宋左氏傳穆叔聘於宋通嗣君也杜氏注豹於此始自齊還為卿冬仲孫蔑㑹晉荀罃齊崔杼宋華元衛孫林父曹人邾公作邾婁人滕人薛人小邾公作小邾婁人于戚遂城虎牢左氏傳冬復㑹于戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也遂城虎牢鄭人乃成伊川先生觧設險所以守國也有虎牢之險而不能守故不繫於鄭責其不能有也陸氏微㫖淳聞於師曰諸侯之大夫取他國之邑相與而城之非正也城虎牢可以安中國息征伐故聖人許之而不繫之於鄭也劉氏傳此鄭虎牢也曷為不繫之鄭取之矣非鄭地也何以非鄭地鄭不式命地非其地也不式命多矣曷為獨惡乎鄭賢晉悼公也以晋悼公為覇則宜取乎鄭者也武夷胡氏傳虎牢鄭地故稱制邑至漢為成臯今為汜水縣巖險聞於天下猶虞之夏陽趙之上黨魏之安邑燕之榆關吴之西陵蜀之漢樂地有所必據城有所必守而不可以棄焉者也有是險而不能守故不繫於鄭然則據地設險亦所貴乎天險不可升也地險山川丘陵也王公設險以守其國大易之訓也鑿斯池築斯城與民同守孟子之所以語滕君也夫狡焉思啟封疆而爭地以戰殺人盈野爭城以戰殺人盈城者固非春秋之所貴守天子之土繼先君之世不能設險守國將至於遷潰滅亡亦非聖人之所與故城虎牢而不繫於鄭楚殺其大夫公子申左氏傳楚公子申為右司馬多受小國之賂以偪子重子辛楚人殺之故書曰楚殺其大夫公子申劉氏傳稱國以殺大夫者罪累上也公子申之累上奈何嬰齊也壬夫也申也三人者執楚國之政公子申賄而専嬰齊壬夫畏其偪也而殺之是君與臣同國之道也襄陵許氏曰嬰齊壬夫躬執楚政惡申之偪以政殺之故稱國焉罪累上也著楚之所以不競於晉也三年春楚公子嬰齊帥師伐吴左氏傳楚子重伐吴為簡之師克鳩兹至於衡山杜氏注鳩兹吴邑在丹陽蕪湖縣東衡山在吴興烏程縣南使鄧廖帥組甲三百被練三千以侵吴吴人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸旣飲至三日吳人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡楚人以是咎子重子重病之遂遇心疾而卒公如晋左氏傳始朝也夏四月壬戌公及晋侯盟于長樗蘇氏曰晋悼公修禮於諸侯故去其國而與公盟公至自晋六月公㑹單子晋侯宋公衞侯鄭伯莒子邾公作邾婁子齊世子光己未同盟于雞澤左氏傳晋為鄭服故且欲修吴好將合諸侯使士匄告於齊乞盟齊侯欲勿許而難為不協乃盟於耏外六月公㑹單頃公及諸侯己未同盟於雞澤晋侯使荀㑹逆吴子於淮上吴子不至榖梁傳同者有同也同外楚也伊川先生解楚強諸侯皆畏之而修盟故書同杜氏注雞澤在廣平曲梁縣西南武夷胡氏傳同盟或以為有三例一則王臣預盟而書同二則諸侯同欲而書同三則惡其反覆而書同夫惡其反覆與諸侯同欲而書同信矣王臣預盟而書同義則未安盟于女栗及蘇子也而不書同盟于洮于翟泉㑹王人也而不書同然則此三盟者正所謂諸侯同欲而書同盟也其同欲奈何同病楚也㑹于柯陵之嵗夏伐鄭楚人師于首止而諸侯還冬伐鄭楚人師於汝上而諸侯還雞澤之盟陳袁僑如㑹楚師在繁陽而韓獻子懼平丘之行楚棄疾立復封陳蔡而中國恐是知此三盟者諸侯皆有戒心而修盟故稱同不以尹子單子劉子亦預此盟而譏之也夫王臣將命必惇信明義而後可以表正乎天下諸侯守邦必尊主奉法而後可以保其社稷今王臣下與諸侯約誓諸侯亦敢上與王臣要言斯大亂之道也則亦不待書同盟而罪自見矣陳侯使袁僑公作僑如如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟左氏傳楚子辛為令尹侵欲於小國陳成公使袁僑如會求成晋侯使和組父告於諸侯秋叔孫豹及諸侯之大夫及陳袁僑盟陳請服也榖梁傳諸侯盟又大夫相與私盟是大夫張也故雞澤之㑹諸侯始失正矣陸氏纂例啖子曰不召而自來諸侯既盟袁僑乃至故使大夫别與之盟也劉氏意林春秋襃善貶惡不失其實者也諸侯皆在是又稱叔孫豹及諸侯之大夫大夫受命於其君之詞也異乎溴梁溴梁者諸侯皆在是而大夫盟其非受命而専之也明矣泰山孫氏曰先言公㑹單子晉侯宋公衞侯鄭伯莒子邾子齊世子光己未同盟于雞澤次言陳侯使袁僑如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟者此諸侯既盟而陳袁僑至也諸侯既盟而陳袁僑至無盟可也己未諸侯盟戊寅大夫又盟是大夫強諸侯始失政也故十六年公㑹晋侯宋公衞侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟不復言諸侯之大夫不復言諸侯之大夫者政在大夫故也孔子曰禄之去公室五世矣政逮於大夫四世矣孔子之言非獨魯也滔滔者天下皆是也吕氏曰諸侯已盟大夫無所用盟今以袁僑故叔孫豹及諸侯之大夫盟是政在大夫也至於溴梁之㑹則曰戊寅大夫盟又無故而然也言大夫之寖強也至宋之㑹則大夫自盟而諸侯不往矣言君臣上下之失其所也秋公至自㑹冬晋荀罃帥師伐許左氏傳許靈公事楚不㑹于雞澤冬晋知武子帥師伐許四年春王三月己酉陳侯午卒左氏傳春楚師為陳叛故猶在繁陽韓獻子患之言於朝曰文王帥殷之叛國以事紂惟知時也今我易之難哉三月陳成公卒楚人將伐陳聞䘮乃止陳人不聽命夏楚彭名侵陳陳無禮故也武夷胡氏傳午者襄公名也孔子作春秋在哀公之世襄公哀公之皇考也曷不諱乎古者死而無諡不以名為諱周人以諡易名於是乎有諱禮故孟子曰諱名不諱姓姓所同也名所獨也然禮律所載則有不諱者夫子兼帝王之道參文質之中而作春秋以法萬世如公薨不地滅國書取出奔稱遜之類所以放其文也莊公名同而書同盟僖公名申而書戊申定公名宋而書宋人之類所以從其質也後世不明此義則有以諱易人之名者有以諱易人之姓者詩書則諱臨文則諱嫌名則諱二名則偏諱愚者違禮以為孝諂者獻諛以為忠忌諱繁名實亂而春秋之法不行矣夏叔孫豹如晋左氏傳穆叔如晋報知武子之聘也秋七月戊子夫人姒公作弋下同氏薨左氏傳秋定姒薨不嬪於廟無櫬不虞匠慶謂季文子曰子為正卿而小君之䘮不成不終君也君長誰受其咎初季孫為已樹六檟於蒲圃東門之外匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御杜氏注御止也傳言遂得成禮杜氏注成公妾襄公母姒杞姓𦵏陳成公八月辛亥𦵏我小君定姒公作弋杜氏注踰月而𦵏速襄陵許氏曰傳載季文子欲不以夫人禮𦵏定姒志復古也而不得已於人言卒夫人之觀此踰月而𦵏蓋禮略也冬公如晋左氏傳冬公如晋聽政晋侯享公公請屬鄫晋侯不許孟獻子曰以寡人之宻邇於仇讎而願固事君無失官命鄫無賦於司馬為執事朝夕之命敝邑敝邑褊小闕而為罪寡君是以願借助焉晋侯許之陳人圍頓左氏傳楚人使頓間陳而侵伐之故陳人圍頓五年春公至自晋夏鄭伯使公子發來聘左氏傳鄭子國來聘通嗣君也杜氏注鄭僖公初即位叔孫豹鄫穀作繒下同世子巫如晋左氏傳穆叔覿鄫大子於晋以成屬鄫書曰叔孫豹鄫世子巫如晋言比諸魯大夫也劉氏傳此鄫世子巫也曷為與叔孫豹如晋鄫請於魯為之附庸故相與徃見於晋也鄫曷為為附庸於魯鄫不勝莒魯之患求為附庸以自定諸侯死社稷正也不能守其國以卑其宗廟鄫失正矣天子建附庸非天子命而私有之魯失正矣臣不能以矯其君子不能以正其父故曰叔孫豹鄫世子巫如晋猶吾大夫焉交譏之襄陵許氏曰天下無道小役大弱役強如此春秋蓋傷之也仲孫蔑衞孫林父㑹吳于善道公榖作稻左氏傳吳子使夀越如晋辭不㑹于雞澤之故且請聽諸侯之好晋人將為之合諸侯使魯衞先㑹吳且告㑹期故孟獻子孫文子㑹吴于善道杜氏注善道地闕襄陵許氏曰晋楚爭衡權之在吴故晋急吴如此秋大雩左氏傳旱也楚殺其大夫公子壬夫左氏傳楚人討陳叛故曰由令尹子辛實侵欲焉乃殺之君子謂楚共王於是不刑已則無信而殺人以逞不亦難乎劉氏傳稱國以殺大夫者罪累上也壬夫之累上奈何前此者陳鄭去楚即晋楚人伐之不服媾之不可楚子怒曰壬夫實侵欲焉乃殺之是遷也然則壬夫之罪何壬夫之為人臣也怙勢而懐利足以殺其身而已矣公㑹晋侯宋公陳侯衞侯鄭伯曹伯莒子邾公作邾婁子滕子薛伯齊世子光吳人鄫榖作繒人于戚公至自㑹左氏傳㑹吴且命戍陳也穆叔以屬鄫為不利使鄫大夫聽命於㑹伊川先生觧吴來㑹非為主武夷胡氏傳吴何以稱人案左氏吴子使夀越如晋請聽諸侯之好晋人將為之合諸侯使魯衞大夫㑹吳于善道且告㑹期然則戚之事乃吳人來㑹不為主也來㑹諸侯而不為主則進而稱人諸侯徃與之㑹而主吳則貶而稱國聖人之情見矣春秋之義明矣冬戍陳左氏傳楚子囊為令尹范宣子曰我䘮陳矣楚人討貳而立子囊必改行而疾討陳陳近於楚民朝夕急能無徃乎有陳非吾事也無之而後可冬諸侯戍陳公羊傳孰戍之諸侯戍之曷為不言諸侯戍之離至不可得而序何氏注離至離别前後至也故言我也髙郵孫氏曰不曰諸侯者諸侯歸國而後遣戍但見我戍之徃不得以諸侯言之也楚公子貞帥師伐陳公㑹晋侯宋公衞侯鄭伯曹伯公榖有莒子邾子滕子薛伯齊世子光救陳十有二月公至自救陳左氏傳子囊伐陳十一月甲午㑹於城棣以救之榖梁傳公至自救陳善救陳也辛未季孫行父卒左氏傳季文子卒六年春王三月壬午杞伯姑容卒夏宋華弱來奔左氏傳宋華弱與樂轡少相狎長相優又相謗也子蕩怒以弓梏華弱於朝平公見之曰司武而梏於朝難以勝矣遂逐之夏宋華弱來奔司城子罕曰同罪異罰非刑也専戮於朝罪孰大焉亦逐子蕩秋𦵏杞桓公滕子來朝左氏傳滕成公來朝始朝公也莒人滅鄫榖作繒左氏傳鄫恃賂也吕氏曰莒鄫小國而自相滅亾晋悼公為時盟主亦莫之恤蓋當是時禮義衰絶之後滅國弑君世所謂大惡者皆目見之熟不以為甚異故雖晋悼號為賢君為諸夏宗亦莫能正也嗚呼天下之祸莫大於目見之熟而遂以為常事而不顧也冬叔孫豹如邾公作邾婁左氏傳穆叔如邾聘且修平杜氏注平四年狐駘戰季孫宿如晋左氏傳晋人以鄫故來討曰何故亾鄫季武子如晋見且聽命十有二月齊侯滅萊左氏傳十一月齊侯滅萊萊恃謀也於鄭子國之來聘也四月晏弱城東陽而遂圍萊及杞桓公卒之月乙未王湫帥師及正輿子棠人軍齊師齊師大敗之丁未入萊萊共公浮柔奔棠晏弱圍棠十一月丙辰滅之遷萊於郳公羊傳曷為不言萊君出奔國滅君死之正也七年春郯子來朝左氏傳始朝公也夏四月三卜郊不從乃免牲左氏傳三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而卜郊宜其不從也榖梁傳夏四月不時也三卜禮也乃者亾乎人之辭也小邾公作邾婁子來朝左氏傳小邾穆公來朝亦始朝公也城費左氏傳南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費武夷胡氏傳費季氏邑也案左氏南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費季文子相三君無衣帛之妾無食粟之馬無藏金玉無重器備則固忠於公室而不顧其所食之私邑也及行父卒宿之不忠遂専魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子行乎季氏三月不違至於帥師墮費其越禮不度可知也然則書城費乃履霜堅冰之戒強私家弱公室之萌據事直書而義自見矣用人不惟其賢惟其世豈不殆哉秋季孫宿如衞左氏傳季武子如衞報子叔之聘且辭緩報非貳也襄陵許氏曰此書滕郯小邾來朝而志卿如邾如晋如衞衞來拜聘著朝廷之間交際之文則從矣八月螽公作􅏑襄陵許氏曰昭伯南遺實敝公室以強季氏國之殘也故螽生之冬十月衞侯使孫林父來聘壬戌及孫林父盟左氏傳衞孫文子來聘且拜武子之言而尋孫桓子之盟楚公子貞帥師圍陳十有二月公㑹晋侯宋公陳侯衞侯曹伯莒子邾公作邾婁子于鄬左氏傳楚子嚢圍陳㑹于鄬以救之杜氏注謀救陳陳侯逃歸不成救故不書救也鄬鄭地鄭伯髠頑公榖作原如㑹未見諸侯丙戌卒于鄵公榖作操左氏傳鄭僖公之為太子也於成之十六年與子罕適晋不禮焉又與子豐適楚亦不禮焉及其元年朝於晋子豐欲愬諸晋而廢之子罕止之及將㑹于鄬子駟相又不禮焉侍者諫不聽又諫殺之及鄵子駟使賊夜弑僖公而以瘧疾赴於諸侯簡公生五年奉而立之公羊傳操者何鄭之邑也諸侯卒其封内不地此何以地隱之也何隱爾弑也孰弑之其大夫弑之曷為不言其大夫弑之為中國諱也曷為為中國諱鄭伯將㑹諸侯于鄬其大夫諫曰中國不足歸也則不若與楚鄭伯曰不可其大夫於是弑之未見諸侯其言如㑹何致其意也榖梁傳其不言弑何也不使夷狄之民加乎中國之君也武夷胡氏傳案鄭僖公三傳皆以為弑而春秋書卒者僖公欲從諸侯㑹于鄬諸大夫欲背諸夏與荆楚則是僖公之見弑非有不善之積以及身故變文而書曰鄭伯髠頑如㑹未見諸侯丙戌卒于鄵未見諸侯其曰如㑹何致其志也諸侯卒於境内不地鄵鄭邑也其曰卒于鄵見其弑而隱之也卒鄭伯逃歸陳侯聖人之微㫖而公榖之義精矣存天理抑人欲之意逺矣陳侯逃歸左氏傳陳人患楚慶虎慶寅謂楚人曰吾使公子黄徃而執之楚人從之二慶使告陳侯於㑹曰楚人執公子黄矣君若不來羣臣不忍社稷宗廟懼有二圖陳侯逃歸武夷胡氏傳榖梁曰逃義曰逃逃者匹夫之事上二年諸侯戍陳今楚令尹來伐諸侯又救之亦既勤矣為陳侯計者下令國中大申儆備立太子以固守親聽命於諸侯謀禦敵之䇿當是時晋君方明八卿和睦諸侯聽命必能致力於陳矣不此之顧棄儀衞而逃歸此匹夫之事耳夫義路也禮門也輕棄中國惟蠻夷之懼是不能由是路出入是門故書逃歸以罪之可謂深切著明矣八年春王正月公如晋左氏傳公如晋朝且聽朝聘之數夏𦵏鄭僖公鄭人侵蔡獲蔡公子夑公作濕左氏傳鄭子國子耳侵蔡獲蔡司馬公子燮鄭人皆喜唯子産不順曰小國無文徳而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晋楚伐鄭自今鄭國不四五年弗得寧矣榖梁傳人微者也侵淺事也而獲公子公子病矣季孫宿㑹晋侯鄭伯齊人宋人衞人邾公作邾婁人于邢丘左氏傳㑹于邢丘以命朝聘之數使諸侯之大夫聽命季孫宿齊髙厚宋向戌衞寗殖諸大夫㑹之鄭伯獻捷於㑹故親聽命榖梁傳見魯之失正也公在而大夫㑹也泰山孫氏曰邢丘之㑹公在晋也晋侯不與公㑹而與季孫宿㑹者襄公微弱政在季氏故也晋為盟主棄其君而與臣何以宗諸侯此晋侯之惡亦可見矣武夷胡氏傳大夫稱人貶之也昔周公戒成王以繼自今我其立政立事夫不自為政而委於臣下是以國之利器示人而不知寳也朝聘事之大者重煩諸侯而使大夫聽命無乃以姑息愛人而不由徳乎使政在大夫而諸侯失國又豈所以愛之也後此八年溴梁之㑹悼公初沒諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉故邢丘諸侯之大夫貶而稱人謹其始也公至自晋莒人伐我東鄙左氏傳莒人伐我東鄙以疆鄫田襄陵許氏曰莒人恃逺滅鄫伐魯以奸齊盟而霸討弗及間晉方患秦楚故也秋九月大雩左氏傳旱也冬楚公子貞帥師伐鄭左氏傳楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晋子駟曰民急矣姑從楚以紓吾民晋師至吾又從之犧牲玉帛待於二境以待強者而庇民焉子展曰小所以事大信也五㑹之信今將背之雖楚救我將安用之親我無成鄙我是欲不可從也子駟曰詩云謀夫孔多是用不集請從楚騑也受其咎乃及楚平使王子伯駢告於晋知武子使行人子貟對之曰君有楚命亦不使一介行李告於寡君而即安於楚君之所欲也誰敢違君寡君將帥諸侯以見於城下唯君圖之武夷胡氏傳齊宣王問於孟子交鄰國有道乎孟子曰有唯智者為能以小事大故大王事熏鬻勾踐事吳以小事大者畏天者也畏天者保其國鄭介大國之間困強楚之令而欲息肩於晋若能信任仁賢明其政刑經畫財賦以禮法自守而親比四鄰必能保其封境荆楚雖大何畏焉而子耳子國加兵於蔡獲公子燮無故怒楚所謂不修文徳而有武功者也楚人來討不從則力不能敵從之則晋師必至故國人皆喜而子産獨不順焉以晋楚爭鄭自兹弗得寧矣是以獲公子燮特書侵蔡以罪之而公子貞來伐鄭及楚平不復書矣平而不書以見鄭之屈服於楚而不信也犧牲玉帛待於境上以待强者而請盟其能國乎晋侯使士匄來聘左氏傳晉范宣子來聘且拜公之辱告將用師於鄭九年春宋災公作火榖作災髙郵孫氏曰春秋之義常事不書反常則書故其書災異可知也二百四十二年之乆書災者一十有二未甞有曰火者火則人為之也人為之者又悉書之春秋豈勝紀哉夏季孫宿如晋左氏傳報宣子之聘也五月辛酉夫人姜氏薨左氏傳穆姜薨於東宫秋八月癸未𦵏我小君穆公作繆姜杜氏注四月而𦵏速冬公㑹晋侯宋公衞侯曹伯莒子邾公作邾婁下同子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲左氏傳冬十月諸侯伐鄭庚午季武子齊崔杼宋皇鄖從荀罃士匄門於鄟門杜氏注三國從中軍衞北宫括曹人邾人從荀偃韓起門於師之梁杜氏注三國從上軍滕人薛人從欒黶士魴門於北門杜氏注三國從下軍杞人郳人從趙武魏絳斬行栗杜氏注三國從新軍甲戌師於汜令於諸侯曰修器備盛餱糧歸老幼居疾於虎牢肆眚圍鄭鄭人恐乃行成中行獻子曰遂圍之以待楚人之救也而與之戰不然無成知武子曰許之盟而還師以敝楚人吾三分四軍與諸侯之銳以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以爭大勞未艾君子勞心小人勞力先王之制也諸侯皆不欲戰乃許鄭成十一月己亥同盟於戲鄭服也將盟鄭六卿皆從鄭伯晋士莊子為載書曰自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟公子騑趨進曰天祸鄭國使介居二大國之間大國不加徳音而亂以要之使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告自今日既盟之後鄭國而不唯有禮與強可以庇民者是從而敢有異志者亦如之荀偃曰改載書公孫舍之曰昭大神要言焉若可改也大國亦可叛也知武子謂獻子曰我實不徳而要人以盟豈禮也哉姑盟而退修徳息師而來終必獲鄭何必今日晋人不得志於鄭以諸侯復伐之十二月癸亥門其三門閏月戊寅濟於隂阪侵鄭次於隂口而還杜氏注戲鄭地武夷胡氏傳善為國者不師善師者不陣善陣者不戰知武子明於善陣之法以佐晋悼公屢與諸侯伐鄭楚輒救之而不與之戰楚師遂屈得善勝之道矣故下書蕭魚之㑹以美之楚子伐鄭左氏傳楚子伐鄭子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯強是從乃及楚平公子罷戎入盟同盟於中分楚莊夫人卒王未能定鄭而歸晋侯歸謀所以息民魏絳請施舍輸積聚以貸自公以下苟有積者盡出之國無滯積亦無困人公無禁利亦無貪民祈以幣更賔以特牲器用不作車服從給行之期年國乃有節三駕而楚不能與爭春秋集觧卷十九
