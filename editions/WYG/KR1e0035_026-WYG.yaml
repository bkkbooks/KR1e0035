body:
  text: 春秋集解卷二十六宋吕本中撰昭公二十有五年春叔孫婼如宋夏叔詣公榖作倪㑹晉趙鞅宋樂大公作世心衞北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父左氏傳二十四年鄭伯如晉子大叔相見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室抑人亦有言曰嫠不恤其緯而憂宗周之隕為将及焉今王室實蠢蠢焉吾小國懼矣然大國之憂也吾儕何知焉吾子其早圗之詩曰缾之罄矣惟罍之恥王室之不寧晉之恥也獻子懼而與宣子圗之乃徴㑹於諸侯期以明年二十五年夏㑹於黄父謀王室也趙簡子令諸侯之大夫輸王粟具戍人曰明年将納王宋樂大心曰我不輸粟我於周為客若之何使客晉士伯曰自踐土以來宋何役之不㑹而何盟之不同曰同恤王室子焉得辟之右師不敢對受牒而退武夷胡氏傳案左氏鄭子大叔如晉范獻子曰若王室何對曰王室之不寧大國之憂晉之恥也吾子其早圗之獻子懼乃徴㑹於諸侯㑹於黄父謀王室也趙簡子令諸侯之大夫輸王粟具戍人将納王夫以王猛之無寵單旗劉蚠之屢敗敬王初立子朝之衆召伯奐南宫嚚甘桓公之黨疑若多助之在朝也然㑹於黄父凡十國而諸侯之大夫無異議焉是知邪不勝正乆矣猶有寵愛庶孽配適奪正至於滅亡而不悟者不知幽王晉獻之父子亦何足效哉然則黄父之㑹王事也而無美辭何也王室不靖亦惟友邦冢君克修厥職以綏定王都非異人任亦何美之有免於譏貶足矣此春秋以正待人之體也後世以濫賞報臣子所當為之事為臣子者亦受而不辭失此義矣有鸜鵒來巢左氏傳有鸜鵒來巢書所無也公羊傳何以書記異也何異爾非中國之禽也宜穴又巢也武夷胡氏傳傳曰鸜鵒不踰濟濟水東北㑹於汶魯在汶南其所無也故書曰有巢者去穴而巢隂居陽位臣逐君象也鸜鵒宜穴處於下而巢居於上季孫宜臣順於家而主祭於國反常為異之兆能以徳消則無其應矣或曰此公子宋有國之祥也秋七月上辛大雩季辛又雩左氏傳秋書再雩旱甚也榖梁傳季者有中之辭也范氏注不言中辛中辛無事又有繼之辭也武夷胡氏傳左氏以再雩為旱甚聖人書此者以志禦災之非道而區區於禱祠之末也昭公之時雨雹地震四見於經旱乾為虐相繼而起有鸜鵒來巢異之甚也季辛又雩災之甚也考諸列位則國有人焉觀諸天時則猶有眷顧之心未終棄也若反身修徳信用忠賢災異之來必可禦矣昔髙宗肜日雉升鼎耳異亦甚矣聽於祖已克正厥身故能嘉靖殷邦享國長久宣王之時旱魃藴隆災亦甚矣側身修行遇災而懼故能興衰撥亂王化復行此皆以人勝天以徳消變之驗也昭公至是猶不知畏罔克自省而求於禱祠之末将能勝乎故特書此以為後世鑒九月已榖作乙亥公孫于齊次于陽公作揚州齊侯唁公于野井左氏傳初季公若怨平子季郈之雞鬭季氏介其雞郈氏為之金距平子怒益宫於郈氏且讓之故郈昭伯亦怨平子将禘於襄公萬者二人其衆萬於季氏臧孫曰此之謂不能庸先君之廟大夫遂怨平子公若獻弓於公為且與之出射於外而謀去季氏公為告公果公賁公果公賁使侍人僚柤告公公寝将以戈擊之乃走公曰執之亦無命也懼而不出數月不見公不怒又使言公執戈以懼之乃走又使言公曰非小人之所及也公果自言公以告臧孫臧孫以難告郈孫郈孫以可勸告子家懿伯懿伯對曰䜛人以君儌倖事若不克君受其名不可為也舎民數世以求克事不可必也且政在焉其難圗也公退之辭曰臣與聞命矣言若洩臣不獲死乃館於公叔孫昭子如闞公居於長府九月戊戌伐季氏殺公之於門遂入之平子登臺而請子家子曰君其許之政自之出乆矣隠民多取食焉為之徒者衆矣日入慝作弗可知也弗聽公使郈孫逆孟懿子叔孫氏之司馬鬷戾言於其衆曰凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入公徒釋甲執冰而踞遂逐之孟氏執郈昭伯殺之於南門之西遂伐公徒公與臧孫如墓謀遂行己亥公孫于齊次于陽州齊侯将唁公於平隂公先至于野井齊侯曰寡人之罪也使有司待於平隂為近故也公羊傳唁公者何昭公将弑季氏何氏注傳言弑者從昭公之辭告子家駒曰季氏為無道僭於公室乆矣吾欲弑之何如子家駒曰諸侯僣於天子大夫僣於諸侯乆矣昭公曰吾何僣矣哉子家駒曰設兩觀乘大輅朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也且夫牛馬維婁委已者也而柔焉季氏得民衆久矣君無多辱焉昭公不從其言終弑之而敗焉走之齊齊侯唁公于野井曰奈何君去魯國之社稷昭公曰喪人不佞失守魯國之社稷執事以羞再拜顙景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢以請昭公曰喪人不佞失守魯國之社稷執事以羞敢辱大禮敢辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用敢固以請昭公曰以吾宗廟之在魯也有先君之服未之能以服有先君之器未之能以出敢固辭景公曰寡人有不腆先君之服未之敢服有不腆先君之器未之敢用請以饗乎從者昭公曰喪人其何稱景公曰孰君而無稱昭公於是噭然而哭諸大夫皆哭既哭以人為菑以幦為席以鞌為几以遇禮相見孔子曰其禮與其辭足觀矣榖梁傳孫之為言猶孫也諱奔也次于陽州次止也弔失國曰唁唁公不得入於魯也杜氏注陽州齊魯竟上邑濟南祝阿縣東有野井亭陸氏纂例趙子曰弔往曰唁泰山孫氏曰次于陽州者不得入於齊也唁慰安之辭齊大國也不能討意如於魯國徒能唁昭公于野井此齊侯之惡亦可見也武夷胡氏傳内出奔稱孫隠也次于陽州待齊命也魯自東門遂殺嫡立庶魯君於是乎失政禄去公室政在季氏於此君也四公矣作三軍盡征其一舎中軍兼有其二民賦入於其家半矣受命救台也遂入鄆帥師取卞也不以聞軍政在其手專矣行父片言而東門氏逐南蒯一動而公子憖奔魯之羣臣亦無敢忠於公室而獻謀者所謂屯難之時也在易屯之六五曰屯其膏小貞吉大貞凶象曰屯其膏施未光也昭公不明乎消息盈虚之理正身率徳擇任忠賢待時循致不忍一朝之忿求逞其私欲而以羣小謀之其及也宜矣齊侯唁公于野井以遇禮相見孔子曰其禮與其辭足觀矣然則何以失國而不反乎禮有本末正身治人禮之本也威儀文詞禮之末也昭公喪齊歸無慼容而不顧娶孟子為夫人而不命政令在家而不能取有子家子之賢而不能用而屑屑焉習儀以亟能有國乎雖齊侯來唁其禮與詞是矣而方伯連帥之職則未修也又豈所以為禮哉冬十月戊辰叔孫婼卒左氏傳昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎将若子何平子曰苟使意如得改事君所謂生死而肉骨也昭子從公於齊與公言昭子歸平子有異志冬十月辛酉昭子齊於其寝使祝宗祈死戊辰卒十有一月己亥宋公佐卒于曲棘左氏傳十一月宋元公為公故如晉己亥卒于曲棘公羊傳曲棘者何宋之邑也諸侯卒其封内不地此何以地憂内也杜氏注陳留外黄縣城中有曲棘里宋地陸氏纂例諸侯卒於他國及卒於㑹卒於師則書之雖在國不卒於其都亦書之晉侯卒于扈宋公卒于曲棘是也劉氏意林宋公佐卒于曲棘十有二月齊侯取鄆置天子者非以優天子以牧天下也置諸侯者非以優諸侯以牧一國也諸侯有方伯連帥州牧卒正者非以優強大以存小國也故小事大大字小為治之要春秋之所甚貴也分災救患扶傾濟弱誅叛討亂王政之所急仁義之本也諸侯卒其竟内猶大夫之卒其家未有言其地者也而佐卒獨見外取邑不書書之未嘗不稱人也而齊獨稱侯以宋公有親附鄰國憂諸侯之心齊侯有方伯討不登畔人之意是以異之也詩云何其處也必有與也何其久也必有以也又曰豈不懐歸畏此簡書簡書同惡相恤之謂也文王嘗以懐西方矣武夷胡氏傳案左氏宋元之夫人曹氏生子妻意如或謂曹氏勿與魯将逐之曹氏告元公公告樂祁祁曰與之如是魯君必出無民而能逞其志者未之有也魯君失民久矣然則宋元意如之外舅也不此之顧而求欲納公是以正倫恤患為心而不匿其私親之惡者也其賢於當時諸侯逺矣故雖卒於封内而特書其地以别之也十有二月齊侯取鄆公羊作運公羊傳外取邑不書此何以書為公取之也杜氏注取鄆以居公也武夷胡氏傳鄆魯邑也直書齊侯取之何也齊不自取而為公取鄆使居之也昭公出奔經書次于陽州見公於魯未絶而季氏逐君為不臣及書齊侯取鄆則見公巳絶於魯而逐於季氏為不君君者有其土地人民以奉宗廟之典籍者也巳不能有而他人是保則不君矣春秋之義欲為君盡君道欲為臣盡臣道各守其職而不渝也昭公失君道季氏為亂臣各渝其職而不守矣其為後世戒深切著明矣吕氏曰齊侯取鄆以處公也齊侯不能討季氏以正君臣大義而獨取鄆以處公其無意於善而忽逺略可知也二十有六年春王正月葬宋元公杜氏注三月而葬速三月公至自齊居于鄆公羊作運左氏傳言魯地也榖梁傳居于鄆者公在外也至自齊道義不外公也髙郵孫氏曰鄆本魯邑昭公居之與在其道中等耳故曰居也蘇氏曰凡公行反而告廟則書至在外雖不告而書至所以存公也武夷胡氏傳居者有其土地人民之稱也昭公失國出奔而稱居于鄆者存一國之防也襄王巳出而稱居于鄭敬王未入而稱居于狄泉者存天下之防也天子之於天下率土之濵莫非其臣非諸侯所敢擅也諸侯之於封國四境之内莫非其土非大夫所得專也故諸侯避舎以待廵狩而大夫專邑是謂叛君曰居于鄆其為防也至矣夏公圍成左氏傳夏齊侯将納公命無受魯貨申豐從女賈以幣錦二兩縳一如瑱適齊師謂子猶之人髙齮齮子猶家臣子猶梁丘據能貨子猶為髙氏後粟五千庾杜氏注當為請使得為髙氏後髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶受之言於齊侯曰宋元公為魯君如晉卒于曲棘叔孫昭子求納其君無疾而死不知天之棄魯邪抑魯君有罪於鬼神故及此也君若待于曲棘使羣臣從魯君以卜焉齊侯從之使公子鉏帥師從公齊師圍成師及齊師戰於炊鼻泰山孫氏曰公圍成書者見國内皆叛也武夷胡氏傳不書齊師者景公怵於邪説為義不終故微之也書公圍成則季氏之不臣昭公之不君齊侯之不能修方伯連帥之職其罪咸具矣秋公㑹齊侯莒子邾子杞伯盟于鄟陵左氏傳秋盟于鄟陵謀納公也杜氏注鄟陵地闕公至自㑹居于鄆公羊作運九月庚申楚子居卒左氏傳九月楚平王卒冬十月天王入于成周左氏傳四月單子如晉告急五月戊辰王城人劉人戰於施谷劉師敗績七月己巳劉子以王出晉知躒趙鞅帥師納王冬十月内申王起師於滑辛丑在郊遂次於尸十一月辛酉晉師克鞏召伯盈逐王子朝王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚隂忌奔莒以叛召伯逆王於尸及劉子單子盟遂軍圉澤次於隄上癸酉王入於成周甲戌盟於襄宫晉師使成公般戍周而還十二月癸未王入荘宫公羊傳成周者何東周也其言入何不嫌也榖梁傳周有入無出也泰山孫氏曰子朝之亂甚矣悼王既死敬王即位於外四年始勝其醜反正於宗廟不言歸而言入者言歸嫌與即位於内者同故變文言入以著即位於外也髙郵孫氏曰成周盖京師也不曰京師而曰成周者京大也師衆也惟衆惟大故天子之居稱之是時周巳衰微而敬王孱弱不能髙居京師以臨制天下至於出奔而復入也聖人以周之衰微同於列國敬王失地同於諸侯故曰天王入于成周而不曰京師也尹氏召伯毛伯以王子朝奔楚陸氏纂例王子朝書尹氏云以者能制之也泰山孫氏曰立王子朝獨書尹氏奔楚并舉召伯毛伯者明罪本在尹氏當先誅逆首後治其徒也武夷胡氏傳取國有五利寵居一焉子朝有寵於景王為之黨者衆矣卒不能立至於奔楚何也是非有出於人之本心者不可以私愛是亦不可以私惡非卒歸於公而止矣景王寵愛子朝将蘄於見是而天下卒不以為是疎薄子猛将蘄於見非而天下卒不以為非徒設此心兩棄之也庶孽憑寵為羣小之所宗而人心不附適子恃正為人心之所向而羣小不從故伯服雖殺而平王亦不能復宗周之盛申生已死而奚齊卓子亦不能勝里克之兵是兩棄之也景王不鑒覆車王猛子朝之際危亦甚矣春秋詳書為後世戒可謂深切著明也哉二十有七年春公如齊公至自齊居于鄆公羊作運左氏傳言在外也榖梁傳公在外也夏四月吳弑其君僚左氏傳吳子欲因楚喪而伐之使公子掩餘公子燭庸帥師圍潜使延州來季子聘於上國楚莠尹然工尹麇帥師救潜吳師不能退吳公子光曰此時也勿可失也告鱄設諸曰我王嗣也吾欲求之夏四月光伏甲於堀室而享王鱄設諸置劒於魚中以進抽劒刺王鈹交於胷遂弑王吳公子掩餘奔徐公子燭庸奔鍾吾劉氏傳親弑僚者闔廬也其稱國以弑何稱國以弑者衆弑君之辭也闔廬弑僚則曷為以衆弑君之辭吳之謁也餘祭也夷昧也不與子國而與弟凡為季子也季子使而亡焉僚者長庶也即之是廢讓而毁義以成篡也國人莫説故謂之衆弑其君也武夷胡氏傳此公子光使鱄諸弑之而稱國何也吳子夀夢有四子長諸樊次餘祭次夷昧次季札光諸樊之子僚夷昧之子也諸樊兄弟而以次相及必欲致國於季子而季子終不受則國宜之光者也僚烏得為君故稱國以弑而不歸獄於光其稱國以弑者吳大臣之罪也大臣任大事事莫大於置君矣故君存而國本定君終而嗣子立社稷嘉靖人無間言此秉政大臣之任伊召之所以安商周孔明之所以定劉漢也若廢立進退出於羣小閽寺而當國大臣不預焉則将焉用彼相矣此春秋歸罪大臣稱國弑君之意其經世之慮深矣楚殺其大夫郤榖作郄宛左氏傳郤宛直而和國人說之鄢将師為右領與費無極比而惡之令尹子常賄而信讒無極謂子常曰子惡欲飲子酒又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹将必來辱為惠已甚吾無以酬之若何無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰寘諸門令尹至必觀之而從以酬之及饗日帷諸門左無極謂令尹曰吾幾禍子子惡将為子不利甲在門矣令尹使視郤氏則有甲焉不往召鄢将師而告之将師退遂令攻郤氏且爇之子惡聞之遂自殺也令尹盡滅郤氏之族黨劉氏意林楚殺其大夫郤宛君不明故臣得專其威至於殺其大夫而莫之止也不亦甚乎然而郤宛則有以取之有以取之者辟嫌不審也辟嫌不審罪也秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈左氏傳秋㑹于扈令戍周且謀納公也宋衛皆利納公固請之范獻子取貨於季孫乃辭小國而以難復武夷胡氏傳文十五年諸侯盟於扈将為魯討齊齊侯賂之而不克討故在㑹諸侯略而不序今此謀納公亦以賂故不克納而諸國之大夫皆序何也曰利於納公者宋衛之大夫也受賂而不納公者獨范鞅主之耳又況戍周之令行乎所以列序而不略也以此見聖人取舎之大情而輕重審矣冬十月曹伯午卒邾快來奔公如齊公至自齊居于鄆公作運左氏傳冬公如齊齊侯請饗之使宰獻而請安二十有八年春王三月葬曹悼公陸氏纂例曰六月公如晉次于乾侯左氏傳春公如晉将如乾侯子家子曰有求於人而即其安人孰矜之其造於竟弗聽使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一介辱在寡人而即安於甥舅其亦使逆君使公復於竟而後逆之榖梁傳公在外也泰山孫氏曰公如齊者再皆不見禮故如晉其言次于乾侯者不得入於晉也公既不見禮於齊又不得入於晉其窮辱若此吕氏曰公如齊不得入如晉又不得入當世諸侯如是然後知無霸之害也夏四月丙戌鄭伯寧公作寗下同卒六月葬鄭定公陸氏纂例曰三月秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆公作運左氏傳公至自乾侯處于鄆齊侯使髙張來唁公稱主君子家子曰齊畢君矣君祗辱焉公如乾侯泰山孫氏曰以乾侯至者不得見晉侯故齊侯使髙張來唁公武夷胡氏傳遣使來唁淺事也亦書於經者罪齊侯不能修方伯連帥之職也昔狄人迫逐黎侯黎侯寓於衛衞人弗恤黎之臣子勸其君以歸而賦式微其一章曰微君之故者以事求人而人不有其事是謂微君之故若昭公見逐出奔而齊莫之討淹恤日久而齊莫之納微君之故矣其二章曰微君之躬者以身下人而人不有其身是謂微君之躬若齊侯設禮以享而使宰獻遣使來唁而稱主君微君之躬矣諸侯失國託於諸侯禮也諸侯失國諸侯納之正也齊侯先世嘗主夏盟而太公受先王五侯九伯之命矣魯為鄰境甥舅之國也昭公朝夕立於其朝曽不能陳師境上討意如逐君之罪而遣使唁公豈得禮乎襄陵許氏曰荀躒唁公地髙張不地以居于鄆猶以魯志也故稱來焉公如晉次于乾侯夏四月庚子叔詣公穀作倪卒秋七月冬十月鄆潰榖梁傳潰之為言上下不相得也上下不相得則惡矣亦譏公也武夷胡氏傳民逃其上曰潰自是昭公削迹於魯尺地一民皆非其有矣公之出奔處鄆四年民不見徳亡無愛徴至於潰散豈非昬迷不反自納於罟擭陷穽之中其從者又皆艾殺其民視如土芥其下不堪所以潰歟然則去宗廟社稷出奔而猶不惕然恐懼蘄改過以補前行之愆也自棄甚矣欲不亡得乎噫故書以為後世戒吕氏曰易蹇之象曰君子以反身修徳反身修徳固處蹇之道也盡處蹇之道則有出蹇之期昔太王去國從之者如歸市昭公所至而民潰其亦不知自反甚矣孟子曰家必自毁而後人毁之國必自伐而後人伐之善夫三十年春王正月公在乾侯榖梁傳存公故也劉氏傳其言公在乾侯何正月以存公也曷為存公公在外也公在外乆矣曷為於此乎存公居于鄆有魯也在乾侯無魯也公雖無魯魯不可無公也劉氏意林向曰居今曰在向也魯而今也晉一民莫得使焉尺地莫得有焉人固曰乾侯之君耳而春秋則以為猶吾君也冉求謂子貢曰夫子為衞君乎子貢曰諾吾将問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也故君雖不君臣不可以不臣父雖不父子不可以不子古今之大義子貢其知之矣常山劉氏曰書公在乾侯存君也君失其居在於乾侯而不得歸故因朝正之時而書公所在則存君父罪臣子譏諸侯之意此可具見也武夷胡氏傳公去社稷於今五年每嵗首月不書公者在魯四封之内則無適而非其所也至是鄆潰客寄乾侯非其所也嵗首必書公之所在者盖以存君不與季氏之專國也而罪臣子譏諸侯之意具矣唐武后廢遷中宗革命自立史臣列於本紀欲著其罪而君子以為非春秋之法其言曰天下者唐之天下中宗受之於其父武后安得絶先君之世復繫嗣君之年黜武氏之號自以為竊取春秋之義信矣夏六月庚辰晉侯去疾卒秋八月葬晉頃公左氏傳夏六月晉頃公卒秋八月𦵏鄭游吉弔且送𦵏魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送𦵏今吾子無貳何故對曰先王之制諸侯之喪士弔大夫送𦵏惟嘉好聘享三軍之事於是乎使卿晉之喪事敝邑之間先君有所助執紼矣若其不間雖士大夫有所不獲數矣靈王之喪我先君簡公在楚我先大夫印段實往敝邑之少卿也王吏不討恤所無也晉人不能詰杜氏注三月而𦵏速冬十有二月吳滅徐徐子章羽公作禹奔楚左氏傳吳子使徐人執掩餘使鍾吾人執燭庸二公子奔楚楚子大封而定其徙吳子怒冬十二月吳子執鍾吾子遂伐徐防山以水之己夘滅徐徐子章禹斷其髮攜其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚吳子問於伍貟曰初而言伐楚余知其可也而恐其使余往也又恐人之有余之功也今余将自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉一師至彼必皆出彼出則歸彼歸則出楚必道敝亟肄以罷之多方以誤之既罷而後以三軍繼之必大克之闔廬從之楚於是乎始病陸氏纂例啖子曰徐子名者初已服吳子吳子唁而送之非能自奔劉氏傳徐子章羽何以名貶曷為貶賤也其賤奈何吳子伐徐防山以水其城章羽不能守斷其髮攜其妻子以逆吳子吳子唁而復之使其邇臣從之自是走之楚三十有一年春王正月公在乾侯季孫意公作隠如㑹晉荀躒公榖作櫟下同于適歴左氏傳晉侯将以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎季孫意如㑹晉荀躒于適歴陸氏微㫖淳聞於師曰季孫逐君之臣也晉不罪之而反與為㑹書曰意如㑹晉荀躒于適歴晉侯之為盟主可見矣荀躒之為人臣可知矣此不待貶絶而惡見者也吕氏曰晉為盟主以號令諸侯将以託國者也而使大夫與叛臣㑹其禮義消亡公室日衰可知矣荀躒奉命而行不能諫止其為臣亦可知也晉之君臣皆不待貶而惡自見矣武夷胡氏傳意如出君不事專有魯國晉實主盟不能致討而寵以㑹禮不亦逆哉或曰季孫事君如在國未知其罪而君伐之是昭公之過也則非矣行貨齊晉使不納公禱於煬宫求君不入及其復也猶欲絶其兆域加之惡諡安在乎事君如在國猶曰未知其罪乎齊晉不能誅亂禁姦悖君臣之義不知其從自及也夏四月丁巳薛伯榖卒晉侯使荀躒唁公于乾侯左氏傳夏四月季孫從知伯如乾侯知伯荀躒子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人将使歸糞除宗祧以事君則不能見夫人己所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復於寡君退而謂季孫君怒未怠子姑歸祭陸氏纂例在晉地故亦不言來秋𦵏薛獻公冬黒肱公作弓以濫來奔左氏傳冬邾黒肱以濫來奔賤而書名重地故也君子曰名之不可不慎也如是夫有所有名而不如其已以地叛雖賤必書地以名其人終為不義弗可滅矣是故君子動則思禮行則思義不為利囬不為義疚或求名而不得或欲盖而名章懲不義也齊豹為衛司寇守嗣大夫作而不義其書為盜邾庶其莒牟夷邾黒肱以土地出求食而已不求其名賤而必書此二物者所以懲肆而去貪也若艱難其身以險危大人而有名章徹攻難之士将奔走之若竊邑叛君以儌大利而無名貪冒之民将寘力焉是以春秋書齊豹曰盜三叛人名以懲不義數惡無禮其善志也故曰春秋之稱微而顯婉而辨上之人能使昭明善人勸焉淫人懼焉是以君子貴之辨疑趙子曰左氏若以齊豹是大夫但為求其名故書為盜以不與其名者則諸相殺而書其名者是與其名乎又云三叛人欲盖而名章言其賤必不書其名夫子矯其心而書爾若如此則三人預知夫子修春秋賤者不書其名乎為是将以賂魯而屬夫子令不書乎何言欲盖也皆妄為曲說殊可怪也泰山孫氏曰案襄二十一年邾庶其以漆閭丘來奔五年莒牟夷以牟婁及防茲來奔邾莒言國此不言國者脫之也十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞吕氏曰取鄆取闞皆言公之無逺圗求目下之利而戕其民無復國之慮也夏吳伐越左氏傳夏吳伐越始用師於越也秋七月冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔公作大叔申鄭國參曹人莒人公穀有邾人薛人杞人小邾人城成周左氏傳秋八月王使富辛與石張如晉請城成周范獻子謂魏獻子曰與其戍周不如城之雖有後事晉弗與知可也冬十一月晉魏舒韓不信如京師合諸侯之大夫於狄泉尋盟且令城成周己丑士彌牟營成周計丈數揣髙卑度厚薄仭溝洫物土方議逺邇量事期計徒庸慮財用書餱糧以令役於諸侯屬役賦丈書以授帥杜氏注帥諸侯之大夫而效諸劉子韓簡子臨之以為成命榖梁傳天子微諸侯不享覲天子之在者惟祭與號故諸侯之大夫相帥以城之此變之正也泰山孫氏曰周自天子言之則曰王城成周昭二十二年劉子單子以王猛入于王城二十六年天王入于成周是也諸侯言之則曰京師僖二十八年晉人執衛侯歸之于京師三十年公子遂如京師遂如晉文元年叔孫得臣如京師𦵏襄王成十三年三月公如京師夏五月公自京師遂㑹晉侯齊侯宋公衞侯鄭伯曹伯邾人滕人伐秦十五年晉侯執曹伯歸于京師十六年曹伯歸自京師之類是也此不言城京師而曰城成周者不與大夫城京師也大夫城京師以安天子其言不與大夫城京師者天子微諸侯又微故諸侯不城京師而大夫城之也諸侯不城京師而大夫城之是天下無諸侯也故曰仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人杞人小邾人城成周以惡之髙郵孫氏曰成周盖京師也不曰京師者所以見王室之衰同於列國也春秋有書城邢城杞者矣今曰城成周何以異也武夷胡氏曰天子有道守在四夷今至於城王都可以不書乎不曰城京師而曰城成周者京師衆大之稱成周地名也與列國等矣吕氏曰周室雖微諸侯猶勤之如此先王之徳澤猶有存焉者也十有二月己未公薨于乾侯左氏傳十二月己未公薨書曰公薨于乾侯言失其所也趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰魯君世從其失季氏世修其勤民忘君矣雖死於外其誰矜之社稷無常奉君臣無常位自古以然故詩曰髙岸為谷深谷為陵三后之姓於今為庶主所知也昔成季友桓之季也文姜之愛子也有大功於魯受費以為上卿至於文子武子世増其業魯文公薨而東門遂殺嫡立庶魯君於是乎失國政在季氏於此君也四公矣民不知君何以得國是以為君慎器與名不可以假人武夷胡氏傳諸侯失國出奔者衆矣鄭伯突為祭仲所逐而出奔于櫟而復國衛侯衎為孫寗所逐而出奔入于夷儀而復國昭公在外八年終以客死為天下笑何也祭仲雖專而世權不重於季氏衛侯失國猶夫人也而有推挽之者所以雖失而復得也魯自季友受費以為上卿至於意如專執國命四世矣其臣皆季氏之孚也其民皆季氏之獲也而昭公有一子家駒言不聽而計不行也不能復國宜矣故春秋詳録其所因為後世之戒公雖失國然每嵗之首月必書公在乾侯誅意如也書齊侯取鄆公圍成鄆潰絶昭公也為人臣者觀每嵗必書公所在必不敢萌跋扈不臣之心為人君者觀春秋所書圍成鄆潰知社稷之無常奉也亦必少警矣嗚呼可謂深切著明者矣春秋集解卷二十六
