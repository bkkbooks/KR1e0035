body:
  text: 春秋集解卷十宋吕本中撰僖公七年春齊人伐鄭武夷胡氏傳將卑師少稱人聲罪致討曰伐鄭伯背中即外南與楚合而未離也故桓公復治之夏小邾公作邾婁子來朝杜氏注郳犂来始得王命而来朝也邾之别封故曰小邾髙郵孫氏曰霸者之興而附庸小國類多稱爵春秋因而書之所以見當時之爵或降或升惟霸者之所欲為爾鄭殺其大夫申侯左氏傳春齊人伐鄭孔叔言於鄭伯請下齊以救國公曰吾知其所由来矣姑少待我夏鄭殺申侯以說於齊且用陳轅濤塗之譖也榖梁傳稱國以殺大夫殺無罪也劉氏傳申侯之罪奈何申侯之為人臣也專利而不厭興事以自為功足以殺其身而已矣劉氏意林春秋君臣皆譏以謂鄭伯内忌而殺申侯申侯雖不當誅亦有以取之吕氏曰言被殺者無罪而殺之者濫殺也秋七月公㑹齊侯宋公陳世子款鄭世子華盟于寗榖梁作寜母左氏傳謀鄭故也管仲言於齊侯曰臣聞之招攜以禮懷逺以徳徳禮不易無人不懐齊侯修禮於諸侯諸侯官受方物鄭伯使太子華聽命於㑹言於齊侯曰洩氏孔氏子人氏三族實違君命若君去之以為成我以鄭為内臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不姦之謂禮守命共時之謂信違此二者姦莫大焉齊侯辭焉子華由是得罪於鄭杜氏注髙平方與縣東有泥母亭音如寗曹伯班公作般卒公子友如齊冬葬曹昭公八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子款公有鄭世子華盟于洮鄭伯乞盟左氏傳請服也公羊傳王人者何㣲者也曷為序乎諸侯之上先王命也榖梁傳兵車之㑹也杜氏注洮曹地新服未與㑹故不序例别言乞盟陸氏纂例啖子曰王人與盟非禮也陸氏辨疑啖子曰乞者卑重之辭爾武夷胡氏傳王人下士也内臣之微者莫微於下士外臣之貴者莫貴於方伯公侯今以下士之微序乎方伯公侯之上外輕内重不亦偏乎春秋之法内臣以私事出朝者直書曰来以私好出聘者不稱其使以私情出訃者止録其名不以其貴故尊之也以王命行者雖下士之微序乎方伯公侯之上不以其賤故輕之也然則班列之髙下不在乎内外特係乎王命爾聖人之情見矣尊君之義明矣乞者卑遜自屈之辭欲與是盟而未知其得與否也始而逃歸今則乞盟於以見舉動人君之大節不可不慎也夏狄伐晉襄陵許氏曰晉恃強大且逺不與齊合是以狄得侮之與故當齊桓之隆同盟者安介立者殆矣秋七月禘于大廟用致夫人左氏傳禘而致哀姜焉非禮也凡夫人不薨於寢不殯於廟不訃於同不祔於姑則弗致也劉氏權衡曰凡國君夫人於四者一不備則不致於廟也設令夫人歸寜而死亦將不致乎杜氏注致者致新死之主於廟而列之昭穆夫人淫而與弑不薨於寢於禮不應致故僖公疑其禮歴三禘今果行之冬十有二月丁未天王崩劉氏傳傳曰恵王也九年春王三月丁未宋公御公榖並作禦說卒夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘左氏傳宋桓公卒未葬而襄公㑹諸侯故曰子夏㑹于葵丘尋盟且修好禮也王使宰孔賜齊侯胙孟子曰五霸桓公為盛葵丘之㑹諸侯束牲載書而不歃血初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有徳三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無専殺大夫五命曰無曲防無遏糴無有封而不告曰凡我同盟之人旣盟之後言歸於好榖梁傳天子之宰通於四海宋其稱子何也未葬之辭也禮柩在堂上孤無外事今背殯而出㑹以宋子為無哀矣伊川先生解天子之宰與世子禮異故不殊㑹杜氏注周公宰孔也宰官周采地天子三公不字陳留外黄縣東有葵丘陸氏微㫖趙子曰凡諸侯在喪而出以喪行者稱子以吉行者稱爵志惡之淺深也武夷胡氏傳其曰宰周公者以冢宰兼三公也古者三公無其人則以六卿之有道者上兼師保之任冢宰或闕亦以三公下行端揆之職禹自司空進宅百揆又曰作朕股肱耳目是以宰臣上兼師保之任也周公為師又曰位冢宰正百工是以三公下行端揆之職也所以然者三公與王坐而論道固難其人而冢宰統百官均四海亦不易處也夫以冢宰兼三公其職任重矣而不殊㑹之何也人臣則有進退之節出入均勞之義非王世子貴有常尊之可比也秋七月乙酉伯姬卒公羊傳此未適人何以卒許嫁矣婦人許嫁字而笄之死則以成人之喪治之九月戊辰諸侯盟于葵丘左氏傳秋齊侯盟諸侯于葵丘宰孔先歸遇晉侯曰可無㑹也齊侯不務徳而勤逺略晉侯乃還公羊傳貫澤之㑹桓公有憂中國之心不召而至者江人黄人也葵丘之㑹桓公震而矜之叛者九國伊川先生解云諸侯盟見宰不與陸氏微㫖淳聞於師曰盟稱諸侯者前目後凡之義且明周公之不與盟也不與盟禮也天子無疑諸侯之禮劉氏傳此一地也曷為再言葵丘善是盟也曷為善之桓公誅不孝無易樹子無以妾為妻尊賢育才以彰有徳敬老慈幼無忘賔旅士無世官官事無攝取士必得無專殺大夫無遏糴無有封而不告凡我同盟之人旣盟之後言歸於好以是為盡禁矣諸侯咸諭乎桓之志蓋束牲載書而不歃血也武夷胡氏傳觀孟子所載此盟初命之詞則知桓公翼戴襄王之事信矣甲子公作戍晉侯佹公榖並作詭諸卒冬晉里克殺公作弑其君之子奚齊左氏傳晉獻公卒里克平鄭欲納文公故以三公子之徒作亂杜氏注三公子申生重耳夷吾初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之冬十月里克殺奚齊於次書曰殺其君之子未葬也荀息将死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓於朝荀息死之公羊傳弑未踰年君之號也榖梁傳其君之子云者國人不子也國人不子何也不正其殺世子申生而立之也武夷胡氏傳榖梁子曰其君之子云者國人不子也不正其殺申生而立之也人君擅一國之名寵為其所子則當子矣國人何為不子也民至愚而神是非好惡靡不明且公也其所子而弗子者莫能使人弗之子也非所子而子之者莫能使人之亦子也周幽王嘗黜大子宜臼子伯服矣而犬戎殺其身晉獻公亦殺世子申生立奚齊矣而大臣殺其子詩不云乎天生烝民有物有則民之秉彞好是懿徳此言天理根於人心雖以私欲滅之而有不可滅也春秋書此以明獻公之罪抑人欲之私示天理之公為後世戒其義大矣以此防民猶有欲易大子而立趙王如意致夫人之為人彘者十年春王正月公如齊泰山孫氏曰公始朝齊也不至者朝桓安之與他國異也十五年如齊同此狄滅温温子奔衛左氏傳蘇子無信也蘇子叛王即狄又不能於狄狄人伐之王不救故滅蘇子奔衛杜氏注蓋中國之狄晉里克弑其君卓公冇子字及其大夫荀息公羊傳及者何累也弑君多矣舎此無累者乎曰有孔父仇牧皆累也舍孔父仇牧無累者乎曰有有則此何以書賢也何賢乎荀息荀息可謂不食其言矣劉氏意林晉里克弑其君卓里克能不聽優施之謀寗喜能不從孫林父之亂陳乞能不隨景公之惑則晉無殺世子之禍衛無逐君之惡齊無立嬖孽之變矣患在媮合苟容逢君之惡故春秋成其君臣之名以正其篡弑之罪也所謂不知其義被之空言不敢辭矣不然卓與剽荼豈有冝為君之義哉陳平之王吕氏誅少帝也似此皆不明於大臣之分者也武夷胡氏傳國人不君奚齊卓子而曰里克弑其君卓何也是里克君之也里克者世子申生之傅也驪姬將殺世子而難里克使優施飲之酒而告之以其故里克聽其謀乃欲以中立自免稱疾不朝居三旬而難作是謂持禄容身速獻公殺嫡立庶之禍者故成其君臣之名以正其弑逆之罪克雖欲辭而不受其可得乎使克明於大臣之義據經廷諍以動其君執節不貳固大子以攜其黨多為之故以變其志其濟則國之福也其不濟而死於其職亦無歉矣人臣所明者義於功不貴幸而成所立者節於死不貴幸而免克欲以中立祈免自謂智矣而終亦不能免等死爾不死於世子而死於弑君其亦不知命之蔽哉語曰不知命無以為君子也為人臣而不知春秋之義者必陷於篡弑誅死之罪克之謂矣荀息者奚齊卓子之傅也君弑而死於難書及所以著其節書大夫不失其官也於荀息何取焉若息者可謂不食其言矣或曰息既從君於昬不食其言庸足取乎世衰道微人愛其情私相疑貳以成傾危之俗至於刑牲歃血要質鬼神猶不能固其約也孰有可以託六尺之孤寄百里之命臨死節而不可奪如息者哉自古皆有死民無信不立故聖人以信易食而君子以信易生息不食言其可少乎夏齊侯許男伐北戎晉殺其大夫里克左氏傳九年晉郤芮使夷吾重賂秦以求入齊隰朋帥師及秦師納晉恵公十年夏四月周公忌父王子黨㑹齊隰朋立晉侯晉侯殺里克以説将殺里克公使謂之曰微子則不及此雖然子弑二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎臣聞命矣伏劒而死於是平鄭聘於秦且謝緩賂故不及榖梁傳稱國以殺罪累上也里克弑二君與一大夫其以累上之辭言之何也其殺之不以其罪也其殺之不以其罪奈何里克所為弑者為重耳也夷吾曰是又將殺我乎故殺之吕氏曰里克弑君殺之宜也然稱國以殺罪累上者何也晉恵公討不以其罪而恐其不利於己也故殺之爾春秋推見至隱於此可見秋七月冬大雨雪公作雹十有一年春晉殺其大夫丕鄭父左氏傳十年丕鄭之如秦也言於秦伯曰吕甥郤稱冀芮實為不從若重問以召之臣出晉君君納重耳蔑不濟矣冬秦伯使泠至報問且召三子郤芮曰幣重而言甘誘我也遂殺丕鄭祁舉及七輿大夫榖梁傳稱國以殺罪累上也蘇氏曰丕鄭里克之黨也恵公既殺里克丕鄭言於秦伯請出晉君而納重耳鄭則有罪矣然鄭之謀由殺里克致之也故稱國以殺言君亦過也武夷胡氏傳其稱國者兼罪用事大夫不能格君心之非至於多忌濫刑危其國也夏公及夫人姜氏㑹齊侯于陽榖杜氏注婦人送迎不出門見兄弟不踰閾與公俱㑹齊侯非禮秋八月大雩榖梁傳得雨曰雩不得雨曰旱襄陵許氏曰先乎陽榖之㑹為大雨雪後乎陽榖之㑹為大雩盛隂之極其反為暘僖賢君也不能禮佐齊桓儆其怠忽而更與之俱肆於寵樂是以見戒於天如此冬楚人伐黄左氏傳黄人不歸楚貢冬楚人伐黄武夷胡氏傳被兵城守更歴三時告命已至而援師不出則失救患分災畏簡書安與國之義矣滅弦滅温皆不書伐滅黄而書伐者罪桓公旣與㑹盟而又不能救也襄陵許氏曰以公夫人陽榖之㑹觀之則齊侯霸業怠矣是以楚人伐黄而不能救也十有二年春王正月庚午日有食之杜氏注不書朔官失之夏楚人滅黄杜氏傳黄人恃諸侯之睦於齊也不供楚職曰自郢及我九百里焉能害我夏楚滅黄榖梁傳貫之盟管仲曰江黄逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣桓公不聽遂與之盟管仲死楚伐江滅黄桓公不能救故君子閔之也武夷胡氏傳春秋滅人之國其罪則一而見滅之君其例有三以歸者既無死難之節又無克復之志貪生畏死甘就執辱其罪為重許斯頓牂之類是也出奔者雖不死於社稷有興復之望焉託於諸侯猶得寓禮其罪惟輕弦子温子之類是也若夫國滅死於其位是得正而斃焉者矣於禮為合於時為不幸若江黄二國是也其書滅者見荆楚之强罪諸夏之弱責方伯連帥之不修其職使小國賢君困於强暴不得其所公羊子所為亡國之善詞上下之同力者也秋七月冬十有二月丁丑陳侯杵公作處臼卒十有三年春狄侵衛武夷胡氏傳齊桓公為陽榖之㑹是肆於寵樂其行荒矣楚人伐黄而救兵不起是忽於簡書其業怠矣然後其微窺伺中國今年侵衛明年侵鄭近在王都之側淮夷亦来病杞而不忌也伯益戒於舜曰無怠無荒四夷来王此至誠無息帝王之道春秋之法也齊桓晉文若此類者其事則直書於䇿其義則遊聖門者黙識於言意之表矣故曰仲尼之徒無道桓文之事者襄陵許氏曰桓政始衰自楚伐黄不救則狄有以量中國矣夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹左氏傳淮夷病把故且謀王室也杜氏注鹹衛地東郡濮陽縣東南有鹹城秋九月大雩冬公子友如齊十有四年春諸侯城縁陵左氏傳春諸侯城縁陵而遷杞焉不書其人有闕也杜氏注闕謂器用不具城池未固而去為恵不終也榖梁傳其曰諸侯散辭也聚而曰散何也諸侯城有散辭也桓徳衰矣杜氏注縁陵把邑辟淮夷遷都於縁陵劉氏意林諸侯城縁陵異於城楚丘何也曰諸城不專封專封而善僅可以贖過爾故平其文不使霸者獨享其功為人之迷於義而乃以專封為徳也專封而不善是冒王法而又勤諸侯故異其文以見霸者之罪比縁陵於城楚丘則楚丘善而縁陵不善矣比楚丘於王者之義則桓公救過之不給奚暇稱賢哉齊桓公城楚丘而封衛蓋城者亦非獨魯也而獨書魯焉者以謂彼之為未足以為功故反循吾之常義而稱城焉爾使俗人論齊桓晉文之功則必以謂莫或比髙焉而春秋曾未異於常人也此以正待人之體也厚而深博而逺優優大哉天地之徳也夫夏六月季姬及鄫榖作繒下同子遇于防使鄫子来朝左氏傳鄫季姬来寜公怒止之以鄫子之不朝也夏遇于防而使来朝秋八月辛夘沙鹿崩公羊傳沙鹿崩何以書記異也外異不書此何以書為天下記異也榖梁傳林屬於山為鹿沙山名也杜氏注沙鹿山名平城縣東有沙鹿土山在晉地劉氏傳沙鹿者何山也山則曷為不曰山有號有名以名通者不待號可也然則曷為不繫國山不可以繫國山曷為而不可以繫國名山大澤不可以封諸侯守之沙鹿崩何以書記異也襄陵許氏曰恒星不見星隕如雨齊桓之祥也沙鹿崩晉文之祥也齊桓将興而天文墮晉文欲作而地理决王道之革也狄侵鄭襄陵許氏曰前年狄侵衛今年狄侵鄭而莫或攘之桓志衰也王霸之政兢兢不可怠己齊桓之烈盛茂如此一矜而易心生之則已有闚兵中國是以先王屢省成功而率作興事修誠愼憲務以戒終也冬蔡侯肸卒十有五年春王正月公如齊楚人伐徐左氏傳即諸夏故也三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥公作率師及諸侯之大夫救徐丘左氏傳尋葵丘之盟且救徐也孟穆伯帥師及諸侯之師救徐諸侯次于匡以待之榖梁傳兵車之㑹也遂次于匡遂繼事也次止也有畏也范氏注畏楚杜氏注牡丘地名闕匡衛地在陳留長垣縣西南武夷胡氏傳楚都于郢距徐亦逺而舉兵伐徐暴横憑陵之罪著矣徐在山東與齊密邇以封境言之不可以不速救以形勢言之非有餽糧越險之難也今書盟于牡丘見諸侯救患之不協矣書次于匡見霸主號令之不嚴矣書大夫帥師而諸侯不行見桓徳益衰而禦外侮安中國之志怠矣凡兵而書救未有不善之也救而書次則尤罪其當速而故緩失用師之義矣中庸曰至誠無息不息則久春秋謹始卒欲有國者敦不息之誠也始勤而終怠則不能久而無以固其國矣夏五月日有食之秋七月齊師曹師伐厲左氏傳秋伐厲以救徐也杜氏注厲楚與國義陽隨縣北有厲鄉八月螽榖作􅏑九月公至自㑹泰山孫氏曰暴露師衆三時季姬歸于鄫公作繒杜氏注来寧不書此書者以明中絶乙夘晦震夷伯之廟榖梁傳夷伯魯大夫也因此以見天子至於士皆有廟天子七廟諸侯五大夫三士二故徳厚者流光徳薄者流卑是以貴始徳之本也始封必為祖杜氏注夷伯魯大夫展氏之祖父夷諡伯字陸氏辨疑趙子曰晦者晦朔之晦爾據十六年戊申朔隕石于宋五成十六年甲午晦晉楚戰于鄢陵並書晦朔則知古史之體應合書日而遇晦朔必書之以為厯數之證常山劉氏曰大抵春秋所書皆天人響應有致之之道如石隕于宋而言隕石如夷伯之廟震而言震夷伯之廟此天應之也但以人淺狹之見以為無應其實皆應之然漢儒推災異皆牽合不足信儒者見此因盡廢之冬宋人伐曹左氏傳討舊怨也襄陵許氏曰同盟始自相攻桓不能一矣則何以禁夷狄之亂霸徳方衰荒服闚欲至是而諸侯浸以貳也威靈之陵夷可不愼哉楚人敗徐于婁林左氏傳徐恃救也杜氏注婁林徐地下伾僮縣東南有婁亭吕氏曰諸侯之大夫之救徐者亦無能為也齊桓亦無意於中國也十有一月壬戌晉侯及秦伯戰于韓獲晉侯左氏傳晉侯之入也秦穆姬屬賈君焉且曰盡納羣公子晉侯烝於賈君又不納羣公子是以穆姬怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山内及解梁城既而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉晉侯逆秦師使韓簡視師復曰師少於我鬭士倍我公曰何故對曰出因其資入用其寵饑食其粟三施而無報是以来也今又擊之我怠秦奮倍猶未也戰于韓原晉戎馬還濘而止秦獲晉侯以歸舍諸靈臺子桑曰歸之而質其大子必得大成乃許晉平改館晉侯饋七牢焉十一月晉侯歸劉氏傳戰而言及者主之者也猶曰晉侯為志乎此戰也云爾武夷胡氏傳秦伯伐晉而經不書伐專罪晉也獲晉侯以歸而經不書歸免秦伯也書伐書及者兩俱有罪而以及為主書獲書歸者兩俱有罪而以歸為甚今此專罪晉侯之背施幸災貪愛怒鄰而恕秦伯也然則秦戰義乎春秋無義戰彼善於此則有之矣其不言師敗績何也君獲不言師敗績君重於師也大夫戰而見獲必書師敗績師與大夫敵也君為重師次之大夫敵春秋之法也與孟子之言何以異孟子為時君牛羊用人莫之恤也故以民為貴君為輕春秋正名定分為萬世法故以君為重師次之堯以天下命舜舜亦以命禹必稱元后為先此經世大常而仲尼蓋祖述之者也惟此義不行然後叛逆之黨有託以為名輕棄君親而不顧者矣十有六年春王正月戊申朔隕公作霣石於宋五是月六鷁退飛過宋都鷁榖作鶂左氏傳隕石于宋五隕星也六鷁退飛過宋都風也榖梁傳民所聚曰都杜氏注鷁水鳥髙飛遇風而退劉氏意林同盟有分災救患之義故水火兵戎之為敗則告告則赴之赴則弔之此所待於外者也奇物妖變之至則天之所以警人君雖有堯舜之智反而責其躬此無待於外者也無待於外者何赴告之有髙郵孫氏曰書是月者所以别非戊申之日爾不書日者所不可知闕之也常山劉氏曰隕石于宋自空凝結而隕六鷁退飛倒逆飛也必有氣驅之也武夷胡氏傳石隕鷁飛而得其數與名在春秋時凡有國者察於物象之變亦審矣此宋異也何以書於魯史亦見當時諸國有非所當告而告者矣何以不削乎聖人因災異以明天人感應之理而著之於經垂戒後世知石隕于宋而書隕石此天應之也和氣致祥乖氣致異人事感於下則天變應於上苟知其故恐懼修省變可消矣宋襄以亡國之餘欲圖霸業五石隕六鷁退飛不自省其徳也後五年有盂之執又明年有泓之敗天之示人顯矣聖人所書之義明矣三月壬申公子季友卒劉氏傳大夫卒稱名季者字也其稱季友何譏何譏爾世卿世卿非禮也言自是世季氏也世卿多矣曷為獨譏乎此因其可譏而譏之此其為可譏奈何言是乃逐昭公者也其諸則冝於此焉正之矣武夷胡氏傳季者其字也友者其名也大夫卒而書名則曷為稱字聞諸師曰春秋時魯卿有生而賜氏者季友仲遂是也生而賜氏者何命之世為卿也季子忠賢在僖公有翼戴之勤襄仲弑逆在宣公有援立之力此二君者不勝私情欲以異賞報之也故皆生而賜氏俾世其官經於其卒各以氏書者誌變法亂紀之端貽權臣竊命之禍其垂戒逺矣夏四月丙申鄫榖作繒季姬卒髙郵孫氏曰春秋内女適諸侯者書卒秋七月甲子公孫兹公作慈卒冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮左氏傳謀鄫在東賂也城鄫役人病有夜登丘而呼曰齊有亂不果城而還穀梁傳兵車之㑹也杜氏注臨淮郡左右十有七年春齊人徐人伐英氏左氏傳齊人為徐伐英氏以報婁林之役也杜氏注英氏楚與國夏滅項左氏傳師滅項淮之㑹公有諸侯之事未歸而取項齊人以為討而止公伊川先生解滅人之國罪惡大矣在君則當諱故魯滅國書取滅項君在㑹季孫所為也故不諱杜氏注項國今汝隂項縣武夷胡氏傳案左氏淮之㑹公有諸侯之事未歸而取項齊人以為討而止公然則滅項者魯也二傳以為桓公滅之孰信乎考於經未有書外滅而不言國者如齊師滅譚是也亦未有書内取而直言魯者如取鄟取邿取鄫是也由此知項為魯滅無疑矣然聖人於魯事有君臣之義凡大惡必隱避其辭而為之諱今此滅項其惡大矣曷不諱乎曰事有隱諱臣子施之於君父者也故成公取鄟襄公取邿昭公取鄫皆不言滅而書取程氏以為在君則當諱是也若夫滅項則僖公在㑹季孫所為爾執政之臣擅權為惡而不與之諱此春秋尊君抑臣不為朋黨比周之意也秋夫人姜氏㑹齊侯于卞左氏傳秋聲姜以公故㑹齊侯于卞九月公至書曰至自㑹猶有諸侯之事焉且諱之也杜氏注卞今魯國卞縣九月公至自㑹泰山孫氏曰踰三時冬十有二月乙亥齊侯小白卒左氏傳齊侯之夫人三王姬徐嬴蔡姬皆無子齊侯好内多内寵内嬖如夫人者六人長衛姬生武孟少衛姬生恵公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為大子雍巫有寵於衛共姬因寺人貂以薦羞於公亦有寵公許之立武孟管仲卒五公子皆求立冬十月乙亥齊桓公卒易牙入與寺人貂因内寵以殺羣吏而立公子無虧孝公奔宋十二月乙亥赴辛巳夜殯春秋集解卷十
