body:
  text: 春秋集解卷九宋吕本中撰僖公名申莊公子閔公庶兄惠王十八年即位僖謚也小心畏忌曰僖元年春王正月武夷胡氏傳不書即位内無所承上不請命也閔公薨夫人孫于邾慶父出奔莒公於是焉以成風所屬而季子立之内無所承也嗣子定位於初喪而魯使不告於周明年正位改元而周使亦不至於魯又明年服喪已畢而不見於京師上不請命也承國於先君者父子之倫請命於天王者君臣之義今僖公内無所承上不請命不書即位正王法也是故有四海而即天王之位者受之於天者也有一國而即諸侯之位者受之於王者也受之於天者必奉若天道而後能保天下受之於王者必謹守王度而後能保其國齊師宋師曹師次于聶北救邢夏六月邢遷于夷公作陳儀齊師宋師曹師城邢左氏傳諸侯救邢邢人潰出奔師師遂逐狄人具邢器用而遷之師無私焉夏邢遷于夷儀諸侯城之救患也凡侯伯救患分災討罪禮也公羊傳救不言次此其言次何不及事也遷者何其意也遷之者何非其意也榖梁傳齊師宋師曹師城邢是向之師也使之如改事然美齊侯之功也伊川先生解齊未嘗興大衆此稱師責其衆可救而徒次以為聲援致邢之不保其國也杜氏注聶北邢地夷儀邢地陸氏纂例啖子曰凡救當奔命而徃救次失救道也蘇氏曰先言次而後言救案兵待事卒能救邢故以救終之也武夷胡氏傳三國稱師見兵力之有餘也聶北書次譏救邢之不速也春秋大義伐而書次其次為善遂伐楚次于陘美之也救而書次其次為貶救邢次于聶北譏之也聖人之情見矣故救患分災於禮為急而好攻戰樂殺人者於罪為大又曰書邢遷于夷儀見齊師次止緩不及事也然邢以自遷為文而再書齊師宋師曹師城邢者美桓公志義卒有救患之功也不以王命興師亦聖人之所與乎邢姬姓也而狄伐之天子不能正至於遷徙奔亡諸侯有能救而存之則救而存之可也以王命興師者正能救而與之者權秋七月戊辰夫人姜氏薨于夷齊人以歸左氏傳哀姜孫于邾齊人取而殺之于夷以其尸歸僖公請而葬之榖梁傳夫人薨不地地故也楚人伐鄭左氏傳秋楚人伐鄭鄭即齊故也泰山孫氏曰莊十年荆敗蔡師于莘始見於經十四年入蔡稱荆二十三年來聘始進稱人二十八年伐鄭稱荆反狄之今曰楚人伐鄭者以其兵衆地大漸通諸夏復其舊封比之小國也蘇氏曰荆自此交通中國春秋始以人書之然猶君臣同詞凡書其君臣者皆特書也常山劉氏曰楚自此浸强矣故稱人焉然終齊桓之世只稱人而不得與中國之㑹盟者為齊桓能制其强也至十有七年齊桓卒楚於是乎始横十有九年則已盟於齊矣書曰冬㑹陳人蔡人楚人鄭人盟于齊二十有一年春宋人齊人楚人盟于鹿上用此見中國衰微楚人浸張爾至其秋之㑹則書曰宋公楚子陳侯蔡侯鄭伯許男曹伯㑹于盂執宋公以伐宋楚於是大張位列於陳蔡之上而書爵矣武夷胡氏傳楚稱人浸强也莊公十年敗蔡師虜獻舞固已强矣然獨舉其號者始見於經則本其僭竊之罪正其僻陋之名著王法也二十三年來聘嘉其慕義乃以人書二十八年伐鄭惡其荐食復其號舉至是又伐鄭也亦書人者豈許其伐國而人之乎㑹中華執盟主朝諸侯長齊晉其所由來者漸矣八月公㑹齊侯宋公鄭伯曹伯邾公作邾婁人于檉公作朾左氏傳盟于犖謀救鄭也杜氏注犖即檉也地有二名杜氏注檉宋地陳國陳縣西北有檉城九月公敗邾公有婁字師于偃公作纓左氏傳公敗邾師于偃虚丘之戍将歸者也杜氏注虚丘邾地邾人既送哀姜還齊人殺之因戍虛丘欲以侵魯杜氏注偃邾地武夷胡氏傳檉之㑹謀救鄭而公與邾人咸與焉則是志同而謀協也今既㑹邾人于檉又敗邾師于偃於此責公無攘外患安中國之誠矣凡此類皆直書其事而義自見也詐戰曰敗敗之者為主吕氏曰公方㑹霸主而遽敗邾師君子以齊桓之服諸侯僅矣冬十月壬午公子友帥師敗莒師于酈公作犂榖作麗獲莒挐左氏傳莒人來求賂杜氏注求還慶父之賂公子友敗諸酈獲莒子之弟挐杜氏注酈魯地十有二月丁巳夫人氏之喪至自齊公羊傳夫人何以不稱姜氏貶曷為貶與弑公也然則曷為不於弑焉貶貶必於其重者莫重乎其以喪至也杜氏注不稱姜闕文劉氏意林哀姜與乎亂殺二子幾亡國齊桓討而誅之是也此上之所以行乎下君之所以行乎臣霸者之所以行乎諸侯之義且哀姜安可復配宗廟復臨羣臣哉魯以臣子不得討而齊以霸主得舉法故臣子可縁霸主之命以尊宗廟霸主亦可縁天子之法以絶魯私請今齊以公義誅之而魯以私意請之是魯之不忍也而不可通於春秋故去姜氏以見焉異乎文姜文姜殺夫雖臣子得絶之矣哀姜殺子終不可以子故讐母唯霸主得行焉爾二年春王正月城楚丘左氏傳諸侯城楚丘而封衛焉不書所㑹後也榖梁傳楚丘者何衛邑也國而曰城此邑也其曰城何也封衛也則其不言城衛何也衛未遷也劉氏權衡曰邑亦謂之城爾若不謂之城當謂之何哉定之方中之詩曰文公徙居楚丘始建城市而營宫室其辭曰㝎之方中作于楚宫揆之以日作于楚室又曰弁彼虚矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧由此而言文公先徙居而後建城市不得云衛未遷也陸氏微㫖淳聞於師曰楚丘衛邑也魯城之非正也曷為無譏焉曰王政不行外冦交至齊桓為霸主有存亡繼絶之功從其令亦所以自安也故通其變以示不失正也不言齊命為桓公諱也不繋於衛示無譏也若云城衛楚丘則彼我俱非也凡變而不失其正者皆以諱為善武夷胡氏傳楚丘衛邑桓公帥諸侯城之而封衛也不書桓公不與諸侯專封也木瓜美桓公而夫子録之意豈異乎不與專封正王法也木瓜有取焉善衛人之情也曷為善之報者天下之利以德報德則民有所勸矣城楚丘略而不書城邢詞繁而不殺何也案周制凡封國大宗伯儐司几筵設黼扆内史作冊命是天子大權非諸侯所得擅而行之者也衛人渡河野處漕邑許穆夫人閔其亡而載馳賦文公徙居楚丘而後百姓恱則其國固嘗亡滅而不存矣城楚丘是擅天子之大權而封國也邢遷于夷儀經以自遷為文則其遷出於己意其國未嘗滅也諸侯城邢是為同惡相恤以從簡書故詞繁而不殺美救患也桓公封衛而衛國忘亡其有功於中華甚大為利於衛人甚博冝有美詞發揚其事今乃微之若此者正其義不謀其利明其道不計其功略小惠存大節春秋之法也故曰五霸三王之罪人仲尼之徒無道桓文之事者吕氏曰先儒以謂諸侯之義不得專封夫所謂專封者以此地畀此人也則謂之專封固不可也如同時諸侯有相滅亡天子不能令方伯不能救天下諸侯力能救而復之則是蹈仁而踐義也而以是為專封是嫂溺援之以手而以為罪也夏五月辛巳葬我小君哀姜虞師晉師滅下公榖並作夏陽左氏傳晉荀息請以屈産之乗與垂棘之璧假道於虞以伐虢公乃使荀息假道於虞虞公許之且請先伐虢宫之竒諌不聽遂起師夏晋里克荀息帥師㑹虞師伐虢滅下陽先書虞賄故也公羊傳虞微國也曷為序乎大國之上使虞首惡也曷為使虞首惡虞受賂假滅國者道以取亡焉榖梁傳非國而曰滅重夏陽也虞先晉何也為主乎滅夏陽也夏陽者虞虢之塞邑滅夏陽而虞虢舉矣虞之為主乎滅夏陽何也晋獻公欲伐虢荀息曰君何不以屈産之乗垂棘之璧而借道乎虞也公曰此晉國之寶也如受吾幣而不借吾道則如之何荀息曰玩好在耳目之前而患在一國之後此中知以上乃能慮之臣料虞君中知以下也公遂借道而伐虢伊川先生解虞假道而助晉伐虢虢之亡虞實致之故以虞為主下陽邑也虢之亡由此故即書滅杜氏注下陽虢邑在河東大陽縣陸氏微㫖曰滅虢之事實晉為主以虞首惡其意何也晉侯貪而亡親滅人之國其罪易知也虞君職為上公受人之賂遂其强暴以取滅亡其惡至矣故聖人以為首焉武夷胡氏傳案孟子晉人以垂棘之璧屈産之乗假道於虞以伐虢宫之竒諫百里奚不諫然則晉人造意以虞首惡何也貪得重賂遂其强暴滅兄弟之國以及其身而亡其社稷所以為首乎春秋聖人律令也觀此義可以見法矣唐髙宗賜其臣長孫無忌金寳繒錦欲以立武昭儀雖無忌終不順㫖君子猶議其没於利而不反君賜也矧受他人之賂遂其强暴者乎國而曰滅下陽邑爾其書滅何也下陽虞虢之塞邑猶秦有潼關蜀有劍嶺皆國之門户也潼劍不守則秦蜀破下陽既舉而虞虢亡矣襄陵許氏曰書鄭伯突入于櫟不書入鄭書虞師晉師滅下陽不書滅虢觀物有要矣秋九月齊侯宋公江人黄人盟于貫公作貫澤杜氏注實宋地梁國䝉縣西北有貫城貫與貫字相似江國在汝南安陽縣黄國在弋陽縣左氏傳服江黄也杜氏注江黄楚與國也始來服齊故為合諸侯武夷胡氏傳案左氏盟于貫服江黄也荆楚天下莫强焉江黄者其東方之與國也二國來定盟則楚人失其右臂矣樂毅破齊先結韓趙孔明伐魏申好江東雖武王牧野之師亦誓友邦逺及庸蜀彭濮八國之人共為掎角之勢也桓公此盟其服荆楚之慮周矣冬十月不雨榖梁傳不雨者勤雨也楚人侵鄭左氏傳冬楚人伐鄭鬭章囚鄭聃伯三年春王正月夏四月不雨榖梁傳正月不雨不雨者勤雨也夏四月不雨一時言不雨者閔雨也閔雨者有志乎民者也徐人取舒杜氏注徐國在下邳僮縣東南舒國今廬江舒縣髙郵孫氏曰舒國也徐人取之而不言滅者舒之宗祀復存未嘗見滅也舒者附庸之國服屬於楚徐人自楚取之使之屬徐也趙子曰凡得國而不書滅者不絶其祀也此説是也襄陵許氏曰僖公之頌曰荆舒是懲則舒盖荆與國是以徐人取之盖倚齊魯故易如此六月雨榖梁傳六月雨雨云者喜雨也喜雨者有志乎民者也武夷胡氏傳雨云者喜雨也閔雨與民同其憂喜雨與民同其樂此君國子民之道也觀此義則知春秋有懼天災恤民隠之意遇天災而不懼視民隱而不恤自樂其樂而不與民同也國之亡無日矣秋齊侯宋公江人黄人㑹于陽榖左氏傳謀伐楚也榖梁傳陽榖之㑹桓公委端搢笏而朝諸侯諸侯皆諭乎桓公之志杜氏注陽榖齊地在東平須昌縣北武夷胡氏傳案左氏謀伐楚也或曰侵蔡次陘之師諸侯皆在江黄獨不與焉則安知其為謀伐楚乎曰兵有聚而為正亦有分而為竒諸侯之師同次于陘所謂聚而為正也江人黄人各守其地所謂分而為竒也次陘大衆厚集其陣聲罪致討以震中國之威江人黄人各守其境案兵不動以為八國之援此克敵制勝之謀也退於召陵而盟禮定循海以歸而濤塗執然後及江人黄人伐陳則知侵蔡次陘而二國不㑹自為掎角之勢明矣此大㑹而末言者善是謀也冬公子榖有季字友如齊涖公榖並作蒞盟左氏傳齊侯為陽榖之㑹来尋盟冬公子友如齊涖盟杜氏注涖臨也公羊傳蒞盟者何徃盟乎彼也其言来盟者何来盟於我也榖梁傳蒞者位也范氏注盟誓之言素定今但徃其位而盟前定也襄陵許氏曰公盖有故不㑹陽榖是以季友如齊涖盟用是見桓之寛政優簡於諸侯而僖之誠德亦既信矣楚人伐鄭左氏傳楚人伐鄭鄭伯欲成孔叔不可曰齊方勤我棄德不祥四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘左氏傳齊侯與蔡姬乗舟於囿蕩公公懼變色禁之不可公怒歸之未之絶也蔡人嫁之四年春齊侯以諸侯之師侵蔡蔡潰遂伐楚楚子使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之渉吾地也何故管仲對曰昔召康公命我先君大公曰五侯九伯女實征之以夾輔周室賜我先君履東至於海西至於河南至於穆陵北至於無棣爾貢包茅不入王祭不供無以縮酒寡人是徴昭王南征而不復寡人是問對曰貢之不入寡君之罪也敢不供給昭王之不復君其問諸水濵師進次于陘公羊傳潰者何下叛上也其言次于陘何有俟也時楚强大卒暴征之則多傷士衆桓公先犯其與國臨蔡蔡潰兵精威行乃推以伐楚楚懼然後使屈完来受盟修臣子之職不頓兵血刄故詳録其止次榖梁傳侵淺事也侵蔡而蔡潰以桓公為知所侵也遂繼事也杜氏注陘楚地潁川召陵縣南有陘亭劉氏傳此伐楚也曷為次于陘止師以修文告之命古者邦内甸服邦外侯服侯衛賔服蠻夷要服戎狄荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享嵗貢終王不祭則修意不祀則修言不享則修文不貢則修名不王則修德序成而有不至則修刑故刑不祭伐不祀征不享讓不貢告不王伐國者盖賔之也非殘之也次于陘義矣泰山孫氏曰桓之病楚也久矣故元年㑹于檉二年盟于貫三年㑹于陽榖以謀之是時楚方强盛勢陵中國不可易也蔡楚與國故先侵蔡俟其兵震威行然後大舉蔡既潰遂進師次於敵境陘楚地蘇氏曰二年楚人侵鄭三年楚人伐鄭齊桓公㑹諸侯于陽榖為鄭謀楚將以諸侯伐之而未行桓公與蔡姬乗舟于囿蕩公公懼禁之不可公怒歸之而未絶也蔡人嫁之至是因諸侯之師以侵蔡蔡師潰遂伐楚責包茅之不入故蔡曰侵楚曰伐然蔡小國也以齊侵之不待諸侯諸侯之師實為楚動而春秋書其迹先侵蔡而後伐楚若以蔡故勤諸侯言私欲之害也凡民逃其上曰潰在上曰逃楚人方强齊將綏之以德故次于陘以待之既而楚屈完来求盟因而許之雖有諸侯之衆而不用蓋伯者之師求以服人而已非若後世必以戰勝為功也二十八年晉楚戰于城濮晉文公退三舍避楚楚成得臣從之不已而後戰方其退舍而楚還則文公亦將不戰矣由此觀之桓文之於用兵皆求服人而不求必勝也武夷胡氏傳潛師掠境曰侵侵蔡者竒也聲罪致討曰伐伐楚者正也遂者繼事之辭而有專意次止也楚貢包茅不入王祭不供無以縮酒桓公是徴而楚人服罪師則有名矣孟氏何以獨言春秋無義戰也譬諸殺人者或曰人可殺歟曰可孰可以殺之曰為士師則可以殺之矣國可伐歟曰可孰可以伐之曰為天吏則可以伐之矣楚雖暴横憑陵上國齊不請命擅合諸侯豈所謂為天吏以伐之乎春秋以義正名而樂與人為善以義正名則君臣之分嚴矣書遂伐楚譏其專矣樂與人為善苟志於善斯善之矣書次于陘楚屈完来盟于師盟于召陵序其績也夏許男新臣卒辨疑趙子曰許國與楚近盖許男遇疾而歸卒於國故不言卒於師爾若實卒於師而不言師則在師遇疾而歸國乃卒即如何為文乎劉氏意林以許男卒於師乎當曰卒於師卒於㑹乎當曰卒於㑹今一無稱焉者此去其師與㑹而復之驗也春秋褎不失實貶不違理新臣之為人君不知命者也人之患莫大於不知命不知命則必畏死畏死則必貪生貪生則必亂於理矣而後有容身苟免之恥而後有淫祀非望之惑燕昭秦始皇浚民竭國以自封焉不知命之蔽也楚屈完来盟于師盟于召陵左氏傳夏楚子使屈完如師師退次于召陵齊侯陳諸侯之師與屈完乗而觀之齊侯曰豈不榖是為先君之好是繼與不榖同好如何對曰君惠儌福於敝邑之社稷辱収寡君寡君之願也齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以為城漢水以為池雖衆無所用之屈完及諸侯盟公羊傳喜服楚也何言乎喜服楚楚有王者則後服無王者則先叛夷狄也而亟病中國南夷與北夷交中國不絶如綫桓公救中國而攘夷狄卒帖荆榖梁傳其不言使兵在屈完也于召陵得志乎桓公也得志者不得志也以桓公得志為僅矣杜氏注召陵潁川縣也陸氏微㫖啖子曰来盟于師我在師也淳聞於師曰楚蠻夷之强國也未嘗與中國為㑹屈完之佐楚子而能從善服義得為臣之道故聖人特書族以褒之劉氏意林桓公之威可謂盛矣責楚之包茅則諾問昭王之不服則辭然而不以己力之有餘而加人此雖益賛于禹班師振旅之義何異凡人之情强則暴服則懾今齊强而不暴楚服而不懾俱捐其私以義理相勝者也苟以義理相勝而無喜怒愛惡之遷則王事純矣故不多齊之有功而多楚之服罪不貴楚之能拒敵而貴齊之能不遂也泰山孫氏曰案元年桓公救邢城邢皆曰某師某師此合魯衛陳鄭七國之君侵蔡遂伐楚書爵者以其能服强楚攘外患救中國之功始著也故自是征伐用師皆稱爵焉常山劉氏曰楚屈完来盟于師盟于召陵彼自服而来求盟於我也如成二年袁婁之盟則異於是齊侯使國佐如師非服而来也畏晉之强而賂晉也晉受賂而與盟明我反及彼也故不曰来盟而曰秋七月齊侯使國佐如師己酉及國佐盟于袁婁春秋於王道信輕重之權衡曲直之繩墨也武夷胡氏傳桓公帥九國之師侵蔡而蔡潰伐楚而楚人震恐兵力强矣責包茅之不貢則諾問昭王之不復則辭儌與同好則承以寡君之願語其戰勝攻克則對以用力之難然而桓公退師召陵以禮楚使卒與之盟而不遂也於此見齊師雖强桓公能以律用之而不暴楚人已服桓公能以禮下之而不驕庶幾乎王者之事矣襄陵許氏曰楚之未服則侵蔡進師次陘以威之其既服也則退師召陵以禮焉若得或躍在淵之象者此楚之所以畏而慕之久而不能忘也齊人執陳轅公榖並作袁濤塗左氏傳陳轅濤塗謂鄭申侯曰師出於陳鄭之間國必甚病若出於東方觀兵於東夷循海而歸其可也申侯曰善濤塗以告齊侯許之申侯見曰師老矣若出於東方而遇敵懼不可用也若出於陳鄭之間共其資糧屝屨其可也齊侯恱與之虎牢執轅濤塗公羊傳稱侯而執者伯討也稱人而執者非伯討也此執有罪何以不得為伯討古者周公東征則西國怨西征則東國怨桓公假塗於陳而伐楚則陳人不欲其反由己者師不正故也不修其師而執濤塗古人之討則不然也秋及江人黄人伐陳左氏傳秋伐陳討不忠也伊川先生解齊命也八月公至自伐楚榖梁傳有二事偶則以後事致後事小則以先事致其以伐楚致大伐楚也泰山孫氏曰出踰二時葬許穆作繆公冬十有二月公孫兹公作慈帥師㑹齊人宋人衛人鄭人許人曹人侵陳左氏傳冬叔孫戴伯帥師㑹諸侯之師侵陳陳成歸轅濤塗蘇氏曰伐陳侵陳皆討濤塗之不忠也前曰伐當其罪也後曰侵已甚也武夷胡氏傳揚子法言或問為政有幾曰思斁昔在周公征於東方四國是皇其思矣夫齊桓公欲徑陳陳不果納執轅濤塗其斁矣夫桓公識明而量淺管仲器不足而才有餘方楚人未帖而齊以為憂也致勤於鄭振中夏之威㑹于陽榖惇逺國之信案兵于陘修文告之詞退舍召陵結㑹盟之禮何其念之深禮之謹也存此心以進善則桓有王德而管氏為王佐矣堯舜性之也湯武身之也五霸假之也久假而不歸烏知其非有惜乎桓公假之不久而遽歸也楚方受盟志已驕溢陳大夫一謀不協其身見執其國見伐見侵而怒猶未怠也桓德於是乎衰矣愛人不親反其仁治人不治反其知禮人不荅反其敬行有不得者皆反求諸己其身正而天下歸之曾可厚以責人不自反乎原其失在於量淺而器不宏也魏武纔得荆州而張松見忽唐莊宗自矜取汴而髙氏不朝成湯勝夏撫有萬方乃曰兹朕未知獲戾于上下慄慄危懼若将隕于深淵其爾萬方有罪在予一人予一人有罪無以爾萬方人之度量相越豈不逺哉春秋稱人以執罪齊侯也稱侵陳者深責之也故孟子曰仲尼之徒無道桓文之事者管仲曾西之所不為也而子為我願之乎五年春晉侯殺其世子申生左氏傳晉獻公娶于賈無子烝於齊姜生秦穆夫人及大子申生又娶二女於戎大戎狐姬生重耳小戎子生夷吾晉伐驪戎驪戎男女以驪姬歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五使言於公曰使大子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙唯二姬之子在絳見莊公二十八年及将立奚齊既與中大夫成謀姬謂大子曰君夢齊姜必速祭之大子祭於曲沃歸胙於公公田姬寘諸宫六日公至毒而獻之杜氏注毒酒經宿輒敗而經六日明公之惑公祭之地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由大子大子奔新城公殺其傅杜原欵或謂大子子辭君必辯焉大子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂曰子其行乎大子曰君實不察其罪被此名也以出人誰納我十二月縊於新城姬遂譖二公子曰皆知之重耳奔蒲夷吾奔屈見四年公羊傳曷為直稱晉侯以殺殺世子母弟直稱君者甚之也陸氏微㫖曰申生進不能自明退不能違難雖有愛父之心而乃陷之於不義俾讒人得志國以亂離古人云小仁大仁之賊也其斯之謂歟武夷胡氏傳申生愛父以姑息而陷之於不義而目晉侯斥殺專罪獻公何也春秋端夲清源之書也内寵並后嬖子配適亂之本也驪姬寵奚齊卓子嬖亂本成矣尸此者其誰乎是故目晉侯斥殺專罪獻公使後世有欲紊妃妾之名亂適庶之位縱人欲滅天理以敗其家國者知所戒焉以此防民猶有以堯母名門使姦臣逆探其意有危皇后太子之心以成巫蠱之禍者把伯姬来朝其子公羊傳與其子俱來朝也榖梁傳諸侯相見曰朝伯姬為志乎朝其子也伯姬為志乎朝其子則是把伯失夫之道矣諸侯相見曰朝以待人父之道待人之子非正也故曰把伯姬來朝其子參譏也杜氏注伯姬来寜寜成風也夏公孫兹公作慈如牟左氏傳夏公孫兹如牟娶焉公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王世子于首止公榖並作戴下同秋八月諸侯盟于首止左氏傳㑹王大子鄭謀寜周也杜氏注惠王以惠后故将廢大子鄭而立王子帶故齊桓帥諸侯㑹王大子以定其位公羊傳曷為殊㑹王世子世子貴也諸侯盟于首止諸侯何以不序一事而再見者前目而後凡也榖梁傳及其㑹尊之也何尊焉王世子云者唯王之貳也諸侯盟于首止無中事而復舉諸侯何也尊王世子而不敢與盟也尊則其不敢與盟何也盟者不相信也故謹信也不敢以所不信而加之尊者桓諸侯也不能朝天子是不臣也王世子子也塊然受諸侯之尊已而立乎其位是不子也桓不臣王世子不子則其所善焉何也是則變之正也伊川先生解世子王之貳不可與諸侯列世子出諸侯㑹之故其辭異杜氏注惠王大子鄭也首止衞地陳留㐮邑縣東南有首鄉劉氏傳此一地也曷為再言首止善是盟也曷為善之王将以愛易世子桓公為是率諸侯㑹而盟之王室以安則是正乎不正不正則其嘉之何也王将以愛易世子諸侯莫知以争則不可以諫則不得桓公控大國扶小國㑹世子于首止以尊天王為之也然而諸侯以睦天王以尊後嗣以定一㑹而父子君臣之道皆得焉蘇氏曰首止之㑹非王志也帥諸侯以定世子為義也然而諸侯不以王命而㑹世子世子不以王命而出㑹諸侯衰世之事也武夷胡氏傳及以㑹尊之也以王世子而下㑹諸侯則陵以諸侯而上與王世子㑹則抗春秋抑强臣扶弱主撥亂世反之正特書及以㑹者若曰王世子在是諸侯咸徃㑹焉示不可得而抗也後世論其班位有次於三公宰臣之下亦有序乎其上者則将奚正自天王而言欲屈逺其子使次乎其下示謙德也自臣下而言欲尊敬王世子則序乎其上正分義也天尊地卑而其分定典叙禮秩而其義明使羣臣得伸其敬則貴有常尊上下辨矣經書宰周公祗與王人同序於諸侯之上而不得與殊㑹同書此聖人尊君抑臣之㫖也而班位定矣無中事復舉諸侯㑹盟同地再言首止者書之重詞之複其中必有大美惡焉首止之盟美之大者也王将以愛易世子桓公有憂之控大國扶小國㑹于首止以定其位大子踐阼是為襄王一舉而父子君臣之道皆得焉故夫子稱之曰管仲相桓公一匡天下民到於今受其賜微管仲吾其被髮左衽矣中國之為中國以有父子君臣之大倫也一否則奚貴中國矣故曰首止之盟美之大者也鄭伯逃歸不盟左氏傳秋諸侯盟王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安杜氏注王恨齊桓定大子之位故召鄭伯使叛齊也鄭伯喜於王命而懼其不朝於齊也故逃歸不盟武夷胡氏傳事有惡者不與為幸其善者不與為貶平丘之盟惡也請魯無勤是以為幸故直書曰公不與盟首止之盟善也犯衆不盟是以為貶故特書曰鄭伯逃歸逃者匹夫之事以諸侯之尊下行匹夫之事雖悔於終病而乞盟如所喪何其書逃歸不盟深貶之也或曰首止之㑹非王志也王惡齊侯定世子而使周公召鄭伯曰吾撫女以從楚可以少安鄭伯喜於王命而畏齊故逃歸不盟然則何罪乎曰春秋道名分尊天王而以大義為主夫義者權名分之中而當其可之謂也諸侯㑹王世子雖衰世之事而春秋與之者是變之中也鄭伯雖承王命而制命非義春秋逃之者亦變之中也天下之大倫有常有變舜之於父子湯武之於君臣周公之於兄弟皆處其變也賢者守其常聖人盡其變㑹首止逃鄭伯處父子君臣之變而不失其中也噫此春秋之所以為春秋而非聖人莫能修之者也楚人滅弦弦子奔黄左氏傳楚鬬穀於菟滅弦弦子奔黄於是江黄道柏方睦於齊皆弦姻也弦子恃之而不事楚又不設備故亡杜氏注弦國在弋陽軑縣東南泰山孫氏曰楚人滅弦者惡桓不能救也故弦子不名十年狄滅温十二年楚人滅黄同此九月戊申朔日有食之冬晉人執虞公左氏傳晉侯復假道于虞以伐虢宫之竒諫弗聼許晉使八月甲午晉侯圍上陽杜氏注上陽虢國都在𢎞農陕縣東南冬十二月丙子朔晉滅虢虢公醜奔京師師還舘於虞遂襲虞滅之執虞公及其大夫井伯以媵秦穆姬公羊傳虞已滅矣其言執之何不與滅也曷為不與滅滅者亡國之善辭也滅者上下之同力者也榖梁傳執不言所於地緼於晉也范氏注時虞已包裹屬於晉伊川先生解書執而不書滅自取也陸氏纂例天子三公故不書名啖子曰春秋時以强暴弱故執諸侯皆稱人亂辭也劉氏意林虞之滅自夏陽始夏陽滅則虞亡矣宫之竒舟之僑之徒皆知之獨其君不知故春秋因大見其釁於滅夏陽而深没其迹於執虞公使天下之為人君者從而省之可以戒於此矣故曰家有既亡國有既滅由别之不别也可不大哀乎人君莫不惡亡而好存莫能固亡而保存是何也嗜欲之習近而憂患之來逺也蘇氏曰不言晉之滅虞虞自滅也秦之取梁也書曰梁亡而不及秦以為梁自亡也武夷胡氏傳書滅下陽於始而記執虞公於後可以見棄義趨利瀆貨無厭之能亡國敗家審矣六年春王正月夏公㑹齊侯陳侯衞侯曹伯伐鄭圍新城左氏傳諸侯伐鄭以其逃首止之盟故也圍新宻鄭所以不時城也杜氏注新城鄭新宻今滎陽宻縣襄陵許氏曰圍而不舉則亦服之而已有遺力者也秋楚人圍許諸侯遂救許左氏傳楚子圍許以救鄭諸侯救許乃還冬蔡穆侯將許僖公以見楚子於武城許男面縛銜璧大夫衰絰士輿櫬楚子使復其所榖梁傳善救許也冬公至自伐鄭榖梁傳其不以救許致何也大伐鄭也泰山孫氏曰出踰三時春秋集觧卷九
