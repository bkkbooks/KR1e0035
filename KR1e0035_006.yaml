body:
  text: 春秋集解卷六宋吕本中撰莊公十有一年春王正月夏五月戊寅公敗宋師于鄑左氏傳宋為乘丘之役故侵我公禦之宋師未陳而薄之敗諸鄑杜氏注鄑魯地秋宋大水左氏傳秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱杜氏注公使弔之故書武夷胡氏傳凡外災告則書所謂災者害及民物如水火兵戎之寇是也諸侯於四鄰有恤病救急之義則告為得禮而不可以不弔故四國同災許人不弔君子是以知許之先亡也凡志災見春秋有謹天戒恤民隱之心王者之事也東萊吕氏曰諸國告則書其顯然為衆所知者亦不待告也春秋之世災異多矣聖人不能盡書特取一二甚者以為世戒也冬王姬歸于齊左氏傳冬齊侯來逆共姬泰山孫氏曰羣公受命主王姬者多矣唯元年與此書者惡公忘父之讎再與齊接婚姻也髙郵孫氏曰元年之書王姬莊公之父新見殺創巨痛深之際於仇讎者之㛰也而使臣逆之築館待之故詳書之以重其罪於此王姬之歸非無逆之者矣然不書於經者仇讎之人嘗已易世於其子孫之㛰但擇其重者書之耳武夷胡氏傳案周制王姬嫁於諸侯車服不繫其夫下王后一等禮亦隆矣春秋之義尊君抑臣其書王姬下嫁曷為與列國之女同辭而不異乎曰陽倡而隂和夫先而婦從天理也述天理訓後世則雖以王姬之貴其當執婦道與公侯大夫士庶人之女何以異哉故舜為匹夫妻帝二女而其書曰嬪于虞西周王姬嫁於諸侯亦執婦道成肅雍之德其詩曰曷不肅雍王姬之車自秦而後尤欲尊君抑臣為治而不得其道至謂列侯尚公主使男事女夫屈於婦逆隂陽之位故王陽條奏世務指此為失而長樂王回亦以其弊至父母不敢畜其子舅姑不敢畜其婦原其意雖欲尊君抑臣為治而使人倫悖於上風俗壞於下又豈所以為治也其流至此然後知春秋書王姬侯女同辭而不異垂訓之義大矣十有二年春王三月紀叔姬歸于酅公羊傳其言歸于酅何隱之也何隱之其國亡矣徒歸于叔爾也杜氏注紀侯去國而死叔姬歸魯紀季自定於齊而後歸之全守節義以終婦道故繫之紀陸氏微㫖啖子曰稱紀言紀之婦也書歸善叔姬之全婦道也此言蓋紀侯大去國之後死於他國而叔姬還魯至是乃歸于酅髙郵孫氏曰叔姬為伯姬媵法不當書春秋賢之故備書之也武夷胡氏傳歸者順辭以宗廟在酅歸奉其祀也魯人髙其節義恩禮有加焉是故其歸于酅其卒其葬史冊悉書夫子修經存而弗削為後世勸夏四月秋八月甲午宋萬弒其君捷公作接及其大夫仇牧左氏傳十二年秋宋萬弒閔公於蒙澤遇仇牧於門批而殺之遇太宰督於東宫之西又殺之立子游羣公子奔蕭公子御說奔亳南宫牛猛獲帥師圍亳公羊傳及者何纍也弒君多矣舍此無纍者乎孔父荀息皆纍也舍孔父荀息無纍者乎曰有有則此何以書賢也何賢乎仇牧仇牧可謂不畏彊禦矣其不畏彊禦奈何萬嘗與莊公戰獲乎莊公莊公歸散舍諸宫中數月然後歸之歸反為大夫於宋與閔公博婦人皆在側萬曰甚矣魯侯之淑魯侯之美也天下諸侯宜為君者惟魯侯爾閔公矜此婦人妒其言顧曰此虜也爾虜焉故魯侯之美惡乎至萬怒搏閔公絶其脰仇牧聞君弒趨而至遇之於門手劔而叱之萬臂摋仇牧碎其首齒著乎門闔仇牧可謂不畏強禦矣榖梁傳及其大夫仇牧以尊及卑也仇牧間也武夷胡氏傳君殺而大夫死於其難春秋書之者其所取也大夫死於弒君之難而有不書者故知孔父牧息皆所取也夫仇牧可謂不畏彊禦矣然徒殺其身不能執賊無益於事也亦足取乎食焉不避其難義也徒殺其身不能執賊亦足為求利焉而逃其難者之訓矣何名為無益哉夫審事物之重輕者權也權重輕而處之得其宜者義也大宰督亦死於閔公之難削而不書者非君命也召忽死於子糾之難孔子比於匹夫匹婦之諒自經於溝瀆而莫之知者所事不正也崔杼弒君晏平仲曰人有君而人弒之吾焉得死之而焉得亡之君子不以是罪晏子者齊莊公不為社稷死而晏子非其私昵之臣也若仇牧荀息立乎人之本朝執國之政而君見弒不以其私也雖欲勿死焉得而勿死聖人書而弗削以為求利焉而逃其難者之勸也惟此義不明然後有視棄其君猶土梗辨髦曽莫之省而三綱絶矣襄陵許氏曰春秋之法與時偕行莊公以前自衛州吁至於宋萬弒君之賊皆貶其氏蓋是時大夫有氏有不氏也故貶其氏不與其貴也自霸統變正大夫無不氏者則氏輕輕則去之不足以殘元惡雖弒君之賊亦以氏書矣冬十月宋萬出奔陳左氏傳冬十月蕭叔大心及戴武宣穆莊之族以曹師伐之殺南宫牛於師殺子游於宋立桓公猛獲奔衛南宫萬奔陳宋人請猛獲於衛請南宫萬於陳皆醢之陸氏纂例啖子曰內外大夫奔卿則書君之股肱也治亂所寄故重而書之凡奔皆惡也有非者則異其文宋司城是也有美者又褒之子哀是也泰山孫氏曰弒君之賊當急討之萬八月弒閔公十月出奔陳宋之臣子緩不討賊若此常山劉氏曰天下之惡一也凡弒君叛國凡民罔弗憝況均諸侯哉王道之行不容有受之者矣書所奔之國則受之之罪亦自見也武夷胡氏傳案左氏宋人請萬於陳以賂而醢萬然則賊已討矣曷為不書陳人殺萬而葬閔公乎夫天下之惡一也陳人不以萬為賊而納之又受宋人之賂是於賊為黨非政刑也特書萬出奔陳而閔公不葬以著陳人與賊為黨之罪而不能正天討其法嚴矣故曰春秋成而亂臣賊子懼十有三年春齊侯榖作人宋人陳人蔡人邾公作邾婁人㑹于北杏左氏傳㑹于北杏以平宋亂榖梁傳是齊侯宋公也其曰人何也始疑之何疑焉桓公受命之伯也將以事授之者也曰可矣乎未乎舉人衆之辭也杜氏注北杏齊地髙郵孫氏曰齊桓公將興霸業諸侯未甚信而齊桓欲過為謙故親屈其尊以㑹諸侯之臣也蘇氏曰齊桓始合諸侯以平宋亂自是遂得諸侯故四國皆稱人言衆與之也僖二十八年晉文公與齊宋秦敗楚于城濮三國皆稱師蓋春秋之書始得諸侯者好㑹則稱人兵㑹則稱師以示衆與之也武夷胡氏傳桓何以及四國之微者㑹是宋公邾子也然則何以稱人春秋之世以諸侯而主天下㑹盟之政自北杏始其後宋襄晉文楚莊秦穆交主夏盟迹此而為之者也桓非受命之伯諸侯自相推戴以為盟主是無君矣故四國稱人以誅始亂正王法也齊侯稱爵其與之乎上無天子下無方伯有能㑹諸侯安中國而免民於水火則雖與之可也誅諸侯者正也與桓公者權也夏六月齊人滅遂左氏傳㑹于北杏以平宋亂遂人不至夏齊人滅遂而戍之杜氏注遂國在濟北蛇丘縣東北泰山孫氏曰桓公貪土地之廣恃甲兵之衆驅逐逼脅以彊制諸侯懼其未盡從也約之以㑹要之以盟臨之以威束之以兵有弗徇者小則侵之伐之甚則執之威之其實假尊周之名以自封殖爾故此年滅遂十四年伐宋十五年伐郳十六年伐鄭十八年伐衛十九年伐我西鄙二十年伐徐二十八年伐衛三十年降鄣閔元年救邢二年遷陽皆稱人以切責之武夷胡氏傳滅國之與見滅罪孰為重取國而書滅奪人土地使不得有其民人毁人宗廟使不得奉其祭祀非至不仁者莫之忍為見滅而書滅亡國之善詞上下之同力也其亦不幸焉爾語有之曰興滅國繼絶世天下之民歸心焉今乃滅人之國而絶其世罪莫重矣齊人滅遂其稱人微者爾凡書滅者不待再貶而惡已見矣襄陵許氏曰非受命聖人為天吏者不可以兼弱攻昧取亂侮亡是故春秋以滅國為大禁春秋征伐齊晉實與而文不與滅國未有代德也秋七月冬公㑹齊侯盟于柯左氏傳始及齊平也公羊傳桓㑹不致信之也杜氏注此柯今濟北東阿齊之阿邑猶祝柯今為祝阿武夷胡氏傳始及齊平也世讎而平可乎於傳有之敵惠敵怨不在後嗣魯於襄公有不共戴天之讎當其身則釋怨不復而主王姬狩于禚㑹伐衛同圍郕納子糾故聖人詳加譏貶以著其忘親之罪今易世矣而桓公始合諸侯安中國攘僣亂尊天王乃欲修怨怒鄰而危其宗社可謂孝乎故長勺之役專以責魯而柯之盟公與齊侯皆書其爵則以為釋怨而平可也或稱齊襄公復九世之讎而春秋賢之信乎以仲尼所書柯之盟其詞無貶則復九世之讎而春秋賢之者妄矣其諸傳者借襄公事以深罪魯莊當其身而釋怨邪十有四年春齊人陳人曹人伐宋夏單伯㑹伐宋左氏傳宋人背北杏之㑹十四年春諸侯伐宋取成於宋而還劉氏權衡伐宋之時魯本不預謀後聞之乃遣大夫往㑹之耳武夷胡氏傳宋人背北杏之㑹諸侯伐宋其稱人者將卑師少也齊自管仲得政滅談之後二十年間未嘗遣大夫為主將亦未嘗動大衆出侵伐蓋以制用兵而賦於民薄矣故能南摧強楚西抑秦晉天下莫能與之爭也或以為貶齊稱人誤矣隱公四年諸侯伐鄭翬帥師㑹伐則再舉宋衛陳蔡四國之名今諸侯伐宋而單伯㑹伐不復再舉三國之名何也宋人背北杏之㑹合諸侯而伐之者齊桓公也㑹伐者無貶焉故其詞平主謀伐鄭而欲求寵於諸侯以定其位者州吁也㑹之者黨逆賊矣故其詞繁而不殺疾之也再舉而列書者甚疾四國之詞也言之不足故再言之而聖人之情見矣秋七月荆入蔡左氏傳蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡秋七月楚入蔡泰山孫氏曰荆入蔡桓未能救中國也冬單伯㑹齊侯宋公衛侯鄭伯于鄄左氏傳宋服故也杜氏注鄄衛地今東郡鄄城也泰山孫氏曰經以單伯主㑹為文者凡㑹盟公或大夫往則皆以魯主其㑹為文春秋魯史故也內不與則曰某人某人㑹于某十五年齊侯宋公陳侯衛侯鄭伯㑹于鄄昭二十七年晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈之類是也十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄左氏傳齊始霸也劉氏權衡曰凡霸者則當主諸侯諸侯莫先焉此年秋伐郳宋序齊上明年夏伐鄭宋亦序齊上齊之未主諸侯明矣然則齊始霸在十六年十二月九國同盟于幽之時也自此始為諸侯主矣襄陵許氏曰始霸在十三年而人諸侯微之至十四年以宋服㑹盟至是諸侯始以禮㑹霸體正矣齊桓三合諸侯而不盟以示重慎是以盟則衆信莫敢渝也夏夫人姜氏如齊杜氏注夫人文姜襄陵許氏曰鄄之㑹魯侯尚未從桓以其未能比近無以示逺務在求好於魯是以於此受文姜而弗逆以昭親親而齊魯之交卒合然而禮防一弛則夫人復啓越竟之志而遂成如莒之姦使人倫失正而風俗相化此先王之典所以貴道謹法而不言利也秋宋人齊人邾公羊有婁字人伐郳公羊作兒左氏傳秋諸侯為宋伐郳杜氏注郳附庸屬宋而叛故齊桓為之伐郳杜氏注宋主兵故序齊上劉氏傳宋其序齊上何主兵者也諸侯無專征有霸者在焉霸者之先諸侯專征也非霸者而先諸侯主兵也譏也此齊桓之師何以不得為霸者桓猶未成乎霸也劉氏意林當是之時桓未成乎霸明年㑹于幽為九合之始始於幽終於淮合者九也而皆不以兵車鄭人侵宋左氏傳諸侯為宋伐郳鄭人聞之而侵宋武夷胡氏傳侵伐之義三傳不同左氏曰有鐘鼓曰伐無鐘鼓曰侵先儒或非其說以為聲罪致討曰伐無名行師曰侵未有以易之也然考諸五經皆稱伐在易謙之六五曰利用侵伐征不服也書之泰誓曰我武維揚侵于之疆詩之皇矣曰依其在京侵自阮疆周官大司馬以九伐之法正邦國而曰賊賢害民則伐之負固不服則侵之而以為無名行師可乎然則或曰侵或曰伐何也聲罪致討曰伐濳師掠境曰侵聲罪者鳴鐘擊鼓整衆而行兵法所謂正也濳師者銜枚臥鼓出人不意兵法所謂奇也冬十月十有六年春王正月夏宋人齊人衛人伐鄭左氏傳宋故也杜氏注宋主兵也班序上下以國大小為次征伐則以主兵為先春秋之常也襄陵許氏曰中國諸侯宋為大既為之服郳又為之報鄭宋蓋自是與齊為一宋親而中國諸侯以定秋荆伐鄭左氏傳鄭伯自櫟入緩告於楚秋楚伐鄭及櫟為不禮故也泰山孫氏曰荆伐鄭桓未能救中國可知也襄陵許氏曰三書荆入蔡伐鄭將以崇桓之責三書楚人伐鄭侵鄭將以大桓之功於是召陵之美深長矣冬十有二月公有公字㑹齊侯宋公陳侯衛侯鄭伯許男公榖有曹伯滑伯滕子同盟于幽左氏傳鄭成也公羊傳同盟者何同欲也伊川先生解齊桓始霸仗義以盟而魯首畔盟故諱不稱公上無明王下無方伯諸侯交爭齊桓始霸天下與之故書同盟杜氏注滑國都費河南緱氏縣幽宋地邾公作邾婁子克卒榖梁傳其曰子進之也范氏曰附齊而尊周室王命進其爵杜氏注克儀父名稱子者蓋齊桓請王命以為諸侯十有七年春齊人執鄭詹公作瞻下同左氏傳鄭不朝也杜氏注齊桓始霸鄭既伐宋又不朝齊詹為鄭執政大臣詣齊見執陸氏纂例凡執諸侯執大夫皆稱人亂常也劉氏傳鄭詹者何鄭大夫也執者曷為或稱行人或不稱行人稱行人者執之以其所為使者也不稱行人者執之不以其所為使及非行人者也泰山孫氏曰詹不氏未命也武夷胡氏傳書齊人執詹惡齊之詞也鄭既侵宋又不朝齊詹為執政蓋用事之臣也其見執宜矣而以惡齊何也以責人之心責己則盡道以愛己之心愛人則盡仁此春秋待齊之意也襄陵許氏曰宋大鄭小齊桓蓋懷宋以示德而威鄭以正法文王之興大邦畏其力小邦懷其德而桓公反之是以為霸道也至於宋襄執鄫之虐則桓不為矣夏齊人殱公作瀐于遂左氏傳遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之齊人殱焉榖梁傳無遂則何以為言遂其猶存遂也存遂奈何曰齊人滅遂使人戍之遂人之因氏飲戍者酒而殺之齊人殱焉此謂狎敵也陸氏纂例啖子曰殱者自殱之義也不言遂人殱之言齊人自取其殱也武夷胡氏傳殱盡也齊滅遂使人戍之遂之餘民飲戍者酒而殺之齊人殱焉春秋書此者見齊人滅遂恃強陵弱非伐罪弔民之師遂人書滅乃亡國之善詞上下之同力也夫以亡國餘民能殱強齊之戍則申胥一身可以存楚楚雖三户可以亡秦固有是理足為強而不義之戒而弱者亦可省身而自立矣襄陵許氏曰齊師滅談談子奔莒著其君不屈也齊人滅遂齊人殱于遂著其民不歸也孟子以為霸者以力服人非心服也力不贍也觀桓之興如此則所謂以力服人者非耶荀子曰桓詐邾襲莒并國三十五如卿之言則所滅蓋不盡書書滅談滅遂上下一見之也秋鄭詹自齊逃來榖梁傳逃義曰逃陸氏纂例逃者匹夫之事也劉氏傳何以書譏何譏爾譏逃也以為義死制云乎以為不義死道云乎君子不曰幸而免蘇氏曰詹之義當以身受齊責以紓國患而逃遁自免故不書來奔而書逃來賤之也武夷胡氏傳齊桓始霸同盟于幽而魯首叛盟受其逋逃虧信義矣書自齊逃來又以罪魯也冬多麋杜氏注麋多則害五稼故以災書髙郵孫氏曰春秋之法以有為災則書有有蜮是也以無為異則書無無冰是也至於麋者常有之物雖無不足以為異惟其多而害五榖則書之矣武夷胡氏傳麋魯所有也多則為異以其又害稼也故書此亦禹放龍蛇周公逺犀象之意也害稼則及人矣吕氏曰麋多為民害君德不明政事不修所致也春秋書此以為萬世之戒使遇災則懼有異則畏思保其國家以承天意焉十有八年春王三月日有食之泰山孫氏曰不言朔不言日日朔俱失之也吕氏曰無日與朔史失之春秋亦無由追考也災異之變褒貶之義蓋不在是焉夏公追戎于濟西杜氏注戎來侵魯公逐之於濟水之西泰山孫氏曰案僖二十六年齊人侵我西鄙公追齊師至酅弗及先言侵而後言追此不言侵伐者明不覺其來已去而追之也書者譏內無戎傋秋有􅈮左氏傳為災也榖梁傳一有一亡曰有􅈮射人也杜氏注􅈮短狐也蓋以含沙射人為災武夷胡氏傳􅈮魯所無也故以有書夫以含沙射人其為物至微矣魯人察之以聞於朝魯史異之以書於䇿何也山隂陸佃曰􅈮隂物也麋亦隂物也是時莊公上不能防間其母下不能正其身陽淑消而隂慝長矣此惡氣之應其說是也然則蕭韶作而鳯皇來儀春秋成而麟出於野何足怪乎春秋書物象之應欲人主之慎所感也世衰道微邪說作正論消小人長善類退天變動於上地變動於下禽獸將食人而不知懼也亦昧於仲尼之意矣冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊傳媵不書此何以書為其有遂事書大夫無遂事此其言遂何聘禮大夫受命不受辭出境有可以安社稷利國家者則專之可也伊川先生解鄄之巨室嫁女於陳人結以其庶女媵之因與齊宋盟挈之以往結好大國所以安國息民乃以私事之小取怒大國故深罪之書其為媵而往盟為遂事杜氏注結在鄄聞齊宋有㑹權事之宜去其本職遂與二君為盟故備書之本非魯公意而又失媵陳之好故冬各來伐劉氏權衡曰陳人者陳大夫也武夷胡氏傳媵淺事陳人微者公子往焉是以所重臨乎禮之輕者也齊侯霸主宋公王者之後盟國之大事也大夫輒與焉是以所輕當乎禮之重者也禮者不失己亦不失人失己與人寇之招也是故結書公子而曰媵陳人之婦譏其重以失己也齊宋書爵而曰遂譏其輕以失人也遂者專事之詞聘禮大夫受命不受辭出境有可以安社稷利國家則專之可也謂本有此命得以便宜從事特不受專對之詞爾若違命行私雖有利國家安社稷之功使者當以矯制請罪有司當以擅命論刑何者終不可以一時之利亂萬世之法是春秋之㫖也夫人姜氏如莒杜氏注非父母國而往書姦冬齊人宋人陳人伐我西鄙伊川先生解齊桓始霸責魯不恭其事故來伐也杜氏注鄙邊邑襄陵許氏曰公之事齊後於諸侯又受鄭詹未討齊宋在鄄將以陳人伐我而結知之故權國重而與之盟示先下之以禮齊宋以公子之盟未足以結成也故卒來伐而取服焉則魯之被兵也輕此公子遂事之謀也齊桓於魯蓋養之以恩而收之以威此魯之所以懷服而不二也歟二十年春王二月夫人姜氏如莒公作正月夏齊大災榖梁傳其志以甚也杜氏注天火曰災劉氏傳災則其言大何大非一也宗廟廏庫盡矣此齊大災也何以書弔焉爾弔人者哀其禍而救其乏秋七月冬齊人伐戎榖作我襄陵許氏曰戎自春秋之初即見荆後起是故攘中國之患莫宜戎先齊桓既霸七年諸侯略定蓋是時始伐戎二十有一年春王正月夏五月辛酉鄭伯突卒武夷胡氏傳杜預稱莊公四年鄭伯遇于垂者乃子儀也而以為厲公者案春秋突歸于鄭之後其出奔蔡入于櫟皆以名書猶繫于爵雖篡而實君雖君而實篡不沒其實也忽雖世子其出奔猶不得稱子其復歸猶不得稱伯以其實不能君也而况子儀雖乘間得立其為君微矣豈敢輕國去都與諸侯㑹於外乎故知遇于垂者乃厲公也其始終書爵不沒其實也亦可以為居正而不能保者之戒矣秋七月戊戌夫人姜氏薨榖梁傳婦人弗目也范氏注鄭嗣曰弗目謂不目其薨地也婦人無外事居有常所故薨不書地冬十有二月葬鄭厲公杜氏注八月乃葬緩慢也二十有二年春王正月肆大眚公作省杜氏注赦有罪也泰山孫氏曰肆放也眚過也肆大眚者罪惡無不赦之辭也常山劉氏曰舜典曰眚災肆赦臯陶曰宥過無大易曰君子以赦過宥罪吕刑曰五刑之疑有赦五罰之疑有赦未聞肆大眚也肆大眚者元惡大憝俱肆之詞也上廢天討下虧國典縱釋有罪賊虐無辜莫此為甚天子尚曰不可况魯國諸侯而敢專肆眚哉後世惠姦宄賊良民其流於此乎殊失春秋之㫖也癸丑葬我小君文姜蘇氏曰文姜之惡甚矣而薨葬盡禮春秋無異詞焉何也君雖不君臣不可以不臣父雖不父子不可以不子子為父隱直在其中矣而文姜之惡何損焉常山劉氏曰夫人之諡皆私諡也嘗疑夫人之義皆從君者也無非無儀婦人不尸善名不當别諡謂如宋共姬者為得禮恐此不特為私諡著譏也武夷胡氏傳文姜之惡甚矣而用小君之禮其無譏乎以書夫人孫于齊不稱姜氏及書哀姜薨于夷齊人以歸考之則譏小君典禮當謹之於始而後可正也文姜己歸為國君母臣子致送終之禮雖欲貶之不可得矣陳人殺其公子御公榖並作禦寇左氏傳陳人殺其大子御寇榖梁傳公子之重視大夫陸氏纂例啖子曰凡他國殺大夫公子目君者惡其君也稱人者討罪之詞也劉氏傳公子非大夫也何以書公之嫡子也公之嫡子則世子也其謂之公子何嫡子既誓稱世子未誓稱公子雖未誓書也殺世子母弟目君此其曰陳人殺之何世子以誓為貴貴成而目君其曰陳人殺之者病禦寇也曷為病之禦寇之為人子也蓋足以殺其身而已矣劉氏意林陳人殺其公子禦寇以為大夫則非大夫也以為世子則非世子也然而書者知其為君之嫡也君之嫡雖未誓為世子未可以稱世子然而已有可以為世子之端矣故不可不重也王法貴嫡嫡子之生而其禮固己異矣王法正名嫡子雖生而異其禮苟未誓則不敢名世子也此道並行而不相悖者也輕重大小義各有施而不可亂此之謂禮之情泰山孫氏曰春秋之義非天子不得專殺此言陳人殺其公子禦寇者譏專殺也是故二百四十二年無天王殺大夫者書諸侯殺大夫者四十七古者諸侯之大夫皆命於天子諸侯不得專命也大夫有罪則請於天子諸侯不得專殺也大夫猶不得專殺况世子母弟乎春秋之世國無大小其卿大夫士皆專命之有罪無罪皆專殺之其無王也甚矣故孔子從而録之以誅其惡觀其專殺之罪雖一而輕重之惡有三殺世子母弟則稱君者甚之也殺大夫不以其罪則稱國稱國者次之也殺有罪則稱人稱人者又次之也武夷胡氏傳殺其公子禦寇公子之重視大夫殺而或稱君或稱國或稱人何也稱君者獨出於其君之意而大夫國人有不與焉如晋侯殺其世子申生之類是也稱國者謂君大夫與聞其事而不請於天子如鄭殺其大夫申侯之類是也稱人者有二義其一國亂無政衆人擅殺而不出於其君則稱人如陳人殺其公子禦寇之類是也其一弒君之賊人人之所得討背叛之臣國人之所同惡則稱人如衛人殺州吁鄭人殺良霄之類是也考於傳之所載以觀經之所斷則罪之輕重見矣夏五月劉氏傳夏五月此其以五月首時何春秋故史也有所不革子曰其事則齊桓晉文其文則史其義則丘竊取之矣泰山孫氏曰蓋五月之下有脫事爾秋七月丙申及齊髙傒盟于防公羊傳齊髙傒者何貴大夫也曷為就吾微者而盟公也公則曷為不言公諱與大夫盟也伊川先生解髙傒上卿魯無使微者與盟之理蓋諱公盟始與仇為㛰惡之大也何氏注防魯地武夷胡氏傳微者名姓不登於史冊髙傒齊之貴大夫也曷為就吾之微者盟蓋公也其不言公諱與髙傒盟也來議結㛰娶仇人女大惡也娶者其為吉下主乎已上主乎宗廟以為有人心者宜於此焉變矣公親如齊納幣則不待貶也冬公如齊納幣榖梁傳納幣大夫之事也公之親納幣非禮也故譏之伊川先生解齊疑㛰議故公自行納幣後二年方逆齊難之也杜氏注母喪未再期而圖㛰陸氏纂例趙子曰魯往他國納幣皆常事不書凡書者皆譏也他國來亦如之㛰禮有六一納采二問名三納吉四納徴即納幣也五請期六親迎即逆女也春秋獨書其二納幣及逆女也以納幣方契成已前三禮並未結定逆女為事終舉重之義也吕氏曰齊遇公違禮公如齊失義春秋之世君臣上下有意於善者蓋少矣二十有三年春公至自齊祭叔來聘榖梁傳其不言使何也天子之內臣也不正其外交故不與使也劉氏傳祭者何邑也叔者何字也曷為邑而字天子之下大夫也下大夫爵同附庸武夷胡氏傳祭伯來朝而不言朝祭叔來聘而不言使尹氏王子虎劉卷來訃而不書其爵皆所以正人臣之義也人君而明此不容下比之臣人臣而明此不為私交之計黨錮之禍息矣夏公如齊觀社公至自齊左氏傳夏公如齊觀社非禮也曹劌諌曰不可夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長幼之序征伐以討其不然諸侯有王王有巡守以大習之非是君不舉矣君舉必書書而不法後嗣何觀榖梁傳常事曰視非常曰觀觀無事之辭也范氏注言無朝㑹之事伊川先生解㛰議尚疑故公以觀社為名再往請議後一年方逆蓋齊難之杜氏注齊因祭社搜軍實故公往觀之荆人來聘公羊傳荆何以稱人始能聘也杜氏注不書荆子使某來聘君臣同辭者蓋楚之始通未成其禮陸氏纂例啖子曰凡外裔來聘皆稱人君臣同辭武夷胡氏傳荆自莊公十年始見於經十四年入蔡十六年伐鄭皆以州舉者惡其淫名荐食故外之也至是來聘遂稱人者嘉其慕義自通故進之也朝聘者中國諸侯之事雖蠻夷而能修中國諸侯之事則不念其淫名荐食而遂進焉見聖人之心樂與人為善矣後世之君能以聖人之心為心則與天地相似凡在宇下者叛則懲其不恪而威之以刑來則嘉其慕義而接之以禮邇人安逺者服矣春秋謹中外之辨而荆吳徐越皆自絶于中國者故書法如此公及齊侯遇于榖蕭叔朝公榖梁傳及者內為志焉爾遇者志相得也蕭叔朝公微國之君未爵命者其不言來於外也朝於廟正也於外非正也杜氏注蕭附庸國就榖朝公故不言來劉氏意林蕭叔朝公為禮非其時猶非其禮也為禮非其處猶非其禮也為禮非其義猶非其禮也為禮非其物猶非其禮也九月郊五月蒸此之謂非其時蕭叔朝公此之謂非其處祭叔來聘齊侯來獻捷此之謂非其義邾人牟人葛人來朝此之謂非其物雖有肅敬之心繁飾之容而君子不受也故禮非其禮而猶不受必歸之正而止又况乎未始有正者乎髙郵孫氏曰簡禮而㑹曰遇吕氏曰魯莊公至不肖人也初未嘗有怨齊心公羊云柯之盟公與曹沫曰寡人之生則不若死矣以公為不能忘齊人也者皆里巷雜記妄說也至是又圖㛰於齊納幣觀社與其大夫盟夏與齊侯遇于榖冬又盟于扈君子以魯莊非人也聖人書春秋如此之詳者以為萬世不肖子之戒於莊公何責焉秋丹桓宫楹榖梁傳禮天子諸侯黝堊大夫倉士黈丹楹非禮也何氏注楹柱也丹之者為將娶齊女欲以夸大示之冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈伊川先生解遇榖盟扈皆為要結姻好杜氏注扈鄭地在滎陽卷縣西北武夷胡氏傳程子曰遇于榖盟于扈皆為要結姻好也傳稱男子二十而冠冠而列丈夫三十而不娶則非禮矣然天子諸侯十五而冠者以娶必先冠而國不可久無儲二欲人君早有繼體故因以為節也鰥者老而無妻之稱舜方三十未娶而師錫帝堯己曰有鰥在下矣妻帝之二女則不告於父母以為告則不得娶而廢人之大倫堯亦不告而妻焉其欲及時而無過如此也今莊公生於桓之六年至是三十有六載矣以世嫡之正諸侯之貴尚無內主同任社稷之事何也蓋為文姜所制使必娶於母家而齊女待年未及故莊公越禮不顧如此其急齊人有疑如此其緩而遇于榖盟于扈要結之也娶夫人奉祭祀為宗廟之主而母言是聽不以大義裁之至於失時不孝甚矣春秋詳書於䇿為後戒也春秋集解卷六
