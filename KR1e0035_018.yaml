body:
  text: 春秋集觧卷十八宋吕本中撰成公九年春王正月杞伯来逆叔姬之䘮以歸左氏傳杞桓公来逆叔姬之䘮請之也杞叔姬卒為杞故也杜氏注為杞婦故卒稱杞逆叔姬為我也杜氏注既棄而復逆其䘮明為魯故公羊傳杞伯曷為来逆叔姬之䘮以歸内辭也脅而歸之也武夷胡氏傳凡筆扵經者皆經邦大訓也杞叔姬一女子爾而四書扵䇿何也有男女然後有夫婦有夫婦然後有父子故春秋慎男女之配重大婚之禮以是為人倫之本也事有大扵此者乎男而賢也得淑女以為配則自家刑國可以移風俗女而賢也得君子以為歸則承宗廟奉祭祀能化天下以婦道豈曰小補之哉夷攷杞叔姬之行雖賢不若宋共姬亦不至如鄫季姬之越禮也杞伯初来朝魯然後出之卒而復逆其䘮以歸者豈非叔姬本不應出故魯人得以義責之使復歸塟乎魯在春秋時内女之歸不得其所者有矣聖人詳録其始卒欲為後鑒使得有終而無弊也其經世之慮逺矣吕氏曰叔姬已棄而杞伯復来逆其䘮以歸魯人聽而子之是専以强弱輕重為國無復禮文也公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲公至自㑹左氏傳為歸汶陽之田故諸侯貳扵晉晉人懼㑹于蒲以尋馬陵之盟季文子謂范文子曰徳則不競尋盟何為范文子曰勤以撫之寛以待之堅彊以禦之明神以要之柔服而伐貳徳之次也是行也將始㑹吴吴人不至伊川先生觧諸侯患楚之强同盟以相保鄭既盟復叛深惡其反覆杜氏注蒲衛地在長垣縣西南武夷胡氏傳案左氏為歸汶陽之田故諸侯貳扵晉晉人懼㑹于蒲以尋馬陵之盟晉人不知反求諸已惇信眀義以補前行之愆而又欲刑牲歃血要質鬼神以御之是從事扵末而不知本矣特書同盟以罪晉也二月伯姬歸于宋夏季孫行父如宋致女伊川先生觧女既嫁父母使人安之謂之致女古者三月而廟見始成婦也伯姬賢魯國重之故使卿致也杜氏注女嫁三月又使大夫隨加聘問謂之致女所以致成婦禮篤㛰姻之好晉人来媵杜氏注媵伯姬也武夷胡氏傳致女者何女既嫁三月而廟見則成婦矣而後父母使人安之故謂之致也常事爾何以書致女使卿非禮也經有因襃以見貶者初獻六羽之類是也亦有因貶以見襃者致女来媵之類是也伯姬賢行著扵家故致女使卿特厚其嫁遣之禮賢名聞扵逺故諸國争媵信其無妒忌之行秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭左氏傳楚人以重賂求鄭鄭伯㑹楚公子成扵鄧秋鄭伯如晉晉人討其貳扵楚也執諸銅鞮欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也榖梁傳不言戰以鄭伯也范氏注欒書以鄭伯伐鄭君臣無戰道為尊者諱恥為賢者諱過為親者諱疾劉氏傳晉人執鄭伯稱人以執者非伯討也此其為非伯討奈何楚人以賂求鄭鄭伯㑹於楚晉人怒及鄭伯之朝也執之而伐其國鄭人改立君以拒晉然後歸鄭伯鄭之亂晉為之也武夷胡氏傳案左氏楚人以重賂求鄭鄭伯㑹公子成扵鄧秋鄭伯如晉晉人討其貳扵楚執諸銅鞮欒書伐鄭鄭使伯蠲行成晉人殺之楚子重侵陳以救鄭稱人而執者既不以王命又不歸諸京師則非伯討也殺伯蠲不書者既執其君矣則行人為輕亦不足紀也楚子重侵陳與處父救江何異削而不書者鄭亦有罪焉耳夫背夷即華正也今以重賂故又與楚㑹則是惟利之從而不要諸義也故鄭無可救之善楚不得有能救之名襄陵許氏曰向使晉能制楚使之不能危鄭討鄭可也今楚潰莒入鄆晉不能救而禁鄭之貳扵楚鄭獨能無懲扵牽羊銜璧之禍乎故晉景之執鄭伯媿扵漢武之遣樓蘭也春秋之義自反以盡其道而後責人矣冬十有一月𦵏齊頃公楚子嬰齊帥師伐莒庚申莒潰楚人入鄆公作運左氏傳楚子重侵陳以救鄭冬十一月楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰楚遂入鄆莒無備故也君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浃辰之間而楚克其三都無備也夫杜氏注鄆莒别邑也武夷胡氏傳案左氏楚子重自陳伐莒圍渠丘渠丘城惡衆潰楚師圍莒莒城亦惡庚申莒潰楚遂入鄆孟子曰鑿斯池也築斯城也與民守之效死而民不去則是可為也夫鑿池築城者為國之備所謂事也效死而民不去為國之本所謂政也莒恃其陋不修城郭浃辰之間楚克其三都信無備矣然兵至而民逃其上不能使民效死而不去則昧扵為國之本也雖隆莒之城何益乎故經扵莒潰特書日以謹之者以眀城郭溝池重門擊柝皆守邦之末務必以固本安民為政之急耳秦人白狄伐晉左氏傳秦人白狄伐晉諸侯貳故也武夷胡氏傳經之所謹者中外之辨也晉嘗與白狄伐秦秦亦與白狄伐晉族類不復分矣其稱人貶辭也武王伐商誓師牧野庸蜀羌髳微盧彭濮皆與焉豈亦不謹乎除天下之殘賊而出民扵水火之中雖逺方之國以義驅之可也亦慮其同惡相濟貽患扵後也中國友邦自相侵伐已為不義又與非我族類者共焉不亦甚乎晉既失信復聴婦人讒說殺其世臣而諸侯皆貳春秋交伐比事以觀可謂深切著眀矣鄭人圍許左氏傳鄭人圍許示晉不急君也是則公孫申謀之曰我出師以圍許為將改立君者而紓晉使晉必歸君城中城杜氏注魯邑也在東海廩丘縣西南武夷胡氏傳經世安民視道之得失不倚城郭溝池以為固也榖梁子謂凡城之志皆譏其說是矣莒雖恃陋不設備至使楚人入鄆苟有令政使民效死而不潰寇亦豈能入也城非春秋所貴而書城中城其為儆守益㣲矣王公設險以守其國非歟曰百雉之城七里之郭設險之大端也謹扵禮以為國辨尊卑分貴賤眀等威異物采凡所以杜絶陵僣限隔上下者乃體險之大用也獨城郭溝池之足恃乎十年春衛侯之弟黑背帥公作率師侵鄭左氏傳衛子叔黒背侵鄭晉命也武夷胡氏傳案左氏衛子叔黒背侵鄭晉命也其曰衛侯之弟者子叔黒背出公孫剽孫林父寗殖出衛侯衎而立剽亦以其父有寵愛之私故得立耳此與齊之夷仲年無異其特書弟以為後戒可謂深切著明矣夏四月五卜郊不從乃不郊榖梁傳夏四月不時也五卜彊也乃者亡乎人之辭也五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭左氏傳鄭公子班聞叔申之謀三月子如立公子繻夏四月鄭人殺繻立髠頑子如奔許欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉㑹諸侯伐鄭鄭子罕賂以襄鍾子然盟扵脩澤子駟為質辛巳鄭伯歸齊人来媵杜氏注媵伯姬也丙午晉侯獳卒襄陵許氏曰當景之世楚莊入陳為霸者事圍鄭圍宋敗晉於邲中國大絀晉志不復逺略而從事赤狄潞氏逮楚莊没始得為鞌之役以服齊頃僅不失霸也秋七月公如晉左氏傳秋公如晉晉人止公使送𦵏扵是糴茷未反杜氏注是春晉使糴茷至楚結成晉謂魯貳扵楚故留公須糴茷還驗其虚實冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也劉氏傳葬晉侯也曷為不言𦵏晉景公不與𦵏晉侯也曷為不與天子之喪動天下屬諸侯諸侯之喪動通國屬大夫大夫之喪動一國屬修士士之喪動一鄊屬朋友庶人之喪動州里屬黨族公之𦵏晉侯非禮也以謂惟天子之事焉可也武夷胡氏傳傳以晉人止公送𦵏諸侯莫在焉魯人辱之故諱而不書非矣假令諸侯皆在魯人不以為辱而可書乎冬十月公無冬十月十有一年春王三月公至自晉泰山孫氏曰公留扵晉九月晉侯使郤犫公作州下同来聘己丑及郤犫盟左氏傳三月公至自晉晉人以公為貳扵楚故止公公請受盟而後使歸郤犫来聘且涖盟杜氏注郤犫郤克從父兄弟夏季孫行父如晉左氏傳夏季文子如晉報聘且涖盟也秋叔孫僑如如齊左氏傳秋宣伯聘于齊以修前好杜氏注鞌以前之好襄陵許氏曰魯盖激晉之徳禮不施將貳扵齊而未能者歟冬十月十有二年春周公出奔晉左氏傳周公楚惡恵襄之偪也且與伯輿争政不勝怒而出及陽樊王使劉子復之盟于鄄而入三日復出奔晉十二年春王使以周公之難来告書曰周公出奔晉凡自周無出周公自出故也公羊傳周公者何天子之三公也王者無外此其言出何自其私土而出也榖梁傳周有入無出其曰出上下一見之也范氏注鄭嗣曰上謂僖二十四年天王出居于鄭下謂今周公出奔上下皆一見之言其上下之道無以存也上雖失之下孰敢有之今上下皆失之矣陸氏纂例啖子曰天子公卿奔者不言出天下皆周土也唯周公自絶扵王故書出罪之也常山劉氏曰以周室衰微黍離變為國風號令不行乎天下則畿外皆非王有故始扵周公之奔特書曰出以王者無外溥天之下莫非王土之義也故後扵子朝子瑕之奔而止書曰奔由天子之令不行扵諸侯故逋逃罪戾之人晉楚敢受書之而晉楚之罪亦昭然矣武夷胡氏傳案左氏周公楚惡恵襄之偪且與伯輿争政不勝怒而出王使劉子復之盟于鄄而入三日復出奔晉夫人主無誠慤之心而下要大臣盟是謂君不君人臣無忠信之實而上與人主盟是謂臣不臣既已要質鬼神以入矣又叛盟失信而出奔則是自絶扵天地自周無出而書曰出者見周室衰微刑政號令不行扵天下爾襄陵許氏曰平桓之詩夷於國風是以春秋王公書出也雖然各一見之而已後不復書以存周也夏公㑹晉侯衛侯于瑣公作沙澤左氏傳七年秋楚子重伐鄭師扵汜諸侯救鄭鄭共仲侯羽軍楚師囚鄖公鍾儀獻諸晉晉人以鍾儀歸囚諸軍府九年晉侯觀扵軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰泠人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝扵嬰齊而夕扵側也不知其他公語范文子文子曰楚囚君子也君盍歸之使合晉楚之成公從之重為之禮使歸求成十二月楚子使公子辰如晉報鍾儀之使請修好結成十年春晉侯使糴茷如楚報太宰子商之使也十有一年秋宋華元善扵令尹子重又善扵欒武子聞楚人既許晉糴茷成而使歸復命矣冬華元如楚遂如晉合晉楚之成十二年宋華元克合晉楚之成夏五月晉士爕㑹楚公子罷許偃癸亥盟扵宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救兇患若有害楚則晉伐之在晉楚亦如之交贄徃来道路無壅謀其不協而討不庭有渝此盟眀神殛之俾隊其師無克胙國鄭伯如晉聽成㑹于瑣澤成故也杜氏注瑣澤地闕襄陵許氏曰晉厲之㑹始此略之不致則以見厲公之徳不能謹始諸侯觧體焉秋晉人敗狄于交剛左氏傳狄人間宋之盟以侵晉而不設備秋晉人敗狄于交剛劉氏意林春秋之記戰伐侵入也甚詳然而扵外裔未有言戰者是何也曰外裔者春秋之所外也中夏者春秋之所内也所内者将以徳治之所外者将以力治之中國可敎以禮義故不結日不偏陳雖有道猶惡之外裔不可敎以禮義其来為寇能勝之而已矣雖不結日不偏陳無譏焉吕氏曰春秋之世中國有事扵外裔未有言戰者盖遏絶之為務惟力是恃不以戰為罪也冬十月十有三年春晉侯使郤錡来乞師榖梁傳乞重辭也古之人重師故以乞言之也伊川先生觧不以王命興諸侯師故書乞武夷胡氏傳晉主夏盟行使諸侯徴㑹討貳誰敢不從以霸主之尊而書曰乞師何也列國䟽封雖有大小土地甲兵受之天子不相統屬魯兵非晉所得専也今晉不以王命興諸侯之師故特書曰乞以見其卑服屈損無自反而縮之意矣聖人作春秋無不重内而輕外至扵乞師則内外同辭者盖皆有報怨復讎貪得之心是以如此若夫誅亂臣賊子請扵天王以大義驅之誰不拱手以聽命何至扵乞哉噫此聖人所以垂戒後世見諸行事之深切著眀者也襄陵許氏曰自齊桓以来霸者征伐召兵諸侯至扵晉景始使士爕来聘以濟伐郯之役厲公承之始乞師矣當此之時晉固盛强唯忠信之厚不崇而偽飾之文彌勝是以召兵而乞師謙辭也霸體貶矣三月公如京師夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾公作邾婁人滕人伐秦曹伯盧公穀作廬卒于師左氏傳公及諸侯朝王遂從劉康公成肅公㑹晉侯伐秦夏四月戊午晉侯使吕相絶秦秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦扵晉晉欒書將中軍士爕將上軍韓厥將下軍趙旃將新軍郤毅御戎欒鍼為右五月丁亥晉師以諸侯之師及秦師戰扵麻隧秦師敗績獲秦成差及不更女父曹宣公卒扵師師遂濟涇及侯麗而還迓晉侯扵新楚杜氏注既戰晉侯止新楚故師還過迎之公羊傳其言自京師何公鑿行也何氏注鑿猶更造之意公鑿行奈何不敢過天子也榖梁傳曹伯廬卒扵師公大夫在師曰師在㑹曰㑹伊川先生觧以伐秦為遂事眀朝為重杜氏注伐秦道過京師因朝王劉氏傳公如京師不書此何以書譏何譏爾公非如京師也為伐秦故如京師也泰山孫氏曰案周官六年五服一朝又六年王乃時廵諸侯各朝扵方岳大眀黜陟未有因㑹諸侯伐國過京師朝之之事故曰春晉侯使郤錡来乞師三月公如京師夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦以惡之也武夷胡氏傳諸侯每嵗侵伐四出未有能修朝覲之禮者今公欲㑹伐秦道自王都不可越天子而往也故皆朝王而不能成朝禮書曰如京師見諸侯之慢也因㑹伐而行矣又書公自京師以伐秦為遂事者此仲尼親筆眀朝王為重存人臣之禮也古者諸侯即位服喪畢則朝小聘大聘終則朝廵狩於方岳則朝觀春秋所載天王遣使者屢矣十二公之述職盖闕如也獨此年書公如京師又不能成朝禮不敬莫大焉君臣之道人之大倫而至於此極夫魯爲秉禮之禮周公之後所行若是况其他乎故孔子懼作春秋或抑或縱或與或奪所以眀君臣之義者至矣其義得行則臣必敬扵君子必敬扵父天理必存人欲必消大倫必正豈曰小補之哉此以伐秦為遂事之意也秋七月公至自伐秦泰山孫氏曰不以京師至者眀本非朝京師冬葬曹宣公左氏傳曹宣公卒扵師曹人使公子負芻守使公子欣時逆曹伯之喪秋負芻殺其大子而自立也諸侯乃請討之晉人以其役之勞請俟他年冬葬曹宣公既葬子臧將亡國人皆將從之成公懼告罪且請焉乃反而致其邑十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛左氏傳衛侯如晉晉侯強見孫林父焉定公不可夏衛侯既歸晉侯使郤犫送孫林父而見之衛侯欲辭定姜曰不可是先君宗卿之嗣也大國又以為請不許將亡衛侯見而復之泰山孫氏曰林父七年奔晉其言自晉歸于衛者由晉侯而得歸也衛大夫由晉侯而得歸則衛國之事可知也襄陵許氏曰人臣不惟義之即安而介恃大國使之反已此能為逐君之惡者也惟其辨之不早是以衛獻至扵出奔禍兆此矣歸易辭也自晉奉之故也秋叔孫僑如如齊逆女鄭公子喜帥師伐許帥公作率左氏傳八月鄭子罕伐許敗焉戊戌鄭伯復伐許庚子入其郛許人平以叔申之封九月僑如以夫人婦姜氏至自齊武夷胡氏傳榖梁曰大夫不以夫人以夫人非正也刺不親迎也僑如之不氏一事而再見者卒名耳然則娶扵他邦而道里或逺必親迎乎以封壤則有小大以爵次則有尊卑以道途則有逺邇或迎之扵其國或迎之扵境上或迎之扵所館中禮之節可也冬十月庚寅衛侯臧卒左氏傳冬十月衛定公卒秦伯卒十有五年春王二月𦵏衛定公三月乙巳仲嬰齊卒公羊傳仲嬰齊者何公孫嬰齊也公孫嬰齊則曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為人後者為其子則其稱仲何孫以王父字為氏也然則嬰齊孰後後歸父也杜氏注襄仲子公孫歸父弟宣十八年逐東門氏既而又使嬰齊紹其後曰仲氏武夷胡氏傳嬰齊者公子遂之子公孫歸父之弟也歸父出奔齊魯人徐傷其無後也扵是使嬰齊後之故書曰仲嬰齊此可謂亂昭穆之序失父子之親者以後歸父則弟不可為兄嗣以後襄仲則以父字為氏亦非矣癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾公作邾婁下同人同盟于戚伊川先生觧十三年曹伯卒扵師負芻殺世子自立既三年諸侯與之盟矣方執之稽天討也故書同盟見其既同矣晉侯執曹伯歸公有之字于京師左氏傳㑹于戚討曹成公也執而歸諸京師諸侯將見子臧扵王而立之子臧辭曰前志有之曰聖逹節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋陸氏纂例以其篡立故公羊云稱侯以執伯討之也詳見僖五年劉氏傳稱侯以執者伯討也此其為伯討奈何曹伯廬卒扵師曹人使公子負芻守使公子欣時逆公子負芻殺公子而自立也為是執之蘇氏曰稱侯以執執有罪也歸之于京師禮也春秋之書執諸侯者多矣惟是為得禮公至自㑹夏六月宋公固卒楚子伐鄭左氏傳楚將北師子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有申叔時老矣在申聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰襄陵許氏曰鄭偪許楚困鄭以國大小兵力强弱更相吞噬夷夏一道而人理盡矣秋八月庚辰𦵏宋共公杜氏注三月而𦵏速宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚左氏傳宋華元為右師魚石為左師蕩澤為司馬華喜為司徒公孫師為司城向為人為大司寇麟朱為少司寇向帶為大宰魚府為少宰蕩澤弱公室殺公子肥華元曰我為右師君臣之訓師所司也今公室卑而不能正吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也杜注華元華喜司城莊族也六官者皆桓族也杜氏注魚石蕩澤向為人鱗朱向帶魚府皆出桓公魚石將止華元魚府曰右師反必討是無桓氏也魚石曰右師苟獲反雖許之討必不敢且多大功國人與之不反懼桓氏之無祀扵宋也右師討猶有戍在桓氏雖亡必偏魚石自止華元扵河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山書曰宋殺其大夫山言背其族也魚石向為人鱗朱向帶魚府杜氏注五大夫畏同族罪及将出奔出奔楚伊川先生觧山去族害公族也常山劉氏曰蕩山宋公族也乗君之喪作亂以弱公室殺公子肥是背其族也背其族者伐其本也人而無本人道絶矣故去族以示法蘇氏曰華元之奔晉也未至而復其書曰華元出奔晉且書自晉歸于宋何也元將討山而知力之不能故奔奔而國人許之討故歸故其討山也雖其族人莫敢救之者故書曰宋華元出奔晉宋華元自晉歸于宋言其出入之正是以能討山也使元懐禄顧寵重扵出奔則不能討山矣鄭子産為政豐卷將祭請田弗許卷退而徴役子産奔晉子皮止之歸而逐卷亦猶是也冬十有一月叔孫僑如㑹晉士爕齊髙無咎宋華元衛孫林父鄭公子鰌邾公作邾婁人㑹吳于鍾離左氏傳㑹吴扵鍾離始通吳也公羊傳曷為殊㑹吴外吴也曷為外也春秋内其國而外諸夏内諸夏而外要荒伊川先生觧吳益强大求㑹扵諸侯諸侯之衆往而從之故書諸國往與之㑹以見吳人盛而中國衰也時中國病楚故與吴親一本此下云襄十年柤之㑹與此同十四年向之㑹亦同杜氏注鍾離楚邑淮南縣泰山孫氏曰此言叔孫僑如㑹某人㑹吳扵鍾離者諸侯大夫不敢致吴子也吴子在鍾離故相與㑹吴于鍾離爾武夷胡氏傳吴以號舉外之也㑹而殊㑹外之也殊㑹有二義㑹王世子於首止意在尊王室不敢與世子抗也㑹吳于鍾離于柤于向意在賤呉人而罪諸侯不能與之敵也夫以泰伯至徳是始有吳以族言之則周之伯父也至其後世遂以號舉者以其僭竊稱王不能居中國之爵號耳成襄之間中國無覇齊晉大國亦皆俛首東向而親吳聖人盖傷之故特殊㑹可謂深切著眀矣襄陵許氏曰㑹列書卿始此君道微而臣行彰也許遷于葉左氏傳許靈公畏偪于鄭請遷扵楚辛丑楚公子申遷許于葉杜氏注葉今南陽葉縣也襄陵許氏曰凡書遷皆偪也書以刺之時晉遷于新田不書無所為書也十有六年春王正月雨木冰公羊傳雨木冰者何雨而木冰也何以書記異也杜氏注冰封著樹泰山孫氏曰雨木冰者雨著木而冰也武夷胡氏傳雨木冰者雨而木冰也何休曰木者少陽幼君大臣之象冰者凝隂兵之類也冰脅木者君臣將執扵兵之徴未㡬而有沙隨苕丘之事天人之際休咎之應焉可誣也而欲盡廢五行傳亦過矣夏四月辛未滕子卒左氏傳夏四月滕文公卒鄭公子喜帥師侵宋左氏傳春楚子自武城使公子成以汝隂之田求成扵鄭鄭叛晉子駟從楚子盟扵武城鄭子罕伐宋宋將鉏樂懼敗諸汋陂退舍於夫渠不儆鄭人覆之敗諸汋陵獲將鉏樂懼宋恃勝也六月丙寅朔日有食之晉侯使欒黶来乞師甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績左氏傳晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞若惟鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書將中軍士爕佐之郤錡將上軍荀偃佐之韓厥將下軍郤至佐新軍郤犫如衛遂如齊皆乞師焉欒黶来乞師戊寅晉師起鄭人聞有晉師使告扵楚楚子救鄭司馬子反將中軍令尹子重將左右尹子辛將右五月晉師濟河聞楚師將至范文子欲反曰我偽逃楚可以紓憂夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇扵鄢陵范文子不欲戰郤至曰韓之戰恵公不振旅箕之役先軫不反命邲之師荀伯不復從皆晉之恥也子亦見先君之事矣今我辟楚又益恥也文子曰吾先君之亟戰也有故秦狄齊楚皆强不盡力子孫將弱今三强服矣敵楚而已惟聖人能外内無患自非聖人外寧必有内憂盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡王卒以舊杜氏注罷老不代鄭陳而不整蠻軍而不陳陳不違晦在陳而囂我必克之苗賁皇言扵晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃扵王卒必大敗之歩毅御晉厲公欒鍼為右彭名御楚共王潘黨為右石首御鄭成公唐苟為右及戰吕錡射共王中目王召養由基與之兩矢使射吕錡中項伏弢以一矢復命郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓郤至見客免胄承命唐苟謂石首曰子在君側敗者壹大我不如子子以君免我請止乃死杜氏注敗者壹大謂軍大崩也楚師薄扵險養由基射再發盡殪叔山冉搏人以投中車折軾晉師乃止囚楚公子茷旦而戰見星未巳子反命軍吏察夷傷補卒乗繕甲兵展車馬雞鳴而食惟命是聽晉人患之苗賁皇徇曰蒐乗補卒秣馬利兵修陳固列蓐食申禱眀日復戰乃逸楚囚王聞之召子反謀榖陽豎獻飲扵子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日榖范文子立扵戎馬之前曰君幼諸臣不佞何以及此君其戒之周書曰惟命不于常有徳之謂公羊傳敗者稱師楚何以不稱師王痍也王痍者何傷乎矢也然則何以不言師敗績末言爾何氏注今親傷人君當舉傷君為重榖梁傳曰事遇晦曰晦不言師君重扵師也杜氏注楚師未大崩楚子傷目而退故曰楚子敗績鄢陵鄭地今屬潁川郡武夷胡氏傳不書師敗績以其君親集矢扵目而身傷為重也當是時兩軍相抗未有勝負之形晉之㨗也亦幸焉爾幸非持勝之道范文子所以立扵軍門有聖人能内外無患盍釋楚以為外懼之戒乎楚師雖敗其勢益張晉遂怠矣卒有欒氏之譛而誅三郤國内大亂聖人備書以見行事之深切著眀也楚殺其大夫公子側左氏傳楚師還及瑕王使謂子反曰先大夫之覆師徒者君不在子無以為過不榖之罪也子反再拜稽首曰君賜臣死死且不朽臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之王使止之弗及而卒杜氏注側子反襄陵許氏曰共王不思所以自責而責大夫卒殺子反故以累上之辭言之秋公㑹晉侯齊侯衛侯宋華元邾公作邾婁下同人于沙随不見公公至自㑹左氏傳戰之日齊國佐髙無咎至扵師衛侯出扵衛公出扵壊隤杜氏注齊衛皆後非獨魯眀晉以僑如故不見公宣伯通扵穆姜欲去季孟而取其室将行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待扵壊隤申宫儆備設守而後行是以後秋㑹于沙随謀伐鄭也宣伯使告郤犫曰魯侯待扵壊隤以待勝者郤犫将新軍且為公族大夫以主東諸侯取貨扵宣伯而訴公扵晉侯晉侯不見公榖梁傳不見公者可以見公也可以見公而不見公譏在諸侯也伊川先生觧晉怒公之後期故不見公君子正已而無恤乎人魯之後期國難故也晉不見為非矣彼曲我直故不足為恥也杜氏注沙随宋地梁國寧陵縣北有沙随亭武夷胡氏傳臣子之扵君父揚其美而不揚其惡為尊者諱為親者諱禮也聖人假魯史以示王法其扵魯事有君臣之義故君弑則書薨易地則書假滅國則書取出奔則書遜屈已而與强國之大夫盟則書及叛盟失信而莫適守則没公而書㑹凡此類雖不没其實示天下之公必隠避其文以存臣子之禮然則沙随之㑹晉不見公是魯侯之大辱深可恥焉者矣曷為直書其事而不諱乎曰春秋伸道不伸邪榮義不榮勢正已而無恤乎人以仁禮存心而不憂横逆之至者也沙随之㑹魯有内難師出後期所當恤者晉侯聽叔孫僑如之譛怒公而不見曲在晉矣魯侯自反非有背仁棄禮不忠之咎也昔曽子嘗聞大勇扵夫子曰自反而縮雖千萬人吾徃矣孟子言浩然之氣至大至剛以直養而無害則塞乎天地之間沙随不見扵公何歉乎直書而不諱者示天下後世使知大勇浩然之氣所以守身應物如此其垂訓之義大矣公會尹子晉侯齊國佐邾公作邾婁人伐鄭左氏傳七月公會尹武子及諸侯伐鄭將行姜又命公如初公又申守而行諸侯之師次扵鄭西遷扵制田知武子佐下軍以諸侯之師侵陳至於鳴鹿遂侵蔡未反諸侯遷扵潁上戊午鄭子罕宵軍之宋齊衛皆失軍杜氏注尹子王卿士子爵曹伯歸自京師左氏傳晉侯謂子臧反吾歸而君子臧反曹伯歸子臧盡致其邑與卿而不出伊川先生觧曹伯不名不稱復歸王未嘗絶其位也自京師王命也陸氏微㫖淳聞扵師曰曹伯之篡罪莫大焉晉侯討而執之其事當矣王不能定其罪名失政刑也書曰歸自京師而不名曹伯以深譏王而不罪負芻也常山劉氏曰負芻殺其太子而自立奈何周不能用晉之執寘諸刑典旋使復國失君道甚矣故書曰曹伯歸自京師以譏之曹伯不名曰未嘗絶之也不絶曹伯所以累乎天王也武夷胡氏傳言天王之釋有罪也善不蒙賞惡不即刑以堯為君舜為臣雖得天下不能一朝居也負芻殺世子而自立不能因晉之執寘諸刑典而使復國則無以為天下之共主矣九月晉人執季孫行父舍之于苕公作招丘左氏傳宣伯使告郤犫曰魯之有季孟猶晉之有欒范也政令扵是乎成今其言曰晉政多門不可從也若欲得志扵魯請止行父而殺之我斃蔑也而事晉蔑有貳矣九月晉人執季文子于苕丘公還待扵鄆使子叔聲伯請扵晉范文子謂欒武子曰季孫扵魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何乃許魯平赦季孫杜氏注苕丘晉地舍之苕丘眀不以歸劉氏意林晉人執季孫行父舍之于苕丘執之者以歸也歸而未至故不可言以歸不可言以歸故著舎之于苕丘焉此皆春秋别嫌眀微慎用獄之意也苕丘非晉地眀矣若苕丘晉地也則必曰以歸既曰以歸矣則無所復著苕丘未有諸侯入其封内而復殊其地者也冬十月乙亥叔孫僑如出奔齊左氏傳出叔孫僑如而盟之僑如奔齊十有二月乙丑季孫行父及晉郤犫盟于扈犫公作州左氏傳季孫及郤犫盟于扈歸刺公子偃召叔孫豹扵齊而立之襄陵許氏曰詳録季孫不恥也晉之賞罰英華亡矣公至自會乙酉刺公子偃陸氏纂例偃則直書刺者有罪當殺也十有七年春衛北宫括公作結帥公作率師侵鄭左氏傳鄭子駟侵晉虚滑衛北宫括救晉侵鄭至扵髙氏夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾公作婁邾人伐鄭左氏傳公會尹武公單襄公及諸侯伐鄭自戲童至扵曲洧六月乙酉同盟于柯陵左傳六月乙酉同盟于柯陵尋戚之盟也伊川先生觧諸侯同病楚也杜氏注柯陵鄭西地陸氏纂例不重言諸侯譏尹單與盟蘇氏曰齊晉之盛天子之大夫會而不盟尊周也柯陵之會尹子單子始與諸侯之盟自是習以為常非禮也秋公至自會齊髙無咎出奔莒左氏傳楚子重救鄭師扵首止諸侯還齊慶克通扵聲孟子鮑牽見之以告國武子武子召慶克而謂之慶克告夫人國子相靈公以會髙鮑處守及還將至閉門而索客孟子訴之曰髙鮑將不納君而立公子角秋七月壬寅刖鮑牽而逐髙無咎無咎奔莒髙弱以盧叛襄陵許氏曰齊靈不公其聽自沈帷牆奔其世臣以長禍亂詩曰萋兮斐兮成是貝錦哆兮侈兮成是南箕悲夫唯巧言能使閉門索客為將不能納君也九月辛丑用郊公羊傳用者不冝用也九月非所用郊也然則郊曷用郊用正月上辛榖梁傳夏之始可以承春以秋之末承春之始盖不可矣九月用郊用者不冝用也宫室不設不可以祭衣服不備不可以祭車馬器械不備不可以祭有司一人不備其職不可以祭祭者薦其時也薦其敬也薦其美也非享味也髙郵孫氏曰王者一嵗而再郊故春郊正月以祈榖秋郊九月以報功春曰圎丘秋曰眀堂后稷圎丘之配文王眀堂之配魯郊非禮矣而成王賜之魯公受之詩曰皇皇后帝皇祖后稷魯之郊配后稷不曰文王焉盖其郊止扵祈榖而報功之郊不行也春秋卜牛必扵正月三月在滌則春秋之正月夏時之十一月也十一月而養牛則二月可以郊矣然則魯之郊用夏時之二月不敢並天子之時又殺之也春秋之九月夏時之七月以為祈榖則已晚以為報功則太早又魯禮之不當行者晉侯使荀罃来乞師吕氏曰春秋之世霸主之令小國其强大恣横有甚扵平世天子之令諸侯者而猶以乞師為名則是先王之禮意猶有髣髴存者惜乎其君臣上下習之而弗著行之而弗察不能襲其號以求其意而反人道之正也冬公會單子晉侯宋公衛侯曹伯齊人邾公作邾婁人伐鄭十有一月公至自伐鄭左氏傳冬諸侯伐鄭十月庚午圍鄭楚公子申救鄭師扵汝上十一月諸侯還泰山孫氏曰鄭與楚比周晉侯再假王命三合諸侯伐之不能服鄭中國不振可知也壬申公孫嬰齊卒于貍脤公作軫榖作蜃杜氏注貍脤闕陸氏纂例大夫卒扵他國即書國卒扵魯地則書地仲遂公孫嬰齊是也劉傳十一月無壬申其以壬申卒之何春秋故史也有所不革子曰其事則齊桓晉文其文則史其義則丘竊取之矣十有二月丁巳朔日有食之邾公作邾婁子貜且卒晉殺其大夫郤錡郤犫公作州郤至左氏傳晉厲公侈多外嬖反自鄢陵欲盡去羣大夫而立其左右欒書怨郤至以其不從已而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎君盍嘗使諸周而察之郤至聘扵周欒書使孫周見之公使覘之信遂怨郤至厲公将作難胥童曰必先三郤族大多怨去大族不偪敵多怨有庸公曰然郤氏聞之郤錡欲攻公郤至曰君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜将失其民欲安得乎待命而已長魚矯清沸魋抽戈結衽而偽訟者三郤将謀扵榭矯以戈殺駒伯苦成叔扵其位温季曰逃威也遂趨矯及諸其車以戈殺之皆尸諸朝胥童以甲劫欒書中行偃扵朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也對曰人将忍君遂出奔狄公使辭扵二子曰大夫無辱其復職位公使胥童為卿公逰扵匠麗氏欒書中行偃遂執公焉泰山孫氏曰君之卿佐是謂股肱厲公不道一日殺三卿此自禍之道也誰與處矣故列數之以著其惡眀年晉殺州蒲楚人滅舒庸左氏傳舒庸人以楚師之敗也道吴人圍巢伐駕圍釐虺遂恃吴而不設備楚公子橐師襲舒庸滅之十有八年春王正月晉殺其大夫胥童左氏傳十七年十二月閏月乙卯晦欒書中行偃殺胥童襄陵許氏曰殺胥童者欒書中行偃也而稱國者二子執君而當國也疾其亂也胥童道君為亂而亂及之是亦刺胥童也庚申晉弑其君州蒲左氏傳正月庚申晉欒書中行偃使程滑弑厲公葬之扵翼東門之外以車一乗使荀罃士魴逆周子扵京師而立之生十四年矣大夫逆扵清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出命也立而不從将安用君二三子用我今日否亦今日共而從君神之所福也對曰羣臣之願也敢不惟命是聽庚午盟而入辛巳朝扵武宫逐不臣者七人榖梁傳稱國以弑其君君惡甚矣武夷胡氏傳弑君天下之大罪討賊天下之大刑春秋合扵人心而定罪聖人順扵天理而用刑固不以大霈釋當誅之賊亦不以大刑加不弑之人然趙盾以不越境而書弑許世子止以不嘗藥而書弑鄭歸生以憚老懼讒而書弑楚公子比以不能效死不立而書弑齊陳乞以廢長立幼而書弑晉欒書身為元帥親執厲公扵匠麗氏使程滑弑公而以車一乗𦵏之扵翼東門之外而春秋稱國以弑其君而不著欒書之名氏何哉仲尼無私與天為一奚獨扵趙盾許止歸生楚比陳乞則責之甚備討之甚嚴而扵欒武子闊畧如此乎學者深求其㫖知聖人誅亂臣討賊子之大要也而後可與言春秋矣齊殺其大夫國佐左傳十七年齊侯使崔杼為大夫使慶克佐之帥師圍盧國佐從諸侯圍鄭以難請而歸遂如盧師殺慶克以榖叛齊侯與之盟扵徐闗而復之十二月盧降使國勝告難扵晉待命於清十八年春齊為慶氏之難故甲申晦齊侯使士華免以戈殺國佐扵内宫之朝師逃扵夫人之宫使清人殺國勝國弱来奔王湫奔莱慶封為大夫慶佐為司冦既齊侯反國弱使嗣國氏襄陵許氏曰慶克作慝濁亂中闈譛害大臣不誅不詰使國佐無所發其忠憤起而殺之顧謂俱靡而已扵是因以為國佐罪罪累上矣吕氏曰屬辭比事春秋敎也比其事則時可知十七年晉殺三郤十八年殺胥童而晉弑其君州蒲齊殺其大夫國佐兩月之間諸國君臣上下相殘殺如此則仁義不施而禮樂絶滅之效也後之君臣欲思患而預防者覩此亦可以少戒矣晉厲公為不道稱國以弑衆辭也公如晉左氏傳朝嗣君也夏楚子鄭伯伐宋宋魚石復入于彭城左氏傳夏六月鄭伯侵宋及曹門外遂會楚子伐宋取朝郏楚子辛鄭皇辰侵城郜取幽丘同伐彭城納宋魚石向為人鱗朱向帶魚府焉以三百乗戍之而還宋人患之西鉏吾曰何也今将崇諸侯之姦而披其地以塞夷庚杜氏注夷庚吴晉往来之要道楚封魚石扵彭城欲以絶吴晉之道逞姦而擕服毒諸侯而懼吴晉吾庸多矣非吾憂也杜氏注彭城宋邑今彭城縣劉氏傳伐宋以納魚石也伐宋以納魚石則其不曰納宋魚石于彭城何不與納也曷為不與納諸侯失國諸侯納之正也諸侯世也大夫失位諸侯納之非正也大夫不世也諸侯託扵諸侯禮也大夫託扵諸侯非禮也有其實者居其名無其實者不得居其名有其名者享其功無其名者不得享其功其言復入何大夫無復復者位已絶也已絶而復惡也未絶而入亦惡也然則何言乎位已絶未絶大夫去國君不埽其宗廟不係累其子弟三年不反然後妆其田邑此之謂君有禮此之謂未絶未絶而入惡也大夫去國君埽其宗廟係累其子弟去之日遂妆其田邑此之謂寇讎此之謂已絶已絶而復亦惡也交譏之吕氏曰不云納楚鄭以兵脅宋而魚石自入焉爾或曰不言納不與納也然則言納者是與之乎公至自晉晉侯使士匄来聘左氏傳晉范宣子来聘且拜朝也襄陵許氏曰公朝始致而聘使紹至晉悼之下諸侯肅矣此列國之所以睦而叛國之所以服也秋杞伯来朝左氏傳秋杞桓公来朝勞公且問晉故公以晉君語之杞伯扵是驟朝扵晉而請為㛰八月邾公作邾婁下同子来朝左氏傳邾宣公来朝即位而来見也築鹿囿左氏傳書不時也公羊傳譏何譏爾有囿矣又為也榖梁傳山林藪澤之利所以與民共也虞之非正也杜氏注築牆為鹿苑髙郵孫氏曰春秋興作皆書雖城池之固門廏之急無遺焉重其徳不及之而徒勞民力也況耳目之玩一身之娱哉左氏曰書不時盖得時猶書也襄陵許氏曰大夫擅國威福日去而公務自虞扵鳥獸草木是謂冥豫在上何可長也己丑公薨于路寢左氏傳言道也杜氏注在路寢得君薨之道榖梁傳路寢正也男子不絶婦人之手以齊終也冬楚人鄭人侵宋左氏傳七月宋老佐華喜圍彭城老佐卒焉冬十一月楚子重救彭城伐宋宋華元如晉告急韓獻子為政曰欲求得人必先勤之成霸安疆自宋始矣晉侯師扵台谷以救宋遇楚師于靡角之谷楚師還晉侯使士魴来乞師左氏傳晉士魴来乞師季文子問師數扵臧武仲對曰伐鄭之役知伯實来下軍之佐也今彘季亦佐下軍如伐鄭可也從之襄陵許氏曰悼公之時霸業復興而乞師以救宋猶遵厲公故事元年以後遂無乞師則召兵而已矣十有二月仲孫蔑會晉侯宋公衛侯邾公作邾婁子齊崔杼同盟于虚朾左氏傳孟獻子會于虚朾謀救宋也宋人辭諸侯而請師以圍彭城杜氏注虚朾地闕襄陵許氏曰襄公不會當喪故也悼之所以仁諸侯也丁未𦵏我君成公左氏傳書順也杜氏注薨于路寢五月而𦵏國家安静世適承嗣故曰書順也春秋集解卷十八
