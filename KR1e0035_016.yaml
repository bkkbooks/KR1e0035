body:
  text: 春秋集解卷十六宋吕本中撰宣公十年春公如齊公至自齊齊人歸我濟西田左氏傳公如齊齊侯以我服故歸濟西之田伊川先生解齊魯修好故歸魯田田魯有也齊非義取之故云歸我不足為善也武夷胡氏傳宣公於齊順其所欲既以女妻其臣又以兵會伐萊之舉又每嵗往朝於齊廷雖諸侯事天子無是禮也故惠公悅其能順事已而以所取濟西田歸之也歸歡及闡直書曰歸此獨書我者乃相親愛惠遺之意深著齊人助成弒逆之罪也或謂濟西魯之本封故書我則誤矣以柔巽卑屈事人不以其道而得地與悅人之柔巽卑屈事已不以其道而歸其地皆人欲之私而非義矣夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛左氏傳夏齊惠公卒崔杼有寵於惠公髙國畏其逼也公卒而逐之奔衛榖梁傳氏者舉族而出之之辭也襄陵許氏曰崔杼出而能反反而能弒者以其宗強經以氏舉於此辨之早也公如齊五月公至自齊左氏傳公如齊奔喪蘇氏曰公如齊奔喪非禮也武夷胡氏傳文約而事詳者經也春如齊朝惠公夏如齊奔其喪若是雖不致可也而皆致者甚之也天王之喪不奔欲行郊禮而汲汲於奔齊惠公之喪天王之葬不會使微者往而公孫歸父會齊惠公之葬其不顧君臣上下尊卑之等所謂肆人欲滅天理而無忌憚者也詞繁而不殺聖人之情見矣癸巳陳夏徵舒弒其君平國左氏傳陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徵舒似女對曰亦似君徵舒病之公出自其廏射而殺之二子奔楚武夷胡氏傳陳靈公之無道也而稱大夫之名氏以弒何也禍莫大於拒諫而殺直臣忠莫顯於身見殺而其言驗泄冶所為不憚斧鉞盡言於其君者正謂靈公君臣通於夏徵舒之家恐其及禍不忍坐觀故昧死言之靈公不能納又從而殺之卒以見弒而亡其國此萬世之大戒也特書徴舒之名氏以見泄冶忠言之驗靈公見弒之由使有國者必以逺色修身包容狂直開納諫諍為心也以為罪不及民故稱大夫以弒者非經意矣六月宋師伐滕左氏傳滕人恃晉而不事宋公六月宋師伐滕武夷胡氏傳前圍滕稱人刺伐喪也此伐滕稱師譏用衆也宋大國爵上公霸主之餘業力非不足也今鄰有弒逆不能聲罪致討乃用大衆以伐所當矜恤之小邦且滕不事已無乃己德猶有所闕而滕何尤焉故得稱師以著其罪而汲汲於誅亂臣討賊子之意見矣公孫歸父如齊葬齊惠公武夷胡氏傳歸父仲遂之子貴而有寵宣公深德齊侯之能定其位而又以濟西田歸之也故生則傾身以事之而不辭於屈辱沒則親往奔喪而使貴卿會其葬亦不顧天王之禮闕然莫之供也比事考詞義自見矣晉人宋人衛人曹人伐鄭左氏傳鄭及楚平諸侯之師伐鄭取成而還武夷胡氏傳案左氏鄭及楚平諸侯伐鄭取成而還其稱人貶也鄭居大國之間從於強令豈其罪乎不能以德鎮撫而用力爭之是謂五十步笑百步庸何愈於楚自是責楚益輕罪在晉矣襄陵許氏曰晉自靈公以來成景相繼力爭陳鄭而無以服楚是以屢書其侵伐譏德政之不施也秋天王使王季子來聘左氏傳秋劉康公來報聘杜氏注即王季子也其後食采於劉武夷胡氏傳宣公享國至是十年不朝於周而比年朝齊不奔王喪而奔齊侯喪不遣貴卿會匡王葬而使歸父會齊侯之葬縱未舉法勿聘焉猶可也而使王季子來王靈益不振矣自是王聘春秋亦不書矣襄陵許氏曰自是王靈益亡王聘益輕春秋不復録矣公孫歸父帥師伐邾公作邾婁取繹公作蘱杜氏注繹邾邑魯國鄒縣北有繹山武夷胡氏傳用貴卿為主將舉大衆出征伐不施於亂臣賊子奉天討罪而陵弱侵小近在邦域之中附庸之國是為盜也當此時陳有弒君之亂既來赴告藏在諸侯之策矣曾不是圖而有事于邾不亦傎乎故四國伐鄭貶而稱人魯人伐邾特書取繹以罪之也大水季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘左氏傳季文子初聘於齊冬子家如齊伐邾故也國武子來報聘武夷胡氏傳案左氏行父如齊初聘也歸父如齊邾故也齊侯嗣立宣公親往奔其父喪又使貴卿會葬矣若待踰年然後修聘未晚也而季孫亟行歸父繼往則以宣公君臣不知為國以禮而謂妄悅取人之可以免於討也歸父貪於取繹畏齊而往蓋理曲則氣必餒矣能無畏乎哉春秋備書而不削以著其罪為後世鑒也飢楚子伐鄭左氏傳楚子伐鄭晉士會救鄭逐楚師於潁北諸侯之師伐鄭武夷胡氏傳經有詞同而意異者比事以觀斯得之矣九年楚子伐鄭稱爵者貶辭也若曰國君自將恃強壓弱憑陵中夏之稱也知然者以下書晉郤缺帥師救鄭則貶楚可知矣此年楚子伐鄭稱爵者直辭也若曰以實屬辭書其重者而意不以楚為罪也知然者以傳書晉士會救鄭逐楚師於潁北而經削之則責晉可知矣此類兼以傳為案者也十有一年春王正月夏楚子陳侯鄭伯盟于辰榖作夷陵左氏傳楚子伐鄭及櫟子良曰晉楚不務德而力爭與其來者可也晉楚無信我焉得有信乃從楚夏楚盟于辰陵陳鄭服也杜氏注辰陵陳地潁川長平縣東南有辰亭武夷胡氏傳晉楚爭此二國為日久矣今陳鄭背晉從楚盟于辰陵而春秋書之無貶辭者豈與其下喬木入幽谷乎中國而不能令則荆蠻進矣經之大法在誅亂臣討賊子有亂臣則無君有賊子則無父無父與君即法紀等于土苴人類殄為禽獸雖得天下不能一朝居也今魯與齊方用兵伐莒晉與狄方會於櫕函而不謀少西氏之逆也而楚人能謀之所謂禮失而求之野小國亦惟能庇我者是賴之也辰陵之盟所以得書於經而詞無貶乎聖人討賊之意可謂深切著明矣公孫歸父會齊人伐莒襄陵許氏曰辰陵之盟此中國所冝震也而齊魯方且務窮兵於小國何震之有秋晉侯會狄于櫕函左氏傳晉郤成子求成於衆狄衆狄疾赤狄之後遂服於晉秋會于櫕函衆狄服也榖梁傳不言及外狄也杜氏注櫕函狄地武夷胡氏傳春秋正法不與外域會同分類也書會戎會狄會吳皆外詞也內中國故詳外四夷故略今中國有亂天王不能討則方伯之責也又不能討則四鄰諸侯冝有請矣而魯方會齊伐莒晉方求成於狄是失肩背而飬其一指不能三年而緦小功之察不亦傎乎凡此直書其事不待貶絶而義自見者也襄陵許氏曰諸侯大國恃齊與晉而齊方伐莒晉方會狄莫有憂中國之心而使楚人為霸者事此反道也冬十月楚人殺陳夏徵舒丁亥楚子入陳納公孫寧公作寧儀行父于陳左氏傳冬楚子為陳夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徵舒轘諸栗門因縣陳陳侯在晉申叔時使於齊反復命而退王使讓之對曰夏徵舒弒其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也乃復封陳鄉取一人焉以歸謂之夏州榖梁傳納者內弗受也輔人之不能民而討猶可入人之國制人之上下使不得其君臣之道不可伊川先生解人衆辭大惡衆所欲誅也誅其罪義也取其國惡也入者不受而強之也致亂之臣國所不容也故書納陸氏微旨淳聞於師曰楚子之討徵舒正也故書曰人許其行義也入人之國又納淫亂之臣邪也故明書其爵以示非正春秋之義彰善疸惡纎介無遺指事原情瑕瑜不掩斯之謂也泰山孫氏曰孔子與楚討者傷中國無人喪亂陵遲之甚也武夷胡氏傳稱人者衆詞也大惡人人之所同惡人人之所得討其稱楚人殺夏徵舒諸夏之罪自見矣案左氏傳楚子為夏氏亂故謂陳人無動將討於少西氏遂入陳殺徵舒轘諸栗門而經先書殺後書入者與楚子之能討賊故先之也討其賊為義取其國為貪舜跖之相去逺矣其分乃在於善與利耳楚莊以義討賊勇於為善舜之徒也以貪取國急於為利跖之徒矣為善與惡特在一念須臾之間而書法如此故春秋傳心之要典不可以不察者也或曰聖人大改過楚雖縣陳能聼申叔時之説而復封陳可謂能改過矣猶書入陳以貶之何也曰楚莊意在滅陳雖復封之然鄉取一人焉以歸謂之夏州而又納其亂臣是制人之上下使不得其君臣之道也晉人以幣如鄭問駟乞之立故子産對曰若寡君之二三臣而晉大夫專制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之他國非所當與也而必欲納其亂臣存亡興滅其若是乎仲尼重傷中國深美其有討賊之功故特從末減不稱取陳而書入雖曰與之可矣納公孫寧儀行父於陳此二臣者從君於昏宣淫於朝誅殺諫臣使其君見弒蓋致亂之臣也肆諸市朝與衆同棄然後快於人心今乃詭詞奔楚託於討賊復讎以自脫其罪而楚莊不能察其反覆又使陳人用之是猶人有飲毒而死者幸而復生又強以毒飲之可乎故聖人外此二人於陳而特書曰納納者不受而強納之者也為楚莊者宜奈何瀦徵舒之宫封泄冶之墓尸孔寧儀行父於朝謀於陳衆定其君而去其庶幾乎吕氏曰稱楚人殺夏徵舒討賊之辭且衆同欲也故曰楚人入陳非衆志也楚子之罪也故曰楚子入陳所為之罪也十有二年春葬陳靈公公羊傳討此賊者非臣子也何以書葬君之辭也楚已討之矣臣子雖欲討之而無所討也武夷胡氏傳討賊者非臣子也何以書葬天下之惡一也本國臣子或不能討而上有天王下有方伯又其次有四鄰有同盟有方域之諸侯有四夷之君長與凡民皆得而討之所以明大倫存天理也徵舒雖楚討之陳之臣子亦可以釋怨矣故得書葬君之詞也楚子圍鄭左氏傳厲之役鄭伯逃歸自是楚未得志焉鄭既受盟于辰陵又僥事於晉十二年春楚子圍鄭三月克之入自皇門至於逵路鄭伯肉袒牽羊以逆王曰其君能下人必能信用其民矣退三十里而許之平潘尫入盟子良出質武夷胡氏傳案公羊傳例戰不言伐圍不言戰入不言圍滅不言入書其重者楚子縣陳蓋滅之矣而經止書入其於鄭也入自皇門至於逵路蓋即其國都矣而經止書圍曷為悉從輕典不著其憑陵諸夏之罪乎上無天王下無方伯天下諸侯有臣弒君子弒父諸夏不能討而夷狄能討之春秋取大節略小過雖如楚子憑陵上國近造王都之側猶從末減於以見誅亂臣討賊子正大倫之為重也夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績左氏傳夏六月晉師救鄭荀林父將中軍先縠佐之士會將上軍趙朔將下軍及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之楚歸而動不後隨武子曰善彘子曰不可晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵強而退非夫也命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟韓獻子謂桓子曰彘子以偏師陷子罪大矣不如進也事若不捷惡有所分師遂濟楚子北師次于郔將飲馬於河而歸聞晉師既濟王欲還嬖人伍參欲戰令尹孫叔敖弗欲曰昔嵗入陳今茲入鄭不無事矣戰而不捷參之肉其足食乎伍參言於王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命此行也晉師必敗且君而逃臣若社稷何王病之告令尹改乘轅而北之次於管以待之晉師在敖鄗之間鄭皇戌使如晉師曰楚師驟勝而驕其師老矣而不設備子擊之鄭師為承彘子曰敗楚服鄭於此在矣必許之欒武子曰師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從楚子又使求成於晉晉人許之盟有日矣楚許伯御樂伯攝叔為右以致晉師杜氏注單車挑戰又似不欲崇和以疑晉之羣帥晉魏錡求公族未得而怒欲敗晉師請致師弗許請使許之遂往請戰而還趙旃求卿未得請挑戰弗許請召盟許之與魏錡偕命而往郤獻子曰二憾往矣弗備必敗彘子曰鄭人勸戰弗敢從也楚人求成弗能好也師無成命多備何為士季曰備之善彘子不可士季使鞏朔韓穿帥七覆於敖前故上軍不敗趙旃夜至於楚軍席於軍門之外使其徒入之乙卯王乘左廣以逐趙旃晉人懼二子之怒楚師也使軘車迎之潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我遂疾進師車馳卒奔乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也及昏楚師軍於邲晉之餘師不能軍宵濟亦終夜有聲丙辰楚重至於邲遂次於衡雍祀於河作先君宫告成事而還杜氏注邲鄭地劉氏傳戰而言及之者主之者也猶曰晉荀林父為志乎此戰也云爾武夷胡氏傳戰而言及主乎是戰者也案左氏晉師救鄭經既不以救鄭書矣又不言楚晉戰於邲而使晉主之何也陳人弒君晉不能討賊而楚能討之楚人圍鄭亦既退師與鄭平矣而又與之戰則非觀釁之師也故釋楚不貶而使晉主之獨與常詞異乎案邲之役六卿並在大夫司馬皆具官不欲勦民者三帥也違命濟師者先縠也而獨罪林父何也尊無二上定於一也古者仗鉞臨戎專制閫外雖君命有所不受況其屬乎欒書救鄭軍帥之欲戰者八人武子遂還衆不敢遏逼陽之舉丐偃二將皆請班師荀罃令曰七日不克必爾乎取之遂下逼陽林父既知無及於鄭焉用之矣諸帥又皆信然其䇿先縠若獨以中軍佐濟者下令三軍無得妄動案軍法而行辟夫豈不可既不能令乃畏失屬亡師之罪而從韓獻子分惡之言知難而冒進是棄晉師於誰責乎故後誅先縠不去其官此稱敗績特以林父主之也秋七月冬十有二月戊寅楚子滅蕭左氏傳楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰杜氏注蕭宋附庸國武夷胡氏傳假於討賊而滅陳春秋以討賊之義重也末減而書入惡其二已而入鄭春秋以退師之情恕也末減而書圍與人為善之德宏矣至是肆其強暴滅無罪之國其志已盈雖欲赦之不得也故傳稱蕭潰經以滅書斷其罪也孟子曰以力假仁者霸霸必有大國楚莊蓋以力假仁不能久假而遽歸者也建萬國親諸侯者先王之政興滅國繼絶世者仲尼之法今乃滅人社稷而絶其祀亦不仁甚矣蕭既滅亡必無赴者何以得書於魯史楚莊縣陳入鄭大敗晉師於邲莫與挍者不知以禮制心至於驕溢克伐怨欲皆得行焉遂以滅蕭告赴諸侯矜其威力以恐中國耳孟子定其功罪以五霸為三王之罪人春秋史外傳心之要典推此類求之斯得矣晉人宋人衛人曹人同盟于清丘左氏傳晉原縠宋華椒衛孔逹曹人同盟于清丘曰恤病討二於是卿不書不實其言也杜氏注清丘衛地今在濮陽縣東南伊川先生解晉為楚敗諸侯懼而同盟既而皆渝故書人以貶之宋伐陳衛救之楚伐宋晉不救武夷胡氏傳書同盟志同欲也或以惡其反覆而書同盟非也自隱公始年書儀父盟昧宋人盟宿已不實言矣奚待清丘然後惡其反覆乎楚既入陳圍鄭大敗晉師伐蕭滅之憑陵中國甚矣為諸侯計者宜信任仁賢修明政事自強於為善則可以保其國耳曾不是圖而刑牲歃血要質鬼神蘄以禦楚謀之不臧孰大於是故國卿貶而稱人譏失職也原縠違命喪師乃晉國罪人而主茲盟約所任信者皆可知矣宋師伐陳衛人救陳左氏傳宋為盟故伐陳衛人救之孔逹曰先君有約言焉若大國討我則死之杜氏注背清丘之盟武夷胡氏傳陳有弒君之亂宋不能討而楚能討之雖曰縣陳尋復封之其德於楚而不二未足責也宋人不能內自省德遽以大衆伐之非義舉矣衛人救陳背盟失信而以救書者見宋師非義陳未有罪而受兵為可恤也且謀國失圖妄興師旅無休息之期則亂益滋矣其以救書意在責宋也若衛叛盟則不待貶絶而惡自見矣十有三年春齊師伐莒公作衛左氏傳莒恃晉而不事齊故也夏楚子伐宋左氏傳以其救蕭也武夷胡氏傳楚人滅蕭將以脅宋諸侯懼而同盟為宋人計者恤民固本輕徭薄賦使民效死親其上則可以待敵矣計不出此而急於伐陳攻楚與國非䇿也故楚人有詞於伐而得書爵秋螽公作􅏑冬晉殺其大夫先縠左氏傳秋赤狄伐晉及清先縠召之也冬晉人討邲之敗與清之師歸罪於先縠而殺之盡滅其族武夷胡氏傳先縠違命大敗晉師元帥不能用鉞已失刑矣今又重有罪焉晉人治其罪而戮之義也曷為稱國以殺而不去其官夫兵者安危所係有國之大事也將非其人則敗雖得其人使親信間之則敗以剛愎不仁者參焉而莫肯用命則敗凡此三敗君之過也河曲之戰趙穿獨出而臾駢之謀不用濟涇而次欒黶欲東而荀偃之令不行今林父初將中軍乃以先縠佐之使敵國謀臣知其從政者新未能行令誰之過歟故稱國以殺不去其官罪纍上也十有四年春衛殺其大夫孔逹左氏傳清丘之盟晉以衛之救陳也討焉杜氏注尋清丘之盟以責衛使人弗去曰罪無所歸將加而師孔逹曰苟利社稷請以我説罪我之由我則為政而亢大國之討將以誰任我則死之十四年春孔逹縊而死衛人以説於晉而免武夷胡氏傳殺大夫而書名氏義不繫於専殺也孔逹棄信以危社稷衛人案其罪而誅之可也何以稱國而不去其官用人謀國干犯盟主至於見討誰之過歟稱國以殺不去其官罪纍上也春秋端本清源故書法如此夏五月壬午曹伯夀卒晉侯伐鄭左氏傳夏晉侯伐鄭為邲故也告於諸侯搜焉而還中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良於楚武夷胡氏傳案左氏傳為邲故也比事以觀知其為報怨復讎之兵詞無所貶者直書其事而義自見矣秋九月楚子圍宋左氏傳楚子使申舟聘於齊曰無假道於宋亦使公子馮聘於晉不假道於鄭申舟以孟諸之役惡宋曰鄭昭宋聾晉使不害我則必死王曰殺女我伐之見犀而行及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劔及於寢門之外車及於蒲胥之市秋九月楚子圍宋泰山孫氏曰楚之困宋也數矣案僖二十一年宋公楚子陳侯鄭伯許男曹伯會于盂執宋公以伐宋公會諸侯盟于薄釋宋公二十二年宋公及楚人戰于泓宋師敗績二十七年楚人陳侯蔡侯鄭伯許男圍宋公會諸侯盟于宋今又圍之楚之困宋也可謂數矣武夷胡氏傳宋人要結盟誓欲以禦楚已非持國之道輕舉大衆勦民妄動又非恤患之兵特書救陳以著其罪明見伐之由也國必自伐然後人伐之凡事其作始也簡其將成也必巨易於訟卦曰君子以作事謀始始而不謀必至於訟訟而不竟必至於師若宋是矣始謀不臧至於見伐見圍幾亡其國則自取之也春秋端本故責宋為深若蠻夷圍中國則亦明矣葬曹文公冬公孫歸父會齊侯于榖武夷胡氏傳夫禮别嫌明微制治於未亂自天子出者也列國之君非王事而自相會聚是禮自諸侯出矣以國君而降班失列下與外臣會以外臣而抗尊出位上與諸侯會是禮自大夫出矣君臣贅旒陪臣執命豈一朝一夕之故其所由來者漸矣故易於坤之初六曰馴致其道至堅冰也易言其理春秋見諸行事若合符節可謂深切著明矣十有五年春公孫歸父會楚子于宋左氏傳孟獻子言於公曰臣聞小國之免於大國也聘而獻物於是有庭實旅百朝而獻功於是有容貌采章嘉淑而有加貨謀其不免也誅而薦賄則無及也今楚在宋君其圖之公説十五年春公孫歸父會楚子于宋宋人使樂嬰齊告急於晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之強能違天乎乃止武夷胡氏傳楚子不假道於宋以啓釁端而圍之陵蔑中華甚矣諸侯縱不能畏簡書攘夷狄存先代之後嚴兵固圉以為聲援猶之可也乃以周公之裔千乘之國謀其不免至於薦賄不亦鄙乎若此類聖人不徒筆之於經也比事以觀則知當時治亂盛衰之由春秋經世之略矣襄陵許氏曰楚圍宋之威震及魯矣夏五月宋人及楚人平左氏傳夏五月楚師將去宋申犀稽首於王之馬前曰母畏知死而不敢廢王命王棄言焉王不能答申叔時僕曰築室反耕者宋必聼命從之宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告曰敝邑易子而食析骸以爨雖然城下之盟有以國斃不能從也去我三十里惟命是聼子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞公羊傳此皆大夫也其稱人何貶曷為貶平者在下也武夷胡氏傳此華元子反二國之卿其稱人何貶也春秋賤欺詐惡侵伐二卿不愛其情釋怨解紛使宋無亡國之憂楚無滅國之罪功亦大矣宜在所褒何以貶也善則稱君過則稱已則民作忠今二卿自以情實私相告語取必於上以成平國之功而其君不與知焉非人臣之義也世衰道微暴行交作君有聼於臣父有聼於子夫有聼於婦中國有聼於夷狄仲尼所為懼春秋所以作也故平以解紛雖其所欲而平者在下則大倫紊矣聖人明其道不計其功故褒貶如此然則臣而有安國家利社稷者專之不可乎曰專之而可者謂境外也子反在君之側無奏報之難幾會之失奚急於平而專之若是哉六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸左氏傳潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目六月癸卯晉荀林父敗赤狄於曲梁辛亥滅潞酆舒奔衛衛人歸諸晉晉人殺之杜氏注潞赤狄之别種潞氏國故稱氏子爵也陸氏纂例啖子曰凡滅國直書滅者罪來滅者不責見滅者也言其力屈而亡且能死社稷矣若自致滅亡之道則有異文梁亡是也凡書滅又書其君奔者則兩罪之責其不死社稷也凡書滅又書以歸者則名之責其不能死位又無興復之志也奔而不名者言其位或未絶也隨而歸者名之言其位必絶矣武夷胡氏傳上卿為主將略而稱師者著其暴也滅而舉號及氏者減見滅之罪著滅者之甚不仁也潞子嬰兒不死社稷比於中國而書爵者免嬰兒之責辭也然則攘外裔安諸夏非邪徐夷並興東郊不開伯禽征之玁狁孔熾侵鎬及方宣王伐之楚人侵鄭近在王畿齊侯攘之皆門庭之寇不可縱而莫禦者也雖禦之亦不極其兵力殄滅之無遺育也今赤狄未嘗侵掠晉境非門庭之寇而恃強暴以滅之其不仁甚矣春秋所以責晉而略狄也又有異焉者夫伐國之要討其罪人斯止矣案左氏潞子夫人晉景公之姊也酆舒為政而殺之又傷潞子之目則酆舒者罪之在也為晉計者執酆舒轘諸市立黎侯安定潞子改紀其政而返則諸狄服疆域安矣今乃利狄之土滅潞氏以其君歸何義乎春秋所以責晉而略狄也秦人伐晉王札子殺召伯毛伯左氏傳王孫蘇與召氏毛氏爭政得王子捷殺召戴公及毛伯衛杜氏注王子捷即王札子卒立召襄榖梁傳矯王命以殺之以王命殺則何志焉為天下主者天也繼天者君也君之所存者命也為人臣而侵其君之命而用之是不臣也為人君而失其命是不君也君不君臣不臣此天下所以傾也杜氏注王札子王子札也泰山孫氏曰王札子文誤倒爾襄陵許氏曰拓跋魏世髙歡睹張彞之變而生亂心焉梁武在位王侯專殺政法不施遂以亂亡無惑乎周之無以令天下也秋螽公作􅏑武夷胡氏傳人事感於此則物變應於彼宣公為國虛內以事外去實而務華煩於朝會聘問賂遺之末而不知務其本者也故戾氣應之六年螽七年旱十年大水十有三年又螽十有五年復螽府庫匱倉廩竭調度不給而言利剋民之事起矣襄陵許氏曰稅畝之法蓋積貪虐之習而後能至也觀乎災異則見政事觀乎政事以知災異是謂念用庶徵仲孫蔑會齊髙固于無公牟作婁杜氏注無婁杞邑武夷胡氏傳禮之始失也諸侯非王事而自相會也無以正之不自天子出矣然後諸侯與大夫會又無以正之然後大夫與大夫會禮亦不自諸侯出矣田氏篡齊六卿分晉三家專魯理固然也不能辨於早後雖欲正之其將能乎初稅畝左氏傳初稅畝非禮也榖出不過藉以豐財也公羊傳初者何始也稅畝者何履畝而稅也古者什一而藉古者曷為什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一者天下之中正也什一行而頌聲作矣榖梁傳古者什一藉而不稅初稅畝非正也古者三百步為里名曰井田井田者九百畝公田居一私田稼不善則非吏公田稼不善則非民初稅畝者非公之去公田而履畝什取一也以公之取民為已悉矣古者公田為居井竈蔥韭盡取焉枉氏注公田之法十取其一今又履其餘畝復十收其一遂以為常故曰初陸氏纂例趙子曰賦稅者國之所以治亂也故志之民國之本也取之甚則流亡國必危矣故君子懼之冬蝝生髙郵孫氏曰蝝者螽之子也春秋之秋夏時之夏也春秋之冬夏時之秋也螽為災於夏而蝝生於秋一嵗而再為災故謹志之耳武夷胡氏傳始生曰蝝既大曰螽秋螽未息冬又生子災重及民也而詳志之如此者急民事謹天災仁人之心王者之務也遇天災而不懼忽民事而不修而又為繁政重賦以感之國之危無日矣飢武夷胡氏傳春秋飢嵗多矣書於經者三而宣公獨有其二何也古者三年耕餘一年之蓄九年耕餘三年之蓄雖有凶旱民無菜色是嵗雖螽蝝而遽至於飢者宣公為國務華去實虛內事外煩於朝會聘問賂遺之末而不敦其本府庫竭矣倉廩匱矣水旱螽蝝天降飢饉亦無以振業貧乏矣經所以獨兩書飢以示後世為國之不可不敦本也十有六年春王正月晉人滅赤狄甲氏及留吁左氏傳晉士會帥師滅赤狄甲氏及留吁鐸辰三月獻狄俘晉侯請於王戊申以黻冕命士會將中軍且為大傅杜氏注甲氏留吁赤狄别種晉既滅潞氏今又并盡其餘黨武夷胡氏傳案左氏董是役者士會也上將主兵其稱人貶詞也甲氏潞之餘種留吁其殘邑也春秋於夷狄攘斥之不使亂中夏則止矣伯禽征徐夷東郊既開而止宣王伐玁狁至于太原而止武侯征戎瀘服其渠帥而止必欲盡殄滅之無遺種豈仁人之心王者之事乎士會所以貶而稱人也夏成周宣榭縠本作謝火公穀作災左氏傳人火之也凡火人火曰火天火曰災公羊傳成周者何東周也宣榭者何宣宫之榭也何言乎成周宣榭災樂器藏焉爾成周宣榭災何以書記災也杜氏注成周洛陽宣榭講武屋爾雅曰無室曰榭謂屋歇前劉氏傳成周者何天子之東都也宣榭者何宣宫之榭也宣宫久矣猶存乎古者天子祖有功宗有德雖百世存可也宣王之時周亡而復存禮廢而復興武夷胡氏傳成周天子之東都宣榭宣王之廟也案吕大臨考古圖有郱敦者稱王格于宣榭呼內史册命郱是知宣榭者宣王之廟也古者爵有德祿有功必於太廟示不敢専也榭者射堂之制其堂無室以便射事故凡無室者皆謂之榭宣王之廟謂之榭者其廟制如榭也宣榭火何以書以宗廟之重書之也貴戚擅殺大臣而天子不討王室不復能中興矣人火之天所以見戒乎秋郯伯姬來歸左氏傳出也武夷胡氏傳案左氏郯伯姬來歸出也內女出書之册者男女居室人之大倫也婚姻之禮廢則夫婦之道苦淫僻之罪多矣復相棄背喪其配偶氓詩所以刺衛日以衰薄室家相棄中谷有蓷所以閔周易序咸恆為下經首春秋內女出夫人歸凡男女之際詳書於䇿所以正人倫之本也其旨微矣吕氏曰婦人既嫁而出人道之大者故謹書之冬大有年榖梁傳五榖大熟為大有年髙郵孫氏曰有者不宜有也宣公弒君之賊即位一十六年之久而晏然無討之者又大有年聖人傷之特書曰大有年有者不宜有也春秋書有年者二又皆在於桓宣之時聖人之意可知矣武夷胡氏傳程氏曰大有年記異也旱乾水溢飢饉薦臻者災也山崩地震彗孛飛流者異也景星甘露醴泉芝草百榖順成者祥也大有年上瑞矣何以為記異乎凡災異慶祥皆入為所感而天以其類應之者也人事順於下則天氣和於上宣公弒立逆理亂倫水旱螽蝝飢饉之變相繼而作史不絶書宜也獨於是冬乃大有年所以為異乎夫有年大有年一耳古史書之則為祥仲尼筆之則為異此言外微旨非聖人莫能修之者也十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之己末公會晉侯衛侯曹伯邾公作邾婁子同盟于斷道左氏傳晉侯使郤克徵會於齊齊頃公帷婦人使觀之郤子登婦人笑於房獻子怒出而誓曰所不此報無能涉河齊侯使髙固晏弱蔡朝南郭偃會及斂盂髙固逃歸夏會于斷道討二也盟于卷楚杜氏注卷楚即斷道辭齊人晉人執晏弱於野王執蔡朝於原執南郭偃於溫伊川先生解諸國同心欲伐齊故書同盟杜氏注斷道者晉地武夷胡氏傳書同盟者志同欲也大國率之小國畏威而從命非同欲也小國訴之大國勉強而應焉非同欲也若斷道之盟諸侯同心謀欲伐齊釋其憤怒非有不得已而要之者也或以為會同天子之事築宫為壇設方明如方嶽之盟故書同疑其説之誤矣秋公至自會冬十有一月壬午公弟叔肸卒榖梁傳其曰公弟叔肸賢之也其賢之何也宣弒而非之也非之則胡為不去也曰兄弟也何去而之與之財則曰我足矣織屨而食終身不食宣公之食君子以是為通恩也以取貴乎春秋泰山孫氏曰不曰公子公孫而曰公弟叔肸者以見肸無祿而卒也凡稱公子公孫皆大夫也肸文公子宣公母弟宣公弒立肸惡之終身不食其祿非大夫也故曰公弟叔肸卒所以重宣公之惡也武夷胡氏傳稱弟得弟道也稱字賢也何賢乎叔肸宣弒而非之也或以為叔肸寵弟在宣公有私親之愛故生而賜氏俾世其卿與季友仲遂比則其説誤矣誠使叔肸有寵生而賜氏則是貴戚用事之卿豈有不見於經者齊年鄭語在外之見於經者季友仲遂在內之見於經者勢必與聞政事執國命矣況宣公之時煩於聘問會朝之禮遂蔑季孫歸父交於鄰國衆矣而獨叔肸不與焉其非生而賜氏俾世其卿亦明矣十有八年春晉侯衛世子臧伐齊左氏傳晉侯衛太子臧伐齊至於陽榖齊侯會晉侯盟于繒以公子強為質於晉晉師還武夷胡氏傳保國以禮為本者也齊頃公不謹於禮自己致寇所謂人必自伐而後人伐之矣諸侯上卿皆執國命取必於其君以行其克伐怨欲之私故盟于斷道師于陽榖大戰于鞍逞其志而後止春秋詳書於䇿見伐與伐者之罪皆可以為鑒矣公伐杞夏四月秋七月邾公作邾婁人戕鄫榖作繒下同子于鄫左氏傳秋邾人戕鄫子于鄫凡自虐其君曰弒自外曰戕范氏注于鄫惡其臣子不能距難武夷胡氏傳邾人蓋嘗執鄫子用之則不共戴天之世讎也既不能復又使邾人得造其國都而戕殺其君曰于鄫者所以深責鄫之臣子至此極也甲戌楚子旅榖作吕卒公羊傳何以不書葬吳楚之君不書葬辟其號也何氏注旅即莊王也武夷胡氏傳楚僭稱王降而稱子者是仲尼筆之也其不書葬者恐民之惑而避其號是仲尼削之也若楚若吳若徐皆自王降而稱子若滕自侯降而稱子若杞自伯降而稱子四裔雖大皆曰子其降而稱子者外之也或謂春秋不擅進退諸侯亂名實則非矣述天理正人倫此名實所由定也奚名為亂哉公孫歸父如晉左氏傳解在下文公孫還武夷胡氏傳宣公因齊得國故刻意事之雖易世猶未怠也及頃公不能謹禮怒晉魯上卿而郤克當國決䇿討之晉方強盛齊少懦矣於是背齊而事晉其於邦交以利為向背無忠信誠慤之心者也案左氏歸父欲去三桓以張公室與公謀而聘於晉欲以晉人去之夫輕於背與國易於謀大家而不知其本未有能成而無悔者也然則公室可不張乎務引其君以當道正心以正朝廷禮樂刑政自己出也其庶幾乎必欲倚外援以去之是去疥瘍而得腹心之疾也庸愈哉冬十月壬戌公薨于路寢榖梁傳路寢正寢也歸父還自晉至笙公榖作柳遂奔齊左氏傳公孫歸父以襄仲之立公也有寵欲去三桓以張公室與公謀而聘於晉欲以晉人去之冬公薨季文子言於朝曰使我殺適立庶以失大援者仲也夫臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之遂逐東門氏子家還及笙杜氏注子家歸父字壇帷復命於介既復命袒括髮即位哭三踊而出遂奔齊書曰歸父還自晉善之也公羊傳還者何善辭也何善爾歸父使於晉還自晉至柳聞君薨家遣墠帷哭君成踊反命乎介自是走之齊榖梁傳捐殯而奔其父之使者是以奔父也遂繼辭也武夷胡氏傳仲尼稱孟莊子之孝其不改父之臣與父之政是難能也又曰三年無改於父之道可謂孝矣夫仁人孝子於其父之臣非有大不可如晉悼公於夷羊五之屬必存始終進退之禮而不遽也歸父以君命出使未反而君薨在聘禮有執圭復命於殯之文升自西階子臣皆哭情亦戚矣今宣公猶未殯而東門氏遂忍乎哉書曰歸父還自晉者已畢事之詞也至笙遂奔齊者罪成公君臣死君而忘父逐之亟也君薨家遣方寸宜亦亂而造次顛沛不失禮焉詞繁而不殺歸父之善自著矣春秋集解卷十六
