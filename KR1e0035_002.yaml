body:
  text: 春秋集解卷二宋吕本中撰隱公四年春王二月莒人伐杞取牟婁公羊傳外取邑不書此何以書疾始取邑也劉氏權衡公羊以謂外取邑不書疾始取邑故書非也公羊以百二十國書言之故云爾不知伐國取邑有赴不赴也赴者書之不赴者不書之其書之則春秋所有也其不書之則春秋所未有也榖梁傳傳曰言伐言取所惡也范寧注既伐其國又取其土明伐不以罪而貪其利兩書取伐以彰其惡伊川先生解諸侯土地有所受之伐其罪而奪取其土惡又甚焉王法所當誅也杜氏注杞國本都陳留雍丘縣牟婁杞邑城陽諸縣東北有婁鄉陸氏纂例啖子曰凡先書伐國下言取邑者明取其國之邑也趙子曰凡力得之曰取或是邑或是附庸力得之者故曰取不當取也言取見其不當取不是其專奪雖復取本邑亦無異詞其有本是我邑及我之附庸為彼所奪之後却取得當異其文謂其不能申明直辭請於王而正疆理但專自以兵爭奪不得正道故悉同辭言之武夷胡氏傳取者收奪之名或曰諸侯土地上受之天王下傳之先祖所以守宗廟之典籍也聖王不作諸侯放恣強者多兼數圻弱者日以侵削當是時有取其故地者夫豈不可然僖公嘗取濟西田矣成公嘗取汶陽田矣亦書曰取何也苟不請於天王以正疆理而擅兵爭奪雖取本邑與奪人之有者無以異春秋之義不以亂易亂故亦書曰取正其本之意也戊申衛州榖作祝後同吁弒其君完左氏傳衛莊公娶于齊曰莊姜美而無子戴媯生桓公莊姜以為己子公子州吁嬖人之子也有寵而好兵公弗禁莊姜惡之石碏諫弗聼其子厚與州吁游禁之不可桓公立乃老四年春衛州吁弒桓公而立伊川先生解自古篡弒多公族蓋自謂先君子孫可以為君國人亦以為然而奉之春秋於此明大義以示萬世故春秋之初弒君者多不稱公子公孫蓋身為大惡自絶於先君矣豈復得為先君子孫也古者公族刑死則無服況弒君乎大義既明於初矣其後弒立者則皆以屬稱或見其以親而寵之太過任之太重以至於亂或見其天屬之親而反為寇讎立義各不同也春秋大率所書事同則辭同後人因謂之例然有事同而辭異者蓋各有義非可以例拘也劉氏傳州吁者何衛公子也何以不稱公子公子雖貴非三命不氏公子之重視大夫武夷胡氏傳此衛公子州吁也而削其屬籍特以國氏者罪莊公不待之以公子之道使預聞政事主兵權而當國也以公子之道待州吁教以義方弗納於邪不以賤妨貴少陵長則桓公之位定矣亂何由作州吁有寵好兵而公弗禁石碏盡言極諫而公弗從是不待以公子之道使預聞政事主兵權而當國也春秋之㫖在於端本清源以衛詩緑衣諸篇考之所謂前有讒而不見後有賊而不知者莊公是也其不稱公子而以國氏著後世為人君父者之戒爾故傳有之曰為人君父而不通春秋之義者必䝉首惡之名夏公及宋公遇于清左氏傳公與宋公為㑹將尋宿之盟未及期衛人來告亂夏公及宋公遇于清公羊傳遇者何不期也一君出一君要之也伊川先生解諸侯相見而不行朝會之禮如路道之相遇故書曰遇非周禮冬見曰遇之遇也杜氏注遇者草次之期二國各簡其禮若道路相逢遇也清衛邑濟北東阿縣有清亭陸氏纂例啖子曰古制遇禮恐忽有解逅相遇簡略而行故與㑹禮不同時雖非相遇而從省易以遇禮相見者故書曰遇趙簡子曰簡禮而㑹曰遇常山劉氏曰王室衰微典法廢壞諸侯各逞其欲盟㑹紛然舍此又簡易其事若道路相逢遇無國君之禮春秋所以致譏也襄陵許氏曰隱莊之間凡六書遇以其去古未逺也自閔而後有㑹無遇忠益不足而文有餘矣宋公陳侯蔡人衛人伐鄭左氏傳宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭而求寵於諸侯使告於宋曰君若伐鄭以除君害君為主敝邑以賦與陳蔡從則衛國之願也宋人許之於是陳蔡方睦於衛故宋公陳侯蔡人衛人伐鄭圍其東門五日而還伊川先生解宋以公子馮在鄭故與諸侯伐之也摟諸侯以伐鄭固為罪矣而衛弒其君天下所當誅也乃與修好而同伐人其惡甚矣杜氏注謂二年鄭人伐衛之怨武夷胡氏傳春秋之法誅首惡興是役者首謀在衛而以宋主兵何也前書州吁弒君其罪已極至是阻兵修怨勿論可也而鄰境諸侯聞衛之有大變也可但已乎田常弒簡公孔子沐浴而朝告於哀公請討之公曰告夫三子者子曰以吾從大夫之後不敢不告也之三子告不可子曰以吾從大夫之後不敢不告也然則鄰有弒逆聲罪赴討雖先發而後聞可矣宋殤不恤衛有弒君之難欲定州吁而從其邪說是肆人欲滅天理非人之所為也故以宋公為首諸國為從示誅亂臣討賊子必先治其黨與之法也此義行為惡者孤矣故曰春秋成而亂臣賊子懼襄陵許氏曰擊鼓詩序以為使公孫文仲將而平陳與宋是以書衛人秋翬帥師㑹宋公陳侯蔡人衛人伐鄭左氏傳秋諸侯復伐鄭宋公使來乞師公辭之羽父請以師㑹之公弗許固請而行故書曰翬帥師疾之也諸侯之師敗鄭徒兵取其禾而還公羊傳翬者何公子翬也何以不稱公子貶曷為貶與弒君也榖梁傳同伊川先生解宋虐用其民衛當誅之賊而與之同伐人其罪大矣二國搆怨而他國與之同伐其罪均也再序四國重言其罪左氏以為再伐妄也翬不稱公子弒逆之人積其強惡非一朝一夕之故辨之冝早故去其公子隱公不能辨是以及禍杜氏注陳今陳國陳縣蔡今汝南上蔡縣泰山孫氏曰翬不氏未命也武夷胡氏傳貴戚之卿其植根膠固難御於異姓之卿況翬已使主兵而方命乎隱公不能辨之於早罷其兵權猶使之帥師也是以及鍾巫之禍春秋於此去其公子以謹履霜之戒春秋立義至精詞極簡嚴而不贅也若曰翬帥師㑹伐鄭豈不白乎再序四國何其辭費而不憚煩也言之重詞之復其中必有大美惡焉四國合黨翬復㑹師同伐無罪之邦欲定弒君之賊惡之極也言之不足而再言之聖人之情見矣九月衛人殺州吁于濮左氏傳州吁未能和其民厚問定君於石子石子曰王覲為可曰何以得覲曰陳桓公方有寵於王若朝陳使請必可得也厚從州吁如陳石碏使告於陳圖之陳人執之衛人使右宰醜涖殺州吁于濮公羊傳其稱人何討賊之辭也明國中人人得討之所以廣忠孝之路伊川先生解稱衛人衆辭也舉國殺之杜氏注濮陳地水名陸氏纂例几作亂自立為君而國人殺之者皆稱人以殺言衆所共棄不君之也且明無所纍也武夷胡氏傳伐鄭稱人責詞也殺州吁稱人衆詞也知然者伐鄭之役公孫文仲為主將而變文稱人則是指國人聼州吁號令從文仲而南行者也故曰責辭其殺州吁則石碏謀之而使右宰醜涖也變文稱人則是人皆有欲討賊之心亦夫人之所得討也故曰衆辭公羊子曰稱人者何討賊之辭也其義是矣于濮者閔衛國之人著諸侯之罪也衛人失賊而曰著諸侯之罪何也夫州吁二月弒君而不能即討者緣四國連兵欲定其位久然後能殺之于濮耳非諸侯之罪而何夫以討賊許衆人而以失賊罪鄰國與賊者寡矣故曰春秋成而亂臣賊子懼冬十有二月衛人立晉左氏傳衛人逆公子晉于邢冬十二月宣公即位榖梁傳衛人者衆詞也立者不冝立者也晉之名惡也其稱人以立之何也得衆也得衆則是賢也賢則其曰不冝立何也春秋之義諸侯與正而不與賢也范寧注立君非以尚賢所以明有統也建儲非以私親所以定名分也名分定則賢無亂長之階而自賢之禍塞矣伊川先生解衛人逆公子晉於邢而立之書曰衛人立晉衛人立之也諸侯之立必受命於天子當時雖不受命於天子猶受命於先君衛人以晉公子也可以立故立之春秋所不與也雖先君子孫不由天子先君之命不可立也故去其公子泰山孫氏曰諸侯受國乎天子非國人可得立也高郵孫氏曰晉以國人衆立宜其有得立之理聖人特於疑似之間而發明不當得立之義春秋於疑似之間衆人以為功一時以為善者聖人必立大辨以正之所以明示皇極之道而較著一王之法也五年春公矢公榖並作觀魚于棠左氏傳公將如棠觀魚者臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉君將納民於軌物者也公曰吾將略地焉遂往陳魚而觀之書曰公矢魚于棠非禮也且言逺地也正義云釋例舊說棠魯地據傳公辭欲略地則非魯竟也釋例土地名棠在魯部內云本宋地蓋魯宋之界上也公羊傳棠者何濟上之邑也榖梁傳傳曰常事曰視非常曰觀禮尊不親小事卑不尸大功魚卑者之事也公觀之非正也伊川先生解諸侯非王事民事不逺出逺出觀魚非道也杜氏注髙平方與縣北有武唐亭魯侯觀魚臺泰山孫氏曰觀魚非諸侯之事也天子諸侯無非事者動必有為也故孟子曰天子適諸侯曰巡狩巡狩者巡其所守也諸侯朝於天子曰述職述職者述其所職也是故春省耕而補不足秋省斂而助不給隱公怠棄國政春觀魚于棠可謂非事者矣棠魯地夏四月葬衛桓公左氏傳衛亂是以緩杜氏注有州吁之亂十四月乃葬伊川先生解衛亂是以緩稱桓公見國人私諡也魯往㑹故書送終大事也必就正寢不沒於婦人之手曾子易簀而沒豈苟然乎死而加之不正之諡知忠孝者肯為乎泰山孫氏曰賊討則書葬武夷胡氏傳衛本侯爵何以稱公見臣子不請於王而私自諡爾春秋於邦君薨正以王法而書卒至於葬則從其私諡而稱公或革或因前以貶不臣順之諸侯後以罪不忠孝之臣子詞顯而義微皆所以遏人欲存天理大居正也秋衛師入郕公作盛左氏傳衛之亂也郕人侵衛故衛師入郕公羊傳曷為或言率師或不言率師將尊師衆稱某率師將尊師少稱將將卑師衆稱師將卑師少稱人君將不言率師書其重者也伊川先生解衛晉乘亂得立不思安國保民之道以尊王為先居喪為重乃興戎修怨入人之國書其失道也杜氏注東平剛父縣西南有郕鄉武夷胡氏傳稱師者紀其用衆而立義不同有矜其盛而稱師者如齊師宋師曹師城邢之類是也有著其暴而稱師者楚滅陳蔡公子棄疾主兵而曰楚師之類是也有惡其無名不義而稱師者次于郎以俟陳蔡及齊圍郕之類是也衛宣繼州吁暴亂之後不施德政固本恤民而毒衆臨戎入人之國失君道矣書衛師入郕著其暴也九月考仲子之宫初獻六羽左氏傳考仲子之宫將萬焉公問羽數於衆仲對曰天子用八八八六十四人諸侯用六六六三十六人大夫四四四十六人士二二二四人公從之於是初獻六羽始用六佾劉氏權衡中云士二佾所謂士者特牲少牢皆士禮也無用樂舞之儀安得二佾而施之乎周禮舞師之職凡小祭祀則不興舞小祭祀者王服𤣥冕之祭也王服𤣥冕不興舞矣士服𤣥冕反舞之乎且𤣥冕又非士所當服者公羊傳初獻六羽何以書譏何譏爾譏始僣諸公也六羽之為僣奈何天子八佾諸公六諸侯四諸公者何諸侯者何天子三公稱公王者之後稱公其餘大國稱侯小國稱伯子男始僣諸公昉於此乎前此矣前此則曷為始乎此僣諸公猶可言也僣天子不可言也東萊吕氏曰孟子古王制皆以公侯為大國伯為次國子男為小國計其土地大小是也其禮數高下皆稱公榖又以為天子八佾諸公六諸侯四亦異於王制孟子古書所記當時禮文公侯多為一等未嘗有以侯為一等伯子男同為一等者然則公榖之出去孔子之世逺甚伊川先生解諸侯無再娶仲子不得為夫人春秋之初尚以為疑故别宫以祀之考始成而祀也書以見非禮成王賜魯用天子禮樂祀周公後世遂羣廟皆用仲子别宫故不敢同羣廟而用六羽也書初獻見前此用八之僣也仲尼以魯之郊禘為周公之道衰用天子之禮樂祀周公成王之過也杜氏注成仲子宫安其主而祭之惠公以仲子手文娶之欲以為夫人諸侯無二嫡蓋隱公成父之志為别立宫也髙郵孫氏曰凡舞有干羽此不言干但言羽者婦人無武事但陳羽舞也常山劉氏曰魯僣天子禮樂孔子每因事而書之以正天下之典也武夷胡氏傳禮無二嫡孟子入惠公之廟仲子無祭享之所為别立宫以祀之非禮也故因其來賵而正名之曰仲子之賵因其考宫而正名之曰仲子之宫而夫人衆妾之分定矣隱公攝讓之實辨矣桓公篡弒之罪昭矣存則以氏繫姓以姓繫號沒則以諡繫號以姓繫諡者夫人也存不稱號沒不稱諡單舉姓者妾也凡宫廟非志災失禮則不書邾公作邾婁人鄭人伐宋左氏傳宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道鄭人以王師㑹之伐宋入其郛以報東門之役伊川先生解宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道邾人鄭人伐宋先邾人為主也杜氏注邾主兵故序鄭上陸氏纂例趙子曰凡書侵伐不書勝敗殺掠而還也武夷胡氏傳凡班序上下以國之大小從禮之常也而盟㑹征伐以主者先因事之變也然則衛州吁告於宋以伐鄭事與此同而聖人以宋為主者何此春秋撥亂之大法也凡誅亂臣討賊子必深絶其黨螟伊川先生解書螟書螽皆為災也國之大事故書杜氏注蟲食苖心者武夷胡氏傳國以民為本民以食為天春秋書螟記災也聖人以是為國之大事也故書而近世王安石乃稱為人牧者不必論奏災傷之事亦獨何哉甚矣其不講於聖人之經以欺當年而誤天下與來世也冬十有二月辛巳公子彄卒杜氏注大夫書卒不書葬者臣子之事非公家之所及也陸氏纂例趙子曰魯卿有王命者即書卒尊吾命卿所以尊王命也宋人伐鄭圍長葛左氏傳宋人伐鄭圍長葛以報入郛之役也杜注潁川長社縣北有長葛城伊川先生解伐國而圍邑肆其暴也陸氏纂例趙子曰伐國而圍邑皆書之不可偏遺也言其事輕重等故不偏舉之也蘇氏曰伐其國又圍其邑也六年春鄭人來渝公榖並作輸平左氏傳更成也杜氏注公之為公子戰於狐壤為鄭所執逃歸東萊吕氏曰渝變也鄭人以前之平未成也故變前之平而更成焉公羊傳輸平猶墮成也何言乎墮成敗其成也伊川先生解魯與鄭舊修好既而迫於宋衛遂與之同伐鄭故鄭來絶交渝平變其平也匹夫且不肯失信於人為國君而負約可羞之甚也杜氏注和而不盟曰平陸氏微㫖淳聞於師曰二百四十二年背盟渝約者多矣何獨書此乎善其量力守信告而後絶非見利忘義者也劉氏傳輸平者何輸平猶致成也曷為致成為伐鄭故致成也然則何致致祊田也泰山孫氏曰鄭人來輸誠於我平四年翬㑹諸侯伐鄭之怨也髙郵孫氏曰輸者納也鄭人請和來納其平武夷胡氏傳輸者納也平者成也鄭人曷為納成於魯以利相結解怨釋仇離宋魯之黨也公之未立與鄭人戰於狐壤止焉元年及宋盟於宿四年遇於清其秋㑹師伐鄭即宋魯為黨與鄭有舊怨明矣五年鄭人伐宋入其郛宋來告命魯欲救之使者失詞公怒而止其冬宋人伐鄭圍長葛鄭伯知其適有用間可乘之隙也是以來納成耳然則善之乎曰平者解怨釋仇固所善也輸平者以利相結則貶矣曷為知其相結之以利也後此鄭伯使宛來歸祊而魯入其地㑹鄭人伐宋得郜及防而魯又取其二邑是知輸平者以利相結乃貶之也諸侯修睦以蕃王室所主者義耳苟為以利使為人臣者懷利以事其君為人子者懷利以事其父為人弟者懷利以事其兄諸侯必曰何以利吾國大夫必曰何以利吾家士庶人必曰何以利吾身上下交征利不至於篡弒奪攘則不厭矣故特稱輸平以明有國者必正其義不謀其利杜亡國敗家之本也夏五月辛酉公㑹齊侯盟于艾左氏傳始平於齊也杜氏注春秋前魯與齊不平杜氏注泰山牟縣東南有艾山秋七月公羊傳秋七月此無事何以書春秋雖無事首時過則書首時過則何以書春秋編年四時具然後為年伊川先生解無事書首月天時王月備而後成歲也冬宋人取長葛左氏傳秋宋人取長葛公羊傳何以書久也伊川先生解宋人圍長葛歲且周矣其虐民無道之甚而天子弗治方伯弗征鄭視其民之危困而不能保有赴訴卒喪其邑皆罪也宋之强取不可勝誅矣杜氏注上有伐鄭圍長葛長葛鄭邑可知故不言鄭也七年春王三月叔姬歸于紀伊川先生解娣歸不書憫其無終也何氏注叔姬者伯姬之媵也至是乃歸者待年父母國也髙郵孫氏曰法不當書而書者春秋變例以見其賢叔姬為伯姬之娣紀侯大去其國紀季以酅入齊復存紀之宗社叔姬又歸于酅以承紀之宗祀紀之國侵削殆盡其所存者宗祀而巳紀侯又以大去而叔姬不以國之盛衰繫其懷不以夫之存亡易其慮而唯宗社之是依聖人安得不賢之乎常山劉氏曰古者諸侯一娶九女所以定名分而懲亂原若不格之同時而使得繼行則源源而來將無紀極故書以見譏滕侯卒左氏傳不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名告終稱嗣也以繼好息民謂之禮經劉氏權衡云常同盟者卒未必皆名未常同盟者卒未必皆不名而左氏又云赴以名則書之不然則否若實從例則不當從赴若寶從赴則無用設例今進不必從赴退不必從例徒用是紛紛也公羊傳何以不名微國也伊川先生解卒不名史闕文也杜氏注滕國在沛國公丘縣東南陸氏纂例趙子曰凡諸侯同盟名於載書朝㑹名於要約聘告名於簡牘故於卒赴可知而紀也非此則否示詳慎也左氏云凡諸侯同盟故薨則赴以名此於理不安豈有臣子正當創巨痛深之日乃忍稱君之名禮篇所録亦云寡君不祿而已春秋諸侯卒不同盟者凡五十二人九人不書名餘並書名劉氏傳赴以名禮也不赴以名非禮也天王崩赴以爵諸侯薨赴以名㑹盟朝聘之事存焉以慎終繼世是故諸侯不生名夏城中丘左氏傳書不時也公羊傳何以書以重書也伊川先生解為民立君所以飬之也養民之道在愛其力民力足則生養遂生養遂則教化行而風俗美故為政以民力為重也春秋凡用民力必書其所興作不時害義固為罪也雖時且義必書見勞民為重事也後之人君知此義則知慎重於用民力矣然有用民力之大而不書者為教之意深矣僖公修泮宫復閟宫非不用民力也然而不書二者復古興廢之大事為國之先務如是而用民乃所當用也人君知此義則知為政之先後輕重矣凡書城者完舊也書築者創始也城中丘使民不以時非人君之用心也杜氏注中丘在琅邪臨沂縣東北泰山孫氏曰城邑宫室髙下大小皆有王制不可妄作是故城一邑新一廏作一門築一囿時與不時皆詳而録之得其時者其惡小非其時者其惡大此聖人愛民力重興作懲僣忒之深㫖也齊侯使其弟年來聘左氏傳齊侯使夷仲年來聘結艾之盟也伊川先生解凡不稱公子而稱弟者或責其失兄弟之義或罪其以弟之愛而寵任之過左氏公羊傳皆曰年齊僖公之母弟先儒母弟之說蓋緣禮文有立嫡子同母弟之說其曰同母弟蓋謂嫡爾非以同母為加親也若以同母為加親是不知人理近於禽道也天下不明斯義也久矣僖公愛年其子尚禮秩如嫡卒致篡弒之禍書弟見其以弟之愛而寵任之過也桓三年同陸氏纂例趙子曰禮以通好曰聘將國命大夫之事此譏弟也常山劉氏曰周禮大行人凡諸侯之邦交歲相問也殷相聘也世相朝也先王制禮所以盡人之情諸侯之於鄰國壤地相接苟無禮以相與則何足以講信修睦哉王室不綱典制大壞無禮義之交而唯強弱之視故小國則朝之聘之大國則聘而不朝故來朝於魯非邾鄫紀薛則郜杞曹滕皆小國也魯侯之所如者唯齊晉楚之三大國而聘於魯者則齊晉宋衛陳鄭秦楚之邦魯臣之所如者則亦惟大國而或及於小國者矣武夷胡氏傳兄弟先公之子不稱公子貶也書盟書帥師而稱兄弟者罪其有寵愛之私書出奔書歸而稱兄弟者責其薄友恭之義仁人之於兄弟絶偏係之私篤友恭之義人倫正而天理存其春秋以訓天下與來世之意也秋公伐邾公作邾婁左氏傳秋宋及鄭平七月庚申盟于宿公伐邾為宋討也杜氏注公距宋而更與鄭平欲以鄭為援今鄭復與宋盟故懼而伐邾欲以求宋伊川先生解擅興甲兵為人而伐人非義之甚也武夷胡氏傳奉詞致討曰伐宋人先取邾田故邾人入其郛魯與儀父則元年盟於昧矣邾人何罪可聲特託為詞說以伐之爾冬天王使凡伯來聘伊川先生解周禮時聘以結諸侯之好諸侯不修臣職而聘之非王體也杜氏注凡伯周卿士凡國伯爵也汲郡共縣東南有凡城戎伐凡伯于楚丘以歸左氏傳初戎朝于周發幣於公卿凡伯弗賔冬王使凡伯來聘戎伐之於楚丘以歸榖梁傳凡伯者何也天子之大夫也國而曰伐此一人而曰伐何也大天子之命也伊川先生解楚丘衛地伐見其以衆天子之使道由於衛而戎得以衆伐之衛不能衛其罪可知言以歸則非執凡伯有失節之罪杜氏注楚丘衛地在濟隂城武縣西南泰山孫氏曰于楚丘者責衛不能救難録以歸者惡凡伯不死位八年春宋公衛侯遇于垂左氏傳齊侯將平宋衛有㑹期宋公以幣請於衛請先相見衛侯許之故遇於犬丘犬丘垂也地有兩名榖梁傳不期而㑹曰遇伊川先生解齊侯將平宋衛於鄭有會期宋公以幣請於衛請先相見故遇于垂宋忌鄭之深故與鄭卒不成好無諸侯相見之禮故書曰遇杜氏注垂衛地濟陰句陰縣東北有垂亭劉氏傳何以書接乎我也我未有接之者其曰接乎我何諸侯之遇於我者雖無事焉必以禮交之道也餼牽云乎芻米云乎垂者何吾近邑也三月鄭伯使宛來歸祊公榖並作邴左氏傳鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也成王營王城賜周公許田以為魯國朝宿之邑後世因而立周公别廟焉鄭桓公周宣王之母弟封鄭有助祭泰山湯沐之邑在祊鄭以天子不能巡狩故欲以祊易許田各從本國所近之宜恐魯以周公别廟為疑故云已廢泰山之祀而欲為魯祀周公孫辭以有求也穀梁傳名宛所以貶鄭伯惡與地也去其族惡擅易天下之邑伊川先生解魯有朝宿之邑在王畿之內曰許鄭有朝宿之邑近於魯曰祊時王政不修天子不巡狩魯亦不朝故欲以祊易許田各取其近者故使宛來歸祊始以祊歸魯未言易也朝宿之邑先祖受之於先王豈可相易也鄭來歸而魯受之其罪均也杜氏注宛鄭大夫不書氏未賜族祊在琅邪費縣東南劉氏權衡云苟取不氏者以未賜族說之耳人誰知之翬溺則以為貶柔俠則以為未賜族僑如及遂則以為尊夫人宋督宋萬之比則以為從赴人豈能知之乎陸氏微㫖曰淳聞於師曰參議之也鄭不當歸魯不當受宛當諫武夷胡氏傳鄭伯欲以泰山之祊易許田前此來輸平者以言請之矣未入地也至是來歸祊者其地既輸矣未易許也庚寅我入祊公羊傳其言入何難也榖梁傳入者內弗受也邴者鄭伯所受命於天子而祭泰山之邑也伊川先生解入者內弗受也義不可而強入之也范氏注諸侯有大功盛德於王室者京師有朝宿之邑泰山有湯沐之邑所以供祭祀也魯周公之後鄭宣王母弟若此有賜邑其餘則否許慎曰若令諸侯京師之地皆有朝宿之邑周有千八百諸侯盡京師之地不足以容不合事理劉氏傳未有言我入者其曰我入祊何祊非我有也何言乎祊非我有王者制諸侯之地有常鄭不得與諸人魯不得取諸人夏六月己亥蔡侯考父卒武夷胡氏傳天王崩告於諸侯則不名諸侯薨以名赴而自别於太上禮也古者死而不諡不以名為諱周人以諡易名於是乎有諱禮故君薨赴於他國則曰寡君不祿敢告執事春秋之時遵用此禮凡赴者皆不以名矣經書其終雖五霸強國齊桓晉文之盛莫不以名者是仲尼筆之也赴不以名而書其名者與魯通也已通而不名者舊史失之爾未通而名者有所證矣故傳此義者記於禮篇曰諸侯不生名夫生則不名死而名之别於太上示君臣尊卑之等蓋禮之中也諸侯薨赴不以名而仲尼革之必以名書變周制矣春秋魯史聖人修之也而孟子謂之作以此類也辛亥宿男卒吕氏曰宿男不名史失聖人不得而益之也秋七月庚午宋公齊侯衛侯盟于瓦屋左氏傳齊人卒平宋衛于鄭秋㑹于溫盟于瓦屋以釋東門之役禮也榖梁傳春秋之參盟於是始故謹而日之也伊川先生解宋為主盟與鄭絶也杜氏注瓦屋周地武夷胡氏傳春秋謹參盟善胥命美蕭魚之㑹以信待人而不疑也襄陵許氏曰春秋之初宋公先齊序爵也其後乃以國之小大為次唯主㑹者為之矣八月葬蔡宣公公羊傳卒何以名而葬不名卒從正而葬從主人杜氏注三月而葬速九月辛卯公及莒人盟于浮來公榖並作包來左氏傳以成紀好也伊川先生解鄰國之交講信修睦可也安用盟為公屈已而與臣盟義非安也杜氏注莒人微者不嫌敵公侯故直稱公浮來紀邑東莞縣北有邳鄉邳鄉西有公來山號曰邳來陸氏微㫖曰淳聞於師曰凡公獨與外大夫盟例不書公及齊髙傒晉處父盟是也所以罪齊晉也此特書公者莒小國也非大夫所敢盟公是公自欲與之盟爾所以譏公之失禮且明非大夫之罪也螟伊川先生解螟為災也民以食為本故有災必書冬十有二月無駭榖作賅卒左氏傳無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏伊川先生解未賜族書名而已陸氏纂例啖子曰魯卿既王命皆書卒隱公攝位不命大夫故未命之卿亦書卒明非怠慢也俠無駭是也餘公則不命之卿無書卒者責不尊王室桓十一年柔㑹宋公莊三年溺㑹齊師而並不書卒是也武夷胡氏傳無駭書名未賜族也諸侯之子為大夫則稱公子其孫也而為大夫則稱公孫公孫之子與異姓之臣未賜族而身為大夫則稱名無駭俠之類是也已賜族而使之世為大夫則稱族如仲孫叔孫季孫之類是也古者置卿必求賢德不以世官春狄之初猶為近古故無駭與俠皆書名爾其後官人以世無不賜之族或以字或以諡或以官或以邑而先王之禮亡矣至於三家專魯六卿分晉諸侯失國出奔者相繼職此由也案禮天子寰內諸侯世其祿而不嗣然則諸侯所置大夫嗣其位而不易豈禮也哉觀春秋所書而是非之迹著矣治亂之效明矣九年春天王使南季來聘榖梁傳南氏姓也季字也聘問也聘諸侯非正也范寧周禮說天子時聘以結諸侯之好許慎曰禮臣病君親問之天子有下聘之義傳曰聘諸侯非正寧所未詳伊川先生解周禮大行人時聘以結諸侯之好王法之行時加聘問以懷撫諸侯乃常禮也春秋之時諸侯不修臣職朝覲之禮廢皆王法所當治也不能正典刑而反聘之又不見答失道甚矣劉氏傳曷為字下大夫也天子之下大夫四命武夷胡氏傳隱公即位九年於此而史冊不書遣使如周則是未嘗聘也亦不書公如京師則是未嘗朝也一不朝則貶其爵再不朝則削其地如隱公者貶爵削地可也刑則不舉遣使聘焉其斯以為不正乎經書公如京師者一朝于王所者二卿大夫如京師者五舉魯一國則天下諸侯怠慢不臣可知矣書天王來聘者七錫命者三賵葬者四則問於他邦及齊晉秦楚之大國又可知矣王之不王如此征伐安得不自諸侯出乎諸侯之不臣如此政事安得不自大夫出乎君臣上下之分易矣陪臣執國命夷狄制諸夏矣其原皆自天王失威福之柄也春秋於此蓋有不得已焉爾矣三月癸酉大雨震電庚辰大雨雪左氏傳春王三月癸酉大雨霖以震書始也庚辰大雨雪亦如之書時失也凡雨自三日以往為霖平地尺為大雪公羊傳三月癸酉大雨震電何以書記異也何異爾不時也庚辰大雨雪何以書記異也何異爾俶甚也伊川先生解陰陽運動有常而無忒凡失其度皆人為感之也故春秋災異必書漢儒傳其說而不達其理故所言多妄三月大雨震電不時災也大雨雪非常為大亦災也杜氏注三月今正月挾卒公榖並作俠公羊傳俠者何吾大夫之未命者也榖梁傳弗大夫者隱不爵大夫也隱之不爵大夫何也不成為君也杜氏注挾魯大夫未賜族夏城郎左氏傳書不時也伊川先生解不時也武夷胡氏傳城者禦暴保民之所而城有制役有時大都不過三國之一邑無百雉之城制也魯嘗城費城郈其後復墮焉則越禮而非制矣凡土功龍見而戒事火見而致用水昏正而栽日至而畢時也隱公城中丘城郎而皆以夏則妨農務而非時矣城不違制役不違時又當分財用平版幹稱畚築程土物議逺邇略基址揣厚薄仞溝洫具餱糧度有司量功命日不愆於素然後為之可也況失其時制妄興大作無愛養斯民之意者其罪之輕重見矣襄陵許氏曰七年書城中丘而後伐邾九年書城郎而後伐宋皆譏公不務崇德修政以戒蕭牆而念外人之有非干時動衆恃城保國亦已末矣秋七月冬公㑹齊侯于防公作邴左氏傳宋公不王鄭伯為王左卿士以王命討之秋鄭人以王命來告伐宋冬公㑹齊侯于防謀伐宋也伊川先生解謀伐宋也杜氏注防魯地在琅邪華縣東南武夷胡氏傳周官行人曰時㑹以發四方之禁此謂非時而合諸侯以禁止天下之不義也列國何為有此名凡書㑹皆譏也謂非王事相㑹聚耳左氏稱宋公不王鄭伯以王命討之使來告命㑹于防謀伐宋也于中丘為師期也亦謂之非王事可乎曰以王命討宋而聼征討之禁於王都雖召陵之舉不是及矣始則私相㑹為謀於防中則私相盟為師期於鄧終則乘人敗而深為利以取二邑歸諸已奉王命討不庭者果如是乎經之書㑹伐而不異其文以此十年春王二月公㑹齊侯鄭伯于中丘左氏傳春王正月公㑹齊侯鄭伯于中丘癸丑盟于鄧為師期伊川先生解為師期也夏翬帥師㑹齊人鄭人伐宋左氏傳五月羽父先㑹齊侯鄭伯伐宋公羊傳此公子翬也何以不稱公子貶曷為貶隱之罪人也故終隱之篇貶也伊川先生解三國先遣將致伐齊鄭稱人非卿也翬不稱公子與四年同劉氏意林伐宋敗宋取郜取防滕侯薛侯來朝入許隱公之所以弒也德薄而多大功慮淺而數得意也備其四竟禍反在內可不哀與孔子曰人無逺慮必有近憂不在顓臾而在蕭牆也武夷胡氏傳翬不氏先期也始而㑹宋以伐鄭固請而行今而㑹鄭以伐宋先期而往不待鍾巫之變知其有無君之心矣夫亂臣賊子積其強惡非一朝一夕之故及權勢已成威行中外雖欲制之其將能乎故去其公子以戒兵柄下移制之於未亂也六月壬戌公敗宋師于菅左氏傳六月戊申公㑹齊侯鄭伯于老桃壬戌公敗宋師于菅伊川先生解不言戰而言敗敗者為主彼與戰而此敗之也杜氏注齊鄭後期故公獨敗宋師書敗宋未陳也菅宋地劉氏傳曷為或言戰或不言戰皆陳曰戰詐戰曰敗辛未取郜辛巳取防左氏傳壬戌公敗宋師于菅庚午鄭師入郜辛未歸于我庚辰鄭師入防辛巳歸于我劉氏權衡曰經無老桃之事又但書公敗宋師取郜取防曽不言鄭伯居間者豈得如傳言哉且如傳言春秋為緃漏鄭伯取邑之罪反移之於其君也為人臣子固若此邪公羊傳一月而再取甚之也伊川先生解取二邑而有之盜也杜氏注濟隂城武縣東南有郜城髙平昌邑縣西南有西防城武夷胡氏傳內大惡其詞婉小惡直書而不隱夫諸侯分邑非其有而取之盜也曷不隱乎於取之中猶有重焉者若成公取鄟襄公取邿昭公取鄫皆覆人之邦而絶其嗣亦書曰取所謂猶有重焉者此也故取郜取防直書而不隱也秋宋人衛人入鄭左氏傳蔡人衛人郕人不㑹王命秋七月庚寅鄭師入郊猶在郊宋人衛人入鄭杜氏注宋衛奇兵乘虛入鄭伊川先生解勞民以務外而不知其國故二國入之宋人蔡人衛人伐戴公榖並作載鄭伯伐取之左氏傳蔡人從之伐戴從宋䘙伐戴也八月壬戌鄭伯圍戴癸亥克之取三師焉三國之軍在戴故鄭伯合圍之宋衛既入鄭而以伐戴召蔡人蔡人怒故不和而敗公羊傳其言伐取之何易也其易奈何因其力也因誰之力因宋人蔡人衛人之力也伊川先生解宋人衛人入鄭蔡人從之伐戴鄭伯圍戴克之取三師焉戴鄭所與也故三國伐之鄭戴合攻盡取三國之衆其殘民也甚矣杜氏注戴國今陳留外黃縣東南有戴城武夷胡氏傳稱伐稱取兼之也或疑鄭人兵力不能取戴兼三國之師非矣什圍伍攻正也以寡覆衆奇也莊公蓋嘗克叔段敗王師困州吁而入許能以奇勝可知也故駐師於郊多方以誤之也四國已鬭起乘其弊一舉而兼取之卞莊子之術也然則可乎孟子曰善戰者服上刑稱伐取者其以鄭莊公殘民之甚當此刑矣吕氏曰此見王室之微諸侯放恣之甚伐取之又甚之之詞也聖人書是為甚有力欲使後世亂臣賊子讀之者悚然而惕懼不敢為惡如此之甚也三復其詞吾有以知其邪心暗消忿戾之氣不敢萌也而世之讀春秋者專以挍凡例考同異為意惜哉其求聖人之㫖逺也冬十月壬午齊人鄭人入郕公作盛左氏傳冬齊人鄭人入郕討違王命也伊川先生解討不㑹伐宋也宋以公子馮在鄭故二國交惡左氏傳云宋公不王鄭伯以王命討之於春秋不見其為王討也王臣不行王師不出矯假以逞私欲爾武夷胡氏曰若討違王命則不書入矣入者不順詞也苟以為難詞則齊鄭大國於討郕何難哉十有一年春滕侯薛侯來朝公羊傳諸侯來曰朝大夫來曰聘案春秋諸侯以他事來者多矣不可悉云朝榖梁傳諸侯來朝犆言同時也犆言謂别言也若榖伯綏來朝鄧侯吾離來朝同時來不俱至纍數皆至也纍數總言之也若滕侯薛侯來朝同時俱至伊川先生解諸侯雖有相朝之禮而當時諸侯於天子未嘗朝覲獨相率以朝魯得為禮乎杜氏注薛魯國薛縣陸氏纂例趙子曰朝聘諸侯必有㛰姻之好疆埸之理故王者不絶其交焉春秋之代則多自為黨仇矣皆國之大事君子志之劉氏傳王者之制諸侯歲相問殷相聘世相朝其兼言之何譏何譏爾旅見也非天子不旅見諸侯諸侯相旅見非禮也劉氏意林晉侯使荀庚來聘衛侯使孫良夫來聘固人臣也魯不敢同日而參盟丙午及荀庚盟丁未及孫良夫盟是也今一旦而朝兩君不能識其非禮也而受之則非獨驕也志荒矣死不亦宜乎泰山孫氏曰齊晉宋衛未嘗朝魯而滕薛邾杞來朝奔走而不暇也齊晉宋衛未嘗朝魯者齊晉盛也宋衛敵也滕薛邾杞來朝奔走而不暇者土地狹陋兵衆寡弱不能與魯抗也凡書朝者皆惡之也髙郵孫氏曰外之朝天子者不見於經內之朝天子者二而已又皆在於王所而不在於京師其如京師者一而已又因㑹伐秦而遂行由此觀之當時朝覲之禮一施於強國天子名存而已也聖人因其實而書之以罪之也夏公榖並有五月二字公㑹鄭伯于時來公榖作祁黎左氏傳夏公㑹鄭伯于郲謀伐許也伊川先生解謀伐許也杜氏注時來郲也滎陽縣東有釐城鄭地秋七月壬午公及齊侯鄭伯入許左氏傳秋七月公㑹齊侯鄭伯伐許庚辰傅于許潁考叔取鄭伯之旗蝥弧以先登子都自下射之顛瑕叔盈又以蝥弧登周麾而呼曰君登矣鄭師畢登壬午遂入許許莊公奔衛齊侯以許讓公公曰寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏使公孫獲處許西偏伊川先生解書及內為主也非內為主則先書㑹伐後書入也杜氏注許潁川許昌縣泰山孫氏曰案前年正月公㑹齊侯鄭伯于中丘夏翬帥師㑹齊人鄭人伐宋六月壬戌公敗宋師于菅辛未取郜辛巳取防此年五月公㑹鄭伯于時來秋七月壬午公及齊侯鄭伯入許甚矣公二年之中與齊侯鄭伯連兵自恣以為不道其惡若此也蘇氏曰急曰及緩曰㑹武夷胡氏傳書㑹則伐許者本鄭志也書及則入許者公所欲也隱公即位十有一年天王遣使來聘者再而未嘗朝於京師罪一也平王崩不奔喪㑹葬至使武氏子來求賻罪二也禮樂征伐自天子出而擅興兵甲為宋而伐邾為鄭而伐宋罪三也山川土田各有封守上受之天王下傳之先祖而取郜及防入祊易許罪四也今又入人之國而逐其君罪五也凡此五不韙者人臣之大惡而隱公兼有之然則不善之殃豈特始於惠成於桓而隱之積亦不可得而掩矣使隱公者為國以禮而自強於善豈有鍾巫之難乎是故春秋所載以人事言則是非善惡之迹設施於前而成敗吉凶之效見於後以天道言則感應之理明矣不可不察也吕氏曰隱公有蕭牆之變近在目前而不知方且夏與鄭伯㑹秋及齊侯鄭伯入人之國至冬遂及其不明如是死固冝也冬十有一月壬辰公薨左氏傳羽父請殺桓公將以求大宰公曰為其少故也吾將授之矣使營莵裘吾將老焉羽父懼反諧公於桓公而請殺之十一月公祭鍾巫齊于社圃館于寪氏壬辰羽父使賊弒公于寪氏立桓公而討寪氏有死者不書葬不成喪也公羊傳弒則何以不書葬春秋君弒賊不討不書葬以為無臣子也公薨何以不地不忍言也不忍言其僵尸之處伊川先生解人君薨於路寢見卿大夫而終乃正終也薨於燕寢不正而終也薨不書地弒也賊不討則不書葬無臣子也劉氏傳君弒臣討賊猶親弒子復讎也讎不復則不葬不葬則服不除寢苫枕戈所以明為臣子也葬者臣子之終事也其義未終故不敢以急葬也髙郵孫氏曰弒君不地不忍言也春秋之法外弒言弒內弒不地所以辨內外逺凶變養忠孝也武夷胡氏傳致隱讓國立不以正惠公之罪也致桓弒君幾不早斷隱公之失也既有讒人交亂其間憂虞之象著矣而曰使營菟裘吾將老焉是猶豫留待辨之不早辨也其及也宜隱公見弒魯史舊文必以實書其曰公薨者仲尼親筆也古者史官以直為職而不諱國惡仲尼筆削舊史斷自聖心於魯君見弒削而不書者蓋國史一官之守春秋萬世之法其用固不同矣不書弒示臣子於君父有隱避其惡之理不書地示臣子於君父有不沒其實之忠不書葬示臣子於君父有討賊復讎之義非聖人莫能修謂此類也夫賊不討讎不復而不書葬則服不除寢苫枕戈無時而終事也以此法討罪至嚴矣故曰春秋成而亂臣賊子懼春秋集解卷二
