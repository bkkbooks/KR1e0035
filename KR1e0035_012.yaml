body:
  text: 春秋集解卷十二宋吕本中撰僖公二十有八年春晉侯侵曹晉侯伐衛左氏傳春晉侯將伐曹假道於衛杜氏注曹在衛東故衛人弗許還自南河濟侵曹伐衛正月戊申取五鹿二月晉郤縠卒原軫將中軍衛侯請盟晉人弗許榖梁傳再稱晉侯忌也蘇氏曰晉文之出也曹衛皆不禮焉武夷胡氏傳再稱晉侯者譏復怨也春秋之時用兵者非懷私復怨則利人土地爾詩云百爾君子不知德行不忮不求何用不臧不忮則能懲忿不求則能窒欲然後貪憤之兵亡矣或曰曹衛背華即夷於是乎致武奚為不可曰楚人摟諸侯以圍宋陳蔡鄭許舉兵而同會魯公與會而同盟楚雖得曹新婚於衛然其君不在會其師不與圍以方諸國不猶愈乎又况衛已請盟而晉人弗之許也書曰必有忍其乃有濟有容德乃大文公能忍於奄楚里鳧須矣何獨不能忍於曹衛乎再稱晉侯者甚之也下書楚人救衛則譏晉深矣春秋責備賢者而樂與人改過責備賢者故再稱晉侯樂與人改過故謂已請盟不當拒而絶之也襄陵許氏曰齊桓之興至於伐楚伐北戎也而後稱爵而晉文始見即稱爵者事彌速功彌淺矣吕氏曰侵曹伐衛兩事也既侵曹矣又伐衛也春秋書之如此其詳者見諸侯之放恣也晉侯之害兩國深切著明如此其甚也公子買戍衛不卒戍刺之楚人救衛左氏傳公子買戍衛楚人救衛不克公懼於晉殺子叢以説焉謂楚人曰不卒戍也公羊傳刺之者何殺之也內諱殺大夫謂之刺之也杜氏注內殺大夫皆書刺言用周禮三刺之法陸氏纂例偃則直書刺者有罪當殺也買則上言晉人伐衛買不卒戍明不勝而還非其罪也不斥言無罪申臣禮也凡惡事須書者則避辭言之猶公夫人奔則曰孫殺大夫曰刺之類是也蘇氏曰刺未有書其故者書其故言非其實也武夷胡氏傳孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙今乃殺無罪之主將以苟説於強國於是乎不君矣故特書其故以貶之也吕氏曰戍衛而不卒戍罪也刺之則過矣春秋之世賞罰皆有所為類如此三月丙午晉侯入曹執曹伯畀宋人左氏傳晉侯圍曹門焉多死曹人尸諸城上晉侯患之聼輿人之謀曰稱舍於墓師遷焉曹人凶懼三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀令無入僖負羈之宫而免其族報施也魏犫顚頡怒曰勞之不圖報於何有爇僖負羈氏宋人使門尹般如晉師告急公曰宋人告急舍之則絶告楚不許我欲戰矣齊秦未可若之何先軫曰使宋舍我而賂齊秦藉之告楚我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也喜賂怒頑能無戰乎公説執曹伯分曹衛之田以畀宋人杜氏注執諸侯當以歸京師晉欲怒楚使戰故以與宋所謂譎而不正陸氏纂例不稱晉人執者承上晉侯入曹文故不可重言晉人也武夷胡氏傳古者覿文匿武修其訓典序成而不至於是乎有攻伐之兵故孟子謂萬章曰子以為有王者作將比今之諸侯而誅之乎其教之不改而後誅之乎曹伯嬴者未狎晉政莫知所承晉文不修詞令遽入其國既執其君又分其田暴矣欲致楚師與之戰而以曹伯畀宋人譎矣雖一戰勝楚遂主夏盟舉動不中於禮亦亂矣徒亂人上下之分無君臣之禮其功雖高道不足尚也故曰五霸三王之罪人仲尼之徒無道桓文之事者吕氏曰二十八年一年記晉事最詳皆聖人所致意者觀晉文公舉動如此有意於為善乎夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績左氏傳楚子入居于申使申叔去榖使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害天之所置其可廢乎子玉使伯棼請戰王怒少與之師唯西廣東宫與若敖之六卒實從之子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍先軫曰不如私許復曹衛以攜之執宛春以怒楚既戰而後圖之公説乃拘宛春於衛且私許復曹衛曹衛告絶於楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之惠不及此退三舍避之所以報也我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憖次于城濮晉車七百乘韅靷鞅靽晉侯登有莘之墟以觀師曰少長有禮其可用也遂伐其木以益其兵己巳晉師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰狐毛設二斾而退之欒枝使輿曳柴而偽遁楚師馳之原軫郤溱以中軍公族橫擊之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗晉師三日館榖及癸酉而還劉氏意林及楚人戰于城濮當是時晉辟楚三舍欲戰者得臣也而春秋書晉焉得臣雖有必戰之意由先軫則激之是以書晉也此誅心原情之義也武夷胡氏傳荆楚恃強憑陵諸夏滅黃而霸主不能恤敗徐於婁林而諸大夫不能救執中國盟主而在會者不敢與之爭今又戍榖逼齊合兵圍宋戰勝中國威動天下非有城濮之敗則天下折而入楚矣冝有美詞稱揚其績而春秋所書如此其略何也仁人明其道不計其功正其義不謀其利文公一戰勝楚遂主夏盟以功利言則高矣語道義則三王之罪人也知此説則曾西不為管仲而仲尼孟子雖老於行而不悔其有以夫楚殺其大夫得臣左氏傳楚子玉既敗王使謂之曰大夫若入其若申息之老何子西孫伯曰得臣將死二臣止之曰君其將以為戮及連榖而死晉侯聞之而後喜可知也曰莫余毒也已蒍吕臣實為令尹奉巳而已不在民矣劉氏傳稱國以殺大夫者罪纍上也此殺有罪其以纍上之辭言之何惡楚子也何惡乎楚子知其不可使也而不能勿使知其不可敵也而不能勿敵是亦棄其師之道也衛侯出奔楚左氏傳衛侯欲與楚國人不欲故出其君以説於晉衛侯出居於襄牛衛侯聞楚師敗懼出奔楚遂適陳使元咺奉叔武以受盟武夷胡氏傳諸侯失國出奔未有不名者衛侯何以不名著文公之罪也衛侯失守社稷即安于楚於文公何罪乎衛之禍文公為之也初齊晉盟于斂盂衛侯請盟晉人不許是塞其向善之心雖欲自新改轍而其道無由也高帝一封雍齒而功臣不競世祖燒棄文書而反側悉安使文公釋怨許衛結盟南向諸侯棄楚而歸晉矣忿不思難唯怨是圖必使衛侯竄身無所奔於荆蠻歸於京師兄弟相殘君臣交訟誰之咎也夫心不外者乃能統大衆智不鑿者乃能處大事文公欲主夏盟取威定霸而舉動煩擾若不勝任者惟鑿智自私而心不廣也春秋於衛侯失國出奔不以其罪名之而重文公之咎蓋端本議刑責備賢者之意也五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土左氏傳甲午至於衡雍作王宫於踐土杜氏注襄王聞晉戰勝自往勞之故為作宫五月丁未獻楚俘於王駟介百乘徒兵千鄭伯傅王用平禮也己酉王享醴命晉侯宥王命尹氏及王子虎內史叔興父䇿命晉侯為侯伯賜之大輅之服戎輅之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人曰王謂叔父敬服王命以綏四國糾逖王慝晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命受䇿以出出入三覲癸亥王子虎盟諸侯於王庭要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國及而玄孫無有老幼榖梁傳諱會天王也杜氏注踐土鄭地衛侯出奔其弟叔武攝位受盟非王所加從未成君之禮故稱子而序鄭伯之下高郵孫氏曰齊桓之興始致世子晉文公之霸遂召天王武夷胡氏傳踐土之會天王下勞諸侯削而不書何也周室東遷所存者號與祭耳其實不及一小國之諸侯晉文之爵雖曰侯伯而號令天下幾於改物實行天子之事此春秋之名實也與其名存實亡猶愈於名實俱亡是故天王下勞晉侯於踐土則削而不書去其實以全名所謂君道也父道也晉侯以臣召君則書天王狩于河陽正其名以統實所謂臣道也子道也而天下之大倫尚存而不滅矣衛侯奔楚不書名者未絶其位也叔武受盟而稱衛子者立以為君也此見聖人深罪晉文報怨行私専權自恣廢置諸侯之意陳侯如會杜氏注陳本與楚楚敗懼而屬晉來不及盟故曰如會襄陵許氏曰鄫子會盟後會也陳侯如會後盟也宋襄使邾用鄫子而晉文受陳侯霸圗宏矣公朝于王所公羊傳曷為不言公如京師天子在是也天子在是則曷為不言天子在是不與致天子也榖梁傳朝不言所言所者非其所也杜氏注王在踐土非京師故曰王所劉氏意林踐土之會天子自往也自往雖微而猶可言河陽之會臣召君也臣召君不可以訓故書狩焉武夷胡氏傳朝不言所言所非其所也朝於廟禮也於外非禮也有虞氏五載一巡狩羣后四朝周制十有二年王乃時巡諸侯各朝於方嶽亦何必於京師於廟然後為禮乎古者天子巡狩於四方有常時諸侯朝於方嶽有常所其宫室道塗可以預修故民不勞其供給調度可以預備故國不費今天王下勞晉侯公朝于王所則非其時與地矣自秦而後巡遊無度至有長吏以倉卒不辦被誅民庶以煩勞不給生厭蓋春秋之義不行故也然則天子在是其可以不朝乎天子在是而諸侯就朝禮之變也春秋不以諸侯就朝為非而以王所非其所為貶正其本之意也六月衛侯鄭自楚復歸于衛衛元咺出奔晉左氏傳或訴元咺於衛侯曰立叔武矣其子角從公公使殺之咺不廢命奉夷叔以入守六月晉人復衛侯寧武子與衛人盟於宛濮衛侯先期入叔武將沐聞君至喜捉髮走出前驅射而殺之元咺出奔晉榖梁傳自楚楚有奉焉爾劉氏傳衛侯鄭何以名貶曷為貶殺叔武也武夷胡氏傳衛侯殺叔武是不念鞠子哀而以爭國為心亂民彛滅天理其為罪大矣此其所以名也元咺由是走之晉而訟其君然衛侯初歸則稱復再歸何以不稱復乎春秋立法甚嚴而待人以恕鄭之初歸既殺叔武既名之矣猶意其或出於惡而能革也是以稱復及其再歸又殺元咺及公子瑕則是終以爭國為心長惡不悛無自艾之意矣是以不稱復其曰歸于衛者易詞也諸侯嗣故稱復者繼之也不稱復者絶之也而國非其國矣陳侯欵卒秋杞伯姬來襄陵許氏曰志入杞之怨釋也歸寧常事不書者也中國有霸則諸侯弛兵而室家緩帶於是族姻之恩始録而鄰國之好交修以是為晉侯之澤也故書伯姬二十五年歸杞知伯姬非哀薑出今其來歸蓋寧成風也公子遂如齊襄陵許氏曰志伐齊之仇解也齊自孝公之立與魯好絶比相侵伐昭公元年復與公同踐土之盟故公遣大夫聘之修舊好焉禮也冬公會晉侯齊侯榖無齊侯宋公蔡侯鄭伯陳子莒子邾公作邾婁子秦人于溫左氏傳冬會于溫討不服也杜氏注討衛許榖梁傳諱會天王也杜氏注陳共公稱子先君未葬宋襄公稱子自在本班陳共公稱子降在鄭下陳懷公稱子而在鄭上蓋主會所次天王狩榖作守于河陽壬申公朝于榖作於王所左氏傳是會也晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也壬申公朝于王所公羊傳不與再致天子也榖梁傳全天王之行也為若將狩而遇諸侯之朝也為天王諱也水北為陽山南為陽溫河陽也杜氏注晉地今河內有河陽縣壬申十月十日有日而無月史闕文陸氏微旨啖子曰時天子微弱諸侯驕惰怠於臣禮若令朝於京師多有不從又晉已強大率諸侯而入王城亦有自嫌之意故請王至溫而行朝禮若天子因狩而諸侯得覲然以常禮言之晉侯召君名義之罪人也其可以為訓乎若原其自嫌之意嘉其尊主之意則晉侯請王之狩忠亦至焉故夫子特書曰天王狩于河陽所謂春秋之作原情為制以誠變禮者也武夷胡氏傳以尊周而全晉也晉人執衛侯歸之于京師左氏傳衛侯與元咺訟寧武子為輔針莊子為坐士榮為大士衛侯不勝殺士榮刖針莊子謂寧俞忠而免之執衛侯歸之於京師置諸深室寧子職納橐饘焉公羊傳衛侯之罪何殺叔武也文公逐衛侯而立叔武叔武辭立而他人立則恐衛侯之不得反也故於是已立然後為踐土之會治反衛侯衛侯得反曰叔武篡我元咺爭之曰叔武無罪終殺叔武元咺走而出此晉侯也其稱人何貶曷為貶衛之禍文公為之也文公為之奈何文公逐衛侯而立叔武使人兄弟相疑放乎殺母弟者文公為之也劉氏傳曷為或言歸于或言歸之于歸于者正也歸之于者不正也此其為不正奈何文公使元咺與衛侯訟文公右元咺刖衛大夫針莊子殺士榮然後執衛侯歸之于京師文公之聼也已頗古者蓋君臣無獄諸侯不専殺襄陵許氏曰司馬之法邦國賊殺其親則正之衛侯殺叔武執有罪也則何為不得為伯討天子在是而擅執諸侯軋矣是以推而逺之也衛元咺自晉復歸于衛左氏傳元咺歸于衛立公子瑕榖梁傳自晉晉有奉焉爾劉氏傳其言復歸何大夫無復復者位已絶也已絶而復惡也惡則其言歸何易也其易奈何以文公為之主也諸侯遂圍許左氏傳丁丑諸侯圍許榖梁傳遂繼事也武夷胡氏傳諸侯比再會天子再至皆朝于王所而許獨不會以其不臣也故諸侯圍許案古者巡狩諸侯各朝於方嶽今法天子行幸三百里內亦皆問起居許距河陽踐土近矣而可以不會乎其稱遂繼事之詞也襄陵許氏曰許之能從齊宋而不能從晉者何也案齊桓自北杏之會十有七年而後侵許服之又九年而後從於伐楚蓋使失其所係如此之難也宋襄之興紹桓遺緒逮晉文時則許既離於中國而合於蠻夷矣國人一服楚之威令是以難變也曹伯襄復歸于曹遂會諸侯圍許左氏傳晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解公復曹伯遂會諸侯於許劉氏意林曹伯襄復歸於曹衛侯以殺叔武名曹伯以賂得國名其惡不同其貶一也此正性命之理也武夷胡氏傳夫以賂得國而春秋名之比於失地滅同姓之罪以此知聖人嚴於義利之别以正性命之理其説行而天下定矣豈曰小補之哉吕氏曰晉侯執曹伯畀宋人既赦之使歸則遂會諸侯圍許晉文之於諸侯殆以奴之也曹伯不能感激自奮以求合於義而遂委靡不振以死亦君子所鄙也二十有九年春介葛盧來左氏傳春介葛盧來朝舍於昌衍之上公在會餽之芻米禮也公羊傳介葛盧者何夷狄之君也何以不言朝不能乎朝也杜氏注介東夷國也在城陽黔陬縣葛盧介君名也吕氏曰葛盧夷狄之附庸公至自圍許夏六月公榖並有公字會王人晉人宋人齊人陳人蔡人秦人盟于翟泉公作狄泉左氏傳夏公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟且謀伐鄭也卿不書罪之也在禮卿不會公侯會伯子男可也伊川先生解晉文連年會盟皆在王畿之側而此盟復迫王城又與王人盟強逼甚矣故諱公諸侯貶稱人惡之大也杜氏注翟泉今洛陽城內大倉西南池水也劉氏傳是稱人皆微者與非微者也王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖之盟也則其稱人何翟泉在王城之內諸侯之大夫入天子之境雖貴曰士陪臣也而盟於天子之側自此始是以貶也其餘從同劉氏意林列國之卿亂王室之禮王子虎不能正也使陪臣盟天子之側此所謂下陵上替也秋大雨雹左氏傳為災也武夷胡氏傳正蒙曰凡隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不捨而為風和而散則為霜雪雨露不和而散則為戾氣曀霾隂常散緩受交於陽則風雨調寒暑正雹者戾氣也隂脅陽臣侵君之象當是時僖公即位日久季氏世卿公子遂専權政在大夫萌於此矣冬介葛盧來左氏傳冬介葛盧來以未見公故復來朝禮之加燕好三十年春王正月夏狄侵齊左氏傳春晉人侵鄭以觀其可攻與否狄聞晉之有鄭虞也夏狄侵齊武夷胡氏傳晉人侵鄭以觀其可攻與否狄聞晉之有鄭虞也遂侵齊詩不云乎戎狄是膺荆舒是懲四夷交侵所當攘斥晉文公若移圍鄭之師以伐之則方伯連率之職修矣上書狄侵齊下書圍鄭此直書其事而義自見者也秋衛殺其大夫元咺及公子瑕左氏傳晉侯使醫衍鴆衛侯寧俞貸醫使薄其鴆不死公為之請納玉於王與晉侯皆十玨王許之秋乃釋衛侯衛侯使賂周歂冶厪曰苟能納我吾使爾為卿周冶殺元咺及子適子儀榖梁傳稱國以殺罪纍上也衛侯在外其以纍上之罪言之何也待其殺而後入也高郵孫氏曰公子瑕嘗立為君矣於是殺之猶曰公子者瑕見立於元咺耳非受命於天王傳國於先君者也不曰其君非君也元咺及之者言瑕之見殺由於元咺立之元咺存則公子瑕存元咺死則公子瑕死咺立之君咺見殺則公子瑕死也常山劉氏曰殺二大夫以上不書及者其事同殺之之志均故也殺其大夫某及某者以某之故而延及某也武夷胡氏傳稱國以殺者君與大臣専殺之也衛侯在外其稱國以殺何也榖梁子曰待其殺而後入也待其殺而後入是志乎殺咺瑕者也兵莫憯於志鏌鋣為下衛侯未入稱國以殺此春秋誅意之效也然則大臣何與焉從君於惡而不能止故并罪之也衛侯鄭歸于衛左氏傳解在上文公羊傳此殺其大夫其言歸何歸惡乎元咺也曷為歸惡乎元咺元咺之事君也君出則已入君入則已出以為不臣也劉氏意林鄭之初歸也得言復當是之時叔武在內鄭雖無國國固其國也及其又歸也殺叔武矣執之歸於京師矣殺元咺及公子瑕矣鄭雖得國國非其國也故不言復春秋之褒善罰惡豈不至明至察哉向也無國而義可以有國則亦謂之有國今也得國而義不可以得國則亦謂之無國由是觀之天子者得天下之義者也非得其位也諸侯者得一國之義者也非得其勢也得其義雖未有其位君子謂之得矣失其義雖能専其勢君子謂之失矣故曰義重於冨仁重於爵武夷胡氏傳衛侯出奔於楚則不名見執於晉則不名今既歸國復有其土地何以反名之乎不名者責晉文公之以小怨妨大德名之者罪衛侯鄭之以忮害戕本支末世隆怨薄恩趨利棄義有國家者恐公族之軋已至於網羅誅殺無以芘其本根而社稷傾覆如六朝者衆矣衛侯始歸而殺叔武再歸而及公子瑕是葛藟之不若而春秋之所惡也故再書其名為後世戒此義苟行則六朝之君或亦少省矣晉人秦人圍鄭左氏傳九月甲午晉侯秦伯圍鄭以其無禮於晉且二於楚也晉軍函陵秦軍汜南鄭伯使燭之武見秦伯曰鄰之厚君之薄也若舍鄭以為東道主行李之往來共其乏困君亦無所害秦伯説與鄭人盟使把子逢孫楊孫戍之乃還子犯請擊之公曰不可微夫人之力不及此因人之力而敝之不仁失其所與不智以亂易整不武吾其還也亦去之武夷胡氏傳鄭伯之於晉公子特不能厚將迎贈送之禮而未嘗以橫逆加之也坐此見圍為列國者不亦難乎介人侵蕭冬天王使宰周公來聘左氏傳冬天王使周公閲來聘榖梁傳天子之宰通於四海杜氏注周公天子三公兼冢宰也高郵孫氏曰禮雖有天子聘諸侯之義然義不當使三公書曰宰周公來聘用見周道之衰而諸侯強盛也公子遂如京師遂如晉左氏傳東門襄仲將聘於周遂初聘於晉武夷胡氏傳大夫出疆有以二事出者有以一事出而専繼事者其書皆曰遂公子遂如周及晉與祭公自魯逆王后皆所謂以二事出者也公子結往媵而及齊宋盟則専繼事者也是非得失則存乎其事矣冢宰上兼三公其職任為至重而來聘於魯天王之禮意莫厚焉魯侯既不朝京師而使公子遂往又以二事出夷周室於列國此大不恭之罪履霜堅氷之漸春秋之所誅而不以聼者也則何以無貶乎有不待貶絶而罪惡見者不貶絶以見罪惡三十有一年春取濟西田左氏傳取濟西田分曹地也使臧文仲往宿於重館重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅於濟盡曹地也高郵孫氏曰左氏公羊皆以為晉侯以曹地分諸侯而魯取濟西之田然案經書之與汶陽田相等耳無異文也此蓋晉侯執曹伯而反諸侯之侵地魯濟西之田嘗見侵入於曹魯於是取之常山劉氏曰凡力得之曰取不當取也不是其専奪雖復取本邑亦無異詞其有本是已邑及我之附庸以彼所奪之後却取得當異其文謂其不能申明直辭請於王而正疆理但専自以兵甲爭奪不得正道故悉同辭言之案此年取濟西田成二年取汶陽田先本魯地而皆書取若此義例據經為合蓋春秋之義以治易亂而不以亂易亂所正者本而已凡取人之有其惡易見而取已之舊不以其道者其罪難知聖人所書亦正名曰取以顯微也公子遂如晉左氏傳襄仲如晉拜曹田也夏四月四卜郊不從乃免牲猶三望左氏傳夏四月四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠惰也望郊之細也不郊亦無望可也公羊傳曷為或言三卜或言四卜三卜禮也四卜非禮也三卜何以禮四卜何以非禮求吉之道三禘嘗不卜郊何以卜卜郊非禮也卜郊何以非禮魯郊非禮也魯郊何以非禮天子祭天諸侯祭土天子有方望之事無所不通諸侯山川有不在其封內者則不祭也曷為或言免牲或言免牛免牲禮免牛非禮也免牛何以非禮傷者曰牛三望者何望祭也然則曷祭祭泰山河海曷為祭泰山河海山川有能潤於百里者天子秩而祭之觸石而出膚寸而合不崇朝而遍雨乎天下者唯泰山耳河海潤於千里猶者何通可以已也何以書譏不郊而望祭也榖梁傳免牲者為之緇衣纁裳有司玄端奉送至於南郊免牛亦然杜氏注三望分野之星國中山川皆因郊祀望而祭之魯廢郊天而修其小祀故曰猶猶者可止之辭范氏注鄭君曰望者祭山川之名也謂海也岱也淮也非其疆界則不祭禹貢曰海岱及淮惟徐州徐州魯也陸氏纂例啖子曰凡祭常事多不書失禮及非常乃書啖子曰天子以冬至祭上帝於郊故謂之郊魯以周公之故特得以孟春周之三月祈榖於上帝亦謂之郊郊皆用辛日故以二月卜三月上辛不吉則卜中辛又不吉則卜下辛所謂吉事先近日也凡養牲必養二牲一以祀上帝一以祀后稷帝牛有變變謂所傷之類則改卜稷牛以代之而别以他牛為稷牛可也禮曰帝牛必在滌三月稷牛唯具劉氏傳三卜禮也四卜非禮也三卜何以禮四卜何以非禮郊用正月上辛郊用正月上辛則曷為卜哉以十二月下辛卜正月上辛如不吉則以正月下辛卜二月上辛如不吉則又以二月下辛卜三月上辛如不吉則不郊夏后氏以建寅為正商人以建丑為正周人以建子為正王者必以其正月郊曷為或言免牲或不言免牲免牲禮也不免牲非禮也免牲何以禮不免牲何以非禮郊者嵗事也六月上甲始庀牲十月上甲始繫牲帝牲必在滌三月如不從則免矣曷為或言牲或言牛中禮曰牲不中禮曰牛何以則中禮何以則不中禮夏后氏元牝商人白牝周人騂牝天地之牛角繭栗宗廟之牛角握賔客之牛角尺猶三望三望者何望祭也然則曷祭祭星辰山川曷為祭星辰山川星辰民所瞻仰也山川民所取財用也劉氏意林謂猶者可以已之辭何其不知春秋也春秋貴正貴備安有廢大存小而又教之曰可以已哉是猶逐其父養其母者而謂之曰可并逐母也亦誨之孝而已矣王介甫曰不郊矣幸其猶三望也不告朔矣幸其猶朝於廟也是猶紾其兄之臂者而曰我且徐之以全吾愛云爾其可乎亦誨之悌而已矣故以猶為可以已者逐父而養母之説也以猶為愈乎已者紾兄而徐徐之説也君子不然彼不郊而三望自以為猶愈乎已者故譏之彼不告朔而朝廟自以為猶愈乎已故非之君子之道致乎其至者也當其必為不曰可以已亦不曰愈乎已武夷胡氏傳記禮者曰祭帝於郊所以定天位也禮行于郊而百神受職焉魯諸侯何以有郊成王以周公有大勳勞於天下命魯公世世祀周公以天子之禮樂是故魯君孟春乘大輅載弧韣旗十有二旒日月之章祀帝於郊配以后稷天子之禮也以人臣而用天子之禮可乎是成王過賜而魯公伯禽受之非也楊子曰天子之制諸侯庸節節莫差於僭僭莫重於祭祭莫重於地地莫重於天諸侯而祀天其僭極矣聖人於春秋欲削而不存則無以志其失為後世戒悉書之乎則嵗事之常有不勝書者是故因禮之變而書於䇿或以卜或以時或以望或以牲或以牛於變之中又有變焉者悉書其事而謂言偃曰魯之郊禘非禮也周公其衰矣把之郊也禹也宋之郊也契也是天子之事守也言把宋夏商之後受命於周作賔王家統承先王修其禮物其得行郊祀而配以其祖非列國諸侯之比也是故天子祭天地諸侯祭社稷祝嘏莫敢易其常古易則亂名犯分人道之大經拂矣故曰郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如視諸掌乎夫庶人之不得祭五祀大夫之不得祭社稷諸侯之不得祭天地非欲故為等殺蓋不易之定理也知其理之不可易則安於守分無欲僭之心矣為天下國家乎何有秋七月冬把伯姬來求婦榖梁傳婦人既嫁不踰境把伯姬來求婦非正也武夷胡氏傳蕩伯姬來逆婦而書者以公自為之主失其班列書也把伯姬敵矣其來求婦曷為亦書見婦人之不可預國事也王后之詔令不施於天下夫人之教令不施於境中婚姻大事也把獨無君乎而夫人主之也故特書於策以為婦人亂政之戒母為子求婦猶曰不可况於他乎此義行無吕武之禍矣吕氏曰以求婦而來父母之國非禮也故書春秋之書凡以此欲人克已復禮而反人道之正云爾毫髮不合於禮則於心術之微必有不自得者惟能自克於義以求合於禮則心廣氣盛千萬人吾往矣其終必可以至於聖人也此春秋所由作也狄圍衛十有二月衛遷于榖作於帝丘杜氏注帝丘今東郡濮陽縣故帝顓頊之虛故曰帝丘武夷胡氏傳帝丘東郡濮陽顓頊之虛亦衛地也狄常迫逐黎侯黎侯寓於衛而衛不能修方伯連率之職戎常伐凡伯于楚丘而衛不能救王臣之患其後遂為狄人所滅東徙渡河矣齊桓公攘夷狄封之而衛國忘亡今又為狄所圍其遷於帝丘避狄難也而中國衰微強暴憑陵衛侯不能自強於政治晉文無恤與國安諸夏之功莫不見矣三十有二年春王正月夏四月己丑鄭伯捷卒公作接衛人侵狄秋衛人及狄盟左氏傳夏狄有亂衛人侵狄狄請平焉秋衛人及狄盟杜氏注不地者就狄廬帳盟泰山孫氏曰不地者就狄盟也復曰衛人者嫌與內之微者同冬十有二月己邜晉侯重耳卒范氏注晉自莊公已前不書於春秋又不言文公之入何乎徐邈曰諸侯有朝聘之禮赴告之命所以敦其交好通其憂虞若鄰國相望而情志否隔存亡禍福不以相關則他國之史無由得書故告命之事絶則記注之文闕此蓋內外相與之常也魯政雖陵遲而典刑猶存史䇿所録不失常法其文獻之實足徴故孔子因而修之事仍本史三十有三年春王二月秦人入滑左氏傳三十有二年把子自鄭使告於秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也師勞力竭逺主備之無乃不可乎師知所為鄭必知之勤而無所必有悖心且行千里其誰不知公辭焉召孟明西乞白乙使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中夀爾墓之木抰矣三十三年春秦師及滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且使遽告於鄭鄭穆公使視客館則束載厲兵秣馬矣使皇武子辭焉把子奔齊逢孫楊孫奔宋孟明曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還齊侯使國歸父來聘左氏傳齊國莊子來聘自郊勞至於贈賄禮成而加之以敏臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也夏四月辛巳晉人及薑戎敗秦師公無師字于殽癸巳葬晉文公左氏傳晉原軫曰秦違蹇叔而以貪勤民天奉我也欒枝曰未報秦施而伐其師其為死君乎先軫曰一日縱敵數世之患也遂發命遽興薑戎子墨衰絰梁𢎞御戎萊駒為右夏四月辛巳敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉於是始墨文嬴請三帥公許之秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大德公羊傳其謂之秦何夷狄之也易為夷狄之秦伯將襲鄭百里子與蹇叔子諌秦伯怒曰若爾之年者宰上之木拱矣師出晉人與薑戎要之擊而殺之匹馬隻輪無反者其言及薑戎何薑戎微也稱人亦微也何言乎薑戎之微先軫也或曰襄公親之襄公親之則其稱人何貶曷為貶君在乎殯而用師危不得葬也榖梁傳晉人者晉子也其曰人何也微之也何為微之不正其釋殯而主乎戰也伊川先生解晉不稱君居喪未葬不可從戎也忘親背惠其惡甚矣秦為無道越晉踰周以襲人衆所共憤故書晉人其稱及薑戎亦然劉氏傳其謂之秦何夷狄之也秦之所以為狄與人之臣而謀其君利人之喪而襲其國弱人之孤而死其親背大臣而與小臣圗事貪得地而棄其師者也武夷胡氏傳案書序秦穆公伐鄭晉襄公帥師敗諸殽而經書晉人敗秦師于殽是皆仲尼親筆其詞何以異乎書序専取穆公悔過自誓之言止於勸善其辭恕春秋備書秦晉無道用兵之失兼於懲惡其法嚴此所以異也晉襄親將絀不稱君者俯逼葬期忘親背惠墨衰絰而即戎其惡甚矣視秦猶狄其罪云何客人之館而謀其主因人之信已而逞其詐利人之危而襲其國越人之境而不哀其喪叛盟失信以貪勤民而棄其師狄道也夫把子先軫之謀偷見一時之利僥幸其成自以為功者也二君皆過聼焉而貪其利是使為人臣者懷利以事其君為人子者懷利以事其父君臣父子去仁義懷利以相與利之所在則從之矣何有於君父故一失則夷狄再失則禽獸而大倫滅矣春秋人晉子而狄秦所以立人道存天理也狄侵齊左氏傳狄侵齊因晉喪也襄陵許氏曰晉文未暇攘服要荒是以方其霸也則狄已侵齊圍衛使天復假文公以年則必將有討矣公伐邾公作邾婁下同取訾婁榖作樓公作取叢秋公子遂帥公作率師伐邾左氏傳公伐邾取訾婁以報升陘之役邾人不設備秋襄仲復伐邾高郵孫氏曰夏公伐邾取其邑秋又使其臣伐之春秋一切志之用見天下無王而諸侯橫暴侵伐無已也武夷胡氏傳案左氏公伐邾取訾婁報升陘之役邾人不設備襄仲復伐之此皆不勝忿欲報怨貪得恃強陵弱不義之兵也直書其事而罪自見矣或曰取須句訾婁有為為之也伐邾至於再三念母勤矣夫念母者必當止乎禮義平王不撫其民而逺屯戍於母家詩人刺之夫子録焉僖公以成風之有功於己也越禮以尊其身違義以報其怨殘民動衆取人之邑曽是以為可乎晉人敗狄于箕左氏傳狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子杜氏注太原陽邑縣南有箕城襄陵許氏曰自三十年狄始侵齊晉未暇討自是中國嵗有狄患至敗於此而後懲艾不服犯略是故戎狄之亂不能震疊以威武未易以德懷也冬十月公如齊左氏傳冬公如齊朝且弔有狄師也十有二月公至自齊乙巳公薨于小寢左氏傳即安也武夷胡氏傳左氏曰即安也周制王官六寢路寢一小寢五君日出而眂朝退適路寢聼政使人眂大夫退然後適小寢釋服是路寢治事之所也而小寢燕息之地也公羊以西宫為小寢魯子以諸侯有三宫則列國之制蓋降於王其以路寢則非正矣曽子曰吾得正而斃又何求哉古人貴於得正乃如此凡此直書而義自見矣襄陵許氏曰君子自治常使心熟於仁而體安於禮則正勝於死生之際終不可亂矣曽子之易簀是也隕公作霣霜不殺草李梅實公羊傳何以書記異也何異爾不時也杜氏注周十一月今九月霜當微而重重而不能殺草所以為災襄陵許氏曰僖公寬仁過厚其失也豫而文公以暗弱繼之其咎遂著三桓之盛自僖公始卒以専魯將夢之祥卜郊不從者凡以為此天之感變蓋深逺矣晉人陳人鄭人伐許左氏傳晉陳鄭伐許討其二於楚也春秋集解卷十二
