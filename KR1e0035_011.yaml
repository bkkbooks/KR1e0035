body:
  text: 春秋集解卷十一宋吕本中撰僖公十有八年春王正月宋公公有會字曹伯衛人邾公作邾婁人伐齊夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績左氏傳宋襄公以諸侯伐齊三月齊人殺無虧齊人將立孝公不勝四公子之徒遂與宋人戰夏五月宋敗齊師于甗立孝公而還榖梁傳非伐喪也善救齊也伊川先生解書宋及曲在宋也奉少以奪長其罪大矣齊師敗績書敗責齊臣也杜氏注甗齊地劉氏傳伐齊以納公子昭也伐齊以納公子昭則何以不曰納齊公子昭於齊不與納也納公子昭非正也納公子昭之為非正奈何齊桓公之夫人三皆無子桓公好內多內寵長衛姬生無虧小衛姬生元鄭姬生昭葛嬴生潘密姬生商人宋華子生雍六人者莫之適立桓公死六人皆欲為後國人立無虧昭出奔宋宋襄公率諸侯伐齊納焉立嫡以長不以賢立子以貴不以長貴均以年年均以德納公子昭非正也武夷胡氏傳伐齊之喪奉少奪長其罪大故其責詳書師救齊者善魯也救者善則伐者惡矣凡書救者未有不善之也書狄救齊者許狄也許夷狄則罪諸夏矣許之曷為不稱人深著中國諸侯之罪也凡伐者為客受伐者為主今齊人受伐以宋為主者曲在宋也凡師直為壯曲為老書齊師敗績者責齊臣也或曰桓公管仲嘗屬孝公於宋襄以為世子矣則何以不可立乎曰不能制命雖天王欲撫鄭伯以從楚春秋猶以大義裁之而不與也桓公君臣乃欲以私愛亂長幼之節其可哉獨不見宣王與仲山甫爭魯侯戲括之事其後如之何也春秋深罪宋公大義明矣狄救齊榖梁傳善救齊也襄陵許氏曰桓公攘服夷狄雖恃兵力亦以禮讓恩信能結其心觀狄之救楚之盟有以見公之遺烈矣秋八月丁亥葬齊桓公武夷胡氏傳桓公九合諸侯不以兵車威令加乎四海幾於改物雖名方伯實行天子之事然而不能慎終如始付託非人柩方在殯四鄰謀動其國家而莫之恤至於九月而後葬以此見功利之在人淺矣春秋明道正義不急近功不規小利於齊桓晉文之事有貶而無過褒以此冬邢人狄人伐衛左氏傳邢人狄人伐衛圍菟圃衛侯以國讓父兄子弟及朝衆曰苟能治之燬請從焉衆不可而後師于訾婁狄師還榖梁傳狄其稱人何也善纍而後進之伐衛所以救齊也功近而德逺矣髙郵孫氏曰衛嘗見滅於狄而齊桓封之齊桓死未逾年爾而衛人與諸侯伐之邢人自以復存者桓公也於是不忍齊之見伐而衛之無恩也與狄人伐之春秋書之曰邢人狄人伐衛中國則外之焉而狄則人焉稱之曰人所以見中國之亂人理亡泯而彼為有人也十有九年春王三月宋人執滕子嬰齊左氏傳宋人執滕宣公武夷胡氏傳執之是非決於稱人與稱爵而見執者則以名與不名知其罪之在也經書見執於人者悉皆不名而滕子獨名是亦有罪焉爾夫以齊桓之盛九合諸侯不以兵車雖江黃逺國猶相繼來盟而滕介齊宋之間不與衣裳之會者三十有七年及宋襄繼起又不尊事大國其見執則有由矣書名著其罪也苟為有罪其見執固冝宋何以稱人不得為伯討乎執雖以罪不歸於京師則稱人惡其専也歸於京師而執非其罪則稱人惡其濫也夏六月宋公公作人曹人邾公作邾婁下同人盟于曹南劉氏傳曹南者何曹之南也鄫榖作繒下同子會盟于邾公有婁字下同己酉邾人執鄫子用之左氏傳宋公使邾文公用鄫子於次睢之社欲以屬東夷司馬子魚曰古者六畜不相為用小事不用大牲而况敢用人乎祭祀以為人也民神之主也用人其誰饗之齊桓公存三亡國以屬諸侯義士猶曰薄德今一會而虐二國之君又用諸淫昏之鬼將以求霸不亦難乎公羊傳其言會盟何後會也惡乎用之社也其用之社奈何蓋叩其鼻以血社也髙郵孫氏曰邾鄫世讎之國宣十八年又戕鄫子於其國邾鄫皆小國其相讎之迹不能悉見於經惟其無道之甚著見者記之爾蘇氏曰宋公使邾文公用鄫子於次睢之社欲以屬東夷然春秋書邾人而不及宋何也諸侯之尊善惡可以專之非人所得使也邾以諸侯而聽命於宋以行不義是以專罪邾也若宋公之罪則不待貶而見矣秋宋人圍曹左氏傳討不服也子魚言於宋公曰文王聞崇德亂而伐之軍三旬而不降退修教而復伐之因壘而降詩曰刑于寡妻至於兄弟以御于家邦今君德無乃猶有所闕而以伐人若之何盍姑內省德乎無闕而後動武夷胡氏傳盟于曹南口血未乾今復圍曹者討不服也愛人不親反其仁治人不治反其智襄公不能內自省德而急於合諸侯執嬰齊非伯討不足以示威盟曹南非同志不足以示信卒於兵敗身傷不知反求諸己欲速見小利之過也漢景削七國而吳楚叛東都疾橫議而黨錮興唐文宗切於除姦而訓注用故子夏為莒父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成經書襄公不越數端而知其操心之若此者仲尼筆削推見至隱如化工賦像并其情不得遁焉非特畫筆之肖其形爾故春秋者化工也非畫筆也衛人伐邢左氏傳衛人伐邢以報菟圃之役冬公有公字會陳人蔡人楚人鄭人盟于齊左氏傳陳穆公請修好於諸侯以無忘齊桓之德冬盟于齊修桓公之好也杜氏注地於齊齊亦與盟武夷胡氏傳盟會皆君之禮也微者盟會不志於春秋凡所志者必有君與貴大夫居其間也然則為此盟者乃公與陳蔡楚鄭之君或其大夫矣曷為內則沒公外則人諸侯與其大夫諱是盟也楚人之得與中國會盟自此始也莊公十年荆敗蔡師始見於經其後入蔡伐鄭皆以號舉乃外之也僖公元年改而稱楚經亦書人於是浸強矣然終桓公之世皆止書人而不得與中國盟會者以齊修霸業能制其強故也桓公既沒中國無霸鄭伯首朝於楚其後遂為此盟春秋沒公人陳蔡諸侯而以鄭列其下蓋深罪之也又二年復盟于鹿上至會于盂遂執宋公以伐宋而楚於是乎大張列位於陳蔡之上而書爵矣聖人書此豈與之乎所以著荆楚之強傷中國之衰莫能抗也故深諱此盟一以外夷狄二以惡諸侯之失道三以謹盟會之始也梁亡左氏傳梁亡不書其主自取之也初梁伯好土功亟城而弗處民罷而弗堪則曰某寇將至乃溝公宫曰秦將襲我民懼而潰秦遂取梁公羊傳梁亡此未有伐者其言梁亡何自亡也其自亡奈何魚爛而亡也榖梁傳梁亡自亡也湎於酒淫於色心昏耳目塞上無正長之治大臣背叛民為寇盜梁亡自亡也梁亡鄭棄其師我無加損焉正名而已矣陸氏微旨淳聞於師曰梁伯亟用其人自取滅亡其罪當矣秦人肆其強暴取人之國沒而不書其義安在曰乘人之危其惡易見也滅人之國其罪易知也自取滅亡其意微矣春秋之作聖人所以明微也武夷胡氏傳易曰天行健君子以自強不息古者諸侯朝修其業令晝考其國職夕省其典刑夜警百工無使慆淫而後即安故克勤於邦荒度土功者禹也栗栗危懼撿身若不及者湯也自朝至於日中昃不遑暇食用咸和萬民者文王也凡有國家者土地雖廣人民雖衆兵甲雖多城郭雖固而不能自強於政治則日危月削如火銷膏以至滅亡而莫覺也而况好土功輕民力湎於酒淫於色心昏而出惡政者乎其亡可立而待矣二十年春新作南門左氏傳書不時也榖梁傳作為也有加其度也言新有故也非作也南門者法門也杜氏注魯城南門也夲名稷門僖公更髙大之今猶不與諸門同改名髙門也劉氏傳其謂之南門何南非一門也庫門天子臯門雉門天子應門武夷胡氏傳書新作南門譏用民力於所不當為也魯人為長府閔子騫曰仍舊貫如之何何必改作孔子曰夫人不言言必有中春秋凡用民力得其時制者猶書於䇿以見勞民為重事而況輕用於所不當為者乎然僖公嘗修泮宫復閟宫矣奚斯董其役史克頌其事而經不書者宫廟以祀其祖考學校以教國之子弟二者為國之先務雖用民力不可廢也其垂教之意深矣夏郜子來朝杜氏注郜姬姓國五月乙巳西宫災公羊傳西宫者何小寢也小寢則曷謂之西宫有西宫則有東宫矣魯子曰以有西宫亦知諸侯之有三宫也西宫災何以書記災也鄭人入滑秋齊人狄人盟于邢左氏傳為邢謀衛難也於是衛方病邢冬楚人伐隨左氏傳隨以漢東諸侯叛楚冬楚鬭榖於菟帥師伐隨取成而還襄陵許氏曰楚既服隨則將爭衡於上國矣而宋欲盟之其能絀乎二十有一年春狄侵衛襄陵許氏曰中國無霸則諸侯力攻四夷衡決民被其災此書伐衛伐邢入滑伐隨侵衛著無霸之急也宋人齊人楚人盟于鹿上左氏傳宋人為鹿上之盟以求諸侯於楚楚人許之公子目夷曰小國爭盟禍也宋其亡乎幸而後敗杜氏注鹿上宋地汝隂有原鹿縣宋為盟主故在齊人上夏大旱公羊傳記災也秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂公作霍榖作雩執宋公以伐宋左氏傳秋諸侯會宋公于盂子魚曰禍其在此乎君欲已甚其何以堪之於是楚執宋公以伐宋冬會于薄以釋之子魚曰禍猶未也公羊傳宋公與楚子期以乘車之會公子目夷諫曰楚夷國也強而無義請君以兵車之會往宋公曰不可吾與之約以乘車之會自我為之自我墮之曰不可終以乘車之會往楚人果伏兵車執宋公以伐宋杜氏注盂宋地楚始與中國行會禮伊川先生解宋率諸侯為會而蠻夷執會主諸侯莫違故以同執書之陸氏微旨趙子曰此楚執爾其以諸侯執之之辭何也譏諸侯而罪宋公也南面之君兵馬非不多也力非不足也而聽蠻荆之君執辱盟主故譏之宋公德不足懷慮不及逺而求諸侯以及于難故罪之武夷胡氏傳春秋為賢者諱宋公見執不少隱之何也夫盟主者所以合天下之諸侯扶大義尊王室者也宋公欲繼齊桓之烈而與楚盟會豈扶大義尊王室之義乎故人宋公於鹿上之盟而盂之會直書其事而不隱所以深貶之也冬公伐邾公作邾婁楚人使冝申來獻捷穀梁傳捷軍得也其不曰宋捷何也不與楚捷於宋也武夷胡氏傳不曰來獻宋捷為魯諱也諸侯從楚伐宋而魯獨不與故楚來獻捷以脅魯為魯計者拒其使而不受可也請於天王而討之可也宋公先代之後作賔王家方修盟會而伏兵車執之於壇坫之上又以軍獲遺獻諸侯其橫逆甚矣拒其使而不受聲其罪而致討不患無詞魯於是時曽不能申大義以攘荆楚尊中國故不曰宋捷特魯諱之也十有二月癸丑公會諸侯盟于薄釋宋公榖梁傳不言楚不與楚專釋也蘇氏曰凡諸侯見執而不失國者於歸名之書曰某侯某歸于某此其不名而言釋何也以為執之釋之皆在諸侯也若是而尚可以求諸侯乎二十有二年春公伐邾公作邾婁下同取須句公作朐左氏傳任宿須句顓臾風姓也實司太皥與有濟之祀以服事諸夏邾人滅須句須句子來奔因成風也成風為之言於公曰崇明祀保小寡周禮也蠻夷猾夏周禍也若封須句是崇皥濟而修祀紓禍也二十二年春伐邾取須句反其君焉禮也武夷胡氏傳案左傳須句風姓實司太皥與有濟之祀邾人滅之須句子來奔因成風也公伐邾取須句而反其君焉審如是故得崇明祀保小寡之禮何以書取乎不請於王命而専為母家報怨謀動干戈於邦內擅取人國而反其君是以亂易亂非所以為禮也與收奪者無以異矣夏宋公衛侯許男滕子伐鄭左氏傳三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣泰山孫氏曰鄭即楚故也案莊十六年荆伐鄭二十八年荆伐鄭僖元年楚人伐鄭二年楚人侵鄭三年楚人伐鄭鄭不即楚此而即者齊桓既死宋襄不能與楚抗故也秋八月丁未及邾人公作邾婁人戰于升陘左氏傳邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄冰又曰敬之敬之天惟顯思命不易哉先王之明德猶無不難也無不懼也况我小國乎君其無謂邾小蜂蠆有毒而况國乎弗聽八月丁未公及邾人戰于升陘我師敗績邾人獲公胄縣諸魚門榖梁傳內諱敗舉其可道者也伊川先生解公戰也武夷胡氏傳邾人以須句故出師公卑邾不設備戰于升陘我師敗績邾人獲公胄縣諸魚門記稱邾婁復之以矢蓋自戰于升陘始也魯既敗績邾亦幾亡輕用師徒害及兩國亦異於誅亂禁暴之兵矣故諱不言公而書及內以諱為貶冬十有一月己巳朔宋公及楚人戰于泓宋師敗績左氏傳楚人伐宋以救鄭冬十一月己巳朔宋公及楚人戰于泓宋人既成列楚人未既濟司馬曰彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不禽二毛古之為軍也不以阻隘也寡人雖亡國之餘不鼓不成列子魚曰君未知戰勍敵之人隘而不列天贊我也阻而鼓之不亦可乎猶有懼焉且今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛眀耻教戰求殺敵也傷未及死如何勿重若愛重傷則如勿傷愛其二毛則如服焉榖梁傳春秋三十有四戰未有以尊敗乎卑以師敗乎人者也以尊敗乎卑以師敗乎人則驕其敵襄公以師敗乎人而不驕其敵何也責之也泓之戰以為復雩之恥也雩之恥宋襄公有以自取之伐齊之喪執滕子圍曹為雩之會不顧其力之不足而致楚成王成王怒而執之故曰禮人而不答則反其敬愛人而不親則反其仁治人而不治則反其知過而不改又甚之是謂過襄公之謂也古者被甲嬰胄非以興國也則以征無道也豈曰以報其恥哉劉氏意林宋襄公不厄人於險不鼓不成列此天下所謂至仁大義雖文王之戰不能過之者也而春秋惡之以其好戰而不務夲飭小名而妨大德此無異盜跖之以分均為仁出後為義也彼君子不然正其義不謀其利修其道不急其功子夏為莒父宰問政於孔子孔子曰無欲速無見小利所謂欲速者遺夲者也所謂小利者計末者也蘇氏曰宋公被執見釋而猶爭諸侯楚以夷狄而干諸夏故泓之戰雖曲在宋而春秋詞無所豫武夷胡氏傳物有本末事有終始順事恕施者王政之夲也襄公伐齊之喪奉少奪長使齊人有殺無虧之惡有敗績之傷此晉獻公之所以亂其國者罪一也桓公存三亡國以屬諸侯義士猶曰薄德而一會虐二國之君罪二也曹人不服盍姑省德無闕然後動而興師圍之罪三也凡此三者不仁非義襄公敢行而獨愛重傷與二毛則亦何異盜跖之以分均出後為仁義陳仲子以避兄離母居於陵為廉乎故詞繁不殺而宋公書及以深貶之也二十有三年春齊侯伐宋圍緡榖作閔左氏傳齊侯伐宋圍緡以討其不與盟於齊也杜氏注緡宋邑髙平昌邑縣東南有東緡城武夷胡氏傳齊霸國之餘業也宋襄公既敗于泓荆楚之勢益張矣齊侯既無尊中國攘荆楚恤患災畏簡書之意又乘其約而伐之此尤義之所不得為者也故書伐國而言圍邑以著其罪然則桓公伐鄭圍新城何以不為貶乎鄭與楚合憑陵中國桓公伐之除惡黨也宋與楚戰兵敗身傷齊侯伐之殘中夏也其事異矣美惡不嫌同詞夏五月庚寅宋公兹公作慈父卒左氏傳傷于泓故也辨疑趙子曰公榖見不書葬皆為異説案例凡諸侯葬與不葬從魯會與不會爾無他義秋楚人伐陳左氏傳秋楚成得臣帥師伐陳討其二於宋也遂取焦夷城頓而還冬十有一月把子卒左氏傳書曰子杞夷也杜氏注成公始行夷禮故於卒貶之杞實稱伯仲尼以文貶稱子伊川先生解把二王後而伯爵疑前世黜之也中間從夷故子之後復稱伯武夷胡氏傳案左氏把成公卒書曰子貶之也杜預以謂杞實稱伯而書曰子者成公始棄周禮終其身故仲尼於其卒以文貶之此説是也或曰信斯言是春秋黜陟諸侯爵次以見褒貶不亂名實乎曰春秋固天子之事也而尤謹於內外之辨中國之所以為中國以禮義也禮義既失則人道將滅何以自立于天地哉魯桓篡弒滕首朝之貶而稱子治其黨也內外有辨成公變之貶而稱子存諸夏也二十有四年春王正月夏狄伐鄭左氏傳鄭之入滑也滑人聽命師還又即衛鄭公子士泄堵俞彌帥師伐滑王使伯服遊孫伯如鄭請滑鄭伯怨惠王之入而不與厲公爵也又怨襄王之與衛滑也故不聽王命而執二子王怒將以狄伐鄭富辰諫曰不可王弗聽使頽叔桃子出狄師夏狄伐鄭取櫟襄陵許氏曰近世如唐晉資回紇之力以定中國皆卒為禍此蓋不講於春秋戒周襄之所以出也秋七月冬天王出居于鄭左氏傳王德狄人將以其女為后富辰諫曰不可狄固貪婪王又啓之女德無極婦怨無終狄必為患王又弗聽初甘昭公有寵於惠后惠后將立之未及而卒昭公奔齊王復之又通於隗氏王替隗氏頽叔桃子曰我實使狄狄其怨我遂奉大叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿國人納之秋頽叔桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰王出適鄭處於汜大叔以隗氏居於溫二十五年秦伯師於河上將納王狐偃言於晉侯曰求諸侯莫如勤王晉侯辭秦師而下三月甲辰次于陽樊右師圍溫左師逆王夏四月丁巳王入於王城取大叔於溫殺之於隰城榖梁傳天子無出出失天下也居者居其所也雖失天下莫敢有也常山劉氏曰春秋之時王者政令僅行於畿內才出畿甸即非王有故書曰出聖人之法撥亂世反之正則曰普天之下莫非王土非諸侯所得專也故書曰居武夷胡氏傳自周無出特書曰出者言其自取之也夫鄭伯不王固有罪矣襄王不知自反念其制命之未順也忍小忿昵懿親以扞外侮而棄德崇姦遂出狄師是以疏間親如木之植拔其夲也不亦傎乎王者以天下為家京師為室而四方歸往猶天之無不覆也東周降於列國既不能家天下矣又毁其室而不保則是寄生之君爾貶而書出以為後戒晉侯夷吾卒左氏傳二十三年九月晉惠公卒杜氏注經在明年從赴懷公命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召懷公殺之晉公子重耳之及於難也晉人伐諸蒲城重耳奔狄處狄十二年而行過衛衛文公不禮焉及齊齊桓公妻之及曹曹共公聞其駢脅欲觀其裸浴薄而觀之僖負羈之妻曰子盍早自二焉乃饋盤餐置璧焉公子受餐反璧及宋宋襄公贈之以馬二十乘及鄭鄭文公亦不禮焉及楚楚子送諸秦二十四年春王正月秦伯納之濟河圍令狐入桑泉取臼衰二月甲午晉師軍於廬栁秦伯使公子縶如晉師師退軍於郇辛丑狐偃及秦晉之大夫盟於邭壬寅公子入於晉師丙午入於曲沃丁未朝於武宫戊申使殺懷公於髙梁二十有五年春王正月丙午衛侯燬滅邢左氏傳二十四年衛人將伐邢禮至曰不得其守國不可得也我請昆弟仕焉乃往得仕二十五年春衛人伐邢二禮從國子巡城掖以赴外殺之正月丙午衛侯燬滅邢榖梁傳燬之名何也不正其伐夲而滅同姓也夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦榖梁傳非正也杜氏注伯姬魯女為宋大夫蕩氏妻也自為其子來逆劉氏傳婦人不專行姑為婦逆非禮也然則何以書以公之自主之也劉氏意林伯姬之嫁也固不見經今其來也且何為見經吾以此觀之內女雖親體不敵則不書於䇿不書於䇿所以尊君也今君失其禮以愛易典主大夫之婚是卑朝廷而慢宗廟非安上治民之節也宋殺其大夫襄陵許氏曰凡不稱名姓義在殺大夫也秋楚人圍陳納頓子于頓常山劉氏曰王政不綱天下大亂國君世子大夫歸復廢立不由天子之命唯諸侯之強有力者專之非所謂天吏而擅命興師槩有罪焉然其間善惡淺深則各從乎其文矣頓子迫於陳而出奔故楚人圍陳以納之楚人之近義可見也武夷胡氏傳圍陳納頓子也納云者不與納也諸侯失國諸侯納之正也何以不與乎夫陳先代之後不能以禮安靖鄰國保恤寡小中國諸侯又不能修方伯連帥之職而使楚人納之是蠻荒仗義正諸夏也故書曰楚人圍陳納頓子于頓其責中國深矣此亦正夲自治之意也葬衛文公冬十有二月癸亥公會衛子莒慶盟于洮左氏傳衛人平莒於我十二月盟于洮修衛文公之好且及莒平也杜氏注洮魯地辨疑趙子曰凡事接於魯雖非命卿皆書名陸氏纂例子在喪之稱二十有六年春王正月己未公會莒子衛寧速公作遫盟于向左氏傳公會莒兹平公寧莊子盟于向尋洮之盟也杜氏注向莒地齊人侵我西鄙公追齊師至酅公榖作嶲不公榖並作弗及左氏傳齊師侵我西鄙討是二盟也杜氏注濟北榖城縣西有地名酅下陸氏纂例趙子曰寇至不知追而不及言內之無戒警劉氏傳追之者何逐之也其言弗及何弗者遷辭也為畏而不敢及使若不及然蘇氏曰侵曰人追曰師不可言公追齊人故也武夷胡氏傳凡書追者在境內則譏其不預追戎於濟西是也在境外則譏其深入追齊師至酅是也夏齊人伐我北鄙左氏傳夏齊孝公伐我北鄙公使展喜犒師使受命於展禽齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如縣罄野無青草何恃而不恐對曰恃先王之命昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府大師職之桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功我敝邑用不敢保聚曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還衛人伐齊左氏傳衛人伐齊洮之盟故也公子遂如楚乞師左氏傳東門襄仲臧文仲如楚乞師臧孫見子玉而道之伐齊宋以其不臣也公羊傳乞者何卑辭也曷為以外內同若辭重師也曷為重師師出不正反戰不正勝也榖梁傳乞重辭也何重焉重人之死也非所乞也師出不必反戰不必勝故重之也陸氏纂例趙子曰天子在上諸侯自相請師非禮也榖梁釋乞字之義而不言其大意泰山孫氏曰齊再伐我故公子遂如楚乞師夫國之大小師之衆寡皆有王制不可乞也書者惡魯不能修戎備而外乞師於夷狄常山劉氏曰世之治也兵甲悉統於天子征伐不出於諸侯不得妄舉不得私假世亂反是是以聖人之華雖晉之大命魯之興師一書曰乞所以正王法且抑其強也若公子遂如楚乞師則又譏用外兵伐中國爾武夷胡氏傳衛人報德以怨伐齊之喪助少陵長又遷怒於邢而滅其國不義甚矣公既與其君盟于洮又與其臣盟于向是黨衛也故齊人既侵其西又伐其北齊師固亦非義矣而僖公不能省德自反深思逺慮計安社稷乃乞楚師與齊為敵是以蠻荆殘中國也於義可乎其書公子遂如楚乞師而悉自見矣秋楚人滅夔公作隗下同以夔子歸左氏傳夔子不祀祝融與鬻熊楚人讓之對曰我先王熊摰有疾鬼神弗赦而自竄於夔吾是以失楚又何祀焉秋楚成得臣鬬冝申帥師滅夔以夔子歸杜氏注夔楚同姓國今建平秭歸縣劉氏意林楚人滅夔以夔子歸國滅而虜無不名者國滅罪也虜服屬也而夔何以獨不名夔之所以取滅者乃非其罪故假之也夔曰我先君熊摯有疾鬼神弗赦而自竄於夔吾是以失楚人何祀焉者楚祖鬻熊夔祖熊摰是不得祀焉者也諸侯之祀無過其祖者夔子可謂若於義矣而楚反以是滅之春秋以謂非其罪也故黜楚而伸夔夔雖不幸而實無負於義有王者作興滅國繼絶世則夔庶幾矣武夷胡氏傳楚滅同姓何以不名春秋待夷狄之體也冬楚人伐宋圍緡榖作閔左氏傳宋以其善於晉侯也叛楚即晉冬楚令尹子玉司馬子西帥師伐宋圍緡公以楚師伐齊取榖左氏傳公以楚師伐齊取榖凡師能左右之曰以置桓公子雍於穀易牙奉之以為魯援楚申公叔侯戍之武夷胡氏傳楚強魯弱而能用其師進退在己故特書曰以以者不以者也夫棄好同惡取人之邑為己有失正甚矣患之始必自此始其致危之也公至自伐齊公羊傳公至自伐齊此已取榖矣何以致伐未得乎取榖也曷為未得乎取榖曰患之起必自此始也二十有七年春杞子來朝左氏傳杞桓公來朝用夷禮故曰子公卑杞杞不共也夏六月庚寅齊侯昭卒襄陵許氏曰齊桓既沒諸侯思之如周人思召伯也而孝公不能藉之以興觀其間楚之勝以困宋襄又侵伐魯僖不已與下宋桓魯莊之意正反有以知其為謀不逺霸之所以隳矣秋八月乙未葬齊孝公乙巳公子遂帥師入杞左氏傳秋入杞責無禮也冬楚人陳侯蔡侯鄭伯許男圍宋左氏傳冬楚子及諸侯圍宋宋公孫固如晉告急狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣於是乎搜於被廬作三軍謀元帥使郤縠將中軍春秋集解卷十一
