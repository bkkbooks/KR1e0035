body:
  text: 春秋集解卷四宋吕本中撰桓公七年春二月己亥焚咸丘伊川先生解古者昆蟲蟄而後火田去莽翳以逐禽獸非竭山林而焚之也咸丘地名云焚咸丘如盡焚其地見其廣之甚也杜氏注焚火田也咸丘魯地髙平巨野縣南有咸亭譏盡物故書夏榖伯綏來朝鄧侯吾離來朝左氏傳春榖伯鄧侯來朝名賤之也伊川先生解臣而弒君天理滅矣宜天下所不容也而反天子聘之諸侯相繼而朝之逆亂天道歲功不能成矣故不書秋冬與四年同或曰然則十五年邾人牟人葛人來朝何以書秋冬曰四年與此明其義矣三國之來别立義也杜氏注榖國在南鄉築陽縣北劉氏傳同時而特言之者特見之髙郵孫氏曰以名書者趙子曰用夷禮也武夷胡氏傳春秋之法諸侯不生名榖伯鄧侯何以名桓天下之大惡也執之者無禁殺之者無罪榖伯鄧侯越國踰竟相繼而來朝即大惡之黨也故特貶而書名與失地滅同姓者比焉經於朝桓者或貶爵或書名或稱人以深絶其黨撥亂之法嚴矣誅止其身而黨之者無罪則人之類不相賊殺為禽獸者幾希東萊吕氏曰二年滕子來朝不名杞侯來朝不名何獨於榖伯鄧侯罪而名之乎吕氏曰杜預以謂不書秋冬首月史闕文其説既善矣然謂之史闕文則不可謂之闕文則可矣八年春正月己卯蒸公羊傳蒸者何冬祭也春曰祠夏曰礿秋曰嘗冬曰蒸何氏注薦尚稻雁蒸衆也氣盛貌冬萬物畢成所薦衆多芬芳備具故曰蒸常事不書此何以書譏何譏爾譏亟也亟則黷黷則不敬君子之祭也敬而不黷疏則怠怠則忘劉氏權衡曰春秋欲見五月再蒸故於此不得不書己卯蒸猶將書壬午猶繹者不得不先書有事於太廟也此其實矣又何亟乎伊川先生解冬蒸非過也書之以見五月又蒸為非禮之甚也杜氏注此夏之仲月非為過而書者為下五月復蒸見瀆也陸氏纂例趙子曰周雖以建子為正至於祭祀則用夏時本月以行四時之祭故桓八年正月蒸則夏之仲冬也凡四時之祭皆用孟月若有故及日不吉即用仲月桓八年正月蒸是也泰山孫氏曰蒸冬祭也春興之非禮也祭祀從夏時周之正月夏之十一月也四時之祭用孟月髙郵孫氏曰不書所祭之名而謂之有事若宣八年有事於大廟仲遂卒於垂壬午猶繹失禮者猶繹也祭無譏焉書祭名者罪在祭也蒸己卯之類是也武夷胡氏傳周官大司馬蒸以中冬今魯蒸以春正月其不同何也周書有周月以紀政而其言曰夏數得天百王所同其在商周革命改正示不相沿至於敬授民時巡狩蒸享猶自夏焉然則司馬中冬教大閲獻禽以享蒸所謂自夏而魯之蒸祭在春正月見春秋用周正紀魯事也天王使家父來聘伊川先生解魯桓公弒立未嘗朝覲天王不討而屢使聘之失道之甚也杜氏注家父天子大夫家氏父字武夷胡氏傳下聘弒逆之人而不加貶何也既名冢宰於前其餘無責焉乃同則書重之義以此見春秋任宰相之專而責之備也虞史以人主大臣為一體春秋以天王宰相為一心以為一體故帝庸作歌則曰股肱喜哉無首起哉百工熙哉臯陶賡歌則曰無首明哉股肱良哉庶事康哉而垂益九官之徒不與也以為一心故歸賵仲子會葬成風則宰咺書名於前而王不稱天於後來聘桓公錫桓公命則宰糾書名以正其始王不稱天以正其終而榮叔家父之徒不與也故人主之職在論相而已矣夏五月丁丑蒸公羊傳何以書譏亟也伊川先生解正月既蒸矣而非時復蒸者必以前蒸為不備也其黷亂甚矣武夷胡氏傳春秋之文有一句而包數義者有再書而一貶者戎伐凡伯於楚丘以歸之類一句而包數義春正月己卯蒸夏五月己丑蒸再書而一貶秋伐邾公作邾婁泰山孫氏曰不出主名微者吕氏曰微者也其事不可得而詳也然則何以書曰天子在上諸侯檀相侵伐君子以為無王也春秋所由作也冬十月雨雪公羊傳何以書記異也何異爾不時也何氏注周之十月夏之八月未當雨雪伊川先生解建酉之月未霜而雪書異也祭公來遂逆王后于紀公羊傳祭公者何天子之三公也女在其國稱女此其稱王后何王者無外其辭成矣榖梁傳遂繼事之辭也伊川先生解祭公受命逆后而至魯先行私禮故書來以逆后為遂事責其不虔王命而輕天下之母也陸氏纂例趙子曰言遂逆者譏不躬白於王泰山孫氏曰桓王取后於紀魯受命主之故祭公來謀逆后之期其曰遂逆王后于紀者祭公來謀逆后之期既謀之則當復命於天子命之逆則逆之不可專也祭公不復命於王專逆王后于紀故曰遂以惡之劉氏意林祭公之來命魯以婚姻之事也若是則苟大夫可矣何待於三公三公大任也非所當輕使也任之大而使之輕使祭公得緣其義專命不報遂行如紀由輕重不相副也故王以輕使為失而祭公以遂行為專君令過則臣事放矣九年春紀季薑歸于京師左氏傳凡諸侯之女行唯王后書公羊傳紀季薑歸于京師其辭成矣則其稱紀季薑何自我言紀父母之於子雖為天王后猶曰吾季薑京師者何天子之居也京者何大也師者何衆也天子之居必以衆大之辭言之伊川先生解書王國之事不可用無王之月故書時而已或曰借如正月日食則如何書之曰書春日食則其義尤明也王后之歸天下當有其禮諸侯莫至是不能母儀天下也故書紀女歸而已杜氏注紀季薑桓王后也季字薑紀姓也劉氏意林逆也稱王后歸也稱季薑此言禮之上下取豫進退先後各有所宜而不相悖也公卿謀之諸侯主之龜策諏之天子命之是王后矣然而未見宗廟也未覯君子也未覿羣臣也則不敢居其位其詞順以聽此正始之道王化之本也詩云未見君子憂心惙惙亦既見止赤既覯止我心則説周召之風也吕氏曰史失季薑歸月春秋不得而增益也獨記其春耳夏四月秋七月冬曹伯使其世子射姑來朝左氏傳曹大子來朝賔之以上卿禮也榖梁傳朝不言使言使非正也使世子伉諸侯之禮而來朝曹伯失政矣諸侯相見曰朝以待人父之道待人之子以內為失正矣內失正曹伯失正世子可以已矣則是放命也尸子曰夫已多乎道伊川先生解曹伯有疾不能親行故使其世子來朝春秋之時君疾而使世子出取危亂之道也杜氏注曹伯有疾故使其子來朝武夷胡氏傳案周官典命凡諸侯之適子誓於天子而攝其君則下其君之禮一等未誓則以皮帛繼子男世子固有出會朝聘之儀矣然攝其君繼子男者謂諸侯朝於天子有時而不敢後故老疾者使世子攝已事以見天子急述職也諸侯間於王事則相朝其禮本無時曹伯既有疾何急於朝桓而使世子攝哉大位姦之窺也危病邪之伺也世子君之二也君疾而儲副出啓窺伺之心危道也當享而射姑歎踰月而終生卒其有疾明矣而使世子來終生之過也世子將欲已乎則方命矣曰孝子盡道以事其親者也不盡道而苟焉以從命為孝又焉得為孝故尸子曰夫已多乎道十年春王正月庚申曹伯終生卒泰山孫氏曰此年書王者王無十年不書也十年無王則人道滅矣武夷胡氏傳桓無王今復書王何也十者盈數也天道十年則亦周矣人事十年則亦變矣故易稱守貞者十年而必反傳論逺惡者十年而必棄桓公至是其數已盈宜見誅於天人矣十年書王紀常理也有習於榖梁子而不得其傳者見二年書王以為正與夷之卒此年書王而曹伯適薨遂附益之以為正終生之卒誤矣果正諸侯之卒不緣篡弒者陳侯鮑在五年之正月曷不書王以正其卒乎夏五月葬曹桓公秋公會衛侯于桃丘弗遇榖梁傳弗遇者志不相得也弗內辭也杜氏注衛侯與公為會期中背公更與齊鄭故云獨往而不相遇也桃丘衛地濟北東河南有桃城陸氏纂例趙子曰書弗遇者見衛侯之無信劉氏傳不者正辭也弗者遷辭也吕氏曰公與衛侯為會而衛侯不至故弗遇其無信可知春秋之世專計利害不顧信義如是冬十有二月丙午齊侯衛侯鄭伯來戰于郎左氏傳齊衛鄭來戰于郎我有辭也初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之魯以周班後鄭鄭人怒請師於齊齊人以衛師助之故不稱侵伐先書齊衛王爵也杜氏注鄭主兵而序齊衛下者以王爵次之也伊川先生解三國為主甚其惡也常山劉氏曰戰不言師敗績者敗在內也敗在內何以不言恥也劉氏意林來戰于郎戰者仁人之所惡也有不得已而應之者矣未有得已而先之者也武夷胡氏傳春秋加兵於魯衆矣未有書來戰者此獨不稱侵伐而以來戰為文何也兵凶器戰危事聖人之所重也誅暴禁亂敵加於己蓋有不得已而應之者矣未有悖道縱欲得已不已而先之者也魯桓弒立天下大惡人人之所得討也鄭伯則首盟于越以定其位齊侯則繼會于稷以濟其姦曽不能修方伯之職駐師境上聲罪致討伸天下之大義也今特以私忿小怨親帥其師戰於魯境尚為知類也哉此春秋之所必誅而不以聽也故以三國為主而書來戰于郎鄭人主兵而首齊猶衛州吁主兵而先宋十有一年春正月齊人衛人鄭人盟于惡曹左氏傳春齊衛鄭宋盟于惡曹劉氏傳此大國也皆微者乎非微者也微者之盟不志非微者則其稱人何大夫之交盟於中國自此始故貶之也劉氏意林齊衛鄭相與會盟而君不行委之大夫春秋正本謹始知其後必且有大夫脅君交政之患苟大夫有脅君交政之患則又有陪臣執國於上之禍其勢相召也故於是貶而絶之武夷胡氏傳盟會皆君臣之禮故微者之盟會不志於春秋凡春秋所志必有君與貴大夫居其間者也惡曹之盟即三國之君矣既不以道興師為郎之戰又結怨固黨為惡曹之盟故前書其爵而以來戰著罪後書此盟而以奪爵示貶吕氏曰盟我不與也其曰人不詳也來戰無禮既盟而去動無禮文不可得而詳也夏五月癸未鄭伯寤生卒秋七月葬鄭莊公左氏傳夏鄭莊公卒初祭封人仲足有寵於莊公莊公使為卿為公娶鄧曼生昭公故祭仲立之宋雍氏女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之秋九月丁亥昭公奔衛己亥厲公立杜氏注三月而葬速武夷胡氏傳鄭莊公志殺其弟使糊其口於四方自以為保國之計得也然身沒未幾而世嫡出奔庶孽奪正公子五爭兵革不息忽儀亹突之際其禍憯矣亂之初生也起於一念之不善後世則而象之至於兄弟相殘國內大亂民人思保其室家而不得不亦酷乎有國者所以必循天理而不可以私欲滅之也莊公之事可以為永鑒矣九月宋人執鄭祭仲榖梁傳宋人者宋公也其曰人何也貶之也劉氏權衡曰榖梁曰宋人者宋公也其曰人何也貶之也此非穀梁例也穀梁之例當以稱人執之為是稱侯執之為非向今書宋公執者得無云斥宋公以執祭仲乎且齊人執鄭詹何以獨不曰貶乎文同而義異何哉陸氏纂例曰諸國大夫王賜之畿內邑為號令歸國者皆書族書字同於大夫敬之也鄭祭仲魯單伯陳女叔是也劉氏傳曷為或稱人以執或稱侯以執稱侯以執者伯討之也稱人以執者非伯討也武夷胡氏傳祭仲鄭相也見執於宋使出其君而立不正罪較然矣何以不名命大夫也命大夫而稱字非賢之也乃尊王命貴正卿大祭仲之罪以深責也其意若曰以天子命大夫為諸侯相而執其政柄事權重矣固將下庇其身而上使其君保安富尊榮之位也今乃至於見執廢絀其君而立其非所立者不亦甚乎任之重者責之深祭仲無所逃其罪矣春秋美惡不嫌同詞突之書名則本非有國由祭仲立之也若忽則以世嫡之正至於見逐不能立乎其位貴賤之分亡矣凡此類抑揚其詞皆仲尼親筆非國史所能與而先儒或以從赴告而書者殊誤矣或曰孔父賢而書名則曰禮之大節也今此則名其君於下而字其臣於上何以異乎曰春秋者輕重之權衡也變而不失其正之謂權常而不過於中之謂正宋殤孔父道其常祭仲昭公語其變惟可與權者其知之矣吕氏曰陸淳以為執大夫例稱人不可别為義突歸于鄭榖梁傳突歸于鄭曰突賤之也曰歸易辭也祭仲易其事權在祭仲也死君難臣道也今立惡而黜正惡祭仲也伊川先生解突不稱公子不可以有國也劉氏傳突歸于鄭何病祭仲也祭仲之為人臣也處則不能守出則不能權貪生而好勢廢正以立亂曰突歸于鄭者見突之挈乎祭仲者也歸者順辭也有易辭焉非所順而書歸易也入者逆辭也有難辭焉非所逆而書入難也突之易見祭仲之挈也交惡之劉氏意林突內因強臣之力赤外援戎狄之衆以奪其嫡而禍其宗皆有不仁之心姦桀之材春秋所惡也專治突則祭仲不明專治赤則戎不見故挈其上而易其下其罪一施之所以絶禍本禁首惡也武夷胡氏傳小白入於齊則曰齊小白突歸於鄭何以不稱鄭突乎以小白繫之齊者明桓公之宜有齊也不以突繫之鄭者正厲公不當立也鄭忽出奔衛左氏傳秋九月丁亥昭公奔衛己亥厲公立榖梁傳鄭忽者世子忽也其名失國也劉氏權衡曰榖梁曰其名失國也非也春秋失國者多矣豈皆名之乎伊川先生解忽國之正也不能有其位故不爵常山劉氏曰鄭莊公既葬而忽既立出奔乃名者絶也何則忽鄭之世嫡不能自固其位以至於亡考之於詩其迹備見有女同車則刺無大國之助山有扶蘇則所美非美然籜兮則刺君弱臣強不唱而和狡童則刺不能與賢人圖事權臣擅命也由其不能自固進退之權在於祭仲故宋因而執之武夷胡氏傳或曰詩人刺忽不婚於齊至於見逐欲固其位者必待大國之援乎曰此獨為鄭忽言也如忽之為人苟無大援則不能立爾若夫志士仁人卓然有以自立者進退之權在我矣鄭自五霸之後益以侵削他日子産相焉馳詞執禮以當晉楚至於壞諸侯之館垣却逆女之公子於野皆變其常度以晉楚之強卒莫能屈亦待大國之助乎然則仲見脅忽出奔咸其自取焉爾春秋書法如此欲人自強於為善也柔會宋公陳侯蔡叔盟于折公羊傳柔者何吾大夫之未命者也劉氏權衡曰公羊曰柔者何吾大夫之未命者非也再命耳杜氏注柔魯大夫未賜族者蔡叔蔡大夫叔名也陸氏纂例趙子曰凡大夫特盟公侯非禮也言特者明更有諸侯則可兼大夫也言公侯者明可以會子男也蘇氏曰柔魯大夫之未賜族者也叔蔡大夫之未賜族者也武夷胡氏傳臣與宋公盟于折君與宋公會于夫鍾于闞于虛于龜皆存而不削何其辭費也曰屢盟而長亂數會以厚疑聖人皆存而不削於以見屢盟而卒叛數會而卒離其事可謂著明矣公會宋公于夫鍾公作童冬十有二月公會宋公于闞杜氏注夫鍾郕地闞魯地在東平須昌縣東南十有二年春正月夏六月壬寅公會杞公榖並作紀侯莒子盟于曲池公作毆蛇左氏傳盟于曲池平杞莒也杜氏注曲池魯地魯國汶陽縣北有曲水亭秋七月丁亥公會宋公燕人盟于榖丘左氏傳公欲平宋鄭秋公及宋公盟于句瀆之丘杜氏注句瀆之丘即榖丘杜氏注榖丘宋地燕人南燕大夫髙郵孫氏曰昭三年書北燕伯款出奔齊又稱北燕則燕有二國矣言北燕則有南燕也故杜預於此解燕人為南燕大夫蓋北燕限於山戎自莊二十八年齊桓伐山戎之後始與燕開路於是得通中國此榖丘之會北燕猶為戎所隔未能自通八月壬辰陳侯躍卒杜氏注厲公也壬辰七月二十三日書於八月從赴也公會宋公于虛公作郯杜氏注虛宋地冬十有一月公會宋公于龜杜氏注龜宋地丙戌公會鄭伯盟于武父杜氏注武父鄭地陳留濟陽縣東北有武父城襄陵許氏曰王迹既熄霸統未興諸侯自擅無所稟命觀隱十年見兵革之亂也桓十一年以來見盟會之亂也是以君子不得已於斯民而以禮樂征伐實與桓文故霸統興起則無復此亂諸侯有所一矣吕氏曰此年書盟會之數如此見諸侯無王放恣自若多事屢盟民不堪命如此之極也聖人傷之以為世戒後之君子有意於善者其知慎事守約愛民為急以合聖人之意乎丙戌衛侯晉卒泰山孫氏曰再言丙戌者羡文也十有二月及鄭師伐宋丁未戰于宋左氏傳公欲平宋鄭秋公及宋公盟于句瀆之丘宋成未可知也故又會于虛冬又會于龜宋公辭平故與鄭伯盟于武父遂帥師而伐宋戰焉宋無信也公羊傳戰不言伐此其言伐何辟嫌也惡乎嫌嫌與鄭人戰也此偏戰也何以不言師敗績內不言戰言戰乃敗矣劉氏權衡曰丁未戰于宋公羊曰內不言戰言戰乃敗矣非也若偏戰而內勝何得不言戰若曰內不言敗言戰則敗矣可也武夷胡氏傳既書伐宋又書戰于宋責賂于鄭而無厭屢盟於魯而無信者宋也二國聲其罪以致討故書曰伐夫宋人之罪則固可伐矣然取其賂以立督者魯桓也資其力以篡國者鄭突也無諸已然後可以非諸人春秋之義用賢治不肖不以亂易亂也故又曰戰于宋來戰者罪在彼戰于郎是也往戰者罪在內戰于宋是也十有三年春二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績左氏傳宋多責賂於鄭鄭不堪命故以紀魯及齊與宋衛燕戰不書所戰後也髙郵孫氏曰案經書公會紀侯鄭伯則是紀侯主兵若如左氏之文乃鄭主兵矣此非也趙子亦曰若紀侯助鄭即當戰於宋鄭之境不當在紀也榖梁傳戰稱人敗稱師重衆也其不地於紀也杜氏注衛宣公未葬惠公稱侯以接鄰國非禮也襄陵許氏曰趙氏曰凡諸侯在喪而有境外之事以喪行者稱子以吉行者稱爵志惡之淺深也三月葬衛宣公常山劉氏曰葬自內録也君子怨不棄義怒不廢禮惡不忘親武夷胡氏傳既與衛人戰曷為葬宣公怨不棄義怒不廢禮是知古人以葬為重也夏大水秋七月冬十月十有四年春正月公會鄭伯于曹左氏傳會于曹曹人致餼禮也無冰公羊傳記異也何氏注周之正月夏之十一月法當堅冰無冰者溫也武夷胡氏傳案豳風七月周公陳王業之詩也其詞曰二之曰鑿冰沖沖三之曰納于凌隂四之日其蚤獻羔祭韭周官凌人之職頒冰于夏其藏之也固隂沍寒於是乎取其出之也賔食喪祭於是乎用藏之周用之遍亦理隂陽天地之一事也今在仲冬之月燠而無冰則政治縱弛不明之所致也故書於策夫春秋所載皆經邦大訓而書法若此其察於四時寒暑之變詳矣夏五榖梁傳孔子曰聽逺音者聞其疾而不聞其舒望逺者察其貌而不察其形立乎定哀以指隱桓隱桓之日逺矣夏五傳疑也泰山孫氏曰孔子作春秋專其筆削損之益之以成大中之法豈其曰月舊史之有闕者不隨而刋正之哉此云夏五無月者後人傳之脫漏耳鄭伯使其弟語榖作禦來盟左氏傳鄭子人來尋盟且修曹之會杜氏注子人即弟語也榖梁傳來盟前定也伊川先生解使來盟盟前定矣與髙子不同陸氏纂例趙子曰未盟彼欲之也欲之故來此與外為志同義不書其誰不書內盟者名敵者也名位敵無議嫡簡辭也蘇氏曰凡外大夫來盟於魯內大夫涖盟於他國皆盟其君也武夷胡氏傳來盟稱使則前定之盟也其不稱使如楚屈完齊髙子則權在二子盟不盟特未定也諸侯之弟兄例以字通而書名者罪其有寵愛之私非友于之義也秋八月壬申御廩災乙亥嘗左氏傳秋八月壬申御廩災乙亥嘗書不害也劉氏權衡曰左氏曰書不害也非也記災而書其不害何益於教乎火不害粟此亦物之不為災者於例當不書何故自書於上又自解釋於下乎苟令御廪災在乙亥之後當不復見其不害矣公羊傳御廪之災粢盛委之所藏也御廪災何以書記災也榖梁傳御廪之災不志此其志何也以為唯未易災之餘而嘗可也志不敬也范氏注用火焚之餘以祭宗廟非人子所以盡其心力不敬之大者也天子親耕以供粢盛王后親蠶以供祭服國非無良農工女也以為人之所盡事其祖禰不若以己所自親者也何用見其未易災之餘而嘗也曰甸粟而內之三宫三宫米而藏之御廪夫嘗必有兼甸之事焉壬申御廪災乙亥嘗以為未易災之餘而嘗也髙郵孫氏曰趙子曰此乃大故何得不志泰山孫氏曰嘗秋祭也周之八月夏之六月也其言八月壬申御廪災乙亥嘗者以不時與災之餘而嘗也以不時與災之餘而嘗此桓之不恭也甚矣蘇氏曰災而為害則不嘗善矣災而不害而可以勿嘗乎事之不可以意推者當從史左氏史也冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衛人陳人伐鄭公羊衛人在蔡人上左氏傳宋人以諸侯伐鄭報宋之戰也焚渠門入及大逵伐東郊取牛首以大宫之椽歸為盧門之椽公羊傳以者何行其意也榖梁傳以者不以者也范氏注不以者謂本非所得制今得以之也武夷胡氏傳師而曰以者能左右之以行己意也宋怨鄭突之背已故以四國伐鄭魯怨齊人之侵已故以楚師伐齊蔡怨囊瓦之拘已故以吳子伐楚蔡弱於吳魯弱於楚宋與蔡衛陳敵而弱於齊乃用其師以行己意故特書曰以列國之兵有制皆統乎天子而敢私用之與私為之用以伐人國大亂之道也故榖梁子曰以者不以者也十有五年春二月天王使家父來求車左氏傳非禮也諸侯不貢車服天子不私求財公羊傳王者無求求車非禮也榖梁傳求車非禮也求金甚矣泰山孫氏曰諸侯貢賦不入周室財用不足也常山劉氏曰世之治也天子命貢賦於天下而無敢不從無有求也諸侯奉貢賦於天子而無敢不共不至於來求也世亂反此書者交譏之所以見王室之微而著諸侯之罪也武夷胡氏傳遣使需索之謂求王畿千里租稅所入足以充費不至於有求四方諸侯各有職貢不至於來求以喪事而求貨財已為不可况車服乎經於求賻求車求金皆書曰求垂後戒也夫上有好者下必有甚焉者矣王者有求下觀而化諸侯必將有求以利其國大夫必將有求以利其家士庶人必將有求以利其身皇皇焉唯恐不足未至於篡弒奪攘則不厭矣古之君人者必昭儉德以臨照百官尊卑登降各有度數示等威明貴賤民志既定之後皆安其分而無求兵刑寢矣及侈心一動莫為防制必至於亢不衷官失德亷恥道喪寵賂日章淪於危亡而後止也觀春秋所書則見王室衰亂之由而知興衰撥亂之説矣三月乙未天王崩何氏注桓王也襄陵許氏曰桓紹文勝之弊不反其質而欲恃詐諼以欺天下諸侯弗聽則以兵從之至於覆敗而不暇王室之威靈盡矣夏四月己巳葬齊僖公五月鄭伯突出奔蔡左氏傳祭仲專鄭伯患之使其壻雍糾殺之將享諸郊雍姬知之以告祭仲殺雍糾尸諸周氏之汪夏厲公出奔蔡公羊傳突何以名奪正也伊川先生解避蔡仲而出非國人出之也陸氏纂例啖子曰凡人君奔例書名者罪其失地言不復諸侯也陸氏微旨淳聞於師曰祭仲逐君其惡大矣沒而不書其義何也曰逐君之臣其罪易知也君而見逐其惡甚矣聖人之教在乎端本清源故凡諸侯之奔皆不書所逐之臣而以自奔為名所以警乎人君也鄭世子忽復歸于鄭左氏傳六月乙亥昭公入公羊傳其稱世子何復正也曷為或言歸或言復歸復歸者出惡歸無惡復入者出無惡入有惡入者出入惡歸者出入無惡劉氏權衡曰公羊以為復歸者出惡歸無惡歸者出入無惡非也如忽之奔蓋有不得已亦何惡乎若以為惡猶冇可委未知突之篡國亦何故出入無惡乎伊川先生解稱世子本當立者不能保其位故不爵鄭人謂之狡童又曰狂童恣行其不肖可知陸氏纂例曰復歸之正者莫過於鄭忽劉氏意林忽之出無鄭者也而又不得稱子則忽之可以君國者無幾矣春秋别嫌疑明是非以謂忽雖失道乎固君之世子矣世子者必命於天子者也若側庶因亂得逐而奪之則天下之姦臣縱矣復歸有君臣之異言固不可概舉也以其世也故可言復可言復而不言復者奪其國之意也以其不世也故不可言復不可言復而言復者效其竊取位之意也泰山孫氏曰歸者善也復歸者不善也入者惡也復入者甚惡也忽世嫡當嗣其歸不善者諸侯受國乎天子鄭世子忽其奔也祭仲逐之其歸也祭仲反之以其進退在祭仲而不在天子也髙郵孫氏曰此雖未善然彼之不善者有甚於此不得不少進以見彼之惡也忽之得稱世子非以其德能堪之而見許也蓋示突之不正耳許叔入于許榖梁傳許叔許之貴者也莫宜乎許叔其曰入何也其歸之道非所以歸也范氏注泰曰進無王命退非父授故不書歸同惡之也杜氏注許叔莊公弟也隱十一年鄭使許大夫奉許叔居許東偏鄭莊公既卒乃入居位陸氏微旨啖子曰言入志非其正也字之善興復也劉氏傳何以字賢也何賢爾宜為君也宜為君則其稱入何難也何難焉爾鄭欲滅之逮其亂而後能入也常山劉氏曰許叔蓋因鄭亂而竊入於許也許先王之建國叔不能申正義於天王或求直於大國以反厥邦復先君之宗廟社稷乃竊入焉則許叔之非可見矣國難竊入故難公會齊侯于艾公作鄗榖作髙左氏傳謀定許也邾公作邾婁人牟人葛人來朝公羊傳皆何以稱人夷狄之也何氏注桓公行惡而三人俱朝事之故夷狄之杜氏注牟國今泰山牟縣葛國在梁國寧陵縣東北陸氏纂例雜用夷禮者以人稱之邾人牟人葛人來朝是劉氏意林滕薛之旅見也與邾牟葛無異滕薛之貶輕而邾牟葛之貶重何也曰古之諸侯朝者固曰間於天子之事考禮正刑一德以尊天子焉耳滕薛是也今天王崩魯與三國未嘗奔問弔贈修臣子之職而方沛然以朝禮自處其義上僭是所以責之重也泰山孫氏曰稱人者賤其相與朝弒逆之人貶之也常山劉氏曰董仲舒曰為其天王崩而相朝也斯義得矣秋九月鄭伯突入于櫟左氏傳鄭伯因櫟人殺檀伯而遂居櫟莊公十四年六月傳瑕殺鄭子而納厲公伊川先生解突非正也忽既恣行故國人君之諸侯助之書爵所以戒居正者已不能保則人取之矣書入以見義不容也杜氏注櫟鄭别都也今河南陽翟縣武夷胡氏傳經於厲公復國削而不書獨書入于櫟何也夫制邑之死虢君共城之叛大叔皆莊公所親戒也今又城櫟而置子元焉使昭公不立何謀國之誤也衛有蒲戚而出獻公楚有陳蔡不羮而叛棄疾末大必折有國之害也故夫子行乎季孫曰古者家不藏甲邑無百雉之城遂墮三都以張公室於厲公復國削而不書者若曰既入于櫟則其國已復矣於以明居重馭輕強幹弱枝以身使臂之義為天下與來世之鑒也為國者可不謹於禮乎襄陵許氏曰此詩所謂公子五爭兵革不息者也鄭亂如此春秋弗志志突入櫟而已語曰櫟人實使鄭子不得其位言邑國之大也忽失其政不能制突使斬鄭而居之以生民心此亂根也故君子略其枝葉使世謹夫亂之所生冬十有一月公會公冇齊侯宋公衛侯陳侯于袲公作侈伐鄭左氏傳會于袲謀伐鄭將納厲公也弗克而還杜氏注袲宋地在沛國相縣西南武夷胡氏傳左氏曰將納厲公也弗克而還榖梁曰地而後伐疑詞非其疑也昭公與突之是非邪正亦明矣然昭公雖正其才不足以君一國之人復歸於鄭日以微弱厲公雖篡其智足以結四鄰之援既入于櫟日以盛強諸侯不顧是非而計其強弱始疑於輔正終變而與邪榖梁所謂非其疑者非其疑於為義而果於為不義相與連兵動衆納篡國之公子也故詳書其會地而後言伐以譏之也十有六年春正月公會宋公蔡侯衛侯于曹左氏傳謀伐鄭也泰山孫氏曰未能納突故復會於此夏四月公會宋公衛侯陳侯蔡侯伐鄭伊川先生解突善結諸侯故皆為之致力屢伐鄭也杜氏注蔡常在衛上今序陳下蓋後至武夷胡氏傳春正月會于曹蔡先於衛夏四月伐鄭衛先於蔡王制諸侯之爵次其後先固有序矣在周官大司馬設儀辨位以等邦國猶天建地設不可亂也及春秋時禮制既亡霸者以意之向背為升降諸國以勢之強弱相上下蔡嘗先衛今序陳下者先儒以為後至也以至之先後易其序是以利率人而不要諸禮也豈所以定民志乎後世有以醲賞誘人之趨事赴功以重罰沮人之奉公守正意亦如此夫亂之所由生也則儀位以為階春秋防微杜漸尤嚴於名分考其所書意自見矣吕氏曰會于曹蔡先衛伐鄭衛先蔡蓋當時諸侯皆以一切強弱目前利害為先後不復用周班也春秋因事紀實以見當世之亂無復禮文也秋七月公至自伐鄭伊川先生解不惟告廟又以見勤勞於鄭突也泰山孫氏曰助篡伐正踰時而反冬城向左氏傳書時也辨疑啖子曰案下有十一月縱是同月亦今之九月農功未畢不可興役十有一月衛侯朔出奔齊左氏傳初衛宣公蒸於夷薑生伋子屬諸右公子為之娶於齊而美公娶之生夀及朔屬夀於左公子夷薑縊宣薑與公子朔搆伋子公使諸齊使盜待諸莘將殺之夀子告之使行不可夀子載其旌以先盜殺之伋子至曰我之求也此何罪請殺我乎又殺之二公子故怨惠公十一月左公子泄右公子職立公子黔牟惠公奔齊公羊傳衛侯朔何以名絶曷為絶之得罪於天子也十有七年春正月丙辰公會齊侯紀侯盟于黃左氏傳平齊紀且謀衛故也杜氏注黃齊地二年丙午公會公榖並作及邾公作邾婁儀父盟于趡左氏傳尋蔑之盟也杜氏注趡魯地髙郵孫氏曰及者內為志會者外為志邾儀父魯附庸小國之君非敢盟公公欲與之盟耳此當以及字為定榖有夏字五月丙午及齊師戰于奚榖作郎左氏傳疆事也榖梁傳內諱敗舉其可道者也杜氏注奚魯地泰山孫氏曰此公及齊師戰也不言公者諱之莊九年及齊師戰于乾時僖二年及邾人戰于升陘皆此義也眉山蘇氏曰不書夏闕文也六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡左氏傳蔡桓侯卒蔡人召蔡季于陳秋蔡季自陳歸于蔡榖梁傳自陳有奉焉爾何氏注蔡侯封人無子季次當立封人欲立獻舞而疾害季季辟之陳封人死歸反奔喪思慕三年卒無怨心故賢而字之劉氏傳蔡季者何蔡侯之弟也何以稱字賢也何賢爾其去也以道其反也以禮公子不去國何賢乎季之去權也若季者道足以與權而不亂力足以得國而不居逺而不攜邇而不逼者也髙郵孫氏曰杜預以為桓侯無子故召季而立之案蔡世家及諸侯年表無蔡季嘗立為蔡君之文又莊十年荆敗蔡師于莘以蔡侯獻舞歸相去裁十年之間不容蔡季卒葬與獻舞得立之迹不見於經也癸巳葬蔡桓侯陸氏纂例案史記世本左氏傳蔡之諸君皆諡為侯經則皆稱公者以其私諡與僭同也唯蔡桓侯稱侯蓋告王請諡故特書之明得禮也陸氏微旨啖子曰其稱侯蓋蔡季之賢請諡於王也此言凡諸侯請諡於王王之策書則云諡曰某侯諸國史因而紀之故西周諸侯記傳皆依本爵春秋之時則皆稱公夫子因而書之以明其不請於王也劉氏傳葬者稱公此其稱爵何稱爵禮也稱公非禮也稱爵何以禮稱公何以非禮稱爵者誄之於天子者也稱公者非誄之於天子者也賤不誄貴幼不誄長天子崩誄於郊諸侯薨誄於王大夫卒誄於君武夷胡氏傳或曰葬未有不稱公者其稱侯傳失之爾臣子之於君極其尊而稱之禮也其説誤矣孔子疾子路使門人為臣子曰無臣而為有臣吾誰欺欺天乎曽子疾革而易簀曰吾得正而斃焉斯已矣故終而必安於正人子不以非所得而加之於父是為孝人臣不以非所得而加之於君是為忠極其尊而稱之不正之大者而可以為禮哉及宋人衛人伐邾公作邾婁左氏傳宋志也杜氏注邾宋爭強魯從宋志背趡之盟辨疑趙子曰據例稱及者皆內之志云宋志非也襄陵許氏曰正月與齊為黃之盟而五月戰焉二月與邾為趡之盟而八月伐之詩曰君子屢盟亂是用長豈不然哉冬十月朔日有食之左氏傳十月朔日有食之不書曰官失之也天子有曰官諸侯有曰御曰官居卿以底曰禮也曰御不失曰以授百官於朝辨疑趙子曰凡不書曰或史官闕之或年深寫誤何關曰官曰御乎十有八年春王正月公會齊侯于濼公與公無與字夫人薑氏遂如齊榖梁傳濼之會不言及夫人何也以夫人之伉弗稱數也劉氏權衡濼會時夫人自不在會會畢公更召夫人與之如齊耳杜氏注濼水在濟南歷城縣西北入濟劉氏傳何以不言及夫人伉也猶曰匹夫匹婦之相與云爾劉氏意林公夫人薑氏遂如齊原其禍之所自始以伉言之公子遂季孫行父如齊則以起子赤之弒季孫斯仲孫忌如晉則以起陪臣執國命之禍事之始搆而文已變矣此亦春秋慮患於微除禍於早之情也武夷胡氏傳是年桓公已終復書王者春秋之時諸侯放恣弒君篡國者已列於會則不復致討故魯宣殺惡及視以取國賂齊請會而傳曰會于平州以定公位曹伯負芻殺太子自立見執於晉而曹人請之曰若為有罪則君列諸會矣孔子為此懼作春秋於十八年復書王者明弒君之賊雖身已沒而王法不得赦也又據桓十五年天王崩至是新君嗣位三年之喪畢矣明弒君之賊雖在前朝而古今之惡一也然則篡弒者不容於天地之間身無存沒時無古今皆得討而不赦聖人之法嚴矣已列於會則不致討可乎故曰春秋成而亂臣賊子懼與者許可之辭曰與者罪在公也為亂者文薑而春秋罪桓公治其本也夏四月丙子公薨于齊左氏傳春公將有行遂與薑氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公會齊侯于濼遂及文薑如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乘公公薨於車魯人告於齊請以彭生除之齊人殺彭生杜氏注不言戕諱之也武夷胡氏傳魯公弒而薨者則以不地見其弒今書桓公薨于齊豈不沒其實乎前書公與夫人薑氏如齊後書夫人孫于齊去其姓氏而莊公不書即位則其實亦明矣丁酉公之喪至自齊秋七月冬十有二月己丑葬我君桓公公羊傳賊未討何以書葬讎在外也讎在外則何以書葬君子辭也春秋集解卷四
