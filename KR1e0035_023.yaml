body:
  text: 春秋集解卷二十三宋吕本中撰昭公名稠襄公子景王四年即位諡法咸儀恭明曰昭元年春王正月公即位叔孫豹會晉趙武楚公子圍齊國弱公作酌宋向戌衛齊公作石惡陳公子招蔡公孫歸生鄭罕公作軒虎許人曹人于虢公作漷榖作郭左氏傳春楚公子圍聘於鄭且娶於公孫段氏遂會於虢尋宋之盟也楚令尹圍請用牲讀舊書加於牲上而已杜氏注舊書宋之盟書楚恐晉先歃故欲從舊書加於牲上不歃血晉人許之三月甲辰盟劉氏傳此陳侯之弟招也何以不稱弟諸侯之尊弟兄不得以屬通也諸侯之尊則弟兄曷為不得以其屬通諸侯非始封之君臣諸父昆弟其在朝廷爵以德齒以官體異姓也族人不得以其戚戚君尊尊也武夷胡氏傳諸侯之尊弟兄不得以屬通曰公子者其本當稱者也曰弟者因事而特稱之也會于虢尋宋之盟而經何以不書在宋之盟楚人先歃若曰狎主諸侯則懼晉之先也故圍請讀舊書加於牲上而晉人許之觀其事雖若楚重得志晉少懦矣然春秋不貴修盟晉人以信為本故每書必先趙武三月取鄆公作運左氏傳季武子伐莒取鄆莒人告於會楚告於晉曰尋盟未退而魯伐莒瀆齊盟請戮其使樂桓子欲求貨於叔孫弗與曰我以貨免魯必受師趙孟請諸楚曰魯雖有罪其執事不辟難子若免之以勸左右可也封疆之削何國蔑有主齊盟者誰能辨焉楚人許之乃免叔孫伊川先生解乘莒之亂而取之故隱避其辭夏秦伯之弟針出奔晉左氏傳秦后子有寵於桓如二君於景其母曰弗去懼選杜氏注選數也恐景公數其罪而加戮癸卯針適晉其車千乘書曰秦伯之弟針出奔晉罪秦伯也公羊傳秦無大夫何以書仕諸晉也曷為仕諸晉有千乘之國而不能容其母弟故君子謂之出奔也榖梁傳諸侯之尊弟兄不得以屬通其弟云者親之也親而奔之惡也武夷胡氏傳案左氏秦后子有寵於桓如二君於景夫后子出奔其父禍之而罪秦伯何也春秋以均愛望人父以能友責人兄父母有愛妾猶沒身敬之不衰況兄弟乎兄弟翕而後父母順矣故不曰公子而特稱秦伯之弟云六月丁巳邾公作邾婁子華卒晉荀吳帥師敗狄于大鹵公榖作原左氏傳晉中行穆子敗無終及羣狄於大原崇卒也將戰魏舒曰彼徒我車所遇又厄以什共車必克困諸厄又克請皆卒自我始乃毁車以為行五乘為三伍為伍陳以相離兩於前伍於後專為右角參為左角偏為前拒以誘之翟人笑之未陳而薄之大敗之榖梁傳傳曰中國曰大原夷狄曰大鹵號從中國名從主人杜氏注大鹵大原晉陽縣武夷胡氏傳大鹵大原也案六月宣王北伐之詩其詞曰薄伐儼狁至于大原而詩人美之者謂不窮追逺討及封境而止也然則大原在禹服之內而狄人來侵攘斥宜矣其過在毁車崇卒以詐誘狄人而敗之非王者之師耳使後世車戰法亡崇尚步卒爭以變詐相髙日趨苟簡皆此等啓之矣書敗狄譏之也襄陵許氏曰亂世逐爭竒變滋起兵車重遲寖廢兆此秋莒去疾自齊入于莒莒展輿公榖並無輿字出奔吳左氏傳莒展輿立而奪羣公子秩公子召去疾于齊秋齊公子鉏納去疾展輿奔吳伊川先生解去疾假齊之力以入莒討展輿之罪正也故稱莒遂自立無所稟命故不稱公子自以為公子可立也莒展輿出奔吳為弒君者所立而以國氏者罪諸侯也虢之會雖國亂未預然諸侯與其立矣故欲執叔孫也稱莒展輿見諸侯之與其立也莒氏曰密州以前嵗十一月遇弒展輿順衆人之情而立立而不討賊其罪可知也叔弓帥師疆鄆公作運田左氏傳叔弓帥師疆鄆田因莒亂也杜氏注春取鄆今正其封疆陸氏纂例趙子曰凡疆田而有帥師者皆有難也城亦同此文十二年季孫行父帥師城諸及鄆之類葬邾公作邾婁悼公冬十有一月己酉楚子麇公榖作卷卒楚公子比出奔晉左氏傳冬楚公子圍將聘於鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弒之遂殺其二子幕及平夏右尹子千出奔晉葬王於郟謂之郟敖使赴於鄭伍舉問應為後之辭焉對曰寡大夫圍伍舉更之曰共王之子圍為長杜氏注不以篡弒赴諸侯武夷胡氏傳案左氏楚令尹圍將聘於鄭未出竟聞王有疾而還入問王疾縊而弒之使赴於諸侯應為後之辭曰共王之子圍為長初圍之未動於惡入預夏盟緝蒲為宫設服離衛中國大夫莫不知其有無君之心矣雖以疾赴曷為承偽藏在諸侯之策乎當是時仲尼已生將志於學乃所見之世非祖之所逮聞也又曷為因之而不革乎曰此春秋之所以為春秋非聖人莫能修之者也薨則書薨卒則書卒弒則書弒葬則書葬各紀其實載於簡策國史掌之此史官之所同而凡為史者皆可及也或薨或不薨或卒或不卒或弒或不弒或葬或不葬筆削因革裁自聖心以達王事此仲尼之所獨而遊夏亦不能與焉者也然則郟敖實弒而書卒何歟令尹圍弒君以立中國力所不加而莫能致討則亦已矣至大合諸侯於申與會者凡十有三國其臣舉六王二公之事其君用齊桓召陵之禮而宋向戌鄭子産皆諸侯之良也而皆有獻焉不亦傷乎若革其偽赴而正以弒君將恐天下後世以篡弒之賊非獨不必致討又可從之以主會盟而無惡矣聖人至此憫之甚懼之甚憫之甚者憫中國之衰微而不能振也懼之甚者懼人欲之橫流而不能遏也是故察微顯權輕重而略其篡弒以扶中國制人欲存天理其立義微矣蘇氏曰君弒畏逼而出二年春晉侯使韓起來聘左氏傳春晉侯使韓宣子來聘且告為政而來見夏叔弓如晉左氏傳叔弓聘於晉報宣子也秋鄭殺其大夫公孫黑左氏傳秋鄭公孫黑將作亂欲去遊氏而代其位傷疾作而不果駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乘遽而至使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭專伐伯有而罪一也昆弟爭室而罪二也薰隧之盟女矯君位而罪三也不速死大刑將至七月壬寅縊尸諸周氏之衢劉氏傳稱國以殺大夫者罪纍上也黑有罪其以纍上言之何惡鄭伯也何惡乎鄭伯言不能去有罪以放乎亂也其放乎亂奈何公孫黑伐良霄而逐之君弗誅也以為大夫又與公孫楚爭娶於徐吾氏徐吾氏歸於楚君放楚也而盟諸大夫黑於是自以為卿又將為亂疾作而卧子産使吏數諸其家則幸而勝之云爾冬公如晉至河乃復季孫宿如晉左氏傳夏四月韓須如齊逆女齊陳無宇送女致少薑少薑有寵於晉侯晉侯謂之少齊晉少薑卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉榖梁傳公如晉而不得入季孫宿如晉而得入惡季孫宿也劉氏意林道千乘之國至重也而動不以禮雖為之卑服曲從猶之無益也適得輕焉譬之鄭衛之處子蒙珠玉而過中山之盜也滋益恭而滋益侵耳吾以此觀之為國以禮者處勝人之地矣孔子曰恭而無禮則勞又曰事君數斯辱矣朋友數斯疏矣數猶數數也進之不以禮節者謂之數莊子曰彼於致福未數數然左氏傳曰無日不數於六卿之門皆謂進不以禮泰山孫氏曰公如晉至河乃復者六二年公如晉至河乃復十二年公如晉至河乃復十三年公如晉至河乃復二十一年公如晉至河乃復二十三年公如晉至河有疾乃復定三年公如晉至河乃復是也惟二十三年書有疾明有疾而反餘皆譏公數如晉見距不能以禮自重大取困辱也武夷胡氏傳經書公如晉至河乃復季孫宿如晉而昭公失國之因季氏逐君之漸晉人下比之迹不待貶絶而皆見矣三年春王正月丁未滕子原公作泉卒夏叔弓如滕五月葬滕成公襄陵許氏曰春秋卒葬諸侯有小大之體有褒貶之義有盛衰之變有施報之情無非教也秋小邾子來朝公作小邾婁子左氏傳小邾穆公來朝季武子欲卑之穆叔曰不可曹滕二邾實不忌吾好敬以逆之猶懼其二又卑一睦焉逆羣好也其如舊而加敬焉季孫從之八月大雩左氏傳旱也冬大雨雹北燕伯款出奔齊左氏傳燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖公懼奔齊書曰北燕伯款出奔罪之也武夷胡氏傳案左氏燕簡公多嬖寵欲去諸大夫而立其寵人燕大夫比以殺公之外嬖公懼奔齊書曰北燕伯款出奔齊罪之也君雖不君臣不可以不臣燕伯欲去諸大夫固不君矣而大夫相與比以殺其外嬖是威脅其主而出之也與鬻拳之以兵諫無異而獨罪燕伯何哉大夫國君之陪二以公心選之而不可私也以誠意委之而不可疑也以隆禮待之而不可輕也以直道馭之而不可辱也否則是忽其陪二以自危也晉厲公殺三郤立胥童而弒於麗氏漢隱帝殺楊史立郭允明而弒於趙村衛獻公蔑冢卿而信其左右亦奔夷儀久而後復也故人主不尊陪二而與賤臣圖柄臣者事成則失身而見弒事不成則失國而出奔此有國之大戒也春秋凡見逐於臣者皆以自奔為文正其本之意也而垂戒逺矣四年春王正月大雨雹公榖作雪武夷胡氏傳隂陽之氣和而散則為霜雪雨露不和而散則為戾氣噎霾雹戾氣也隂脅陽臣侵君之象當是時季孫宿襲位世卿將毁中軍專執兵權以弱公室故數月之間再有大變申豐者季氏之孚也不肯端言其事故暴揚於朝歸咎藏永之失夫山谷之氷藏之也周用之也遍亦古者本末備舉燮調之一事耳謂能使四時無愆伏淒苦之變雷出不震無災霜雹則亦誣矣意者昭公遇災而懼以禮為國行其政令無失其民雹之災也庶可禦也不然雖得藏冰之道合於豳風七月之詩其將能乎夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾公作小邾婁子子宋世子佐淮夷會于申左氏傳正月楚子使椒舉如晉求諸侯晉侯欲勿許司馬侯曰晉楚惟天所相不可與爭君其許之乃許楚使楚子問於子産曰晉其許我諸侯乎對曰許君晉君少安不在諸侯其大夫多求莫匡其君在宋之盟又曰如一若不許君將焉用之夏諸侯如楚魯衛曹邾不會鄭伯先待於申六月丙午楚子合諸侯于申椒舉言於楚子曰夏啓有鈞臺之享商湯有景亳之命周武有孟津之誓成有岐陽之搜康有酆宫之朝穆有塗山之會齊桓有召陵之師晉文有踐土之盟君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉王曰吾用齊桓王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六子産曰小國共職敢不薦守獻伯子男會公之禮六楚子示諸侯侈椒舉曰夫六王二公之事皆所以示諸侯禮也今君以汰無乃不濟乎王弗聽伊川先生解晉平公不在諸侯楚於是強為霸者之事泰山孫氏曰中國自宋之會政在大夫諸侯不見者十年此書楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申者楚子大合諸侯於此也楚子得以大合諸侯於此者桓文既死中國不振喪亂日甚幅裂橫潰制在吳楚故也故自是天下之政中國之事皆吳楚迭制之至于平丘召陵之會諸侯雖云再出尋復叛去事無所救不足道也髙郵孫氏曰淮夷之不殊會之者蓋殊會之法施於中國會外裔也晉中國吳外裔也于柤于向是以殊之楚外裔淮夷亦外裔也以外裔會外裔又何殊乎武夷胡氏傳申之會楚子為主而不殊淮夷是在會之諸侯皆外也其意也何楚虔弒麇以立而求諸侯於晉晉人許之中國從之執徐子圍朱方遷賴於鄢城竟莫校畏其強盛則曰晉楚惟天所相不可與爭滅陳不能救則曰陳亡而楚克有之天道也滅蔡而又不能救則曰天將棄蔡以壅楚盈而降之罰也至使窮凶極惡師潰於訾梁身竄於棘里而縊於申亥人不致討而天自討之是責命於天而以人事為無益而勿為也而可乎弒君之賊在春秋時有臣子討之則衛人殺州吁是也有四鄰討之則蔡人殺陳他是也臣子不能討之於內四鄰不能討之於外有與之會以定其位則齊侯及魯宣公會于平州是也有受其賂以免於討則晉侯及諸國會于扈是也然至此極矣則未有不以為賊而又推為盟主相與朝事之以聽順其所為而不敢忤者也故申之會不殊淮夷者以在會諸侯皆為不義之行皆王法之所當斥而不使之得列于中國也吕氏曰自襄公三年雞澤之會諸侯同盟矣而叔孫豹始及諸侯之大夫及陳袁僑盟襄十六年溴梁之會獨大夫盟諸侯不與也至襄二十七年宋之會大夫自會爾諸侯不往也此嵗會于申諸侯始復會而楚子主之淮夷與焉天下之事可知矣楚人執徐子左氏傳徐子吳出也以為二焉故執諸申秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳執齊慶封殺之遂滅賴公榖作厲左氏傳秋七月楚子以諸侯伐吳宋大子鄭伯先歸宋華費遂鄭大夫從使屈申圍朱方八月甲申克之執齊慶封而盡滅其族將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯王使速殺之遂以諸侯滅賴賴子靣縛銜壁士袒輿櫬從之造於中軍遷賴於鄢申無宇曰楚禍之首將在此矣召諸侯而來伐國而克王心不違民其居乎民之不處其誰堪之不堪王命乃禍亂也劉氏權衡曰遂滅賴左氏曰賴子靣縛銜璧非也經所謂滅者固謂君死其位者矣既曰死其位尚能靣縛乎公羊傳其言執齊慶封何為齊誅也杜氏注胡國汝隂縣西北有胡城賴國義陽隨縣蘇氏曰申之諸侯有不與伐吳者故復序九月取鄫榖作繒左氏傳九月取鄫言易也莒亂著丘公立而不撫鄫鄫叛而來杜氏注鄫莒邑劉氏傳其言取之何取附庸之辭也鄫國也曷為謂之附庸莒已滅之矣為附庸乎莒也冬十有二月乙卯叔孫豹卒左氏傳初穆子去叔孫氏及庚宗遇婦人使私為食而宿焉問其行告之故哭而送之適齊娶於國氏生孟丙仲壬及宣伯奔齊魯人召之既立所宿庚宗之婦人獻以雉問其姓對曰余子長矣能奉雉而從我矣召而見之名之曰牛遂使為豎有寵長使為政叔孫田於丘蕕遂遇疾焉豎牛欲亂其室殺孟逐仲疾急命召仲牛許而不召豎牛曰夫子疾病不欲見人使置饋於個而退牛勿進則置虛命徹十二月癸丑叔孫不食乙卯卒牛立昭子而相之仲至自齊豎牛攻之死昭子即位朝其家衆曰豎牛殺適立庶必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外五年春王正月舍中軍左氏傳四年季孫謀去中軍豎牛曰夫子固欲去之五年正月舍中軍卑公室也毁中軍於施氏成諸臧氏杜氏曰季孫不欲親其議敕二家會諸大夫發毁置之計初作中軍三分公室而各有其一季氏盡征之叔孫氏臣其子弟孟氏取其半焉及其舍之也四分公室季氏擇二二子各一皆盡征之而貢於公陸氏纂例譏作舍自己也詳見桓公武夷胡氏傳案左氏舍中軍卑公室也初作三軍三分公室而各有其一及其舍之也四分公室季氏擇二二子各一皆盡征之而貢於公然則三軍作舍皆自三家公不與焉公室益卑而魯國之兵權悉歸於季氏矣兵權有國之司命三綱兵政之本原書其作舍而公孫于齊薨于乾侯定公無正必至之理也已則不臣三綱淪替南蒯叛陽虎專季斯囚而三桓之子孫微矣亦能免乎書曰舍中軍微詞以著其罪也襄陵許氏曰叔孫豹卒毁中軍則公若寄矣以是知豹之有力於公室楚殺其大夫屈申左氏傳楚子以屈申為二於吳乃殺之劉氏傳稱國以殺大夫者罪纍上也屈申之纍上奈何楚人仇吳而疑屈申謂屈申二於吳也而殺之然則屈申之罪何屈申之為人臣也君弒則不能討國亂則不能去北靣而事寇讎足以殺其身而已矣襄陵許氏曰春秋刑案見惡惡以疑罪殺人簡易之道也公如晉左氏傳公如晉自郊勞至於贈賄無失禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家弗能取也有子家羈弗能用也姦大國之盟陵虐小國利人之難不知其私公室四分民食於他思莫在公不圖其終為國君難將及身不恤其所禮之夲末將於此乎在而屑屑焉習儀以亟言善於禮不亦逺乎夏莒牟夷以牟婁及防茲來奔左氏傳夏莒牟夷以牟婁及防茲來奔牟夷非卿而書尊地也莒人訴於晉晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也請歸之間而以師討焉乃歸公公羊傳莒無大夫此何以書重地也其言及防茲來奔何不以私邑纍公邑也榖梁傳以者不以者也來奔者不言出及防茲以大及小也莒無大夫其曰牟夷何也以其地來也以地來則何以書也重地也杜氏注城陽平昌縣西南有防亭姑幕縣東北有茲亭武夷胡氏傳邾莒之大夫名姓不登於史册微也牟夷莒大夫曷為以姓氏通重地也以地叛雖賤必書地以名其人終為不義弗可滅矣其書來奔是接我以利而我入其利兩譏之也為國以義不以利如以利則上下交征而國必危矣為己以義不以利如以利則患得患失亦無所不至矣春秋於三叛人雖賤特書其名以懲不義懼淫人為後戒也邑而言及者公羊所謂不以私邑纍公邑是也吕氏曰牟婁牟夷之私邑防茲則他邑也故言及秋七月公至自晉戊辰叔弓帥師敗莒師于蚡公作濆榖作賁泉左氏傳莒人來討不設備戊辰叔弓敗諸蚡泉莒未陳也杜氏注蚡泉魯地秦伯卒冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳左氏傳冬十月楚子以諸侯及東夷伐吳以報棘櫟麻之役薳射以繁揚之師會於夏汭越大夫常壽過帥師會楚子於瑣聞吳師出薳啓強帥師從之遽不設備吳人敗諸鵲岸楚子以馹至於羅汭吳子使其弟蹶由犒師楚人執之是行也吳早設備楚無功而還以蹶由歸武夷胡氏傳越始見經而與徐皆得稱人何也吳以朱方處齊慶封而富於其舊崇惡也楚圍朱方執齊慶封殺之討罪也吳不顧義入棘櫟麻以報朱方之役怙亂也楚於是以諸侯伐吳則比吳為善而師亦有名其從之者進而稱人可也或者以詞為主而謂不可云沈子徐越伐吳故特稱人誤矣以不可為文詞而進人於越一字褒貶義安在乎六年春王正月杞伯益姑卒左氏傳杞文公卒葬秦景公左氏傳大夫如秦葬景公夏季孫宿如晉左氏傳夏季孫宿如晉拜莒田也杜氏注云謝前年受牟夷邑不見討葬杞文公宋華合比出奔衛左氏傳宋寺人柳有寵大子佐惡之華合比曰我殺之柳聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟於北郭矣公使視之有焉遂逐華合比合比奔衛武夷胡氏傳左氏曰宋寺人栁有寵大子佐惡之華合比請殺之栁聞坎用牲埋書而告公曰合比將納亡人之族既盟於北郭矣公使視之有焉遂逐合比於是華亥欲代為右師乃與栁比從為之徴公使代之宋公寵信閽寺殺世適痤而父子之恩絶逐華合比而君臣之義睽刑人之能敗國亡家亦可畏矣猶有任趙髙以亡秦信恭顯十常侍以亡漢寵王守澄田令孜以亡唐而不知鑒覆車之轍者不亦悲夫凡此類直書而義自見矣秋九月大雩左氏傳旱也楚薳罷公作頗帥師伐吳左氏傳徐儀楚聘於楚楚子執之逃歸懼其叛也使薳泄伐徐吳人救之令尹子蕩帥師伐吳師於豫章而次於乾溪吳人敗其師於房鍾獲宫廏尹棄疾子蕩歸罪於薳泄而殺之襄陵許氏曰敗楚師者非薳泄也而泄代其誅故書薳罷伐吳以正之楚再不競於吳乃弭兵鋒有事陳蔡至復伐徐而國亂吳蓋自是休兵息民國始寖強冬叔弓如楚左氏傳叔弓如楚聘且弔敗也齊侯伐北燕左氏傳十一月齊侯如晉請伐北燕也晉侯許之十二月齊侯遂伐北燕將納簡公晏子曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未嘗可也七年正月癸巳齊侯次於虢燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪二月戊午盟於濡上燕人歸燕姬賂以瑶甕玉櫝斝耳不克而還七年春王正月暨齊平榖梁傳以外及內曰暨陸氏微旨淳聞於師曰爾雅云暨及也又曰暨不及也今據實言之乃是齊及魯平非魯欲之不可言會齊平又不可言齊及我平故書曰暨以明外及內且非魯之志也泰山孫氏曰暨不得已也齊來求平不得已而從之故曰暨且明非魯志也髙郵孫氏曰左氏以為暨齊平者燕也案去年齊侯伐燕左氏見其間無異事故云爾不知外國平書宋人及楚人平是也又襄二十四年我侵齊二十五年齊伐我北鄙齊魯之好遂絶至是和平之後叔孫婼如齊涖盟足明齊魯為此平也武夷胡氏傳我所欲曰及不得已曰暨當是時昭公結婚強吳外附荆楚其與齊平無汲汲之意乃齊求於魯而許之平也故曰暨至定公八年魯再侵齊結大國之怨見復必矣其與齊平非不得已乃魯求於齊而欲求平也故曰及平者聖人之所貴然或以賄賂而結平或以臣下而擅平或以附夷狄而得平或以侵犯大國而急於平則皆罪也考其事而輕重見矣三月公如楚左氏傳楚子成章華之臺願與諸侯落之薳啓強來召公三月公如楚叔孫婼公作舍後同如齊蒞公榖作涖盟榖梁傳蒞位也內之前定之辭謂之蒞外之前定之辭謂之來襄陵許氏曰始暨齊平故盟以結好夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒左氏傳秋八月衛襄公卒榖梁傳鄉曰衛齊惡今曰衛侯惡此何為君臣同名也君子不奪人名不奪人親之所名重其所以來也王父名子也九月公至自楚冬十有一月癸未季孫宿卒左氏傳十一月季武子卒襄陵許氏曰季武子相魯作三軍舍中軍改革公室唯己所利取鄆瀆盟敗諸侯約幾陷名卿以為國憂則知昭公乾侯之禍此其專欲不忌之習非一日矣十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師夏四月辛丑陳侯溺卒左氏傳陳哀公元妃鄭姬生悼大子偃師二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過哀公有廢疾三月甲申公子招公子過殺悼大子偃師而立公子留夏四月辛亥哀公縊榖梁傳鄉曰陳公子招今曰陳侯之弟招何也曰盡其親所以惡招也兩下相殺不志乎春秋此其志何也世子云者唯君之二也云可以重之存焉志之也諸侯之尊弟兄不得以屬通其弟云者親之也親而殺之惡也劉氏權衡曰榖梁曰鄉曰陳公子招今曰陳侯之弟招何也云云此問之非也鄉曰陳公子者乃其常稱耳陸氏纂例齊商人殺舍舍亦兄之子而不言弟者齊昭公已卒則商人無兄故殺君之罪重於兄子故從重者也大子輕於君故於陳招書弟以明其重也詳見桓十二年常山劉氏曰夏四月陳侯溺卒則是陳侯既病可知矣招乘間殺君之嗣志欲取其國爾蓋不特骨肉相殘也武夷胡氏傳此公子招特以弟稱者著招憑寵稔惡而陳侯失親親之道也招以公子為司徒乃貴戚之卿親則介弟尊則叔父號令廢立自己而出莫敢干之者也不能援立嫡冢安靖國家而逢君之惡戕殺偃師以致大寇宗社覆沒罪固大矣陳侯信愛其弟何以為失親親乎尊賢者親親之夲不能擇親之賢者厚加尊寵以表儀公族而徇其私愛施於不令之人以至亡國敗家豈不失親親之道乎其曰陳侯之弟招殺陳世子偃師交貶之也叔弓如晉左氏傳叔弓如晉賀虒祁也杜氏注賀宫成襄陵許氏曰財費廣侈則國貧力役煩勞則民敝締構雕琢輪奐之功盛則恭儉純茂之德衰矣此之謂可弔者也諸侯賀之是以人君得意滋甚則安於亂亡而不自知蓋諛之者衆也志叔弓如晉是已當楚之隆勢專諸夏而晉勿慮圗唯宫室之崇以為安榮平公其可謂志庳矣楚人執陳行人干徴師殺之陳公子留出奔鄭左氏傳干徴師赴於楚且告有立君公子勝訴之於楚楚人執而殺之公子留奔鄭書曰陳侯之弟招殺陳世子偃師罪在招也楚人執陳行人干徴師殺之罪不在行人也陸氏纂例趙子曰三者皆宜見討唯干徴師無罪故稱陳行人以别之也劉氏傳稱人以執者非伯討也此其為非伯討奈何楚人惡公子招而殺干徴師非其罪也古者兵交使在其間可也吕氏曰楚既殺干徴師公子留即出奔未成乎為君也故不曰子秋搜于紅左氏傳秋大搜于紅自根牟至於商衛革車千乘公羊傳搜者何簡車徒也榖梁傳因搜狩以習用武事禮之大者也艾蘭以為防置旃以為轅門以葛覆質以為𣙗流旁握御轚者不得入車軌塵馬候蹄掩禽旅御者不失其馳然後射者能中過防弗逐不從奔之道也靣傷不獻不成禽不獻禽雖多天子取三十焉其餘與士衆以習射於射宫射而中田不得禽則得禽田得禽而射不中則不得禽是以知古之貴仁義而賤勇力也杜氏注紅魯地沛國蕭縣西有紅亭逺疑劉氏傳何以書譏何譏爾搜春事也秋興之非正也搜有常地矣于紅亦非正也然則曷為不言公公不得與於搜爾公曷為不得與於搜三家者專魯而分之政令出焉公民食焉爾劉氏意林姦臣之將蔽其君而奪之也未嘗不先為非禮而動民也搜于紅吾見其反天時矣吾見其易地理矣吾見其悖人倫矣而昭公猶未之悟也至於奔走失其社稷以死豈不哀哉吕氏曰無事而動衆且時失也劉原父以為姦臣將蔽其君而奪之未嘗不先為非禮而動民如此之類皆求之太過陳人殺其大夫公子過左氏傳陳公子招歸罪於公子過而殺之陸氏微旨淳聞於師曰春秋之作本以懲姦慝也夫子以招推罪於過故獨書招殺大子也不書招殺過過之罪自當死冝為國討也襄陵許氏曰過與殺世子者也不書過殺世子招首惡也招首惡則曷為與其討不與其討是以歸之衆也大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐公作瑗左氏傳九月楚公子棄疾帥師奉孫吳圍陳杜氏注孫吳悼天子偃師之子惠公宋戴惡會之冬十一月壬午滅陳榖梁傳楚師滅陳執陳公子招放之於越殺陳孔奐惡楚子也杜氏注復稱公子兄已卒殺陳孔奐招之黨楚殺之泰山孫氏曰陳公子招殺世子之賊也楚子執而放之陳孔奐無罪之人也楚子殺之吁楚靈暴虐無道滅人之國又為淫刑也如此葬陳哀公左氏傳輿嬖袁克殺馬毁玉以葬榖梁傳不與楚滅閔之也泰山孫氏曰十月壬午楚師滅陳此言葬陳哀公如不滅之辭者楚子葬之也不言楚子葬之者不與楚子滅陳而葬哀公故以陳人自葬為文所以存陳也九年陳災同此九年春叔弓會楚子于陳左氏傳叔弓宋華亥鄭遊吉衛趙黶會楚子于陳襄陵許氏曰楚既滅陳威震諸夏是以無所號召而諸國之大夫會之非會禮也故志我焉許遷于夷左氏傳二月庚申楚公子棄疾遷許于夷實城父取州來淮北之田以益之伍舉授許男田然丹遷城父人於陳以夷濮西田益之遷方城外人於許夏四月陳災公羊傳陳已滅矣其言陳火何存陳也榖梁傳此何以志閔陳而存之也陸氏辨疑趙子曰公榖作火左氏作災案前後未有書外火者小事若一一書之固不勝紀諸侯亦當不告也災是天火事大故書之唯宣榭火以樂器之所在書之以示周之所司無人示譏耳此不同其例也故當依左氏為災武夷胡氏傳凡外災告則書今楚已滅陳夷於屬縣使穿封戍為公矣必不遣使告於諸侯言亡國之有天災也何以書於魯國之策乎當是時叔弓與楚子會於陳則目擊其事矣雖彼不來告此不往弔叔弓使畢而歸語陳故也魯史遂書之耳或曰國史所書必承赴告豈有慿使人之言而載之於史者曰周景王崩有尹單猛期之變固無赴告矣叔鞅至自京師言王室之亂也春秋承其言遂書於策亦此類爾仲尼作經存而勿革者蓋興滅國繼絶世以堯舜三代公天下之心為心異於孤秦罷侯置守欲私一人以自奉者所以歸民心合天德也榖梁以為存陳得其旨矣秋仲孫貜如齊左氏傳孟僖子如齊殷聘禮也杜氏注自叔老聘齊至今二十年禮意久曠今修盛聘以無忘舊好冬築郎囿襄陵許氏曰公內制於強臣外輕於大國亂亡危辱兆矣是之勿慮而築郎囿不時孰甚焉春秋集解卷二十三
