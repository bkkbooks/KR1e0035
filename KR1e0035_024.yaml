body:
  text: 春秋集解卷二十四宋吕本中撰昭公十年春王正月夏齊公作晉欒施來奔左氏傳齊惠欒髙氏皆耆酒信內多怨強於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而逞遂見文子則亦授甲矣使視二子則皆將飲酒桓子曰彼雖不信聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏子良曰先得公陳鮑焉往遂伐虎門五月庚辰戰於稷欒髙敗欒施髙強來奔秋七月季孫意公作隱如叔弓仲孫貜帥師伐莒左氏傳秋七月平子伐莒取郠獻俘始用人於亳社臧武仲在齊聞之曰周公其不饗魯祭乎周公饗義魯無義武夷胡氏傳前已舍中軍矣曷為猶以三卿並將乎季氏毁中軍四分公室擇其二二家各有其一至是季孫身為主將二子各率一軍為之副則三軍固在其曰舍之者特欲中分魯國之衆為已私耳以為復古則誤矣襄公以來既作三軍地皆三家之土民皆三家之兵每一軍出各將其所屬而公室無與焉是知雖舍中軍而三卿並將舊額固存矣戊子晉侯彪卒左氏傳晉平公卒九月叔孫婼公作舍如晉葬晉平公左氏傳九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人滕人薛人杞人小邾人如晉葬平公也十有二月甲子宋公成公作戍卒左氏傳冬十二月宋平公卒杜氏注無冬史闕文十有一年春王二公作正月叔弓如宋葬宋平公左氏傳叔弓如宋葬平公也夏四月丁巳楚子虔誘蔡侯般殺之于申楚公子棄公榖作棄疾帥師圍蔡左氏傳楚子在申召蔡靈侯靈侯將往蔡大夫曰王貪而無信唯蔡於感今幣重而言甘誘我也不如無往蔡侯不可三月丙申楚子伏甲而饗蔡侯于申醉而執之夏四月丁巳殺之刑其士七十人公子棄疾帥師圍蔡韓宣子問於叔向曰楚其克乎對曰克哉蔡侯獲罪於其君而不能其民天將假手於楚以斃之何故不克然肸聞之不信以幸不可再也楚王奉孫吳以討於陳曰將定而國陳人聼命而遂縣之今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣公羊傳楚子虔何以名絶曷為絶之為其誘討也此討賊也雖誘之則曷為絶之懷惡而討不義君子不豫也榖梁傳何為名之夷狄之君誘中國之君而殺之故謹而名之也陸氏纂例曰兩罪之故兩書名也陸氏微旨淳聞於師曰般弒君父之賊也誘而殺之何為其不可乎曰楚子內利其國外託討罪故不許其誘而責其詐也夫以大國之力而討小國之逆當聲其罪而伐之倡大義於天下今乃幣重言甘誘而殺之雖曰討賊實取其國蔡侯之罪自不容誅楚子之惡亦已甚矣故聖人名之言其非人君也棄疾不能諫止而又帥師圍蔡從君於昏亦巳甚矣此亦不待貶絶而罪惡見者也武夷胡氏傳世子般弒其君諸侯與通會盟十有三年矣是中國變為夷狄而莫之覺也楚子若以大義倡天下奉詞致討執般於蔡討其弒父之罪而在宫者無赦焉討其弒君之罪而在官者無赦焉殘其身瀦其宮室謀於蔡衆置君而去雖古之征暴亂者不越此矣又何惡乎今虔本心欲圖其國不為討賦舉也而又挾欺毁信重幣甘言詐誘其君執而殺之肆行無道貪得一時流毒於後棄疾以是殺戎蠻商鞅以是紿魏將秦人以是劫懷王傾危成俗天下大亂劉項之際死者十九聖人深惡楚虔而名之也其慮逺矣後世誅討亂臣者或畏其強或幸其弱不以大義興師至用詭謀詐力僥幸勝之若事之捷反側皆懼苟其不捷適足長亂如代宗之圖思明憲宗之紿王辨昧於春秋垂戒之旨矣呂氏曰春秋之作誅意不誅事論實不論名於楚子虔之殺蔡侯般可見學者所宜詳味也五月甲申夫人歸氏薨左氏傳五月齊歸薨杜氏注歸姓大搜于比蒲左氏傳大搜于比蒲非禮也公羊傳簡車徒也劉氏傳常事不書此何以書譏何譏爾喪不二事夫人歸氏薨大搜于比蒲非禮也泰山孫氏曰搜春田也五月不時也時又有夫人之喪武夷胡氏傳其曰大搜越禮也君有重喪國不廢搜不忌君也三綱軍政之本君執此以御其下臣執此以事其上政之大本於是乎在君有三年之戚而國不廢一日之搜則無本矣然則君有重喪喪不二事以簡車徒為非禮也乃有身從金革而無避者獨何歟曰喪不二事大比而簡車徒則廢其常可也有門庭之寇而宗廟社稷之存亡係焉必從權制而無避矣伯禽服喪徐夷並興至於東郊出戰之師與築城之役同日並舉度緩急輕重蓋有不得已焉者矣晉王克用薨梁兵壓境而莊宗決勝於夾寨周太祖殂契丹入寇而世宗接戰於髙平若此者君行為顯親非不顧也臣行為愛君非不忌也惟審於緩急輕重之宜斯可矣仲孫貜會邾公作邾婁子盟于祲祥公作侵羊左氏傳孟僖子會邾莊公盟于祲祥修好禮也杜氏注祲祥地闕秋季孫意公作隱如會晉韓起齊國弱公作酌宋華亥衛北宫他鄭罕公作軒虎曹人杞人于厥憖公作屈銀左氏傳楚師在蔡晉荀吳謂韓宣子曰不能救陳又不能救蔡晉之不能亦可知也巳為盟主而不恤亡國將焉用之秋會于厥憗謀救蔡也晉人使狐父請蔡於楚弗許杜氏注厥憗地闕武夷胡氏傳楚將滅蔡請於楚而弗許晉之不能亦可知矣曷為諸國猶序而大夫無貶乎扈之盟晉侯受賂弗克而還諸侯略而不序亡義利之分也澶淵之會謀救宋災而不討蔡罪大夫貶而稱人魯卿諱而不書失重輕之别也亡義利之分為不仁失輕重之别為不智今晉與諸侯心欲救蔡而力弗加焉則無惡也凡此見春秋眀義利審重輕以恕待人而不求其備矣襄陵許氏曰蔡能嬰城堅不下楚此易助也而厥憖合天下之兵畏不敢救遣使請命示之不能使荆蠻益驕有以量中國之力而卒取之此韓起之罪也卿不足書而書者中國不競苟有善意斯存之矣蓋自是後春秋之譏世益略九月己亥葬我小君齊歸左氏傳九月葬齊歸公不戚晉士之送葬者歸以語史趙史趙曰必為魯郊杜氏注言昭公必出在郊野不能有國叔向曰魯公室其卑乎君有大喪國不廢搜有三年之喪而無一日之戚國不恤喪不忌君也君無戚容不顧親也國不忌君君不顧親能無卑乎殆其失國公羊傳齊歸者何昭公之母也杜氏注齊諡冬十有一月丁酉楚師滅蔡執蔡世子有榖作友以歸用之左氏傳冬十一月楚子滅蔡用隱太子於岡山申無宇曰不祥五牲不相為用况用諸侯乎王必悔之杜氏注用之殺以祭山劉氏傳君存稱世子君沒稱子某君既沒其稱世子何君沒而稱世子者正疑乎不正君子與之繼世焉世子猶世世子也靈公弒其君其子非正也曷為與之繼世春秋之設辭也非其人之謂也蓋其道之謂也楚子虔誘蔡侯般而殺之世子友守國楚師圍之八月而克之不能服於是虐用之古者父母之仇不與共天下寢苫枕戈終身則友之為者盡於世子矣劉氏意林鄭忽疑於失國蔡友疑於不立衛蒯聵疑於出奔春秋正父子之親君臣之禮貶姦逆退不義以此三人者雖道德不足猶可以世其國蓋不登畔人之意也傳曰斯民也三代之所以直道而行其斯之謂與泰山孫氏曰諸侯在喪稱子此言世子有者有未立也案四月丁巳楚子虔誘蔡侯般殺之于申楚公子棄疾帥師圍蔡十有一月丁酉楚師滅蔡執蔡世子有以歸用之有窮迫危懼以至於死此未立可知也故曰世子噫楚子既誘蔡侯般殺之于申又滅蔡執蔡世子有以歸用之甚矣楚靈之惡其若此也武夷胡氏傳內入國而以其君來外滅國而以其君歸皆服而以之易詞也既書滅蔡矣又書執蔡世子有者世子無降服之狀強執以歸而虐用之也世子繼世有國之稱必以此稱蔡有者父母之仇不與共天下與民守國效死不降至於力屈就擒虐用其身而不顧也則有之為世子之道得矣十有二年春齊髙偃帥師納北燕伯于陽左氏傳齊髙偃納北燕伯欵於唐因其衆也杜氏注陽即唐燕别邑中山有唐縣不言於燕未得國都泰山孫氏曰北燕伯三年出奔齊不言納於燕者明未得國都也呂氏曰北燕伯不名劉質夫以謂與襄二十五年衛侯入于夷儀同蓋國其國非臣下所當逐入于夷儀納于陽不名以正其君臣之分也三月壬申鄭伯嘉卒左氏傳三月鄭簡公卒夏宋公使華定來聘左氏傳夏宋華定來聘通嗣君也公如晉至河乃復左氏傳公如晉至河乃復取郠之役莒人訴於晉晉有平公之喪未之治也故辭公公子憖遂如晉榖梁傳季孫氏不使遂乎晉也五月葬鄭簡公杜氏注三月而葬速楚殺其大夫成熊公作然榖作虎左氏傳楚子謂成虎若敖之餘也遂殺之杜氏注成虎令尹子玉之孫與鬬氏同出於若敖宣四年鬬椒作亂今楚子信譖而託討若敖之餘或譖成虎於楚子成虎知之而不能行書曰楚殺其大夫成虎懷寵也劉氏傳稱國以殺大夫者罪纍上也成熊之纍上奈何楚子惡成熊或謂楚子曰是若敖之餘矣若敖之亂國幾亡楚子殺之古者父子兄弟不相及然則是殺無罪者也其以纍上言之何成熊之為人臣也懷寵而安利足以殺其身而已矣秋七月冬十月公子憖公作整出奔齊左氏傳叔仲小南蒯公子憖謀季氏憗告公而遂從公如晉杜氏注憖子仲南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先及郊聞費叛遂奔齊楚子伐徐左氏傳楚子狩於州來次於潁尾使蕩侯潘子司馬督嚻尹午陵尹喜帥師圍徐以懼吳楚子次於乾溪以為之援晉伐鮮虞左氏傳晉荀吳偽會齊師者假道於鮮虞遂入昔陽秋八月壬午滅肥以肥子綿臯歸晉伐鮮虞因肥之役也榖梁傳其曰晉狄之也杜氏注不書將帥史闕文劉氏權衡杜云闕文子謂以殽之戰推之安知非晉恥以詐襲人而不以將帥告乎在殽之戰則以謂晉恥背喪用兵在鮮虞刖以謂史自闕文春秋之義何其駁且至於此也蘇氏曰晉荀吳偽會齊師假道於鮮虞以滅肥遂伐鮮虞晉雖以詐為罪而書曰晉伐鮮虞以夷狄書之過矣晉獻公假道于虞以伐虢因以執虞公其滅虢也書晉師其執虞公也書晉人今伐鮮虞稱人若師可也特書晉深罪之也楚滅陳蔡而晉不救力誠不能君子不罪也能伐鮮虞而不救陳蔡非力不足也棄諸侯也故以夷書之武夷胡氏傳楚奉孫吳討陳因以滅陳誘蔡般殺之因以滅蔡晉人視其殘虐莫能救則亦已矣而效其所為以伐人國是所謂效尢又甚也人之所以為人中國之所以為中國信義而已矣信義一失天下壞亂不可復救禽獸逼人人將相食自春秋术世至於六國亡秦變詐並興傾危成俗河決魚爛不可壅而收之皆失信棄義之明驗也春秋謹嚴於此制治未亂拔本塞源之意豈曰過乎呂氏曰為春秋者以為書州書國書人及書帥師者姓名為褒貶輕重故以晉伐鮮虞不書人與師為外之也以理考之則恐未然夫事有大小則記有詳略史家常法春秋特因是以褒貶垂訓後世爾所謂吾無所隱乎爾也晉伐鮮虞罪在伐人之國以天子在上而諸侯放恣擅行誅討也其事則微故其書亦略晉伐鮮虞略辭也其罪則自見矣故書楚書吳皆略之之辭爾以為逺者有不可得而詳也事之小者亦然皆非所以為褒貶輕重也十五年晉荀吳帥師伐鮮虞如以晉伐鮮虞為狄之則荀吳帥師伐鮮虞何以不外之也以此知詳略之異非褒貶輕重所繫無疑也十有三年春叔弓帥師圍費左氏傳叔弓圍費弗克敗焉平子怒令見費人執之以為囚俘冶區夫曰非也若見費人寒者衣之飢者食之費來如歸南氏亡矣若憚之以威懼之以怒民疾而叛為之聚也平子從之費人叛南氏十四年費人司徒老祁慮癸劫南蒯曰羣臣不忘其君杜氏注君謂季氏畏子以及今三年聼命矣子若弗圗費人不忍其君將不能畏子矣子何所不逞欲請送子請期五日遂奔齊司徒老祁慮癸來歸費陸氏微旨淳聞於師曰凡家臣以邑叛悉不書叛人之名何也曰家臣賤微名不合登於史册也但書大夫圍之則邑叛可知矣且罪大夫無政而使家臣得専邑而叛也克之不書本非他國之邑也劉氏意林周之王必母廢文武之法母過天之道諸侯雖大國孰敢慢其上諸侯必母僭天子其大夫孰陵大夫必母脅其君其陪臣孰叛故南蒯雖以費入齊而春秋未以畔誅蒯非寬蒯弗誅也事有本末法有原省季氏未得以畔名蒯則魯亦未得以強討季氏魯未得以強討季氏則周亦未得以僭絶魯其不正相乘非一日之積矣武夷胡氏傳費內邑也命正卿為主將舉大衆圍其城若敵國然者家臣強大夫弱也語不云乎有一言而可以終身行之者其恕矣夫已所不欲勿施於人所惡於下者無以事上也所惡於上者無以使下也然後家齊而國治矣季孫意如以所惡於下者事其上而不忠於其君以所惡於上者使其下而不禮於其臣出乎爾者反乎爾宜南蒯之及此也春秋之法不書內叛反求諸已而已矣其圍費欲著其實不沒之也呂氏曰圍費費叛也不書叛聖人不以為叛也是時季氏方強公室日微季氏之臣其欲去季氏以張公室未可知也雖處之未當然未可以叛名也所謂處之未當者既事之矣則當以義正之正之不得則去之可也未有假其勢以伐其人以自為正也君子不食姦不蓋不義知其不可則如勿仕而已爾故君子以為未當也夏四月楚公子比自晉歸于楚殺其君虔于乾溪榖作溪楚公子棄公榖作棄疾殺公作弒公子比左氏傳楚子之為令尹也殺大司馬薳掩而取其室及即位奪薳居田遷許而質許圍蔡洧有寵於王王之滅蔡也其父死焉王使與於守而行申之會越大夫戮焉王奪鬬韋龜中犫又奪成然邑而使為郊尹蔓成然故事蔡公杜氏注蔡公棄疾也故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啓越大夫常夀過作亂圍固城克息舟城而居之觀起之死也其子從在蔡事朝吳曰今不封蔡蔡不封矣我請試之以蔡公之命召子干子晳及郊而告之情杜氏注告以蔡公不知謀強與之盟入襲蔡蔡公將食見之而逃觀從使子干食坎用牲加書而速行已徇於蔡曰蔡公召二子將納之與之盟而遣之矣將師而從之衆曰與之乃奉蔡公召二子而盟於鄧依陳蔡人以國楚公子比公子黑肱公子棄疾蔓成然蔡朝吳帥陳蔡不羮許葉之師因四族之徒以入楚殺大子祿及公子罷敵公子比為王公子黑肱為令尹公子棄疾為司馬使觀從從師於乾溪而遂告之且曰先歸復所後者劓師及訾梁而潰王聞羣公子之死也自投於車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠於溝壑矣王曰余殺人子多矣能無及此乎王沿夏將欲入鄢夏五月癸亥王縊於芋尹申亥氏觀從謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子吾不忍俟也乃行棄疾使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣君若早自圖也可以無辱二子皆自殺丙辰棄疾即位名曰熊居葬子干於訾實訾敖公羊傳楚公子棄疾弒公子比大夫相殺稱人此其稱名氏以弒何言將自是為君也陸氏微旨淳聞於師曰不書復入而言歸者明非始謀也以之首惡罪其從亂且敢有其位也所謂原情定罪武夷胡氏傳或曰昭元年楚虔弒立比出奔晉十三年比歸而虔縊於棘圍則比未嘗一日北面事虔為之臣虔又弒立固非比之君矣而書曰比弒其君虔何也曰凡去國出奔而君不以為臣則晉於欒盈是也臣不以為君則公子鱄於衛是也若去國雖久而爵祿有列於朝出入有詔於國不掃其墳墓不收其田里不係纍其宗族即君臣之分猶在也比雖奔晉而晉人以羇待比以國砥祿固楚之亡公子也楚又未嘗錮之如晉之於欒盈比又未嘗不向楚而坐如子鮮之於衛安得以為比非楚臣而虔非比之君乎春秋書比弒其君虔明於君臣之義也為此者宜乎效死不立若國有所歸為曹子臧魯叔肸不亦善乎今乃脅於勢而忘其守怵於利而忘其義被之大惡欲辭而不可得矣為人臣而不知春秋守經事而不知其宜遭變事而不知其權者若此類是也悲夫聖人垂戒之意明矣棄疾立比為王而已為司馬固君比矣而又殺之則宜書曰棄疾弒其君比而曰殺公子比何也初子干歸自晉觀從假棄疾命而召之來則來坎牲加書而強之盟則盟帥四族衆而使之入楚則入殺太子祿而立之為王則王周走而呼於國中謂衆怒如水火而逼之自殺則自殺其行止遲速去就死生皆觀從與國人所為而比未嘗可否之也安得為棄疾之君乎然比兄也黑肱弟也棄疾其季弟也立比為王肱為令尹疾為司馬蓋國人以長幼之序立之也則宜書曰楚人殺比而春秋變文歸獄棄疾者誅其本意在於代比而非討之也所謂輕重之權衡曲直之繩墨而懷惡者亦無所隱其情矣秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾公作邾婁下小邾同子滕子薛伯杞伯小邾子于平丘左氏傳晉成虒祁諸侯朝而歸者皆有二心為取郠故晉將以諸侯來討叔向曰諸侯不可以不示威乃並徵會告於吳秋晉侯會吳子於良水道不可吳子辭乃還七月丙寅合諸侯于平丘杜氏注平丘在陳留長垣縣西南武夷胡氏傳案左氏晉成虒祁諸侯朝而歸者皆有二心齊侯往朝於晉燕而投壺曰寡人中此與君代興晉人知其亦將二也叔向曰諸侯不可以不示威乃並徵會治兵於邾南甲車四千乘遂合諸侯于平丘方是時楚人暴橫陵蔑中華在宋之盟爭晉先歃及虢之會仍讀舊書遂召諸侯為申之舉遷賴於鄢縣陳滅蔡此乃敵國外患臨深履薄恐懼省戒之時其君當倚於法家拂士以德修國政其臣當急於責難陳善以禮格君心內結夏盟外攘夷狄復悼公之業若勿暇也今乃施施然安於不競無憤恥自強之志惟宫室臺榭是崇是飾及諸侯皆二顧欲示威徵會而以兵甲耀之不亦末乎春秋之法制治於未亂保邦於未危貴事之預恥以苟成而不要諸道者也是以深惡此會如下文所貶云明其義者然後知仲尼作經於一臺囿之築一宫室門觀之作必謹而書以重民力其弭亂持危固結人心之慮逺矣八月甲戌同盟于平丘公不與盟左氏傳晉人將尋盟齊人不可晉侯使叔向告劉獻公對曰天子之老請帥王賦元戎十乘以先啓行叔向告於齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討二則有尋盟若皆用命何盟之尋叔向曰晉禮主盟懼有不治奉承齊犧而布諸君君曰余必廢之何齊之有惟君圖之寡君聞命矣齊人懼對曰小國言之大國制之敢不聼從叔向曰諸侯有間矣不可以不示衆八月辛未治兵建而不斾壬申復斾之諸侯畏之邾人莒人訴於晉曰魯朝夕伐我幾亡矣晉侯不見公使叔向來辭子服惠伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也况其率道其何敵之有牛雖瘠僨於豚上其畏不死魯人懼聼命甲戌同盟于平丘公不與盟晉人執季孫意如以歸子服湫從榖梁傳同者有同也同外楚也伊川先生解楚棄疾立諸侯懼之故同盟公不與盟晉罪公不使與盟雖欲辱公然得不與同盟之罪實為幸也陸氏纂例不重言諸侯劉子與盟凡諸侯及王臣盟皆譏也臣無疑君之禮故王臣在會但會而已多不與盟而其時或有王臣與諸侯盟者皆書以示譏泰山孫氏曰自宋之會諸侯不出大夫専盟會者十年至申之會則又甚矣楚子専盟會者又十年矣今晉昭一旦與劉子合諸侯同盟於此者乘楚靈弒逆之禍爾乘楚靈弒逆之禍與劉子合諸侯同盟於此何所為哉此固不足道也自是訖會召陵諸侯復不出者二十四年武夷胡氏傳其書同盟者劉子與盟同懼楚也會與盟同地再書平丘者書之重詞之復其中必有美惡焉見行事之深切著明故詞繁而不殺也主盟中國奉承齊犧而矜其威力恐迫諸侯又信蠻夷之訴絶兄弟之歡求逞私憤間其憂疑如此盟者流及戰國強衆相誇恫疑恐喝恣行陵暴死者十九積習所致有自來矣詞繁而不殺則惡其競力不道為後世鑒也公不與盟臣子之於君父隱諱其恥禮也十二國會于平丘公獨見辭不得與盟斯亦可恥矣曷為直書其事而不隱也晉王此盟德則不競而矜兵甲之威肆脅持之術以諸侯上要天子之老而歃血以中國同惴蠻荆篡立之主而結盟無禮義忠信誠慤之心而以威詐涖之具此五不韙者得不與焉幸也聖人筆削春秋凡魯君可恥者必為之隱諱至會于沙隨而公不得見盟于平丘而公不得與自衆人常情必深沮喪以為辱矣仲尼推明其故自反而縮雖晉國之嚴不可及也彼以其威我以其理彼以其勢我以其義夫何歉乎哉直書其事示後世立身行已之道也其垂訓之用大矣晉人執季孫意公作隱如以歸武夷胡氏傳稱人以執非伯討也自文以來公室微弱三家専魯而季氏罪之首也宿及意如尤為強逼元年伐莒疆鄆十年伐莒取郠中分魯國以自封殖而使其君民食於家其不臣甚矣何以為非伯討乎晉人若案邾莒所訴有無之狀究南蒯子仲奔叛之因告於諸侯以其罪執之請於天子以大義廢之選於魯卿更意如之位收斂私邑為公室之民使政令在君三家臣順則方伯之職修矣今魯與邾通好亦不朝夕伐莒而鄆郠之故又非昭公意也徒以邾莒之言曰我之不共魯故之以遂辭魯君而執意如則是意在貨財而不責其無君臣之義也何得為伯討乎稱人以執罪晉之偷也公至自會公羊傳公不見與盟大夫執何以致會君子不恥不與焉蔡侯廬歸于蔡陳侯吳歸于陳左氏傳楚之滅蔡也靈王遷許胡沈道房申於荆焉平王即位既封陳蔡而皆復之隱太子之子廬歸于蔡悼大子之子吳歸于陳公羊傳此皆滅國也其言歸何不與諸侯専封也榖梁傳此未嘗有國也使如失國辭然者不與楚滅也泰山孫氏曰聖人不作諸侯不振二國之命制在夷狄故也孔子以陳蔡自歸為文所以抑強夷而存中國也武夷胡氏傳楚虔遷六小國於荆山又滅陳蔡而縣之及棄疾即位復諸遷國封蔡及陳隱太子有之子廬歸于蔡悼世子偃師之子吳歸于陳曰歸者順詞也陳蔡昔皆滅矣不稱復歸者不與楚虔之得滅也其稱歸于者國其所宜歸也廬與吳皆亡世子之子也而棄疾封之可謂有奉矣不言自楚者不與楚子之得封也其稱侯者位其所固有也陳列聖之後蔡王室之親見滅於楚虔而諸侯不能救復封於棄疾而諸侯不能與是以夷狄制諸夏也聖人至是懼之甚蓋有不得已焉制春秋為後世法大要天子之事也其義刖以公天下為心興滅國繼絶世異於自私其身欲擅而有之者也故書法如此為天下國家而不封建欲望先王之治難矣冬十月葬蔡靈公榖梁傳變之不葬有三失德不葬弒君不葬滅國不葬然且葬之不與楚滅且成諸侯之事也陸氏纂例國復乃葬二十九月公如晉至河乃復左氏傳公如晉荀吳謂韓宣子曰執其卿而朝其君有不好焉不如辭之乃使士景伯辭公於河吳滅州來左氏傳吳滅州來令尹子旗請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之蘇氏曰州來楚之附庸十有四年春意公作隱如至自晉左氏傳十三年季孫猶在晉子服惠伯私於中行穆子曰魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳於晉穆子告韓宣子乃歸季孫泰山孫氏曰大夫執則致致名不稱氏前見也武夷胡氏傳案左氏季孫猶在晉子服惠伯私於中行穆子曰魯事晉何以不如夷之小國土地猶大所命能具若為夷棄之使事齊楚其何瘳於晉乃歸季孫其始執之為乏邾莒之供而非有扶弱擊強之義也其終歸之為土地猶大所命能具而非有不能救蔡為夷執親之悔也然則晉人喜怒皆以利發其勸沮皆以利行違道甚矣故平丘之會深加貶斥自是而後諸侯不合二十餘年至於召陵又以賄敗十有八國之諸侯而書侵楚以譏之於是晉日益衰外攜內叛不復振矣利之能敗人國家乃如此春秋之深戒也三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒左氏傳秋八月莒著丘公卒郊公不戚國人弗順欲立著丘公之弟庚輿蒲餘侯惡公子意恢而善於庚輿郊公惡公子鐸而善於意恢公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚輿於齊武夷胡氏傳卒自外録者也莒人來赴故魯史書其卒葬自內録者也魯人不往是以闕其葬自昭公以來雖薛杞微國無不會其葬者何獨於莒則不往乎方是時意如専政而莒嘗訴其疆鄆取郠之罪於方伯而見執矣為是怨莒故獨不會其葬也夫怨不棄義惡不忘親怒不廢禮在桓公時雖與衛戰而宣公卒則往葬之不以私故絶吉凶慶弔往來施報之常禮也以此見意如之専恣矣若意如者其傲很修怨敢施於昭公與莒子及其在晉聞除館西河則恐懼逃歸如一匹夫何也小人無禮喜怒勇怯不中節皆若是爾苟不逺之其能國乎冬莒殺其公子意恢劉氏意林郊公不戚其親之憂使意恢得緣以窺覦意恢不隱其兄之惡使蒲餘侯得緣以専禍是上下交失也書不云乎于弟不念天顯乃疾厥兄兄亦不念鞠子哀大弗友于弟惟弔兹不于我政人得罪蓋痛之矣聼訟蔽獄可勿熟察邪高郵孫氏曰公榖之説皆以為曹莒無大夫蓋曹莒小國其君之爵才當大國之大夫其大夫之位才當大國之士春秋諸侯之士皆不書名故曹莒大夫之名不得見於經也其有事繫懲勸法當書者則雖賤而名之邾庶其黑肱莒牟夷意恢是也襄陵許氏曰公子鐸首亂而無見焉者春秋書法表見王道而已不誅其人若鐸類者多矣此意自韓愈發之也十有五年春王正月吳子夷末公作昧卒二月癸酉有事于武宫籥入叔弓卒去樂卒事左氏傳二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也陸氏辨疑啖氏曰宗廟大事大夫卒小事以禮言之應待祭畢又禮記稱衛侯曰栁莊者非寡人之臣也社稷之臣也如其卒雖當祭必告據此足明常禮不當告髙郵孫氏曰武宮者廢廟也成六年立之於是有事焉而大夫卒去樂卒事則合禮矣然武宮之事則不當有者春秋因變禮而推言之常山劉氏曰禮曰衛有太史曰栁莊寢疾公曰若疾革雖當祭必告然則當祭而卿佐死不當告也告則不能祭而禮不成矣夫宗廟之祭盡其誠敬而已聞臣佐之喪而不能成豈禮也哉且籥已入矣至於不得已而去樂卒事皆由告故也故書以示譏武夷胡氏傳案曽子問君在祭不得成禮者夫子語之詳矣而無有及大臣者是知祭而去樂不可也有事於宗廟遭大夫之變則以聞可乎案禮衛有大史栁莊寢疾君曰若疾革雖當祭必告是知祭而以聞不可也禮莫重於當祭大夫有變而不以聞則內得盡其誠敬之心於宗廟外全其隱恤之意於大臣是兩得之也然則有事於宗廟大臣涖事籥入而卒於其所則如之何禮雖未之有可以義起也有事於宗廟大臣涖事籥入而卒於其所去樂卒事其可也緣先祖之心見大臣之卒必聞樂不樂緣孝子之心視已設之饌必不忍輕徹故去樂而卒事其可也宗廟合禮者常事不書苟以為可則春秋何書乎此記禮之變而書之者也夏蔡朝公作昭吳出公無出字奔鄭左氏傳楚費無極害朝吳之在蔡也欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請又謂其上之人曰王唯信吳故處諸蔡二三子莫之如也而在其上不亦難乎弗圖必及於難夏蔡人逐朝吳朝吳出奔鄭王怒無極對曰臣豈不欲吳然而前知其為人之異也吳在蔡蔡必速飛去吳所以翦其翼也武夷胡氏傳朝吳蔡之忠臣雖不能存蔡而能復蔡其從於棄疾者謂蔡滅而棄疾必能封之也棄疾以其忠於舊君而信之使居舊國可謂知所信矣則曷為出奔費無極害其寵也無極楚之讒人去朝吳出蔡侯朱喪大子建殺連尹奢屛王耳目使不聰明卒使吳師入郢辱及宗廟讒人為亂可不畏乎為國有九經而尊賢為上勸賢有四事而去讒為首志朝吳出奔而入郢之師兆矣然朝吳身居舊國處危疑之地苟有譖之者則王不能無動也能以忠信自任而杜讒諂之謀則善矣而費無極乃語之曰子亦長矣而在下位辱也欲為之請以名利纍其心而莫之覺不智亦甚矣故特書其出奔以罪吳為後戒也六月丁巳朔日有食之秋晉荀吳帥師伐鮮虞左氏傳晉荀吳帥師伐鮮虞圍鼓鼓人或請以城叛穆子弗許曰或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何如其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城鼓人告食竭力盡而後取之以鼓子鳶鞮歸武夷胡氏傳晉滅潞氏甲氏及再伐鮮虞皆用大夫為主將而或稱人或稱國或稱其名氏何也以殄滅為期而無矜惻之意則稱人見利忘義而以狄道欺詐行之則稱國以正兵加敵而不納其叛臣則稱名氏夫稱其名氏非褒之也才免於貶耳而春秋用兵禦狄之略咸見矣冬公如晉左氏傳冬公如晉平丘之會故也春秋集解卷二十四
