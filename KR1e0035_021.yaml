body:
  text: 春秋集解卷二十一宋吕本中撰襄公十有八年春白狄來左氏傳春白狄始來公羊傳曰狄者何夷狄之君也何以不言朝不能朝也劉氏意林諸侯間於天子之事則相朝相朝者考禮正刑一德以尊王室為之也是以春秋亦豫其朝夫蕃服於中國無事焉其於天子世一見則諸侯雖善其交際不得而通也是以春秋亦不豫其朝不豫其朝者懲淫慝一內外也周公致太平越裳氏重九譯而獻其白雉周公曰君子德不及焉不享其贄此乃天子而讓也況列國之君守藩之臣乎夏晉人執衛行人石買左氏傳晉人執衛行人石買於長子執孫蒯於純留為曹故也杜氏注石買即是伐曹者冝即懲治本罪而晉因其為行人之使執之故書行人以罪晉劉氏傳稱人以執者非伯討也此其為非伯討奈何衛孫蒯淫獵於曹曹人閉門詬之孫蒯怒使石買帥師以伐曹曹人訴諸晉石買以君命聘於晉晉人執之晉能知石買之伐曹為惡矣而未能知孫蒯之逐其君為惡也蒯者曷為者也孫林父之子也是始惡於君而逐之秋齊師榖作侯伐我北鄙襄陵許氏曰齊人四年之間五伐鄙而四圍邑又從邾莒以助其虐諸侯之陵暴未有若是者也是以動天下之兵幾亡其國冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊左氏傳秋晉侯伐齊冬十月會於魯濟尋溴梁之言同伐齊齊侯禦諸平隂塹防門而守之廣里范宣子告析文子曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之使乘車者左實右偽以斾先輿曳柴而從之齊侯見之畏其衆也乃脫歸丙寅晦齊師夜遁十一月丁卯朔入平隂遂從齊師晉人欲逐歸者魯衛請攻險己卯荀偃士丐以中軍克京兹乙酉魏絳欒盈以下軍克邿趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之萩雍門齊城門己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木壬寅焚東郭北郭齊侯駕將走郵棠太子與郭榮叩馬曰師速而疾略也將退矣君何懼焉抽劒斷鞅乃止甲辰東侵及濰南及沂伊川先生解書同圍見諸侯之惡齊劉氏傳會者聚辭也既曰會矣又曰同圍齊何同圍之者猶曰環之也環之者何不通也諸侯之軍四分或焚其郛或攻其門譬如棲之者然此蓋伐也曷為不言伐圍不言伐也泰山孫氏曰齊為不道數侵諸侯故諸侯同圍之言同者諸侯同心疾齊也武夷胡氏傳凡侵伐圍入未有書同者而獨於此書同圍齊何也齊環背盟棄好陵虐神主肆其暴橫數伐鄰國觀加兵於魯則可見矣諸侯所共惡疾故同心而圍之也同心圍齊其以伐致何也見齊環無道冝得惡疾大諸侯之伐而免其圍齊之罪辭也春秋於此有沮橫逆抑強暴之意孟子曰國必自伐而後人伐之自作孽不可逭其齊侯環之謂矣尚誰懟哉曹伯負芻卒于師楚公子午帥師伐鄭左氏傳鄭子孔欲去諸大夫將叛晉而起楚師以去之使告子庚子庚弗許楚子聞之使楊豚尹宜告子庚曰國人謂不榖主社稷而不出師死不從禮不榖即位於今五年師徒不出人其以不榖為自逸而忘先君之業矣子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之若可君而繼之不可收師而退可以無害子庚帥師治兵於汾於是子蟜伯有子張從鄭伯伐齊子孔子展子西守二子知子孔之謀完守入保子孔不敢會楚師楚師伐鄭次於魚陵右師城上棘遂涉潁次於旃然蒍子馮公子格率鋭師侵費滑胥靡獻於雍梁右回梅山侵鄭東北至於蟲牢而返子庚門於純門信於城下而還涉於魚齒之下甚雨及之楚師多凍役徒幾盡十有九年春王正月諸侯盟于祝柯公作阿左氏傳春諸侯還自沂上盟於督揚曰大母侵小督揚即祝柯也杜氏注前年圍齊之諸侯也祝柯縣今屬濟南郡髙郵孫氏曰諸侯已圍齊而為祝柯之盟不序諸侯者前目後凡也晉人執邾子左氏傳執邾悼公以其伐我故劉氏傳稱人以執者非伯討也此其為非伯討奈何邾人伐魯晉人疾焉執其君以劫其地然則曷為不言以歸舍之也曷為舍之未得其地故劫之已得其地故舍之公至自伐齊劉氏傳此圍也其以伐致何圍而以伐致者以伐告也取邾田自漷水左氏傳遂次於泗上疆我田取邾田自漷水歸之於我杜氏注取邾田以漷水為界也漷水出東海合鄉縣西南經魯國至髙平湖陸縣入泗泰山孫氏曰諸侯土地受之天子不可取也言取惡內也自漷水者隨漷水為界也蘇氏曰成二年晉人敗齊於鞍使齊人歸我汶陽之田書曰取汶陽田不言齊魯地也今以晉命取田於邾故書曰取邾田自漷水言非魯地也季孫宿如晉左氏傳季武子如晉拜師葬曹成公夏衛孫林父帥師伐齊左氏傳晉欒魴帥師從衛孫文子伐齊杜氏注經書夏秋七月辛卯齊侯環公作瑗卒左氏傳夏五月壬辰晦齊靈公卒經書七月辛卯晉士丐帥師侵齊至榖聞齊侯卒乃還左氏傳晉士丐侵齊及榖聞喪而還禮也公羊傳還者何善辭也何善爾大其不伐喪也杜氏注詳録所至及還者善得禮陸氏纂例士丐聞齊侯卒乃還歸父還皆不當更往又並合禮故曰還事畢也善辭也還例見莊八年宣十八年劉氏傳還者何善辭也何善爾古之為師也不伐喪大夫以君命出境有可以安社稷利國家者則專之可也榖者齊地也其曰至榖而後稱其義也非齊地則勿復乎曰止師而請之君曰可而後止不可則復之期可而後止臣之事君也凡在國無專焉子之事親也凡在家無專焉臣子大節也蘇氏曰將在軍君命有所不受有善而專之君與有焉必君命而後可則安用將矣常山劉氏曰天下無王諸侯擅命征伐各自己出利人之難以成其私故伐人之喪者比比而是而士丐乃有惻隱之心愍人之患還師不侵豈不善乎武夷胡氏傳喪必不可伐非進退可疑而待請者八月丙辰仲孫蔑卒齊殺其大夫髙厚左氏傳齊侯娶於魯曰顏懿姬無子其姪騣聲姬生光以為太子諸子仲子戎子戎子嬖仲子生牙屬諸戎子戎子請以為太子許之仲子曰不可光之立也列於諸侯矣公曰在我而已遂東太子光使髙厚傳牙以為太子夙沙衛為少傳齊侯疾崔杼微逆光疾病而立之光殺戎子秋八月齊崔杼殺髙厚於灑藍而兼其室劉氏傳稱國以殺大夫者罪纍上也髙厚之纍上奈何齊靈公廢太子光以牙為太子髙厚傅之靈公疾崔杼微逆光靈公卒光即位於是殺髙厚也鄭殺其大夫公子嘉公作喜左氏傳鄭子孔之為政也專國人患之乃討西宫之難與純門之師子孔當罪以其甲及子革子良氏之甲守甲辰子展子西率國人伐之殺子孔而分其室武夷胡氏傳不稱鄭人者嘉則有罪矣而子展子西不能正以王法肆諸市朝與衆同棄乃利其室而分之有私意焉故稱國以殺而不去其官此春秋原情定罪之意冬葬齊靈公城西郛左氏傳城西郛懼齊也叔孫豹會晉士丐于柯左氏傳齊及晉平盟於大隧故穆叔會范宣子于柯杜氏注魏郡內黃縣東北有柯城襄陵許氏曰宣十五年書仲孫蔑會齊髙固于無婁成五年書叔孫僑如會晉荀首于榖襄十九年書叔孫豹會晉士丐于柯以見政在大夫列國之事如此非正也故屢譏之城武城左氏傳穆叔歸曰齊猶未也不可以不懼乃城武城杜氏注泰山南武城縣二十年春王正月辛亥仲孫速公作遫下同會莒人盟于向左氏傳春及莒平孟莊子會莒人盟子向督揚之盟故也杜氏注向莒邑夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵左氏傳夏盟于澶淵齊成故也杜氏注澶淵在頓丘縣南今名繁汙此衛地又近戚田秋公至自會仲孫速公作遫帥師伐邾左氏傳邾人驟至以諸侯之事弗能報也秋孟莊子伐邾以報之泰山孫氏曰仲孫速背澶淵之盟伐邾蔡殺其大夫公子燮榖作濕蔡公子履奔楚左氏傳蔡公子燮欲以蔡之晉蔡人殺之公子履其母弟也故出奔楚初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮求從先君以利蔡不能而死劉氏傳稱國以殺大夫者罪纍上也公子燮之纍上奈何蔡莊侯欲受盟於晉未能行而卒公子燮請從先君國人不欲於是殺公子燮請從先君何以為有罪非其力也而任之非其民之欲也而強之燮之智足以殺其身而已矣武夷胡氏傳公子燮謀君之合於義者也國人乃不順焉而殺燮此何罪矣故稱國以殺而不去其官公子履其母弟也進不能正國退不能逺害懼禍而奔從於南蠻書者罪之也陳侯之弟黃公榖作光出奔楚左氏傳陳慶虎慶寅畏公子黃之逼訴諸楚曰與蔡司馬同謀楚人以為討公子黃出奔楚榖梁傳諸侯之尊弟兄不得以屬通其弟云者親之也親而奔之惡也陸氏纂例稱弟者罪其兄也非兄之罪則曰公子叔老如齊左氏傳齊子初聘於齊禮也冬十月丙辰朔日有食之季孫宿如宋左氏傳冬季武子如宋報向戌之聘也二十有一年春王正月公如晉左氏傳公如晉拜師及取邾田也謝十八年伐齊之師漷水之田邾庶其以漆閭丘來奔左氏傳邾庶其以漆閭丘來奔季武子以公姑姊妻之皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜武仲曰不可詰也紇又不能季孫曰我有四封而詰其盜何故不可子為司寇將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜紇也聞之在上位者灑濯其心一以待人軌度其信可明徴也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎庶其非卿也以地來雖賤必書重地也榖梁傳以者不以者也來奔者不言出舉其接我者也杜氏注二邑在髙平南平陽縣東北有漆鄉西北有顯閭亭陸氏纂例以地來奔即叛也陸氏微旨不言叛為內諱也受叛臣非也故諱以示譏也武夷胡氏傳庶其邾大夫也春秋小國之大夫不書其姓氏微也其以事接我則書其姓氏謹之也莒慶以大夫即魯而圖婚接我不以禮者也邾庶其以地叛其君而來奔接我不以義者也以欲敗禮則身必危以利棄義則國必亂春秋禮義之大宗故小國之大夫接我以利欲則特書其姓氏謹之也漆一邑閭丘一邑而不言及者庶其之私邑所受於君而食之者也此叛臣何以不書叛書名書地而竊邑叛君之罪見矣夫棄夷狄從諸夏其慕義之心疑可與也然有據城以求援者君子猶以為不可受而況鄰國乎書來奔而魯受叛臣納其地之罪亦見矣襄陵許氏曰書以邑奔邑叛自襄始大夫盛強故也夏公至自晉秋晉欒盈出奔楚左氏傳欒桓子娶於范宣子生懷子范鞅以其亡也怨欒氏桓子卒欒祁與其老州賔通幾亡室矣懷子患之祁懼其討也訴諸宣子曰盈將為亂范鞅為之徴懷子好施士多歸之宣子畏其多士也信之懷子為下卿宣子使城著而遂逐之秋欒盈出奔楚劉氏意林不以范丐逐之為文而以盈之自出為説使盈無可逐之釁則丐不得逐矣丐之罪易見盈之失難知此春秋所以深探其情而大正其本也道莫難於治天下而天下之治在國國之治在家家之治在身身不治國家不可得治也詩之首周召書之首堯舜皆從此生矣春秋述堯舜者也是以謹於人道之始閨門之內易曰間有家悔亡家之不間悔不亦冝乎九月庚戌朔日有食之冬十月庚辰朔日有食之襄陵許氏曰日比年食又比月食蓋自是八年之間而日七食禍變重矣曹伯來朝左氏傳冬曹武公來朝始見也公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾公作邾婁子于商任左氏傳會于商任錮欒氏也杜氏注商任地闕蘇氏曰錮欒氏非禮也古者大夫去國君使人導之出疆又先於其所往襄陵許氏曰欒氏之出非其罪也徒以權臣私相忌惡何有於國而平公受其蔽怒勤動諸侯以逞范鞅之積憾必欲使盈無所容於世故盈發憤卒興禍亂此皆以私敗公足為古今至戒是時中國無事晉無所發政而亟會諸侯則知徒以欒氏傳不誣也二十有二年春王正月公至自會夏四月秋七月辛酉叔老卒杜氏注子叔齊子冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子公榖有滕子薛伯杞伯小邾子于沙隨左氏傳秋欒盈自楚適齊晏平仲言於齊侯曰商任之會受命於晉今納欒氏將安用之弗聽冬會于沙隨復錮欒氏也欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼武夷胡氏傳會于商任錮欒氏也會于沙隨復錮欒氏也古者大夫去國君不掃其社稷不係纍其子弟不收其田邑使人導之出疆又先之於其所往敕五典厚人倫也今晉不念欒氏世勳而逐盈又將搏執之而命諸侯無得納焉則亦過也楚逐申公巫臣子反請以重幣錮之楚子曰止彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉其賢於商任沙隨之謀逺矣公至自會楚殺其大夫公子追舒左氏傳楚觀起有寵於令尹子南未益祿而有馬數十乘王遂殺子南於朝轘觀起於四境蘇氏曰追舒為令尹寵觀起未益祿而有馬數十乘楚人患之故誅追舒罪不至死故稱國以殺二十有三年春王二月癸酉朔日有食之三月乙巳杞伯丐卒左氏傳春杞孝公卒夏邾卑公作鼻榖作畀我來奔杜氏注畀我是庶其之黨泰山孫氏曰此言邾畀我來奔者惡內也惡鄉受邾叛人邑今又納邾叛人也葬杞孝公陳殺其大夫慶虎及慶寅陳侯之弟黃公榖作光自楚歸于陳左氏傳陳侯如楚公子黃訴二慶於楚楚人召之使慶樂往殺之慶氏以陳叛夏屈建從陳侯圍陳陳人城板隊而殺人役人相命各殺其長遂殺慶虎慶寅楚人納公子黃榖梁傳陳殺其大夫慶虎及慶寅稱國以殺罪纍上也及慶寅慶寅纍也劉氏傳稱國以殺其大夫者罪纍上也慶虎之纍上奈何慶虎為無道暴蔑其君而去其親慶虎之為人臣也足以殺其身矣然而暴虐其君而去其親三年國幾亡者陳侯則實使之也其言及慶寅何以罪及之也寅慶虎之族也武夷胡氏傳人君擅一國之利勢使權臣暴蔑其身而不能逺欲去其親而不能保譖訴之於大國而不能辨至因夷狄之力然後能克則非君人之道也故二慶之死稱國以殺公子黃之出特以弟書者譏歸陳侯也凡此皆春秋端本之意吕氏曰慶虎慶寅之罪不等故言及晉欒盈復入于晉入于曲沃左氏傳晉將嫁女於吳齊侯使析歸父媵之以藩載欒盈及其士納諸曲沃欒盈夜見胥午而告之伏之而觴曲沃人樂作午言曰今日得欒孺子何如對曰得主而為之死猶不死也皆歎有泣者爵行又言皆曰得主何二之有盈出遍拜之四月欒盈帥曲沃之甲因魏獻子以晝入絳樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宫必無害也欒氏所得其唯魏氏乎而可強取也宣子奉公以如固宫范鞅逆魏舒則成列既乘將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣遂超乘驅之宣子逆諸階賂之以曲沃欒氏乘公門宣子謂鞅曰矢及君屋死之鞅用劒以帥卒欒盈奔曲沃晉人圍之劉氏傳曷為不言叛不言叛者非叛者也其非叛奈何劫衆以敵君則亂而已矣蘇氏曰不書自齊何也齊之納盈非以兵明納之也辟如盜賊私納之耳故不書自齊武夷胡氏傳欒氏晉室之世臣故盈雖出奔猶繫於晉復入者甚逆之辭為其既絶而復入也曲沃者所食之地當是時權寵之臣各以利誘其下使為之用至於殺身而不避莫知有君臣之分者也故聞語欒孺子者則或泣或歎以為得主而為之死猶不死也盈從之遂入絳乘公門若非天棄欒氏又有范鞅之謀晉亦殆矣原其失在於錮之甚急使無所容於天地之間是以至此極春秋備書之以見人而不仁疾之已甚亂也其為後世鑒豈不深切著明也哉秋齊侯伐衛遂伐晉左氏傳齊侯伐衛自衛將遂伐晉崔杼諫弗聽陳文子見崔武子曰將如君何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急君於何有齊侯遂伐晉取朝歌為二隊入孟門登大行張武軍於熒庭戍郫邵封少水以報平隂之役乃還趙勝帥東陽之師以追之獲晏氂八月叔孫豹帥師救晉次于雍榆公榖作渝榖梁傳言救後次非救也杜氏注雍榆晉地汲郡朝歌縣東有雍城陸氏微旨淳聞於師曰凡言救者救急之名不當次止也僖元年次于聶北救邢本次止而遙為邢援故先書次後言救譏其失救急之義也今此君命往救晉豹畏齊而次故上言救晉以明出師本意是先通君命也言君本命往救而豹自次止所以不譏君而罪豹也髙郵孫氏曰不救則懼晉之討往救則畏齊之強大夫帥師救之而次焉聶北之次先次後救可救而不救則罪重也雍榆之次先救後次欲救而力不能有罪而猶輕耳春秋之義次皆有罪於次之中有足矜者雍榆之次是也己卯仲孫速公作遫卒冬十月乙亥臧孫紇出奔邾左氏傳季武子無適子公彌長而愛悼子欲立之臧紇為立之季氏以公鉏為馬正孟孫惡臧孫季孫愛之孟氏之御騶豐點好羯也曰從余言必為孟孫孟莊子疾豐點謂公鉏苟立羯請讎臧氏公鉏謂季孫曰孺子秩固其所也若羯立則季氏信有力於臧氏矣弗應己卯孟孫卒公鉏奉羯立於戶側季孫曰孺子長公鉏曰何長之有唯其才也遂立羯秩奔邾臧孫入哭甚哀多涕曰季孫之愛我疾疢也孟孫之惡我藥石也夫石猶生我疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告於季孫曰臧氏將為亂不使我葬季孫不信臧孫聞之戒冬十月孟氏將辟藉除於臧氏臧孫使正夫助之除於東門甲從已而視之孟氏又告季孫季孫怒命攻臧氏乙亥臧紇斬鹿門之關以出奔邾晉人殺欒盈左氏傳晉人克欒盈於曲沃盡殺欒氏之族黨公羊傳曷為不言殺其大夫非其大夫也榖梁傳惡之弗有也不言殺其大夫是不有之以為大夫泰山孫氏曰不言其大夫者欒盈出奔楚當絶也稱人以殺從討賊辭齊侯襲莒左氏傳齊侯還自晉不入遂襲莒門于且于傷股而退莒子獲杞梁莒人行成勝大國益懼故行成陸氏纂例趙子曰掩其不備者曰襲髙郵孫氏曰以強攻弱又掩其不備焉書曰齊侯襲莒蓋侵伐之中而罪之尤者也二十有四年春叔孫豹如晉仲孫羯帥師侵齊左氏傳孟孝伯侵齊晉故也夏楚子伐吳左氏傳夏楚子為舟師以伐吳不為軍政無功而還秋七月甲子朔日有食之既襄陵許氏曰春秋三書食既桓三年以周桓敗宣八年以楚莊興至是而中國諸侯皆受盟於楚矣齊崔杼帥師伐莒左氏傳秋齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師崔杼帥師送之遂伐莒侵介根大水八月癸巳朔日有食之公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷公作陳儀左氏傳會于夷儀將以伐齊水不克冬楚子蔡侯陳侯許男伐鄭左氏傳冬楚子伐鄭以救齊門於東門次於棘澤諸侯還救鄭楚子自棘澤還使薳啓疆帥師送陳無宇公至自會陳針冝咎出奔楚左氏傳陳人復討慶氏之黨針冝咎出奔楚襄陵許氏曰針宜咎之事無聞焉爾而以慶氏黨逐則其人亦可知己易曰比之匪人不亦傷乎叔孫豹如京師左氏傳齊人城郟穆叔如周聘且賀城襄陵許氏曰自宣九年仲孫蔑如京師其後五十餘年乃始有叔孫豹以罕書也蓋自是不書聘王矣大飢榖梁傳五榖不升為大飢一榖不升謂之嗛二榖不升謂之飢三榖不升謂之饉四榖不升謂之康五榖不升謂之大侵大侵之禮君食不兼味臺榭不塗弛侯廷道不除范氏注廢侯不燕射廷內道路不修除百官布而不制范氏注官職修列不可闕廢不更有造作鬼神禱而不祀此大侵之禮也武夷胡氏傳古有救災之政若國凶荒或發廩以賑乏或移粟以通用或徙民以就食或為粥溢以救餓莩或興工作以聚失業之人緩刑舍禁弛力薄征索鬼神除盜賊弛射侯而不燕置廷道而不修殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有隂沴之災而冬大飢蓋所以賑業之者有不備矣故書之以為戒二十有五年春齊崔杼帥師伐我北鄙左氏傳齊崔杼帥師伐我北鄙以報孝伯之師也公患之使告於晉孟公綽曰崔子將有大志不在病我必速歸何患焉其來也不冦使民不嚴異於他日夏五月乙亥齊崔杼弒其君光左氏傳齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠薑而美之遂取之莊公通焉驟如崔氏以崔子之冠賜人崔子因是又以其間伐晉也欲弒公以説於晉而不獲間公鞭侍人賈舉而又近之乃為崔子間公夏五月崔子稱疾不視事乙亥公問崔子遂從薑氏薑入於室與崔子自側戶出甲興公踰牆又射之中股反隊遂弒之賈舉州綽邴師公孫敖封具鐸父襄伊僂堙皆死祝他父祭於髙唐至復命不説辨而死於崔氏申蒯侍漁者退謂其宰曰爾以帑免我將死其宰曰免是反子之義也與之皆死晏子立於崔氏之門外其人曰死乎曰君人者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為已死而為已亡非其私昵誰敢任之門啓而入枕尸股而哭之興三踊而出盧蒲癸奔晉王何奔莒叔孫宣伯之在齊也叔孫還納其女於靈公嬖生景公丁丑崔杼立而相之慶封為左相大史書曰崔杼弒其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞大史盡死執簡以往聞既書矣乃還武夷胡氏傳齊莊公見弒賈舉州綽等十人皆死之而不得以死節稱何也所謂死節者以義事君責難陳善有所從違而不苟者是也雖在屬車後乘必不肯同入崔氏之宫矣若此十人者獨以勇力聞皆逢君之惡從於昏亂而莊公嬖之者死非其所比諸匹夫匹婦自經於溝瀆而莫之知者猶不逮也晏平仲曰君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為已死而為已亡非其私昵誰敢任之此十人者真其私昵任之冝矣雖殺身不償責安得以死節許之哉公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷公作陳下同儀左氏傳晉侯濟自泮會于夷儀伐齊以報朝歌之役齊人以莊公説賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之泰山孫氏曰晉再合諸侯將伐齊齊人懼弒莊公以求成晉侯許之八月己巳諸侯同盟於重丘是也莊公復背澶淵之盟加兵晉衛信不道矣然齊人弒莊公以求成逆之大者晉侯不能即而討之以定齊國之亂曷以宗諸侯冝乎大夫日熾自是卒不可制也故先書崔杼之弒以著其惡武夷胡氏傳諸侯會于夷儀將以討齊齊使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之夫晉本為報朝歌之役來討及會夷儀既聞崔杼之弒則冝下令三軍建而復斾聲於齊人問莊公之故執崔杼以戮之謀於齊衆置君以定其國示天討之義則方伯連帥之職修矣今乃知賊不討而受其賂則是與之同情也故春秋治之如下文所貶云六月壬子鄭公孫舍之帥師入陳左氏傳初陳侯會楚子伐鄭當陳隧者井堙木刊鄭人怨之六月鄭子展子産帥車七百乘伐陳宵突陳城遂入之陳侯扶其大子偃師奔墓子展命師無入公宫與子産親御諸門陳侯使司馬桓子賂以宗器陳侯免擁社子展執縶而見子美入數俘而出司徒致民司馬致節司空致地乃還泰山孫氏曰前年楚子蔡侯陳侯許男伐鄭故鄭公孫舍之帥師入陳秋八月己巳諸侯同盟于重丘左氏傳同盟于重丘齊成故也趙文子為政令薄諸侯之幣而重其禮穆叔見之謂穆叔曰自今以往兵其少弭矣齊崔慶新得政將求善於諸侯武也知楚令尹若敬行其禮道之以文辭以靖諸侯兵可以弭伊川先生解諸侯同病楚也杜氏注重丘齊地武夷胡氏傳崔杼既弒其君矣晉侯受其賂而許之成故盟于重丘特書曰同公至自會衛侯入于夷儀左氏傳晉侯使魏舒宛沒逆衛侯將使衛與之夷儀衛獻公入于夷儀杜氏注夷儀本邢地衛滅邢而為衛邑晉愍衛衎失國使衛分之武夷胡氏傳鄭伯突入於櫟衛侯入于夷儀其入則一或名或不名者鄭伯奪正以立而國人君之諸侯助之不知其義不可以有國也故特書其名著王法以絶之衛侯蔑其冢卿失國出奔固不為無罪矣然有世叔儀以守有母弟鱄以出或撫其內或營其外有歸道焉則其義猶未絶也故止書其爵而不名及寧喜弒剽復歸於衛然後書名此聖人俟其改過遷善不輕絶人之意曽子曰夫子之道忠恕而已矣此類是也吕氏曰二十五年夏五月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀此衛侯即剽也衛侯入于夷儀即衎也不嫌兩君名實相亂乎曰衎雖無道然非臣下所當逐則剽亦非臣下所得立故衎入夷儀也不名以正其名於其復歸則正其失地之罪名之然則鄭伯突入于櫟何以名曰突不當立者衎當立者衎當立者故入于夷儀不名也楚屈建帥師滅舒鳩左氏傳二十四年吳人為楚舟師之役故召舒鳩人舒鳩人叛楚楚子師於荒浦舒鳩子請受盟二十五年秋舒鳩人卒叛楚令尹子木伐之及離城吳人救之吳師大敗遂圍舒鳩舒鳩潰八月楚滅舒鳩冬鄭公孫夏公作囆帥師伐陳左氏傳冬十月子西復伐陳陳及鄭平十有二月吳子遏公榖作謁伐楚門于巢卒左氏傳十二月吳子諸樊伐楚以報舟師之役門于巢巢牛臣曰吳王勇而輕若啓之將親門我獲射之必殪是君也死疆其少安從之吳子門焉牛臣隱於短垣射之卒榖梁傳古者大國過小邑小邑必飾城而請罪禮也吳子謁伐楚至巢入其門門人射吳子有矢創反舍而卒古者雖有文事必有武備非巢之不飾城而請罪非吳子之自輕也杜氏注遏諸樊也劉氏傳古者入境必假道過門必為之釋甲入國則不馳古者死而不弔者三畏厭溺死而不義者皆畏之類也春秋集解卷二十一
