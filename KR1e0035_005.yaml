body:
  text: 春秋集觧卷五宋吕本中撰莊公名同桓公子莊王四年即位莊諡也勝敵克亂曰莊元年春王正月榖梁傳繼弑君不言即位正也繼弑君不言即位之為正何也曰先君不以其道終則子不忍即位也陸氏纂例左氏云莊公不言即位文姜出故也且母以得罪去國猶曰不忍父為他國所弑其情若何不舉其大而舉其細非通論也且三月文姜方孫何妨正月即位乎武夷胡氏傳不書即位内無所承上不請命也或曰莊公嫡長其為儲副明矣雖内無所承上不請命獨不可以享國而書即位乎曰諸侯之嫡子必誓於王莊雖嫡長而未誓安得為國儲君副稱世子也春秋絀而不書父子君臣之大倫正矣三月夫人孫于齊左氏傳不稱姜氏絶不為親禮也公羊傳内諱奔謂之孫夫人何以不稱姜氏貶曷為貶與弑公也榖梁傳不言氏姓貶之也人之於天也以道受命於人也以言受命范氏注臣子則受君父之命婦受夫之命不若於道者天絶之也不若於言者人絶之也臣子大受命杜氏注夫人莊公母也魯人責之故出奔武夷胡氏傳夫人文姜也桓公之弑姜氏與焉為魯臣子者義不共戴天矣嗣君夫人所出也恩如之何徇私情則害天下之大義舉王法則傷母子之至恩此國論之難斷者也經書夫人孫于齊恩義之輕重審矣梁人有繼母殺其母者而其子殺之有司欲當以大逆孔季彦曰文姜與弑魯桓春秋去其姜氏傳謂絶不為親禮也夫絶不為親即凡人耳方諸古義宜以非司寇而擅殺當之不得以逆論也人以為允故通於春秋然後能權天下之事矣孫者順讓之辭使若不為人子所逐以全恩也哀姜去而弗返文姜即歸於魯例以孫書何也與聞殺桓之罪已極有如去而弗返深絶之也然則恩輕而義重矣河廣之詩其詞何取而聖人錄於國風者名宋襄公之重本亦此義也其垂訓逺矣夏單伯送王姬公榖並作逆王姬公羊傳單伯者何吾大夫之命乎天子者也何以不稱使天子召而使之也逆之者何使我主之也曷為使我主之天子嫁女於諸侯必使諸侯同姓者主之諸侯嫁女於大夫必使大夫同姓者主之榖梁傳單伯者何吾大夫之命乎天子者也命大夫故不名也其不言如何也其義不可受於京師也其義不可受於京師何也曰先君弑於齊使之主㛰姻與齊為禮其義固不可受也杜氏注單伯天子卿也單采地伯爵也髙郵孫氏曰單伯於此見經之後莊十四年書齊人陳人曹人伐宋單伯㑹伐宋冬又㑹諸侯于鄄春秋王臣而㑹諸侯之上亦不若内臣而書㑹也惟内臣㑹諸侯則曰㑹某由此觀之則單伯内臣非王臣也劉氏意林單伯逆王姬上公九命侯伯七命子男五命公之孤四命此皆人君也有不生名之義故附庸稱字矣周禮有孤無附庸魯頌有附庸無孤附庸即孤孤即附庸附於大國故謂之附庸南面稱孤故謂之孤其實一也秋築王姬之館于外陸氏微㫖趙子曰言築之為宜不若辭之為正也故君子貴端本也劉氏傳主嫁女者必自其廟仇讎之人非所以接㛰姻也衰麻之服非所以接弁冕也如辭而已矣泰山孫氏曰魯主王姬者非一也王姬之館故有常處此言築王姬之館于外者知齊讎不可接㛰姻也知齊讎不可接㛰姻故築王姬之館於外此公之惡從可見矣髙郵孫氏曰桓公見弑於齊仇讎未復天王遽使魯主王姬之㛰天王則已失禮矣為莊公者當辭於天王期於得請而後已於是之時非無同姓之諸侯也非無告喪之鄰國也蓋莊公未之辭耳辭之不固與不辭同也誠之至者動乎鬼神哀之切者感於異類乃遽釋怨與之為㛰姻之主雖變其禮猶未免於交㛰也不知而為之者猶可恕也知其非是然且為之此聖人所深誅之者也莊公知主㛰之非改築王姬之館孰與辭之不築也蓋攘雞者待來年而後已孟子非之不當主㛰而築館于外春秋罪之武夷胡氏傳莊公有父之讎方居苫塊此禮之大變也而為之主㛰是廢人倫滅天理矣春秋於此事一書再書又再書者其義以復讎為重示天下後世臣子不可忘君親之意冬十月乙亥陳侯林卒王使榮叔來錫桓公命公羊傳追命也陸氏纂例趙子曰不稱天王寵篡弑以黷三綱也陸氏微旨曰言不能法天正道故去天字以貶之也劉氏意林曰桓公篡君取國終不受命而王不能誅反追命之此無天法甚矣與葬成風引之為夫人使妾並后無以異故其文一施之春秋所譏刺於王亦多矣皆莫謂之無天獨至於錫桓公命葬成風而以無天責之者王者之位至貴也至重也至大也不尸小事不任小義未可以小失貶也今臣弑君妾僭嫡而王尊禮之則王義廢人倫滅矣桀紂之所以失天下者固廢王義滅人倫者也不可以不深貶蘇氏曰錫命者命之以策也衛襄公之沒也王使成簡公追命之曰叔父陟恪在我先王之左右以佐事上帝予敢忘髙圉亞圉王姬歸于齊陸氏纂例趙子曰凡外女歸皆以非常乃書齊師遷紀郱鄑郚杜氏注齊欲滅紀故徙其三邑之民而取其地郱在東莞臨胊縣東南郚在朱虚縣東南北海都昌縣西有訾城常山劉氏曰遷者迫逐而遷之以為已屬也不曰滅者時未滅也凡書遷者皆自是而滅矣武夷胡氏傳邑不言遷遷不言師其以師遷之者見紀民猶足與守而齊人强暴用大衆以迫之為已屬也二年春王二月葬陳莊公夏公子慶父帥師伐於餘丘公羊傳於餘丘者邾婁之邑也劉氏權衡曰公羊以謂於餘丘邾邑也非也公羊見邑不係國若可疑者悉附之邾婁爾杜氏注於餘丘國名也莊公時年十五則慶父莊公庶兄辨疑啖子曰案前後未有邑言伐者故依左氏舊說為國泰山孫氏曰於餘丘附庸國武夷胡氏傳案二傳於餘丘邾邑也國而曰伐此邑爾其曰伐何也誌慶父之得兵權也莊公幼年即位首以慶父主兵卒致子般之禍於餘丘法不當書聖人特書以志亂之所由為後戒也魯在春秋中見弑者三君其賊未有不得魯國之兵權者公子翬再為主將專㑹諸侯不出隱公之命仲遂擅兵兩世入杞伐邾㑹師救鄭三軍服其威令之日乆矣故翬弑隱公而寪氏不能明其罪慶父弑子般而成季不能遏其惡公子遂殺惡及視而叔仲惠伯不能免其死夫豈一朝一夕之故哉春秋所書為戒逺矣襄陵許氏曰當莊公初魯未有以勝齊則當休兵息民蓄徳修政以俟有間舎堂堂之讎國弗圖而用師伐於餘丘有以知莊公之無志東萊吕氏曰於餘丘或曰邑或曰國也或曰附庸國或曰夷國也以為夷國者似是也於發語辭若於越然秋七月齊王姬卒公羊傳外夫人不卒此何以卒錄焉爾曷為錄焉爾我主之也泰山孫氏曰外女不卒此卒之者公主其卒也莊公忘父之讎既主其嫁又主其卒不子之甚也東萊吕氏曰齊告王姬之喪莊公為之服大功之服大功之服則是以姊妹之服服之也違禮忘讎於是為甚春秋之世君臣上下能少自立者幾希矣冬十有二月夫人姜氏㑹齊侯于禚公作郜左氏傳書姦也杜氏注禚齊地陸氏微旨趙子曰姜氏齊侯之惡著矣亦以病公也曰子可以制母乎夫死從子通乎其下况國君乎君者人神之主也風化之本也不能正家如正國何若莊公者哀痛以思父誠敬以事母威刑以督下車馬僕御莫不俟命夫人徒徃乎夫人之徃也則公威命之不行哀戚之不至爾乙酉宋公馮卒三年春王正月溺㑹齊師伐衛左氏傳疾之也公羊傳溺者何吾大夫之未命者也榖梁傳其不稱公子何也惡其㑹仇讎而伐同姓故貶而名之也泰山孫氏曰溺内大夫之未命者衛侯朔在齊故溺㑹齊師伐衛謀納朔也夏四月葬宋莊公五月葬桓王左氏傳緩也杜氏注以桓十五年三月崩七年乃葬故曰緩陸氏纂例趙子曰凡天王葬不㑹則不書志不臣也髙郵孫氏曰孫復說古者天子崩諸侯近者奔喪逺者㑹喪故周禮大行人若有大喪則詔相諸侯之禮武夷胡氏傳先儒或言天子不志葬又以為不言葬者常也夫事孰有大於葬天子者而可以不志乎死生終始之際人道之大變豈以是為常事而不書也秋紀季以酅入于齊左氏傳紀季以酅入于齊紀於是乎始判公羊傳紀季者何紀侯之弟也何以不名賢也何賢乎紀季魯子曰請後五廟以存姑姊妹陸氏纂例不書名言季非叛也不書弟言兄無惡也諸侯之兄弟外附之美者莫過於紀季杜氏注酅紀邑在齊國安平縣劉氏傳紀季者何紀侯之弟也何以不曰紀侯之弟言以酅為附庸於齊也紀季曷為以酅為附庸於齊齊將滅紀紀侯以道事之則不得免焉因不忍鬭其民也逡廵有去志紀季用是以酅入于齊後五廟焉然則予之乎予之也何用見其予之也其字而不名入而不畔是予之也予之則其言入何難也何難焉爾析地以去國降志以事讎是非季之心也以宗國為寄矣冬公次于滑公榖並作郎左氏傳公次于滑將㑹鄭伯謀紀故也鄭伯辭以難杜氏注厲公在櫟故凡師一宿為舎再宿為信過信為次榖梁傳次止也有畏也欲救紀而不能也杜氏注滑鄭地在陳留襄邑縣西北常山劉氏曰諸侯非王命不出竟卿大夫國政所屬兵師民命所係凡非王命遷延次舎必詳錄之以正非法春秋之義謹嚴如此武夷胡氏傳春秋紀兵伐而書次以次為善救而書次以次為譏次于滑譏之也魯紀有㛰姻之好當恤其患於齊有父之讎不共戴天苟能救紀抑齊一舉而兩善并矣見義不為而有畏也春秋之所惡故書公次于滑以譏之也四年春王二月夫人姜氏享公榖並作饗齊侯于祝丘榖梁傳饗甚矣杜氏注祝丘魯地陸氏微旨曰參譏之也公夫人齊侯皆失正也吕氏曰前此常㑹矣而未之享也今享矣又復如齊師矣人之為不善一縱之後如水方至莫知所極其可不戒慎於始而防閑其微哉三月紀伯姬卒榖梁傳外夫人不卒此其言卒何也吾女也適諸侯則尊同以吾為之變卒之也范氏注禮諸侯絶傍朞姑姊妹女子子嫁於國君者尊與己同則為之服大功九月泰山孫氏曰紀伯姬隱二年紀裂繻所逆内女也禮諸侯絶傍朞姑姊妹女子子嫁於國君者尊與己同則為之服大功九月常事也故内女不卒之此卒者為下紀侯大去其國六月齊侯葬紀伯姬起夏齊侯陳侯鄭伯遇于垂蘇氏曰鄭伯鄭子儀也桓十五年五月書鄭伯突出奔蔡九月書鄭伯突入于櫟十八年齊襄公殺子亹鄭人立子儀莊十四年突使傅瑕弑子儀而入則遇于垂者子儀也然則鄭有二君矣可乎春秋有一國而二君者鄭突與儀衛衎與剽是也突衎始終為君儀之君鄭十有四年剽之君衛十有一年皆既能君者也故春秋因其實而君之然則孰與曰皆不與也突之入也以篡衎之出也以惡儀剽雖國人之所立而突衎在焉非所以為安也故四人者春秋莫適與也皆不沒其實而已君子不幸而處於此如子臧季札可也不如是則亂不正襄陵許氏曰齊與陳鄭遇垂蓋謀取紀是以紀侯見難而去紀侯大去其國左氏傳紀侯不能下齊以與紀季夏紀侯大去其國違齊難也杜氏注以國與季季奉社稷故不言滅不見迫逐故不言奔大去者不反之辭常山劉氏曰紀侯大去其國自去也大者紀侯之名也生名之著失地也齊兵未始加乎其國而紀遂不能守武夷胡氏傳凡大閱大雩大蒐而謂之大者譏其僭也大無者志倉廩之竭也大去者土地人民儀章器物悉委置之而不顧也或曰以爭國為小而不為以去國為大而為之者也夫守天子之土疆承先祖之祭祀義莫重焉委而去之無貶與曰有國家者以義言之世守也非身之所能為則當效死而勿去以道言之不以其所以養人者害人亦可去而不守於斯二者顧所擇如何爾然則擬諸大王去邠之事其可以無媿矣大王去邠從之者如歸市紀侯去國日以微滅則何太王之可擬哉故聖人與其不爭而去而不與其去而不存與其不爭而去是以異於失地之君而不名不與其去而不存是故書叔姬歸酅而不錄紀侯之卒明其為君之末矣六月乙丑齊侯葬紀伯姬陸氏微旨齊侯恃其强大并人之國而禮葬其妻是謂豺狼之行而為婦人之仁也武夷胡氏傳葬紀伯姬不稱齊人而目其君者見齊襄迫逐紀侯使之去國雖其夫人在殯而不及葬然後襄公之罪著矣或曰葬之禮也而以為著其罪何也弑魯君滅其㛰姻之國而葬其女是猶加刄於人以手撫之也而可以為禮乎斥言齊侯賤之也或曰惡其詐也如紀似禮存季似義葬伯姬似仁惡似而非者惡莠恐其亂苗也秋七月冬公及齊人狩于禚公榖並作郜公羊傳公曷為與微者狩齊侯也齊侯則其稱人何諱與讎狩也前此者有事矣後此者有事矣則曷為獨於此焉譏於讎者將壹譏而已故擇其重者而譏焉莫重乎其與讎狩也於讎者則曷為將壹譏而已讎者無時焉可與通通則為大譏不可勝譏故將壹譏而已其餘從同同榖梁傳齊人者齊侯也其曰人何也卑公之敵所以卑公也何以卑公也不復讎而怨不釋刺釋怨也武夷胡氏傳夫狩者馳騁田獵其為樂下主乎已一為乾豆其事上主乎宗廟以為有人心者宜於此焉變矣故齊侯稱人而魯公書及以著其罪五年春王正月夏夫人姜氏如齊師武夷胡氏傳師者衆多之地案齊詩載驅刺襄公無禮義盛其車服疾驅於通邑大都與文姜淫之詩也其三章曰汶水湯湯行人彭彭魯道有蕩齊子翺翔彭彭者多貌也其四章曰汶水滔滔行人儦儦魯道有蕩齊子遊敖儦儦者衆貌也曰㑹曰享猶為之名也至是如齊師羞惡之心亡矣夫人之行不可復制矣春秋書此以戒後世謹禮於微慮患於早之意也秋郳公作倪犂公榖並作黎來來朝杜氏注附庸國也東海昌慮縣東北有郳城犂來名其後數從齊桓以尊周室王命以為小邾子劉氏傳郳者何小邾也小邾則曷為謂之郳未成國謂之郳既成國謂之小邾犂來者何其君也何以名貶曷為貶用夷禮也冬公㑹齊人宋人陳人蔡人伐衛左氏傳納惠公也榖梁傳是齊侯宋公也其曰人何也人諸侯所以人公也其人公何也逆天王之命也范氏注王不欲立朔也伊川先生解諸國稱人違抗王命也貶諸侯則魯在其中矣六年春王正公榖並作三月王人子突救衛榖梁傳王人卑者也稱名貴之也善救衛也救者善則伐者不正矣伊川先生解雖微稱字王人當尊也陸氏纂例王師之正者莫過於子突夫子制作本教中人故簡易其文昭著其義若能以質直見之則可不俟傳注而自通矣上言伐衛次言王人救衛下言衛侯朔入于衛則知逆王命武夷胡氏傳王人微者子突其字也以下士之微超從大夫之例而書字者褒救衛也朔陷其兄使至於死罪固大矣然其父所立諸侯莫得而治也王治其舊惡而廢之可也又藉諸侯之力抗王命以入國是故四國之君貶而稱人王人之微嘉而書字或曰子突王之子弟也用兵大事而委諸子弟使無成功故書人以譏之必若此言是春秋以成敗論事而不計理也使諸侯苟顧逆順之理子突雖微自足以申王命矣彼既肆行莫之顧也雖天子親臨將有請從如祝聃者况其下乎子突不勝五國使之得入也其亦不幸焉爾矣幸不幸命也守義循理者法也君子行法以俟命故其褒貶如此夏六月衛侯朔入于衛左氏傳春王人救衛夏衛侯入放公子黔牟於周放甯跪於秦殺左公子洩右公子職乃即位榖梁傳其不言伐衛納朔何也不逆天王之命也入者内弗受也何用弗受也為以王命絶之也朔之名惡也朔入逆出則順矣朔出入名以王命絶之也伊川先生解朔搆其兄而使至於死其罪大矣然父立之諸侯莫得而治也王治其舊惡而廢之宜也故書名書人武夷胡氏傳入有二義一難詞也一逆詞也朔藉諸侯之力連五國之師距王官之微者以復歸於衛其勢宜無難矣而書入者逆王命也故衛朔書名書入以著其惡王人書字書救以著其善外則諸侯書人内則莊公書至而春秋之情見矣秋公至自伐衛公羊傳曷為或言致㑹或言致伐得意致㑹不得意致伐衛侯朔入于衛何以致伐不敢勝天子也榖梁傳惡事不致此其致何也不致則無以見公之惡事之成也螟冬齊人來歸衛俘公榖並作寳左氏傳冬齊人來歸衛俘文姜請之也武夷胡氏傳俘者二傳以為寳案商書稱遂伐三朡俘厥寳玉則俘者正文也寳者釋詞也言齊歸衛寳則知四國皆受朔之賂矣春秋特書此事結正諸侯之罪也夫以弟弑兄臣弑君篡居其位上逆天王之命人理所不容矣彼諸侯者豈其弗察而援之甚力則未有以驗其喪心失志迷惑之端也及書齊人歸寳然後知其有欲貨之心而後動於惡也世衰道微暴行交作徇於貨寳賄賂公行使君臣父子兄弟終去仁義懷利以相與不至於篡弑奪攘則不厭也春秋書此結正諸侯之罪垂戒明矣七年春夫人姜氏㑹齊侯于防左氏傳齊志也杜氏注文姜數與齊侯㑹至齊地則姦發夫人至魯地則齊侯之志故傳略舉二端以言之杜氏注防魯地夏四月辛卯夜榖作昔恒星不見夜中星隕公作霣如雨左氏傳恒星不見夜明也杜氏注恒常也謂常見之星辛卯四月五日月光尚微蓋時無雲日光不以昏沒榖梁傳恒星者經星也辨疑啖子曰星隕如雨謂奔流者衆如雨之多自漢以來史籍頻有詩曰有女如雲李陵曰謀臣如雨皆言多耳三傳不逹此理故悉穿鑿武夷胡氏傳恒星者列星也如雨者言衆也人事感於下則天變動於上前此者五國連衡旅拒王命後此者齊桓晉文更霸中國政歸盟主而王室遂虚其為法度廢絶威信陵遲之象著矣漢成帝永始中亦有星隕之異而五侯擅權賊莽居攝漢之宗支埽蕩幾盡天之示人顯矣春秋謹於天象至矣襄陵許氏曰王運將終而霸統方起之祥也吕氏曰恒星不見星隕如雨變異之極也而當世君臣莫能自省日趨於亂先王之道不復行於世矣堯舜禹湯文武之澤不復被於生民矣變異之極豈徒然哉秋大水無麥苗榖梁傳麥苗同時也范氏注麥與黍稷之苗同時死杜氏注今五月周之秋平地出水漂殺熟麥及五稼之苗髙郵孫氏曰案大者非常之詞非常而為災故書也武夷胡氏傳書大水畏天災也無麥苗重民命也畏天災重民命見王者之心矣忽天災而不懼輕民命而不圖國之亡無日矣春秋所以謹之也冬夫人姜氏㑹齊侯于榖杜氏注榖齊地今濟北榖城縣武夷胡氏傳防魯地也榖齊地也初㑹于禚次享于祝丘又次如齊師又一歲而再㑹焉其為惡益逺矣明年無知弑諸兒其禍淫之明驗也八年春王正月師次于郎以俟陳人蔡人榖梁傳次止也俟待也杜氏注期共伐郕陳蔡不至故駐師于郎以待之蘇氏曰魯將與陳蔡有事於鄰國而陳蔡不至故次于郎以待之武夷胡氏傳伐而次者有整兵慎戰之意其次善之也遂伐楚次于陘是也救而次者有緩師畏敵之意其次譏之也次于匡于聶北于雍榆是也俟而次者有無名妄動之意次于郎以俟陳人蔡人是也吕氏曰師次于郎以俟陳人蔡人陳人蔡人卒不至故甲午復治兵至夏而後師及齊師圍郎也諸侯放恣擅相侵伐予奪遲速無復紀綱謀不素定民不豫教亦已甚矣郕降于齊師從强者也秋師還言行役之久也春秋記用兵未有如此之詳獨於此焉詳盡如是者蓋罪其放恣之甚殘民之極也甲午治兵公作祠兵榖梁傳出曰治兵習戰也入曰振旅習戰也武夷胡氏傳此治兵于郎也俟而不至暴師露衆役久不用則有失伍離次逃亡潰散之虞故復申明軍法以整齊之其志非善之也譏黷武也夏師及齊師圍郕郕公皆作成降于齊師劉氏傳郕者何國也郕降于齊師降者何降之者何降者未失其國家者也降之者失其國家者也未失其國家者復見失其國家者不復見猶遷也武夷胡氏傳書及齊師者親仇讎也圍郕者伐同姓也郕降于齊師者見伐國無義而不能服也於是莊公之罪著矣秋師還武夷胡氏傳書師還譏役乆也案左氏仲慶父請伐齊師莊公不可是國君上將親與圍郕之役也然其次其及其還皆不稱公者重衆也春秋正例君將不稱帥師則以君為重今此不稱公又以為重衆何也輕舉大衆妄動久役俟陳蔡而陳蔡不至圍郕而郕不服歴三時而後還則無名黷武非義害人未有如此之甚也至是師為重矣義繫於師故不書公以著勞民毒衆之罪為後戒也春秋於王道輕重之權衡此類是矣冬十有一月癸未齊無知弑其君諸兒左氏傳齊侯使連稱管至父戍葵丘𤓰時而徃曰及𤓰而代期戍公問不至請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適襄公絀之二人因之以作亂十二月齊侯田於貝丘反徒人費遇賊於門伏公而出鬭死於門中石之紛如死於階下遂入殺孟陽於牀曰非君也不類見公之足於戸下遂弑之而立無知辨疑趙子曰不命之卿例不書氏既不書氏自然以名連國蘇氏曰齊侯諸兒雖無道而無知以其私弑之故稱無知武夷胡氏傳無知曷為不稱公孫而以國氏罪僖公也弑君者無知於僖公何罪乎不以公孫之道待無知使恃寵而當國也案無知者夷仲年之子年者僖公母弟也私其同母異於他弟施及其子衣服禮秩如適此亂本也故於年之來聘特以弟書於無知之弑不稱公孫著其有寵而當國也垂戒之義明矣古者親親與尊賢並行而不相悖故堯親九族必克明俊徳而後九族睦周封同姓必庸康叔蔡仲而後王室强徒知寵愛親屬而不急於尊賢使為儀表以明親親之道必有篡弑之禍矣案左氏齊侯遊於姑棼遂田於貝丘徒人費遇賊於門先入伏公而出鬭死石之紛如死於階下是能死節者也春秋重死節之臣而法有特書其不見於經何也如費等所謂便嬖私暱之臣逢君之惡田獵畢弋而不修民事使百姓苦之者也與大臣孔父仇牧義形於色不畏彊禦以身死其職則異矣當是時管仲隰朋鮑叔皆沈於下寮不見庸也而徒人費石之紛如乃得居左右襄公之所疎逺親信者如此故於齊國之彊大一也桓公用之則九合諸侯不以兵車由親賢人逺小人所以興也襄公用之不能保其身死於户下由親小人逺賢人所以亡也此二人雖死於難與自經於溝瀆而莫之知者猶不逮焉乃致亂之臣死不償責又何取乎九年春齊人殺無知左氏傳初公孫無知虐於雍廩九年春雍廩殺無知劉氏傳雍廩殺之則其稱人以殺之何討賊之辭也武夷胡氏傳弑君之賊人人之所惡夫人之所得討故稱人人者衆詞也無知不稱君已不能君齊人亦莫之君也公及齊大夫盟于蔇公榖並作暨左氏傳公及齊大夫盟于蔇齊無君也杜氏注蔇魯地琅琊繒縣北有蔇亭陸氏纂例趙子曰納讎人之子損禮而盟大夫故書公夏公伐齊納子公榖並無子字糾齊小白入于齊左氏傳初襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒亂作管夷吾召忽奉公子糾來奔夏公伐齊納子糾桓公自莒先入秋師及齊師戰于乾時我師敗績公喪戎路傳乗而歸鮑叔帥師來言曰子糾親也請君討之管召讎也請受而甘心焉乃殺子糾於生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之歸而以告曰管夷吾治於髙傒使相可也公從之杜氏注二公子各有黨故雖盟而迎子糾當須伐乃得入劉氏意林夏公伐齊納糾仲尼正天下之義明徳怨處以為徳不可以報怨怨莫甚於父母之仇而徳莫重乎君國子民豈可相貿易哉武夷胡氏傳左氏書子糾二傳曰伐齊納糾君子以公榖為正納者不受而强致之稱入者難詞糾不書子者明糾不當立也以小白繫齊者明小白宜有齊也所以然者襄公見殺糾與小白皆以庶子出奔而糾弟也又未嘗為世子案史稱周公誅管蔡以安周齊桓殺其弟以反國是糾幼而小白長其有齊宜矣宜則何以不稱公子内無所承上不禀命故以王法絶之也桓公於王法雖可絶視子糾則當立故管氏相桓為徙義而聖人稱之曰微管仲吾其被髮左衽矣召忽於子糾為傷勇比諸匹夫匹婦之諒自經於溝瀆而莫之知也秋七月丁酉葬齊襄公髙郵孫氏曰春秋之義弑君賊討則書葬襄公見弑於無知齊人已討無知殺之矣八月庚申及齊師戰于乾時我師敗績伊川先生解及其師非卿也公戰諱敗凡言敗績大敗也小小勝負不書杜氏注乾時齊地時水在樂安界岐流旱則竭涸故曰乾時陸氏纂例趙子曰内敗不書此書者納讎喪師以惡内也吕氏曰内不言敗而曰我師敗績則是内不言敗者謬也春秋無義戰凡相侵伐皆聖人之罪人曾是不諱而諱敗乎九月齊人取子糾殺之榖梁傳外不言取言取病内也取易辭也猶曰取其子糾而殺之云爾十室之邑可以逃難百室之邑可以隱死以千乗之魯而不能存子糾以公為病矣常山劉氏曰公伐齊納不正故書納糾而不曰子齊人殺糾而書子者齊大夫既自與魯盟而立之矣又自殺之故書曰齊人取子糾殺之以罪齊也或曰左氏經書公伐齊納子糾先儒說春秋者亦皆以子糾為正今云不正當何所據子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到於今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也以是觀之則可知矣如糾正當立而管仲反面事讎則孔子豈特謂之匹夫匹婦之諒哉惟其始事不正變而之義此夫子所以云耳而已矣武夷胡氏傳取者不義之詞前書納糾不稱子者明不當立也此書殺糾復稱子者明不當殺也或奪或予於義各安春秋精意也仁人之於兄弟不藏怒焉不蓄怨焉親愛之而已矣糾雖爭立越在他國置而勿問可也必請於魯殺之然後快於心其不仁亦甚矣後世以傳讓為名而取國者必殺其主以為一人心防後患意與此同流毒豈不逺哉故孟子曰五霸者三王之罪人也仲尼之徒無道桓文之事者冬浚洙公羊傳浚之者何深之也曷為深之畏齊也杜氏注洙水在魯城北下合泗浚深之為齊備武夷胡氏傳固國以保民為本輕用民力妄興大作邦本一摇雖有長江巨川限帶封域洞庭彭蠡河漢之險猶不足憑而况洙乎書浚洙見勞民於守國之末務而不知本為後戒也十年春王正月公敗齊師于長勺左氏傳春齊師伐我公將戰曹劌請見公與之乗戰于長勺公將鼔之劌曰未可齊人三鼓劌曰可矣齊師敗績公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之杜氏注長勺魯地武夷胡氏傳齊師伐魯經不書伐意責魯也詐戰曰敗敗之者為主或曰長勺魯地而齊師至此所謂敵加於己不得已而應之者也疑若無罪焉何以見責乎善為國者不師善師者不陣善陣者不戰故行使則有文告之辭而疆場則有守禦之備至於善陣徳已衰矣而况兵刃相接又以詐謀取勝乎故書魯為主以責之皆已亂之道寡怨之方王者之事也二月公侵宋陸氏纂例趙子曰凡書侵伐不書勝敗殺掠而還也凡師稱罪致討曰伐無名行師曰侵泰山孫氏曰公既敗齊師于長勺又退而侵宋搆怨二國三月宋人遷宿榖梁傳遷者猶未失其國家以徃者也陸氏纂例啖子曰凡言遷者有二義如宋人遷宿齊人遷陽是移其國於國中而為附庸也如邢遷於夷儀衛遷於帝丘之類或自請遷或見彊遷皆猶為列國故不言某人遷之言所遷之地但言移國都而已非為附庸也趙子曰凡非所遷而遷之非己邑而遷之其惡著矣襄陵許氏曰遷之使未失其國家以徃其義猶有所難則是王澤之未盡亡也至僖文以後則有滅國無遷國矣夏六月齊師宋師次于郎公敗宋師于乗丘左氏傳齊師宋師次于郎公子偃曰宋師不整可敗也宋敗齊必還請擊之公弗許自雩門竊出蒙臯比而先犯之公從之大敗宋師于乗丘齊師乃還杜氏注乗丘魯地劉氏傳此次也其言敗何諼之也何謂諼之齊師宋師次于郎未知其伐我與伐人與公子偃曰宋師不整擊之勝無幸焉莊公從之自雩門出蒙馬以虎皮而犯之大敗宋師次者不以義勝者不以道交譏之劉氏意林齊宋輕用其師揚兵整旅以徑人之國而不名所伐欲闚利乗便快其攻取之意故使魯人恫疑憂恐出竒計詐謀以自救覆滅其軍百姓父子無辜陷沒此人君貪利輕用其衆之罪也蓋君子貴道徳而賤功力上禮讓而下鄙爭魯人誠能不用詐謀推忠信奉詞令雖以膏沐止齊宋之師齊宋逺矣其所以弭患止亂安國便民不亦益堅且乆邪偷得一時之勝而忘長世之慮此小人釁於勇嗇於禍之咎非君子之道襄陵許氏曰齊桓始入未撫其民而輕用之是以再不得志於魯晉文之入五年而後用其民蓋監此也秋九月荆敗蔡師于莘以蔡侯獻舞榖作武歸左氏傳蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賔息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸榖梁傳荆者楚也何為謂之荆狄之也何為狄之聖人立必後至天子弱必先叛故曰荆狄之也杜氏注荆楚本號莘蔡地陸氏纂例趙子曰不曰獲見其戰之不力敗而不奔也辨疑啖子曰蔡侯失地故名劉氏意林聖人者慎絶人吳太伯之後也楚祝融之後也徐伯益之後也越大禹之後也其上世皆有元徳顯功通乎周室與中國冠帶之君奚以異徐始稱王楚後稱王呉越因遂稱王王非諸侯所當名也是以外之雖然猶不欲絶其類是以書國尚仍其舊號書爵或紀其本封推之可逺引之可來也此聖人慎絶人也劉氏傳蔡侯獻舞何以名絶曷為絶去位而虜也死社稷正也逃之罪也猶有恥焉虜賤甚矣常山劉氏曰凡書敗書滅書入而以其君歸皆名者謂其服而以之歸也責其不死位又無興復之志言其位已絶故以匹夫名之也唯僖二十六年楚子滅夔以夔子歸不名者夷狄小國魯史所不能知以邾子益來獨不曰歸者以我而内外異辭文體然爾武夷胡氏傳以夔子歸獨不名者夔子以無罪見討雖國滅身為臣虜其義直其詞初不服也是以猶加之爵而不名也蘇氏曰荆楚之舊號也不稱荆人夷也武夷胡氏傳春秋之法諸侯不生名失地則生而名之比於賤者欲使有國之君戰戰兢兢長守富貴無危溢之行也冬十月齊師滅譚譚子奔莒左氏傳齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至冬齊師滅譚公羊傳何以不言出國已滅矣無所出也伊川先生解春秋之法將尊師衆曰某帥師將卑師衆曰某師將卑師少曰某人將尊師少曰某伐某齊自管仲為政莊十二年而後未嘗興大衆也其賦於諸侯亦寡矣終管仲之身四十年息養天下厚矣惟救邢稱師譏其次也至於秦晉使之不競而已不强致也以其功卑而易成杜氏注譚國在濟南平陵縣西南范氏注凡書奔者責不死社稷陸氏纂例啖子曰凡滅國直書滅者罪來滅者甚於見滅者言力屈而死故也凡書滅又有書其君奔者則兩罪之且責其不死社稷也諸侯失地則書名國滅而奔者何以不名既書而滅罪已昭矣緣隨敵人歸者書名以重其罪故奔者不名以示等差也凡書滅又書以歸及名者罪重於奔者也既責其不死位又責其無興復之志也國滅君奔者四其三不書名惟徐子章禹書名傳以服吳後乃奔楚故書名以罪之武夷胡氏傳滅而書奔責不死位也不書出國亡無所出也國滅身奔而不能守其富貴何以書爵乎已無取滅之罪為横逆所加而力不能勝至於出奔則亦不幸焉爾矣其義蓋未絶也案左氏齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至責其失事大之禮可矣坐此見滅可乎齊師滅譚譚子奔莒楚人滅弦弦子奔黄狄滅温温子奔衛三國所以皆存其爵不比於失地之君而名之也然則吳滅徐徐子章禹奔楚何以獨名案左氏吳伐徐徐子斷其髮攜其夫人以逆吳子既已屈服而後奔豈有興復之志乎獨書名所以絶之也春秋之義雖在於抑强扶弱又責弱者之不自强於為善也故其書法如此春秋集觧卷五
