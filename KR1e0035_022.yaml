body:
  text: 春秋集解卷二十二宋吕本中撰襄公二十有六年春王二月辛卯衛寧喜弒其君剽衛孫林父入于戚以叛左氏傳二十年衛寧惠子疾召悼子曰吾得罪於君悔而無及也名藏在諸侯之策曰孫林父寧殖出其君君入則掩之若能掩之則吾子也若不能猶有鬼神吾有餒而已不來食矣悼子許諾惠子遂卒二十五年衛獻公自夷儀使與寧喜言寧喜許之大叔文子聞之曰今寧子視君不如奕棊其何以免乎奕者舉棊不定不勝其耦而況置君而弗定乎必不免矣九世之卿族一舉而滅之可哀也哉二十六年衛獻公使子鮮為復辭敬姒強命之對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與寧喜言寧喜曰必子鮮在子鮮不獲命於敬姒以公命與寧喜言曰苟反政由寧氏祭則寡人孫文子在戚孫嘉聘於齊孫襄居守二月庚寅寧喜右宰榖伐孫氏不克伯國傷寧子出舍於郊伯國死孫氏夜哭國人召寧子寧子復攻孫氏克之辛卯殺子叔及大子角孫林父以戚如晉書曰入于戚以叛罪孫氏也臣之祿君實有之義則進否則奉身而退專祿以周旋戮也甲午衛侯入杜氏注衎雖未居位林父專邑背國猶為叛也劉氏傳不與剽得兩君之名則其曰衛寧喜弒其君剽何寧氏君之寧氏殺之是以稱弒焉劉氏意林寧喜弒其君剽季子然問仲由冉求可謂大臣乎孔子曰所謂大臣者以道事君不可則止今由與求也可謂具臣矣季子然曰然則從之者與曰弒父與君亦不從也由此論之具臣者其位下其責薄小從可也大從罪也大臣者其任重其責厚小從罪也大從惡也夫據國之位而享其祿臨禍不死聞難不圗偷得自存之計使篡弒因已而立後雖悔之不可長也里克趙盾寧喜之貶不亦宜乎曽不如公孫寧儀行父之猶有益於其君也又況商人陳乞之懷惡以濟逆者乎夫商人陳乞懷惡以濟逆與里克趙盾寧喜之事則輕重有間矣然而春秋不别也以謂君臣之間義不容失故其文一施之所以教天下之為人臣者也武夷胡氏傳喜嘗受命於其父使納獻公以免逐君之惡衛侯出入皆以爵稱於義未絶而剽以公孫非次而立又未有説焉則喜之罪應末減矣亦以弒其君書何也奕者舉棊不定不勝其耦況置君乎於衎則殖也出之喜也納之於剽則殖也立之喜也弒之是奕棊之不若也不思其終亦甚矣故聖人特正其為弒君之罪示天下後世使知愼於廢立之際而不敢忽也霍光以大義廢昌邑立宣帝猶有言其罪者而朝廷加肅況私意邪范粲桓彞之徒殺身不顧君子所以深取之者知春秋之旨矣甲午衛侯衎復歸于衛武夷胡氏傳衛侯出奔齊入于夷儀皆以爵稱今既復歸而得國矣乃書其名何也人之有德慧術智者恆存乎疢疾衛侯淹恤在外十有二年困於心衡於慮久矣此生於憂患之時而一旦得國失信無刑猶夫人也則是困而弗革雖復得國猶非其國也此見春秋俟人改過之深而責人自棄之重欲其強於為善之意也夏晉侯使荀吳來聘左氏傳夏中行穆子來聘召公也召公為澶淵會公會晉人鄭良霄宋人曹人于澶淵左氏傳六月公會晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田取衛西鄙懿氏六十以與孫氏秋宋公殺其世子痤榖作座左氏傳初宋芮司徒生女子曰棄平公嬖生佐惡而婉大子痤美而很寺人惠牆伊戾為大子內師而無寵秋楚客聘於晉過宋大子知之請野享之公使往伊戾請從之至則欿用牲加書徴之而騁告公曰大子將為亂既與楚客盟矣公曰為我子又何求對曰欲速公使視之則信有焉問諸夫人與左師則皆曰固聞之公囚大子大子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聒而與之語過期乃縊而死佐為大子公徐聞其無罪也乃烹伊戾劉氏傳殺世子母弟直稱君者甚之也武夷胡氏傳宋寺人伊戾為大子內師無寵譛於宋公而殺之則賊世子痤者寺人矣而獨甚宋公何哉譛言之得行也必有嬖妾配適以惑其心又有小人欲結內援者以為之助然後愛惡一移父子夫婦之間不能相保者衆矣尸此者其誰乎晉獻之殺申生宋公之殺痤直稱君者春秋正其本之意晉人執衛寧喜左氏傳晉人執寧喜北宫遺使女齊以先歸陸氏纂例殺其君剽故也劉氏傳寧喜如晉晉人執之曰爾曷為納君而伐孫氏云爾非伯討也八月壬午許男寧卒于楚冬楚子蔡侯陳侯伐鄭葬許靈公左氏傳許靈公如楚請伐鄭曰師不興孤不歸矣八月卒於楚楚子曰不伐鄭何以求諸侯冬十月楚子伐鄭鄭人將禦之子産曰晉楚將平諸侯將和楚王是故昧於一來不如使逞而歸乃易成也子展説不禦寇十二月乙酉入南里墮其城涉於樂氏門於師之梁縣門發獲九人焉涉於泛而歸而後葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐公作瑗鄭良霄許人曹人于宋泰山孫氏曰隱桓之際天子失道諸侯擅權宣成之間諸侯錯命大夫專國至宋之會則又甚矣何哉自宋之會諸侯日微天下之政中國之事皆大夫專持之故二十九年城杞三十年會澶淵昭元年會虢諸侯莫有見者此天下之政中國之事皆大夫專持之可知也衛殺其大夫寧喜衛侯之弟鱄榖作專出奔晉左氏傳衛寧喜專公患之公孫免餘請殺之公曰微寧子不及此吾與之言矣事未可知祗成惡名止也對曰臣殺之君勿與知乃與公孫無地公孫臣謀使攻寧氏弗克皆死公曰臣也無罪父子死余矣夏免餘復攻寧氏殺寧喜及右宰榖尸諸朝石惡將會宋之盟受命而出欲亡懼不免且曰受命矣乃行子鮮曰逐我者出納我者死賞罰無章何以沮勸君失其信而國無刑不亦難乎且鱄實使之遂出奔晉公使止之不可及河又使止之止使者而盟於河託於木門不鄉衛國而坐終身不仕榖梁傳稱國以殺罪纍上也專其曰弟何也專有是信者言君本使專與喜為約納君許以寵賂今反殺之獻公使專失信故稱弟見獻公之惡也故出奔晉織絇邯鄲終身不言衛專之去合乎春秋劉氏傳稱國以殺大夫者罪纍上也寧喜弒君曷為不以討賊之辭言之不君剽之立不成其弒之名也寧喜納衛侯則衛侯曷為殺之喜也專衛侯也驕是以反其初言而殺之髙郵孫氏曰寧喜弒賊也弒剽而歸衎衛侯衎德喜之迎以反國復用之為大夫未嘗奪其位喜既見執而歸衛侯乃以其私殺之喜雖有罪者然衛侯殺之不以其罪故書曰殺其大夫也晉里克弒卓子奚齊而立夷吾夷吾殺之亦曰殺其大夫也晉侯夷吾衛侯衎之殺其大夫皆以其私里克寧喜之見殺皆不以其罪春秋以其事同書之亦相類也秋七月辛巳豹及諸侯之大夫盟于宋左氏傳宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也將或弭之雖曰不可必將許之弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人許之告于秦秦亦許之皆告于小國為會於宋五月甲辰晉趙武至於宋壬戌楚公子黑肱先至成言於晉丁卯宋向戌如陳從子木成言於楚子木謂向戍請晉楚之從交相見也庚午向戌復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也楚君若能使秦君辱於敝邑寡君敢不固請於齊壬申左師復言於子木子木使馹謁諸王王曰釋齊秦他國請相見也秋七月庚辰子木至自陳以藩為軍晉楚各處其偏辛巳將盟于宋西門之外楚人衷甲趙孟患楚衷甲以告叔向叔向曰夫以信召人而以僭濟之必莫之與也安能害我晉楚爭先晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣豈專在晉叔向謂趙孟曰諸侯歸晉之德只非歸其尸盟也子務德無爭先乃先楚人書先晉晉有信也武夷胡氏傳此一地也曷為再言宋書之重詞之復其中必有大美惡焉宋之盟合左師欲弭諸侯之兵以為名而楚屈建請晉楚之從交相見自是中國諸侯南面而朝楚及申之會蠻夷之君篡弒之賊大合十有一國之衆而用齊桓召陵之禮宋左師鄭子産皆獻禮焉宋世子佐以後至遂辭而不見伐吳滅賴無敢違者聖人至是哀人倫之滅傷中國之衰而其事自宋之盟始也故會盟同地而再言宋者貶之也或者乃以宋之盟中國不出夷狄不入玉帛之使交乎天下以尊周室為晉趙武楚屈建之力而善此盟也其説誤矣冬十有二月乙亥朔日有食之左氏傳辰在申司厯過也再失閏矣劉氏權衡曰厯家之術求閏餘易求交朔難今司厯能正交朔反不能置閏乎二十有八年春無冰夏衛石惡出奔晉左氏傳衛人討寧氏之黨故石惡出奔晉邾子來朝左氏傳邾悼公來朝時事也秋八月大雩左氏傳旱也仲孫羯如晉左氏傳孟孝伯如晉告將為宋之盟故如楚也冬齊慶封來奔左氏傳二十有七年齊崔杼生成及強而寡娶東郭薑生明東郭薑以孤入曰棠無咎與東郭偃相崔氏崔成有疾而廢之而立明成請老於崔崔子許之偃與無咎弗豫曰崔宗邑也必在宗主成與強怒將殺之告慶封慶封曰子姑退吾圗之告盧蒲嫳盧蒲嫳曰崔之薄慶之厚也他日又告慶封曰苟利夫子必去之難吾助女九月庚辰崔成崔強殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕弗得使圉人駕寺人御而出遂見慶封慶封使盧蒲嫳帥甲以攻崔氏殺成與強而盡俘其家其妻縊嫳復命於崔子且御而歸之至則無歸矣乃縊二十八年齊慶封好田而耆酒與慶舍政則以其內實遷於盧蒲嫳氏易內而飲酒使諸亡人得賊者以告而反之故反盧蒲癸癸臣子之子之慶舍癸言王何而反之二人皆嬖二子皆莊公黨今還求寵於慶氏欲為莊公報讎冬十月慶封田於萊十一月乙亥嘗於大公之廟慶舍涖事欒髙陳鮑之徒介慶氏之甲子尾抽桷擊扉三盧蒲癸自後刺子之王何以戈擊之死慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐內宫弗克反陳於嶽請戰弗許遂來奔既而齊人來讓奔吳吳句餘豫之朱方聚其族焉而居之富於其舊十有一月公如楚左氏傳為宋之盟故公及宋公陳侯鄭伯許男如楚泰山孫氏曰公朝楚者桓文既死夷狄日熾中國日微故公逺朝強夷也十有二月甲寅天王崩左氏傳十一月癸巳天王崩未來赴亦未書十二月王人來告喪杜氏注靈王也乙未楚子昭卒左氏傳楚康王卒武夷胡氏傳甲寅天王崩乙未楚子昭卒相距四十二日則閏月之驗也然不以閏書見喪服之不數閏也齊景公葬書閏月明殺恩之非禮也吕氏曰甲寅乙未相距四十二日明閏月之驗然不書閏者閏承前月而受其餘日故書閏月之日繫前月之下史策常體又有定則故不必每月發傳此范寧之説也然杜預以十二月無乙未日誤蓋預專據左氏説經不知閏月之日繫前月之下史策常體也二十有九年春王正月公在楚夏五月公至自楚左氏傳王正月公在楚釋不朝正於廟也楚人使公親襚夏四月葬楚康王公及陳侯鄭伯許男送葬至於西門之外公還及方城季武子取卞使公冶問璽書追而與之曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退及舍而後聞取卞公曰欲之而言叛祗見疏也公謂公冶曰吾可以入乎對曰君實有國誰敢違君公與公冶冕服固辭強之而後受公欲無入榮成伯賦式微乃歸公羊傳何言乎公在楚正月以存君也在晉不書在楚書者惡襄公久在夷狄為臣子免録也榖梁傳公在楚閔公也公至自楚喜之也致君者殆其往而喜其反此致君之意義也劉氏傳何言乎公在楚正月以存公也未有言存公者其曰存公何公之在楚則殆乎不得反矣國非其國也公之在楚則曷為殆乎不得反國非其國季武子居君之位攝君之祭國人屬焉取卞以自封使公冶告於楚曰聞守卞者將叛臣帥徒以討之既得之矣公曰是疏我也吾不可以入矣將適諸侯榮成伯強之乃歸故曰公在楚無魯之辭也武夷胡氏傳歲之首月公如他國者有矣此獨書公在楚者外為夷狄所制以俟其葬而不得歸內為強臣所逼欲擅其國而不敢入故特書所在以存君也特於歲首朝正之時而書曰公在楚使後世臣子戴天履地視君父之危且困者必有天威不違顏咫尺食坐見於羹牆之意而不以頃刻忘也此義一行豈敢有顧其身與妻子與其家而不恤國朋附權臣以圖富貴而背其君者乎泰山孫氏曰公留於楚者七月庚午衛侯衎卒閽弒吳子餘祭左氏傳吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之公羊傳閽者何門人也刑人也刑人則曷為謂之閽刑人非其人也君子不近刑人近刑人則輕死之道也榖梁傳閽門者也寺人也不稱名姓閽不得齊於人不稱其君閽不得君其君也禮君不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人閽弒吳子餘祭仇之也泰山孫氏曰閽門者不言盜者閽微於盜也不言殺者明弒有漸也微者猶言弒吳子餘祭况大者乎則知為人君者雖一介不可慢也故曰閽弒吳子餘祭以惡之仲孫羯會晉荀盈齊髙止宋華定衛世叔儀公作齊鄭公孫段曹人莒人公榖並有邾人滕人薛人小邾人城杞左氏傳晉平公杞出也故治杞六月知悼子合諸侯之大夫以城杞孟孝伯會之鄭子太叔見大叔文子與之語文子曰甚乎其城杞也子大叔曰若之何哉晉國不恤宗周之闕而夏肄是屏其棄諸姬亦可知也已諸姬是棄其誰歸之武夷胡氏傳晉平公杞出也故合諸侯之大夫以城杞古之建國立家者必親九族然有父族而後及母族有母族而後及妻族此葛藟之時所為刺也晉主夏盟令行中國平公不能修文襄悼公之業尊奬王室恤宗周之闕而夏肄是屏輕棄諸姬可謂知本乎平王惟不撫其民而逺屯戍於母家周人怨思焉揚之水所以降為國風不得列於雅也城杞之役亦不待貶絶而可見矣襄陵許氏曰齊桓城邢城衛而諸侯歸心焉晉平城杞而人疾其役其志私也動又不時能無攜乎晉侯使士鞅來聘左氏傳范獻子來聘拜城杞也杞子來盟左氏傳杞文公來盟書曰子賤之也賤其用夷禮吳子使札來聘左氏傳吳公子札來聘通嗣君也公羊傳賢季子也何賢乎季子讓國也其讓國奈何謁也餘祭也夷昧也與季子同母者四季子弱而才兄弟皆愛之同欲立之以為君弟兄迭為君而致國乎季子故謁也死餘祭也立餘祭也死夷昧也立夷昧也死則國冝之季子者也季子使而亡焉札者何吳季子之名也春秋賢者不名此何以名許夷狄者不一而足也季子者所賢也曷為不足乎季子許人臣者必使臣許人子者必使子也榖梁傳吳其稱子何也善使延陵季子故進之也身賢賢也使賢亦賢也延陵季子之賢尊君也其名成尊於上也秋九月葬衛獻公齊髙止出奔北燕左氏傳秋九月齊公孫蠆公孫竈放其大夫髙止於北燕乙未出髙止好以事自為功且專故難及之襄陵許氏曰案傳子尾子雅實放髙止而經書出奈何止則為大夫而放於君可也臣放大夫是無君也不可以訓故以出奔書也冬仲孫羯如晉左氏傳冬孟孝伯如晉報范叔也范叔士鞅也此年夏來聘三十年春王正月楚子使薳罷公作顏來聘左氏傳楚子使薳罷來聘通嗣君也夏四月蔡世子般弒其君固左氏傳蔡景侯為大子般娶於楚通焉大子弒景侯五月甲午宋災宋公榖無宋字伯姬卒左氏傳甲午宋大災宋伯姬卒待姆也榖梁傳取卒之日加之災上者見以災卒也婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也髙郵孫氏曰伯姬之行蓋婦人之伯夷也武夷胡氏傳易曰恆其德貞婦人吉夫子凶而或以為共姬女而不婦非也世衰道微暴行交作女德不貞婦道不明能全其節守死不回見於春秋者宋伯姬耳聖人冠以夫諡書於春秋曰葬宋共姬以著其賢行勵天下之婦道也天王殺其弟佞公作年夫王子瑕奔晉左氏傳儋括欲立王子佞夫佞夫弗知戊子儋括圍蒍逐成愆成愆奔平畤五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫括瑕廖奔晉榖梁傳天王殺其弟佞夫甚之也杜氏注稱弟以惡王殘骨肉不言出奔周無外劉氏傳殺世子母弟直稱君者甚之也此其為甚之奈何儋括將作亂立佞夫佞夫弗知王誅儋括也并殺佞夫非親親之道也秋七月叔弓如宋葬宋榖無宋字共姬左氏傳秋七月叔弓如宋葬共姬也公羊傳外夫人不書葬此何以書隱之也何隱耳宋災伯姬卒焉其稱諡何賢也何賢爾宋災伯姬存焉有司復曰火至矣請出伯姬曰不可吾聞之也婦人夜出不見傅母不下堂傅至矣母未至也逮乎火而死鄭良霄出奔許自許入于鄭鄭人殺良霄左氏傳二十九年鄭伯有使公孫黑如楚辭曰楚鄭方惡而使余往是殺余也伯有曰世行也子晳曰可則往難則已何世之有伯有將強使之子晳怒將伐伯有氏大夫和之十二月己巳鄭大夫盟於伯有氏三十年秋鄭伯有耆酒又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁醒而後知之遂奔許子産斂伯有氏之死者而殯之不及謀而遂行印段從之子皮止之衆曰人不我順何止焉子皮曰夫子禮於死者況生者乎遂自止之壬寅子産入癸卯子石入皆受盟於子晳氏伯有自墓門之瀆入因馬師頡介於襄庫以伐舊北門駟帶帥國人以伐之皆召子産子産曰兄弟而及此吾從天所與伯有死於羊肆子産禭之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城子駟氏欲攻子産子皮怒之曰殺有禮者禍莫大焉乃止武夷胡氏傳案左氏良霄汰侈耆酒諸大夫皆惡之而與公孫黑爭黑因其醉伐之良霄奔許自許襲鄭以伐公門弗勝死於羊肆不言復入者其位未絶也若宋魚石晉欒盈去國三年其稱復入位已絶矣不言叛者將以滅國非直叛也若華亥之入南里宋辰之入蕭其書叛者皆據土背君以自保非有滅國之謀也不言殺其大夫者非其大夫矣討賊之詞也冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會于澶淵宋災故左氏傳為宋災故諸侯之大夫會以謀歸宋財冬十月叔孫豹會晉趙武齊公孫蠆宋向戌衛北宫他鄭罕虎及小邾之大夫會于澶淵既而無歸於宋故不書其人不書魯大夫諱之也伊川先生解左氏傳叔孫豹會晉趙武而下諸國之卿既貶魯卿諱而不書劉氏傳會未有言其所為者此其言所為何譏何譏爾晉人與諸侯十二國之大夫會于澶淵凡為宋災故謀之也曰更宋之所喪雖死者不可復生其財復矣非務也何言乎非務會者講禮正刑一德紀天下也蔡侯弒其君而不謀宋災而謀之微矣陳恆弒其君孔子沐浴而朝告於哀公曰陳恆弒其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也公曰告夫三子者之三子告不可孔子曰以吾從大夫之後不敢不告也劉氏意林宋災故天下之事不一也君子慮所逺而小人恤所近夫災雖諸侯所當救然而一時之變一國之禍也財足以周其乏粟足以濟其用則已矣非所以為天下之憂也彼天下之憂者臣弒君一子弒父二如是則夷狄矣雖有粟吾得而食諸故孔子論天下之信則曰寧去食論陳恆之變則曰請討之其察於道之輕重緩急大小先後也審矣豈以姑息愛之哉武夷胡氏傳春秋大法君弒而賊不討則不書葬況世子之於君父乎蔡景公何以獨書葬遍刺天下之諸侯也葬送之禮在春秋時視人情之疏密而為之者也有嘗同盟卒而不赴者有雖同姓赴而不會者則以哀死而致襚為輕弔生而歸賻為重必矣今蔡世子般弒其君藏在諸侯之策而往會其葬是恩義情禮之篤於世子般不以為賊而討之也世子弒君是夷狄禽獸之不若也而不知討豈不廢人倫滅天理乎故春秋大法君弒賊不討則不書葬而蔡景公特書葬者聖人深痛其所為遍刺天下之諸侯也何以知聖人罪諸侯之意如此乎以下文書會于澶淵宋災故而貶其大夫則知之矣二百四十二年之間列會亦衆而未有言其所為者此獨言其所為何遍刺天下之大夫也大夫以智帥人者也智者無不知當先務之為急不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務蔡世子般弒其君天下之大變人理所不容也則會其葬而不討宋國有災小事也則合十二國之大夫更宋之所喪而歸其財則可謂知務乎叔孫豹晉趙武而下皆諸侯上卿執國之政者也三綱國政之本至於淪絶無父無君是禽獸也禽獸逼人雖得天下弗能一朝處矣是故諸侯之大夫貶而稱人魯卿諱而不書又特言會之所為以垂戒後世其欲人之自别於禽獸之害也可謂深切著明矣或曰夫穆叔趙武向戌子皮皆諸侯之良也而所謀若是何也世衰道微邪説交作以利害謀國家而不本於仁義也久矣是以至此極孔子所為懼春秋所以作乎三十有一年春王正月夏六月辛巳公薨于楚宫榖梁傳楚宫非正也杜氏注公不居先君之路寢而安所樂失其所也泰山孫氏曰非正也公朝楚好其宫歸而作之吕氏曰不薨於路寢已非正也而又薨于楚宫若襄公者可謂安其危而利其災樂其所以亡者矣秋九月癸巳子野卒左氏傳六月辛巳公薨于楚宫立胡女敬歸之子子野次於季氏秋九月癸巳卒毁也立敬歸之娣齊歸之子公子稠杜氏注不書葬未成君泰山孫氏曰襄公大子未踰年之君也名者襄公未葬也不薨不地降成君也武夷胡氏傳子般子赤弒而書卒子野過毁亦書卒何以别乎曰閔公內無所承不書即位則子般之弒可知下書夫人薑氏歸于齊上書公子遂叔孫得臣如齊則子赤之弒可知與子野異矣己亥仲孫羯卒左氏傳己亥孟孝伯卒冬十月滕子來會葬左氏傳冬十月滕成公來會葬劉氏傳諸侯之喪諸侯會之非禮也癸酉葬我君襄公十有一月莒人弒其君密州伊川先生解莒子虐國人弒之而立展輿展輿非親弒也故書國人武夷胡氏傳經以傳為案傳有乖謬則信經而棄傳可也若密州之事是矣左氏稱莒子生去疾及展輿既立展輿又廢之莒子虐國人患焉展輿因國人以攻莒子弒之乃立信斯言則子弒其父也而春秋有不書乎故趙匡謂其文當曰展輿因國人之攻莒子弒之乃立而後來傳寫誤為以字爾左氏博通諸史敘事尤詳能令後人得見本末因以求意經文可知而門弟子轉相傳授日月既久寖失本真如書晉趙盾許世子止等事詳考傳之所載以求經之大義可也而傳不可疑如莒人弒其君密州獨依經之所書以證傳之繆誤可也而傳不可信盡以為可疑而廢傳則無以知其事之本末盡以為可信而任傳則經之𢎞意大旨或泥而不通矣要在學者詳考而精擇可也春秋集解卷二十二
