body:
  text: 春秋集解卷三十宋吕本中撰哀公八年春王正月宋公入曹以曹伯陽歸左氏傳七年冬初曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之且言田弋之說說之因訪政事大說之有寵使為司城以聽政彊言霸說於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑於其郊曰黍丘揖丘大城鍾邘八年春宋公伐曹将還禇師子肥殿曹人詬之不行師待之公聞之怒命反之遂滅曹執曹伯及司城彊以歸殺之蘇氏曰此滅曹也其不言滅何也曹伯陽好田弋曹之鄙人公孫彊獲白鴈而獻之因訪政事大説之彊言霸說於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救書曰宋公入曹而不書滅言自滅也猶虞之滅言晉人執虞公而不言滅也武夷胡氏曰滅者亡國之善詞上下之同力也書宋公入曹以曹伯陽歸而削其見滅之實猶虞之亡書晉人執虞公而不言滅也春秋輕重之權衡故書法若此有國者妄聽辯言以亂舊政自取滅亡之禍可以鑒矣吳伐我左氏傳吳為邾故三月伐我伐武城克之吳師克東陽而進舎於五梧明日舎於蠶室公賔庚公甲叔子與戰於夷獲叔子與析朱鉏獻於王王曰此同車必使能國未可望也明日舎於庚宗遂次於泗上吳人行成将盟景伯曰楚人圍宋易子而食析骸而爨猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能久将歸矣請少待之弗從景伯負載造於萊門吳人盟而還泰山孫氏曰吳伐我以邾子益來故也直曰伐我者兵加於都城也武夷胡氏傳吳為邾故興師伐魯兵加國都而盟於城下經書伐我不言四鄙及與吳盟者諱之也來戰于郎直書不諱盟於城下何諱之深也楚人圍宋易子而食析骸而爨亦云急矣欲盟城下則曰有以國斃不能從也晉師從齊齊侯致賂晉人不可國佐對曰子若不許請合餘燼背城借一敝邑之幸亦云從也遂盟於爰婁而春秋與之今魯未及虧不能少待遂有城下之盟是棄國也夫棄國者其能國乎使有華元國佐之臣則不至此矣故春秋不言四鄙及與吳盟者欲見其實而深諱之以為後世謀國之士不能以禮義自強偷生惜死至於侵削陵遲而不知恥者之戒也夏齊人取讙及闡公作僤下同左氏傳齊悼公之來也季康子以其妹妻之即位而逆之季魴侯通焉女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師伐我取讙及闡伊川先生解内失邑不書辱當諱也不能保其土地民人是不君也已與之彼以非義而受則書取此與濟西田是也魯入邾而以其君來致齊怒吳伐故賂齊以説之杜氏注闡在東平剛縣北陸氏纂例魯不與季姬故怒而取二邑也歸邾子益于邾左氏傳齊侯使如吳請師将以伐我乃歸邾子注魯懼二國同心故歸邾子邾子又無道吳子使大宰子餘討之囚諸樓臺栫之以棘使諸大夫奉大子革以為政秋七月冬十有二月癸亥杞伯過卒齊人歸讙及闡左氏傳秋及齊平九月臧賓如如齊涖盟齊閭丘明來涖盟且逆季姬以歸嬖冬十二月齊人歸讙及闡季姬嬖故也伊川先生解不云我田既歸邾子亦歸其田非以為惠也泰山孫氏曰公既歸邾子益於邾故齊人歸讙及闡凡土地諸侯取之歸之皆書者惡專恣也取而不歸則又甚矣武夷胡氏傳案左氏邾子益齊出也魯以益來則齊人取讙及闡又如吳請師而怒猶未怠也以此見國君造惡不悛則四鄰謀取其國家莫能保矣歸邾子益於邾則齊人歸讙及闡又辭師於吳而徳猶未泯也以此見國君去惡而不積則四鄰不侵其封境而自安矣曰以曰取者逆詞也曰歸者順詞也去逆效順息争休兵齊無取地之罪魯無失地之辱以此見遷善之優改過之大而春秋不諱入邾以邾子益來者以明歸益於邾之能掩其前惡而美之也吳氏曰吳之伐我齊侯之取讙及闡以魯之入邾以邾子歸也歸邾子益於邾魯畏吳齊故也齊人歸讙及闡以我歸邾子也諸侯紛紛如此苟徇目前無一人求出當世規模者日朘月削以至於亡而卒不悟也易曰困于葛藟于臲卼曰動悔有悔征吉能知動悔有悔求出乎是變心易慮惟賢是用改前之為則出乎困矣故曰征吉春秋之世諸國君臣束手待斃其亦不知征吉之理矣九年春王二月𦵏杞僖公杜氏注三月而𦵏速宋皇瑗帥師取鄭師于雍丘左氏傳鄭武子賸之嬖許瑕求邑無以與之請外取許之故圍宋雍丘宋皇瑗圍鄭師每日遷舎壘合鄭師哭子姚救之大敗二月甲戌宋敗鄭師於雍丘使有能者無死以郟張與鄭羅歸公羊傳其言取之何易也其易奈何詐之也杜氏注雍丘縣屬陳留陸氏纂例趙子曰凡悉俘之曰取某師劉氏傳此師也其言取之何覆之也覆而敗之不遺一人之詞也襄陵許氏曰春秋之季日尋干戈詐力相傾奇變滋起於是始志取人之師甚其譎惡其盡也鄭以不義深入敵境而圍其邑此固喪師之道也吕氏曰隠十年宋人蔡人衛人伐戴鄭伯伐取之伐取之不義也猶有難也此直言取之易之甚也夏楚人伐陳左氏傳夏楚人伐陳陳即吳故也秋宋公伐鄭冬十月十年春王二月邾子益來奔左氏傳春邾隠公來奔齊甥也故遂奔齊公㑹吳伐齊左氏傳九年春齊侯使公孟綽辭師於吳吳子曰昔嵗寡人聞命今又革之不知所從将進受命於君十年公㑹吳子邾子郯子伐齊南鄙師于鄎齊人弑悼公赴於師吳子三日哭於軍門之外徐承帥舟師将自海入齊齊人敗之吳師乃還泰山孫氏曰公㑹吳伐齊齊中國也吳夷狄也㑹夷狄伐中國其惡可知也常山劉氏曰公㑹夷狄伐中國諸侯具文可見其罪三月戊戌齊侯陽生卒左氏傳在上文武夷胡氏傳案左氏公㑹吳伐齊齊人弑悼公赴於師春秋不著齊人弑君之罪而以卒書者亦猶鄭伯髠頑弑而書卒榖梁以爲不使加于中國之義也其存天理之意微矣魯人入邾以其君來罪也齊侯為是取讙及闡如吳請師討之也魯人悔懼歸益於邾是知其罪而能改也齊侯為是歸讙及闡又辭師於吳是變之正也夫變之正也禮義之所在中國之君也吳人欲遂前言而背違正理狄道也齊之臣子不能将順上及其君此天下大變常理之所無也故沒其見弑之禍而以卒書其㫖深矣春秋弑君大惡不待貶絶而自見也君而見弑豈無不善之積以及其身乎若夫悼公變而克正則無不善之積矣故以卒書而沒其見弑所謂微而顯著而晦彰善而勸惡者于是乎在春秋之旨深矣夏宋人伐鄭晉趙鞅帥師侵齊左氏傳夏趙鞅帥師伐齊取犂及轅毁髙唐之郭侵及賴而還五月公至自伐齊𦵏齊悼公衛公孟彄自齊歸于衛薛伯夷公作寅卒秋𦵏薛惠公冬楚公子結帥師伐陳吳救陳左氏傳冬楚子期伐陳吳延州來季子救陳謂子期曰二君不務徳而力争諸侯民何罪焉我請退以為子名務徳而安民乃還武夷胡氏傳春秋惡首亂善解紛自誅亂臣討賊子之外凡書救者未有不善之也救在王室則罪諸侯子突救衞是也救在逺國則罪四鄰晉陽處父救江是也救在外域則罪中國楚公子真救鄭狄救齊吳救陳是也吳雖蠻夷之國來㑹於戚則進而書人矣使季札聘則又進而書子矣救而果善曷為獨以號舉而不進之也其以號舉而不進之者深著楚罪而傷巾國之衰也陳者有虞之後嘗為楚滅而僅存耳今又無故興師肆行侵伐而列國諸侯縱其暴横不能修方伯連帥之職而吳能救之故獨以號舉深著楚罪而傷中國之衰也孔子曰道不行乗桴浮扵海從我者其由與非果欲浮於海其書吳救陳之意乎十有一年春齊國書帥師伐我左氏傳春齊為鄎故國書髙無㔻帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能求曰居封疆之間季孫告二子二子不可求曰若不可則君無出一子帥師背城而戰季孫使從於朝俟於黨氏之溝武叔呼而問戰焉對曰君子有逺慮小人何知懿子強問之對曰小人慮材而言量力而共者也武叔曰是謂我不成丈夫也退而蒐乘孟孺子洩帥右師顔羽御邴洩為右冉求帥左師管周父御樊遲為右老幼守宫次於雩門之外五日右師從之公叔務人務人公為昭公子見保者而泣曰事充政重上不能謀士不能死何以治民吾既言之矣敢不勉乎師及齊師戰於郊齊師自稷曲師不踰溝樊遲曰非不能也不信子也請三刻而踰之如之衆從之師入齊軍冉求之師右師奔齊人從之孟之側後入以為殿抽矢䇿其馬曰馬不進也林不狃之伍曰走乎不狃曰誰不如曰然則止乎不狃曰惡賢徐歩而死師獲甲首八十冉求所得齊人不能師宵諜曰齊人遁冉有請從之三季孫弗許公為與其嬖僮汪錡乘皆死皆殯孔子曰能執干戈以衛社稷可無殤也冉有用矛於齊師故能入其軍孔子曰義也劉氏傳不言鄙者受之也此其為受之奈何盖伐喪也武夷胡氏傳諸侯來伐無有不書四鄙者今齊師及清渉泗非有城下之盟可諱之辱亦書伐我何也傅說復於髙宗曰惟甲胄起戎惟干戈省厥躬夫省厥躬者自反之謂也自反而縮則為壮自反而不縮則為老師之老壮在曲直曲直自我而不繫乎人者也邾子齊之甥魯嘗入邾以其君來齊人為是取讙及闡請師於吳曲在我矣及歸邾益而齊人歸讙及闡又辭吳師直在齊矣魯人何名㑹吳伐之也故春秋之記斯師特曰伐我者欲省致師之由而躬自厚也垂訓之義大矣襄陵許氏曰以魯之微搆怨大國郊之戰非其風俗禮義正勝則國幾亡此仲尼之化也以是知君子居人之國雖曰其道不行猶蒙其福焉夏陳轅公作袁頗出奔鄭左氏傳夏陳轅頗出奔鄭初轅頗為司徒賦封田以嫁公女有餘以為已大器國人逐之故出襄陵許氏曰春秋書陳轅頗之奔若曰為人臣而刻以附上託公而營私者其亡乎五月公㑹吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書左氏傳為郊戰故公㑹吳子伐齊五月克博壬申至於嬴中軍從王胥門巢将上軍王子姑曹将下軍展如将右軍齊國書将中軍髙無㔻将上軍宗樓将下軍陳僖子謂其弟書爾死我必得志甲戌戰於艾陵展如敗髙子國子敗胥門巢王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千以獻於公公使大史固歸國子之元寘之新篋褽之以𤣥纁加組帶焉寘書於其上曰天若不識不衷何以使下國吳将伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫諌曰越在我心腹之疾也壤地同而有欲於我夫其柔服求濟其欲也不如早從事焉得志於齊猶獲石田也無所用之越不為沼吳其泯矣弗聽使於齊屬其子於鮑氏為王孫氏反役王聞之使賜之屬鏤以死吕氏曰公㑹吳伐齊而戰不言公齊國書帥師而來主與吳戰不為魯也秋七月辛酉滕子虞毋卒冬十有一月𦵏滕隠公衛世叔齊出奔宋左氏傳冬衛太叔疾出奔宋疾即齊也初疾娶於宋子朝其娣嬖子朝出孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣寘於犂而為之一宫如二妻文子怒欲攻之仲尼止之遂奪其妻或淫於外州外州人奪之軒以獻恥是二者故出十有二年春用田賦左氏傳十一年冬季孫欲以田賦使冉有訪諸仲尼仲尼曰某不識也三發卒曰子為國老待子而行若之何子之不言也仲尼不對而私於冉有曰君子之行也度於禮施取於厚事舉其中斂從其薄如是則以丘亦足矣若不度於禮而貪冒無厭則雖以田賦将又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聽十二年春王正月用田賦公羊傳何以書譏何譏爾譏始用田賦也穀梁傳古者公田什一用田賦非正也武夷胡氏傳哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也曰百姓足君孰與不足百姓不足君孰與足古者公田什一助而不稅魯自宣公初稅畆後世遂以為常而不復矣至是二猶不足故又以田賦也夫先王制土籍田以力而底其逺邇賦里以入而量其有無里廛也謂商賈所居之區域今用田賦軍旅之征非矣田以出粟為主而足食賦以出軍為主而足兵周禮宅不毛者有里布無職事者征夫家漆林之稅二十而五則弛力薄征當以農民為急而増賦竭作不使末業者獨幸而免也今二猶不足而用田賦是重困農民而削其本何以為國書曰用田賦用者不宜用也近世議弛商賈之征逹於時政者欲先省國用首寛農民後及商賈知春秋譏田賦之意矣襄陵許氏曰先王之法九夫為井四井為邑井邑未有賦也四邑為丘丘十六井乃有牛馬之賦今以丘賦為不足也於是更用田賦籍井而取之不待及丘此非禮也古者盖田有稅丘有賦稅以足食賦以足兵夏五月甲辰孟子卒左氏傳夏五月昭夫人孟子卒昭公娶於吳故不書姓死不赴故不稱夫人不反哭故不言𦵏小君杜氏注魯人諱娶同姓謂之孟子劉氏傳孟子者何昭公之夫人也其稱孟子何諱娶同姓盖吳女也何以不曰夫人薨命於天子然後成夫人孟子不受命不可以稱夫人盖自是魯夫人不命於天子也武夷胡氏傳孟子吳女昭公之夫人其曰孟子云者諱取同姓也禮娶妻不取同姓買妾不知其姓則卜之厚男女之别也同姓從宗合族屬異姓主名治際㑹名著而男女有别矣四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣其庶姓别於上而戚單於下㛰姻可以通乎綴之以姓而弗别合之以食而弗殊雖百世而㛰姻不通周道然也昭公不謹於禮欲結好強吳以去三家之權忍取同姓以混男女之别不命於天子以弱其配不見於廟不書於䇿以廢其常典禮之大本喪矣其失國也宜故陳司敗問昭公知禮乎子曰知禮子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君取於吳為同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸苟有過人必知之書孟子卒雖曰為君隠而實亦不可掩矣吕氏曰孟子卒吳女也諱取同姓故曰孟子魯之君豈苟為無禮而亂男女之别哉迫於彊吳之威欲自固其國而不知以禮自防以義為上徇目前之急忘長久之慮遂至於淪于禽獸而不辭也春秋之世君臣上下所以持其國家者皆如是曰孟子卒不待貶而惡自見也公㑹吳于橐臯左氏傳公㑹吳于橐臯吳子使大宰嚭請尋盟公不欲使子貢對曰盟所以周信也故心以制之玉帛以奉之言以結之明神以要之寡君以為苟有盟焉弗可改也已若猶可改日盟何益乃不尋盟杜氏注橐臯在淮南逡遒縣東南秋公㑹衛侯宋皇瑗于鄖公作運左氏傳秋衞侯㑹吳于鄖公及衞侯宋皇瑗盟而卒辭吳盟吳人藩衛侯之舎子貢見大宰嚭曰衛君之來必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讐也若執衞君是堕黨而崇讐也大宰嚭說乃舎衛侯杜氏注鄖發陽也廣陵海陵縣東南有發繇亭宋向巢帥師伐鄭左氏傳宋鄭之間有隙地焉曰彌作頃丘玉暢嵒戈錫子産與宋人為成曰勿有是及宋平元之族自蕭奔鄭鄭人為之城嵒戈錫九月宋向巢伐鄭取錫殺元公之孫遂圍嵒十二月鄭罕逹救嵒丙申圍宋師冬十有二月螽公作􅏑左氏傳冬十二月螽季孫問諸仲尼仲尼曰丘聞之火伏而後蟄者畢今火猶西流司厯過也杜氏注周十二月今十月是嵗應置閏而失不置雖書十二月實今之九月司厯誤一月九月之初尚温故得有螽十有三年春鄭罕公作軒達帥師取宋師于嵒左氏傳春宋向魋救其師鄭子賸使徇曰得桓魋者有賞魋也逃歸遂取宋師于嵒獲成讙郜延以六邑為虚泰山孫氏曰宋向巢帥師伐鄭鄭罕逹帥師取宋師于喦報雍丘之師也夏許男成公作戍卒公㑹晉侯及吳子于黄池左氏傳夏公㑹單平公晉定公吳夫差于黄池六月丙子越子伐吳為二隧大敗呉師獲大子友王孫彌庸夀於姚丁亥入吳吳人告敗於王王惡其聞也自剄七人於幕下秋七月辛丑盟吳晉争先吳人曰於周室我為長晉人曰於姬姓我為伯趙鞅呼司馬寅曰日旰矣大事未成二臣之罪也建皷整列二臣死之長㓜必可知也對曰請姑視之反曰肉食者無墨今吳王有墨國勝乎大子死乎且夷徳輕不忍久請少待之乃先晉人冬吳及越平公羊傳吳何以稱子吳主㑹也吳主㑹則曷為先言晉侯不與夷狄之主中國也其言及吳子何㑹兩伯之辭也杜氏注陳留封丘縣南有黄亭近濟水泰山孫氏曰黄池之㑹其言公㑹晉侯及吳子者主在吳子也黄池之㑹不主晉侯而主在吳子者晉侯不能主諸侯故也吳自柏舉之戰勢横中國諸侯小大震栗皆宗於吳晉侯不見者二十四年此不能主諸侯可知也故黄池之㑹吳子主焉不言公㑹吳子晉侯者不與呉人主中國也髙郵孫氏曰春秋之辭雖萬其尊異而為法者三天王也魯也中國也故内京師外諸夏尊天王也内諸夏外外裔尊中國也内魯外諸侯尊魯也及其既久而天王益衰諸夏益弱魯益無道則聖人一反之以託於春秋之終而深為後世之戒也春秋天王之事見於經者必曰京師而昭三十二年書曰城周天王竞衰而同之列國也魯為他國侵伐者必曰某鄙而哀公八年十一年再言伐我魯竟無道而同之諸侯也外裔之㑹稱國而離春秋之常法也而公㑹晉侯及吳子于黄池進吳稱子又言晉侯及之諸夏竟弱而同之外裔也春秋之㫖微矣武夷胡氏傳黄池衛地其言及者㑹兩伯之辭也春秋内中國而外諸夷吳人主㑹其先晉紀常也春秋四夷雖大皆曰子吳僣王矣其稱子正名也以㑹兩伯之詞而言及者先吳則拂經而失序列書則泯實而傳疑特書曰及順天地之經著盟㑹之實又以見外域之彊而抑其横也定公以來晉失覇業不主夏盟夫差暴横勢傾上國自稱周室於已為長盖太伯之後以族屬言則伯父也而黄池之㑹聖人書法如此者訓後世治中國御外域之道也明此義則知漢宣帝待單于位在諸侯王上蕭傅之議非矣唐髙祖稱臣於突厥倚以為助劉文靜之䇿失矣況於以父事之如石晉者将欲保國而免其侵暴可乎或曰苟不為此至於亡國則如之何曰存亡者天也得失者人也不可逆者理也以人勝天則事有在我者矣必若顛倒冠履而得天下其能一朝居乎故春秋撥亂反正之書不可以廢焉者也襄陵許氏曰左氏傳春秋曰先晉紀國語曰先吳此二國史籍之異也顧自宋之盟則晉已為楚所先陵遲至於黄池之時豈能復與吳争國語信也晉人恥吳先之故諱焉爾楚公子申帥師伐陳於越入吳左氏傳六月丙子越子伐吳為二隧疇無餘謳陽自南方先及郊吳大子友王子地王孫彌庸夀於姚自泓上觀之彌庸見姑蔑之旗曰吾父之旗也不可以見讐而弗殺也大子曰戰而不克将亡國請待之彌庸不可屬徒五千王子地助之乙酉戰彌庸獲疇無餘地獲謳陽越子至王子地守丙戌復戰大敗吳師獲大子友王孫彌庸夀於姚丁亥入吳吳人告敗於王冬吳及越平二十年十一月越圍吳二十二年冬十一月丁夘越滅吳請使吳王居甬東辭曰孤老矣焉能事君乃縊越人以歸泰山孫氏曰於越入吳者吳子方㑹乘其無備也武夷胡氏傳吳自柏舉以來憑陵中國黄池之㑹遂主夏盟可謂彊矣而春秋繼書於越入吳所謂因事屬詞垂戒後世而見深切著明之義也曽子曰戒之戒之出乎爾者反乎爾老氏曰佳兵不祥之器其事好還夫以力勝人者人亦以力勝之矣吳常破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人争長自謂莫之敵也而越已入其國都矣吳侵中國而越滅之越又不監而楚滅之楚又不監而秦滅之秦又不監而漢滅之老氏曽子其言豈欺也哉春秋初書於越入吳在柏舉之後再書於越入吳在黄池之後皆因事屬辭垂戒後世不待貶絶而見深切著明之義也而可廢乎秋公至自㑹晉魏曼多帥師侵衛公無曼字襄陵許氏曰晉以范中行之難伐衛伐鮮虞間齊之難而一侵之又再侵衛而諸侯卒莫之宗者唯其國無政也師雖數出能侵而已益玩而頓矣此王霸道盡之時𦵏許元公九月螽公作􅏑冬十有一月有星孛于東方公羊傳其言孛于東方何見於旦也何氏注旦者日方出時宿不復見故言東方知為旦何以書記異也泰山孫氏曰光芒四出曰孛不言所出之次者見於旦也案文十四年有星孛入于北斗昭十七年有星孛入于大辰此不言所在之次者見於旦可知也盜殺陳夏區公作彄夫十有二月螽公作􅏑襄陵許氏曰自用田賦而比年三書螽貪殘無己之應也十有四年春西狩獲麟左氏傳十四年春西狩於大野叔孫氏之車子鉏商獲麟杜氏注大野在髙平鉅野縣東北大澤是也以為不祥以賜虞人仲尼觀之曰麟也然後取之公羊傳何以書記異也何異爾非中國之獸也然則孰狩之薪采者也薪采者則微者也曷為以狩言之大之也曷為大之為獲麟大之也曷為為獲麟大之麟者仁獸也有王者則至無王者則不至有以告者曰有麕而角者孔子曰孰為來哉孰為來哉反袂拭面涕霑袍顔淵死子曰噫天喪予子路死子曰噫天祝予西狩獲麟孔子曰吾道窮矣泰山孫氏曰天子失正自東遷始諸侯失正自㑹溴梁始故自隠公至於溴梁之㑹天下之正中國之事皆諸侯分裂之自溴梁之㑹至於申之㑹天下之正中國之事皆大夫專執之自申之㑹至於獲麟天下之正中國之事皆南蠻迭制之聖王憲度禮樂衣冠遺風舊政盖埽地矣中國淪胥逮此而盡前此猶可言者黄池之㑹晉魯在焉後此不可言者諸侯泯泯制命在吳無復中國天下皆從呉故也蘇氏曰春秋起於五霸之始而止於戰國之初隠哀適其時耳常山劉氏曰麟乃和氣所致然春秋時有者何以應天地之氣豈可如此間别如聖人之生亦天地交感五行之秀乃生聖人當戰國之時生孔子何足怪況生麟乎聖人為出非其時故有感如聖人生不得其時孔子感麟而作春秋或謂不然春秋不害感麟而作然麟不出春秋豈不作孔子之意盖亦有素因此一事乃作故其書之成復於此終大抵須有發端處如畫八卦因見河圗洛書果無河圗洛書八卦亦須作也武夷胡氏傳河出圗洛出書而八卦畫簫韶作春秋成而鳯麟至事應雖殊其理一也世衰道微暴行交作臣弑其君者有之子弑其父者有之夫子為是作春秋明王道正人倫氣志天人交相感應之際深矣制作文成而麟至宜矣勇夫志士精誠所格上致日星之應召物産之祥盖有之矣況聖人之心感物而動見於行事以遺天下與來世哉簫韶九奏鳯儀於庭魯史成經麟出於野亦常理爾詩以正情書以制事禮以成行樂以養和易以明變垂教亦備矣則曷為作春秋子曰我欲載之空言不如見之行事之深切著明也知我者其惟春秋乎何以約乎魯史子曰我欲觀夏道是故之杞而不足徴也我欲觀殷道是故之宋而不足徴也我觀周道幽厲傷之舎魯何適矣何以始乎隠公三綱淪九法斁天下無復有王也何以絶筆於獲麟其以天道終乎聖人之於天道命也有性焉君子不謂命也是故春秋天子之事聖人之用撥亂反正之書考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑其於格物修身齊家治國施諸天下無所求而不得亦無所處而不當何莫學夫春秋故君子誠有樂乎此也春秋集解卷三十
