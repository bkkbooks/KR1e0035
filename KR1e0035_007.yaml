body:
  text: 春秋集解卷七宋吕本中撰莊公二十有四年春王三月刻桓宫桷左氏傳二十三年秋丹桓宫之楹二十四年春刻其桷皆非禮也御孫諫曰臣聞之儉徳之共也侈惡之大也先君有共徳而君納諸大惡無乃不可乎榖梁傳禮天子之桷斲之礱之加密石焉諸侯之桷斲之礱之大夫斲之士斲本刻桷非正也夫人所以崇宗廟也取非禮與非正而加之於宗廟以飾夫人非正也刻桓宫桷丹桓宫楹斥言桓公以惡莊也杜氏注桷椽也武夷胡氏傳丹楹刻桷疑若小失而春秋詳書於䇿御孫以為大惡何也桓公見殺於齊則不能復而盛飾其宫夸示仇人之女乃有亂心廢人倫悖天道而不知正者也御孫知為大惡而不敢盡言春秋謹禮於微正後世人主之心術者也故詳書於策斥言桓宫以惡莊為後鑒也葬曹莊公夏公如齊逆女秋公至自齊榖梁傳親迎恒事也不志此其志何也不正其親迎於齊也泰山孫氏曰案桓六年九月丁卯子同生公十四年即位此年如齊逆女公即位二十四年年三十七嵗矣始得成婚於齊者文姜制之不得以時而婚爾故其母喪未終如齊納幣圖婚之速也武夷胡氏傳榖梁子曰親迎常事也不志此其志何也不正其親迎於齊也或曰常事不志嵗事之常也親迎可以常乎則其說誤矣所謂常者其事非一有月事之常則視朔是也有時事之常則蒐狩是也有嵗事之常則郊祀雩祭之類是也有合禮之常則婚姻之納幣逆女至歸之類是也凡此類合禮之常則不志矣其志則於禮不合将以為戒者也若夫崩薨卒葬即位之類不以禮之合否而皆書此人道始終之大變也其於親迎異矣八月丁丑夫人姜氏入榖梁傳入者内弗受也何用不受也以宗廟弗受也其以宗廟弗受何也娶仇人子弟以薦舍於前其義不可受也泰山孫氏曰公親迎于齊不俟夫人而至失夫之道也婦人從夫者也夫人不從公而入失婦之道也武夷胡氏傳何以不致不可見乎宗廟也姜氏齊襄公之女入者不順之詞以宗廟為弗受也婚義以正始為先而公不與夫人皆至姜氏不從公而入已失夫婦之正弑閔孫邾之亂兆矣莊公不勝其母越禮踰時俟仇人之女薦舍於宗廟以成好合卒使宗嗣不立弑逆相仍㡬至亡國故春秋詳書其事以著莊公不孝之罪為後戒也戊寅大夫宗婦覿用幣左氏傳秋哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎公羊傳宗婦者何大夫之妻也覿者何見也用者何用者不宜用也杜氏注禮小君至大夫執贄以見荘公欲奢夸夫人故使大夫宗婦同贄俱見武夷胡氏傳禮夫人至大夫郊迎明日執贄以見宗婦大夫之妻也公事曰見私事曰覿見夫人禮也曷為以私言之夫人不可見於宗廟則不可以臨羣臣故以私言之也覿用幣何以書男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也今男女同贄是無别也公子牙慶父之亂兆矣春秋詳書正始之道也大水吕氏曰政有不得於此則災變見乎彼理之必然也人君覩此而知所戒懼則危亡之禍何從而至哉春秋之世多水災其必有所為矣冬戎侵曹曹覊出奔陳赤歸于曹杜氏注羈蓋曹世子也先君既葬而不稱爵者微弱不能自定赤曹僖公也盖為戎所納辨疑曰案曹羈者義同鄭忽爾劉氏意林曹羈出奔陳赤歸于曹赤之為者與鄭伯突無以異突因宋赤因戎皆奪其君然而春秋一貶之無上下之異者春秋治治不治亂者也使鄭忽曹羈事親而孝為上而禮在喪而哀将事而恭大夫順之國人信之雖有宋武之衆突赤之孽何縁而起然而君臣交争兄弟為仇者上有失故下得也郭公杜氏注經闕誤也二十有五年春陳侯使女叔來聘左氏傳陳女叔来聘始結陳好也榖梁傳其不名何也天子之命大夫也髙郵孫氏曰諸侯之大夫天子賜之邑使之歸國則書氏書字鄭祭仲魯單伯陳女叔是也夏五月癸丑衛侯朔卒六月辛未朔日有食之鼓用牲于社左氏傳夏六月辛未朔日有食之鼓用牲于社非常也杜氏注長厯推之辛未實七月朔置閏失所故致月錯唯正月之朔慝未作杜氏注正月夏之四月周之六月謂正陽之月今書六月而傳云唯者明此月非正陽之月也日有食之於是乎用幣于社伐皷于朝劉氏權衡曰夏書記日食之變季秋月朔亦有伐皷之事豈必正陽之月哉儻夏禮與周不同乎然日有食之變之大者人君當恐懼修省以荅天意豈但非正陽之月則安而視之哉春秋所以書者盖譏其不鼔于朝乃鼔于社又用牲爾榖梁傳鼓用牲于社鼓禮也用牲非禮也天子救日置五麾陳五兵五皷諸侯置三麾陳三皷三兵大夫擊門士擊柝言充其陽也武夷胡氏傳案禮諸侯旅見天子入門不得終禮者四而日食與焉古者固以是為大變人君所當恐懼修省以荅天意而不敢忽也故夏書曰乃季秋月朔辰弗集于房瞽奏皷嗇夫馳庶人走周官皷人救日月則詔王鼔大僕凡軍旅田役賛王鼓救日月亦如之諸侯用幣于社伐皷于朝退而自責皆恐懼修省以荅天意而不敢忽也然則鼔用牲于社何以書譏不鼓于朝而鼓于社又用牲則非禮矣伯姬歸于杞武夷胡氏傳其不言逆何也逆者非卿其名姓不登於史策則書歸以志禮之失也大夫来逆名姓巳登於史䇿足以志其失矣猶書歸者以别於大夫之自逆者也猶書歸者紀伯姬是也自逆者莒慶齊髙固是也秋大水鼓用牲于社于門左氏傳鼔用牲于社于門亦非常也凡天災有幣無牲非日月之眚不鼓杜氏注門國門也冬公子友如陳杜氏注諸魯大夫出朝聘皆書如二十有六年春公無春字公伐戎夏公至自伐戎襄陵許氏曰以伐戎致大伐戎也齊魯伐戎而中國崇也隠桓以来世有戎盟至於荘公戎始變渝我是以有濟西之役於此伐戎義已勝矣曹殺其大夫劉氏傳大夫無罪而君殺之非也雖有罪不以歸於京師亦非也孔子曰大夫彊而君殺之義也由三桓始也此之謂也泰山孫氏曰稱國以殺不以其罪也不書名字者脫之武夷胡氏傳稱國以殺者國君大夫與謀其事不請於天子而擅殺之也義繫於殺則止書其官曹殺其大夫宋人殺其大夫是也義繫於人則兼書其名氏楚殺其大夫得臣陳殺其大夫洩冶之類是也然殺大夫而曰大夫與謀其事何也與謀其事者用事之大夫也見殺者不得於君之大夫也所謂義繫於殺者罪在於專殺而見殺者之是非有不足紀也故止書其官而不録其名氏也古者諸侯之卿大夫士命於天子而諸侯不敢專命也其有罪則請於天子而諸侯不敢專殺也及春秋時國無小大卿大夫士皆専命之而不以告於王朝有罪無罪皆專殺之而不以歸於司寇無王甚矣五霸三王之罪人而葵丘之㑹猶曰無專殺大夫故春秋明書於䇿備天子之禁也凡諸侯之大夫方其交政中華㑹盟征伐雖齊晉上卿止録其名氏至於見殺雖曹莒小國亦書其官或抑或揚或奪或予聖人之大用也明此然後可以司賞罰之權矣秋公㑹宋人齊人伐徐杜氏注宋序齊上主兵徐國在下邳􅥧縣劉氏意林伐徐小事也而亂王者之制王者之制固曰諸侯不專征諸侯不專征是以屬之方伯連率今齊以其事小其衆少而因使宋主之是則人自為政與諸侯無霸奚以異物盖有其變微而其損大者此之類也不可不正也武夷胡氏傳案書伯禽嘗征徐戎則戎在徐州之域為魯患舊矣是年春伐戎秋又伐徐者必戎與徐合兵表裏為魯國之患也故雖齊宋将卑師少而公獨親行其不致者役不淹時而齊宋同㑹則無危殆之憂矣冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮左氏傳公㑹杞伯姬于洮非事也天子非尸義不廵守諸侯非民事不舉卿非君命不越竟杜氏注伯姬荘公女洮魯地陸氏微㫖淳聞於師曰參譏之也公及杞侯伯姬俱失正矣夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽左氏傳陳鄭服也杜氏注二十二年陳亂而齊納敬仲二十五年鄭文公之四年獲成於楚皆有二心於齊今始服也榖梁傳同者有同也同尊周也於是而後授之諸侯也其授之諸侯何也齊侯得衆也伊川先生觧同志而盟非率之也辨疑啖子曰諸侯同志而盟武夷胡氏傳同盟之例有惡其反覆而書同盟有諸侯同欲而書同盟此盟鄭伯之所欲而書同盟者也凡盟皆小國受命於大國不得已而從焉者也其有小國願與之盟非出於勉强者則書同盟所以志同欲也前此鄭伯嘗貳於齊矣至是齊桓强盛有霸中國攘外裔之勢諸侯皆歸之鄭伯於是焉有畏服之心其得與於盟所欲也故特書同榖梁子所謂於是而後授之諸侯是也其授之諸侯齊侯得衆也視他盟為愈矣秋公子友如陳葬原仲左氏傳非禮也原仲季友之舊也陸氏微㫖啖子曰凡大夫既沒則不名原仲所以書字也武夷胡氏傳公子友如陳葬原仲私行也人臣之禮無私交大夫非君命不越竟何以通季子之私行而無貶乎曰春秋端本之書也京師諸夏之表也祭伯以寰内諸侯而来朝祭叔以王朝大夫而来聘尹氏以天子三公來告其喪誣上行私表不正矣是故季子違王制委國事越竟而㑹葬齊髙固莒慶以大夫即魯而圖㛰其後陳荘子死越䘮於魯魯人欲勿哭繆公召縣子而問焉曰古者大夫束脩之問不出竟雖欲哭諸焉得而哭諸今之大夫交政於中國雖欲勿哭焉得而勿哭末流可知矣春秋深貶王臣以明始亂備書諸國大夫而無譏焉則以著其效也凡此皆正其本之意吕氏曰凡此一嵗之中公㑹杞伯姬于洮公子友如陳葬原仲杞伯姬来莒慶来逆叔姬皆為非禮然則治平之世聖王在上惟能使人克已復禮而已爾使人克己復禮春秋所為作也冬杞伯姬来左氏傳歸寕也凡諸侯之女歸寜曰来出曰来歸夫人歸寜曰如某出曰歸于某陸氏纂例趙子曰合禮者悉常事不書豈有二百四十二年内女唯兩度歸寜乎盖知非禮而来故書爾劉氏傳伯姬之来也已亟非禮也武夷胡氏傳左氏曰歸寕也禮父母在嵗一歸寜若歸而合禮則常事不書其曰杞伯姬来者不當来也女子有行逺父母兄弟春㑹于洮矣冬又歸魯故知其不當来也來而必書春秋於男女往来之際嚴矣莒慶来逆叔姬榖梁傳諸侯之嫁子於大夫主大夫以與之来者接内也不正其接内故不與夫婦之稱也范氏注接内謂與君為禮也夫婦之稱當言逆女劉氏權衡曰莒慶之來不得復曰逆女亂於逆君夫人者也然則書叔姬自其理然豈惡其接内哉凡大夫而越竟逆女此誠春秋所貶者然而以謂書叔姬者不與夫婦之稱不亦謬乎劉氏意林莒慶非有君命也叔姬非適諸侯也何以得書乎以公之自主之公之自主之則敵敵則書矣凡喜怒哀樂愛惡者人之情所不免也人之情所不免而無禮義之制則放而不反是以聖人物為之防使人廢心而任禮禮然而然不以私意損益其間未始有物者也每若是而天下服矣杞伯來朝杜氏注杞稱伯者盖為時王所黜襄陵許氏曰齊桓之令行乎天下為幽之盟而春秋授之諸侯考莊二十七年所書如此則諸侯之風和平可知雖云未盡合乎先王之禮盖易約也桓之功美有孚于幽而盛於首止相為終始也宣王大雅言韓侯出祖盛顯父侯氏之燕胥言韓侯娶妻懿韓姞諸婦之光寵者使人用是以觀中興之風故春秋每書列國之事以昭霸者之勲樂人之逺於禍亂而嘉其熏熏往来如齊桓晉文之興庶幾乎大雅之美矣是以知凡志天下禍亂之變皆咎王霸之失道也吕氏曰滕薛杞爵號不同皆口授傳寫小國多誤爾公㑹齊侯于城濮杜氏注城濮衞地将討衞也二十有八年春王三月甲寅齊人伐衞衛人及齊人戰衞人敗績左氏傳王使召伯廖賜齊侯命且請伐衛以其立子頽也二十八年春齊侯伐衛戰敗衛師數之以王命取賂而還陸氏纂例啖子曰凡外戰先書被伐之國以及来伐者盖戰之道以主及客也主人服則不戰凡戰不書及交為主也如秦初伐晋而退而晋復追之至河曲而戰之類也泰山孫氏曰前年公㑹齊侯宋公陳侯鄭伯同盟于幽衛侯不至故齊人伐衛衛人及齊人戰衛不服罪也以衛主齊者衛受伐也春秋之義伐者為客受伐者為主故曰衛人及齊人戰不地者戰於衛也武夷胡氏傳春秋紀兵及者為主齊人舉兵而伐衞衛人見伐而受兵則其以衛及之何也齊人舉兵乃奉王命聲衛立子頽之罪以討之也為衛計者誠有是罪則當請歸司寇服刑可也若恵儌康叔不泯其社稷使得自新亦惟命則可以免矣今不徴詞請罪而上逆王命下拒方伯之師直與交戰則是衛人為志乎此戰故以衛主之也夏四月丁未邾公作邾婁子瑣卒秋荆伐鄭公㑹齊人宋人公有邾婁人救鄭左氏傳楚令尹子元以車六百乗伐鄭入於桔柣之門衆車入自純門及逵市縣門不發楚言而出子元曰鄭有人焉諸侯救鄭楚師夜遁鄭人将奔桐丘諜告曰楚幕有烏乃止榖梁傳善救鄭也武夷胡氏傳案左氏楚令尹子元無故以車六百乗伐鄭入自純門是陵弱暴寡之師也故以州舉外之也鄭人将奔桐丘諸侯救之楚師夜遁是得救急䘏鄰之義也故書救鄭善之也齊宋稱人将卑師少桓公主兵攘僣亂安中國之事見矣冬築郿公穀並作微公羊傳造邑也杜氏注郿魯下邑劉氏權衡曰築者作邑爾詩云築室百堵百堵皆興鼛皷弗勝不謂城邑也武夷胡氏傳功大曰城小曰築大無麥禾杜氏注書於冬者五榖畢入計食不足而後書也陸氏微㫖淳聞於師曰無水旱螽螟之災而書無麥禾譏教令之無經農失其業也劉氏意林大無麥禾此言為國者之不可以無九年之蓄也三年耕餘一年之食九年耕餘三年之食三九二十七年則餘九年之食百官之奉賔客之禮不外求而足雖有水旱如堯湯之久而上下不憂今莊公在位二十八年矣而麥禾曽不足以待國用所謂寄生之君也蘇氏曰是嵗未嘗有水旱螽螟之災而書大無麥禾何也劉向春秋說曰土氣不養稼穡不成也沈約宋志言吴孫皓時嘗有之苖稼豐美而實不成百姓以饑闔境皆然連嵗不已此則所謂大無麥禾也武夷胡氏傳麥熟於夏禾成在秋而書於冬者莊公惟宫室臺榭是崇是飾費用寖廣調度不充有司㑹計嵗入之多寡虚實然後知倉廩之竭也故於嵗杪而書臧孫辰告糴于齊左氏傳冬饑臧孫辰告糴于齊禮也公羊傳請糴也何以不稱使以為臧孫辰之私行也曷為以臧孫辰之私行君子之為國也必有三年之委一年不熟告糴譏也穀梁傳國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也諸侯無粟諸侯相歸粟正也臧孫辰告糴于齊告然後與之言内之無外交也古者稅什一豐年補敗不外求而上下皆足也雖累凶年民弗病也一年不艾而百姓饑君子非之不言如為内諱也杜氏注臧孫辰魯大夫臧文仲陸氏纂例趙子曰譏臧孫為政而無蓄也故以自行為文劉氏意林臧孫辰告糴于齊此言大臣任國事治名而不治實之敝也務農重榖節用而愛人則倉廩實不知為此事至而憂之何其末與魯人恱其名而以急病讓夷為功君子責其實而以不能節用為罪此王政之務本也武夷胡氏傳劉敞曰不言如齊告糴而曰告糴于齊者言如齊則其詞緩告糴於齊則其情急二十有九年春新延廏左氏傳新作延廏書不時也凡馬日中而出日中而入杜氏注日中春秋分也治廏當以秋分因馬向入而修之今以春作故曰不時公羊傳新延廏者何修舊也修舊不書此何以書譏何譏爾凶年不修榖梁傳延廏者法廏也其言新有故也有故則何為書也古之君人者必時視民之所勤民勤於力則功築罕民勤於財則貢賦少民勤於食則百事廢矣冬築微春新延廏以其用民力為已悉矣劉氏意林延廏者天子之廏非諸侯之廏也南門者天子之門非諸侯之門也所謂庫門天子臯門雉門天子應門矣延廏之僣非荘公也過在可革而不革故曰新南門之僣自僖公始罪在不可為而為故曰新作夫春秋之紀略常事簡小事謹大事所以經後世非史官之任也泰山孫氏曰惡不愛民也冬大無麥禾臧孫辰告糴于齊則民饑矣延廏雖壊未新可也莊公春新延廏不愛民力若此夏鄭人侵許襄陵許氏曰許以近楚自齊之霸未㑹諸侯故鄭侵之以求好焉盖自是後許從中國矣秋有蜚左氏傳為災也凡物不為災不書公羊傳記異也何氏注蜚者臭惡之蟲也南越盛暑所生非中國之所有冬十有二月紀叔姬卒蘇氏曰紀雖滅而叔姬守義於酅故繫之紀賢而録其卒葬武夷胡氏傳紀已滅矣其卒之何見紀侯去國終不能自立異於古公亶父之去故特書叔姬卒而不卒紀侯以明其不争而去則可能使其民從而不釋則微矣城諸及防左氏傳書時也凡土功龍見而畢務戒事也杜氏注謂今九月周十一月龍星角亢晨見東方三務始畢戒民以土功事火見而致用杜氏注大火心星次角亢見者致築作之物水昬正而栽杜氏注謂今十月定星昬而中於是樹版榦而興作日至而畢杜氏注日南至微陽始動故土功息辨疑趙子曰此但依先後次第或甚者先之三十年春王正月夏公榖並有師字次于成辨疑趙子曰魯盖欲㑹齊圍鄣至成待命聞鄣已降故不行耳然疑事無質但當存而勿觧秋七月齊人降鄣公羊傳鄣者何紀之遺邑也杜氏注鄣紀附庸國東平無鹽縣東北有鄣城盖齊以兵脅使降附陸氏纂例趙子曰鄣則降服為附庸辨疑啖子曰鄣自是小國爾髙郵孫氏曰郕降於齊師是時齊魯之師相㑹圍郕不降我而獨降齊非齊師能使之降郕自降爾齊人降鄣非鄣欲降也齊降之爾常山劉氏曰鄣㣲弱小國齊肆其强力脅而服之也不書鄣降而曰齊人降鄣以齊之强故罪之深以鄣之弱故責之薄春秋之義抑强扶弱而已若郕降於齊師則義在責魯吕氏曰强以兵威劫服之也管仲所以相其君者功業可見矣八月癸亥葬紀叔姬杜氏注以賢録也武夷胡氏傳滅國不葬此何以葬賢叔姬也紀侯既卒不歸宗國而歸于酅所謂秉節守義不以亡故而睽婦道者也故繫之於紀而録其卒葬先儒謂賢而得書是也賢而得書所以為後世勸也九月庚午朔日有食之鼔用牲于社泰山孫氏曰凡救日食鼔禮也用牲非禮也孔子書鼓用牲者止譏其用牲爾非謂九月不鼓也冬公及齊侯遇于魯濟左氏傳謀山戎也以其病燕故也杜氏注濟水歴齊魯界在齊界為齊濟在魯界為魯濟盖魯地襄陵許氏曰齊桓伐郳伐鄭伐徐皆以宋人主兵而與公㑹于城濮而後伐衛與公遇于魯濟而後伐戎以是知桓公之霸不自恃也用人之能以為能集人之功以為功故其用兵行師每資武於宋桓而取䇿于魯莊其治國也一則仲父二則仲父遂能力正天下澤濟生民齊人伐山戎穀梁傳齊人者齊侯也其曰人何也愛齊侯平山戎也其愛之何也桓内無因國外無從諸侯而越千里之險北伐山戎危之也則非之乎善之也何善乎爾燕周之分子也貢賦不至山戎為之伐矣杜氏注山戍北狄武夷胡氏傳齊人者齊侯也其稱人譏伐戎也自管仲得政至是二十年未嘗命大夫為主將亦未嘗興大衆出侵伐故魯荘十一年而後凡用兵皆稱人者以将卑師少爾今此安知其非将卑師少而獨以為齊侯何也以来獻戎㨗稱齊侯則知之矣夫北戎病燕職貢不至桓公内無因國外無從諸侯越千里之險為燕闢地可謂能修方伯連帥之職何以譏之乎桓不務德勤兵逺伐不正王法以譏其罪則将開後世之君勞中國以事外夷舍近政而貴逺畧困吾民之力争不毛之地其患有不勝言者故特貶而稱人以為好武功而不修文德者之戒也然則伐楚之役何以美之其稱退師召陵責以大義不務交兵而强楚自服乎觀此可以見聖人强本治内柔服逺人之意矣三十有一年春築臺于郎何氏注禮天子有靈臺以候天地諸侯有時臺以候四時登髙逺望人情所樂動而無益於民者雖樂不為也夏四月薛伯卒築臺于薛杜氏注薛魯地六月齊侯来獻戎㨗左氏傳非禮也凡諸侯有四夷之功則獻於王王以警於夷中國則否諸侯不相遺俘穀梁傳軍得曰㨗武夷胡氏傳軍獲曰㨗凡諸侯有四夷之功則獻於王王以警於夷中國則否諸侯不相遺俘獻者下奉上之辭齊伐山戎以其所得功来誇示書来獻者抑之也後世宰臣有不賞邊功以沮外徼生事之人得春秋抑戎㨗之意秋築臺于秦榖梁傳不正罷民三時且財盡則怨力盡則懟君子危之故謹而志之也或曰倚諸桓也桓外無諸侯之變内無國事越千里之險北伐山戎為燕闢地魯外無諸侯之變内無國事一年罷民三時惡内也杜氏注東平范縣西北有秦亭冬不雨公羊傳記異也伊川先生觧一嵗三築臺明年春城小穀故冬書不雨閔之深也三十有二年春城小穀范氏注小榖魯地泰山孫氏曰魯邑曲阜西北有小榖城夏宋公齊侯遇于梁丘左氏傳齊侯為楚伐鄭之故請㑹於諸侯宋公請先見於齊侯夏遇於梁丘杜氏注梁丘在髙平昌邑縣西南劉氏傳何以書我接之也則其先宋何宋主齊也宋何以主齊齊逺而宋近也席則有上下室則有奥阼諸侯之事重主輕大主小近主逺貴主賤秋七月癸巳公子牙卒左氏傳初公築臺臨黨氏見孟任從之閟而以夫人言許之割臂盟公生子般焉雩講於梁氏女公子觀之圉人犖自牆外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投盖於稷門公疾問後於叔牙對曰慶父材問於季友對曰臣以死奉般公曰郷者牙曰慶父材成季使以君命命僖叔待於鍼巫氏使鍼季酖之曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏公羊傳曷為不言刺之為季子諱殺也曷為為季子諱殺季子之遏惡也不以為國獄縁季子之心而為之諱季子之遏惡奈何荘公病將死以病召季子曰牙謂我曰魯一生一及君已知之矣慶父也存季子曰夫何敢是将為亂乎夫何敢俄而牙弑械成季子和藥而飲之飲之無傫氏至乎王堤而死公子牙今将爾辭曷為與親弑者同君親無將将而誅焉然則善之與曰然殺世子母弟直稱君者甚之也季子殺母兄何善爾誅不得辟兄君臣之義也然則曷為不直誅而酖之行誅乎兄隠而逃之使託若以疾死然親親之道也杜氏注牙慶父同母弟僖叔也飲酖而死不以罪告故得書卒陸氏微㫖季子愛義俱立變而得中故夫子書其自卒以示無譏也八月癸亥公薨于路寝左氏傳八月癸亥公薨于路寝子般即位次於黨氏冬十月己未共仲使圉人犖賊子般於黨氏成季奔陳立閔公閔公荘公庻子於是年八嵗公羊傳路寝者何正寢也穀梁傳寢疾居正寢正也男子不絶於婦人之手以齊終也杜氏注公薨皆書其所詳凶變陸氏微㫖趙子曰君必終於正寢以就公卿也大位姦之窺也危病邪之伺也若蔽於隠是使小人女子得行其志也莊公正終而嗣禍分位不明而閨帷不修也故宗嗣素定之兵權散主之閨闈嚴飾之小人女子不尸重任賢良受託鼎足交輔則簒弑之禍曷由而至哉武夷胡氏傳莊公以世適承國不為不貴周公之後奄有龜蒙不為不强即位三十有二年不為不乆薨于路寢不為不正而嗣子受禍幾至亡國何也大倫不明而宗嗣不定兵柄不分而主威不立得免其身幸矣吕氏曰公薨于路寢正也正則何以書死生之變國之大事得其正則為萬世法不得其正則有危亡顚覆之慮故君子慎之冬十月己公榖作乙未子般卒左氏傳冬十月己未共仲使圉人犖賊子般於黨氏公羊傳子卒云子卒此其稱子般卒何君存稱世子君薨稱子某既葬稱子踰年稱公子般卒何以不書葬未踰年之君也有子則廟廟則書葬無子不廟不廟則不書𦵏武夷胡氏傳昔舜不告而娶恐廢人之大倫以懟父母君子以為猶告也莊公失時越禮謬於易基乾坤詩始関睢大舜不告而娶之義甚矣而子般乃孟任之所自出也胡能有定乎雖享國日乆獲終路寝而嗣子見殺幾至亡國有國者可不以為戒哉公子慶父如齊榖梁傳此奔也其曰如何也諱莫如深深則隠苟有所見莫如深也陸氏㣲㫖啖子曰書公子慶父如齊見臣子之罪也此言弑君之賊臣子不能討之又非君逐而去故明書如齊以見其罪淳聞於師曰齊為霸主而不能討又許其来惡可知也劉氏權衡曰慶父雖殺子般未敢便取其國利閔公之㓜而立焉其如齊者直告立君也武夷胡氏傳子般之卒慶父弑也冝書出奔其曰如齊見慶父主兵自恣國人不能制也昔成王将終命大臣相康王方是時掌親兵者太公望之子伋也宰臣召公奭命仲桓南宮毛取二干戈虎賁百人於伋以逆嗣子伋雖掌兵非有宰臣之命不敢發也召公雖制命非二諸侯将命以往伋亦不承也兵權散主不偏屬於一人可知矣今莊公幼年即位專以兵權授之慶父嵗月既久威行中外其流至此故於餘丘法不當書而聖人特書慶父帥師以志得兵之始而卒書公薨子般卒慶父如齊以見其出入自如無敢討之者以示後世其垂戒之義明且逺矣狄伐邢杜氏注邢國在廣平襄國縣襄陵許氏曰春秋戎先見荆次之狄次之而荆暴於戎狄又暴於荆當恵王世戎狄荆楚交伐諸夏使無齊桓攘服定之豈有周天子哉春秋集觧卷七
