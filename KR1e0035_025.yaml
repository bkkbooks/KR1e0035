body:
  text: 春秋集解卷二十五宋吕本中撰昭公十有六年春齊侯伐徐左氏傳齊侯伐徐二月丙申齊師至于蒲隧徐人行成徐子及郯人莒人㑹齊侯盟于蒲隧賂以甲父之鼎叔孫昭子曰諸侯之無霸害哉齊君之無道也興師而伐遠方㑹之有成而還莫之亢也無霸也夫襄陵許氏曰景公之時吳楚方爭晉旣不能逺賂以齊之彊務德修政以通天下之志糾合諸侯復霸可也而區區務爭伐徐伐莒之利志亦卑矣楚子誘戎蠻子公作曼子殺之左氏傳楚子聞蠻氏之亂也與蠻子之無質也使然丹誘戎蠻子嘉殺之遂取蠻氏公羊傳楚子何以不名夷狄相誘君子不疾也曷為不疾若不疾乃疾之也武夷胡氏傳楚子之誘一也或名或不名者虔欲滅中國而弃疾討蠻氏謹中外之辨也蔡侯與蠻子之見殺一也或名或不名者蔡般弑父與君蠻氏亂而無質其罪之輕重亦差矣夏公至自晉左氏傳正月公在晉晉人止公不書諱之也夏公至自晉武夷胡氏傳左氏曰公如晉平丘之㑹故也至是始歸者晉人止公其不書諱之也昭公數朝於晉三至於河而不得入兩得見晉侯又欲討其罪而止旃其困辱亦甚矣在易之困曰困亨者因困窮而致亨也夫困於心衡於慮而後作徵於色發於聲而後喻此正憤悱自彊之時而夏少康衛文公越句踐燕昭王四君子者由此其選也今昭公安於危辱無激昻勉勵之志即所謂自暴自棄不可與有為而人亦莫之告矣不亦悲乎諱而不書深貶之也秋八月己亥晉侯夷卒左氏傳秋八月晉昭公卒九月大雩左氏傳九月大雩旱也季孫意公作隐如如晉冬十月葬晉昭公左氏傳冬十月季平子如晉葬昭公杜氏注三月而葬速也十有七年春小邾子來朝左氏傳小邾穆公來朝夏六月甲戌朔日有食之左氏傳夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐皷於社諸侯用幣於社伐皷於朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐皷用幣禮也其餘則否大史曰在此月也正月謂建巳正陽之月也於周為六月於夏為四月曰過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏皷祝用幣史用辭故夏書曰辰弗集于房瞽奏皷嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏平子弗従昭子退曰夫子將有異志不君君矣劉氏權衡曰六月日有食之傳曰唯正月朔慝未作日有食之於是乎有伐皷用幣又引夏書以證之今案夏書乃季秋月朔非正陽之月詩十月之交朔日辛卯日有食之亦孔之醜然則古人不獨以正月日食為醜矣傳之所言未可信也秋郯子來朝八月晉荀吳帥師滅陸公作賁渾之公榖無之字戎左氏傳晉侯使屠蒯如周請有事於雒與三塗九月丁夘晉荀吳帥師渉自棘津使祭史先用牲於雒陸渾人弗知師從之庚午遂滅陸渾數之以其貳於楚也陸渾子奔楚其衆奔甘鹿武夷胡氏傳林父之於潞氏士㑹之於甲氏荀吳之於陸渾戎皆滅之也而林父士㑹稱人荀吳舉其名氏何哉晉爲盟主陸渾之戎宻邇王室而縦之雜處則非膺戎狄别内外之義也與闢土服逺以圖彊霸則異矣然舉其名氏非褒詞也纔得無貶耳則窮兵於逺虗内事外者可知矣冬有星孛于大辰左氏傳冬有星孛于大辰西及漢申須曰彗所以除舊布新也天事恒象今除於火火出必布焉諸侯其有火災乎公羊傳孛者何彗星也其言于大辰何在大辰也大辰者何大火也大火為大辰北辰亦為大辰何以書記異也杜氏注大辰房心尾也范氏注劉向曰大辰者大火也不曰孛于大火而曰大辰者謂濫於蒼龍之體不獨大火武夷胡氏傳大辰心也心為明堂天子之象其前星太子後星庻子孛星加心象天子適庶將分争也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝歴數載而後定至哀十三年有星孛于東方不言宿名者不加宿也當是時吳人僭亂憑陵上國日敝於兵暴骨如莽其戾氣所感固將壅吳而降之罰也故氛祲所指在於東方假手越人吳國遂滅天之示人顯矣史之有占明矣楚人及吳戰于長岸左氏傳吳伐楚陽匄司馬子魚戰于長岸子魚死楚師繼之大敗吳師獲其乗舟餘皇吳公子光請於其衆曰喪先王之乗舟豈惟光之罪衆亦有焉請藉取之以救死使長鬛者三人潛伏於舟側曰我呼餘皇則對師夜從之三呼皆迭對楚人從而殺之楚師亂吳人大敗之取餘皇以歸武夷胡氏傳言戰不言敗勝負敵也楚地五千里帶甲數十萬戰勝諸侯威服天下本非吳敵也惟不能去讒賤貨使費無極以讒勝囊瓦以貨行而策士竒才為敵國用故日以侵削至雞父之師七國皆敗柏舉之戰國破君奔幾於亡滅吳日益彊而楚削矣是故為國必以得賢為夲勸賢必以去讒賤貨為先不然雖廣土衆民不足恃也攷其所書本末彊弱之由其為後世戒明矣十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災左氏傳夏五月火始昬見丙子風戊寅風甚壬午大甚宋衛陳鄭皆火火作子産辭晉公子公孫於東門使司寇出新客禁舊客勿出於宫使子寛子上巡羣屏攝至於大宫使府人庫人各儆其事司馬司寇列居火道城下之人伍列登城明日使野司寇各保其徴書焚室而寛其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也公羊傳何以書記異也何異爾異其同日而俱災也外異不書此何以書為天下記異也劉氏傳何以書記災也四國同日而俱災非人力所能為也已其序宋衛陳鄭春秋之正也同徳則尚爵同爵則尚親同親則尚齒六月邾人入鄅公作邾婁人左氏傳六月鄅人藉稻邾人襲鄅鄅人將閉門邾人羊羅攝其首焉遂入之盡俘以歸鄅子曰余無歸矣從帑於邾邾莊公反鄅夫人而舎其女秋葬曹平公左氏傳秋葬曹平公往者見周原伯魯焉與之語不說學歸以語閔子馬閔子馬曰周其亂乎冬許遷于白羽左氏傳楚左尹王子勝言於楚子曰許于鄭仇敵也而居楚地以不禮於鄭晉鄭方睦鄭若伐許而晉助之楚䘮地矣君盍遷許冬楚子使王子勝遷許于析實白羽十有九年春宋公伐邾公作邾婁左氏傳鄅夫人宋向戌之女也故向寧請師二月宋公伐邾圍蟲三月取之乃盡歸鄅俘武夷胡氏傳案左氏傳宋公伐邾圍蟲取之而經不書圍與取何也初鄅人藉稻邾人襲鄅盡俘之鄅夫人宋向戌之女也故向寧請師圍蟲取之盡歸鄅俘此所謂聲罪執言之兵歸鄅之俘其善意也故書伐邾而釋其取邑之罪此亦善善長惡惡短之義夏五月戊辰許世子止弑其君買左氏傳夏許悼公瘧五月戊辰飲大子止之藥卒大子奔晉書曰弑其君君子曰盡心力以事君舎藥物可也榖梁傳止不弑也不弑而曰弑責止也止曰我與夫弑者不立乎其位以與其弟虺哭泣歠饘粥嗌不容粒未踰年而死蘇氏曰許悼公瘧飲世子止之藥而卒其以弑書之何也止雖不志乎弑而君由止以卒則亦止弑之也君由止以卒而不以弑君書之則臣將輕其君子將輕其父亂之道也故止之弑君雖異乎楚商臣蔡般也而春秋一之所以隆君父也今律過失殺人以贖論過失殺朞尊減殺人二等過失殺大父母父母減殺人一等而和御藥誤不如法者死父子之親許以情論至於君臣則情不勝法此葢春秋之遺意也武夷胡氏傳案左氏許悼公瘧戊辰飲世子止之藥卒書曰弑其君者止不嘗藥也古者醫不三世不服其藥夫子之所慎者三疾居其一季康子饋藥曰丘未達不敢嘗敬慎其身如此也而於君父可忽乎君有疾飲藥臣先嘗之父有疾飲藥子先嘗之葢言慎也止不擇醫而輕用其藥藥不先嘗而誤進於君是有忽君父之心而不慎矣自小人之情度之世子弑君欲速得其位而止無此心故曰我與夫弑者不立乎其位哭泣歠飦粥嗌不容粒未踰年而卒無此心故被以大惡而不受自君子聽之止不嘗藥是忽君父之尊而不慎也而止有此心忽君父之尊而不慎此篡弑之萌堅氷之漸而春秋之所謹也有此心故加以大惡而不得辭書許世子止弑君乃除惡於微之意也而或者顧以操刃而殺與不躬進藥及進藥而不嘗三者罪當殊科疑於三傳之說則誤矣必若此言夫人而能為春秋奚待於聖人之筆乎墨翟兼愛豈其無父楊子為我豈其無君孟軻氏辭而闢之以為禽獸逼人人將相食後世推明其功不在禹下未有譏其過者知此說則知止不嘗藥春秋以為弑君之意矣己卯地震秋齊髙發帥師伐莒左氏傳秋齊髙發帥師伐莒莒子奔紀鄣使孫書伐之杜氏注孫書陳無宇之子子占也初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紡焉以度而去之及師至則投諸外或獻諸子占子占使師夜縋而登莒共公懼啟西門而出七月丙子齊師入紀冬葬許悼公公羊傳賊未討何以書葬不成於弑也曷為不成於弑止進藥而藥殺也止進藥而藥殺則曷為加弑焉爾譏子道之不盡也其譏子道之不盡奈何曰樂正子春之視疾也復加一飯則脫然愈復損一飯則脫然愈復加一衣則脫然愈復損一衣則脫然愈何氏注脫然疾除貎也言消息得其節止進藥而藥殺是以君子加弑焉爾榖梁傳不使止為弑父也曰子既生不免乎水火母之罪也羈貫成童不就師傅父之罪也就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也許世子止不知嘗藥累及許君也范氏注許君不授子以師傅使不識嘗藥之義故累及之伊川先生解蔡般許止疑同故一作以書葬武夷胡氏傳何以書葬榖梁子曰許世子止不知嘗藥累及許君也觀止自責可謂有過人之質矣乃至以弑君獲罪此為人臣子而不知春秋之義者也古者大子自其初生固舉以禮有司端冕見之南郊過闕則下過廟則趨為赤子而其教已有齊肅敬慎之端矣此春秋訓臣子除惡於微積善於早之意也二十年春王正月夏曹公孫㑹自鄸榖作夢出奔宋公羊傳公子喜時之後也何賢乎公子喜時讓國也君子之善善也長惡惡也短惡惡止其身善善及子孫劉氏傳奔未有言自者此其言自鄸何自鄸待放也大夫有罪待放於其境三年君賜之環則復賜之玦則去逾境則為位鄉國而哭素衣素裳素冠徹縁鞮屨素蔑乗髦馬不蚤翦不祭食不說人以無罪婦人不當御三月而復服此去國之禮也劉氏意林春秋之時臣能專其邑無不畔其國者能使其衆無不要其君者臧武仲之智可謂智矣然猶據防以求為後於魯是以孔子譏之以謂其罪當與不孝非聖者均也不孝則無親非聖則無法要君則無上三者皆大亂之道也故深察公孫歸父之至檉奔齊公孫㑹之自鄸奔宋也其賢於臧武仲逺矣降而不憾憾而能眕唯知命而好禮者能之孔子曰不知命無以為君子不知禮無以立也此之謂也武夷胡氏傳奔未有言自者此其言自何劉敞曰待放也曹無大夫其曰公孫賢之也待放而後出奔臣子常禮免於貶足矣而何以賢之為公子喜時之後賢之也喜時者曹之社稷鎮公子能以國讓不取乎為諸侯所謂子臧是也以其賢者之後苟可善焉斯進之矣此舜典罰弗及嗣賞延于世之意也後世議者有乞録用賢者之類功臣之世葢得春秋之㫖矣秋盗殺衞侯之兄縶公榖作輒左氏傳衞公孟縶狎齊豹奪之司寇與鄄有役則反之無則取之公孟惡北宫喜褚師圃欲去之懼而欲以作亂初齊豹見宗魯於公孟為驂乗焉將作亂而謂之曰公孟之不善子所知也勿與乗吾將殺之對曰吾由子事公孟子假吾名焉故不吾逺也雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僭子也子行事乎吾將死之以周事子而歸死於公孟其可也丙辰衞侯在平夀公孟有事於葢獲之門外齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門入公載寳以出公如死鳥齊氏之宰渠子召北宫子北宫喜也北宫氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宫喜盟於彭水之上秋七月戊午朔遂盟國人琴張聞宗魯死將往弔之仲尼曰齊豹之盗而孟縶之賊女何弔焉君子不食姦不受亂不為利疚於回不以回待人不葢不義不犯非禮榖梁傳盗賊也目衞侯衞侯累也凱曰諸侯之尊凡弟不得以屬通經不書衞公子而斥言衛侯之兄者惡其不保䕶其兄乃為盗所殺故稱至賤殺至貴劉氏傳諸侯之尊弟兄不得以屬通其兄云者以重書也何重乎衞侯之兄輒言不得親親也千乗之國亦大矣而盜得以殺其兄故君子閔焉泰山孫氏曰盜者微賤之稱以衞侯之兄而盜得殺之衞侯之無刑政也若此武夷胡氏傳左氏以為齊豹殺之也齊豹為衞司寇守嗣大夫其書為盜所謂求名而不得者也臣竊以為仲尼書斷此獄罪在宗魯宗魯孟縶之驂乗也於法應書曰盜非求名而不得者也齊豹首謀作亂宗魯雖預聞行事又以身死之矣今乃釋豹不誅而歸獄於宗魯不亦頗乎曰豹之不義夫人皆知之也若宗魯欲事豹而死於公孟葢未有知其罪者故琴張聞其死將往弔之仲尼曰齊豹之盗孟縶之賊汝何弔焉非聖人發其食姦受亂葢不義犯非禮之罪書於春秋則齊豹所畜養之盜孟縶所見殺之賊其大惡隠矣冬十月宋華亥向寧公作寗華定出奔陳左氏傳宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸華亥偽有疾以誘羣公子夏六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廪公如華氏請焉弗許遂刧之癸卯取太子欒與母弟辰公子地以為質公亦取華亥之子無慼向寧之子羅華定之子啓與華氏盟以為質公請於華費遂將攻華氏曰子死亡有命余不忍其訽冬十月公殺華向之質而攻之戊辰華向奔陳華登奔吳向寧欲殺大子華亥曰干君而出又殺其子其誰納我且歸之有庸使少司寇牼以歸泰山孫氏曰三卿並出危之也十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公榖作正月夏晉侯使士鞅來聘左氏傳夏晉士鞅來聘叔孫為政季孫欲惡諸晉使有司以齊鮑國歸費之禮為士鞅士鞅怒曰鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢襄陵許氏曰禮好不結而誅求無度則聘義亡矣盖自是聘不復志宋華亥向寧華定自陳入於宋南里以叛公作畔左氏傳宋華費遂生華貙華多僚華登貙為少司馬多僚為御士與貙相惡乃譖諸公曰貙將納亡人公懼使告司馬司馬嘆曰必多僚也吾有䜛子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙五月丙申子皮殺多僚刧司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸横華氏居盧門以南里叛六月庚午宋城舊鄘及桑林之門而守之冬十月華登以吳師救華氏丙寅齊師宋師敗吳師於鴻口華登帥其餘以敗宋師公欲出厨人濮曰吾小人可藉死而不能送亡君請待之齊烏枝鳴曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劍從之華氏北復即之遂敗華氏於新里十一月癸未公子城以晉師至曹翰胡㑹晉荀吳齊苑何忌衞公子朝救宋丙戌與華氏戰於赭丘大敗華氏圍諸南里楚薳越帥師逆華氏榖梁傳自陳陳有奉焉爾入者内弗受也以者不以者也陸氏纂例趙子曰凡據土背君曰叛叛者皆書不必命卿也武夷胡氏傳案左氏初宋元公無信多私而惡華向三大夫謀曰亡愈於死先諸乃誘羣公子殺之公如華氏請焉弗許遂劫公取大子及其母弟以為質公怒攻之華向奔陳至是入於南里以叛凡書叛有入于戚者而不言衞有入于朝歌者而不言晉有入于蕭者而不言宋此獨稱宋南里何也戚與朝歌及蕭皆其所食私邑也若南里則宋國城内之里名也傳稱華氏居廬門南里以叛而宋城舊鄘及桑林門以守是華氏與宋分國而居矣故其入其出皆以南里繫之宋此深罪叛臣逼脅其君巳甚之詞也秋七月壬午朔日有食之八月乙亥叔輒公作座卒冬蔡侯朱榖作東出奔楚左氏傳三月葬蔡平公蔡大子朱失位位在卑大夫送葬者歸見昭子昭子問蔡故以告昭子歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸墍今蔡侯始即位而適卑身將従之蔡侯朱出奔楚費無極取貨於東國而謂蔡人曰朱不用命於楚君王將立東國若不先従王欲楚必圍蔡蔡人懼出朱而立東國公如晉至河乃復左氏傳公如晉及河鼓叛晉晉將伐鮮虞故辭公二十有二年春齊侯伐莒左氏傳二月甲子齊北郭啓帥師伐莒莒子將戰苑羊牧之諫曰不如下之大國不可怒也勿聽敗齊師於夀餘齊侯伐莒莒子行成莒於是乎大惡其君宋華亥向寧華定自宋南里出奔楚左氏傳楚薳越使告於宋曰寡君聞君有不令之臣為君憂寡君請受而戮之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已乃固請出之宋人従之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚武夷胡氏傳華向誘殺羣公子又劫其君取太子母弟為質又求助於吳楚蠻夷入披其國都以叛此必誅不赦之賊也宋宜竭力必討之於内諸侯宜協心必救之於外楚子宜執叛臣之使而戮之於境今楚人釋君而臣是助諸侯之戍怠於救患固請逸賊而宋人又従之則皆罪也故晉荀吳齊苑何忌衛公子朝曹大夫皆略而不書其曰自宋南里者譏宋之縦釋有罪不能致討出奔楚者不待貶絶而亢不衷奬亂人之惡自見矣大蒐于昌間公作姦榖梁傳秋而曰蒐此春也其蒐何也以蒐事也劉氏傳何以書譏何譏爾大蒐于昌間公不與非禮也葢不得與爾武夷胡氏傳昭公之時凡三書蒐或以非其時或以非其地而大意在權臣專行公不與也三綱軍政之本古者春蒐夏苖秋獮冬狩皆於農隙以講事而所主者明貴賤辨等列順少長習威儀則皆納民於軌物而非馳射擊刺之末矣是故觀於有莘少長有禮知可用也而文公遂霸臨於洛陽袒而發䘮為義帝也而漢祖遂王今魯國其君則設兩觀乗大輅其臣則八佾舞於庭旅泰山以雍徹其宰則據大都執國命而軍政之本亡矣何以蒐為此春秋所書為後戒之意也夏四月乙丑天王崩六月叔鞅如京師𦵏景王王室亂劉子單子以王猛居于皇左氏傳王子朝賔起有寵於景王王與賓孟說之欲立之夏四月王田北山使公卿皆従將殺劉子單子王知單劉不欲立子朝欲因田獵先殺之王有心疾乙丑崩於滎錡氏單子攻賓起殺之丁巳葬景王子朝因舊官百工之䘮職秩者與靈景之族以作亂逐劉子壬戌劉子奔揚單子逆悼王於莊宫以歸悼王子猛也王子還夜取王以如莊宫王子還子朝黨也不欲使單子得王猛故取之癸亥單子出失王故出奔王子還奉王以追單子單子殺還姑發弱鬷延定稠八子景靈之族因戰而殺之子朝奔京丙寅伐之京人奔山劉子入於王城子朝奔京故得入辛未鞏簡公敗績於京乙亥甘平公亦敗焉廿鞏二公周卿士皆為子朝所敗叔鞅至自京師言王室之亂也單子欲告急於晉秋七月戊寅以王如平畤冬十月丁巳晉籍談荀躒帥九州之戎以納王於王城庚申單子劉蚠以王師敗績於郊十一月乙酉王子猛卒不成䘮也己丑敬王即位館於子旅氏閏月晉師取前城軍其東南王師軍於京楚京楚子朝所在公羊傳何言乎王室亂言不及外也刺周室之微邪庶並篡無一諸侯之助匹夫之救故變京師言王室正王以責諸侯也不為天子諱者方責天下不救之泰山孫氏曰以天子之尊三月而葬此諸侯之不若也劉氏傳此未踰年之君也其謂之王猛何正也生名之死亦名之其曰居于皇何正也蘇氏曰叔鞅至自京師知王室之亂而未知亂之所在也故書曰王室亂稱王室亂在兄弟也諸侯之亂未有不待事而書者不待事而書亂急王室也景王世子夀早卒其次猛也子朝王之長庶也武夷胡氏傳凡稱以者不以者也師而曰以能左右之也地而曰以能取與之也人而曰以能死生之也尊不以乎卑貴不以乎賤大不以乎小劉蚠單旗臣也曷為能以王猛乎猛無寵於景王不能自定其位制在劉單其曰以者能廢立之也案左氏景王大子夀以昭十五年卒至是八年矣猛與匄皆其母弟禮無疑於當立然乆而未立者王愛庶子朝欲立以為嗣未果而王崩故諸大臣競立君諸王子争欲立以正則有猛以寵則有朝猛雖正而無寵其威不足以懾羣下朝雖寵而不正其分不足以服人心二子廢立皆恃大臣彊弱而後定也故特稱曰以而景王之弱其後嗣輕其宗社之罪亦著矣景王之葬子猛既居䘮位矣既葬而書王室亂則亂生子朝子猛非亂者也襄陵許氏曰易曰王居无咎曰居于皇者春秋所正也秋劉子單子以王猛入于王城武夷胡氏傳猛未踰年而稱王何示當立也既當立矣何以稱名明嗣君也曰王猛者見居尊得正又以别乎諸王子也君前臣名劉單不名而王名不嫌於倒置乎曰君前臣名常禮也禮當其變臣有不名名其君而不嫌者矣王不當稱未踰年而稱王名不當稱立為君而稱猛皆禮之變也惟可與權者能知其變而不越乎道之中再書劉子單子之以王何也春秋詞繁而不殺者必有美惡焉劉子單子葢挾天子以令諸侯而專國柄者也書而未足故再書於䇿以著上下舛逆為後世之深戒也吕氏曰洛誥我乃卜澗水東瀍水西惟洛食先儒以為今河南城也所謂王城也成王定鼎於郟鄏是也我又卜瀍水東亦惟洛食先儒以為今洛陽也即所謂成周也是時以成周為下都所謂成周既成分正東郊成周是也至敬王時自王城遷而都之冬十月王子猛卒劉氏傳其謂之卒何未踰年之王也謂之卒則可謂之薨則不可蘇氏曰猛旣稱王猛矣於其卒也稱王子猛何也春秋書名嚴於卒葬於其卒不得不正其本名也所謂非薨非𦵏名有所不必盡也十有二月癸酉朔日有食之二十有三年春王正月叔孫婼公作舎後皆同如晉癸丑叔鞅卒晉人執我行人叔孫婼左氏傳邾人城翼還遂自離姑武城人取邾師邾人愬於晉晉人來討叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也晉人使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在韓宣子使邾人聚其衆將以叔孫與之叔孫聞之去衆與兵而朝乃弗與士伯御叔孫從者四人過邾館以如吏乃館諸箕范獻子求貨於叔孫使請冠焉取其冠法而與之兩冠曰盡矣劉氏權衡曰案是年正月冇壬寅朔有庚戌有癸丑傳叙邾事在庚戌之後經紀叔孫如晉在癸丑之前夫庚戊癸丑四日耳邾人已能愬於晉晉人已能來討何其神速也故曰不然蘇氏曰邾人城翼師自武城還魯人譎而取之邾人訴於晉晉人來討故叔孫婼如晉晉人執之稱行人言非其罪也晉人圍郊左氏傳二十三年春王正月壬寅朔二師圍郊癸卯郊鄩潰王使告間庚戌還杜氏注晉師還武夷胡氏傳案左氏晉籍談荀躒帥師軍於侯氏箕遺樂徴濟師軍其東南正月二師圍郊郊子朝邑也旣不稱大夫之名氏又不稱師而曰晉人微之也所謂以其事而微之者也當是時天子蒙塵晉為方伯不奔問官守省視器具徐遣大夫往焉勤王尊主之義若是乎書晉人圍郊而罪自見矣夏六月蔡侯東國卒于楚秋七月莒子庚輿來奔左氏傳莒子庚輿虐而好劍苟鑄劒必試諸人國人患之又將叛齊烏存帥國人以逐之遂來奔齊人納郊公武夷胡氏傳庚輿虐而好劒苟鑄劒必試諸人國人患之又將叛齊烏存帥國人逐之庚輿來奔齊人納郊公三代之得失天下仁與不仁而已矣苟無仁心甚則身弑國亡不甚則身危國削庚輿免死道左而出奔於魯幸爾入國不書而書其出奔惡之也郊公出入皆不書微之也所謂以其人而微之者也微之為義或以位或以人或以事春秋書法達王事名氏不登於史策若此類亦衆矣襄陵許氏曰為人君仁則得其所止庚輿出奔無仁心也戊辰吳敗頓胡沈蔡陳許之師于雞父榖作甫胡子髠沈子逞公作楹穀作盈滅獲陳夏齧左氏傳吳人伐州來楚薳越帥師及諸侯之師奔命救州來吳人禦諸鍾離子瑕卒楚師熸吳公子光曰諸侯従於楚者衆而皆小國也畏楚而不獲已是以來七國同役而不同心若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃摇心矣諸侯乖亂楚必大奔請先者去備薄威後者敦陳整旅吳子従之戊辰晦戰于雞父吳子以罪人三千先犯胡沈與陳三國争之吳為三軍以繫於後中軍従王光帥右掩餘帥左吳之罪人或奔或止三國亂吳師擊之三國敗獲胡沈之君及陳大夫舎胡沈之囚使奔許與蔡頓曰吾君死矣師譟而従之三國奔楚師大奔書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也公羊傳其言滅獲何别君臣也君死於位曰滅生得曰獲大夫生死皆曰獲杜氏注雞父楚地安豐縣南有雞備亭國雖存君死曰滅泰山孫氏曰春秋之戰書敗者多矣未有諸侯之師略而不序者此六國之師略而不序者盖皆外之也賤其舎中國而與楚人親故皆外之其言胡子髠沈子逞滅者深惡二國之君不得其死皆以自滅為文也武夷胡氏傳吳伐州來楚令尹帥師及諸侯之師與吳戰曷為不書楚令尹既䘮楚師巳熸六國先敗楚師遂奔是以不書楚也諸侯之師曷為略而不序頓胡沈則其君自將蔡陳許則大夫帥師言戰則未陳也言敗績則或滅或獲其事亦不同也故縂言吳人以詐取勝於前而以君與大夫序六國於後胡沈書爵書名書滅者二國之君幼而狂不能以禮自守役屬於楚悉師以出一敗而身與衆俱亡也其曰胡子髠沈子逞滅者若曰非有能滅之者咸其自取焉耳亦猶梁亡自亡也鄭棄其師自棄也齊人殱于遂自殱也或曰滅或曰獲别君臣也君死曰滅胡子髠沈子逞是也生得曰獲秦晉戰于韓原獲晉侯是也大夫生死皆曰獲鄭獲宋華元生也吳獲陳夏齧死也書其敗不以國分而以君大夫為序書其死不以事同而以君臣為别皆所以辨上下定民志雖顛沛必於是也其義行而亂自熄矣天王居于狄泉尹氏立王子朝左氏傳夏六月壬午王子朝入於尹庚寅單子劉子樊齊以王如劉甲午王子朝入於王城秋七月戊申鄩羅納諸莊宫於是敬王居狄泉尹氏立子朝公羊傳此未三年其稱天王何著有天子也榖梁傳天王居于狄泉始王也尹氏立王子朝立者不宜立者也朝之不名何也别嫌乎尹氏之朝也若但言尹氏立朝則嫌朝是尹氏之子故言王子以别之杜氏注狄泉今洛陽城内大倉西南池水也時在城外劉氏傳此未三年其稱天王何臣子辭也襄陵許氏曰春秋之法踰年書王故敬王踰年即位而稱天王陸氏纂例大夫稱氏者唯尹氏武氏崔氏皆譏世卿也言氏則世之意可見也時世卿旣多不可勝譏因尹氏私赴不以名因齊人崔氏出奔因武氏以子伐父故特書之及尹氏立王子朝并以子朝奔楚皆以世卿亂王室故従而書之譏此數者足以見世卿之惡也泰山孫氏曰立者篡辭嗣子有常位故不言立王猛共王是也此言尹氏立王子朝其惡可知也尹氏世卿武夷胡氏傳立者不宜立也王猛當立而未能立故稱大臣以之而不言立敬王當立又能立矣故直稱居于狄泉而不言立子朝庶孽奪正以賤妨貴基亂周室不當立者也故特稱立而目尹氏尹氏天子之卿也王朝公卿書爵而變文稱氏者見世卿之擅權亂國為後戒也或曰稱氏者時以氏稱之也詩云王謂尹氏此大雅美宣王詩也亦譏世卿歟為此說者誤矣詩人主文而不以害意有美而或過有刺而或深以意逆之可也春秋所書或稱爵或稱字或稱名或稱氏或稱子或稱人名分所由正是非所由定禮義所由出皆斷自聖心游夏不能與也徇時之所稱而稱之豈其然乎吕氏曰既曰天王居于狄泉尊無二上斷可知矣又曰尹氏立王子朝則王子朝之不正而爭立罪亦明矣屬辭比事春秋教也入月乙未地震冬公如晉至河公榖有公字有疾乃復左氏傳公為叔孫故如晉及河有疾而復公羊傳何言乎公有疾乃復殺恥也何氏注因有疾以殺畏晉之恥泰山孫氏曰凡公如晉不得入者六此書有疾明公自有疾而反耳餘則皆譏公數如晉為晉距而不納以取其辱武夷胡氏傳昭公兩朝於晉而一見止五如晉而四不得入焉今此書有疾乃復殺恥也以周公之胄千乘之君執幣帛修兩君之好而不見納斯亦可恥矣有恥而後能知憤知憤而後能自彊自彊而後能為善為善而後能立身立身而後能行其政令保其國家矣昭公内則受制於權臣外則見陵於方伯此正憂患疢疾有徳慧術智保生免死之時也而安於屈辱甘䖏微弱無憤恥自彊之心其失國出奔死於境外其取之哉襄陵許氏曰公失其重乆矣故晉得輕進退之二十有四年春王二月丙戌仲孫貜卒婼公羊有叔孫字婼作舎至自晉左氏傳晉士彌牟逆叔孫於箕叔孫受禮而歸吕氏曰婼不言叔孫前見也劉原父以謂二傳不言叔孫而公羊獨言叔孫似是聖人本意因遂以為可襃而襃之世儒說經之鑿舉皆類此原父能知他人之鑿而不自知其鑿也惜哉夏五月乙未朔日有食之秋八月大雩左氏傳秋八月大雩旱也丁酉杞伯郁公作鬱釐卒冬吳滅巢左氏傳楚子為舟師以略吳疆沈尹戌曰此行也楚必亡邑不撫民而勞之吳不動而速之吳踵楚而疆場無備邑能無亡乎王及圉陽而還吳人踵楚而邊人不備遂滅巢及鍾離而還沈尹戌曰亡郢之始於此在矣王壹動而亡二姓之帥幾如是而不及郢劉氏權衡曰書曰巢伯來朝巢為諸侯審矣非楚邑也武夷胡氏傳巢楚之附庸實邑之也書吳入州來著陵楚之漸書吳滅巢著入郢之漸四鄰封境之守旣不能制則封境震矣四境國都之守旣不能保則國都危矣故沈尹戌以此為亡郢之始也春秋内失地不書明此為有國之大罪外取滅皆書明見取滅之不能有其土地人民則不君矣故諸侯之寶三以土地為首葬杞平公春秋集觧卷二十五
